# Permalinks
#
# Use of `relative_permalinks` ensures post links from the index work properly.
permalink:           pretty

# Setup
title:               quietlife.net
description:         'What we honor as prudence in our elders is simply panic in action.'
url:                 https://quietlife.net
baseurl: /
paginate:            5
plugins: [jekyll-paginate, jekyll-commonmark]
include: [".well-known", "images"]

# Markdown
markdown: CommonMark
commonmark:
  options: ["SMART", "FOOTNOTES", "UNSAFE"]
  extensions: ["strikethrough", "autolink", "table"]

# About/contact
author:
  name:              Chris Wage
  url:               https://twitter.com/cwage
  email:             cwage@quietlife.net

# Custom vars
version:             1.0.0
