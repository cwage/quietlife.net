services:
  jekyll:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - .:/workspaces/quietlife.net
    working_dir: /workspaces/quietlife.net
    ports:
      - "4000:4000"
    environment:
      - BUNDLE_PATH=vendor/bundle
    command: >
      bash -c "bundle install --local && bundle exec jekyll serve --host 0.0.0.0 --livereload --future"
