name: Susan
body: I am stuck. My husband LOVES our dog, I love him too, but I absolutely HATE
  having a dog. I feel so alone. I know that it would break my husband's heart if
  I insisted that we find him a new home. I think that I would be riddled with guilt
  and that my husband would resent me. I have tried to get him to take more responsibility
  for the care of the dog, but he only does it every now and then, when it is convenient
  for him. I have tried to talk about it to him, but he gets so mad at me if I even
  approach the subject and makes me feel like I am mean. Does anyone else out there
  know How I feel? Any Suggestions?
date: '2006-03-16T18:58:03Z'
slug: 2005-12-25-i-hate-your-dog
