name: Steve Nelson
body: 'The chemical that I would recommend is Propylene Glycol aka antifreeze: Soak
  a bag or two of cheap hot dogs in antifreeze (radiator fluid from your local auto
  parts store). Place the hotdogs in the problem location. Problem solved. By the
  way, this will prevent the dogs from “shiting [sic]” on anyone else’s yard as well...
  Hope this helps!'
date: '2006-11-09T19:42:11Z'
slug: 2005-12-25-i-hate-your-dog
