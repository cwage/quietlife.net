name: Jeff
body: I can appreciate animals without owning them. Pet ownership is, usually, more
  about the owner than the animal. If your pet has no purpose in your life, then you
  shouldn't own it, if it does, then care for it properly, & responsibly. Discipline
  means consistency, not to be confused with cruelty. If your pet isn't a chore, then
  you're not doing it right.
date: '2012-12-29T08:34:55Z'
slug: 2005-12-25-i-hate-your-dog
