name: KaD
body: I agree wholeheartedly.  Far too many people have dogs who don't take proper
  care of them.  They're thrown in the back yard like a sack of rocks where they bark
  endlessly from lonliness and boredom.  It's a poor quality of life for the animal
  and the neighbors.  Having a dog is a ten to twenty YEAR commitment of spending
  time with your dog EVERY DAY, exercising it EVERY DAY, and picking up shit.  This
  is why dogs don't make good pets for people who work 40-50 or more hours a week
  and have a 10 hour commute too, and live in houses with tiny suburban yards.  I
  have to disagree with you on cats in the house though.  Cats, unlike dogs, clean
  themselves.  I have both in the house and the cat leaves FAR less hair around. 
  And if your cat's outside it's likely to be killed by someone's freeroaming mauler.
date: '2013-02-11T19:45:50Z'
slug: 2005-12-25-i-hate-your-dog
