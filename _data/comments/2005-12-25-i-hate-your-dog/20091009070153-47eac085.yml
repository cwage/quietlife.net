name: Myst
body: Wow that pretty much sums up my perspective on dogs, although I wouldn't call
  myself a dog lover or hater. I guess if I wanted a dog i'd get one of my own. I
  don't own a dog for many of the reasons you've outlined above but my boyfriend on
  the other hand does own a dog and sometimes i wonder if he actually owns the dog
  or the dog owns him. In any case i know he adores his dog and because of that i've
  expanded my personal boundaries to accomodate the dog...allowing it in my house
  when ordinarily i wouldn't. personally i'd prefer a dog that stayed outside but
  his dog goes everywhere with him and he wont even close the bedroom door before
  she's in the room at night. The dog accompanies us everywhere which means going
  out to dinner and a movie is out of the question because she'll be left waiting
  too long in the car, unless we get take out and go to a drive in...which is where
  i draw the line because honestly i don't relish the idea of sharing a confined space
  for several hours with a dog sitting in the back seat panting its reeking breath
  over my shoulder. Then there's the hair and the doggy smell some dog owners seem
  immune to. Or after an hour of throwing a frisbee you try to sit down and have a
  conversation and the dog starts whining and dropping a slimy frisbee at your feet.
  As a non dog owner it gets annoying but i tolerate it which tells me if the best
  i can do is tolerate something then that something probably isn't for me.
date: '2009-10-09T07:01:53Z'
slug: 2005-12-25-i-hate-your-dog
