name: Erin
body: The antifreeze comment is just ridiculous. You are totally narrow-minded and
  it's not even slightly funny. Dogs die from substances like antifreeze all the time
  and it is people like you and you're cruel self who poison dogs because they don't
  like them or their behavior. Well, want some reality? I don't like you, or your
  nasty self, or your house, apartment, car, bicycle, whatever you even own. Get a
  life and I hope a little terrier barks at you and you run the other way like a little
  scared pussy.
date: '2007-07-31T15:15:31Z'
slug: 2005-12-25-i-hate-your-dog
