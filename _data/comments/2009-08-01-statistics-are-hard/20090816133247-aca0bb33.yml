name: Lisa
body: What is interesting to me is the number of Black men who state their ideal match's
  ethnicity is anything but Black/African American. Alot of the men are attractive,
  but are not interested in dating a Black woman even though they themselves are Black.
  How sad is that? I see alot of profiles like this on yahoo personals but have also
  seen them on [match.com](http://match.com "match.com").
