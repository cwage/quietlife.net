name: Laura Creekmore
body: You'd also have to control for class issues. Were the people of various races
  all at the same educational and professional levels? Like you, I suspect there is
  some inherent bias in the members' choices, but it's likely not anywhere near as
  stark as the book would indicate.
date: '2009-08-09T12:27:42Z'
slug: 2009-08-01-statistics-are-hard
