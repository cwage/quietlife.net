name: fishwreck
body: Sam's is about value (i.e, quantity for the price) and atmosphere (the risk
  of someone getting yelled at). I've been there lots of times and, most of the time,
  there's no yelling. Just lots of happy customers. But Sam is a little cranky and
  he definitely has his rules. I can't say I didn't enjoy the time I saw him kick
  out a group of college aged guys for being noisy and milling about instead of getting
  to a table and ordering (clearly they were not familiar with how things go at Sam's)
  or the time he locked the door to keep the place from getting too crowded right
  after I walked in but before my friends had arrived. I've had plenty of fun times
  at Sam's and always enjoyed the sushi, even if it wasn't the fancy stuff. It's basic,
  it's cheap, it tastes good and it comes with a side of entertainment. And at least
  his health score is higher than Ru Sans where you're pretty much risking your life
  for more creative fare.
date: '2009-06-22T22:36:20Z'
slug: 2009-06-15-sushi-snobbery
