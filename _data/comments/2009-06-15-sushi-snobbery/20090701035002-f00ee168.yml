name: Lannae
body: Is Sam's sushi good, not really, but it is not bad either. It is definitely
  not fatty calories I can feel healthier eating. Do I occasionally buy Sam's Sushi
  sush, yes. Do I know sushi, yes, after growing up with sushi in L.A. starting in
  the 1960s. I do eat Sam's sushi because it is damn cheap when I want something healthier
  than many downtown alternatives that are fried, heavy in cheese, or just plain bad.
  I have actually talk to Sam, and I really like him. I guess I am his Kramer as Krammer
  is to the Soup Nazi. Sam is a very environmentally and waste conscious guy. If you
  come in together, write on one ticket to save paper. He also has a lot of knowledge
  about the wider environmental issues Nashville, TN and the USA are facing. He likes
  a good value, and he will tell you where you can get your own sushi grade fish and
  make your own sushi at home on the cheap. He lives close to his shop so he walks
  to work, and doesn't have to use a polluting car. He likes that he wastes no time
  commuting. We both don't understand how many downtown employees make an hour+ commute
  everyday. I really enjoy my time talking to him and I learn something from him every
  time I go there. Oh, and he won't take a tip. The $5 you pay includes the cost of
  food and tax and tip. I kind of miss the efficient attitude you get from some L.A.
  and Boston sushi chefs, and that is what Sam has. When I go in there, I somehow
  feel transformed back into a little hole in the wall dive place in another city
  I have lived. I enjoy that feeling, a suspension in time for me. Then, when I leave
  to go back to work, it is just back to reality. I can see where people don't get
  Sam's at all, and would not like it. It is the same as how I can also see people
  disliking Nashville, my new hometown, it is just not for everyone.
date: '2009-07-01T03:50:02Z'
slug: 2009-06-15-sushi-snobbery
