name: jscheel
body: I've had sea urchin here in Tennessee; it was ok, but nothing earth-shattering.
  Of course, Tennessee isn't really the place to order sea urchin, like you said.
  I used to frequent Sam's, when our office was on 2nd, but I never expected great
  sushi. Heck, I knew it was mediocre, but jeez, you get like 2 pounds of sushi for
  five bucks!
date: '2009-06-29T12:02:12Z'
slug: 2009-06-15-sushi-snobbery
