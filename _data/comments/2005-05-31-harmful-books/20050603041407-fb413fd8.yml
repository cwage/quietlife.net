name: Reggie
body: Thank God we have a choice of what books to read and believe. Thank God we have
  the internet where it is impossible to shut up good minds; yet equally impossible
  to shut up dangerous minds. I've read my share of books, and for some reason I can't
  stop reading.
date: '2005-06-03T04:14:07Z'
slug: 2005-05-31-harmful-books
