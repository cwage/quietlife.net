name: Becca
body: 'I can''t believe that there are seven comments and no one has said "I WANT
  THE GIANT STRAWBERRY SHORTCAKE DOLL!!!!!!!!". I''m saying it now: AMANDA, FOR THE
  LOVE OF ALL THAT IS GOOD AND HOLY AND IF YOU EVER LOVED ME, THEN NOW YOU WILL SHOW
  IT: GIVE ME THAT FUCKING DOLL! If anything, Aggie and Aiko need a 3 foot doll to
  shred. But I''m sure my sister, who once believed that SHE was Strawberry Shortcake,
  might like it for her kid one day. So I''ll make her lame ass store it. Hahahahahahahahahaha.
  Oh yeah, your mom is awesome.'
