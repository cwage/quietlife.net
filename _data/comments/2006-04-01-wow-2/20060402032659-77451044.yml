name: Katherine
body: |-
  *It’s the wish to be a slave. Who wants that to be true? It’s demanding the servile condition.*

  As much as I love Hitch (especially is expose of Mother Theresa...seriously...), the good man always misses the point about the *relationship* some of us have forged with God. Yes, I'm aware that you all think me slightly addled for this and that's fine. Yet there it is. I am in a relationship of love and respect. Something about the yoke being easy and the burden light.....

  Eh well. It'll all sort out in the end. Meantime, Hitch has his liquor, I have my God and the rest of you have your own comforts.
