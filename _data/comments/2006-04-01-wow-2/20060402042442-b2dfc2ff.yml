name: Xav
body: You have struck me as many things over the years - 'pussy city boy' was not
  one of them. I'm not even sure what that means - isn't living in a city more like
  living on the 'edge' than someone who does not. It seems an oxymoron to me.
date: '2006-04-02T04:24:42Z'
slug: 2006-04-01-wow-2
