name: Katherine
body: |-
  *You know, I really don’t understand Christian libertarians. The basic idea seems to be something like “we have to be ruled, so let’s choose the biggest, most dominating master (God) and reject all others.”*

  Speaking as a Christian libertarian, I'd say you've got it about right. Slightly less nuanced than I'd choose, but correct in the main.
