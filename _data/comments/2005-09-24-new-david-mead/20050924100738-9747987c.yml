name: Erik
body: |-
  I really liked him in concert, but have recently come to the sad conclusion that I don't like Indiana, the album he made with David Henry. I'm giving Mine and Ours (with Adam Schlesinger) another chance after forgetting it for a while. I was intrigued by Stephen Hague, though, and I guess I still am.

  Allmusic implies it's not leftovers from the last album, it's stuff from a new album that didn't get released.
date: '2005-09-24T10:07:38Z'
slug: 2005-09-24-new-david-mead
