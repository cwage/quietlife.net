name: tashian
body: 'I had kind of the opposite experience: I went to CVS to buy something over
  $10 yesterday (a little toothbrush head-- my fault for buying an electric toothbrush
  in the first place) and they this thing locked into the shelf, which I''d never
  encountered before. It was in the middle of a random aisle, and I could grab onto
  it... but I couldn''t pull it off of the rack. It was totally annoying. I almost
  ripped it right out of its packaging so I didn''t have to go bother the busy employee
  who, of course, rolled her eyes at me before hunting down the key. I think CVS does
  this so they can put the over-$10 products in the right aisle (as opposed to being
  way behind some counter in a locked case), and they know you''re probably willing
  to go to some trouble to get whatever it is, being that it''s not just a pack of
  gum.'
date: '2004-11-11T18:49:14Z'
slug: 2004-11-10-random-observation
