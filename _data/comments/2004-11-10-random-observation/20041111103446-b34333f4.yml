name: Sara
body: FWIW, the closest Kroger to my house, which is in a seriously-yuppified-and-always-has-been
  area, has the same design for storage of such products as yours, and the one out
  by the highway, which is in the area with all the apartments and the school that's
  less highly rated than the rest of the district, has the more open design. Therefore,
  I suspect it may have more to do with the age of the store or its most recent remodel.
date: '2004-11-11T10:34:46Z'
slug: 2004-11-10-random-observation
