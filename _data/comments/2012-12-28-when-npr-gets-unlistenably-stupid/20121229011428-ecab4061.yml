name: Jon
body: |-
  I'm reminded of this essay by Bruce Schneier [http://www.schneier.com/ess...](http://www.schneier.com/essay-401.html "http://www.schneier.com/essay-401.html") where he argues that when we witness some sort of rare event that is none the less horrific, we're hardwired to give it much more weight in our mental model of probabilities. One example is that post a movie theatre shooting, we now think movie theatres are more dangerous than the car ride to the theatre which, he states, is safer than it has ever been.

  He ends the essay with what I found to be an interesting statement: "But wear a seat belt all the same."

  So while the article you quote is indeed pretty lame, there's something to be said for preparing for a rare, yet inevitable, event.
