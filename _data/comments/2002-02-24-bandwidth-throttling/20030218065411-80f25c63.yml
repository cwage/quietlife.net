name: James Waite
body: |-
  Throttling, I just love the idea.

  I have a 256 dsl connection and wish to throttle my connection (at times) 4 ways with a family with different needs. We used to share a dial up 56k connection and were most happy when we had the modem to our selves.
  Now with 256k to play with I thought a 56k like connection each (the reainder favouring someone other than myself of course)would have everone appeshiating (experiancing) an improved internet connection.
  Does any one have any idea on choking the download to different machines on a network??
