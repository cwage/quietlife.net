name: Amanda
body: I am really annoyed/amused to see "the Bill Hobbs" make a comment on your blog
  that so immediately brings down the level of discourse with bullying fallacies.
  People ask me why I don't blog, and this is why. This guy is the person you point
  to as a fine example of the medium? I'd like to see Mr Hobbs sit in on a political
  science class at the university where he is employeed and see how far he gets with
  such thoughtless garbage.
date: '2005-12-21T17:27:01Z'
slug: 2005-12-20-unionize-this
