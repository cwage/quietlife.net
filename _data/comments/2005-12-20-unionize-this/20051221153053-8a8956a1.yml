name: newton
body: illegal schmillegal. the whole point of a strike is to show someone (ownership,
  management, the general public) what they'd be missing if whatever service is currently
  being taken for granted suddenly wasn't there. i wonder if the people of new york
  decide that they want safer subways and better paid employees when they hoof it
  to work for a day or two?
