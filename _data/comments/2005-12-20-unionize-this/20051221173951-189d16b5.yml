name: cwage
body: |-
  There are things unions can and do do to flex their muscle without outright shutting things down.. I assume sometimes though a specific show of power is necessary..

  There's an interesting document published by a chapter of the IWW called [Fire Your Boss](http://membres.lycos.fr/anarchives/site/how%20to/title.html "http://membres.lycos.fr/anarchives/site/how%20to/title.html") that covers techniques used in the fashion you mention, though. Some are subtle and clever, others are just outright (and probably illegal) sabotage.
