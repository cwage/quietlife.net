name: eerie
body: Except they're not bothering to clear up the misconceptions they create. My
  entry merely exposed the misconceptions held by the vast majority of Westerners.
  We've been commenting like this on a ton of blogs, because it's important that people
  understand that things are a bit more complex than Wafa's or Irshad's simplistic
  criticism.
