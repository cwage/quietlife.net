name: t. rev
body: That's what I'm saying. Say something flippant (or inflammatory, or both) to
  get people's attention, in hopes of pulling them in for the more thoughtful work.
  It's a valid strategy...but it seems uncomfortably similar to what you're criticizing
  Sultan and Manji for. It worked for them, now it's working for you. Funny old world,
  innit?
