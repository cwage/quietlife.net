name: t. rev
body: 'I''d describe it as cheap and weak, not amusing and brilliant. Only points
  one and four make even feeble gestures in the direction of actual criticism; the
  rest is just snotty mockery, and not particularly good snotty mockery. The premise
  itself is misguided: Sultan''s a critic, not a reformer.'
