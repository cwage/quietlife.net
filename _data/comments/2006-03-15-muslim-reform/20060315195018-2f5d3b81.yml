name: eerie
body: |-
  *I’ve reread your original entry several times, and I just don’t see much misconception-exposure there*

  Not there. Here. And on every other blog where the entry was cited and commented on positively or negatively. What the entry did was get people talking, and by talking they exposed their misconceptions, prejudices, etc. Go see my co-author [Lounsbury's](http://lounsbury.aqoul.com "http://lounsbury.aqoul.com") debate at [Reason.com](http://www.reason.com/hitandrun/2006/03/speaking_truth.shtml#comments "http://www.reason.com/hitandrun/2006/03/speaking_truth.shtml#comments"). He's far less polite.

  And the entry was obnoxious, not weak. Try not to take it so seriously.
