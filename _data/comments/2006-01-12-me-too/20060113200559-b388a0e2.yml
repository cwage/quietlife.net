name: R. Francis Smith
body: |-
  For no particularly good reason, this reminds me of John Stossel on the Colbert Report declaring himself (when asked if he's conservative or liberal) a libertarian mere seconds before saying that sometimes wiretapping Americans is necessary. Nice job, Mr. Stossel.

  -R
date: '2006-01-13T20:05:59Z'
slug: 2006-01-12-me-too
