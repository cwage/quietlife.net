name: A.Nandi
body: I have a couple of EMs and they're a great, underrated camera. At the end of
  the day it's a pretty reliable body to mount nice Nikon glass on. Coincidentally
  I was trying to find out info on the Pentax P30t. Playing with film cameras that
  are now less expensive than a disposable camera is great. I've ended up taking an
  EM to places I'd never want to worry about taking a nice DSLR to like (like the
  beach), not to mention that an EM kit weighs next to nothing. BTW - pick up some
  pentax glass for your P30t - it's fantastic, inexpensive stuff.
