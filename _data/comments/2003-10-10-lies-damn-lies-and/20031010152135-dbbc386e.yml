name: SayUncle
body: |-
  I'm not missing your point, i actually agree with it.

  I'm not addressing which party is the richest, i'm addressing which party gets contributions from the richest, as measured by dollar value. If someone gives $13M, they're more likely richer than the guy that gives $200.
