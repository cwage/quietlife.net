name: Manish
body: In many of the cases, the top donors aren't "someones" but aggregators like
  unions, trade groups and other campaign funds. They get money from a lot of people/companies
  and then shell it out in one big lumpsum which scews the statistics for largest
  donors.
date: '2003-10-10T22:58:37Z'
slug: 2003-10-10-lies-damn-lies-and
