name: cwage
body: |-
  You're missing my point, I think. I made the more general point that if you're going to talk about which party is "richest" you need to look at aggregates and averages, not an arbitrary slice of data from the top or the bottom.

  This would be akin to me taking the bottom 10 least contributions and saying that the Democrats are the poorest party because their bottom 10 are less than the Republicans' bottom 10.
date: '2003-10-10T15:11:19Z'
