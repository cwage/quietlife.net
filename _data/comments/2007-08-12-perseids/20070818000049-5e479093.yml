name: Paul Van Hoesen
body: The shower kicked in right after dark. We saw some nice ones that made little
  white tunnels of smoke from the comfort of a chase lounge in Brentwood. (would have
  been interesting to capture photographically). I have a 4" Celestron refractor with
  a motor drive (a Chevrolet in the telescope world). The best place I have ever been
  for observing around here is Water Valley on the Natchez Trace parkway about 10
  miles south of Leipers Fork. Bring your sleeping bag,refreshments, and music and
  you're good to go... Binoculars are handy for catching the trials before they disappear.
date: '2007-08-18T00:00:49Z'
