name: Sara
body: You should still have a decent showing tonight. Go tonight! Thanks for the reminder.
  I took Chris out to see these two years ago (his first time) and I would love to
  do it again. Where are you planning on going to be free of lights? We went out near
  the Brentwood library to some backroads and almost got lost.
