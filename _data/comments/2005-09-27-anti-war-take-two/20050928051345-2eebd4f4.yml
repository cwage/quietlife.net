name: Steve L.
body: |-
  chirs, i wouldn't be too worried about this guy. have you checked out his resume? he's got more "questionable" jobs listed than 'ol Michael "Brownie" Brown.

  -- Director of Media Relations for the National Victory Parades (huh?!)
  -- attended Defense Information School (sounds made up)
  -- was a howitzer-battalion operations officer in Germany, yet he was born in 1955.
   (uh, can you say Cold War security guard)
  -- and he lists his participation in the invasion of Panama as an acomplishment.

  i mean, come on. Panama?
date: '2005-09-28T05:13:45Z'
slug: 2005-09-27-anti-war-take-two
