name: Blake
body: |-
  I'd compare that (those trying to "wrest" more funding from the sate) to weening a calf from its mother's teat. They will whine and cry because they can't suck almost unlimited milk as they used to be able to.

  The philisophical debate that this obviously leads to (over the growth of government) is where the discussion lands because if you're a big government kind of person you'll be against it and find as many negatives as you can surrounding it. The thing that TFT seemed to agree on is that they didn't think government (here in TN) was spending enough money and that we aren't taxed enough. When Sen. Bryson put it in those terms, they didn't argue.

  I'm going to put more on my blog later (either tonight or tomorrow)...I'm just busy right now.
