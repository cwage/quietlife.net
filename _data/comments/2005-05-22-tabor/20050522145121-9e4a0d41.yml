name: Squiddhartha
body: |-
  The 'TABOR' name was partly chosen out of sentimentality, as Horace and Baby Doe Tabor were a very famous couple in Colorado history.

  Hardly a year goes by without some proposal or another on the ballot to exempt some particular service, usually associated with open space or schools, from the TABOR process and to allow the state to keep 'excess' revenues. Proponents of TABOR say that this indicates the process is working, and that voters get to have a say in how taxes are spent; opponents say that it adds cumbersome layers of bureaucracy to the functioning of government, and forces service providers to beg for funds yearly.

  In practice, the truth is certainly somewhere in between; but working in Boulder, I have seen constant reports of the struggles CU and other higher-education institutions have had in trying to wrest funding from the state, and I find that pretty disturbing.
