name: stucky
body: |-
  I think if he had selected a different word, you might not be quite so aghast. I think he does have a point in some respects. When I want a computer, I get a computer. I do things on a computer that I don't do on a phone, and that I don't *want* to do on a phone.

  But there's overlap. With the iPhone, Apple nailed that overlap. I've hacked my razr, I've messed around with windows mobile devices. I've come to learn that I don't want to hack my phone (much), I want a device that someone has spent all the time it takes figuring out how to perform the actions I haven't discovered I want to do already. On a computer, I want to spend that time. On a phone, I don't. Apple figured this out before I did. So, props to them. Some people look at that situation and say, "That's magic!" It's not *magic*. There's a word for it. I don't know what it is, but I'm not a poet or writer.

  I've yet to see if the iPad nails the overlap between Computer and device I want to carry around that's not a phone. It wouldn't surprise me if they did, because they've managed it once before.
