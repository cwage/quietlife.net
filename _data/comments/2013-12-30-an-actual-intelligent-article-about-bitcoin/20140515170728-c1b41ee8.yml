name: Robert O'Regan
body: The one overriding issue I have is that the value, in any currency, seems dependant
  on the amount of bitcoin available, that is, the value depends on the ability of
  the "miners' to provide an unpredictable volume. It, bitcoin, has no numeraire,
  or basis. Gold, as a numeraire, says a fixed number of coins to the unit of gold.
  Its like the $US, bitcoin, as well. has no real value...the Fed can produce, like
  the bitcoin miners, any amount it likes. So, both the dollar US and the bitcoin
  can be used as a medium of exchange, but when you get your dollar/bitcoin payment
  you should immediately convert it to a stable currency, say, gold. etc
date: '2014-05-15T17:07:28Z'
slug: 2013-12-30-an-actual-intelligent-article-about-bitcoin
