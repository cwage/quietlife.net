name: t. rev
body: Actually, we're an exceptionally *healthy* society, by any kind of sensible
  historical or global measure. Yes, we're *slightly* less healthy than some of the
  other advanced societies on the planet right now, but those other societies are
  *tiny*. We aren't ravaged by plagues or parasites; we have the extraordinary "problem"
  of having some of our health risks tied to *too much* food and *not enough* back-breaking,
  agonizing physical labor. There isn't much cultural knowledge for how to deal with
  widespread obesity, because it's so staggeringly unlikely. Most people from most
  times and places would be *happy* to have such problems.
