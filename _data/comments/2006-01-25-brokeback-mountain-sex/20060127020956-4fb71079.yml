name: jamey
body: |-
  Mike, maybe I didn't use the term evangelical in the way it's most often used. But in it's original sense, it simply means "related to the Gospel". According to Word Sense, here's the definition:

  The adjective evangelical has 3 meanings:

  Meaning #1: relating to or being a Christian church believing in personal conversion and the inerrancy of the Bible especially the 4 Gospels
   Pertains to noun: evangelicalism (meaning #1)

  Meaning #2: of or pertaining to or in keeping with the Christian gospel especially as in the first 4 books of the New Testament
   Pertains to noun: Gospel (meaning #1)

  Meaning #3: marked by ardent or zealous enthusiasm for a cause
   Synonym: evangelistic

  Pope John Paul II was often referred to as "the evangelical Pope" read Larry Kudlow's column ([http://www.nationalreview.c...](http://www.nationalreview.com/kudlow/kudlow200504041030.asp) "http://www.nationalreview.com/kudlow/kudlow200504041030.asp)")
