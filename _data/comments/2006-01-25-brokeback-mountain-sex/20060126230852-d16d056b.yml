name: Anonymous
body: |-
  Chris, you're right. I could have used about a hundred different movie titles as an example. "BBM" came to mind first because it's the latest to get tons of attention. I could have gone back to "Little Darlings" or "The Last American Virgin" or "Porkys". But "BBM" is just as good an example as any of those films, because it very bluntly focuses on sex for a good part of the movie. The point of this discussion shouldn't be lost in which movie I picked as an example. The Pope's encyclical reminds us that since sex is so prevalent in our media and our culture, that it doesn't mean what it 'ought to mean. Sex is portrayed many times as lust and not part of the more fulfilling eros/love.
  That was the point of the Pope's message and the point of my blog. That really has no more to do with Christianity than it does with values and morals.

  I'm sorry if I didn't present the story in a more clear way. And S-town Mike, it was not meant to be tilted at all, but when a conservative evangelical Pope issues a message and I cover it, the story may come off that way just for being presented fairly.
