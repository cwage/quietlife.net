name: Doug Orleans
body: That policy change seems unrelated to the Seigenthaler thing. Obviously a registered
  user could still make a slanderous article, although I guess if he's not anonymous
  he could be sued or something? (But I imagine you can still be pretty anonymous
  even if you register, not to mention you could be a non-US citizen.) And an unregistered
  user can still insert slanderous information into an existing article.
date: '2005-12-06T21:21:04Z'
slug: 2005-12-06-what-happens
