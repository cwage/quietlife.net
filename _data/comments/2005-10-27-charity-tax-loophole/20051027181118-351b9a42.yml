name: cwage
body: |-
  The answer of course is: "it depends". I'd argue that the government is certainly more efficient than charities in certain areas but that really wasn't my point.

  My point is that this has the potential for a chain of events:

  a) Some portion of the charitable giving boost will go to "charities" that predominately benefit the middle class
  b) The tax deductions used to encourage 1) will cause a decrease in tax revenue
  c) Social programs that benefit the lower class will be the first on the chopping block.
date: '2005-10-27T18:11:18Z'
