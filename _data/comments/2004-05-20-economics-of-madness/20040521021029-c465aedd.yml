name: Erik Ostrom
body: I don't know about the demographics of "small-scale" suicide bombing, but the
  9/11 hijackers "came from secular, middle-class Arab families and blended well into
  Western society" ([here](http://www.suntimes.com/special_sections/sept11/attacks/thehijackers.html
  "http://www.suntimes.com/special_sections/sept11/attacks/thehijackers.html")). Economic
  desperation isn't everything.
date: '2004-05-21T02:10:29Z'
slug: 2004-05-20-economics-of-madness
