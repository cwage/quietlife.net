name: Chris Owens
body: |-
  "Who cares?"

  I see this (and similar sentiments) so often it could literally be the majority opinion in this country.

  After conquering their country, at a cost of hundreds of billions of dollars and closing in on 1000 American lives, you don't care?

  After bombing hospitals, killing civilians, maiming children, raping women, imprisoning people without trial and subsequently sodomizing them, and generally doing our damnedest to make sure they experience every possible element that makes up the "horror of war", you don't care?

  After announcing that we "own" Iraq, handpicking their "leaders" and reiterating in word and deed that none of them have any rights, you don't care?

  "Who cares?"

  We should care. Even if you believe the war was just, you should care.

  If you don't care, I have nothing for you but contempt. You are literally worthless.

  "Why do they hate us?"

  The answer is evident to me. Because you don't care, I hate you, too.
date: '2004-05-21T12:42:01Z'
slug: 2004-05-20-economics-of-madness
