name: Kevan
body: Sucks about your Canon. I have the Powershot A 610. Friday, I carried it with
  me riding some singeltrack at a local trail. I missed a bridge and went over my
  handlebars, landing HARD ont he camera. I was worried, but it wasn't damaged a bit.
  I love the way it syncs perfectly with iPhoto. I need to dig up a tripod for it
  next.
date: '2006-04-16T08:20:21Z'
slug: 2006-04-15-broken-camera
