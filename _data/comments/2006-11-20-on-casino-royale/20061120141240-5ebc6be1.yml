name: jag
body: |-
  God, his ass *is* phenomenal.

  I'm with you on the Ford. In fact, I have a gripe about the blatant product placement as a whole. When we got home and did the requisite imdb search for the movie, we saw that this is the first Bond film to be co-produced by Columbia, which is owned by Sony, which explains why every other frame featured a Vaio laptop. CB said that the cell phones and Vespers camera were Sony too.

  There was also that very blatant FedEx delivery when Bond was at the hotel desk, which was so obvious is was distracting.

  I hated the mention of 9/11. Obviously, the movies are going to stay relatively current, what with the gadgets and the cars, but revolving a major plot point around a specific and very well known event dates the movie. Even though you can look at Dr. No and figure out when it was made, it's still timeless and theoretically happen 'anytime'.

  Other than that, I love love loved it.

  Oh, Sebastien Foucan's official website is [parkour.com](http://parkour.com "parkour.com"). He was amazing. I'd never even heard of that before.
