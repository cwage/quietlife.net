name: Blake
body: |-
  The Ford scene is a little bit of a story line type of thing. Remember...this is the first of the Bond series. He didn't like putting on a tux because he was just a regular tough guy. This movie saw him moving from a regular tough-guy to what we know as James Bond. Bond would never drive a Ford, but before Bond was Bond, he would have.

  Just my thoughts there...because I thought the same thing at first as well.
