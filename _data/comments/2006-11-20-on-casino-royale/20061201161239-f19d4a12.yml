name: Becca
body: |-
  I, too, agree with you on the Ford. Brad and I both looked at each other said, "Is he driving a fucking Ford? Bond? In a Ford?" The product placement was disgusting, although I missed a good deal of it because I was bitch-slapping the middle schoolers in front of us for getting up 19+ times throughout the movie.

  I concur with Jag. Daniel Craig's ass was amazing.

  On the ending. "The bitch is dead" is a much more powerful way for us to understand how Bond becomes Bond over M going on about gaywad "wah wah she saved your life" bullcrap. I think I would've been more satisfied with the book ending.

  Other than that, Yea Bond!
