name: Jaylbird
body: I just got to see this one on DVD. I am sorry to say I missed it in the theater.
  I agree about the Ford usage, but lest we forget, Bond (by Roger Moore) has a very
  long chase scene in an old AMC Eagle in Live and Let Die. Not his actual car, but
  neither is the "F-d Over Rebuilt Dodge" (probably a rental in Bahamas). Then again,
  he gets his first taste of the '64 A-M shortly thereafter. I also agree about the
  other comments- a great Bond movie if there ever was one (arguably the best since
  Connery).
