name: Amanda
body: And another thing! AC does believe that gender is a social construction, even
  though he explictly states otherwise. His own arguement betrays him. If gender is
  not a social construction, or in other words, if the differences that exist between
  human beings with a penis and human beings with a vagina are purely inate, natural
  and inborn, then the entire arguement that boys need a father becomes ridiculous.
  If masculinity is inborn, then a boy could be raised by a pack of effeminate gorillas
  and still turn out as the Malboro Man. I'm quite certain this not what AC meant.
  I'd venture to guess he meant that he does not believe that socialization has that
  great an influence on the character of a child as does biology. This is another
  matter altogether, and as Chris mentioned, is a matter for science. When you accept
  the premise that some characteristics are natural and some socialized, it is then
  simply a matter of designing tests to tease apart which characteristics are attributal
  to each. There are people that do this everyday. There are called sociologists and
  biologists. This is simply not a matter of personal opinion. Sorry.
date: '2005-10-05T16:20:13Z'
