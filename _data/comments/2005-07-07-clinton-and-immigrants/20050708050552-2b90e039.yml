name: Jackson
body: |-
  Aren't you assuming that the majority of current illegal immigrants are working jobs that are reported to the federal government? There are many many many illegal immigrants working in sweatshops inside the US because they cannot get another job without documentation. There are day laborers. There are undocumented household workers.

  I am not disagreeing that there are many illegal aliens who are working in taxed jobs using falsified documents, and that they will not receive social security benefits for the taxes that they pay. I just question whether this is a majority or minority.
date: '2005-07-08T05:05:52Z'
slug: 2005-07-07-clinton-and-immigrants
