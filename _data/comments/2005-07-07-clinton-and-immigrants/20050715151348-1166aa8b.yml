name: Xibo
body: It's my understanding that illegal immigrants can't get a social security number.
  And thus, their income can't be reported to the feds. So, they generally take jobs
  that pay cash (and of course, certain companies are thrilled about this, because
  they don't have contribute the employer portion of FICA either, nor do they need
  to concern themselves with minimum wage laws). Obviously, putting these people on
  the books would increase tax revenues. But really, that's just a matter of increasing
  legal immigration.
date: '2005-07-15T15:13:48Z'
slug: 2005-07-07-clinton-and-immigrants
