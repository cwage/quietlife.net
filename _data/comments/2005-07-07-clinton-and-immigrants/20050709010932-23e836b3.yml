name: cwage
body: Well, yeah, there's the rub I guess. The problem with basing any sort of policy
  on illegal immigrants is that it's difficult because, well, they're undocumented.
  I'd like to try to find the closest we have to data on the percentage of illegals
  working but paying payroll taxes. I suppose taking the amount dumped into the suspense
  file every year dividing by a rough estimate of illegal immigrant wages could give
  you a **rough** idea..
date: '2005-07-09T01:09:32Z'
slug: 2005-07-07-clinton-and-immigrants
