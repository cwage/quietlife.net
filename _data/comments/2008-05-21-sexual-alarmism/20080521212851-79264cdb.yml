name: RachelW
body: They were specifically talking about HSV-2, which is typically the genital,
  sexually transmitted form. If they were talking about everybody who carries HSV-1
  (which \*can\* cause genital herpes, but generally is the cause of cold sores),
  the prevalence would likely be much higher than 1 in 4. At the time, the full study
  was not available (although the abstract was available on the CDC site), which is
  why many reports were lacking some of these details .
