name: Troy
body: Hmm, how to thread this needle...no, I certainly wasn't joking when I referred
  to "The Economist" as a "literary juggernaut". However, I wouldn't say that I was
  being entirely literal either. I mean, really, who uses a phrase like "literary
  juggernaut" seriously? Consider it hyperbole with a point. I would still submit
  that the magazine is heads and tails above most (if not all) other news commentary
  in print. I shall now return to reading Lexington and being part of the establishment
  (a title which I feel too grossly underpaid to acccept).
date: '2005-06-28T20:18:31Z'
slug: 2005-06-23-literary-juggernaut
