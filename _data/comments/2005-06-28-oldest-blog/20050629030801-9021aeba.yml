name: Les Jones
body: |-
  Define "blog." When I started doing 56K.COM in 1997 I used a format with the newest information on the front page, with entries in reverse chronological order. And I stole that from the sites that I liked that did that. One was Ric Ford's MacInTouch, which dates from 1994.

  You'll pretty much have to define an arbitrary moment to define the beginning of blogs. That's pretty much how the invention of baseball was determined. (You didn't think Abner Doubleday was the first person to play stickball, did you? - see Stephen Jay Gould's essay on the creation myth of mankind and baseball, all neatly tied together with the [Cardiff Giant](http://en.wikipedia.org/wiki/Cardiff_Giant "http://en.wikipedia.org/wiki/Cardiff_Giant") - that's also the name of a baseball team, and the Cardiff Giant is stored in Cooperstown, New York, home of the Baseball Hall of Fame. Gould mined pure gold on that essay.)
