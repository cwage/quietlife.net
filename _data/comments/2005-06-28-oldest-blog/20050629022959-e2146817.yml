body: |-
  I think the earliest thing [archive.org](http://archive.org "archive.org") has for me is [http://www.telalink.net/~cwage/](http://web.archive.org/web/*/http://www.telalink.net/~cwage/ "http://web.archive.org/web/*/http://www.telalink.net/~cwage/"), which eventually I transitioned to [http://www.place.org/~cwage/](http://web.archive.org/web/*/http://www.place.org/~cwage/ "http://web.archive.org/web/*/http://www.place.org/~cwage/"), which is where the [earliest instance](http://web.archive.org/web/20011007072023/http://www.place.org/~cwage/news/ "http://web.archive.org/web/20011007072023/http://www.place.org/~cwage/news/") of my blog is archived. [archive.org](http://archive.org "archive.org") is so cool.

  I have thought about gathering up all my previous totally-awesome home-pages and showcasing them somewhere, but I am lazy.
