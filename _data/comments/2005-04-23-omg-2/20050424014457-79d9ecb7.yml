name: Amanda
body: heehee. Good reviews, all around. I think it is funny in two days we saw two
  movies that were both written directed by and starring one guy (Zach Braff and Stephen
  Chow respectively) that produced such wildly different products. So at least we
  aren't soured on the whole auteur thing in general, just the auteur thing at the
  hand of floopy haired sitcom stars. Now we can explore the six other Stephen Chow
  films and go back to watching Zach do what he does best...playing that doctor dude
  on Scrubs.
date: '2005-04-24T01:44:57Z'
