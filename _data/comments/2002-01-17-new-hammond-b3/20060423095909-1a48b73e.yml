name: Joe Don Eason
body: |-
  I'm 55 and have been hauling around a B-3/Leslie 147 for 35 years. I have
  an XK-2 and a mini-b chop model. Nothing compares to the real thing.
  As long as I can pull my trailer to gigs I'll always play the b-3 on tours,
  local gigs, and in the studio.
date: '2006-04-23T09:59:09Z'
