name: Blue Note
body: Wow - a Hamnond blog from 2002! I like many new and old Hammond organs. I've
  never been a fan of the spinets. I play out with my XK1, a tube-driven guitar amp,
  and a bar stool. The establishment provides the bar stool, and my equipment fits
  nicely in a mid-sized sedan. Sure - I would prefer to only play bars that provide
  vintage Hammond consoles. I'm very thankful a beer (and ashtray!) fit nicely on
  the top of my XK-1.
date: '2009-03-02T18:13:35Z'
slug: 2002-01-17-new-hammond-b3
