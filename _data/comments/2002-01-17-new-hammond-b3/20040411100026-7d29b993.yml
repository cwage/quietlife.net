name: Nick
body: |-
  Dear Hammond-lovers,
  A friend of mine has played the B3 for many years end suggested me to buy the XB3 for 'on-stage' purposes. And indeed, the XB3 is easier to carry. Nevertheless, Suzuki hasn't succeeded in creating the exact B3 sound. On the other hand, I prever taking the XB3 on stage, looking at its weight. Furthermore, one should not compare a Harley Davidson with a Suzuki Hayabusa either...
date: '2004-04-11T10:00:26Z'
slug: 2002-01-17-new-hammond-b3
