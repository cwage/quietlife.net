name: Steve Robinson
body: |-
  Ah well, just give the boys at hammond/suzuki(brr...) another 5 years or so...
  After the nice-looking, crappy-sounding awful expensive (yep, you could buy 2 completely refurbished B3's for the price of 1 XB3) XB3 it took them a few years to realize that the easiest way to re-create the keyresponse of a B was to recreate the original keyboard - I wonder how long it will take them to realize how the sound of the tonewheelgenerator is reproduced (should be easy nowadays with CNC-lathes/mills and all...)
