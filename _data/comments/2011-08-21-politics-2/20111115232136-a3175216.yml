name: David Wage Jr
body: 'What I think happened is that Republicans generally want to cut funding for
  Welfare programs through evaluation and restructuring.  Trying to cut money by saving
  it where they can.  This has been happening a lot from both sides.  They assume
  they know what the other side wants and get it all wrong.  I watched some CSPAN
  during the debt ceiling thing and found most politicians weren''t even reading proposals.
   They would just assume they knew what was in it.  Several times I heard someone
  say "What you''re asking for is in my plan!"  But who''s got time to read a 2000+
  page bill full of crap not pertaining to the issue.  Example: Student loans were
  restructured in the health care bill.  Representatives are always trying to put
  their little thing in every bill and I''m sick of it.'
