name: Andrew Duthie
body: Your Google Maps link has the location correct. As you head back towards downtown,
  the camp is on the left as you climb and make the last left-hand curve. In that
  airplane view, it's the bottom-right of the big S-curve. The property owner is actually
  River Cement Sales Company, according to the property maps. If you turn on the contour
  lines, it's a bit easier to see.
date: '2014-05-30T01:40:42Z'
