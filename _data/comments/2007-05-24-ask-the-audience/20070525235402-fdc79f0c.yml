name: Scavenger
body: You know train engines use their diesel engines to generate electricity, then
  drive the wheels with electric motors, right? If you hear something that sounds
  like an electric arc, it doesn't seem unlikely it's caused by electricity, although
  I don't have any guesses what the mechanism would be.
