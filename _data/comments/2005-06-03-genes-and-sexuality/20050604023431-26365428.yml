name: wouter
body: |-
  I'd say the truth has already been sacrificed in the oxymoron "religious argument". One can not rationalise his way out of "I believe" -- it's the end of any argument.

  To me, the real question seems to be who deserves having the balance tipping over to their side. Those who demand a minimum of respect for themselves, be it their body or mind, or those who insist on rejecting others, once again contrary to the very core of their proclaimed own beliefs, without any rational argument.

  Granted, I am hardcore anti-religious and rather neutral with regard to sexual orientation of others -- it is, after all, ones personal choice (to act out on it or not), and by no means my problem in any way, shape or form -- but to me the answer to that question seems quite clear.
date: '2005-06-04T02:34:31Z'
