name: Doug Orleans
body: |-
  Hey, I sort of know George William Herbert. He was known at UC Berkeley as "that guy with three first names".

  Anyway, the "federally regulated" part seems tough to do. Isn't the Internet supposed to be global? Maybe the United Nations should regulate it, or the (gulp) WTO...
