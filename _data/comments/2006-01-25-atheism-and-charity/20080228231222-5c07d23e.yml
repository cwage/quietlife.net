name: Faylei
body: '"Religious organizations found charitable organizations to proselytize..."
  You need to check your facts. In our town, for example, 93 percent of those helped
  by Catholic Charities are not Catholic (some are probably atheist, but who asks?)
  -- and there is no effort made to convert them.'
