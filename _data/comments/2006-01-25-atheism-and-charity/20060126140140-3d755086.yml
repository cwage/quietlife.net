name: John Carney
body: I disagree with your far-too-broad dismissal of every single aspect of Christian
  benevolence as an attempt to proselytize. Obviously, and regrettably, there are
  efforts that fit that description. But there are many -- more, I would claim --
  that do not. And even in those cases when a religious message is present alongside
  charitable work, as long as it's not made a condition of the charity, I don't think
  it negates the charity. Yes, I know there are some rescue missions and what have
  you that force people to listen to a sermon before getting their soup. That bothers
  me, too. But there are a lot of other church-related relief projects where it doesn't
  work that way.
date: '2006-01-26T14:01:40Z'
slug: 2006-01-25-atheism-and-charity
