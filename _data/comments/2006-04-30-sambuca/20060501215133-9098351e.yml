name: Kevan
body: Make up an imaginary punk rock show and print out wicked cool flyers to glue
  and nail and staple all around the restaurant. After all, that's where the show
  is going to be. With $1.00 Pabst! I can't wait to see The Blood Farts live! Those
  guys ROCK!
