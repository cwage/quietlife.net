name: Will
body: |-
  Hey Chris this is Will.

  I was just reading through Aaron's online journal and saw your comments and the picture of the monkey. I have to say I am very impressed at your ability to find the right picture. The monkey, the suckling babe and the tempura soba and the jerk. Amazing. I don't know your email address so write me back if you want to get together for coffee sometime.
  Take care
  Will
