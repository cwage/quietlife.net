name: emma
body: Well, I'd say the change was relevant to the people who made the graph in the
  first place, but to the people who are complaining about the differing scales, the
  point is probably "a whole lot more black guys kill folks than white guys, even
  if the numbers for black guys move around" or something like that. I have to say
  the original graphs don't bug me, either.
date: '2003-10-07T22:46:42Z'
slug: 2003-10-07-scale-employed-in-statistics-news-at-11
