name: Freddie O'Connell
body: 'Well, then your question has limited relevance. This is all about the intent
  of VSC. One of the potential goals would be to endow other similarly archaic media
  in perpetuity; not wholesale modernization. Which brings up another interesting
  point: why would this asset have any value in the market if it weren''t valuable
  in some way? It''s not like VSC owns a pair of rabbit ears for TVs that no longer
  pick up a signal. (Speaking of which, I have *two* pairs of those if anyone wants
  ''em. Cheap!)'
date: '2011-02-21T23:28:57Z'
slug: 2011-02-21-why-save-wrvu
