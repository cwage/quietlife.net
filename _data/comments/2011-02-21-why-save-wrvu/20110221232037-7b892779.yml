name: Mark Mays
body: Well, couple things. The powers in traditional broadcast media aren't going
  to go away. They're just going to find a way to bring their old practices to the
  new medium, using money to buy out competitors and buy the lobbyists to convince
  govt the old model is the right one and should perpetuate over broadband. Even if
  this doesn't happen, college radio shouldn't have to be the first to make the move,
  especially given then audience they serve OTA. Let Clear Channel become "new media"
  first and exist and thrive in that sphere.
date: '2011-02-21T23:20:37Z'
slug: 2011-02-21-why-save-wrvu
