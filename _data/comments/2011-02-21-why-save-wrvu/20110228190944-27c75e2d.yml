name: amolitor
body: 'So I looked up WVRU and it turns out that they get around a 0.2 share. That
  means that if everyone in the greater nashville area is listening to broadcast radio
  all the time, about 3000 of them are listening to WVRU. Since Vanderbilt has about
  12,000 students, I think we can make a rough estimate of the audience: the Vanderbilt
  students with indie rock T-shirts, stupid haircuts, and black-rimmed glasses (or,
  if that accurate describes all Vanderbilt students, then it''s just some of those).'
date: '2011-02-28T19:09:44Z'
slug: 2011-02-21-why-save-wrvu
