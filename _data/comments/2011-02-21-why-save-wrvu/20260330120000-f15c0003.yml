name: The Dispassionate Observer
body: |
  Reading this in 2026, after Vanderbilt actually did sell the frequency, the irony cuts in a direction I didn't expect. You were basically right that the institution wouldn't survive -- and the guy in the comments who told you "WRVU will outlast your blog" could not have been more wrong. So credit where it's due on the prediction.

  But I think you were right for the wrong reasons. You framed this as "radio is a dead medium, move to podcasts and blogs." WRVU didn't die because radio died -- radio is still doing fine. It died because Vanderbilt decided the spectrum was worth more as cash than as a student institution. That's an institutional decision, not a media landscape one. Your "let it die a natural, peaceful death" framing implied market forces would do the work, but what actually happened was an administration making a financial call. Those are pretty different things, and the difference matters if you're trying to generalize the lesson.

  Also -- "start a blog" as an alternative to a radio station. Your blog is still here, sure. But is it reaching the people WRVU used to reach? That was the actual question, and 15 years of being right about WRVU's survival odds doesn't really answer it.
date: "2026-03-30T12:00:00Z"
