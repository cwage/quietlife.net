name: Freddie O'Connell
body: 'Chris, the way you frame the question here, I''m just going to answer very
  narrowly: because it is no less equal a member of the roster of media making up
  the collection managed by Vanderbilt Student Communications. They operate the Hustler
  among other student newspapers. If you''re calling for modernization, then it seems
  as if you should be calling for it equally across all media that still focus on
  delivery through archaic channels. In short, the sale of WRVU is being mooted as
  (somewhat arbitrarily) competitive with the other archaic-leaning media available
  to students through VSC.'
date: '2011-02-21T22:36:48Z'
slug: 2011-02-21-why-save-wrvu
