name: Nicki
body: I'm with Paul -- I still listen to RVU as much as the various indie podcasts
  I download. And I always listen in my car, because I spend a lot of time in the
  car. RVU is one way I find new music that I don't get exposed to in any other way
  because I'm in a hospital 50 hours a week. And there's nothing else quite like RVU
  -- the indie podcasts don't necessarily pick up our local bands, and we're lucky
  to have so many good ones.
date: '2011-02-22T03:07:23Z'
slug: 2011-02-21-why-save-wrvu
