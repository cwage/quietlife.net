name: Sharon
body: |-
  I love Mitch Hedberg. A comedian that was smart and great. I felt a real loss when I heard. There was NOBODY out there like him. In a world that doesn't make you ever want to smile - he caused me to get aches in my side from laughing so hard.
  What a loss.
date: '2005-04-06T01:09:55Z'
slug: 2005-03-31-rip-mitch-hedberg
