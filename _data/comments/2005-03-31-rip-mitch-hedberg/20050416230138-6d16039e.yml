name: AIDZ from the "Unpronouncable!
body: What the Fuck!!!That's a lie. I still dont believe this. I just heard about
  the guy 2 months ago on Juke Box. SO i decided to go Sam's CLub and get his CD.
  THen i saw a sign that says' "R.I.P Mitch" and i thought it was a sick joke.I got
  so angry i went back home in a rush to look online and see what's up with that.
  And that's how i got here...Someone please tell me that this is a sick joke. THat
  guy was funny like shit..Genius in comedy..So friggin creative!!!Its hard to believe
  man..I feel like i lost a friend, creative people and I have some kind of spiritual
  link..Damn...If he's really dead....Mitch rest in peace..I've listen to Martin Lawrence,
  and a whole lot of comedians. But Mitch and Dave Chapelle are my favorites even
  though i found out about them only about 3 months ago...Damn,,,I hate to see influential
  creativity die..Could you imagine what other ways he probably had saving up to make
  us laugh? Damn,,,May he rest in peace..We love you Mitch.
date: '2005-04-16T23:01:38Z'
slug: 2005-03-31-rip-mitch-hedberg
