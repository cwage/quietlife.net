name: ray
body: |-
  today is my birthday and im talking to my wife and she said she heard on the howard stern show about mitch hedberg passing on.i said no way,i was just looking in the papers to see when he was playing in the area.he was so funny and will be missed.i missed a chance to see a very funny person,and to find out it was well over a month ago was even more shocking.
  RIP MITCH.
date: '2005-05-07T19:54:32Z'
slug: 2005-03-31-rip-mitch-hedberg
