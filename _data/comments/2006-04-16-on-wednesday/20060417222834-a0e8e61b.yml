name: Sarcastro
body: |-
  If you aren't in a band, start one. It doesn't matter if you ever play anywhere. Chicks love a guy in a band.
  Start bringing your guitar to parties. Doesn't matter what kind. At some point have your shill, preferably the host ask you to get the guitar out and swap songs. Guaranteed chick magnet. I tried it with the television a few times instead of the guitar, to limited success.
  Ask beautiful women if they would like to help you by posing for your portfolio. Keep them mostly clothed and tasteful. But as you are treating them like a supermodel, and thereby fulfilling one of their fantasies, they will soon shed those clothes and hopefully become less tasteful in order to fulfill one of yours.
date: '2006-04-17T22:28:34Z'
