name: Cmpsdp
body: So a journalist must be educated in all forms of racist hate speech? I find
  that contention ludicrous. And let us not lose sight of the fact that this is an
  actual saying..."chunk in the armor.". I would have read the headline 100 times
  and not thought about it. This issue says more about our uber-sensitivity than anything
  else.
date: '2012-02-20T21:14:28Z'
slug: 2012-02-20-racism-its-still-a-thing
