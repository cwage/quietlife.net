name: Asian-American
body: THE COMMENT WAS OFFENSIVE TO ME. And yes, I am Asian-American. I also find it
  very disturbing that Americans are reluctant to acknowledge that I am offended.
  Asian-Americans have a long history of being victims of racial hostility, dating
  back to the Chinese Exclusion Act of 1882. (Look it up, if you're ignorant. This
  law prevented Chinese men from marrying outside their race, or bringing over their
  wives from China -- effectively killing off a whole generation of Chinese men, leaving
  them to die alone.) Before you try to dismiss my feelings, consider what it means
  to be a target of raciam jokes, both in real life and in the media -- including
  being called a chink or gook as early as when I was 8 years old by other classmates.
  I have many other experiences of racism. For too long, the Asian-American voice
  was silenced -- and the racist attitudes permeated our country unnoticed -- and
  right now the Jeremy Lin story is shedding light on all these issues. It's time
  to grow up as a country and acknowledge that different people of different ethnicities
  have different experiences -- including the Asian-American experience, which has
  dealt with racism in a different way than Blacks. Jeremy Lin even said that Asian
  stereotypes held him back, and almost left him out of the NBA.
date: '2012-02-22T00:40:14Z'
