name: Small "d" democrat
body: I emailed Clay Travis this morning, encouraging him to visit both this discussion
  and the one at PITH. He responded saying that he would do neither. Sadly, I understand
  why someone with his world-view would choose not to challenge it. Oh well, I tried.
  Looks like sports-talk radio is a good fit for Clay's intellect.
