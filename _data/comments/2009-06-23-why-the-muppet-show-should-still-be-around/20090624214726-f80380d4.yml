name: R. Francis Smith
body: |-
  Nina Persson on The Muppet Show would be a cuteness vortex from which none could escape. But so awesome.

  I regret the loss of all variety shows. And the best idea anyone had was for ROSIE to bring them back? Please.
date: '2009-06-24T21:47:26Z'
slug: 2009-06-23-why-the-muppet-show-should-still-be-around
