name: Graceless
body: |-
  Colin Hay's "Going Somewhere" is my No. 1 favorite album. It is simply wonderful. Stripped down to just him and a guitar and the incredible emotion he puts behind every phrase. A.Maz.Ing. Each song is a small story, all on its own, and the album is a wonderful collection of short stories.

  Not to mention, his voice is sublime.
date: '2007-05-31T18:17:22Z'
slug: 2007-05-31-release-the-stars-and-others
