body: |-
  the price levels for the show were their own special level of effed up, so i ended up with the "cheap seats" on the very last row under the balcony. and that was buying them 30 minutes after they went on sale.

  hope you faired better than i. "fared"? "faired"? now it is me that is the retard. and i'll leave my essays on other patty griffin records for another day.
