name: alison
body: |-
  ive listened to "going to a town" 38 times since last tuesday. teeehotally obsessed. i also enjoy the "phantom of the opera" sample in "between my legs". it's 100% ballsy and i love every nanosecond of it.

  this record might just be as epic as "want one" which i didn't think was possible. his show at the ryman in august (with neko case!!) just might be the "if you aren't here you are a retarded douche" event of the year.
date: '2007-05-31T16:36:00Z'
slug: 2007-05-31-release-the-stars-and-others
