name: Siva Chander
body: I just got the GSM Motofone F3 (black). It has a small backlight for the keypad
  as well as the e-ink display for night use. It's about $35, and has the build quality
  of a Nikon prosumer SLR - I accidentally dropped it, and it works just fine. The
  display has no glass panel, only a thick Mylar overlay over e-paper. They claim
  water-resistance, but I'm not about to test that. All contacts are gold-plated,
  and it uses a single, dual-function jack for both the charger and hands-free earpiece
  (not included). The charger is rated at 6.4v, 200 mA. The battery is a small removable
  unit behind a press-shut panel at the rear. The phone is not locked, and can use
  a SIM card from any GSM provider.
date: '2007-02-07T05:07:54Z'
