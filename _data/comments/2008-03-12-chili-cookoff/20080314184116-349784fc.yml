name: BenB
body: You hit the nail on the head when you said "permits". From what I understand,
  it's taken a lot of work to secure all the necessary permits to serve food in the
  park as well as obtaining an insurance policy. That said, I really don't see anything
  wrong with having events in the park as long as people get the proper permits and
  pick up after themselves. I think it's very kind to feed the homeless, but if people
  don't want to go through the work of getting the permits, it can still be done in
  the shelters and churches. They'll gladly accept food donations. My wife and I have
  made dinner for 30 homeless men at Room at the Inn...no permits necessary...and
  no empty brown bags and water bottles floating down the street two hours later.
