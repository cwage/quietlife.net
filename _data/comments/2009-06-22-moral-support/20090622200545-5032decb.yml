name: badger
body: When we see a nation's military firing on it's own people it should make us
  appreciate the fact that our elections are pretty peaceful. Well, for now anyhow.
  The main reason that twitter figures into this at all is because it is one way to
  get past Iran's censorship. Foreign media sources have been shut down. Hence the
  hoopla. Social media trumps the main stream media. It's not just twitter either.
  Consider the youtube videos, facebook pages and blogs. Accessible, portable and
  world wide not to mention straight from the people involved instead of filtered.
date: '2009-06-22T20:05:45Z'
