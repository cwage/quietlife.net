  Bladerunner's often considered to be the protoypic cybernoir film ([http://outofthepast.libsyn....](http://outofthepast.libsyn.com/episode_6_blade_runner "http://outofthepast.libsyn.com/episode_6_blade_runner") is worth listening to, those guys are crazy about noir!)

  Brazil, though, is just the most wonderful film for young men.  It is also the most faithful rendering of  1984 in film form.
