name: Emily
body: |-
  I vote for bookshelf #1, though I dig the placing of fine art in bookshelf #3. maybe you can do both.
  Speaking of bookshelves, I am debating sending you a book. You seem to have a habit of posting your address on the internet. Though, I may just give it to you at the Davis-Kidd book revealing.
