name: Chris Wage
body: |-
  I don't really think the protests and vigiles were futile, although I did feel depressed at the turnout of the various events I went to.

  Really, I just thought those two images made for a striking visual juxtaposition -- not necessarily an ideological one.

  Erik sent me to [an article]( http://www.roadtosurfdom.com/surfdomarchives/000888.php " http://www.roadtosurfdom.com/surfdomarchives/000888.php") that describes pretty well what **has** been accomplished by the protests
date: '2003-03-20T20:06:14Z'
slug: 2003-03-20-visual-juxtaposition
