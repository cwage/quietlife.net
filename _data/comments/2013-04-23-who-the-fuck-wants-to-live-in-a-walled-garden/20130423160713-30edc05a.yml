name: Tracey
body: |-
  We have a choice: free (beer) or free (information/interaction). The free (beer) services make their money from ads. Ads need eyeballs. If they let everyone and his brother API or screenscrape their way past the ads, well, you know the rest. Joe and Jane Internet User, even old farts who think nothing of having multiple newspaper & magazine subscriptions, buying stamps, and paying for telephone service, are notoriously unwilling to pay even a small amount for their social networking, news, even email. Until someone's teady to build, run, and maintain some kind of social clearinghouse out of their own pocket with zero return (and a lot of complaints and headaches every time there's even the tiniest glitch), the services that are running will be feeling around for the perfect balance between maximizing profit and alienating too many users (remember, you're NOT the customer, you're the product).

  There are other places to interact, and many people do use them. I don't want all of my worlds to intersect in every way, nor am I necessarily interested in seeing everytning generated by people with whom I interact primarily in specific subject areas. Facebook has its flaws, but it is nice for keeping up with a general circle of family/friends/classmates/whatever, even if some of them keep telling the same tired old jokes or gabbing incessantly about their kids' latest achievements every time we're out on our electronic front porches. I go other places, online and off, when I want to find people with a specific interest or expertise, and I still meet friends at the park or call my mother on the phone when I want to have deeper or more extensive conversations.
date: '2013-04-23T16:07:13Z'
slug: 2013-04-23-who-the-fuck-wants-to-live-in-a-walled-garden
