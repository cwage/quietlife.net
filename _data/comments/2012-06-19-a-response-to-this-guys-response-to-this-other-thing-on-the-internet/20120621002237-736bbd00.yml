name: Pops
body: |-
  'She concludes with "All I require is the ability to listen to what I want, when I want and how I want it. Is that too much to ask?" No, it's not.'
  To me, that is too much to ask. Put any other product or service in that sentence. "All I require is the ability to eat what I want, when I want and how I want it." If you don't have the money, you're not going to eat at Jimmy Kelly's.
date: '2012-06-21T00:22:37Z'
slug: 2012-06-19-a-response-to-this-guys-response-to-this-other-thing-on-the-internet
