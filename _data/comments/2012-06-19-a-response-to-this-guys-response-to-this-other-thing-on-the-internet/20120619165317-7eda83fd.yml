name: Scavenger
body: I see you said 'X'.  This means you are part of a group 'Y' that is widely made
  fun of by my circle of friends.  All members of 'Y' believe 'Z', therefore you believe
  'Z'.  Ha ha you believe Z!  What a moron you are.
date: '2012-06-19T16:53:17Z'
slug: 2012-06-19-a-response-to-this-guys-response-to-this-other-thing-on-the-internet
