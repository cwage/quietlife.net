name: Chris Wage
body: |-
  But what does that really mean for us? Is a short, dominating conflict better than a long drawn-out one? For us, maybe. Desert Storm left Iraq and Kuwait in as rough shape as we left Vietnam.

  If our conflicts are now short and sweet, yet we're, as you said, less reluctant to get involved in a conflict, have we really made any progress?

  In any case, this video is so subtly misleading in this respect. People see this video and think they're seeing the uncensored war -- the real deal. People getting blown up. Carnage. The truth is that they're seeing merely an uncut edition of the media's war.

  In the real war, even our smart bombs are really only "slightly less dumb" with a 40% miss rate. Thousands of civilians died in Iraq from our so-called smart bombs.

  Modern warfare has not evolved to video-game status, despite what most Americans might think. Desert Storm provided the backdrop for a convenient demonstration of America's unstoppable airpower, because Iraq unwisely engaged us on their wide expanses of desert. Don't expect that they'll make the same mistake this time. Intelligence already suggests that most entrenching in Iraq in preparation for conflict is going on exclusively in Iraq's most populated areas. Air support doesn't conquer this sort of thing. Manpower does.

  Afghanistan was proof of this, because the Taliban, although overwhelmed at first, quickly learned and adapted to our strengths in the air, and proved to be quite dangerous to engage with ground forces, which was our only course of action.

  But anyways, I'm ranting now. I thought the mosque was pretty interesting, too. Yes, I find it noble that we try to avoid mosques. And, yes, I think there are times when killing people is necessary. I'm not a bleeding-heart pacifist.

  But in this video, we see human beings being atomized one by one, while special care is taken not to touch a building. This contrast to me is striking on a very base level. I couldn't help but think while watching: "is this all the farther we've evolved? is this where our priorities are? that a building can have more value than human lives?"

  These questions seem trite and obvious in situations of war/combat like these, but they were raised in my mind for the first time, in many ways. It's questions like these that I don't think most people ever have to confront when they watch the nightly news about the latest "terrorist compound" successfully eliminated. Or, maybe I'm just naive.
