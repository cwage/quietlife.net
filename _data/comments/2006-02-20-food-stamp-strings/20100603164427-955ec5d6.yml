name: jj
body: As has been stated earlier, the author of this article is very ignorant. Fresh,
  whole foods are soooo much less expensive than processed food. Have been living
  on $100-$150 a month for 2 in Los Angeles which includes food (fresh, unprocessed),
  paper and personal care items. We both work 50-60 hrs a week and can afford to spend
  much more but choose not to. Eating well is a decision it is not based on money.
  Cooking from scratch is NOT that time consuming and requires little experience (
  do it a while and you will become experienced). Our weekly menu includes HEALTHFUL
  portions of steak, fresh seafood, slow cooked chicken and pork. This is accompanied
  with large portions of fresh veggies - very little rice or pasta is ever used. Food
  stamps provide a larger budget for food than I currently use- there is NO EXCUSE
  to not eat well- It is the individual's responsibility to do what is right and stop
  looking for every excuse under the stars why you can't do something- ENOUGH is ENOUGH!
date: '2010-06-03T16:44:27Z'
