name: Lisa
body: Well, we receive food stamps (my husband, myself, and two small children). I
  can tell you firsthand that I am not "ignorant" nor am I "lazy." My husband was
  laid off from a factory job that he worked at for years. We both decided to return
  to school to get degrees so that we can get better jobs and not need the assistance
  someday. In the meantime, it comes in handy. I grew up with a mother that was a
  wonderful cook. She made everything from scratch. Do I know how to cook like this?
  YES! Do I always have time to do it? NO! Contrary to popular belief, these days,
  ALL food stamps recipients are required to either be working, enrolled in a work
  training program, or have a documented disability that prevents them from doing
  so. If I was to say that my husband and I never purchases soda pop or frozen pizzas
  or even chips, I'd be lying. Of course we do. But we also purchase more wholesome
  foods that I use to create great meals. However, I am a full-time student with two
  children under age five, so I do not always have time to make every single thing
  we eat from scratch. My point is that, with some people, it's not that they can't
  cook or don't know how; it's a matter of not having time. They use these types of
  foods as a convenience. That's what we do, but as I said, junk food does not constitute
  our entire diet, or even most of it. It's just a quick and easy "go to" for very
  busy days.
date: '2009-05-03T18:26:01Z'
slug: 2006-02-20-food-stamp-strings
