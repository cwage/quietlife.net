name: Laura
body: I work in a grocery store. Every day I see people using their food stamp cards
  to buy cookies, doughnuts, chips, soda, etc. The majority of these food stamp users
  are very overweight and tell me that they cannot work due to illnesses like diabetes,
  or back and knee injuries, so they collect these benefits. As the food that they
  don't even have to pay for makes them fatter, they get more health problems that
  cause them to miss work for longer periods of time (or just collect disability),
  which in turn sends them to doctors that, again, they usually don't have to pay
  for. I would also like to add that a lot of these people drive newer cars and wear
  name brand clothing. One woman told me about her $120 a month cable bill. Some have
  many tattoos and piercings, which are not cheap. How can they afford these things
  if they can't even afford food? I see young couples on food stamps out at bars all
  the time. They get to spend their money on alcohol and let the government worry
  about how they will eat their next meal? I think this program needs to be investigated
  thoroughly, and people need to realize that buying food is a necessity, not something
  you cannot afford after all of your money has been spent on entertainment.
date: '2007-06-04T01:44:53Z'
