name: Laura Creekmore
body: |-
  Mike, I often agree with you, but here, I can't even start to go down your road.
  I, too, live in East Nashville and in fact was part of the effort to get rid of the two beer markets I think Linus is talking about. The legal items sold at those markets were NOT the problem. The problem was the market owners allowing loitering, litter, prostitution and drug deals on their property. We had litter issues with a local grocery store once, too -- it's a matter of the community making business owners be responsible members of the community. In the case of the two East Nashville beer markets in question, both lost their beer licenses because of crimes being committed on site. Not because homeless guys find it more convenient to buy single-serve beers. They can do that at lots of other places around town as well -- including many gas stations in East Nashville -- and those places don't have the kind of issues this ordinance purports to prevent.

  Ban opponents shouldn't *need* any evidence that the ban won't work -- the ban ought to be questionable even if there's lots of evidence it will prevent crime. If you want to live in a free society [maybe we have different definitions of "free society"?], banning anything ought to be a last resort.

  If you have troublesome markets in Salemtown -- or downtown -- or wherever -- let's address that issue. Not point the finger at a can of beer.
