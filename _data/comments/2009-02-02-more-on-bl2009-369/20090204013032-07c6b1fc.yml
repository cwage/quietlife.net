name: RachelW
body: Is there any evidence to support the claim that the availability of single beers
  causes people to hang around and sell drugs and work as prostitutes, or does it
  just happen that people who are hanging around selling drugs and picking up johns
  also like to have a beer while doing so? And if it's the second, how will a single
  beer ban solve that problem? What about the availability of single beers encourages
  people to just hang around and get up to no good, according to the logic of the
  measure?
date: '2009-02-04T01:30:32Z'
