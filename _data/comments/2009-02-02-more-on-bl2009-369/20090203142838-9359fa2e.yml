name: mwg
body: |-
  In Atlanta one of the most prevalent problems is men showing up drunk first thing in the morning to perform construction. While this is okay some of the time (who needs to be sober when you're installing drywall?), it's a bad idea if they're working on a roof or moving furniture, and unfortunately common.

  I wish there were more AA-style coffeehouses in the metro area (ie free coffee and sports TV), because a lot of guys we know hate to drink but can't help it if they get near a bar.
