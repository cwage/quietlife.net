name: Steven Warren
body: |-
  Did anyone get the hint in the 20's, prohibition doesn't work. I read a post on Twitter about selling only warm beer to prevent people drinking it immediately. To me both of these ordinances have similar arguments that are akin to "If we take away a kids toys then they won't fight over them".

  But, what some obtuse people don't consider is that selling hot beer/dry counties encourage drinking and driving because people will go to the next county to get cold beer and drink it in the car on the ride back. Such will the single beverage ban force people to either buy more beer or drive elsewhere to get a single. Either proposition seems more dangerous.

  And to S-town Mike, if there is a problem store in Salemtown, why not try and legislate alcohol sales near a Union Mission (much like churches) or take action against that single store. That will have a much more profound affect on your community than a single beer ban that will have little if any positive affect.

  Why does the metro government waste taxpayer dollars on inane and insidious legislation such as the single beer ban and the English only bill?
