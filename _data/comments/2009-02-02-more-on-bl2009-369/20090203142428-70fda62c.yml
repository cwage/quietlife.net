name: Laura Creekmore
body: |-
  This is the most awesome post. I couldn't stop laughing out loud at your analysis of the bill's intent -- sarcasm, maybe, but dead-on.

  This bill is an ineffective band-aid that does nothing to address issues of mental illness, alcoholism, homelessness or even public drunkenness and loitering. NOTHING.

  When the council gets back to me on addressing root causes, I'll be ready to listen. This addresses symptoms, not the disease.

  Somewhat related: I'm far more concerned about what likely cuts in mental health services are going to do for our homeless and on-the-edge populations. Unlike banning single-beer sales, mental health funding does address many root causes -- and we're likely to lose a lot of it in the General Assembly this spring.
date: '2009-02-03T14:24:28Z'
