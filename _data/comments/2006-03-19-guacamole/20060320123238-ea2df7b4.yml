name: Bob K
body: 'My wife and I have long shared a private joke about "guacamole." The poolside
  cafe at the hotel where we stayed on our honeymoon in Mexico had a menu that was
  printed in Spanish on one side, English on the other. However, one of the items
  on the menu made no sense in English: "chips with avocado mousse." I thought to
  myself, surely they didn''t translate "guacamole" into its English literal equivalent.
  I flipped the menu over to see, that in fact, they had. Apparently they didn''t
  know that in English, it''s also "guacamole."'
date: '2006-03-20T12:32:38Z'
slug: 2006-03-19-guacamole
