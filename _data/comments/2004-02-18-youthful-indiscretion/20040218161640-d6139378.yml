name: charlie mac
body: |-
  I would further add that if you find yourself in out in those "bumfuck counties" you will most likely find cops ready to pounce on anything they can possibly get you on. Tickets and/or drug busts are a mainstay in their revenue stream. So keep your guard up, especially if you do any night-time driving.

  If you see less than 3 police cars, either a blue moon is out or there is some other more exciting action going on elsewhere in the town.

  btw did a search on ACLU site and they provide a pdf of the card SayUncle mentioned...I wish their html text version worked...

  [ACLU bustcard](http://www.aclu.org/PolicePractices/PolicePractices.cfm?ID=9608&c=25&Type=s "http://www.aclu.org/PolicePractices/PolicePractices.cfm?ID=9608&c=25&Type=s")
