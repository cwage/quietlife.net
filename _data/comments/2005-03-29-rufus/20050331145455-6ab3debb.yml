name: Muffy Wong
body: |-
  "What do they have that we don't??"

  An audience that appreciates music. Nashvilleans seem to think of themselves as music snobs and therefore turn into critics, not fans. It's hard. I would LOVE for Rufus to play here too. There are no words to describe how pained I felt when the Ben Folds/Guster/Rufus tour bypassed us completely.
date: '2005-03-31T14:54:55Z'
slug: 2005-03-29-rufus
