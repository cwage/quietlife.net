name: Crunch
body: |-
  no, you cannot trick me into watching that.

  I did enjoy talking to my brother-in-law, a small Texas town doctor, as he argued for intelligen design. I pointed out that things evolve into drug-resistant strains, and that his God must be one vindictive bastard to keep designing them to circumvent drugs that could help people.
