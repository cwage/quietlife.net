name: cwage
body: CIS may or may not deserve to be called a "hate group", but I also think it's
  a little disingenuous of you to make it sound like CIS is an organization quibbling
  over details of a "specific legal process". Amnesty is a specific legal process,
  and CIS has an agenda that doesn't include amnesty.
date: '2009-11-23T22:50:24Z'
slug: 2009-11-23-poor-poor-xenophobes
