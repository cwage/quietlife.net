name: Finrod
body: It's people like you that piss people like me right the fuck off. I'm anti-illegal-immigration
  but pro-legal-immigration, and it's lame-brain assholes like you that can't comprehend
  the difference between the two that cause the whole immigration argument to be all
  heat and no light. And I'm not the only one-- my position is pretty commonly held
  in my part of the political world. Take your fucking demagogery and shove it up
  your ass, because you are part of the problem; it's your bullshit that is getting
  in the way of coming up with a reasonable guest worker program that would let us
  actually control our borders while still being able to get people in to work jobs
  that are beneficial to them while still keeping produce in our grocery stores. Fuck
  you and the horse you rode in on.
date: '2009-11-24T00:39:37Z'
slug: 2009-11-23-poor-poor-xenophobes
