name: Amanda
body: |-
  Intensmo? I hate Intensmo. If I wanted to listen to polished faux rock vocals I'd uhh...listen to a commerical for the new edgier Cool Whip in the all black container? I don't know, dude is weirdly intense and also manages to be completely souless.

  Taylor Hicks sings like he is filled with the Holy Spirit or somethin'. Amen.
