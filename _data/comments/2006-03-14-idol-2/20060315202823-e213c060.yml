name: Tim W.
body: |-
  Thank you, Amanda. I don't care for Chris D. either. In my opinion, he is a (pardon the cliche) "one-trick pony" who simply shouts at various volume levels.

  Having said that, neither you nor Chris W. will agree with my saying that I've never been a part of the "Soul Patrol." In fact, I cheered when Simon twirled his finger and said "Whoopie!" sarcastically during Taylor's little harmonica outro in California. My wife loves him; I admit he's got soul and all that; I just do not feel him and have no patience for his "deal."

  My guy is Elliott Yamin, hands-down. He has the virtuosity, and he has the "neighborhood guy" personality that I find tremendously endearing. Even the crunk teeth. :) True, as you said, Chris, last night he wasn't on his game. True, too, I can't see America allowing him to the vaunted Final Three. But I'll enjoy the heck out of him while he lasts.

  For the ladies, I loathe Pickle with the heat of a thousand suns. I'm with you regarding Paris Bennett. She's a prodigy, no doubt. On the other hand, what the heck was up with that churchy singing during her interview?

  My favorite lady, believe it or not, is Melissa McGhee. Although I never, ever thought I would agree with Paula Abdul, I agree with PA that Melissa has a soothing voice. McGhee also looks a bit like my wife. :) Ah, subjectivity.

  Thanks,
  Tim
