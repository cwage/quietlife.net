name: cwage
body: |-
  > *Well those first two parts, at least, were the POINT of the tax cut. Good Republicans will tell you that they want government revenues to be a very small fraction of GNP, a fraction that gets smaller every year. And Bush wanted to play to his base.*

  Agreed, but there's an incongruity between these intentions to drastically cut tax revenue and the reasons cited for cutting various social programs. When the deficits balloon and budget-cutting time rolls around, suddenly it's because "spending is out of control". It's dishonest.
