name: Matthew Freeman
body: |-
  You're absolutely right about this. I dove head first into the entire system, with a relentless intensity. I worked out 3 hours a day, cooked in bulk and pre-packaged 8 meals every night, for the next day—ensuring I had clean, fast burning meals, to consume every 1.5 hours.

  Yes, I gained 40lbs of muscle and lost 40lbs of fat. But then life got in the way and it didn’t take long for the momentum to derail. I ended up in worse shape than when I started.

  It \*is\* science, and it \*is\* math; but in all of their explanations of the formulas, they never solve for n. They simply repeat their formula for the segment of whatever part of the equation they herald. It works, provided you keep the wheel spinning fast enough.

  The n they never solve for is what keeps them running in circles, trying to stay one step ahead of its’ inevitable victory. The n is that the brain determines how much fat you will store. You can fight against that programming for as long as you want, but the brain never tires, never loses will-power, and will beat you every time, eventually restoring what you fought so hard to starve off of your body.

  The key to the weight loss lock is that the brain’s programming is not a rational, conscious decision. It is simply an unconscious response to signals it receives from the body. Learn how to communicate with the brain, using its’ own language, and you can reprogram it to be whatever weight you want, without fighting your body to starve off the fat.

  -Freeman
