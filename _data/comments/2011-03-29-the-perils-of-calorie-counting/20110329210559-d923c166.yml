name: Rockocs
body: yeah, calories in can't equal calories out or else we could all follow the same
  exact diet and exercise routine and we'd all weigh the same. we all know someone
  who can eat junk food 24/7 and sit on the couch and not gain an ounce or vice versa.
  our bodies all handle food so differently it couldn't possibley be a simple in =
  out.
date: '2011-03-29T21:05:59Z'
slug: 2011-03-29-the-perils-of-calorie-counting
