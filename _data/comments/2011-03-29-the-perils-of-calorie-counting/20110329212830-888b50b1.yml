body: |-
  Thanks for doing the opposite of what most people do in an argument. When they strive to simplify things, they strip the facts out of their case. When you "complicate" it, you introduce ammo for those of us who have been devolved to banging our heads against concrete walls.

  Well done. Nobel-worthy.
