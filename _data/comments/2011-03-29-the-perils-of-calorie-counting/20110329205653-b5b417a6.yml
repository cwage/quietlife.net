name: Jeffrey Davis
body: Agreed. excellent post dude. as a personal trainer i HATE when people (usually
  other personal trainers) start throwing the "simple math" line around. I almost
  always respond with, "it may be simple math, but the math isn't simple." Sure, all
  it takes to "lose fat" is to burn more calories than your body uses (uses, being
  the key word)...but what affects how many calories your body burns, as you said,
  is VASTLY complicated.
date: '2011-03-29T20:56:53Z'
slug: 2011-03-29-the-perils-of-calorie-counting
