name: R. Francis Smith
body: |-
  Can't think of any reason in the world you wouldn't want to know about my Oklahoma voting!

  Governor: Brad Henry (D). I think the lottery, which he championed, is stupid beyond belief. But his only opponents are E Z Million (seriously, that's his name), who is a single-issue candidate and that issue is ridiculous (moving the OU-Texas college football game out of Dallas -- really), and Istook, one of the 1994 "Republican revolution" representatives. Notice we have two of those as our senators now, and that they are periodically on shows like the Daily Show being mocked as to what fools they are. Enough is enough.

  US Senate: Sadly, neither of said fools are up for election.

  US House District 3: I'm still waffling at this late, late hour. The incumbent, while Republican, has been pretty moderate for the most part, but I have to admit I feel the pull of voting against incumbents in general. His Democrat opponent does not inspire a great deal of confidence in me, but on the other hand, she's spent a lot of her career helping kids in the state system, and I can appreciate that. I just don't know that it makes her a great rep choice.

  State Senate: not up for reelection
  State Rep: running unopposed

  I know! Boring! Bring on 2008.

  SQ 724 (restricting pay for legislators who are in fact in jail): Yes. I mean, wtf?

  SQ 725 (yet another attempt to allow dipping into the Rainy Day Fund for some purpose that clearly dosen't quality): No. No. A thousand times no. Leave it alone, you sticky-fingered screwups.

  SQ 733 (Allows selling alcohol on election days): Any more elections like 2000 and 2004 and we'll all need this. Yeah, why not?

  SQ 734 (Excepts from property tax stuff that's just passing through in the process of shipping): Yes. I have enough "trade is good" in me to recognize the value of this.

  Those are all the ones that made it past the state supreme court, which struck down several others. What fun!
