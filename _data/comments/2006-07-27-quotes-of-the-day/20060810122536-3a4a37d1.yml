name: rwd
body: Bush's open mike comment was stupid from the thought we could "tell" Syria and
  the fighters could be turned off - simple as that. Maybe he could understand the
  simple statement in the 1917 Balfour Declaration that would not have displaced the
  residents of Palestine. How many are still in refugee camps? If Hitler had just
  put Jews in camps for 60 years and not killed millions, would that have been acceptable
  to them - better but not something they'd say was equitable.
date: '2006-08-10T12:25:36Z'
slug: 2006-07-27-quotes-of-the-day
