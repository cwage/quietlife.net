name: Erik
body: They haven't started charging for it, but I haven't read the Times lately anyway.
  Also, I think the editorials will still be free, although the op-ed pieces won't.
  (In the press release, Tom Friedman, John Tierney, et al., are grouped together
  as "Special Voices", which I find hilarious.)
