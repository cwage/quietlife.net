name: Ryan Kaldari
body: Aftermarket VW parts have the same problem, they're always made out of shitty
  metal. The only way you can get a quality generator mount for a VW is to buy a used
  stock mount or import a new stock mount from Mexico. The aftermarket ones will inevitably
  warp or crack (resulting in an oil leak).
