name: Erik
body: |-
  Here's another piece on [the necessity of New Orleans](http://www.stratfor.com/news/archive/050903-geopolitics_katrina.php "http://www.stratfor.com/news/archive/050903-geopolitics_katrina.php"), with more about why it's important and less about how stupid other people are.

  One quibble--Shafer didn't say that the Great Displacement is a positive side-effect, he said there is a positive side effect of it.
