name: Aaron
body: Gotta say, I disagree Chris. I dont think, based on reading the transcript,
  that NG did a 'pretty good job of making Lamar look like a tool'. He may \*be\*
  a tool, and his bill may be in poor taste or at least poor timing, but the arrogant
  tone to NG's commentary hurt his argument. I think a viewer would have trouble distinguishing
  his argument from his attitude, and unable to take one without the other, would
  be hard pressed to support him. It may not be the Irag war, but it is a domestic
  issue, and those get time on the Senate floor too.
date: '2006-05-11T15:39:07Z'
slug: 2006-05-06-he-gets-email
