name: Eddie Bryan
body: You are right in saying Carlin doesn't deserve a category of bigotry for his
  defense of words. Recall his Hippy Dippy Weatherman? Very funny but wasn't it an
  affront to those people who identified with hippies? Certainly, considered a hippie,
  himself, I think. Heard his bit on the words, not on the n word but on the f word
  and I understand he was talking about his old neighborhood and being kids. I was
  a kid once, too, and I know the physical world that George must have lived in. He
  was taught in schools where there was no sex education so there was little knowledge
  for him what being Gay was or the other thing. On the n word, there is little in
  our schools also about the injustice that they, African Americans, have survived.
  I love George. I am sorry he has left us.
date: '2016-02-28T20:03:30Z'
slug: 2011-05-27-george-carlin-and-the-gay-pejorative
