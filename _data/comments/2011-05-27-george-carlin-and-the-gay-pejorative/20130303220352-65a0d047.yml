name: Colin
body: |-
  I'm not sure the pejorative 'gay' ever meant 'bad.'  I think its meaning, insofar as I understand it, was more nuanced than simply 'bad.'

  I understand that your point is to suggest using 'gay' as a pejorative has a corrosive effect on people who self-identify as gay in a non-pejorative sense.  I wonder what is being gained, and what lost, by replacing any meaning the word might have been intended to express with a simple stamp 'expletive.'
  I always thought there was a connotation of 'camp' in the colloquial pejorative 'gay.'  I find myself wondering why kids (and it was kids) found it useful.  I mean, if they just wanted 'bad' there were lots of existing ways to say it - I suspect it meant bad in a new way.

  Musing on this further, the term 'drama queen' gets a bit of use, and it's a very useful term.  It's also (I guess) homophobic in that it relies upon a homosexual stereotype.  If we're not going to use it any more, can we find something equally expressive and useful to replace it?
