name: Mia
body: It doesn't make any sense. The author pretty much just lists everything people
  enjoy in Western culture. Most of the stuff is awesome, but they make it sound lame
  for no reason. Like drinking tea, tea is yummy, you don't have to be so cynical
  about everything. And for example, they list Arrested Development, but say people
  only like it because it was cancelled early on and is full of cultural references.
  Uhm, no.. most people love the show because it's hilarious, unlike your shitty website.
date: '2011-10-03T17:02:01Z'
slug: 2010-10-21-stuff-white-people-like-still-stupid
