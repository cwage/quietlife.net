body: |-
  worth reading - Orwell's \_Down and Out in London and Paris\_. Apparently at the time it was illegal to lie on the ground in the UK. Here's the page [http://www.george-orwell.or...](http://www.george-orwell.org/Down_and_Out_in_Paris_and_London/36.html "http://www.george-orwell.org/Down_and_Out_in_Paris_and_London/36.html") and here's the quote that springs to mind, about degredation:

  *At the Twopenny Hangover, the lodgers sit in a row on a bench; there is a rope in front of them, and they lean on this as though leaning over a fence. A man, humorously called the valet, cuts the rope at five in the morning.*
