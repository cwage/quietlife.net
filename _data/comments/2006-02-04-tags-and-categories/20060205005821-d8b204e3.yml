name: Smarasderagd
body: When I first started tagging my livejournal entries, I tried to tag everything
  relevant, but the sheer pointlessness of this became obvious pretty quickly. I gave
  that up and tagged entries according to my intent in posting them, like music reviews,
  or stories of my cooking and programming experiences, or things I wrote to be funny.
date: '2006-02-05T00:58:21Z'
slug: 2006-02-04-tags-and-categories
