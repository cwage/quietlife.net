name: Tom Wood
body: I admit that I have not had a chance to implement it yet myself, but we have
  just added an RSS feed at [***NashvillePost.com***](http://www.nashvillepost.com/
  "http://www.nashvillepost.com/"). Our subscription news service publishes only a
  few stories per day, but it's all actual reporting on business and political stories
  of local interest, and we frequently beat the competition by hours.
