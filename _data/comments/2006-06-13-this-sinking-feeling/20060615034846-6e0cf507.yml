name: Deborah
body: |-
  This is the Will I remember: ".....awkard, gentle, genuine, adorable Will". It has touched you because it nails the Will you loved. When we lose someone the pain comes from regret for the times we lost sight of \*that\* person. For whatever reason.
  It is part of life. I love you. Keep writing. Your mom.
date: '2006-06-15T03:48:46Z'
slug: 2006-06-13-this-sinking-feeling
