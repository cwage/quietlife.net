name: barbara yontz
body: i keyed in my name to see if my web site was up on google yet and found this
  article. maybe it means nothing, but Wills ratty Pixies T-shirt was the only thing
  i asked for from Will's abundance of remaining art and stuff. i remember the critique
  mentioned here and i am thankful to have that T-shirt. i miss him, i miss the idea
  of him, i miss those days at Watkins when we were all so innocent. thanks for another
  chance to cry.
date: '2006-10-18T17:11:33Z'
slug: 2006-06-13-this-sinking-feeling
