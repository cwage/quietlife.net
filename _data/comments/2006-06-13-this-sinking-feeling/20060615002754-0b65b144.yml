name: Linda C
body: Well, Chris, I've been pregnant several times and yes, it does feel alot like
  that. The waves for me are anger, sadness, sleepiness - alot, exhaustion and mixed
  all in that...go to work, take the little kids to the dentist, figure out what's
  for dinner, call Parker, go to Connor's baseball game...just life. There are many
  times during the day when I think of things I'm going through - feelings, etc -
  that Will would definitely see some humor in! Thanks for sharing your thoughts.
date: '2006-06-15T00:27:54Z'
slug: 2006-06-13-this-sinking-feeling
