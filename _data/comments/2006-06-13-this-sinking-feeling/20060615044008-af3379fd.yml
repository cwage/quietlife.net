name: Ashley
body: You and I have a lot more in common than I ever knew. When I am hurting or angry
  I can write how I feel a lot better than I can verbalize it. It feels good to think
  about what you want to say and write it out, before it comes out of your mouth into
  a mess of words. Will expressed himself and and his feelings in his paintings, and
  because of your caring and wonderful words about him, I can almost feel what his
  paintings meant, to him and to you. Keep on writing, it is nice. Ashley
date: '2006-06-15T04:40:08Z'
slug: 2006-06-13-this-sinking-feeling
