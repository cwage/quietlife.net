name: Southern Beale
body: Yes but the way it was fixed back in the cassette tape days was that a levy
  was placed on sales of blank cassettes to compensate for the lost revenue, which
  IIRC never ended up happening, at least not significantly. Why not just put a levy
  on the sale of MP3 players and have the music licensing folks distribute it back
  to their rosters. I dunno, this shit makes my head hurt. Technology has changed
  and this is how people consume music nowadays. I'm not 21 but I sure can't remember
  the last time I bought a CD. The other thing is, once upon a time it really did
  cost a lot of money to record and press a vinyl album and market it, bring it to
  the attention of consumers and get people to buy it. But now that's all changed,
  people are recording in their home studios and throwing stuff up on YouTube and
  the internet, so maybe the expectation of the same level of profit for a piece of
  music is unrealistic.
