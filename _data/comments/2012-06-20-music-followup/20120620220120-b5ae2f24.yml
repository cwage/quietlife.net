name: Rex Hammock
body: Chris. I read the post the other day and felt the same way you do -- but knew
  she was going to be pummeled by those who didn't read it closely or comprehend its
  nuance. I'm quite mature and I've spent more money on music (today, via Amazon's
  MP3 store but previously via iTunes) in the past decade than the previous three
  combined. However, I've got many times that amount of music \*free\* -- and not
  illegally. I attend more concerts and know more about current music today, in my
  50s, than I did in my 30s. Because of all the ways of listening to music that she
  describes. I could go on, but the people who actually read what she wrote and understand
  what it means, can figure out why its good for musicians and people who love music.
  Obscurity is worse than piracy for musicians -- (even though I don't think what
  she explained was piracy.) - Rex
date: '2012-06-20T22:01:20Z'
