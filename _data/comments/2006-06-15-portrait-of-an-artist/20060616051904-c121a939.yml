name: Aaron
body: pretty sure?! aaron's damn sure! (and he's not upset at all. just being an idiot.)
  but yeah, that's the second instance of "1980-2006" being posted. which makes sense
  counting backwards, since he was 26. but june 19th is his bday, and he was about
  to be 27. Neverminding that; thanks to Dave Maddox, and to Parker, Amanda, Derek,
  Terry, and Barbara for their words in the article.
