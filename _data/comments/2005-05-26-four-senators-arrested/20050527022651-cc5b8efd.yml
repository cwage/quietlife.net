name: Reggie
body: Though I'm not from Tennessee, I'm sure this was a shocker to many. Too bad
  these jerks in Illinois don't go after our law makers enough. It seems that everyone
  is in everyones pockets. If I stick my little stinky paws in someones pockets there
  would be a fight or I would end up in jail, then in a fight.
date: '2005-05-27T02:26:51Z'
slug: 2005-05-26-four-senators-arrested
