name: Erik
body: |-
  This is awesome. I wish I lived in Tennessee. Too bad it's mostly Democrats, but what can you do.

  I love the part where Frank Buck "said he was surprised to see fellow lawmakers being led out in handcuffs". Because, you know, if not for the diligent work of your NewsChannel 5 journalists, you might have thought this was a pretty much everyday occurrence.
date: '2005-05-26T18:28:07Z'
slug: 2005-05-26-four-senators-arrested
