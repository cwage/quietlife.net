name: SayUncle
body: |-
  Maybe it's the accountant in me, but whenever i see someone intimate that tax relief *costs* something, I cringe.

  It's like saying it cost a company that had less revenue than budgeted, which is not the case.

  It's a reduction in incoming money not cost. I don't know if it's intentional or not, but the term *cost* conjures up a certain image that is not the case.
