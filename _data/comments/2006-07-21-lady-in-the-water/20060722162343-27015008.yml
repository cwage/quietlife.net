body: |-
  Well, because his review tends to indicate that it's not really a stupid horror movie (which is why I thought I would hate it), but instead is more of a "modern fairy tale".

  This means I can fall back to the secondary reason I'd probably hate it, which is that I've never really seen a Shyamalan movie that I liked.. Unbreakable was sorta okay..
