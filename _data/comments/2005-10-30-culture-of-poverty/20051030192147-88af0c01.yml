name: t. rev
body: Cathy Young has a very predictable "this side is stupid, but this side is also
  stupid" sort of pox-on-both-your-houses formula, which generally makes her sound
  like she's supporting whichever side of the argument the reader opposes. She isn't
  very good at coming up with any new angles, though.
