body: Her stance reminds me of the stuff I read on [factcheck.org](http://factcheck.org
  "factcheck.org"), which as [I've mentioned before](http://chris.quietlife.net/2005/05/08/factcheck/
  "http://chris.quietlife.net/2005/05/08/factcheck/"), seems to strike such a middle-ground
  position between two sides of a debate in the name of "balance" that they are either
  wrong or have nothing worthwhile to say.
