name: Xibo
body: On the other hand, an influx of immigrants provides **consumers!** Even if they
  are lower class, they still need basic services, still have to shop for basic goods,
  and buy basic entertainment... all of which increases the demand for these things
  and improves the overall economy. I know GM, for example, would be thrilled to see
  the US population soar to 500 million...
