name: Sean Bart
body: |-
  Good posts!
  In my opinion, personal growth is the inly way to have any changes prove positive results...otherwise you're just changing the dressing without examining what's going on inside.
  Some of the shift must be imposed from the outside/environment, but for true choice to be altered to the point of the highest level of economic, physical, and ecological balance, we must each become aware of the basic truths of our world and the consequences of our actions. Not worrying about the decisions of others is one step, for it allows us the freedom and energy to make the best decisions for ourselves and to create the space for others to educate themselves without the pressure of feeling judged.
