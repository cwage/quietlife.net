name: bob
body: Man, some of those photographers make some ridiculous douchey remarks in their
  little blobs of text at the bottom on the page of photos. Also, I kind of like the
  snow ones, for some reason. They're not technically very good (the snow is flat
  white, ho hum) and there's only about 2 different images, but I find them appealing
  somehow.
