name: adjustable laptop stands
body: In addition to the eye-level screen positioning, you are also benefited with
  the non-skid rubber feet of the laptop stand. So even if you happen to change the
  base from a wooden table to a plastic table, placing your mobile laptop stand will
  not hinder your work. And in case if you are worried about carrying your laptop
  stand from one place to another, all you have to do is fold it! It is as simple
  as that.
date: '2012-05-05T06:04:54Z'
