name: R. Francis Smith
body: I may misunderstand how it works, having only been there a few times, but my
  observation was that I really wanted it to have a waiting queue for becoming a DJ,
  not have a mad race whenever someone stands up.  It makes enough difference to me
  to, well, not really be all that interested in it, except that one time when a handful
  of us started a room to DJ for each other, which was great and I'd be happy to do
  it again.
date: '2011-08-15T06:33:52Z'
slug: 2011-08-11-turntablefm-some-thoughts
