name: Casey Woods
body: I've decided to remove the "nofollow" tags for comments and trackbacks on my
  blog. Its my way of thanking my community for being involved in my site. That means
  I need to make extra sure that I don't let the blog spam through! Akismet does a
  great job, but this additional layer of defense is great! Thanks for your work.
