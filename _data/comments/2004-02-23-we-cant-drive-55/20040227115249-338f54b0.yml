name: Becky
body: |-
  In Cambridge, they had lots of problems with people racing down our city streets. People get used to their surroundings, and ALL our streets are crowded with people, cars parked on (often) both sides, sidewalks, etc. But it wasn't enough. So a few years back they started adding two things.

  They added these big-ass "pedestrian walkway" speed bumps. They will really tear your car up if you race over them.

  The other thing is that, along streets with parking on only one side, at various points they relocated the parking from one side to the other for a block or two, creating an artificial S-shape to the road that forces you to slow down. The turns are actually pretty tight since the relocation is only a block or two long.

  These both have worked pretty well. Not to mention the power of stoplights.
