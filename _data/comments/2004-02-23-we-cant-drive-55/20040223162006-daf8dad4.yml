name: Erik
body: |-
  Good old Nashville.

  In general I agree with everything you said, but, without having read the study, I don't think it quite supports the position that posted speed limits don't matter. It only says that *changing* the speed limit has little *immediate* effect.

  I could make an argument that goes like this: Most of the people who drive on any given street do so routinely--that is, most of the people you see there on any given day are just driving their usual route to work, or to the grocery store, etc. Because it's routine, these people don't look at the speed limit signs. They know how fast to go on this road.

  If you just change the signs (and one of the things I don't know about the study is, were the changes publicized beyond that?), the people who don't look at the signs will continue not to look at the signs, and won't notice the change. So they'll keep driving at the same speed, and because they do, even drivers who do see the posted limit will be compelled to keep pace with the traffic around them.

  In time, according to this argument, the number of people who have seen the signs will outnumber those setting their speed by habit, and the general traffic speed will drop (or rise).

  Of course, we all know streets that have a posted limit of 25 and everyone goes 45. (Mine's a major thoroughfare in Palo Alto.) And I think you're right, it's mostly the "feel" of the street. I just think the thing about the effect of changing the speed limit is a red herring.
