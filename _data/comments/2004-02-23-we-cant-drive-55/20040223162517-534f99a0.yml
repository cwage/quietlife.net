name: cwage
body: |-
  > *If you just change the signs (and one of the things I don't know about the study is, were the changes publicized beyond that?), the people who don't look at the signs will continue not to look at the signs, and won't notice the change. So they'll keep driving at the same speed, and because they do, even drivers who do see the posted limit will be compelled to keep pace with the traffic around them.*

  That's a good point -- the time period they did the study over was pretty short (24 hours, I think), which I totally glazed over. It seems like any meaningful study of the real change should do it over a **much** longer period.

  I'd be curious to see what the effect was over a more realistic time period..
