name: cb
body: this is an entirely unrelated posting, but i just have to appreciate the entry
  of 'bat-shit crazy" into the local diction, (from the pitw thread). i laughed for
  about ten minutes at the sound and image it brings to mind. much like my other favorite,
  "herding cats." this is the first i've heard it, so i aplogize if it's been out
  there awhile.
