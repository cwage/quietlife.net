name: jag
body: |-
  A lot of these places opened within the last 2-4 years. I know Alley Cat opened in 2003, as did 5 Spot and I think Beyond the Edge. 3 Crow bar is maybe a year and a half old now, and Rosepepper, Margot, etc were all there when I moved in 2 years ago, but they hadn't been there too long. So it's all fairly recent.

  I have most of the local hangouts linked if you want to get the virtual tour.
