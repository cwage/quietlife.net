name: Lulu Lemon
body: Property taxes will never be cut even by so called Tea Party or Libertarian-leaning
  elected officials. This is because they are all taking money from the richest folks
  in town who are invariably real estate developers or investors somehow or other.
  The incentives are all and only to always have property values go up, and the taxes
  too, so the city councils and mayors can fund pet projects to get their names memorialized.
  It's corruption pure and simple.
date: '2015-03-10T23:44:43Z'
slug: 2015-03-06-gentrification-and-the-economics-of-plunder
