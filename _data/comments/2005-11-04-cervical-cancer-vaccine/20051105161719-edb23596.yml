name: Rachel
body: This makes me a bit angry as well. I [blogged](http://womenshealthnews.blogspot.com/2005/10/vaccine-for-cervical-cancer.html
  "http://womenshealthnews.blogspot.com/2005/10/vaccine-for-cervical-cancer.html")
  on this - most ridiculous statement I found was Kristin Hayes of the Abstinence
  Clearinghouse saying, "We don't know what this will do to children psychologically."
  Better more than 10,000 women suffer from cancer each year than protect young women
  in case they have sex. Grrrr.
