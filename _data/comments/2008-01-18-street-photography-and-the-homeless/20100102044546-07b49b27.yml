name: Michael Miller
body: |-
  Thank you for your insight. I have struggled with this issue. The homeless do make interesting subject matter, but they are people who have the same rights to their image as any model. Part of me would like to expose the problem of homelessness, but its not fair to "bushwhack" these people.

  I decided that the only fair thing to do would be to introduce myself, and ask permission. Then I have to be sincere in the fact that I am interested in them as a person, and not a subject of misfortune. Tough, isn't it. I am a recovering alcoholic, and though I was fortunate enough to stay off the streets, many of my friends were not. Few of them would have wanted someone taking their picture.

  An interesting thing was done here in Omaha last year. A group handed out hundreds of disposable cameras to the homeless, and paid for ones that came back. They let the homeless be the photographer, and take images of what they see life as. This was an eye opening exhibit.
date: '2010-01-02T04:45:46Z'
slug: 2008-01-18-street-photography-and-the-homeless
