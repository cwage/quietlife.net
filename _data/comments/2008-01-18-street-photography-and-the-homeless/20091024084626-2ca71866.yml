name: StreetMike
body: As a formerly homeless person myself dare I define wanker? A person who vocalizes
  for the rights of the homeless as a way to boost attention to their self but in
  reality dont give a shite. My days on the streets dealing with the human condition
  has made me skeptical. WANKER
date: '2009-10-24T08:46:26Z'
slug: 2008-01-18-street-photography-and-the-homeless
