name: latrice
body: i have been thinking about photographing homeless people in addition to talking
  to them to find out their story. . .how they ended up where they are. mean or not-i
  dont really expect people living like that to be the most pleasant,although some
  of them are. anyway, i figure i could give them a sandwich for taking their picture.
  for the sake of capturing a moment, i wouldnt have a problem snapping and then asking
  after i show the pic and telling them what its for.then, they could agree or disagree.
date: '2009-05-26T16:40:12Z'
slug: 2008-01-18-street-photography-and-the-homeless
