name: Phillip
body: As a photographer, if you see something compelling, you should take a picture
  of it. You can decide what to do with it later. If you feel a certain shot is exploitative,
  trash it, store it and reconsider later, don't sell it, etc. Also, avoid any wanky
  rhetoric when talking about your pictures, the kind of douchebaggery you pointed
  out in your blog post.
date: '2008-01-20T23:56:13Z'
slug: 2008-01-18-street-photography-and-the-homeless
