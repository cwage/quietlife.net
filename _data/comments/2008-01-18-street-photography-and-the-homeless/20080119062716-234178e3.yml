name: Bob Marchman
body: |-
  I think one possible solution to your quandary might be to sale any portraits you take of the homeless, then donate the proceeds to a charity that actually helps the homeless. Or even save the money and give the person you took the picture of a cut (assuming you run across said person again).

  Looking at the bigger picture (bad pun, sorry), we may actually put a dent in the "homeless situation" if people started seeing the homeless as real human beings. The zoo analogy is, sadly, all to accurate.
date: '2008-01-19T06:27:16Z'
slug: 2008-01-18-street-photography-and-the-homeless
