name: Colin
body: |-
  An ethical dilemma. First, operationally, I suggest you might benefit from reading [Down and Out in Paris and London](http://www.george-orwell.org/Down_and_Out_in_Paris_and_London/index.html "http://www.george-orwell.org/Down_and_Out_in_Paris_and_London/index.html") if you haven't already. In it, Orwell reports his direct experience living with the poor as a poor man. I think it's a valuable document in that it captures an aspect of his times.

  You can read about how little has apparently changed, for example he writes about its being illegal to lie on the ground in London, and how he (and some dozens of other men) paid some trifling amount to a person who'd tied a couple of ropes between trees in a park, to sleep while sitting on one rope and leaning over the other, to be woken in the morning by the upper rope being cut.

  I think Orwell also gives some space to the very questions you're asking, and may help you establish some points on the fuzzy boundary between art and exploitation, reporting and helping, helping and surviving.

  Not, I believe, that you should take Orwell's road, but perhaps learn from his walking it.
