name: fancycwabs
body: I'd be more open to libertarian views if I could see clear, specific examples
  of where it works. A city, state, or country that's the successful libertarian model
  for everyone else to emulate. We socialists have plenty to choose from, although
  we kinda get tired of folks telling us to move to Scandinavian countries if we don't
  like America.
date: '2014-04-28T14:50:29Z'
slug: 2014-04-27-its-time-to-abandon-the-term-free-market
