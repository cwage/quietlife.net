name: Kevin Barnes
body: I always thought that amphitheater was nifty whenever I walked through the Bicentennial
  Mall and was saddened to never hear of anything going on there. So I'm happy to
  see something happening there. Anybody know if it plays host to any other events,
  musical or otherwise?
date: '2010-06-01T20:24:37Z'
slug: 2010-06-01-free-symphony-concerts
