body: |-
  Hi Chris,
  The very first thing I thought of when I saw the dagger graphic was a WW II vintage [German SS dagger](http://www.milprom.com/German/daggers/index.htm "German WW II daggers").

  And, of course, the Hitler Youth slogan "Blut und Ehre."

  Kind regards,
  Tim
