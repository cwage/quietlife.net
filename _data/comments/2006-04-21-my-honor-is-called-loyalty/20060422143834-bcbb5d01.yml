name: Katherine
body: |-
  I'm giving Wales the benefit of the doubt, as I'm inclined to do. I'm sure any resemblance to the [Waffen-SS insignia](http://www.1944militaria.com/waffen_ss_insignia.htm "http://www.1944militaria.com/waffen_ss_insignia.htm") is purely unintentional.

  If anything, it looks far more like they've cribbed from the [U.S. Special Forces Patch](http://www.specialoperations.com/Army/Special_Forces/SF_Info/Insignia.htm "http://www.specialoperations.com/Army/Special_Forces/SF_Info/Insignia.htm"), which is an upward dagger crossed with 3 lightning bolts inside an arrowhead.

  The Waffen-SS insignia is very clearly a double Sig rune. Both the British Army & U.S. patches are more clearly lightning bolts. However if they were to use Runic symbolism in Wales, I'm inclined to forgive them. They have as much cultural right to utilise Runic insignia as did Hitler. Perhaps moreso. But really, the Cymru lightning bolt has far more in common with [Harry Potter's Scar](http://images.google.com/images?client=safari&rls=en-us&q=Harry%20Potter's%20Scar&oe=UTF-8&percentage_served=*:100&ie=UTF-8&sa=N&tab=wi "http://images.google.com/images?client=safari&rls=en-us&q=Harry%20Potter's%20Scar&oe=UTF-8&percentage_served=*:100&ie=UTF-8&sa=N&tab=wi") than anything else.
