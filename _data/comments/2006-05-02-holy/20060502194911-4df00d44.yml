name: Erik
body: |-
  Idunno, I kinda like Billy Joe and Lynn. They're following their dream, right? Their dream of operating a tattoo shop and Christian ministry in a beautiful historic building. It's not a dream I'd have, but it's kind of cool.

  And, honestly, Chris, we're all a little sorry that you are so unhappy in your life.
