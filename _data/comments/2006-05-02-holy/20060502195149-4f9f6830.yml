  Yeah, well, as I stated in the article I don't have any problem with tattoo parlors -- my beef is merely that I think it's a sad sign for the state of downtown Nashville, and that the neon sign is an abomination on a gorgeous building.

  The fact that it's a christian tattoo parlor is merely amusing.
