body: |-
  Okay, okay, you are redeemed.

  I have a weird guilty sentimental attachment with this album that Amy Grant did with Art Garfunkel.. "The Animal's Christmas"? or something like that. I haven't heard it since I was a kid. I wonder if it's as weird as it sounds now. (this comment is not appropos of anything. It's my blog and I can free-associate if I want.)
