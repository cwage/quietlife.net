name: jag
body: |-
  If that was jovial ribbing, I'd hate to get on your bad side. :)

  For what it's worth, in addition to what you consider crap, I also have plenty of Guaraldi, Mormon Tabernacle Choir, Frank, Ella, Burl, etc. recordings of Christmas music. Does that rectify anything?
