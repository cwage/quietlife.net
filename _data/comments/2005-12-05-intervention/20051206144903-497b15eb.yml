name: jag
body: |-
  Ouch. Nobody said you had to like or listen to Jack Johnson or Barenaked Ladies.

  If my post was about pedophilia or something I could understand your vehemence. But it's about Christmas music, for fuck's sake. Who pissed in your Cheerios? Merry fucking Christmas indeed.
