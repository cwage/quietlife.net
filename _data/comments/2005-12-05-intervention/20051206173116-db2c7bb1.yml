name: Tobin
body: |-
  Vince Guaraldi is one of my favorite Christmas picks. Have your friend hunt down a copy of A Lump Of Coal or at least the Hoodo Gurus contribution 'Little Drummer Boy, Up The Khyber' which is the only version of that song that does not drive me nuts and it ROCKS! as well.
  Any of my other suggestions may be too offbeat for most people though.
