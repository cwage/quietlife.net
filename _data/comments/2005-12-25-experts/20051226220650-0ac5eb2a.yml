name: Les Jones
body: Yes and no. Science is the most self-correcting system we've got in the long
  run (and it was PDQ in this case), but it is a human enterprise, with all its attendant
  foibles. As a system for divining facts it's the best thing we've got, but it's
  not infallible, either.
date: '2005-12-26T22:06:50Z'
slug: 2005-12-25-experts
