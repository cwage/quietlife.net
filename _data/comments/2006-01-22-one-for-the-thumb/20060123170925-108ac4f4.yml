name: Amanda
body: |-
  I think some listeners of the local top 40 station made it in the mid-90s. Anyways, it is the best song ever.

  I went to see the last Pirates game at 3 rivers and Sister Sledge was there but they only sang the national anthem. Rip-off. They did have the Rocket Man though, so it evened out.
date: '2006-01-23T17:09:25Z'
slug: 2006-01-22-one-for-the-thumb
