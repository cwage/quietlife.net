name: Anthony
body: I am an American, born and raised in San Antonio, Texas. Now my ancestors are
  from Mexico, i'm not! If in fact any illegal wants to live in the good ol' USA fine!,
  but fix your papers, stop your whinning; Ive heard and seen so many illegals say
  that they have lived here for 8,9,10 years, out of all that time they coudn't fix
  their freakin' papers and become U.S. citizens already?! As any american I stand
  by our president and goverment,although that's another debate issue. By the way
  I'm a Rebel by heart and that's exactly what the confederate flag sends out, Stand
  up for yourself and opinion because nobody else will. As for the racism part, well
  we can easily say that the mexican flag stands for drugs and unwanted baby sales.
