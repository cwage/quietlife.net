name: Joshua
body: The confederate flag should be flown high and proud! It is part of our history
  wether you like it or not. I am proud of my heritage and if your fuckin country
  is so great go fly your mexican flag there. English is our language not spanish
  or spanglish. Get your papers or get the fuck out.
