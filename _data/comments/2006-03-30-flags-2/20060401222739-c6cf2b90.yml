name: tmac
body: Hi folks, browsing subject. I beleive protests are becoming more sinister. Radical
  groups are using emotional young students for numbers. Take a look at [www.wehategringos.com](http://www.wehategringos.com
  "www.wehategringos.com") for an eye opener. Some of the rallies in CA included rock
  throwing, burning the american flag. I am shocked and disgusted. Why isn't this
  stuff put on TV? I don't think the youngsters realize how dangerous this is becoming
  and of course the radicals love it. The rallies in CA looked like Hamas protests
  on Al Jazeera the only thing missing was the AK47's.
