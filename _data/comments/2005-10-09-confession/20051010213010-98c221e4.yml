name: cwage
body: |-
  I figured someone would want some explanation. It was partially for shock value, but it's also because I have come to terms with the fact that it's true. I do really enjoy good beer and I've even fancied myself somewhat of a connoisseur (though nothing to compare to Amanda's brother). I can certainly appreciate the differences (both obvious and subtle) between say Michelob ultra and a good microbrew or something. I am not a total philistine.

  I have just realized it's the default beer I grab when I just want a 6 or 12 pack to drink while I kick back in the backtub and read or whatever on the weekend. The reasons are:

  1) It's as light a beer as you can get. The older I get, I just don't have the stomach (literally) for large quantities of non-light beer. I also have a rather high tolerance for alcohol, so if I drink regular beer, I get full before I ever get drunk, and what fun is that? This also ties into:

  2) I enjoy beer, but I do not enjoy getting fat.

  3) It doesn't taste bad. I realize it's so light that there's not much flavor to be had, but it doesn't taste **bad** (and there **is** light beer that tastes bad, to be sure. Natty Light. Never again.) I am no beer snob. Michelob makes great beer, and the Ultra stuff is just a super-light lager that they're marketing to low-carb dieters.

  4) Not too expensive.

  PBR comes close to fitting this criteria as well, except it's not that light. I also like Amstel Light, but it's too damn expensive.
