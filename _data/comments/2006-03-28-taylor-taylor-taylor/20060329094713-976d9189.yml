name: Eclipse
body: Elliott won't win, though he's a fantastic talent. After Paris, I found myself
  saying, "Damn, girl!" out loud, to myself. She's got a helluva voice, and hit every
  note tonight. Mandisa wasn't great for me tonight but she's a damn fine singer even
  when she's not at her best, and better than at least half her competition. But Taylor.
  Ah, Taylor. I really love that guy; I hated last week's performance by him, but
  my love remained true, and this week massively paid off. A real pro, subtle, understated
  performance by him - it really blew me away. Doesn't hurt that he was looking pretty
  smokin', too, but damn that boy can sing, and he knows what to sing. You'll probably
  see him in the top three, I think.
date: '2006-03-29T09:47:13Z'
