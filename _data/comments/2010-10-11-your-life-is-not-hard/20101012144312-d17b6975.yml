name: Chris Patti
body: |-
  I don't think Chris's point here was that no-one should EVER complain, but that most of us lead very cushy lives, and that the things we give ourselves ulcers about are, in the grand scheme, with a healthy dab of perspective, really not that big a deal.

  The "Your life is not hard" example from WWII that I always think about is the Rangers who supported the main beach invasion, scaling the cliff walks so they could flank the beach.

  Can you imagine having to fall \*TO YOUR DEATH\* and to not be able to make a sound, because doing so would give away your position and compromise the entire mission?

  That, my friends, is hard. The trivialities most of us in the tech world deal with day to day are not :)
date: '2010-10-12T14:43:12Z'
slug: 2010-10-11-your-life-is-not-hard
