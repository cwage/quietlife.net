name: Travis Roberts
body: |-
  By this logic, no one is ever allowed to complain. Sure, they had it worse that we do, but I'm sure there have been many examples of people who've had it far worse than even those soldiers.

  Somebody is always in a worse situation than you are. While I'm not a fan of constant complaining, I think it's ok to whine every now and then just to get it off your chest.
date: '2010-10-11T16:35:00Z'
slug: 2010-10-11-your-life-is-not-hard
