name: Jackson Miller
body: |-
  Why I am favoring Obama:
  The systems sucks and it will be hard to fix, but I am a good leader and I will be honest with you as we figure it out.

  Why I am not quite favoring Edwards:
  The system is broken and I am convinced who is to blame. They are not invited to the table as we try and fix it.
