name: KJRawX
body: U guys are killing me!! Rocky is NOT 61!!! Rocky is 58 1/2!! In 1979 Rocky was
  31!! In 1982 (Rocky 3) Rocky was 34!!! Hmmmmmmmmm 3 yrs later (in Rocky 4 1985)
  Rocky would be 37!!!! Do the math fellas..........in 1990 (5 yrs after Rocky 4)
  Rocky would be 42!! Now do the math again.......... add 16 1/2 years!! Rocky is
  58 and 1/2. Very realistic!!! George Formean, Larry Holmes, Archie Moore, & a few
  others! Rocky is fictional just like every other movie on the planet! Stop ANALizing
  and enjoy a fictional story!! Peace!!
