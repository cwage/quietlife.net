name: john h
body: |-
  uh, the Rocky series didn't end with a bang of glory...Rocky 5, to use a word i'm sick of, sucks, imo.

  IMO, Sly must be running low on funds or ego boosts. He's made decent movies (not many) since the Rocky quintet. Maybe nobody's giving him a chance at any other role, I dunno. But, that first Rocky (and Rocky II) were just amazing movies. I hate to see the series go petering out into the night..
