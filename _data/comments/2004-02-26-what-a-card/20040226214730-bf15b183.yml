name: Doug Orleans
body: Orson Scott Card is a science fiction & fantasy author; Ender's Game is probably
  his most famous (and my favorite, although I've only read about 4 or 5 of his books).
  He also was a columnist in some computer magazines in the '80s and '90s, and maybe
  still is, I don't know. He's also a Mormon, and more than a little wacko (in case
  you couldn't tell from that essay).
date: '2004-02-26T21:47:30Z'
slug: 2004-02-26-what-a-card
