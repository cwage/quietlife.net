name: Jackson
body: |-
  Sounds like an unfortunate accident.

  I used to work in kitchens (Caffe Milano, Cakewalk, The Trace, etc). I had a chef who would see mye trying to slice the last little part of a potato and he would ask what my fingertip was worth. He would then remind me that that small portion of the potato was worth less than a nickle.

  I never forget that now when I am using a mandolin.
date: '2005-06-02T01:26:54Z'
slug: 2005-06-01-safety-tip
