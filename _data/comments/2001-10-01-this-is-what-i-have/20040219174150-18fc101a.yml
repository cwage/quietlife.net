name: andrea
body: I too suffer from cholinergic urticaria. I have tried the antihistamine Hydroxyzine,
  and it helps very little. If I have any kind of emotional stress, good or bad, I
  erupt in hives all over my chest. It is quite embarrasing. I don't know what to
  do anymore.
date: '2004-02-19T17:41:50Z'
slug: 2001-10-01-this-is-what-i-have
