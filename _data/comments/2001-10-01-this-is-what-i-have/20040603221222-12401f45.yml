name: Gerry
body: I've had cholinergic urticaria for about 7 years. I'm waiting for that magical
  moment when it's supposed to just "stop". I don't know who put a spell on me, but
  someone should take it off quick! Email me at ehlersgl@adelphia.net if you want
  to talk about this. It's really cool to know there are other people to talk to.
date: '2004-06-03T22:12:22Z'
slug: 2001-10-01-this-is-what-i-have
