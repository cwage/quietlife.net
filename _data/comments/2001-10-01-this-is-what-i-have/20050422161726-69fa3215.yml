name: Richard
body: 'Hi, all, i had this Heat induced Hives problem for over 12 years now, i tried
  different diets, antihistimines but nothing seems to get rid of it, But recently
  i visited china and gotten prescribed with 2 medications:Desoloratadine(Clarinex)-H1
  receptor and ratadine H2 receptor that actually Stops the Hives from coming out.
  The doctor said to exercise and sweat it out after taking medications, But i''m
  quite a lazy person thus i could keep a consistant exercises schedule, so the Hives
  still breaks out if i don''t continue taking the medication. On the bright side
  i now have a medication i can rely on and i was able to dance 2 hours continous
  at night while sweating without hives breaking out. With the little exercise of
  1 hour a week i put in , my condition has improve alot, i would say 35% less red
  dots/hives and 70% of all red dots/hives are located on torsoes/arms/legs area.
  And i also put in 20 minutes of SR-Self Relaxation a day listening to relaxating
  music. Feel free to Email me: ppsx@yahoo.com to get some feedbacks.'
