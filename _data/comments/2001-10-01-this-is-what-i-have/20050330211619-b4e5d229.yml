name: Meet
body: I have had urticaria since mid July 2004, Just today I went to see my 6th doctor(dermatologist)
  and he said I have what is called Cholinergic Urticaria - he said don't do anything
  that can cause sweating. I have taken lots of varieties of antihistamins - can anyone
  really help regarding this CU ? Any cure at all ? please email. Thanks
