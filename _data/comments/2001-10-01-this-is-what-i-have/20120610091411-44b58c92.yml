name: Health NC, OP, SPN
body: I thought I would share my two cents on this board. I was fighting this condition,
  for YEARS. I was always active, I did not have the best diet but I never had issues.
  I would spend days in the sun, sweating, exercising, and at the time not realizing
  how much I would miss this. Next the onset, I stopped living that lifestyle and
  began becoming very lethargic, then when years went by eating unhealthy, lack of
  exercise, and poor sleep patterns trying to become athletic again this problem occured.
  I fought it constantly, I tried every medication you can think of which created
  more of a bandaid effect. It got so bad I even went the steroid route, which did
  help quite a bit. I went to school for nutrition, I became a nutritional consultant,
  and a registered orthomolecular practitioner. Then returned later to become a specialist
  in performance nutrition-I can tell you how to get rid of your hives. Fight them,
  every step of the way. The second you start 'limiting' your life because of them,
  they will worsen. I forced myself to eat an anti-inflammatory diet, no junk foods,
  sugars, etc. I forced myself to exercise on a DAILY BASIS. I had no intention of
  living that way, and I know what you are all going through. The stinging pain, the
  hives, the frustrating, irritating, annoyance, the pain. I've been there, and recently
  I went through a 'phase' of not eating so healthy, and not exercises regularly.
  What happened? They started coming back. Surprise surprise, changed my diet, and
  exercised daily again. Gone. The cure isn't a pill, although I do take quite a few
  supplements for general health-the cure is YOU. YOU have to be the one strong enough
  to fight it off. If you sit sedentary, it will consume your life. Read this page,
  look at all the lives it's ruining, you want some drive to fight it? Read this page,
  then get up, research anti-inflammatory diets. Research inflammatory foods, and
  avoid them at all costs and drink a TON of water. WATER WATER WATER. Keep your body
  hydrated, once you start getting in the habit of sweating. You're gold, just stick
  to it. Trust me, your food isn't worth the problem. Hydration101@gmail.com, if you're
  looking for a nutritional coach, I do have plans available. No I'm not here to sell
  my plans, I couldn't care less-but I can tell you that you will waste a lot of money
  on 'miracle pills' that lead to frustration.
