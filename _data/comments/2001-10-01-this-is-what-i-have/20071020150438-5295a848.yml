name: chris
body: What ended up working for me was fish oil pills (the omega 3 fatty acids EPA
  and DHA.. not the plant forms, they aren't the same thing). I've gone weeks without
  taking them, it but it seems like if I go too long, it starts to come back(only
  a fraction of what I started with but enough to scare me into starting again without
  seeing what would happen if I went longer). Within about two weeks of consistently
  taking two or three pills a day (I just took two each morning) you should know if
  this is going to work for you..if not, I'd move onto something else. Theoretically,
  it would also help to reduce omega 6 fatty acid consumption at the same time (the
  omega 3/6 ratio is important) and of course, try to avoid overly excessive stress/caffeine.
  Sweating occasionally is generally good idea too, but I have no idea if the histamine
  dump and 1-day refractory period influence how long it takes for the pills to take
  effect.. I don't remember making any particular effort to work out or get hot when
  I started...but I suppose it couldn't hurt.
date: '2007-10-20T15:04:38Z'
slug: 2001-10-01-this-is-what-i-have
