name: elisa
body: Hi, another one on the list! ive had it since 2001. funny story too. I was trying
  out for volleyball and on the last day of tryouts i worked my butt off to make up
  for the mistakes i made for the rest of the week. then i blew up like a balloon,
  i was one big hive. I didnt make the team either. since then it has gotten increasingly
  worse every summer. and bummer too cuz i live in texas. Its always at or close to
  100\*. but i have had problems all year round. its a change in temperate for me,
  and when i exercise. even getting in the pool will freak me out. i had to stop exercising
  all together because nothing will work. ive been on every kind of antihistamine
  known o man and NOTTA thing worked. i cant even go outside now cuz its 100 (well
  105 with the heat index) I cant live my life like this anymore!! any suggestions???
  i need to work out again but the hives are overwhelming. email me... elisah13@hotmail.com
date: '2005-06-17T17:46:33Z'
slug: 2001-10-01-this-is-what-i-have
