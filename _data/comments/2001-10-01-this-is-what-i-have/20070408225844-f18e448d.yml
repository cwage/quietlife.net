name: Jamie
body: Hi may namie is jamie, i to have been diagnosed with heat induced hives.. i
  have suffered for about 5 years now. up until last year they werent that bad.. then
  it hit me like a truck, hives everywhere.. and yes u can use ur imagination on that
  one.. i went to my doctor, a dermatologist and t hey come up with nothing.. i feared
  i would live with this forever, and it would only ever get worse.. Well last week
  i went to an allergy specialist hopeing that she could come up with something, anything..
  i got the normal scratch test.. and of course it come up with nothing.. i guess
  im luck in the fact that im not allergic to anything outside... but she said that
  i get heat induced hives... last year when i was at the derm. office she gave me
  this cream called triamcinolone 0.1% that seems to work for the hives that have
  showed up already.. the allergist gave me a perscription of singulair (used mostly
  for asthma) and hydroxyine HCL 25 mg.. So far all 3 of them together seem to have
  worked, or at least i havent seen any signs of the hives since i started taking
  them... so maybe it will work for all of you.. she said there is a 50-50 chance
  that it will work, so hell why not give it a try.. send me an email if it works
  for you.... openmindedfreesoul@yahoo.com GOOD LUCK!!!
date: '2007-04-08T22:58:44Z'
slug: 2001-10-01-this-is-what-i-have
