name: M
body: I’ve had this for about two years and could never find a way around it UNTIL
  I sweated for a long period of time in the sun which was very hard to do because
  I would flare up and itch. I noticed it went away for about two days which was a
  big relief. Then I got into doing a lot of cardio and that helped tremendously.
  Now I have to sweat for a long period of time or it starts to come back slowly,
  day after day until I sweat again. I’m not saying this will work for you but give
  it a try. I know it can be very hard to do as it was for me but I pushed through
  it and don’t get it as I used to. I can go back to living a normal life without
  flaring up or get itchy
date: '2017-12-04T08:45:11Z'
slug: 2001-10-01-this-is-what-i-have
