name: PJ
body: There appears to finaly be a drug that can control CU for good. The name is
  Xolair. It is an anti IgE drug. IgE (Immunoglubulin E) is involved in the forming
  of hives. IgE attaches itself to receptors on the mast cells and this is what causes
  the realease of histamine which produces hives. Xolair is very expensive and has
  not been approved for Urticaria but for astma. My doctor has treated several patients
  who have suffered with CU for many years and the Urticaria completely went away
  withn 2 or 3 days of their shot. You need a shot I believe every 2 weeks. Some insurance
  comanies may approve it, other no. I have been trying to get approval from mine
  for almost a year now. I have suffered of urticaria for over 10 years and have known
  aboutthis drug for a few years but it had not been approved and it was in the clinical
  trials for years. I think it was finaly approved for astma about a year ago or 2.
  If you are lucky and your insurance approves it or you can afford the price (about
  $700 per shot) then you are in luck. Good luck to all of you. Maybe if we contact
  the pharmaceutical company... if we all write letters... we could do some good.
  I believe the pharmaceutical company is Genetech.
