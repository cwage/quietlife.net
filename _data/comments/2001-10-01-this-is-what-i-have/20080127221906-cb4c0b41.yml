name: Lynelle
body: After 5 months of tests from head to toe, my dr. thinks I may have some type
  of CU. Has anyone had a diarreha compontent to the hives rash? My worst attack had
  a rash over my entire body, even eyeballs, extreme shaking, diarreha. I can't find
  any triggers for the attacks. I have been on prednisone..finally off and the attacks
  are coming back. I have the pricks feeling all over my body a lot but no hives until
  I have an attack. It usually starts with extreme itching of my palms/feet. I'm trying
  singular now and controlling the attacks with benedryl. Any one with these symptoms?
date: '2008-01-27T22:19:06Z'
slug: 2001-10-01-this-is-what-i-have
