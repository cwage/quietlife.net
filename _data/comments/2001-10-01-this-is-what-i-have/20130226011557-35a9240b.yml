name: itchyforlife
body: So, I could write a book with a day by day account of this condition but, it
  would only read, " today, I got intense itching from coming inside where it's warm,
  from the cold outside, doing any physical activity in a warm area or, showering".
  I'm 56 and have had this all of my life . I'm laughed at when it strikes in front
  of people. If anyone could offer some real Homeopathic or Holistic solutions, maybe
  I could actually start living normal. Thanks and sorry to hear you all have it too.
date: '2013-02-26T01:15:57Z'
slug: 2001-10-01-this-is-what-i-have
