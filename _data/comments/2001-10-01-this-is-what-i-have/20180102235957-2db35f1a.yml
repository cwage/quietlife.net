name: David
body: I've been dealing with CU off and on for the past 20 years. In my case it seems
  to last for a couple of years give or take and then goes into a hiatus. 2004 was
  the last year I had symptoms and then it showed up again in 2016 for no rhyme or
  reason. I've tried many medications over the years and none have worked. The only
  thing that's worked for me is sweat therapy. I'm planning on buying a portable sauna
  to use at home. I find that the intense heat makes me sweat a lot quicker rather
  than trying to do cardio which can be excruciating for the first 10-15 minutes before
  I begin to sweat.
date: '2018-01-02T23:59:57Z'
slug: 2001-10-01-this-is-what-i-have
