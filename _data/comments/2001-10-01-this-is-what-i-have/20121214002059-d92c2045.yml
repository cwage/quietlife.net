name: Jasmine
body: Im 28 yrs old, and ive just had my second break out, my last one was just over
  a year ago. and i get itchy as hell, when i scratch it, i get massive welts where
  i have scratched, it also burns like hell after i scratch, an the only way to relieve
  this is to scratch again. its just a vicious circle. im not exactly sure of  what
  sets me off, but if i was to no, i would avoid it like the plague. it has me up
  and down all night, an i feel bad for my partner, because i am a stay at home mum,
  and he works full time, and i wake him while im up and down all night. i have had
  a cream prescribed to me from a doctor, its called CORTIVAL 1/5 CREAM, its works
  for the itching and burning for a little while. but my partner got me some tablets,
  they are called FEXO 180, it says to take one daily when needed, but with my condition
  so bad, and a nervous break down on the cards i took 2, and omg, the itchiness and
  the burning has completely gone. im not saying this is a cure, but how rapidly it
  stopped the worst itching and burning (i did use some cream while waiting for the
  tablets to kick in, but only because my condition is so bad). but if making this
  post helps someone out there like me, with a small amount of money, to help controll
  their outbreak as i have, im thank full for helping.
date: '2012-12-14T00:20:59Z'
slug: 2001-10-01-this-is-what-i-have
