name: Erika
body: I think that I have just recently developed this condition. Is it possible for
  it to just start happening one day for no apparent reason? I'm seventeen, and lately
  every time I get hot, I start itching and break out in a rash. It sucks and it's
  very embarrassing, because it's hard not to scratch.
date: '2006-08-25T12:20:31Z'
slug: 2001-10-01-this-is-what-i-have
