name: William Fiers
body: I just found out i had the big CU yesterday! Before then all I knew was when
  I get hot or stressed I break out in a painful rash. The doctor wasnt a big help
  but il be starting some meds soon, well see how they help but im not holding my
  breath. From all the web-sites ive looked at and people I talked to the general
  thought is " this really sucks and theres not much you can do about it!" Well anyone
  else out there that wants to join me in my pain can e-mail at Fiersw@yahoo.com.....
  Im going to get a cold drink now!
date: '2005-04-15T20:34:28Z'
slug: 2001-10-01-this-is-what-i-have
