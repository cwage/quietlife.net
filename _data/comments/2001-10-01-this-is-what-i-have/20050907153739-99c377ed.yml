name: Debi Hoare
body: I am a registered nurse and student homeopath and I saw this website when looking
  up information about cholinergic urticaria for my son. Both acupuncture and homeopathy
  can help this condition, but you need to see a qualified practitioner because the
  treatment is holistic. Antihistamines and corticosteroids remove symptoms but do
  not treat the cause, so the symptoms come back.
date: '2005-09-07T15:37:39Z'
slug: 2001-10-01-this-is-what-i-have
