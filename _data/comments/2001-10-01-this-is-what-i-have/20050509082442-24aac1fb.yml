name: Sandy
body: I have had this horrible thing for over 5 years now. I lose alot of sleep and
  I am very itchy all the time.I have thought many times of just ending it all because
  I itch so much and I can't sleep. My husband is suffering right along with me. And
  I break out in these little bumps that get red and itch like crazy. I am alergic
  to almost everything so medicine isn't going to help me. I am going to the doctor
  again in a few days and I just know that he isn't going to be able to help me. I
  don't feel good most of the time because I am so tired. I am angry that this has
  attacked me and will not go away. I can't pin point what is causing this. It isn't
  heat, it isn't cold , it isn't sweat and it isn't exercise. I know that stress plays
  a part but I get them even when things are great too. Help me please!!!!
date: '2005-05-09T08:24:42Z'
slug: 2001-10-01-this-is-what-i-have
