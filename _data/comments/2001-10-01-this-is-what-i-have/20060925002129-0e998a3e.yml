name: Patti
body: When it hits, it is more than I can tolerate. Later, I go on with life and hope
  it doesn't happen again. Then it comes back. I go from Dr. to Dr., trying to find
  another diagnosis. I'm tired of looking. Why me? I love exercising and activities
  in the sun? Is it better to die in the light?
date: '2006-09-25T00:21:29Z'
slug: 2001-10-01-this-is-what-i-have
