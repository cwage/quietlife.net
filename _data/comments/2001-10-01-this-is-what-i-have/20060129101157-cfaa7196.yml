name: Lubos
body: Yeah, I feel with you guys. I get this itching after warming up or any kind
  of sport mainly on my chest and back only for 2 minutes or so. Also in swimming
  pool after swimming craul, which was for me interesting, because the water was cold.
  I had that also after skiing, when I moved a lot, so I had to stop release my clothes.
  I can have itching in a minute when I want, just by moving fast. I love to exercise,
  but this itching demotivates me. I have this for 2 months. Is this illness infectious?
date: '2006-01-29T10:11:57Z'
slug: 2001-10-01-this-is-what-i-have
