name: CUSufferer
body: accept the fact that there is no cure for this frustrating disease. you have
  to control it. most of the sufferers cured CU for 7-30 years. it just gone... this
  disease causes our quality of life to decrease. we must have a strong faith to cope
  with this frustrating disease...
