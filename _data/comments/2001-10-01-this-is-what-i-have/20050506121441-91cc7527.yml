name: Davis
body: I'm 34 and living in India and i too have this chronic urticaria for the past
  8 months. u could see small eruptions in the head scalp and lot of dandruff formation
  plus i get itching all over my body which turn into rashes. I dont know which started
  this Urticaria in me. May be the swimming pools or the dust thro which i drive my
  bike to office or the silver filling that i have i my teeth or the excess Airconditioner
  i have in my office(Driving my bike in dusty roads and airconditioner r new to me
  coz i started working jus 8 months back). Eventhough i get rashes all over it mainly
  comes in the left side of my body. The left arm, the left side of the neck. Is it
  due to a small lump in the left side bottom of my head? coz sometimes i get bumps
  as how u get when an insect bites in my left hand. Now i use NYLE shampoo with conditioner
  and the dandruff and the small small protrusions in my head is better now. Antihistamines
  helped me but after stopping them the rashes appear again. I visited a homeopath
  and he gave me medicine thinking that it could be due to swimming in swimming pools
  some 8 months back. Now it is better for me, but still i'm not completely cured.
  Shower to shower prickly heat powder also helps me to a great extent. But one thing
  i know for sure. One night after a bath, i had rashes all over my chest and back.
  i looked myself in the mirro and i cried to Jesus, Lord, why this pain and rashes
  for me. i Cried bitterly and told him to forgive all my sins. From that day, i dont
  get rashes and pain in the night. He gives me sound sleep. Before i spent many sleepless
  nights. I'm sure he'll soon wash me off from this Urticaria. "My Jesus I Love U"
date: '2005-05-06T12:14:41Z'
slug: 2001-10-01-this-is-what-i-have
