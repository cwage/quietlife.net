name: Tait
body: I too, have been diagnosed with Cholinergic Urticaria. Currently, I'm a 24 year
  old pharmacy student in Virginia, and I've been asking around and doing some research
  about this disease, but I have found absolutely NOTHING. Antihistamines definitely
  help keep the itching down (Zyrtec + Allegra), and glucocorticosteriods help get
  rid of the rosatia(if your doctor allows). Otherwise, you've just got to tough it
  out, and get funny looks at the gym! Feel free to email me to talk about this abnoxious
  disease...tswitzer@su.edu. Go Steelers!
date: '2005-04-27T23:17:28Z'
slug: 2001-10-01-this-is-what-i-have
