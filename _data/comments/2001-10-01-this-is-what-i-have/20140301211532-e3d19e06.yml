name: Nom
body: 'Wow! Good luck to you. I have been suffering from cholinergic urticaria for
  over a year now, at it''s worst in the last 5 months. In some ways it feels better,
  other ways worse, but it definitely has taken a huge mental toll on me : ( All that
  said, I have been seriously considering undertaking acupuncture. I figure it''s
  worth a shot, and it has worked for some people. Is it any more arbitrary than a
  Western doctor telling you it''s "Idiopathic" (Idiot can''t figure out the pathology)
  and throwing tons of chemical laden drugs at you that stop working over time? I
  don''t think so. I really hope this works for you! It gives me hope for my future.'
