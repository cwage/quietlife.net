name: Alex
body: I am 25 and my CU started a year and half ago, It started with one big hive
  after running. Then it started to show everytime I exercise and it wasnt only one
  but a lot of them throughout my back and chest then in my arms and is starting to
  show in my legs. I have tried a couple of anthistaminics and didn't work. I get
  this CU when I have a stressfull situation, and mostly is related with body temperature.
  Every time I do exercise the hives will show and the itching. If I excercise in
  the beach I don't get my entire arm with hives, because there is cool air blowing
  to my body, but if I run or play a sport with a swetshirt or in the sun, my arms
  look like a galaxy, full of big hives all over my arms, chest, back and some in
  the legs. I have long hair, so I don't know if they show in my head but I do get
  the itching in the head. After 30 to 60 minutes it all goes away without a trace
  and the itching will go away as well.If I do indoor sports the attack is very severe
  and it takes about 80 minutes to go away, but after they go away it seems that nothing
  happened. It is emmbarrasing because I cant play that much indoor sports because
  the temperature in the room is mild or warmer than outside and that triggers my
  hives to a severe level. Is this a case to anybody but me???? please e mail me at
  alexrm21@hotmail.com
date: '2005-07-03T00:58:39Z'
slug: 2001-10-01-this-is-what-i-have
