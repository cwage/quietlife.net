name: Sandy
body: I have had chronic urticaria for 13 years and I have seen a specialist in Charleston,
  SC. No help there. Many years of suffering and nobody knows how to treat it! I dont
  get it!! My kids dont understand, my husband is at his wits end and I am losing
  my mind. I have had everything from antihistamines, head meds and cyclosporine--which
  the side effects are worse than the hives, anybody have anything that has cured
  this???
date: '2007-09-20T14:29:02Z'
slug: 2001-10-01-this-is-what-i-have
