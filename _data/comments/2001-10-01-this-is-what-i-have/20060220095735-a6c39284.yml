name: trista
body: hi everyone my name is trista and i have been living(not really)with severe
  hives for 6 months.mine never stop ITCHING.its horrible i hate my life,it's ruining
  my job because it is getting to the point i can't function.i don't sleep,all i can
  do is cry and scratch.i really feeling like putting a bullet in my head.its not
  like im living anyway.the saddest thing is i am only 22,for the love of jesus what
  the hell did i do?everyone's story is horrible,but at least you get a brake i get
  shit,just scars, a shit load of gigantic rashes,lots of scabs and of course the
  itching.i would give up my firstborn to not live like [this.how](http://this.how
  "this.how") am i going to support myself?i am really a nice person under normal
  circumstances,just right now i am mad and hurt.anyone ever have them this bad?
date: '2006-02-20T09:57:35Z'
slug: 2001-10-01-this-is-what-i-have
