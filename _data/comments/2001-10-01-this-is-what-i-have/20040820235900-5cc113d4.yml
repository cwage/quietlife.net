name: James
body: Hey there, Ive had cholinergic urticatia for nearly a year now also. I'm currently
  seening a very good Naturopath (homeopath) and it has really helped a lot. I've
  come to realise that this condition is very much related to my sleep, food I eat,
  and general stress. I used to have very bad sleeping habits, and also live a stressfull
  lifestyle. Interstingly, I was cured about 6 months ago, it just spontaneously regressed,
  but i started sleeping badly again, and eating lots of milk and cheese (I am allergic
  to milk), and the condition came back again. I think the best thing is get into
  a routine, dont stress about it, and try and eat and live healthy, and see a good
  homeopath.
date: '2004-08-20T23:59:00Z'
slug: 2001-10-01-this-is-what-i-have
