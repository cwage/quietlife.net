name: Chrissy
body: Hello... I have had cholinergic urticaria for 5 years now. I used to take Claritin,
  but I could not exercise and was extremely itchy. I now take over the counter Zyrtec,
  10 mg. I can finally exercise now... although I have to take a break after around
  20 minutes. I still get hives when stressed, but they are no longer itchy. So, Zyrtec
  isn't the perfect cure... but it make my life so much better.
date: '2009-02-17T00:06:11Z'
slug: 2001-10-01-this-is-what-i-have
