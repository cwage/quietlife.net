name: John
body: Like many of you, I have been suffering from cholinergic urticaria for approximately
  four years. My doctor suggested that stress my be contributing to the relapse of
  my symptoms so I am writting a summary of my experience in an attempt to vent my
  frustration and anger...hopefully taking some stress off my mind. I've tried every
  possible treatment like corticosteriods, antihistamines, and herbal medication too.
  What angers me is the herbalist gave me false hope by telling me he could cure me
  (profitering from my pain!!!). Other than this I have had no success. I have been
  fortunate to be symptom free (pain and hives on occasions) for about 8 months, however,
  recently since the start of the winter period my symptoms have returned. The symptom
  that bothers me the most is the prickling pain that I experience basically all over
  my body. I have been using Anti-inflammatory medication which have reduced the pain
  slightly (speak to your doctor before considering this option). But mostly, I've
  been running as hard as I can in an attempt to help my body develop tolerance to
  "sweat" and to prevent my body from SUPPRESSING sweating (this happened at start
  of my condition). I used to play sports (before I was struck down with the condition)
  because it gave me a sense of freedom - no boundaries. But now, I just don't know...I
  run with anger, frustration, and fear of the pain. Sometimes I want to scream my
  lungs out until I pass out. After reading some of your comments, it is comforting
  to know that I am not the only one in the world suffering from this. I say this
  because a dermatologist that I went to referred to me as being "UNIQUE". That word
  broke my heart because I felt that I was suffering this on my own. I say this empathetically
  and I am truely sorry for anyone who has to suffer from this horrible condition.
  My mind feel lighter after venting my frustration...thanks for listening.
date: '2006-06-23T06:09:52Z'
slug: 2001-10-01-this-is-what-i-have
