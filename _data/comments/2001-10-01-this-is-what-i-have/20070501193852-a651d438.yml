name: Phil
body: "Hiya everybody! (sorry if my english is not so fluent and a bit abrupt.:),\
  \ I am a 21 year old scandinavian male who has been suffering with chronic hives\
  \ for about 5 years. The lesions come every time my body temperature rises or I\
  \ when feel emotionally tense, and the symptoms makes it difficult for me to perform\
  \ in any kind of physical activity, without being bothered by the itchy and unbearable\
  \ red appearance that creates a lot of anguish within me! No wonder the summer isn\x92\
  t any longer my favourite season! (venting there:P) I have also had acne for a couple\
  \ of years in addition to that I blush easily. In addition to this skin-related\
  \ misery, I suit easily into the cathegory of a stressful person. I also tend to\
  \ internalize stressful feelings and issues instead of expressing or getting it\
  \ out, especially in my early infancy. In addition to this my diet has been quite\
  \ bad for periods, consisting of fastfood and high-glycemic treats, especially during\
  \ the most stressful parts of my puberty and upbringing.\n\nMy history of skin-related\
  \ symptoms has bothered me a lot, and forced me to be my own health detective since\
  \ doctors and homeopaths haven\x92t come close enough to the target..\nAfter reading\
  \ many testimonials on people who cured their urticaria and general theories of\
  \ holistic well-being, I get quite sure that there are some common culprits here,\
  \ both physical and mental. Since the mental issues relating to this very unpleasant\
  \ \"symptom\" seem quite obvious (stress and constant fight-or-flight modus) and\
  \ almost without exception strikes adolescents, I will rather focus on some of the\
  \ physical issues likely to cause or develop urticaria. I AM NOT A DOCTOR AND DON\x92\
  T WANT TO BE, but I will only mention some that really could help you guys.. It\x92\
  s a vast array of therapies and strategies that can help you so hang in there please..\
  \ It will only make you stronger.\n\nThe equation:\n\nWhen mental stress get internalized\
  \ in the body along with a shitty diet, the result will be wonky hormones. This\
  \ again causes hepatic and adrenal stress and further digestive problems and state\
  \ of being emotionally upset. Add a history of antibiotics and the equation is almost\
  \ there..:) Candida and dysbiosis will appear due to indigestion and toxins flooding\
  \ the system. Pancreas and liver get overburdened. Rememeber what they say in TCM\
  \ (Traditional Chinese Medicine); the skin and eyes is the mirror of the liver.\
  \ Food allergies and sensitivities will occur when the body not any longer is able\
  \ to handle metabolic waste and toxic residues from food and environmental sources.\
  \ \\*Eureka\\* Hives\n\nEverybody should at least find out if they have digestive\
  \ issues. Stress affect the digestive system so badly due to the intricate checks\
  \ and balances of the hormones. If the cortisol or adrenalin (stress hormones) get\
  \ out of control it will affect the insulin too. When the insulin is out of whack,\
  \ it will also affect the testosterone/estrogen balance in the body. And when the\
  \ liver is impaired and congested, it is not able to filter out the estrogen. Estrogen\
  \ dominance is the cause of many imbalances in the body. For women contraceptive\
  \ pills could be the culprit. Many women can also get urticaria, skin issues (hot\
  \ flashes) and thyroid problems along with an early or unnatural menopause, therefore\
  \ I believe one should target all hormonal imbalances too.\n\nI highly recommend\
  \ [www.curezone.com](http://www.curezone.com \"www.curezone.com\"), [www.askshelley.com](http://www.askshelley.com\
  \ \"www.askshelley.com\") and [www.askwaltstollmd.com](http://www.askwaltstollmd.com\
  \ \"www.askwaltstollmd.com\") for people who want to understand and take \x96SOME-\
  \ responsibility for their own health. Post your issues and stories and you will\
  \ get valuable advice. A candida diet could be a place to start. Lots of info if\
  \ you are patient and don\x92t expect the magic bullet. I read somewhere: Patience,\
  \ Perseverance and Persistance.. Lots of love and hope. Phil"
