name: rg
body: For me it come on exercising after eating dairy products mostly. Sleeping in
  air con, calming down mind with no thoughts(trying a bit) helps it come down in
  an hour. I guess it is a result of acquired anhidrosis. I ahve nearly stopped sweating
  over past 10 years, when at one point in time I used to be very sweaty.
