name: Marcus
body: After hot showers, I get intense itching on my legs with red blotchy patches.
  Lasts for an hour or two. Seems like CU. I apply baby oil and that seems to help
  a bit to reduce the itching. I am going to try cooler showers and maybe stop eating
  suger and dairy.
date: '2006-06-10T12:33:12Z'
slug: 2001-10-01-this-is-what-i-have
