name: David
body: Also during this long period I found that there are things that can be done
  to ease the problem. I liked specially acupuncture/acupressure and meditation. They
  are definetly no cures, but as long as you "think" they "are" it will help. Rashes
  might dissapair, if they don't you'll not become as irritated/annoyed. Specially
  acupressure and medition is very cheap solutions, just google "urticaria and acupressure".
  The sameway it goes with homeopathy, except its a very expensive solution. Hell..
  If you think that sugar in water helps, I suggest you take with you a bottle everytime
  during excersise.
