name: Erin
body: I am a 25 year old NuvaRing stroke survivor now with chronic hives that seem
  to come on with heat/pressure/sweat combinations. I am going to see an allergist
  mid-week but so far, have used Allegra for these hives twice daily to try to ward
  them off. TIRED of medicine!! Does anyone have any other ways to cure this? HOMEOPATHIC
  ways, etc. msblueyez85@yahoo.com Thanks!
date: '2010-06-07T02:27:06Z'
slug: 2001-10-01-this-is-what-i-have
