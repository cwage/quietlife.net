name: KG
body: I too have this horrid horrid disorder and I feel for every single one of you
  that is suffering from it. I have never spoken to anyone else with the same condition
  before so I would be interested in chatting to someone about it. It's making my
  life a misery. My parents don't understand which makes me feel so alone. I feel
  I need some sort of support so if anyone wishes to email me, my addy is girl2k\_50@hotmail.com.
  I would really like to hear from you!
date: '2006-06-10T16:42:15Z'
slug: 2001-10-01-this-is-what-i-have
