name: Erika Schwartz
body: That doesn't sound like cholinergic uticaria. Medications almost never work
  for heat hives and tight spandex would kill someone who couldn't get too hot. This
  reminds me of something else. Is your skin so sensitive to the touch that it raises
  up where you touch it? Like can you write on your skin?
