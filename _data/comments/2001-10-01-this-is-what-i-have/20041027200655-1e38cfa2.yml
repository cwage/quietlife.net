name: Luke
body: I'm 16 and Ive had this thing for 2 years now. Its not so much a health problem,
  its more of an annoyance. I find it to be annoying and especially when u start scratching
  ur head and everyone thinks u have lice. Hot showers each morning seem to help,
  but usually i can work it all out in about a half hour each morning and be fine
  for the rest of the day. I find it to never bother me at night time, If it does
  its very rare. Hopefully its cured fully someday, until then we all just have bad
  luck for getting it.
date: '2004-10-27T20:06:55Z'
slug: 2001-10-01-this-is-what-i-have
