name: michelle
body: Hi Gil, I am going to try excersisng like you said. Do you think sweating has
  to do with removing the toxins from the body and therefore reducing hives? i am
  47 year old mother of 2 teenagers. i am ahtletic and this is ruining my life. I
  plan on fighting this thing. I itch all the time in some form. I have dermographia.
  I take allegra but it only partially solves the problem. e mail me any time. Good
  luck, Michelle
