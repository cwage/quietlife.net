name: Lee
body: I think I may have this condition. I'm 22yr old and have recently moved house.
  During this time, after carrying boxes and various other objects, my chest and back
  come out in a large Rash. I wouldn't really call them Hives, but I'm not sure on
  the definition of hives. A red blotchy rash is how i'd best describe what happens
  to me. Its extremely itchy and gets worse and worse. Today I was carrying some heavy
  boxes at work through several rooms and it happened again. Its so itchy and painful
  i had to come and sit down. I started to feel out of breath and kinda faint. It
  also sometimes seems to happen when I'm feeling anxious. I am an IT Support Technician
  in an Accountancy, so when I'm called with a problem with someones computer, in
  which I have to go to their room and physically have a look at it, I get anxious,
  often breaking out in one of these attacks. Its extremely uncomfortable, often unbearable.
  I am going to book an appointment at the doctors. Do you think this is the same
  condition?
date: '2007-03-22T12:41:54Z'
slug: 2001-10-01-this-is-what-i-have
