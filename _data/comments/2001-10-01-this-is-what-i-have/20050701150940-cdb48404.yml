name: nisha
body: my daughter is 16 years old and 2 days back she had this attack of acute urticaria
  she has been prescribed ketasme and sizon forte and has to follow many food restrictions
  . this i feel is very difficult for a teenager as the medicine makes her drowsy.
  pls tell me how to avoid it to become a lifelong problem .
date: '2005-07-01T15:09:40Z'
slug: 2001-10-01-this-is-what-i-have
