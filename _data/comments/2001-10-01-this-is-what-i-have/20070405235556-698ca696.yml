name: Lyn
body: I was so surprised to find this site and all the comments. I have been dealing
  with this condition for 6 months. As I search the web for answers and the hope of
  a cure, I am realizing that there just may not be one. I appreciate all of you who
  reached out and shared your stories, I may not have found a cure but I feel so much
  better knowing I am not alone with this. I hope you all find joy and peace on your
  journeys itchy though they may be. If anyone discovers anything that might help
  us,please update this site.
date: '2007-04-05T23:55:56Z'
slug: 2001-10-01-this-is-what-i-have
