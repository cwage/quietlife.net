name: heidi
body: hello, I also haVE CU. It all started after a really stressful period in which
  I moved house, broke up with my boyfriend etc. I did some blood tests back then
  and a substance named cortisole was extremely high. I also became depessed at that
  period. While before, I used to go to the gym every day and did some very active
  form of exercise, i realised that I could not do that any more. No more step aerobics,
  or running or power plate for me. After a few minutes this iching, burning, prickly
  feeling all over my body accompanied from small red spots...I thought i was also
  unique, but after reading all these e mails I understand that there are other people,
  too, that suffer in the same way. It is quite frustrating, not to be able to do
  what other people enjoy in the gym. However, I am actually sure that the culprit
  is emotional stress, which caused the hormone imbalance. So, maybe antidepressants,
  a stress free life including a nice routine, diet and sleep helps. Also, I suspect
  that some birth control pills might be able to help by balancing the hormones. I
  am not sure about this, however. It is just an hypotheses. Please, if a female sufferer
  has tried this way of reducing the hives, just let me know...My email is haidocon@hotmail.com
date: '2008-06-06T09:03:20Z'
slug: 2001-10-01-this-is-what-i-have
