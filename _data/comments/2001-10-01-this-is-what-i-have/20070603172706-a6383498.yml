name: Gil Poplinger
body: 'Hey Michelle how did it go? The reason it works goes something like this: (for
  me at least) Our body is producing too many histamines in our body and there arent
  enough antihistamines to block the excess histamine, so the excess histamine come
  out through our skin creating that painful feeling. When we exercise we are releasing
  all the excess histamine which depletes our histamine supply and then our body goes
  through a refractionary period in order to obtain more histamine which gives that
  hive-free period. With more and more depletions i believe our body stops producing
  so many histamines and we dont have to "sweat it out" quite as much after the initial
  weeks of frequent exercise. Now I am almost hive free as long as i exercise a reasonable
  amount; I will truely see if this works when i enter the colder months (november
  to feb) when my hives are the worst.'
date: '2007-06-03T17:27:06Z'
slug: 2001-10-01-this-is-what-i-have
