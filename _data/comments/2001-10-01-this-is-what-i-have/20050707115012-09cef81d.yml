name: Danielle
body: I have had UC for 8 years and the hives occur on my muscles on my lungs and
  throat. So i do get red flushes at time but mainly it hurts to breath and too much
  movement (such as walking to the shops) is painful and very very tiring. When my
  CU is triggered by things like cig smoke, MSG, food dyes, perfumes etc i take a
  sedative antihistamine and a montelukast tablet (often given to asthmatics - it
  helps controls mast cells)at night and a slow releasing antihistamine each morning
  and try not to exert my self at all until I feel better (one day to a few weeks
  later). Definetly need a strong mind to help get thru this illness, so keep a stiff
  upper lip and listen to your body and learn your triggers and keep searching for
  those little things that help. If anyone has similar symptoms to me I would really
  love to hear from you. Contact me at popsriley15@hotmail.com. Cheers
date: '2005-07-07T11:50:12Z'
slug: 2001-10-01-this-is-what-i-have
