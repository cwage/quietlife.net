name: alison
body: I had an outbreak over the weekend. It starts out with my head itching like
  having million of mosquito bites, then it goes to my neck, hands and then it is
  overbearing. It sometimes burns and hurts. I have had breakouts before but this
  time my tongue swelled up as well. All I did was go for a walk. Thank God I had
  benedryl which saved me. I did go to the ER because i got light headed and faint.
  This is a horrible thing to have and no one knows what causes it.
date: '2006-05-30T19:40:02Z'
slug: 2001-10-01-this-is-what-i-have
