name: James
body: Hey again, I've finally found a cure! I started seening an acupunctuist 7 weeks
  ago, and the urticaria progressively became better and better. It is pretty much
  completely gone, and I only have 2 more appointments with her. Seriously, acupuncture
  is the cure. Just make sure you see a good acupuncturist, who is well established
  and has a good reputation. I am seeing Emily Teo in Sydney Australia. If anyone
  has any questions, just make a post, and I'll hopefully reply soon.
date: '2004-10-15T04:25:21Z'
slug: 2001-10-01-this-is-what-i-have
