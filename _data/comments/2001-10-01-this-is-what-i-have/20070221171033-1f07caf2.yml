name: Anonymous
body: |-
  I have this, I am only 14, but it is not as serious. It appears as a red rash all over my torso and itches all the way to my scalp. It came to it's worse after a warm shower, where I was presented with small, white blisters all over my body. They itched ALOT and I was forced to take an antihistamine. I cannot use any normal products for skin, like, say, Palmolive, as I end up with red blotches. I use QV soaps which seems very good for me so far, yet I still itch. I have to use Kerium as a shampoo but I can use any conditioner for my hair. I cannot exfoliate too much because my skin reacts harshly towards it, and it's always dry during the day.
  It is a very uncomftable thing to have although mine isn't as serious as the others here.
date: '2007-02-21T17:10:33Z'
slug: 2001-10-01-this-is-what-i-have
