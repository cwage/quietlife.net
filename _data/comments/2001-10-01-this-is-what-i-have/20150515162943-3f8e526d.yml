body: I do, though it's more controlled as I've learned the limits -- it's also possibly
  gotten better over the years, though I still clearly have autoimmune problems (inflammation
  & chronic sinusitis in particular) in general. i had sinus surgery in 2003 and that
  helped quite a bit, but it's hard to draw any direct causation
