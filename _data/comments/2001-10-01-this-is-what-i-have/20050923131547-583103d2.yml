name: Selina
body: Im 25 years old and I too have cholinergic urticaria. I have suffered from this
  condition for years and years now - its driving me nuts! The hives appear from my
  waistline upwards everytime I have have a shower, go swimming and go to the gym.
  Its very embarrassing in the gym when I come out in red slotchy hives and start
  the itching can be intense. I believe I have a an allergy to my own sweat as I also
  break out in an acne type rash on my forhead. I recently started to take Clarytin
  and its seems to be doing the trick. My forehead is nearly compltely cleared up
  and my hives are not appearing after a shower. I have yet to go swimming or to the
  gym, so that will be the real test. Good Luck to those of you who have this and
  hope a cure is found soon.
date: '2005-09-23T13:15:47Z'
slug: 2001-10-01-this-is-what-i-have
