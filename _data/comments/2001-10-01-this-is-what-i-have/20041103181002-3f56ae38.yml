name: Jennifer
body: I have this condition too. Very annoying. I'm 29 and have had this condition
  since high school. It manifests itself most when I exercise. I went to an allergist
  a few years ago and he prescribed Claritin (loratidine). It takes 5 to 6 days to
  get into your systems, but I've found it helps. When I exercise, wearing tight spandex
  clothing helps b/c the clothes don't rub on my skin to further irritate. Also, when
  I've been under extreme stress, I'll have an attack. Someone can just touch my arm
  and it goes up in hives.
date: '2004-11-03T18:10:02Z'
slug: 2001-10-01-this-is-what-i-have
