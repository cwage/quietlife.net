name: danny
body: Hi,i get itchy everytime i exercise or get startled,it comes on after about
  8 minutes if i exercise.I get this prickly,itchy sensation on my head,back and shoulders.If
  i drink tea or coffee,i am asking for trouble.If i walk into a hot room i get the
  itch!.Sometimes i can get it if i walk in the sun.It comes on then disappears after
  a few minutes, even if someone just scares me! The difference between my itch and
  all of yours is that i have no visible rash, there is no hives or marks. Could this
  thing be brought on by something i eat??Please advise me on what you think may help
  or what you think it is that i have????, danel@bigpond.net.au thank you!!!
date: '2005-06-02T10:35:50Z'
slug: 2001-10-01-this-is-what-i-have
