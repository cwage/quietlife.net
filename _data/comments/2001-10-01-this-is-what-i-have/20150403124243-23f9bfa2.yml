name: james
body: |-
  Im surprised to come back to this site and find my old post.
  The urticaria is still gone. No major relapses. And havent seen the accupuncturist in many years.
  Her name was Emily teo and she was in Roseville. But I think theyve moved now to Gordon.
  Sorry cant help with how she did it. But whatever she did worked. I think with complicated issues like CU, you need to find someone good. Emily teo is that person.
