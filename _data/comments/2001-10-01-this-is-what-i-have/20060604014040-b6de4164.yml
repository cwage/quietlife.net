name: carolyn
body: I keep searching sites to try to see what others are doing since the doctors
  are not much help. Zyrtec is keeping me alive. I just burn everywhere, not alot
  of itching and am red skinned, people think I have a sunburn. I wonder too if it
  will stop.
date: '2006-06-04T01:40:40Z'
slug: 2001-10-01-this-is-what-i-have
