body: |-
  Hey gyus me a 24 year old male from INDIA,i had this problem of hives i was suffering from it since an year or so... i tried anti-histamines but they are of little help..i was not in a position to stay without an anti-histamine for more than 2 days....i was also going thro a very rough emotional phase and reason iam saying all this is my hives got greatly reduced and they are not a problem now...i can say i dont have seasonal outbreak of HIVES but sometimes hives do appear but with very very less intensity...i did not use any anti histamine since 3 months which itself is a testimonial for my cure....now what i did....
  guys harmonal imbalance is the chief culprit of this hives....and excess of 'PITTA' i.e too much heat accumulated in your body gives this hives...now we need find a very natural way of treating it rather than using some anti-histamines or something else which have very less effect...i used raktashodak tablets (This is an ayurvedic medicine). This medicine is used to treat excess of heat accumulated in your blood...it purifies your blood and makes it toxic free...i used 2 tablets per day for 15 days and result was evident..Actually getting rid of hives had many bebifits for me...now iam more free,more cheerful, my productivity in the office has increased,better concentration...better emotional balance overall iam just like what i was before this attack of hives...guys hives may not be alife threatining problem but it will kill you emotionally...search on the web for the above medicines on the web find it for yourself and order them surely you will have the benefit..
