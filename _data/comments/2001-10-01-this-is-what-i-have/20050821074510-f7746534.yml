name: Pratik
body: Hey everyone, I have had CU for over a year now and while that is relatively
  not that long to have the condition, I have gone through a lot of different approaches
  to cure this problem. Like many of you, I began with the allopathic approach which
  helped very little. One thing that has proven fairly effective, however, is Periactin,
  a highly powerful H2-receptor that causes drowsiness. Recently, I have started the
  homeopathic approach and am still awaiting its highly praised results. Next week
  I'm gonna start seeing an acupuncturist, so if anyone has any tips or further info,
  please contact me at antithesispc@yahoo.com. Thanks
