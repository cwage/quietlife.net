name: Sheri
body: Hi I am 25 years old and have had CU for about 11 years now. Pretty much i get
  the symptoms in response to a variety of trigger that increase my body temperature.
  This includes warm weather,hot showers, spicy food,also some fruits and juices,
  exercise, nervousness, stress etc.. i am hoping i will grow out of it as people
  say but i dont know. I am currently taking allegra daily and atarax occassionally.
  these only seem to ease the symptoms but are far from curing it. i am a student
  so it is also difficult for me to take the atarax daily because it makes me extremely
  drowsy. i would do anything to find something to make this CU go away. obviously
  the allopathic approach has not been has effective as desired so i am interested
  in learning more about the homeopathic approaches. please share anything that has
  worked you any of you that read this post. my email address is sheripatel@hotmail.com.
  thanks
date: '2005-08-19T10:41:27Z'
slug: 2001-10-01-this-is-what-i-have
