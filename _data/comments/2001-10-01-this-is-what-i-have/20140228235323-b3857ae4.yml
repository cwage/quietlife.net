name: Angel
body: |-
  I have the worst case of Cholinergic urticaria. I have had it for about 2 years now and have absolutely no clue as to what caused it initially or more importantly what IS causing it. Because of the frequency and the severity of the attacks I have almost wanted to end my life on numerous occasions (the suffering I endured was unbearable)... I cannot exercise as I used to (so serotonin levels have declined). I Cannot stress, drink or eat hot food (sometimes). I cannot go out in cold weather nor hot weather otherwise these elements will trigger a hive outbreak. Yes, might as well live in a bubble. For those of you who do not know what happens when someone has a hive outbreak, it feels like you are being bitten by a million mosquitos at the same time and you want to literally rip your skin off you body. :/
  Well to make matters worse, In addition to this dis-ease I also have eczema, some anxiety and sinus problems! lol. Oh joy. So I have a lot on my plate to handle. I have tried changing my diet, vitamins and supplements but to no avail. The frustration that this has brought upon my life is unexplainable. Unless you have this disease you will never know how much we suffer. There was one point where I did become quite zealous and excited about life as it changed direction due to a career change and my hives disappeared for a short few months but then it came back eventually as my life settled. I kept on trying different things and I had just about given up on everything until I read that acupuncture has been helpful in the treatment of cholinergic urticaria. So I am giving it a shot...So far I have only had 2 treatments and along with the acupuncture the doctor has given me some herbal medicine to consume. I am crossing my fingers and I am hopeful that it helps. For those of you suffering from this terrible disease give it a try. And along with that please pray. Pray never goes in vain. As time and treatment progresses I will give another update. Continue on your journey and learn as much as you can. Out of mud the lotus flower blooms. Sometimes you have to surf the wave instead of swimming against it. Have courage and you will make it through. I promise. You are a beautiful human being...remember that! :)
