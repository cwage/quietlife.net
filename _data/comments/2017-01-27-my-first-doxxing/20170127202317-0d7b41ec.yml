name: R. Francis Smith
body: |-
  As one of the people screencapped above, and one wouldn't have demanded being blurred out (because I own the fact that I thought the how to guide was funny), you weren't doxxed and you can get stuffed for including me in "lynch mob", for griping about your blog being shared by some jackass while posting these Facebook names (but hey, thanks for fixing it once someone called you out!), and, I dunno, for not giving your friends of a whole passel of years any benefit of the doubt because you're all het up.

  Sorry the jackass jackassed at you, though. I think I blocked him? Not sure.

  But stop firing into the crowd, dude. Or don't, whatevs.
