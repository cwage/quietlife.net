name: Xibo
body: I always have to hear about these crazy environmentalists whine about pollution
  and global warming, but they don't have any solutions, other than forcing everyone
  to live in caves without electricity and cars, and oh yes, voting democrat. Where's
  the sensible solutions, like increased use of nuclear power? What? Not part of the
  democratic platform?? Oh, so that's what this is really about.
date: '2006-08-11T13:12:40Z'
slug: 2006-08-06-a-inconvenient-truth
