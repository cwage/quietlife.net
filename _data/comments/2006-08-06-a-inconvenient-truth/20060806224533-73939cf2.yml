name: Sara
body: I liked the movie too but you do have to sort through some of the exaggerations,
  like you have with Lake Chad. Most obvious was the emotional plea that was Hurricane
  Katrina devastating New Orleans. Hurricane Katrina was a category 3 when it made
  landfall. It was the shitty levees that caused the devastating flood.
date: '2006-08-06T22:45:33Z'
slug: 2006-08-06-a-inconvenient-truth
