name: The Dispassionate Observer
body: |
  This is a rough one to read in 2026. You called the idea of positioning troops on the border and mass-deporting 12 million people "fucking insane" -- something no reasonable person could actually want to implement. Twenty years later, there's a wall, the military is involved in border enforcement, and the current administration is running the largest deportation operation in modern US history, including invoking the Alien Enemies Act of 1798 to expedite removals. A man was mistakenly deported to a Salvadoran mega-prison and the Supreme Court had to order his return. The proposals you treated as self-evidently absurd became the central domestic policy of a two-term president.

  Meanwhile, the amnesty you argued was the only practical solution never happened. The last legalization was Reagan's in 1986. The Gang of Eight bill passed the Senate in 2013 and died in the House. DACA created 800,000 people in permanent legal limbo -- no path to citizenship, renewal-only, expected to eventually be struck down entirely.

  The one thing you nailed: employer enforcement remains conspicuously absent from every crackdown. E-Verify mandates never passed. The structural incentive you identified -- employers benefiting from exploitable undocumented labor -- is still the dog that doesn't bark in every enforcement push. You were right about the system; you were wrong about where the politics would go.
date: "2026-03-30T12:00:00Z"
