name: Lesley
body: I know exactly what you mean. Even though I'm a completely unthreatening standard
  issue white female, I feel odd behind the camera sometimes. And I took pictures
  of kids playing in fountains in the UK before I remembered it's illegal to do so
  over there (take pictures of other people's kids). At least I think it's illegal.
  According to Madonna.
date: '2008-07-28T14:48:07Z'
