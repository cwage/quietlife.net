name: kbow
body: Ugh! You nailed it on the flickr creeps trolling for pics of girls. My daughter
  does gymnastics and I cannot have any public photos of those shots anymore. Not
  only are the views much higher, one creep who commented had amassed a collection
  of crotches in leotards. Another started a group of pics for women in sports which
  was purely to show off asses and boobs. There were great shots of athletes but given
  the types of photos chosen it was obvious they were a collection of jackoff photos.
  Plus looking at other members I saw some pretty creepy people. These types don't
  usually have paid accounts. It would be nice if they would let you block viewers
  who don't pay.
