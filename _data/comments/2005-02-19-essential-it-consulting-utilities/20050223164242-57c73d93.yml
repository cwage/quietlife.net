name: Meatnog
body: |-
  Another REALLY good util to have and burn to a CD (by itself) is #1-TuffTEST ([http://www.tufftest.com](http://www.tufftest.com "http://www.tufftest.com")).

  When a machine starts crashing, and you've exhausted all the software causes, it is time to investigate hardware problems. TuffTEST does a great job of that.

  You can burn it to a bootable CD: ([http://www.tufftest.com/faq...](http://www.tufftest.com/faq-tt.htm#20) "http://www.tufftest.com/faq-tt.htm#20)")

  Since I can't find MemFree86 I use this now.
date: '2005-02-23T16:42:42Z'
