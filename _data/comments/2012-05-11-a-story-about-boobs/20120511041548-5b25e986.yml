name: TheFact
body: When I think of a child nursing til 5 I think of the child from Game of Thrones.
  It is just weird. Humans were not meant to nurse that long, in general til the last
  several hundred years we have had a lactose intolerance. The reason being is that
  we are the only animal that drinks milk past infancy.  So it is not natural and
  has never been accepted.
