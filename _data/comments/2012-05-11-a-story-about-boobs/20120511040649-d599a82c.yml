name: chotiius
body: I nursed all my children until at least 2 years. My eldest nursed to past 5.
   After about the age of 18 months, however, nursing was typically accomplished at
  home unless somebody fell down/bonked their head/scraped a knee, and immediate soothing/stopping
  public shrieking bloody murder was more important than what strangers might think.
  I don't care if people use a chair (I found a couch far more comfortable) but even
  I, an unrepentent extended-nursing mama, find that particular picture offensive
  for all the reasons you give. Sigh.
date: '2012-05-11T04:06:49Z'
slug: 2012-05-11-a-story-about-boobs
