name: Jon
body: |-
  Ahh but context counts. Just prior to the bit quoted, he also said:

  "I just the other day got... an Internet was sent by my staff at 10 o'clock in the morning on Friday, I got it yesterday."

  Apparently believing that the delay in his receiving "an Internet" was due to his tubes being clogged by all those enormous amounts of materials.

  So even if it's not a bad analogy in and of itself, he clearly didn't have a clue what he was talking about, he was just spouting the rhetoric he'd been fed by anti-net-neurtrality telco lobbyists.

  But I think the "humor" is best found found in the audio version. The \*way\* he says it, he really comes off as Grandpa Simpson angrily ranting and shaking his fist at the clouds.
date: '2006-11-16T17:11:27Z'
