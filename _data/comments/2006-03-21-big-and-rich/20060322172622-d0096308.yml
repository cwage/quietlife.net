name: Tim W.
body: |-
  Wow—everything about them, from their Web site, to their "image," to their names, is powerfully repulsive. And as you said, couple that with the fact that they may or may not have sent a "scout" to that event that you and Amanda attended to drum up some business, and you have gang o' true-blue bottom-feedin' biznesspeople. Yuk.

  -Tim
date: '2006-03-22T17:26:22Z'
slug: 2006-03-21-big-and-rich
