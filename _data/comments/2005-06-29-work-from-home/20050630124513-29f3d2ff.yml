name: cwage
body: |-
  I am inclined to agree with you -- to some extent. I agree that working from home "blurs the lines" between "work" and "not-work", but this raises all sorts of issues to me about why we should feel compelled to divide this line so harshly.

  It reminds me of Kevin Carson's "[commodified rebellion for the wage-slave](http://mutualist.blogspot.com/2005/04/commodified-rebellion-for-wage-slave.html "http://mutualist.blogspot.com/2005/04/commodified-rebellion-for-wage-slave.html")" post (I read it every morning before work to get me pumped up!):

  > This insistent denial, this clutching at any psychological defense against the sheer repugnance of a "job," this desperate need to believe that "this is not really us, this is not what we really do," is quite understandable. We don't cut loose our values, our priorities, our judgment, and our dignity, and leave them at the door when we enter our homes; but that's exactly what we do in our existence on the job. For the majority of people throughout history, for the majority of Americans until around a hundred years ago, "work" was something we did on our own turf: the farmer or tradesman planned the order of his tasks as he saw fit, and carried them out from beginning to end in accordance with his own judgment and sense of workmanship. A "job," on the other hand, amounts (as Berry said) to being somebody else's tool. And the main reason for the change, a dead horse I've spent a considerable amount of time beating in this blog, is: [We Was Robbed](http://www.mutualist.org/id71.html "http://www.mutualist.org/id71.html")!
  >
  > What's more, it's utterly unnatural. As a commentator on the local public access channel recently pointed out, we're biologically designed to respond, when somebody won't stop following us around and bugging us, by either kicking the crap out of them or getting away from them. But for eight hours or more at a time, we're put into a situation where we're expected to smile and nod, instead. No wonder so many people who get tired of smiling and nodding show up on the six o'clock news.
