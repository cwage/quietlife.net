name: Katherine
body: There's always some good to come of these things, but I come away with the sense
  that it's often more about the bake-sale organizer/t-shirt seller/bike rider's sense
  of self-satisfaction. "Hey, I'm riding to cure cancer. Will you sponser me? The
  cost of the ride is $300." The ride organizers then take about $275.00 for SAG stops,
  rider t-shirts, follow cars, event insurance and ambulance rental. So $25/rider
  goes to charity, but everyone gets a cute t-shirt.
date: '2005-09-04T23:55:55Z'
slug: 2005-09-04-faux-charity
