name: Cubes
body: Then again, maybe the people who buy stuff from charity events ALSO gave $20
  to the Red Cross. Or maybe they hadn't gotten around to it, or hadn't even thought
  about it (hard not to know about disaster relief, but lots of other organizations
  aren't all over the news for weeks on end) but this brought whatever the cause is
  to their attention, so they bought a muffin.
