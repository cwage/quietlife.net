name: Anonymous
body: 'I can tell you what really annoys me: People who complain when individuals
  do whatever they can to assist in supporting relief efforts in response to an overwhelming
  tragedy. And what''s "faux" about raising real money for real relief efforts. I
  go to work and get paid and decide to give some of that money to the Red Cross.
  Is that also "capitalism" posing as a charity? I''ll stop there before saying what
  I really think about your pathetic annoyance.'
date: '2005-09-05T00:32:08Z'
slug: 2005-09-04-faux-charity
