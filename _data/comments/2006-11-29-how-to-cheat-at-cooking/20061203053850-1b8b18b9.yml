name: Aunt B.
body: Shame on you, Scott. Lest you forget, I was there in the menage a trois when
  you told Ed Pawlowski that "homemade peanut butter blossom" was your special code
  with him. Do you have any idea how hurt he's going to be to learn you use that with
  all the Pennsylvania mayors you know?
date: '2006-12-03T05:38:50Z'
slug: 2006-11-29-how-to-cheat-at-cooking
