name: doug
body: heh. so true. that reminds me, a friend of mine who used to work at a very popular
  jamaican chicken place here in Nashville (they have several locations...) said that
  the secret to all their goodness is sugar. lots and lots of sugar. in everything
  - the sauce, the chicken, the beans, the rice, etc...
