name: Amanda
body: |-
  amen. Chris and I harbor fantasies about some day opening a restaurant called "Fancy Restaurant" where we will make, among other things, a self-respecting house salad. And it will be the greatest house salad that ever was!
  But seriously...a salad like the one you described just doesn't make sense. It's like that thing you are always talking about, how in business companies will forgo a technology expense in the short term and get bent over in the long term. In buying crap ingredients to save money in the short term you end up alienating a potential regular customer in the long term. And unlike technology which I am generally ambivalent towards I AM VERY PASSIONATE ABOUT FOOD!
date: '2005-05-20T23:48:01Z'
