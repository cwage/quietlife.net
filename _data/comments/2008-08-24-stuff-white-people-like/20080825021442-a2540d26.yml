name: Random
body: I might even suggest coastal-dwelling, but otherwise, spot on. About 80% of
  the stuff I ever saw on the site mystified me, because apparently lower middle class
  rubes from flyover states need not apply. And the other 20% made me wonder why it's
  supposed to be so funny. Because I'm such an uncool white person? No idea.
date: '2008-08-25T02:14:42Z'
