name: Lesley
body: I don't hate the site, but I see it as rather pointless for me to read because,
  well, I am white and about 90% of it is true for me. But when our Indian (by ancestry)
  brought the book in and laughed at it, I realized that maybe it has its place for
  teaching other people about us standard issue bourgeois white folk.
date: '2008-08-26T20:17:51Z'
slug: 2008-08-24-stuff-white-people-like
