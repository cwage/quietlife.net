name: Kate O'
body: |-
  I had never seen [blackpeopleloveus.com](http://blackpeopleloveus.com "blackpeopleloveus.com"). That IS funny.

  I hate [stuffwhitepeoplelike.com](http://stuffwhitepeoplelike.com "stuffwhitepeoplelike.com") too. Not only for the reasons you say, but because it makes it seem like it's somehow really uncool to like the stuff white people like, ESPECIALLY if you're not white. And that just seems like a guilty form of elitism.
date: '2008-08-24T21:50:57Z'
