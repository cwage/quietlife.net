name: Stano Scepan
body: |-
  I love that piece of music - its like it has some kind of a cosmic relevance to everything - life, time, space... . Those strings are fabulous. Goosebumps guaranteed. I put it on repeat in my iTunes and listen to it for a half hour over and over. Puts me in a different world. Mancini was a genius. Thanks Henry :-)
  Stano
