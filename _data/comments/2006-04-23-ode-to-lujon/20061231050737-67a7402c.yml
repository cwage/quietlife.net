name: Dave
body: This is an Amazing song! I quite often fall in love with a song, for a while,
  but it eventually passes. I've listened to this two and a half minute clip at least
  50 times and it still transports me to, well, the most beautiful, thrilling place
  I can imagine. It's like I'm in a classic '50s foreign film having an epic love
  affair. I never want it to end. And oh, the strings... So sensual, almost painfully
  beautiful. I first heard 'Lujon' while watching the fantastic "Sexy Beast". The
  way it's used in the film is genius!; the grill flame-up, the close friends joking
  around, and the chemistry between Gal and Deedee (loved the smoke ring) culminating
  in a floating love scene, the likes of which have never been seen before. This is
  not just any song. Thanks H.M.!
date: '2006-12-31T05:07:37Z'
