name: Paul
body: In my opinion, this piece of music is what Mancini was all about ... he takes
  a person to a far away place with such a simple but amazingly wonderful tune. The
  blend of the instruments is near perfect and so soothing. Like you say Stano, goodsebumps
  are definitely guaranteed! I have looked for this for a long time and thanks to
  you, I finally know where I can get my own copy of this incredible tune.
date: '2006-10-13T16:49:27Z'
slug: 2006-04-23-ode-to-lujon
