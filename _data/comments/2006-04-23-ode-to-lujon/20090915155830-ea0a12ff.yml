name: John
body: Emmers, I too just discovered this Mancini song while watching Two Lovers. I
  have a huge collection of Henry Mancini's music and thought I had just about all
  of it. I searched just about all the movie song list before I said to myself, this
  can't be Mancini, because the strings are too elegant; was I surprised. Should have
  known when the trombone was heard. This one is a life changer and there aren't many
  left for this old 67 year old.
date: '2009-09-15T15:58:30Z'
