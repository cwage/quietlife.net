name: Deborah
body: 'Since I was the person acting as the penis ad litem in your behalf (otherwise
  known as your mother)....I am sure glad to see your vote of HOORAY in the No circ
  camp. Whew. Check. Of course now that I \*DO\* circumcisions I feel further vindicated
  to share the "my sons are not circumcised...." schtick when asked the inevitable
  "What would you do?" of course, only after the current AAP recommendations re: circs
  are carefully and clearly discussed with the parents.'
date: '2007-06-23T03:10:31Z'
slug: 2007-06-18-hooray
