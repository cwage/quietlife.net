name: Phil's Girl
body: |-
  Good article. I circumcised my first son because I didn't know any better. I never even thought about it at the time. I felt so bad after he had his surgery. He cried and cried and the little thing just looked so raw. I'm due with my second baby boy in 11 weeks. I won't be circumcising him. My family is concerned that he will feel different from his brother and dad but I don't think it will be an issue. I've asked my friends who have a husband one way and a son who is the opposite. They've said it's never been an issue.
  Anyway, the good news about this report is hopefully parents will at least think about what they are doing and give a great deal of thought to it.
date: '2007-06-21T08:15:21Z'
slug: 2007-06-18-hooray
