name: Sherry
body: Pricedline is a major rip off!!!!! I put in a price of $115 each for 2 tickets
  from Tampa to Raleigh and my price was accepted...that was great till after they
  added nemerous charges to that price! What should have been $230 is now $324 which
  is almost $30 MORE than US Airways has the same flights for. I tried calling and
  getting help but was hung up on both times with them sayign there was nothing they
  could do!! BEWARE of this company!
date: '2004-03-07T14:27:40Z'
slug: 2002-09-12-priceline
