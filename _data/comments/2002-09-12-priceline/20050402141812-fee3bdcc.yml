name: Don Cheshire
body: |-
  Jan 310 2005 Wife wanted 5 RT air for 5 to St. Louis from Sac.CA for Easter Break (March
  Entered my CC data and placed bid.(Bid was not confirmed as accepted) Thought her CC was not valid or ? so used
  another CC from her mother. (Both credit cards were with same bank) Mothers card was accepted and 5 tix were confirmed
  with Delta. Things appear OK at this point.....Next day (Monday) checked e-mails and discovered trip was booked on
  both cards but 2 different airlines. (Delta and American) Immediately contacted Priceline which is a waste of time as
  you can see from other terstimonials.......Attempted dispute with CC company. Sent all data and waited for an answer.
  After several weeks they sent a chicken sh..... letter declining reversal(1580 dollars out the door) Ouch. How can 5 people use 2 airlines for the exact same trip, leaving the same day from the same airport ? Cloning must be the answer....

  Priceline failed to do the proper thing and American Airlines stated not their fault......Why couldn't they refund the
  tickets if Priceline had already credited their account minus their commission. I would think 2 months before actual flight would be enough to reverse fees and such....Bank has no backbone at all.....!!!!!

  I will continue to fight for what is correct.....

  Anyone who can help please e-mail me don1733@hotmail

  Stay Tuned

  DC

