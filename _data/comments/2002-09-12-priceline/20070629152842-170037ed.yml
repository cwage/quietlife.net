name: RON
body: I love Priceline. I have used them for years and have stayed in the nicest hotels
  all over the country for next to nothing. My whole family just flew to Disney World
  and stayed at the Hilton on property in one of their finest suites with airfare
  for less than what a regular hotel room would have cost. Yes Priceline does refund
  your money in certain circumstances I was booked in a hotel that was absolutely
  filthy (they weren't even changing their sheets between guests) and I called Priceline
  and they promptly booked me in a hotel near by and refunded my money. But you have
  to have a good reason. I read all of the above postings and they are full of people
  who did not read what they were buying or they changed their minds about their trip.
  Priceline was not at fault. I have used them over 100 times and have always come
  out way ahead. A Priceline fan!!
date: '2007-06-29T15:28:42Z'
slug: 2002-09-12-priceline
