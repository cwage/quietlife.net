name: Complexity
body: Priceline is so over-rated, it sucks !!! They claim you can set your own price
  and then when you do, they give you the same price $ as the other airlines. Q. What's
  the point in choosing them, if the price is the same as others ? They also cheat
  you out of your so-called refund. I wound not recommend them to anyone. Stick to
  the other airlines. Kiss my ass Priceline...
date: '2010-04-02T01:40:51Z'
slug: 2002-09-12-priceline
