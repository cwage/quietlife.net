name: Greg Shaw
body: |-
  Ad me to the list of PRICELEINE suckers,... after booking a flight on the PL website, it asked if Id like a car rental at the "guaranteed lowest price" so I clicked yes,.. (WRONG MOVE) after the transation was complete, the (Hertz)car rental was $400.63 !!!! WHAT !!! So, right away I went back on the site and found a car through Budget for nearly half that cost, (on [priceline.com](http://priceline.com "priceline.com"))..I called customer service (what a joke) finally when I got someone to talk to, they assured me that they would give me the lowest price and rebook the rental, but they could not do it now. They claimed the computer's were currently down, but assured me it would be done. After not hearing from them for several days I called back to see the status of the rental. Now their story changed, and said that no changes or cancellations can be made. So,.. I personlly booked the rental through Budget for nearly half the cost,and to this day have not recieved refund for the rental that I NEVER USED !!!!
  I called Hertz and they said that they never charged Priceline for that rental,...which means, Priceline has charged my credit card for a service that they did not provide, nor did they even pay Hertz for !!!! I am out $400.63
  Looking for answers,...I have even written to the VP of the PL, nothing but dead ends, they keep saying "No changes No refunds"
  Any help appreciated; xrgshaw52@cs.com
date: '2005-04-22T15:58:55Z'
slug: 2002-09-12-priceline
