name: Lorri
body: Must I post a copy of my contract on here. You are condescending (yes I spelled
  that right asshole), and their policies are unclear. Nowhere on their web site does
  it say no cancellations, refunds or blah blah blah whatever your piehole spit out
  of it. You must work at thiefline. Hate to tell you, but when they give your car
  away to someone else and book you for rooms that you didn't book in the first place
  that's fraud. I booked one hotel specifically and they gave me an entirely different
  hotel of lesser quality without my permission. So keep talking \*^&% nobody's listenening
  to you.
