name: tricked
body: At first some years back I also used to use priceline a lot for air tickets.
  However, last time I used priceline I made a bid for an airplane ticket to try to
  get the best deal I could get; however,I got the worst flight with a stop each way
  and very bad flight times. Even though they had listed better flights with one-stop
  for one-way and non-stop for the return flight for the same price I bid for. Their
  contract says that they search for non-stop flights first but that's not true. I
  complained that they gave me the worst flight but they were very unfriendly.
date: '2007-01-06T19:58:50Z'
slug: 2002-09-12-priceline
