name: jardinger
body: i have to agree with the priceline rep. everyone needs to read what they are
  clicking ! i have used priceline many times and save up to 90% off listed hotel
  prices using the name your price feature. i Never sign into my account until i have
  found the deal i want, i never put a credit card until i again have found the deal
  i want. we are able to get all the way to booking it before it is needed. just choose
  the continue without it option. just like you should not enter a email address until
  you have proof read the email, to avoid accidentally sending out early.
date: '2011-01-27T06:50:04Z'
slug: 2002-09-12-priceline
