name: Felice Makowsky
body: Purchased tickets for a flight thru Priceline and went onto the airline's site
  to check their prices; Pricline was almost double! They would not refund my tickets
  nor reimburse the difference!!! Do not make purchases with Priceline- their 'guarantee'
  is a sham!
date: '2010-01-18T19:00:33Z'
slug: 2002-09-12-priceline
