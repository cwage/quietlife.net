name: Dissatisfied Customer of Price
body: |-
  This is something I don't do is make formal complaints, because I don't want to seem like a trouble-maker, because I recognize that some things are beyond the airlines' control (they can't stop bad weather, for example), or because I just want to get where I'm going without enduring the additional fuss and delay that following company procedures to register an official complaint would require.

  I generally fit into this category: unless I'm the recipient of some egregiously bad treatment, I don't want to disrupt my schedule and expend even more time and effort filing a complaint that probably won't produce any tangible results (and the hassle of having to fill out a complaint form vitiates any satisfaction I might get from the act of complaining itself).

  Frankly, the worst experience I can recall having with an airline in the last several months was when I had to postpone my flight.On May 15,2005 there abouts I was told by a representative from your company that I could either mail the tickets back to your location in Norwalk,Ct. or go directly to a ticket counter of Air Tran, and they could handle it there.I chos to go to the Air Tran ticket counter at Newark airport, where I was told it doesn't work like that, and I would need to mail the tickets to Lowestfare/Priceline.This was the first piece of erroneous information I received from your "knowledgeable professionals". Since this time I spoke with Scott(agent #7142) on 9/11/05 who transferred me to a department that could not assist me, in this customer issue. After being put on terminal hold and eventually disconnected, I called back again on 9/11/05 and spoke with Melanie M, out of your Salt Lake City location, who changed my itinerary to the dates of 9/29/05 to 10/3/05 for return, and informed me again that the differnce in price that I owed would be $65.00, again the voice of one of your "knowledgeable professionals". Melanie M. also gave me locator number MQCXER, and told me the itinerary number would remain the same, and she would send off the changed itinerary to my e-mail in 5-10 minutes. I called back on 9/12/05 to get a copy of the itinerary to which your company had record of any changes, but it wasn't confirmed with Air Tran, at this time I spoke with Ron, again a "knowledgeable professional", that took my phone number and said he would call me back shortly, and again I waited all day and received no call. On 9/12/05 after continually receiving the run around I went on-line and and sent an e-mail to customer support. In that email I stated my e-mail address and phone number, they sent a response back to @.com asking me to give their customer service number a call and reference number ###########, my efforts to contact someone using your on-line communications were to have someone call me with a resolution. On 9/13/05 I tried to do this all over again, starting from scratch each time because the itin #: was still referencing the intial trip, to which no changes had been made. I spoke with Diana who was very helpful, who transferred me to Ron who I spoke with the day before, and he tried to act as though it was our first time speaking. At this time he told me he was having trouble reinstating the flight arrangements, and I asked at that time was it to much to call me back on 9/12/05 as you said you would with an update? I have been in the sales/customer service field for the past 15 years, and I know enough to know that this type of customer service would not be accepted, and grounds for reprimand. Each time I asked to escalate the issue to a management person, and each time I was told there was no one available, except for one, when they put me on hold and eventually I was disconnected after waiting 20 minutes. I am writing this letter asking for some type of concession for the poor customer service I received from your "knowledgeable professionals". Can you upgrade my flight to first class, take on the cost of the change fees,and or offer me some type of good will gesture that would suffice for the inconvenience, and poor professional service received? I would appreciate a reasonable reconciliation to this matter.
  Dissatisfied customer of Priceline/[Lowestfare.com](http://Lowestfare.com "Lowestfare.com")
  New York City
date: '2005-09-13T21:37:58Z'
slug: 2002-09-12-priceline
