name: JOe
body: Priceline sucks. I live near Washington, DC and had the misfortune of trying
  to get a flight via Priceline durring our recent monsoon season. The short version
  is I missed my flight and couldn't get Priceline to waiver on rebooking me on some
  other flight. So now I'm out the cost of 2 tickets that I'll never see and to top
  it all off I missed the last chance to see my father before he died, all because
  Priceline hides behind their NO REFUND UNDER ANY CIRCUMSTANCE policy.
date: '2003-06-23T17:16:36Z'
slug: 2002-09-12-priceline
