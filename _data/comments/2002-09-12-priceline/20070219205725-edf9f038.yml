name: bill b
body: Annie I have been scolling down and reading your posts and your proud of this?
  It truly baffles me that you like the fact that so many are dissatisfied! Why are
  you taking such great pleasure in others misery regardless of wether you feel they
  deserve it or not over reading a simple website. Do you feel they have committed
  some horrific crime against humanity and deserve what they get. It saddens me when
  someone takes such delight in making others miserable but it doubles when they feel
  the must Shout I told you so. Personally I would eventually examine my motives and
  wonder why. But then again I try to treat others as I would like to be treated.
  When I can I try not to add insult to injury and do no harm unless absolutely nessesary.
