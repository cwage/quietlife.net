name: Allen
body: |-
  I purchased a roundtrip ticket from [Priceline.com](http://Priceline.com "Priceline.com") for a flight from Buffalo, NY to Skojpe, Macedonia. The return flight had me flying from Skojpe to Rome, via Macedonia Airlines, at 7am local time and arriving in Rome at 9am. I had a 1:30pm flight from Rome to Newark NJ, via Air Atlanta. I was to take a shuttle from Newark Airport to JFK Airport for a Delta flight to Buffalo, NY.

  While in Macedonia, I learned that Macedonia Airlines did not have a 7am flight to Rome. Their first flight was not until 2pm. I went to there coroprate offices in Skopje and got documentation of this to present to priceline on my return. I was forced to overnight in Rome and take a flight the next day.
  Upon returning to the States, I contacted priceline (aftering waiting on hold for 25 minutes) and after explaning everything, was told that there was nothing they could do for me. In continued discussion, there customer service representative became ruder and shorter. I refused to accept this answer as they were responsible for selling me a ticket for a flight that did not exist and I expect repayment for food and lodging costs which came to almost $200.00. My efforts to reclaim this is not over.

  PRICELINE SUCKS is an understatement.
  I'll never do business with this company again and I suggest, if your reading this, that you stay away also.
date: '2007-11-04T01:40:03Z'
slug: 2002-09-12-priceline
