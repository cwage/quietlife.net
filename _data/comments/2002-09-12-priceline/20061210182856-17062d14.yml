name: Annie Nomuss
body: Just so you know, the rates that priceline puts through on the website are actually
  loaded by central reservations. Your hotel's central tells priceline what rate to
  load for each night... also aaa discounts and other little loyalty program issues
  do not apply to priceline. just some food for thought
date: '2006-12-10T18:28:56Z'
slug: 2002-09-12-priceline
