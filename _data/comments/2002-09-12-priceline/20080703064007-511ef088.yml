name: Lilie
body: Is it possible that we can let this unethical company rip all of us off? Isn't
  there enough of us to get together and do something about it? Honestly! They will
  continue doing this until we do something definite to stop them. What they do to
  people is unfair and we should fight against them. Remember, villains only can live
  as long as the coward allows them. No more useless complaining on blogs, they don't
  care, let's sue them and get our money back!!!!
date: '2008-07-03T06:40:07Z'
slug: 2002-09-12-priceline
