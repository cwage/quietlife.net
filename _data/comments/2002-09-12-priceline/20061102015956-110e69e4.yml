name: Tony
body: Well.. the consumer will not forgive Priceline either. Everyone please understand,
  if you want to hurt Priceline.. go after their food.. Don't use their partners..
  and tell them why. Priceline "partners" are much more responsive than Priceline..
  Make the Priceline partners know you will not give them business until they cut
  the ties with the Priceline crowd. Yep.. just walk up to the counter at the airport
  while your waiting on a flight (you have time anyway)... Go to the Delta counter
  and ask for ticket prices.. get the representatives interest... and at the last
  possible moment, ask if they work reservations through Priceline.. (they will say
  yes) ... then say, oh sorry.. and just walk away. If nothing else it will make you
  feel better!! I have written MANY letters to the major Pricline partners.. you would
  be surprised at the response. They do understand!!!
date: '2006-11-02T01:59:56Z'
slug: 2002-09-12-priceline
