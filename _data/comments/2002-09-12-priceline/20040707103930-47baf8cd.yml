name: ckn
body: 'I used Priceline for the first time and was nervous ASAP as you must put in
  your billing information first before even looking at hotels. Anyway, I put in an
  amount I wanted to pay, and received their next page stating ''sorry, we cannot
  locate anything for that price''. I went on vacation and when I got back, they had
  charged my bank account and wiped me out! I had never received any emails, itineraries,
  nothing at all (and I check my junk folders every day too). When I called my bank,
  they gave me the number for Priceline to dispute the charge...I spoke with customer
  service rep Scott and was told they had no record of anything associated with my
  name and information, and to sort it out with the bank etc. I had to dispute with
  my bank again, but then they forced me to work it out with the ''merchant''. I spoke
  to another customer rep Pam and her supervisor Cynthia, and they flat out told me
  that they knew I was unaware of their transactions (their system noted that emails
  sent to me were never opened) BUT I would NEVER get my money back... they say they
  charge your card right away, but if thats true, why was I charged on the 10th instead
  of the 3rd, when I looked at their site? Although this time, they suddenly had my
  name and information, and when I pressed them about it, they said I could write
  a letter to the senior vice president ''who is a rep of the corporate office and
  will tell you the exact same thing: no changes and no refunds''. Cynthia says they
  do not make ''fraudulent transactions'' but a rose by any other name.....what other
  definition can you give this? Don''t even go to their site like me or your card
  could be charged without your knowledge and they won''t do a damn thing about it.'
date: '2004-07-07T10:39:30Z'
slug: 2002-09-12-priceline
