name: Sofia
body: Hi i'm sorry what's happend to you i'm making this comment not just for you
  but for everybody else who had been ripped off by priceline,everybody needs to take
  to court small claims court businesses like this,and what these people doesn't want
  is a bad rep.So i think these people doesn't want to be on television,because they
  like to hide behind the computer screen,phone lines facelesly i very highly recommend
  Judge Judy,or any other television judges to take your case to because if we just
  gonna complain about it they still laughing saying complain as much you want i still
  have your money and i keep it no matter what...ha ha ha.Think about it that way,hopefully
  it's gonna be motivating to fight for your rights/your hard earned money..good luck
