name: mary gilmore
body: |-
  I had to buy a ticket with little advance notice as my mother had a medical emergency.
  I bid on tickets from DC to Springfield Missouri. An offer for a few dollars more came back in large red letters. If you click on it, you accept the offer. I did that. I clicked on the increased price. Later the itinerary came back to the wrong destination

  Customer service said I had accepted the wrong destination and it would not be changed. I knew I had clicked on a price increase but never a place change. I asked to see my acceptance. They sent the page. There is no line where I said I will be willing to bid on an alternative destination prior to starting the bid process.
  However when the alternative price comes back, in small print, in a separate cell across from the price option is a line that shows a changed destination.

  No customer would ever expect to pay for something never requested. I did not think for a minute I was bidding on on an alternate destination in addition to an increased price.

  They have refused to let me change or give a refund. It is obvious they have this complaint repeatedly as both representatives repeated verbatim, and rotely their response that by clicking on an alternative price, I had agreed to change the destination.
date: '2005-08-09T17:28:18Z'
slug: 2002-09-12-priceline
