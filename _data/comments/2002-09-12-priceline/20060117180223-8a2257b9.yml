name: RJ
body: I've been through one of these things...these no refund policies are full of
  BS...well what you can do is 'sue' them...the other option is to write to your state's
  attorney general's office explaining the situation. There is a high chance they
  would take punitive action against Priceline. More and more of these from you guys
  would make sure Priceline has to shut down. That would teach the cheap-ass MFs.
date: '2006-01-17T18:02:23Z'
slug: 2002-09-12-priceline
