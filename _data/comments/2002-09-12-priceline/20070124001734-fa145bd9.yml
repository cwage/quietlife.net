name: John
body: Wal-mart is a rip-off, to. I went in their an bought a tube of toothpaste. I
  used it to brush my tooth, then found out it was speermint. I wanted wintergreen.
  I went in to get my munny back. They wouldn't give it back! I'm never going bakk
  in their again!
