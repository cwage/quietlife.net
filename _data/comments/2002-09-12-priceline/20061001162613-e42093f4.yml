name: DR
body: Just for fun, I was looking on priceline's website for prices at the hotel I
  work at. Supprisingly, the priceline rate was only slightly cheaper than the rate
  the hotel was selling at that day. Later, I would did the same thing and found out
  that the hotel was selling at a rate actually CHEAPER than priceline's rate. Therefore
  if someone would book a room off of priceline they would be paying more for a room
  that they wouldn’t be able to guarantee a room type on. Therefore there would be
  absolutely no reason for someone to book off of priceline. I then checked for future
  dates and found out that priceline was selling at a rate that was probably much
  higher than a rate the hotel itself was going to sell at. Didn't priceline had a
  lowest price guarantee? I notice that this slogan is no longer on thier website.
  Maybe they were forced to take this off because it is not accurate. Never use priceline,
  just go through the hotel instead.
date: '2006-10-01T16:26:13Z'
slug: 2002-09-12-priceline
