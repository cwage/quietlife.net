name: James
body: Mrs. Nomuss, what your company does is misleading, offensive, and unecessary.
  I booked a 5 star hotel through Priceline, expecting that it would include use of
  the pool and fitness center. (which their website clearly says 5 star hotels will
  include). Upon check in I was told that the price I paid through Priceline does
  not include these 5 star amenities, and that I would have to pay an additional $20.00/nt
  to use their business center, pool, or fitness center. You might want to check your
  Iron Clad contract and see if it mentions anything about the "bait and switch" tactic
  in which Priceline is involved. Class Action Lawsuit would be nice justice.
date: '2010-02-18T18:46:56Z'
slug: 2002-09-12-priceline
