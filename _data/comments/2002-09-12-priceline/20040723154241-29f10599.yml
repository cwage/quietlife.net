name: Anne Marie Greene
body: "Following is information regarding my Pricleine claim that I have submitted\
  \ to Horwtiz, Horwitz, & Associates, a Chicago law firm handle a class action suit\
  \ action Priceline (312-372-8822), the Better Business Bureau, and my credit card\
  \ company.\n\nI \"won\" a 3-night hotel stay in NY at [Priceline.com](http://Priceline.com\
  \ \"Priceline.com\") for $140 per night. The disclosure clearly states that it is\
  \ for double occupancy for two adults and that any specific requests for bedding\
  \ (king, queen, or two doubles) would need to be arranged with the hotel. PL also\
  \ clearly discloses that they do not guarantee a specific bed type request. I bid,\
  \ as 30 days until my travel date provides ample time for the hotels to accommodate\
  \ such a basic request.\n\nAfter winning the bid, I contacted the hotel only to\
  \ discover that two double beds are not even an option. This specific request, which\
  \ is listed as a double occupancy option on the PL bid page, at this particular\
  \ hotel, is actually an upgrade. If I wanted two double beds, I would have to pay\
  \ an additional $90 per night for a total nightly charge of $230 - an increase in\
  \ price of 61%.\n\nWhen I initiated my bid, it was disclosed to me that double beds\
  \ were, at the very least an option, for my bid of $140. I have discussed this issue\
  \ at length with both PL and the hotel with no resolution. Bottom line: If I want\
  \ two beds it will cost an additional $270 for the three-night period. This increase\
  \ will place this package price higher than many similar offers available through\
  \ other discount providers and hotel direct offers currently available for the same\
  \ product.\n\nIf a PL offering may exclude one of the bed types it should clearly\
  \ say that. (ie: Certain hotels may not offer the particular bed types listed as\
  \ examples.) Further, if one of the bed types listed as an example may only be available\
  \ with a surcharge, this should also clearly be disclosed. (ie: Certain bed types\
  \ at certain hotels may only be available for any additional surcharge.) And, is\
  \ this surcharge is anything other than nominal, defined by Webster as token, small,\
  \ insignificant, etc., than that should be disclosed as well. (ie: Surcharges for\
  \ certain bed types at certain hotels may be as much as an additional 61% - or whatever\
  \ the maximum might be \x96 of your winning bid price.)\n\nAt this time, I would\
  \ either like a refund for the entire amount of $490.86 or for the opportunity to\
  \ reserve a room at the hotel with two double beds at the rate of $140.00. The hotel\
  \ will not reserve a room at this rate without the additional $270.00 \x93upgrade\x94\
  \ surcharge.\n\nOf course, after a combine three hours on the phone with two Priceline\
  \ reps and the hotel, they claim that although these are exceptions, there is nothing\
  \ they can do."
date: '2004-07-23T15:42:41Z'
slug: 2002-09-12-priceline
