name: ANNIE'S MOM
body: 'heyooo. you''re a cool lady...SIKE (: i love you. i think you should stop being
  a little heartless telephone sucking pepsi can. go buy a heart from priceline..OH
  WAIT YOU MIGHT GET RIPPED OFF.Yeah thats right. Your cheap little boss might rip
  you off. And tell me this, why the hell are all the people on all of the other sites
  satisfied? Because they give the customer some flexibility and they understand the
  position of the customer. Another thing, why the heck do you even care? you''re
  filthy rich boss gets the money anyways. All you see is a few of his scraps. Now
  go flush your toilet. wanna stick your head in? then type. im cute youre not. im
  older than you cuz i know what youre thinking. oh and before you go on correcting
  peoples'' spelling, learn some grammar first, k? i aint trying to prove anything
  so im not correcting this, but feel free with your time with Priceline...hey look
  i capitalized the p cuz its a PROPER NOUN. get it? i hope so. well did you carry
  on that im not your mom yet? ohhh wait til you get home. hehehe. soy tu mama. BYE
  BYE HAVE FUN.'
