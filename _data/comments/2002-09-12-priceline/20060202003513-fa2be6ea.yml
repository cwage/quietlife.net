name: James Layne
body: Actually, you should contact the Connecticut Attorney General's Office, not
  Delaware. For some reason, I thought that Priceline operated out of Delaware, but
  they actually operate out of Connecticut. File a complaint by going to [http://www.ct.gov/dcp/cwp/v...](http://www.ct.gov/dcp/cwp/view.asp?a=1629&Q=274424&PM=1
  "http://www.ct.gov/dcp/cwp/view.asp?a=1629&Q=274424&PM=1") or calling (860) 713-6050.
  If enough people complain, something will be done about it.
date: '2006-02-02T00:35:13Z'
slug: 2002-09-12-priceline
