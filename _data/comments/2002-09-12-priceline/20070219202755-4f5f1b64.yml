name: bill b
body: As Individual consumers their is not much any one of us can do when dealing
  with the behemoth priceline but if you remind their associates and business partners
  that you will no longer be using their services because of their affilation with
  priceline regardless of how much you appreciate their services it does have an effect
  so write the airlines,car rentals, hotels,credit card and cruiseline companies explain
  that while they continue to partner with priceline you will choose their competitors
  then it may have an effect remember they have more muscle and usually will begin
  to respond to many complaints. Also wether the BBB or your Attorney General can
  settle your individual complaint or not they will consider the volume of complaints
  and reinvestigate a business. In addition write your congressmen and congresswomen
  they have been known to respond to these things when enough constituents become
  involved.
date: '2007-02-19T20:27:55Z'
