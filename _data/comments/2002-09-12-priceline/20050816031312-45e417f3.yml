name: faye
body: Price line is the worst, they charge you and arm and leg, and when you have
  problems, nobody is there to help you, can you beleive that there is no supervisor
  or anybody to talk to when you have problems, I paid $250.00 a night for a room,
  they didi not put me in a hotel, they put me in a time share place with two small
  double bed, where as my reservation was for a ocean view king size bed,when I called
  them they said it is too bad, it is upto the hotel, and I said what hotel,this is
  a time share, they said that is it, and there is nothing you can do. Do not do business
  with price line, they are not the best deal but the worst deal. by the way the room
  did not have a ocean view.
date: '2005-08-16T03:13:12Z'
slug: 2002-09-12-priceline
