name: Ali Q
body: |-
  this thread has been so funny my belly hurts from laughing. You guys are MORONSSSSSSSSSSSSS. Priceline doesnt care about you people! If you \*\*\*THINK\*\*\* its a rip-off/scam..it probably is! They pay the technical team, lawyers, executive offices and members of management enough money to make you sick! I would know, as I am a member of management. No doubt Ali Q is not my name as its nobody's business because I dont want to help any of you! The contacts are stone, the discounts are real. You want cheap airfare? YOU GET WHAT YOU PAY FOR PEOPLE. You know why priceline is still in business, because only about 10% of their customers are idiots and the other 90% are smart, priceline loving customers. Get over your losses people and just learn your lesson. Also, credit card disputes NEVER work, I work in the chargeback department, and the only people who EVER win them...are people who actually had their cards stolen.
  Thanks for the LOLZ
