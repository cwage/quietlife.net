name: john
body: My wife made a bid for a car for seventeen dollars per day in Salt Lake City
  on Priceline. It was accepted. However our flight from Atlanta to SLC was repeatedly
  overbooked. The airline gave away our seat before we arrived at the gate. Then we
  were informed that we would have to fly standby and that we probably wouldn't be
  able to leave for 4-5 days. We called PL and informed them of our dilemma and asked
  that they make sure that our car would be available. To our surprise the car that
  we had rented for three weeks was only held for 24 hours! So we are out 600 dollars
  and we have no car! The world-famous "customer disservice" hung up on both me and
  my wife. The maddening thing is, it is not our fault. It is the airline's. I would
  be happy if the car would be waiting for me next week without a change in price.
date: '2005-03-18T23:36:52Z'
slug: 2002-09-12-priceline
