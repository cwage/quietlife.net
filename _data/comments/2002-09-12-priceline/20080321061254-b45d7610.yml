name: some yung gheye
body: |-
  two things...
  this is why you get to the airport AT LEAST 2 hrs before your depature time. getting thru security is always a bitch these days...no matter where you're going.

  also, most car rental places....regardless of getting a car for $17/day.....will ALWAYS tack on HUGE taxes/fees...so you end up paying AT LEAST $40/day.
  also, if they're sold out withh the car type you selected...most car rental places allow for free upgrades (and as always..it's always best to deal directly with not only the car rental places, but with the hotels and airlines directly. NEVER use a third party, there will always be issues)
