name: J Briden
body: I will NEVER buy from Priceline again. We recently had a serious family situation
  which required a change in the return date and with Priceline it is IMPOSSIBLE to
  make any change, no matter what the circumstances. This is nuts! Life happens. I
  will NEVER, EVER buy from Priceline again and strongly suggest you do not either.
date: '2005-06-14T00:35:51Z'
slug: 2002-09-12-priceline
