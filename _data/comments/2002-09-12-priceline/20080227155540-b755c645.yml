name: Tara W.
body: I just got off the phone with Priceline. There is no "lowest price guarantee".
  I was charged $73.75 for a room that the same hotel charges $59.99 for. Also, Priceline
  charges doubles the taxes that the hotel does. I was told by "Nate", their employee
  that they "have to make a profit too". Buyer beware. Priceline is a ripoff.
date: '2008-02-27T15:55:40Z'
slug: 2002-09-12-priceline
