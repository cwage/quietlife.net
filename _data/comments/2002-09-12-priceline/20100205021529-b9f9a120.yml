name: Just Wait
body: Don't be so smug. You are like the homewrecker who starts a relationship with
  a cheater, lol! If someone or something is capable of a certain behavior, rest assured
  they are capable of doing it to someone as \*kind\* as you. It's only a matter of
  time before their curt ways are turned around and directed at you, their employee.
date: '2010-02-05T02:15:29Z'
slug: 2002-09-12-priceline
