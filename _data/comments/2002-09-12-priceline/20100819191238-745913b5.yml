name: Lorri
body: Here are your grammatical errors. Any should be capitalized,onlince should be
  spelled online. A sentence can never begin with and, and people should learn to
  write too, not to. Did you graduate high school. I haven't yet, but I know better
  grammar than that. There should be a semi-colon after precise. Thyen should be then.
  Are you sure your not 'tarded? I would dispute that.
