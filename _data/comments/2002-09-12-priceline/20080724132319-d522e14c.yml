name: Tim
body: Talk of suing priceline may make one feel better but the reality is that it
  would be too expensive and difficult to attempt such an action. Perhaps a simpler
  approach. What if everyone one who has been hurt by priceline repeatedly clicked
  on priceline's sponsored link on Google? Each click costs priceline money, not much
  money, but if hundreds or even thousands of people clicked wouldn't that eventually
  add up? And it doen't have to be for hours on end. Just an occasional few minutes
  when you have some downtime. In the end it may truly not hurt priceline but it would
  feel good to actually do something.
date: '2008-07-24T13:23:19Z'
slug: 2002-09-12-priceline
