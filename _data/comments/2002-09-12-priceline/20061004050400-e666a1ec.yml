name: michelle
body: |-
  another dissatisfied customer. i'm a nursing student, and because of this i'm unable to miss class. recently my great-grandmother passed away so i looked at priceline to find a flight after i got out of class. i was trying to check the itinerary for the flight and they confirmed a flight that i cant use because i'm in the hospital. i called them immediately to let them know of this mistake, and they gave me some scripted statement that they don't offer refunds or change flights, or change information. i'm lost money that i need for school and they are not sympathetic to there customer.
  i hate priceline and will never use there service again.
date: '2006-10-04T05:04:00Z'
slug: 2002-09-12-priceline
