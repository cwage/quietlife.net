name: Carey
body: I will gladly assist anyone trying to stop price line I hate what they do to
  people, they have had me in tears. I made Alley the rep I talked to one promise,
  that they weren't getting away with what they did, I think she was kidnapped and
  programmed by the company, she was so stupid. I promised her that, I plan to keep
  it. Any one serious about putting a stop to it, let me know, email me perfect\_angel\_718@yahoo.com.
