name: Annie Nomuss
body: |-
  THE REASON YOU CANNOT SEE YOUR ITIN BEFORE YOU BOOK:

  Priceline buys blocks of tickets from each of their partner airlines... these blocks include many tickets that the airline is sure they will have difficulty selling... and in order to buy these tickets [priceline.com](http://priceline.com "priceline.com") has to agree to a legally binding contract with the airline that once a ticket is booked it will not be changed cancelled or refunded... How NYOP works is that priceline throws your bid out to the airlines and they come back and tell priceline what they can give for that price... priceline then immediately books the tickets so the airlines do not change their minds... so the main point? Priceline does not know what the itinerary will be until the airlines tell us.

  The same is true of hotels and rental cars... so there is the answer to the most burning issue with priceline...enjoy.
