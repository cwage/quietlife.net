name: Cary
body: |-
  **[Priceline.com](http://Priceline.com "Priceline.com") sucks!!! BUYER BEWARE!!!!**, do not book anything with
  these crooks! The Management won't return calls. The word is spreading fast about the worst possible travel service they offer at the best price. People, the tickets you buy
  are worthless. They are not transferable, non refundable. Policy
  sucks. I'd like to start a class action suit against Priceline. Anyone
  interested? Email me please. The no refund policy is questionable.
  Consumers should be protected here. In anycase, I will make sure to
  promote [Priceline.com](http://Priceline.com "Priceline.com") in the worst possible way for the rest of my
  life!

  Consumers and [Priceline.com](http://Priceline.com "Priceline.com") shareholders please read below:

  The simple math of [Priceline.com](http://Priceline.com "Priceline.com")'s business model.

  1 screwed customer = $1,200. (average airline ticket) X 500 = $600,000
  net profit for [Priceline.com](http://Priceline.com "Priceline.com")

  In addition to this, [Priceline.com](http://Priceline.com "Priceline.com") resells your unused seat as
  standby for major money! so add an extra $400,000.

  They just profited a cool million by pissing off 500 people. Nice
  business eh?

  I'm going to bring this to the attention of the [Priceline.com](http://Priceline.com "Priceline.com")
  shareholders meeting.
date: '2006-08-08T22:41:05Z'
