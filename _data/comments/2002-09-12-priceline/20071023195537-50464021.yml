name: CN Thompson
body: Boy, am I discouraged. I have used priceline for years and this is the first
  time I ever had a problem with them. I have been dealing with the customer service
  department for a month now, trying to get a refund on a ticket they said was not
  available. I tried to bid on an airline ticket for several days with no success,
  I could not get the price I wanted to pay, and they were offering a direct booking
  price (lowest cost fare)for $224.00, I decided what the heck and attempted to purchase
  it at the lowest fare. After I enter my information and initialed for the purchase
  I received an edit message saying the flights were not available at that price and
  to try again. I tried 3 more combination of in/outbound flight and still could not
  get the rate they advertised. It actually said your card will not be charged please
  try again. I gave up and went ahead and booked with another carrier (the flight
  was for the next day) while on vacation I noticed my credit card balance was off,
  so I checked online only to see that Priceline did book the flight and deducted
  the fare from my account. I checked my email and sure enough there was a confirmation.
  I immediately called and they said the ticket was used and that I was not entitiled
  to a refund. They suggested I call the airline. The airline said they couldn't do
  anything... no credit no refund nothing and they referred me back to Priceline.
  This went on for two days of back and forth calling, I got disconnected twice and
  advised I'd be called back only to get and email saying they could not do anything.
  It would be different if I booked the flight and had to change for a personal reason,
  but I never officially got a booked flight, at least that I knew about, maybe then
  I could accept a NO REFUND POLICY. Like I wanted to pay a higher fare to book with
  someone else. The airlines finally said there was nothing I could do and if Priceline
  wanted to help me they would have to contact the airlines and work it out, there
  systems conflict. Priceline would have to call to verify that I never took the flight.
  I called back priceline and explained again. The airline reports a "no show" as
  a "used ticket" in the priceline system and Priceline said I could not be refunded
  on a used ticket. Well I finally reached a gentlemen who was very helpful and understanding,
  he believed it was an system error and that he would refund my ticket and I should
  see a credit in 10-12 days. The reservation and all the bid history was deleted
  from my priceline account, the phone system even said a refund was being processed
  and to try back in 5-10 days. After 20+ days I called and they confirmed a refund
  was processed but they could not tell why it had not showed up yet, she advised
  me she would contact me in 5 days to verify everything. The same day I got 2 emails,
  one said the refund was good to go, the other saying the ticket was used and I could
  not get a refund. So I called back again today and it started all over again. And
  someone will call me back, I was about ready to lose it. I also responded to the
  email staff, who blew me off saying I took the flight (because it was a used ticket)
  and want a refund too. I had to ask do you people communicate with each other? Do
  you even care that you took my money and I got nothing in return. I wanted to use
  the company and wanted to pay the fare but they said I couldn't and booked it anyway.
  What's a personto do? I have to ask were the customer service is, but after reading
  all of this I must beleive it does not exist and my money is good as gone.
date: '2007-10-23T19:55:37Z'
slug: 2002-09-12-priceline
