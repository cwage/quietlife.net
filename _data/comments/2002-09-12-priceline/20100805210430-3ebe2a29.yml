name: Just Aggr
body: 'Today, I spoke to "Jesus" who claims to be "from the executive office" at Priceline
  Head Office. I wish I could speak to as many Americans as I could right now. CAUTION:
  DO NOT USE PRICELINE. From the local agent all the way up their Headquarters. They
  are all there waiting for you to make the biggest mistake ---click buy... and then
  you''re screwed. I booked 3 nights at a hotel near Historic Williamsburg and after
  just 1 hour of booking something came up and I had to cancel the last 2 nights,
  I am still going to use the first night though. Guess what - I cannot do that without
  being charge one night fee. I told them there is nothing in their cancellation policy
  that states partial cancellation is not allowed. Of course the guy from the "executive
  office" said "I cant do anything about it". There something is the way he said it
  though. It sounds just like he said these words 50 million times before. To make
  the long story short, they dont care even if they loose a customer so that they
  could keep the money. I hope there is a way to warm Americans about the different
  types of bait they use so they could ripped off trusting customers. Ideas anyone?'
date: '2010-08-05T21:04:30Z'
slug: 2002-09-12-priceline
