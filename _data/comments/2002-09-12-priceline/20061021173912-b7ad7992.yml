name: Annie Nomuss
body: The truth is that people don't read the line in their contract that clearly
  states that your reservation is non changeable and non cancelable once it is booked...
  sorry but if you don't read a contract you sort of deserve what you get... like
  if you do not read the lease, you deserve to get screwed... sorry just read and
  you will be ok. and same to you joe
