name: Becky
body: |-
  I have just had the most god awful experience with [Priceline.com](http://Priceline.com "Priceline.com") and wnat to share it with the whole world so that nobody goes through what I am going through.
  I was planning a trip to Ireland for me and my husband in late May. I researched some sites and was looking for tickets and hotel. I went to [Priceline.com](http://Priceline.com "Priceline.com") and tried to put in a few bids with no success. Finally, one of my configurations was a success and I entered in my credit card info.
  Seven days later I received an e-mail from Priceline stating that I can now reattempt to book my trip to Ireland since my last attempt was unsuccessful. I was surprised, panicked and confused - since this was my very first experience with [Priceline.com](http://Priceline.com "Priceline.com").
  With my trip only a few weeks away I made other arrangements through a different site. Upon returning from my vacation to Ireland I noticed on my credit card statement that [Priceline.com](http://Priceline.com "Priceline.com") had charged us for hotel and airline fees - which added up to $3,200.00 - to go to Ireland which we did not use.
  I immediately called my credit card company to file a report and then I contacted [Priceline.com](http://Priceline.com "Priceline.com"). There supposed 'customer service' rep was completely unprofessional. He was rude and stated that they are not responsible for providing any additional information to the consumer. Since when? I explained my situation to them and they stated that the e-mail I received was for a previous attempted booking that I'd made. I stated that the e-mail did not specify what offer failed and that it was confusing. Also, I never received any e-mails confirming my trip or even receipt of my transaction. NOTHING! It's an absolute outrage that a business like this could continued to exist. I've since filed a report with the BBB and will continue to call, write, e-mail whomever I have to in order to get a full refund for a vacation that I never took.
date: '2005-07-12T20:09:40Z'
slug: 2002-09-12-priceline
