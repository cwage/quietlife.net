name: Christian
body: Priceline is a RIP OFF!!! I went to check on rooms for Atlantic City for my
  first anniversary. I plugged in the info on their website and then they asked for
  Credit Card info. Stupid me put it in. Nothing comes up that I was looking for.
  The next day I receive a call from Visa securities and they state that my card is
  being charged for a hotel in Boston, MA????? After going back and forth with my
  bank and trying to get through to Priceline I am unable to remove the damage. NEVER
  AGAIN!!!!
date: '2005-05-17T22:54:10Z'
slug: 2002-09-12-priceline
