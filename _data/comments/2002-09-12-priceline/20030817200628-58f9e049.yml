name: D. Cofano
body: We decided to get tickets to have our doughter and granddoughter visit us. Since
  we needed to buy tickets at a reasonable price we tried PRICELINE.COM. To initiate
  the bidding process they wanted our credit card number (BIG MISTAKE). We Bid on
  a ticket for a Sunday. They did not accept our bid and came back with a flight itenery
  that they found for us at a much higher price. Of course we did not click on "buy
  ticker now" or did we put the last four digets of our cerdit card number to purchase
  these tickes. On Monday we tried another itenery and it also was rejected. We called
  DELTA directly and bought our tickets at a vary reasonable price. Several weeks
  later we get a $850.00 charge on our credit card bill for tickets that we never
  purchased. I called Priceline and talked to a representative and they seamed to
  think as they looked at their computer information that I was mistakenly charged
  for tickets that I had not bought. After a half hour searching they came up with
  a conclusion that we did buy the tickets. They said we could not be reinbursed under
  any circumstance. I called the 800 number to verify their conclusion and for both
  days it gave me Iteneries that were rejected and said that I would have to bid again.
  We did not bid any more since we purchased the tickets from DELTA. We are still
  disputing this through our CERDIT CARD company (CAPITAL ONE) which is not backing
  us up. A represinative from the credit card company said it is of no use to dispute
  this because PRICELINE always wins, because of their NO REFUND policy. If that isn"t
  enough when I call the 800 number for PRICELINE now about those two days the itenery
  that they said we bought is now in their computer information. That means they changed
  the data in their system to prove that we bought the tickets.
