name: DR
body: As stated before, most of the statements are from people who do not read and
  as a result have no right to complain. However, priceline should do a better job
  of informing the guests that all they are receiving is a room. Keep in mind that
  this could be a room that smoking room with only one bed. I work a for a hotel and
  we constantly get a reservation of four people who booked off of priceline. They
  are in a rude awakening when they find out they have a room with one bed and it
  is a smoking room. You pay less so you get less. I dont mean to be rude, but this
  is common sense. Some people believe they are getting a great deal when they are
  booking off of these sites. Yet, it is absolute garbage. Then guess who they get
  upset at when they get the wrong room? The only person who should be booking off
  of these sites, are individuals who are traveling alone and dont care whether they
  get a smoking room or a non. If you need two beds then dont book off of priceline.
  If you are alergic to smoke then dont book off of priceline. You all have been warned.
