name: John
body: PRICELINE IS A RIP OFF!!! DO NOT USE PRICE LINE!!! They just lost a whole family
  worth of customers. Plus I will verbally express my frustration with priceline's
  lack of customer service. PriceLine's customer service representative hung up on
  me. Who in this day and age can afford to loose customers? By the way here is their
  customer serive phone number in case you can not find it in their webpage. It is
  buried where no one will find it. Press 4 to speak to a representative. PriceLine
  Customer Service please call 1-800-774-2354. Don't pay attention to the part that
  talks about email them if you have already paid for your reservation and are done
  with your travel. They ripped me off on a over charge for a car rental. Instead
  of using priceline just call different car rental places and offer them a lower
  price starting in the low teens for an economy car and middle teens for a mide level
  car. Call each rental place until you get the price that you desire paying for and
  skip the middle man PriceLine. Good luck. PRICELine are a bunch of thieves.
date: '2008-02-08T01:10:47Z'
slug: 2002-09-12-priceline
