name: jes
body: I checked Priceline's prices for a room I wanted (non-smoking, King bed, microfridge,
  WiFi, Continental breakfast) at the Best Western Inn near the airport in Warwick,
  RI.  I wanted to stay two nights before my flight went out on Monday.  Priceline's
  regular price for the room was $112.20 per night.  I then called Best Western Inn
  directly and their price was cheaper than Priceline's.  Best Western wanted $105.99
  for the first night (a Saturday) and $79.00 for the following night (a Sunday) so
  I simply reserved the room directly thru the hotel.   I'm here now as I'm writing
  this.   I won't be using [Priceline.com](http://Priceline.com "Priceline.com") anytime
  soon.  If Priceline's regular prices don't match the regular prices given directly
  by hotels - negotiated prices thru Priceline can't be that great?
date: '2011-10-01T23:41:33Z'
slug: 2002-09-12-priceline
