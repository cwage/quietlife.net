name: Pamela
body: |-
  Paul,
  I work at Budget and let's just say... I know what you are talking about. You are not the first and you sadly wont be the last. I see some people who have 5 or 6 reservations paid for. On average my location rents 150 car's a day. Out of the 150, probably 15 of them are through Priceline. I can honestly say... 50% of them are uninformed, confused or double charged. They get a great rate, don't get me wrong... but if the customer needs to change the date or location of pick-up or even something as simple as the time, Priceline will not pay us and we are left to charge the customer.
date: '2007-05-19T02:12:32Z'
slug: 2002-09-12-priceline
