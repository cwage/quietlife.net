name: joey
body: Annie, your a bitch. i was told i would be given a refund. so you can take your
  self rightous bullshit and i hope you sleep at night, but who cares, i dont. You
  are brain washed by Priceline. I dont really care what you have to say. Read the
  contract, read the T&C, who fucking cares. You are nothing but trailer trash who
  has been brainwashed by Priceline principles. I dont give a fuck who you are or
  what your title is. I have been screwed by Priceline and I dont feel compelled to
  give you details because your response will be that I did not read the T&C. Who
  fucking cares? With all the hype here, I have chosen that I will not use Priceline,
  ever. So you take your Customer Service skills and shove them up your pussy so far
  that the sunlight can find it. You probably live in a fucking trailer that you have
  no common sense whatsoever. Drink your fucking Paps Blue Ribbon and shut the fuck
  up because you have no idea what people are going through with Priceline. You comment
  like it is America that has the problem. Priceline is the problem. I hope that in
  time, America gets smart and stops using Priceline. At that point, you will see
  unemployment. Get you some beer and enjoy your fucking trailer. You are a cunt-whore-dog-bitch.
date: '2010-03-07T08:56:06Z'
