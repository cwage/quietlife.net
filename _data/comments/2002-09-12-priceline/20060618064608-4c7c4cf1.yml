name: Karen
body: I agree that Priceline is a dishonorable company with no customer service. I
  wanted to fly into an airport that was close to the hotel where I had reservations
  at and they flew me into an airport that was 45 minutes away when there were other
  airports that were closer. When I called to ask if this airport was far away from
  my hotel (after I received my e-mail itinerary) I was told that the hotel was eight
  miles away from the airport. It turned out to be 33.3 miles. I found out after I
  arrived at the airport. There is no one that will help you at Priceline and no customer
  service whatsoever. I also hope the company goes out of business. I've been traveling
  for 26 years and this is the worst company I've ever done business with. The reps
  do not know where the airports or the hotels are located so I really don't understand
  how they can be selling "package tours." I hate Priceline.
date: '2006-06-18T06:46:08Z'
slug: 2002-09-12-priceline
