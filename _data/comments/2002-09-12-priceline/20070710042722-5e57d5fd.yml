name: Steve
body: I also love Priceline. Being retired, I have used them to travel the world the
  last 4 years and have stayed at the nicest hotels, in the nicest rooms, for next
  to nothing prices. Yes, Annie is right. READ THE FINE PRINT. Don't click anything
  until you're absolutely positive what you're bidding on or clicking on. I think
  Priceline is great for intelligent people, but is a nightmare for the less intelligent
  of our population. I also have gotten refunds with little problem. I have found
  that with Priceline, as well as hotel clerks, if you're nice and polite, you usually
  get your request. Try it. It might actually work.
date: '2007-07-10T04:27:22Z'
slug: 2002-09-12-priceline
