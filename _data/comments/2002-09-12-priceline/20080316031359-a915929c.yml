name: pricelineNOWAY
body: Simple, simple advice. Do not use them under any circumstances. I had an issue
  with them and was told that I put my initials in...once you put in your initials
  that you've read everything about your transaction, you are STUCK STUCK STUCK, my
  friend. There is no negotiating with them, so why play russian roulette with a vacation
  or any trip for that matter? Go the direct route and just use the hotel or airline
  website. SAFEST way to do business. Priceline's main requirement for their employees
  is to be rude and callous and classless--who needs to deal with a company like that?
  Even if you save money, IT'S JUST NOT WORTH IT.
date: '2008-03-16T03:13:59Z'
slug: 2002-09-12-priceline
