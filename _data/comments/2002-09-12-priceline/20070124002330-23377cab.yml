name: John
body: Ha! What part of, "Once you click "Buy My Hotel Room", priceline will look for
  a hotel to match your offer. If we accept your offer, we'll immediately charge the
  credit card you provide to us. Please note, you will not be provided with a list
  of hotel options. Please remember, once you click "Buy My Hotel Room" your request
  can not be changed, cancelled, or transferred and refunds are not allowed. If we
  can't accept your offer, your credit card will not be charged," do you not understand?
date: '2007-01-24T00:23:30Z'
slug: 2002-09-12-priceline
