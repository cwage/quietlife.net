name: Rick
body: Priceline is the worst company in history. Their rates are just as high as published
  rates but with a thousand restrictions. My wife has a returning flight to come home
  Saturday and her uncle just passed away. I called to see how much I would have to
  pay to change the return flight by 2 days and they wouldn't give me the time of
  day. Very cold and rude. Didn't even care that someone had died--they had their
  'contractual agreements' to meet. Said if she missed the flight, she'd have to buy
  a whole new ticket. Giving them $400 for domestic flight across 4 states, I expect
  more. Avoid Priceline like the plague!!
date: '2006-03-07T17:36:18Z'
slug: 2002-09-12-priceline
