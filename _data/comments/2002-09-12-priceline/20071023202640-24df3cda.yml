name: CN Thompson
body: After reading this forum, I have emailed everyone I know and provided them with
  a link to this site. I have asked them to STOP using priceline. Some of these stories
  are down right wrong. I only lost $225 bucks, but it's still my hard earned money.
  Any class action lawyers can feel free to contact me. I saved all my correspondances
  with the company regarding this issue.
date: '2007-10-23T20:26:40Z'
