name: Barry
body: |-
  I agree with other writer's. I hope they go out of business. It's nothing short of fraud to not disclose all of the charges one might incur, before people agree to a price.
  If a hotel wants to charge you for parking, using the toilet, whatever, when you get there, that's just your tough luck. And the attitude at customer service, if that's the word we are looking for, is so awful I can't believe people in management there would put their name on door. I'd be embarrased, and most likely, kicked out of my church for acting like these people. STAY AWAY FROM PRICELINE.
date: '2006-06-25T23:55:17Z'
slug: 2002-09-12-priceline
