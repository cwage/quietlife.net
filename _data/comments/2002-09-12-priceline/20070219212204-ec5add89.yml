name: bill b
body: John while I commend you on your good dental hygiene your example is far too
  simplistic for many of the complaints here most really don't have to do with the
  simple task of reading but with the complexities and unpredictabilities of life
  adding the task of travel on a limited budget when a loved one is sick or dying
  and it is down right absurd. I wouldn't wish a situation like this on you regardless
  of your insensitivity but if it happens to you may you find comfort solace and perhaps
  customer service that will help you out in your time of need. Believe it or not
  these situations can be devestating unless you have anti-social personality which
  god forbid you don't.
