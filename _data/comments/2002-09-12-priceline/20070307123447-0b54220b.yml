name: Jocelyn
body: OMG the same thing just happened to me. NO WHERE I REPEAT no where does it says
  that you cant compare a listing of hotels. I wanted to book a trip to Vegas for
  me and my mom so i figured Priceline was the best thing. Oh boy was i wrong. I got
  a crap ass hotel less star rating then i wanted and its not even on the strip. Those
  dumb idiots at priceline keep telling u no they dont even hear your complaints.
  They are like robots who just keep reading the same lines over and over I WILL NEVER
  AGAIN DEAL WITH PRICELINE!!!!!
date: '2007-03-07T12:34:47Z'
slug: 2002-09-12-priceline
