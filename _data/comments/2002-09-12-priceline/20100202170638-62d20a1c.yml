name: geo
body: |-
  The bottom line is, Priceline ( and their employees here) can quote all they want about read the fine print etc... The TWO REAL issues are: MISLEADING ADVERTISING ... TERRIBLE TREATMENT OF LOYAL CUSTOMERS ( In a Customer Service based business no less)!
   These guys are WORSE than Used car salesman! Talk about bait and switch... On TV and On their Site..you see plastered ALL over.. BEST RATES Guaranteed...NO FEES or CANCELATION FEES ! So, based on that..WHY would a consumer bother to check the hotels, ( or airlines) web sites for possible lower fares??? Thats the very reason Priceline was born right? Of course, one has to DIG...three pages or clicks deep...to find the IRON clad ..even Gestapo type of restrictions.. Sooo they LEAD YOU DOWN THE PATH...THEN, TRAP YOU! Great Biz model and ethics. Im sure Anna (seems she's dissappeared) will have some Smug answer to all this.. but, deep down Im sure even SHE KNOWS, its just wrong to treat your customers like this.
   Why not put the DISCLAIMER right up front..wherever they mention their phony guarantee? Like, Lowest price on standard rates only, you may find better rates thru hotel.. Nah, because then...they'd be out of BUSINESS !!!
