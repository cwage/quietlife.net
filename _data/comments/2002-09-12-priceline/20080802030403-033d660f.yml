name: Meagan
body: Yes, because that's *precisely* what we'd like to accomplish - adding *yet another*
  chain email to our inboxes. Genius plan. I actually think this post alone has done
  a good job at detracting from Priceline's business, judging from the fact that there
  are 177 (now 178) comments. And if the people at Priceline knew what was good for
  them, they'd actually have someone in their marketing department searching for detractors
  from their business like this post, and try and rectify these people's negative
  experiences so they wouldn't have so many disgruntled customers. I guess you can
  say I've been in the business of customer service too long, but a lot of companies
  actually *do* this, and a little effort on the company's side goes a very long way.
  But we all know the people at Priceline have no souls. That's why they hired William
  Shatner.
date: '2008-08-02T03:04:03Z'
slug: 2002-09-12-priceline
