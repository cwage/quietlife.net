name: frances
body: You sound like a complete jerk annie. For ou to call someone a moron, really?
  Well little miss sunshine, up until this past month, I was a avid believer in priceline,
  even have the app stored on my phone,but no where does it "read" that priceline
  is allowed to triple bill me for my one night hotel stay, and in addition, charge
  me for charges that are not even my own. This has happened on 2 occasions with double
  billing, but this is byfar the worst instance. $395.46 OVER what i should have paid
  $80.06. Moron on that. And trying to get ahold of a live person is a headache within
  it self only to be kept on hold for 25 mins while they "contact the bank" Funny
  how i called the bank from my house phone and got a hold of them got transfered
  to a supervisior, and had the funds released, in less than five mins. The rep was
  so full of bs it was ridiculous. And the "I dont have a supervisor to transfer you
  to bit, come on really??? Next time I use priceline, if ever, it will be with a
  pre-paid visa, lets see them double bill that. Annie sorry you couldn't get a real
  job doing real work, I mean how hard could it be to actually not "help" someone
  or actually solve a "real" problem..lol. your work must be so gratifying..haha...MORON..cracking
  me up on the inside.
date: '2010-10-04T14:43:43Z'
slug: 2002-09-12-priceline
