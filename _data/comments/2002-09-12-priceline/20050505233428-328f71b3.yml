name: Carol
body: Until today I had no problem with Priceline. But today, I trying to book a hotel
  for tonight, no big deal. I have done this a few times on Priceline. The request
  always came back with a future minutes. But today, it is almost an hour and still
  no reply ...and to make matter worst PRICELINE NO LONGER HAS HUMAN ANSWERING THEIR
  CUSTOMER SERVICE CALLS WHAT KIND OF CRAP IS THIS...............! I WAS A HUGE FAN
  OF PRICELINE..........BUT AFTER TODAY......I SEE THEY DO NOT CARE ABOUT US.......JUST
  OUR MONEY! SO YOU ARE SCREW UNTIL THEY DECIDE TO ANSWER YOU! ELECTRONICALLY.........THIS
  WOULD BE GREAT IN A PERFECT WORLD...............DON'T USE PRICELINE..............IT
  IS A PAIN IN THE BUTT.
date: '2005-05-05T23:34:28Z'
slug: 2002-09-12-priceline
