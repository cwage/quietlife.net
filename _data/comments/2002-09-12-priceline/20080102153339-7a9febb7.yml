name: Samuel Litt
body: Not trying to start shit or anything, but I used Priceline for the first time
  last month to book a couple flights to Pittsburgh. I have to say they gave me no
  troubles whatsoever and booked the exact flights I wanted to use. I got a little
  paranoid about it reading sites like this one, but everything turned out all right.
  I think if you take some time before booking the first thing that pops up, everything
  will be okay.
date: '2008-01-02T15:33:39Z'
slug: 2002-09-12-priceline
