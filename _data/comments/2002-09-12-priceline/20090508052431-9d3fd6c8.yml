name: upset
body: I had a good experience booking a hotel with Priceline two weeks ago, so we
  thought we'd use it again to book the hotel for our next trip. We used Name Your
  Own Price (of course... that's where all the problems are), choosing the city we
  wanted to stay in. But they assigned us a hotel in a different city. They claim
  this hotel is drawn in on the map for the city we selected, but it's an entirely
  different city and was not listed in the text anywhere. So now you need to examine
  their cartography, and be able to tell where it is faulty, even if the text descriptions
  say something else. It's as if they had "Manhattan" listed as a choice, with a small
  protrusion overlapping Queens on the map, and congratulations, your bid for Manhattan
  was accepted and your hotel is in Queens.
date: '2009-05-08T05:24:31Z'
slug: 2002-09-12-priceline
