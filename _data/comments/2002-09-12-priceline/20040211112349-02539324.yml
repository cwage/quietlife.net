name: crystal
body: I tried to find a one way ticket to texas to see my mom and move back up to
  ohio and could not find anything to get me to a one way ticket. I finally e-mailed
  them and told them I couldn't get to that site they told me they would e-mail me
  back within two hours. I did not here from them until two days later and then they
  told me at this time they are not offering a one-way ticket to got to one of their
  suggest sites to find a one-way ticket. I went to cheap tickets .com and to get
  a ticket that was fully refundable was $570.00 and only $120.00 if I didn't want
  to have a refundable ticket. That is rediculus to have that much of a difference
  in price.
date: '2004-02-11T11:23:49Z'
slug: 2002-09-12-priceline
