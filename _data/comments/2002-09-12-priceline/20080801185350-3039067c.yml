name: metalica
body: |-
  I too am a recent Priceline victim. So here is my idea:

  IF YOU REALLY WANT TO HAVE A STRONG ANTI-PRICELINE IMPACT, EACH PERSON SHOULD START A CHAIN LETTER TO 10 FRIENDS/BUSINESS ASSOCIATES/AQUAINTANCES LINKING TO THIS PAGE WITH AN APPROPRIATE COMMENT AS TO WHY YOU ARE GIVING THEM A "HEAD'S UP" AGAINST USING PRICELINE TO BOOK THEIR TRAVEL NEEDS.
  That will be more effective than filing BBB claims, contacting a lawyer or trying to get the charge removed from your credit card (although you can try). And if you know of any other anti-Priceline sites, add this idea to their forums. Good luck.
date: '2008-08-01T18:53:50Z'
