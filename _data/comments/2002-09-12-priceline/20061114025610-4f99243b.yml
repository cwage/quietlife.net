name: very un happy
body: I understand all of your frustrations with priceline and agree that something
  must be done! I purchased a ticket completely aware of all of the agreements you
  had to make. yet when I got to the conformation page they had the incorrect last
  name on the ticket. It wasnt what i entered thats for sure. Again I got there run
  around but they were willing to correct the name for a fee. Unacceptable that was
  not the name I entered and I have the history on my computer to prove it. They then
  sent me a copy of the "AGREEMENT I INITIALED" not only did it have the incorrect
  name it wasnt even my initials, and again I have the actual page I initialed in
  my browser. They refused to help me what so ever, I even had one "customer rep"
  tell me that I was mis informed and that not even for a fee would they correct it.
  Umm hello I have the emails from Priceline offering it. I finally got it arranged
  through the airline themselves they put a note on the reservation explaining the
  mishap surprise for free and I was told there would be no problems. I then recieve
  an email from priceline telling me they cancelled my reservation. UM hello I thought
  you had a no cancellation policy? I never asked for it to be cancelled I asked for
  the name to be corrected. I then called priceline to make sure I would at least
  get a refund. I was told yes minus the processing fee surprise surprise. They will
  not be getting paid by my CC that is for sure. I have since emailed them to give
  me written documentation that they agreed to refund me my money minus the processing
  fee guess what no reply as of yet. This company is nothing but a scam artist in
  disguise and needs to be shut down period.
date: '2006-11-14T02:56:10Z'
slug: 2002-09-12-priceline
