name: Pookie
body: I bid last week and I saw that they charged me for the tickets. I called customer
  serivce and told them that I accidently pressed the bid buttoned and asked for a
  refund. THey said that there was no way I could my refund. But I now I look at my
  account and I don't see any charges in my bank account. DID they REFUND me back
  ? or are they waiting to charge me later? I hope this is trully a refund!!!! Keep
  this post updated!!!
