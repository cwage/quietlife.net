name: Clarence Bower
body: I attempted to purchase round trip airline tickets to BNA nashville Tenn. I
  was not advised of the itenerary of the flight until after they received the credit
  card information.within 5 miutes i attempted to cancel the reservations because
  of the fact that i would have had a long layover in Atlanta Georgia.they advised
  me that they could not refund or credit my account because of company poilicy. Also
  my credit card company which is Cross Country bank, advised that they also could
  do nothing. I reside in Penna. & i am now in contact with the attorney generals
  office about this fraud. Penna has a consumer protection law which states you may
  cancel a contract within 72 hours.What a rip off PriceLine .com is. They really
  suck.Maybe everyone that got ripped off by these people should get together & file
  a class action lawsuit .
date: '2005-04-23T20:44:50Z'
slug: 2002-09-12-priceline
