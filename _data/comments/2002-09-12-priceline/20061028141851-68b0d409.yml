name: Franklin
body: Okay, this makes somewhat sense why we cannot see the itinerary beforehand,
  but not for the nyop. Priceline should not immediately book tickets to an airline.
  If priceline wasn’t out to take someone's money than why can’t they just let the
  guest just choose a price, without one being chosen for them? I’m sure people would
  rather have their pick of which rate to chose than to have one chosen for them before
  the “airlines do not change their minds.” Do you think Calley would have chosen
  a price of over $800? Obviously she would not have chosen a rate that would take
  a year to recover.
date: '2006-10-28T14:18:51Z'
slug: 2002-09-12-priceline
