name: John
body: By the way, I booked a room through Priceline to attend an event. The event
  was cancelled. I didn't call Priceline to demand my money back. I called the hotel
  to tell them I would not be using the room, so they could resell it. I knew I wouldn't
  get my money back because I read the agreement.
date: '2007-01-24T01:03:12Z'
slug: 2002-09-12-priceline
