name: Jennifer Martinez
body: It's not the fact that we can't read, but it is the fact that Priceline feels
  that they can just give you whatever they want without any repercussions. I do not
  know happened once I hit the submit button, but they gave me a hotel that was no
  where near the area I selected. I called within 5 minutes to tell them this and
  they told me there was nothing they could do and hung up on me. I thought maybe
  it was me and I thought if it is my mistake then I have to live with that, even
  though I was sure it wasn't. After reading all of these postings I now realize I
  am not the only one that this has happened to.
date: '2007-03-25T18:59:37Z'
slug: 2002-09-12-priceline
