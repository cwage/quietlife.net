name: Kimberly Marra
body: This company is a fraud they claim they look for the lowest fare for a direct
  route first than they go to the 1 stop flights. I booked a flight from Newark NJ
  to Miami FL asked for a price of 145.00+36 for taxes and such $181 askd for non
  stop flight. My offer was accepted and I was pumped I got a great fare and a direct
  flight, my ASS. They put me on a 1 stop flight with a 2 hour stop in NC. My flight
  starts at 10am and I arrive in FL at 4:30pm. Orbitz had a flight direct from Newark
  to Miami FL for $180 leaving at 6am arriving at 8:56 am. So how did they go out
  and find the best possible flight at my price when there is obviously better flight
  prices with better travel arrangments than the one they gave me. They will not give
  refunds because they know there service sucks they have a contract with the airlines
  that they will purchase airline tickets that airlines can not give away. You will
  never get a direct flight from name your own price because the airlines do not supply
  these types of tickets to priceline. Priceline is the toliet bowl for airline tickets.
  That is why they are involved in tons of class action suits, they have been suied
  by investors, by defrauded customers and are hanging on by a tread. You would think
  a company with this type of reputation would be stopped by some consumer protection
  agency, but this garbage practice continues. Please stop priceline I would be willing
  to get involved in a class action suit aganist Priceline in New York if anyone is
  willing. Emial me at Kittyangelkam@yahoo.com if you want to be involved.
date: '2005-11-29T15:02:10Z'
