name: maria
body: We were ripped off so bad, you would not believe it. But I want to make the
  story short since I am so overwhelmed right now trying to get in touch with my bank.
  I want to bring all this to the media and I want to know if some of you would be
  able to do it with me because I can not stand what priceline is doing to people.
  I read this forum and I am alarmed. Lets get together and do something about it,
  if it gets to the media it will really have some impact.
date: '2005-05-10T06:49:56Z'
slug: 2002-09-12-priceline
