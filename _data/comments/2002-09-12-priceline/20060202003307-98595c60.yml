name: James Layne
body: I am not stupid, and I am a repeat customer of Priceline. I know how to use
  their system. Their system chose the wrong airport for me, like it has hundreds
  of other customers. It is not a matter of not being smart enough to realize that
  they don't offer refunds if we're not happy. Priceline is under investigation by
  the state Attorney General's Office for this exact same charge. I had used them
  many times and had mostly good experiences as well until this last time, and I do
  emphasize that it is the LAST time I will use them if they refuse to do what is
  right and reimburse me for the $625 they cost me for THEIR mistake. If they don't,
  I will see them in court.
date: '2006-02-02T00:33:07Z'
slug: 2002-09-12-priceline
