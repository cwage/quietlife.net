name: CET
body: |-
  as bad as the company wal-mart is, it in all fairness is NOT a monopoly, just look up the definition of what a monopoly is. a monopoly is an exclusive ownership through legal privilege, command of supply, or concerted action. WM does not sell things that a consumer cannot buy elsewhere. For example, one can buy goods such as toiletries, paper items, and cleaning supplies at a Rite Aid or Walgreen’s or even the corner store. For cheaper clothing, consumers have options such as Target, K-mart, Ross, and Marshall’s. For items such as books, cd’s and DVD’s, many consumers shop at Borders, Barnes and Nobles, and Virgin. For home furnishings there are always Bed Bath and Beyond, Target and Home Depot. For toys a lot of people shop at Toys-R-Us. For electronics, you also have Circuit City and Best Buy. And I’ll add that all of these items are available at Sears. In the case of a monopoly, the consumer does not benefit. The company, which has a monopoly on a good or service, has no competitors and can feel free to fix prices at any cost. This results in consumers being gauged. In the case of Wal-mart, consumers actually benefit from their everyday low prices.
  SO... WALMART IS INDEED A TERRIBLE COMPANY TO WORK FOR B/C OF THEIR LACK OF BENEFITS AND LOW-ASS WAGES, BUT IT IS NO MONOPOLY
