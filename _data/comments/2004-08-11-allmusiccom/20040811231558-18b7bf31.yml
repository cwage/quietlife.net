name: cwage
body: |-
  I think (I read this somewhere, but I can't remember where) that it was a specific design decision (javascript?) to use something that wasn't supported in Opera, or maybe I am confusing that with gmail, another non-opera-compatible site.

  I don't know. Really, I don't care. I mean, come on, we've been doing this whole web design thing for over 15 years. Designing a compatible site is not that hard. For a site that big to be so utterly broken and incompatible is inexcusable.

  I was going to say "even my little brother could design a better site than this", until I realized that considering my little brother now practically does that for a living himself, that particular comparison has lost its oomph. Uhm: my grandmother could design a better site! yeah!
