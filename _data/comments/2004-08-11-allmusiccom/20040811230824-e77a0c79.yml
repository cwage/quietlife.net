name: Doug Orleans
body: Yep, it's awful. The "advanced search" setup is completely ridiculous. About
  the Opera issue, though, I wonder if it's their fault or Opera's. When they say
  it's "optimized for IE", does that just mean they didn't test it in anything else,
  or did they use non-standard IE-specific features in their HTML/ECMAScript/CSS/whatever?
  I use Opera too, so I sympathize (though updating to the latest version helped a
  lot), but I wonder if we shouldn't be sending mail to them too.
