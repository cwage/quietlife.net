name: t. rev
body: Ahmadinejad and his mullahcratic backers are millenialist assholes who really
  do believe the Twelfth Imam is coming and the world is ending; anyone who frets
  about American Christian millenialists in our government getting their hands on
  the button, and who is not a hypocrite or a fool, should be *at least* as worried
  about Iran, and almost certainly much more so.
