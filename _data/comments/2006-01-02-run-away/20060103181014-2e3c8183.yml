name: Sarcastro
body: They are swarming around downtown today like ants at a picnic. They must believe
  in life everlasting, given how they walk blissfully full of the blood of the Lamb
  in front of oncoming traffic. These kids may have their favorite Bible verses memorized,
  but they ain't too quick on figuring out what the "Don't Walk" signal means.
date: '2006-01-03T18:10:14Z'
slug: 2006-01-02-run-away
