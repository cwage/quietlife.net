name: Glen Dean
body: Chris, I don't disagree with this post. I should not have used the word simple.
  But from what you wrote, it seems like we agree more than you realize. It is just
  the over-simplification that you have a problem with. Do you agree? Anyway, it is
  still an interesting discussion.
