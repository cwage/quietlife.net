name: Jackson
body: |-
  Congrats guys. Sounds like Swirbo is doing well.

  Oh, by the way, I just happened to have inherited 50 million dollars from my uncle who was a Nigerian prince. I wanted to invest the money in Swirbo but you never responded to my email requesting you to set up a bank account for me to deposit the money into.

  Oh yeah, I also sent you one about changing your Regents Bank password. What is the deal? Are you not getting my emails?
date: '2005-05-13T03:24:09Z'
slug: 2005-05-11-swirbo-on-the-news
