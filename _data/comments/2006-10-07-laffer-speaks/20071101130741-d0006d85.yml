name: Brian Macker
body: Maybe he'll say his criticism still stands because it was an attack on the liberals
  who though that this curve was a simple straight line with a slope of one. You know,
  we tax more and we get more taxes. His whole point was that when you tax more you
  don't necessarily get more taxes. Duh. Also the only way you are going to get a
  tangled curve like that is if you have a complicated tax system. In the end, with
  a simple tax code and when you have lots of varied people the differences average
  out, like with the way gas pressure is based on the average velocities of all the
  atoms in a room. Complex tax codes are even more of a problem for liberals. It's
  the non-liberals who have been arguing about unintended consequences all along.
date: '2007-11-01T13:07:41Z'
