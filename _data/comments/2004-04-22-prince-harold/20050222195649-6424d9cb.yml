name: Zelda Brown
body: I can appreciate your criticism of Harold Ford. It is a very responsible retort
  to the article. However, I think he does make some good points about Social Security.
  I think he has tremendous potential, but like any other politician, and young politician
  to be exact, he needs guidance and support! He needs to remain grounded, fair and
  Godfearing. Lastly, I think he needs a wife! As we all know, behind every successful
  man is a good woman! And, I am avaiable! God Bless you, Harold Ford! (650.346.8385).
date: '2005-02-22T19:56:49Z'
slug: 2004-04-22-prince-harold
