body: 'I mostly use [NikkiNewsNet](http://www.livejournal.com/userinfo.bml?user=nikkinewsnet
  "http://www.livejournal.com/userinfo.bml?user=nikkinewsnet") as a supplement to
  NPR. It''s usually a once-a-day digest, but sometimes has breaking news as well.
  Warning: also sometimes has news from Canada.'
