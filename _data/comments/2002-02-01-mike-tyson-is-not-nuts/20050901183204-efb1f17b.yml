name: Amna, Manchester-United Kingdo
body: Mashallah, Mike Tyson has joined Islam. What a beautiful thing, a trully beautiful
  thing. I hope his journey through life with Allah (swt) by his side is a very peaceful
  and joyous one. With regards to the poster going by the name of "Mako," I would
  say what Islam and Criminals have in common is a way of life. Islam holds a way
  of life, that a life of crime doesnt provide. Criminals as you call them. convert
  to Islam because in Islam they find a religion that puts them onto the path of a
  good life as a pure and peaceful person. We as Muslims welcome anyone into our religion
  and we speak about it so openly because we are so proud of it-there is no other
  religion in this world that will give you an answer to every question that may arise
  in your life-but Islam will (mashallah) because Islam isnt just a religion, its
  a way of life, its an identity and its a future.
date: '2005-09-01T18:32:04Z'
slug: 2002-02-01-mike-tyson-is-not-nuts
