name: G
body: |-
  Mike..........You came into our lives in the toughest of sports and endured the worst of the worst of the pop culture that endeavors to tear down everything in it's path......Ali went through and you have persevered much in the same way......your prowess in the ring has been trumphed by your courage in surviving the bullshit that has been thrown at you. Their are three Boxers in my book Joe Lewis, Ali and Iron Mike........that is something no asshole leach that strives to attach it self to you will ever be able to strip you of..............You are guilty of just being you, in a country that doesn't allow that, to happen, especially for a black man that has achieved your greatness.

  I was blessed one time to have shaken the hand of the great Ali, and walked away a changed man as I grew up in his era.

  Walk from this....... with your head high and know that it is just the venom and the jealousy that seeks to tear down anyones greatness including yours, as you are as great as the two predecessors I mentioned earlier........They should give you another Belt just for surviving the bullshit........for that matter maybe all of us should get one................God Bless Iron Mike............G.
date: '2005-06-12T16:42:35Z'
slug: 2002-02-01-mike-tyson-is-not-nuts
