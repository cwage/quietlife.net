name: Omar
body: |-
  Using
  Preferences -> Mouse and Keyboard -> Keyboard Setup -> Advanced -> Form
  I tried to bind "w ctrl" to "Delete word" by adding an entry. It's not deleting the word, but it did disable the window closing; good enough for now.
  (Opera 7.54/FreeBSD)
