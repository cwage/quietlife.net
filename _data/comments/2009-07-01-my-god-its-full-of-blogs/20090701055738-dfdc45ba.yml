name: donald
body: There's a lotta bad writing, even in good scifi. You just hafta deal with it.
  That said, be sure to check out the Red|Green|Blue Mars series by Kim Stanley Robinson.
  Arthur C. Clarke's Rama series are interesting, if somewhat ham-handed. The novels
  of Philip K. Dick, of course. Anything by Asimov, though his robot short stories
  are among his best works; they're mostly clever logic puzzles dressed up as whodunnits.
  Foundation is pretentious and falls apart after a few books.
