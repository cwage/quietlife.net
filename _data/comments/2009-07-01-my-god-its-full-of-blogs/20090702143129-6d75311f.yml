name: Tobin
body: All of the above are good stuff. Lately the SF I have been reading has been
  the really old school stuff of Jules Verne and H. G. Wells. In the not quite sci-fi
  I do like H.P. Lovecraft quite a bit and Clive Barker will make you put the book
  down and keep the lights on at night. I think my favorite recent books have been
  the Nightwatch books from Sergei Lukyanenko which are not sci-fi but very good.
date: '2009-07-02T14:31:29Z'
