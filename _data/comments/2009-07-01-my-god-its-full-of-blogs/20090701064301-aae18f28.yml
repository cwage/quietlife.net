name: Amber Adams
body: I think I first became interested in sci fi when I read "A Wrinkle in Time"
  by Madeleine L'Engle. I know they're considered kids' books, but I still think her
  series is a really good gateway drug. I love Robert Heinlein, starting with Starship
  Troopers (please don't hold the movie against it), but all of his novels are worth
  reading. I also like Lois McMaster Bujold and David Weber, but they're more pulp
  than Clarke and Asimov. Ray Bradbury should be put into the latter category, too.
  He wrote a lot more sci fi beyond Fahrenheit 451, such as The Martian Chronicles.
  P.S. Orson Scott Card is Mormon. I think this explains a lot. I'm just sayin'. ;)
date: '2009-07-01T06:43:01Z'
