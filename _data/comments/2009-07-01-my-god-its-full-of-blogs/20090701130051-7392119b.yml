name: Sara
body: |-
  Neal Stephenson is cyberpunk and I would recommend this earlier stuff. But before Stephenson, I would heartily recommend William Gibson, granddaddy of cyberpunk. [http://en.wikipedia.org/wik...](http://en.wikipedia.org/wiki/William_Gibson#Selected_bibliography "http://en.wikipedia.org/wiki/William_Gibson#Selected_bibliography"). This Sprawl series hooked me early, and his newer works (Pattern Recognition) are beautiful, quiet and haunting.

  All the other major works have been mentioned in the other comments. Have fun!
date: '2009-07-01T13:00:51Z'
slug: 2009-07-01-my-god-its-full-of-blogs
