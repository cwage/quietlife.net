name: donald
body: Oh, could I have forgotten Vernor Vinge? He writes gripping, epic scifi from
  the computer science angle. A welcome antidote to the rocket scientist/astrophysicist
  angle that dominated the latter half of the 20th century.
date: '2009-07-01T06:00:08Z'
slug: 2009-07-01-my-god-its-full-of-blogs
