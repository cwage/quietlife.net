name: dkw
body: I'm a desultory and infrequent science fiction reader these days, but I second
  the votes for Niven and Vinge. I once enjoyed "The Forever War" by Joe Haldeman.
  And I see you already mentioned "Ender's Game". I suppose Neil Gaiman's not exactly
  "science fiction", but he's a fun read.
date: '2009-07-01T20:39:26Z'
slug: 2009-07-01-my-god-its-full-of-blogs
