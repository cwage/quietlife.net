name: Jason O'Brien
body: Neal Stephenson is definitely cyberpunk but still recommended. And I echo Donald's
  recommendation of Philip K Dick. Since you love Bladerunner, might as well start
  with Do Androids Dream of Electric Sheep which is fun.
