name: Ian M.
body: |-
  My wife forwarded me this link - I used to work the SF section at Powell's Books in Portland and have some boilerplate reading recommendations. Most of what has been suggested is pretty old, so I'll mix in some new stuff.

  Seconding that which is already mentioned:
  Vinge (Fire Upon the Deep)
  Stephenson (Snow Crash)
  Dick (DADOES? or Three Stigmata of Plamer Eldritch, Man in the High Castle)
  William Gibson (Neuromancer)
  Harlan Ellison (short stories)
  Haldeman (Forever War)

  Others:
  Dan Simmons (Hyperion, Canterbury Tales in space)
  Peter F. Hamilton (Reality Dysfunction - this is part of the "new space opera" book cluster)
  Iain M. Banks (Consider Phlebas, or Excession)
  M. John Harrision (Light - this is a real hit or miss book for folks)
  Richard Morgan (Altered Carbon)
  Walter John Williams (Voice of the Whirlwind)
  Ken Grimwood (Replay)
  Alfred Bester (Demolished Man, Stars My Destination) my favorite of the older authors

  not sci-fi, but anyway...
  Gaiman (American Gods)
  Joe Abercrombie! (The Blade Itself)
  Scott Lynch (Lies of Locke Lamora)
  Jonathan Carroll (Land of Laughs)
  Christopher Moore (Coyote Blue, but they're all pretty good)
  Tim Powers (Anubis Gates, Last Call)

  Strong disagree on "ANYTHING by Phillip K. Dick - a significant chunk of his work was written for quick money, while on speed or a combination. Solar Lottery and Galactic Pot Healer (for example) are just NOT as good as some of the other books already mentioned. Anyway, kids are complaining, so it's time to go.
