name: aaron
body: agreeing with dkw above, Neil Gaiman is quite fun - and I recently read one
  of his two books of shorts, and really liked it. And to stray even further from
  sci-fi toward fantasy (because right after I read my first LeGuin book I next read
  these), Robin Hobb's trilogies, Liveship Traders and Tawny Man in particular, are
  along the suck-you-right-in line.
date: '2009-07-06T04:39:16Z'
slug: 2009-07-01-my-god-its-full-of-blogs
