name: Paul Nicholson
body: |-
  Agree 100%. The City Paper had the coverage right, but a crappy business model in this era. The Nashville Post has solid content and is a little closer to the right business model. When hearing that The City Paper closed I was left scratching my head, wondering why they didn't go to the Nashville Post model. The City Paper wasn't a paper for old people. Kill the paper edition. I would gladly pay $5/month for the City Paper delivered to me in digital format - let me log on a view from a web browser and deliver it to my tablet via the Google Play Books (and make it available via iTunes if you must). The cost of the Nashville Post is too high given that I don't need their specific kind of coverage information that badly, but I'd happily support that business model in a publication I saw value in like The City Paper and I really doubt that I'm alone.

  Maybe it wouldn't have worked, but I'm really surprised they didn't at least give it a try.
date: '2013-08-09T18:04:17Z'
