name: Lindsey Turner
body: |-
  Newspapers are stuck in the printed-ad rut. There is still no\* app or website — subscription-based or ad-supported — that can generate the kind of revenue needed to pay a living wage for enough reporters to generate the kind of content needed to make a news outlet worth reading/paying for. Because web ads and app or online subscriptions alone still can't make the kind of money dead-tree ads can.

  That is the only reason newspapers still print. So while the printing overhead is considerable, the printed paper is still where the money is because of those full-page ads and obnoxious sticky notes they slap on the flags. When the economy tanked and national advertisers scaled back their ad buys in newspapers, all hell broke loose and the fragility of the system — and ludicrousness of the profit margins of the past — came into focus.

  A few years ago I was optimistic because I thought web advertising would gain value over time and begin to be able to provide the kind of revenue needed for dead-tree editions to transition to digital-only. But it hasn't happened yet. I'm not confident it will to the degree it needs to. And I don't know how you make the leap from dead tree to pixel, but I think we are feeling those labor pains in a loooong, drawn-out labor that's being managed by a corporate doctor with a not-great bedside manner.

  Metaphors!

  \* I'm actually not sure this is true right now. It was kiiinda true not too long ago but I've been so busy putting out newspapers that I haven't had time to keep up with the news.
