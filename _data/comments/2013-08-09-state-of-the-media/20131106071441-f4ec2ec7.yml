name: Colin McCormack
body: |-
  Is it not also the case that, unlike printed ads, one can obtain a metric of internet advertising's effectiveness (click conversion rate,) and this has cast doubt on the premise that any ads generate revenue?

  If that is so, if advertising has been selling a service which does not provide value commensurate with its cost (and I suspect that it is the case) then advertising isn't profitable and can never be profitable, regardless of medium.

  If ads don't work at the price assumed by newspapers, and the internet proved it, then more internet won't ever garner more advertising revenue.
