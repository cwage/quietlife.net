name: anon
body: |-
  You can't lay blame for worms, spyware, and application crashes solely on Microsoft, much of that is poor administration.

  If I don't change the oil in my car and leave the doors unlocked it doesn't give me the right to run around saying 'Hey, Chevrolets are prone to breaking down and have a poor security system'. Which isn't to say Microsoft has no responsibilty for the state of much of their installed base, they just aren't **solely** responsible for it.
date: '2004-06-25T15:18:52Z'
slug: 2004-06-24-new-things
