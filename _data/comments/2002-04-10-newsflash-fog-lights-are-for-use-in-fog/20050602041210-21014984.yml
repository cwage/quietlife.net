name: TJ
body: |-
  Somewhere out there, beyond your front door,.........................is a LIFE!!!! It can be your's, open the door, move through the opening, pull the door shut behind you and go get a career writing for someone who cares!!!!!!

  If I follow your logic I need to turn off my driving lights when I am stationary, 'cos, you know, they are called 'driving' lights. You idiot!! 'Fog' lights are for enhancing one's driving safety and are for use when the driver feels the need for them! You are one of thoses people who toots people for driving with 'head' lights on during the day or in rain. I cant believe you have this much spare time. How much 'Fog' is needed before one turns them on? Forget it you have no concept of other people's driving needs.
  Arrogance is not a substitute for fairness.
date: '2005-06-02T04:12:10Z'
slug: 2002-04-10-newsflash-fog-lights-are-for-use-in-fog
