name: Erik
body: |-
  1) Yes there are regulations for how fog lamps are aimed. Read SAE J583 and J2510.
  2) There are provisions for Auxilliary Low-beams and Auxilliary High-beams. Read SAE J582 and J581, respectively.
  3) Fog lamps are required to be mounted in a height between 305 to 762 mm.
  4) Federal regulation is very strict on the light output and areas where that light can be placed.
  5) Aftermarket installation of auxilliary lamps is not well regulated in North America, so OEMs cannot do the things that owners are doing. Enforcement is lacking in either knowledge or priority in regulating this.
  6) To point 5, if someone has 4' high mounted 100W fog lamps then yes he is violating the law. If the lamps are mounted over 762 mm (2.5 ft) that is incorrect and also 100W lamps are illegal for road use and are required to covers over those lamps. You can have them, but only for off-road.
  7) I guarantee you that no OEM is shipping vehicles with fog lamps that can operate while the High-beams are on. This is illegal. Fog lamps are only suppose to operate when the parking lamps, marker lamps, and tail lamps are illuminated and shut-off automatically when High-beams are switched on.
  8) You are correct that Fog lamps are not auxilliary headlights that illuminate the road 100 yards in front...those are called either driving lamps or auxilliary High-beams are are only for use when the High-beams are on.
  9) OEMs do have govenors on all cars now, since many years ago. Also, if you were in an accident with a car going 130 MPH then how did you right this article? You would be dead. Don't issue statements of grandiose fabrication that eliciting emotion for something that most likely didn't happen.
  10) High speeds do not cause road fatalities! Not paying attention, not providing enough time or distance to correct for unforseen events, not properly maintaining your vehicle, not having experience sufficient to control a driving situation, being involved in a misfortunate situation, etc. cause road fatalities. High speeds cause shortened reaction time, higher cornering forces, and violating the law, etc.
  11) Just because a Fog lamp has a sharp cutoff pattern does not mean that oncoming traffic cannot see them. There is always some light above the cutoff line and also you can see the illumination of the Fog lamp lens as a marker. Fog lamps work great for extra vehicle identification.
  12) Daytime running lights are regulated and are less intense, so there should be no controversy over it.
  13) SUVs have there place! That is probably why they are so popular. I do not advocate commuting to work in them everyday with only one occupant, but how do you pick-up and haul a family of kids as well as groceries, and possibly some large items from the local home improvement store? Maybe you have a pick-up for the large items, a van for the kids and their gear, and a compact car for when you have nothing to haul and only a few passengers. Perhaps you personally want to finance all of those vehicles for everyone that does use their SUV.

  I think that this is enough points for today...I would of course appreciate it if people put a little bit of thought and research into their statements before they simply write some worthless piece of garbage and publish it for the world to read; spreading more dis-information about things they know nothing about.
date: '2005-05-18T15:25:48Z'
