name: Elitist
body: Another issue i'd like you to address is top-end speed of vehicles! Although
  driving at extremely high speeds doesn't pose anywhere near the same hazard is misaligned
  lights, it's like the first runner up y'know? If car manufacturers had any sense
  they would put a governor on all engines that could go real fast. It's so frustrating
  to me when some asshole wrecks into me at 130mph! Of course this only happens with
  SUV's and not cars that Smart People drive, so I guess nobody reading this will
  have to worry about it. Cars with extremely high top-end speed are not just ornamental;
  they're to cause road fatalities!
date: '2002-04-11T01:25:29Z'
slug: 2002-04-10-newsflash-fog-lights-are-for-use-in-fog
