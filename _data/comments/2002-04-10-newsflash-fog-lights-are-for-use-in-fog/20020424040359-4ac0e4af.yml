name: justin
body: 'at the end of the foglights rant, you said: "drive safely." i put my foglights
  on in the daytime to make sure other drivers can see me well. so i use them FOR
  MY SAFETY, since i have a pretty compact car. i guess you didn''t think of that...
  and a lot of new cars come with DAYTIME RUNNING LIGHTS which are for use in the
  DAYTIME. guess you missed that one too. huh. keep an eye out for my foglights because
  i will run you over if i see you. JUST KIDDING! :)'
date: '2002-04-24T04:03:59Z'
slug: 2002-04-10-newsflash-fog-lights-are-for-use-in-fog
