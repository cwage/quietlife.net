name: Matt w.
body: Hi, I just turned 18 and Iv been on a Low-to almost no carb Diet for about 2
  years.I started at the age of 16, and Iv lost about 50 pounds. The only people that
  live off of fatty meat and suck things to keep your carb down , are those who dont
  know what there doing. This diet is for a person with some sort of nutrition knowlegde.
  You have to eat plenty of greens. With a little thought into it , this diet really
  works fine.
date: '2004-01-25T19:54:46Z'
