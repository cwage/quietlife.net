name: '[rhymes with kerouac]'
body: |-
  Thanks, Chris. I'm amazed at the way different bits and pieces of Today at the Mission turn up in various places in cyberspace. Global village, indeed.

  In the interest of clarity, however, I should mention that the Mission is not located in Nashville, but rather in Ontario, Canada. Protecting the privacy and dignity of the clients prevents me from saying any more (See the "Privacy and Dignity" page on the blog for more info)

  Again, thanks. And I must say that it looks like there's a community of bloggers in Nashville who have it "goin' on". Good on ya - looks like fun.
date: '2005-06-13T04:38:57Z'
