name: Jessica
body: |-
  I'm a camera nerd so I have to comment on this post.

  If you intend to sell the lens, go with the Canon 5D. I've seen ISO shots and nothing can compare, except maybe the mk II. Would that be an option? I honestly can't remember if the 7D is a full frame (I haven't done that much research because I can't afford a new camera and my 30D is perfectly fine right now. and researching a camera is too tempting when it's going to make me want to buy it.) but if it's not a full frame, then you shouldn't even consider it to the 5D. I've talked to people that have both the 5D and the mkII or one of each and they say that they don't regret spending the money on it at all. Definitely one of the best cameras they have ever owned. Plus, full frame cameras will handle ISO better because the sensor is bigger.
date: '2009-11-10T23:07:57Z'
