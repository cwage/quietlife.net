name: Doug Orleans
body: 'Interesting essay! I agree that there is no universal morality, but I think
  there might be objective ways to measure how effective a particular morality (or
  philosophy) is. (A useful analogy is that there is no universal truth in science,
  just theories, and a theory is judged by how well it serves to predict data.) Democracy
  is not inherently better than other forms of government, but it has certain traits
  that have helped it succeed: for example, you don''t have to start a revolution
  to change the laws-- there are laws for how laws can be changed. Adaptability tends
  to be crucial to survival, in governments just as in organisms.'
date: '2003-12-09T01:26:56Z'
slug: 2003-12-08-consent-to-be-governed
