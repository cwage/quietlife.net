body: |-
  "Adaptability tends to be crucial to survival, in governments just as in organisms."

  Doug, I completely agree. Unfortunately it's a class on normative theory so that wasn't supposed to argue what government is \*functionally\* best, but morally best...which I think is sort of a silly question.
