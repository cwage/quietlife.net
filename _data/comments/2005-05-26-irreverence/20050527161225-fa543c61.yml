name: Xibo
body: It's not about respecting the dead. It's about moving a motorcade through town
  in the most efficient manner possible so the rest of us can return to normal driving
  conditions. Otherwise you end up with chaos as everyone tries to keep up with everyone
  else driving from the church to the cemetery, running red lights, bumping over pedestrians,
  etc.
date: '2005-05-27T16:12:25Z'
slug: 2005-05-26-irreverence
