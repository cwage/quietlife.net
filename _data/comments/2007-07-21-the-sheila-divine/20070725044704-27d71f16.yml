name: Greg
body: Well, I had never heard of the Sheila Divine before the other night, but I was
  there on the momentous occasion when Chris realized that in this great big world
  of ours a sense of smallness was appreciated when he shared a moment with an until
  then stranger...beautiful, truly beautiful.
date: '2007-07-25T04:47:04Z'
slug: 2007-07-21-the-sheila-divine
