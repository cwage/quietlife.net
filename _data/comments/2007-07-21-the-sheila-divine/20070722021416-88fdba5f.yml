name: aaron
body: i still listen to their cds, and i saw them once in st. louis. I didn't realize
  how new they were when we used to go see them - july 1997 was their first show,
  and we were up there in september. crazy. i'm a little sad i wasn't informed about
  thsoe reunion shows. i'd like to see them again. and boston.
date: '2007-07-22T02:14:16Z'
