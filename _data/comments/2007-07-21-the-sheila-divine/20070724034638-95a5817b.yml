name: steve
body: Sounds like y'all need to come on up for a little Sheila Divine reunion weekend!
  They ARE still kinda big up here. Or at least the lead singer is (Aaron something
  I think?). His new band, Dear Leader plays all the time at the Middle East and the
  Paradise. And I think he lives in my hood somewhere. Saw him walk by my porch the
  other day. That's cool you found the old website! I remember first seeing you put
  that together in your BU dorm room.
date: '2007-07-24T03:46:38Z'
slug: 2007-07-21-the-sheila-divine
