name: Jackson
body: |-
  He has been unsuccessfully running for office in Nashville for years. It is something you can count on in Nashville. Like songwriters showing up at the Greyhound station thinking they might get 'discovered' in Nashville. It is part of the futility that we rely on. ;)

  having said that, I would consider voting for him, but sadly, I think he is possibly too principled and idealistic to be a successful politician. I guess he is kinda like the Ralph Nadre of Nashville.
date: '2005-08-10T14:45:49Z'
slug: 2005-08-09-hooker-running-for-governor
