name: Andy
body: Are you joking? For a start they are about the same age. For a second, one of
  them is Scottish with a Glaswegian accent, the other posh English. That's like mistaking
  a Canadian with a Mexican. Plus, since when did John Cleese ever have long flowing
  hair. The only thing they have in common is height.
date: '2006-05-22T12:24:05Z'
slug: 2005-08-28-billy-connelly
