name: Sam
body: Hey guys. Sam Smith here, author of the quote being made fun of. No I'm not
  5, and my apologies for not being reminded of a few of these mentioned films. Maybe
  it wasn't the perfect way of describing it. But if you'll allow me to engage in
  a discussion about it, I still would say that a lot of people who lined up for Beavis
  and Butthead, South Park, and Akira were teenagers. I think the Fritz the Cat stuff
  was all short subject -- again, correct me if I'm wrong. Anyways, I haven't seen
  all the films on the Onion's list (a good one). But A Scanner Darkly does seem to
  be something different -- a feature-length fiction drama marketed solely to an adult
  audience. That's pretty rare.
date: '2006-07-19T14:57:25Z'
slug: 2006-07-18-dumb-quote-of-the-day
