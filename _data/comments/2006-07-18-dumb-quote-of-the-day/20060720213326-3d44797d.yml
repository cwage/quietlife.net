name: Sam
body: Okay, okay, so if you knew me you'd know that I have a HUGE tendency for hyperbole.
  Chris' comment, though not made in the nicest way possible, has only reminded me
  of that. So consider it removed from the record. I also should have said "American
  film" -- I've seen plenty of Japanese anime and I LOVE Grave of the Fireflies. And,
  like everyone else, Miyazaki of course -- My Neighbor Totoro is (and I'll stand
  by this hyperbole) one of the best children's films ever. I also really liked Millenium
  Actress, and I've heard that the Neon Genesis Evangelion series is mind blowing.
date: '2006-07-20T21:33:26Z'
slug: 2006-07-18-dumb-quote-of-the-day
