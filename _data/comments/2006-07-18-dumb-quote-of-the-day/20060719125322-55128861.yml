name: Lesley
body: Wow. I wonder exactly how old that kid is--about 4 or 5? Because right off the
  top of my head, I can name at least 3 animated movies that were rated "R," which
  inidicates, by default, the movies are for adults. I haven't seen any of the three
  that come immediately to mind, however (Heavy Metal, South Park, Beavis & Butthead).
  And I'm sure there are "films" that fit the description that my 7:30am brain can't
  think of.
date: '2006-07-19T12:53:22Z'
slug: 2006-07-18-dumb-quote-of-the-day
