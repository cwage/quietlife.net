name: cwage
body: |-
  That's not really what I meant -- the voter suppression bit was a bit tongue-in-cheek -- i.e. who needs complicated suppression conspiracies when you can just make people wait in line.

  The issue that I am really angry about here is, well, that people are waiting in line to vote and giving up. That's fucked up whether it happens in East Nashville, Brentwood, or Hermitage (and I believe it happened in all three).
