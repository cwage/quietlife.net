name: Sarcastro
body: |-
  Yeah, I know. I just had to get my voter suppression rant out of my system. After watching that bullshit last night, people in line until after midnight, I knew that some folks wouldn't accept incompetence as an excuse.

  My polling place had three unused machines sitting in reserve.
