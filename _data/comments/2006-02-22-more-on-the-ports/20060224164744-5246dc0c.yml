name: Doug Orleans
body: I haven't been paying attention to this at all, but it seems like an argument
  could be made that our ports should only be controlled by an American company. Or,
  better yet, the American government. But I actually have no idea what "controlled
  by" really means.
date: '2006-02-24T16:47:44Z'
slug: 2006-02-22-more-on-the-ports
