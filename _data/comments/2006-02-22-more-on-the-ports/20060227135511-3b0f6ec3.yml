name: Xibo
body: Generally I can agree or at least understand the conservative viewpoint, but
  the major flaw in this whole reasoning stems from the fact that UAE and the UK are
  not the same. The UK is an ally, part of NATO. The UAE is not. The UAE doesn't even
  recognize Israel. The whole "it wasn't a problem when a UK firm owned the company,
  so it shouldn't be a problem now that a UAE firm owns it" naturally assumes that
  the UK and the UAE are equal in their relationship with the US. But they're not!
  Would it be okay if an Iranian firm owned P&O? I'm not saying that UAE is a state
  sponsor of terrorism, but they're nothing like the UK.
date: '2006-02-27T13:55:11Z'
slug: 2006-02-22-more-on-the-ports
