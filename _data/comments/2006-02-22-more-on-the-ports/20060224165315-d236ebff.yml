name: cwage
body: I absolutely agree. But you'll note that this wasn't exactly a hot-button issue
  when it was a British-owned company. The reaction to the UAE take-over may eventually
  lead to useful discussions in this area, in some digressions of conversation, but
  it's dangerous to ignore the fact that the initial outrage was a knee-jerk xenophobic/racist
  backlash because the country involved is from the middle east.
date: '2006-02-24T16:53:15Z'
slug: 2006-02-22-more-on-the-ports
