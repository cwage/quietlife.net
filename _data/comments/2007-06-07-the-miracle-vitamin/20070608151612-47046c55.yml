name: Sara
body: Yeah, I heard the same, though it was 15 minutes a day. Apparently time from
  house to car to office to car to house, doesn't provide enough. Glass in cars filters
  sunlight (or should). Go for a walk, but take your sunglasses. Full sun in the eyes
  is no good!
date: '2007-06-08T15:16:12Z'
slug: 2007-06-07-the-miracle-vitamin
