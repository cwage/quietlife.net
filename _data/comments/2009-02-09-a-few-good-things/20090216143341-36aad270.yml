body: |-
  The BPA record so far is very hit or miss.. mostly miss. almost entirely, in fact. There is however a track with Martha Wainwright that is basically awesome, but only because of Martha Wainwright..

  In a week or so I'll probably post a followup review of these albums. Lots of disappointments sadly.
