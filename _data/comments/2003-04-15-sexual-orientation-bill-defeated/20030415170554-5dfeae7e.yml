name: Glenn Peters
body: |-
  I wonder what minority openly gay, small-minded politicians will be denouncing in a hundred years or so...

  "How dare you compare us to the Alpha Centaurans? Were they dragged through the streets and beaten simply because of their sexual preference? Is my child going to be taught that being of another species is a valid lifestyle choice in their orbital grade space school?"

  Or maybe we'll loop back and start picking on Irish minorities again.

  I also like how the second guy seemed to be actively arguing in opposition to morality. "Huh? Morality? We don't want none of that around here. It boggles my mind."
date: '2003-04-15T17:05:54Z'
