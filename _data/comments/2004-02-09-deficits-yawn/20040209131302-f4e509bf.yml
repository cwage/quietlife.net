name: Doug Orleans
body: People seem to think that deficits aren't bad because eventually they end when
  the economy recovers. But a couple years of surplus doesn't make up for decades
  of deficit-- the total black numbers have to eventually add up to the total red
  numbers, which are currently in the [trillions](http://www.brillig.com/debt_clock/
  "http://www.brillig.com/debt_clock/").
date: '2004-02-09T13:13:02Z'
slug: 2004-02-09-deficits-yawn
