name: SayUncle
body: |-
  I am not misrepresenting the article. I am making observations about the relevant portions regarding perception. I tend to agree with you that the perception of the word deficit (it's not a big deal) has dwindled significantly.

  My point is that the deficit is not having he effect on investing and policy that people would like us to think it has.
