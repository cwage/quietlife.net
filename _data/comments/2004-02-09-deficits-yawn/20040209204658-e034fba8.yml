name: Manish
body: What SU is trying to say is that there isn't a one-to-one relationship between
  deficits and debt. The deficit is an accounting deficit which is different from
  cash coming in and cash going out. Debt is the actual amount of money that the US
  government owes to other people. However, generally speaking larger deficits, lead
  to larger amounts of debt.
