name: SayUncle
body: And deficits may or may not have to be *paid back*. I think you're confusing
  debt with deficit. There are non-cash transactions (like depreciation) that lead
  to deficits but have no impact on cash to pay to someone in the future.
date: '2004-02-09T11:10:08Z'
slug: 2004-02-09-deficits-yawn
