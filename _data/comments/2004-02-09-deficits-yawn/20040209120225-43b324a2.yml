name: cwage
body: |-
  (Man I really need to fix the comment templates on my site. the threaded plugin broke with an upgrade. this blows.)

  > *And deficits may or may not have to be paid back. I think you're confusing debt with deficit. There are non-cash transactions (like depreciation) that lead to deficits but have no impact on cash to pay to someone in the future.*

  I'm not confusing them. Deficit spending incurs debt. Depreciation (inflation?) would actually help decrease the impact of deficit spending and debt accumulation in the future, but not enough: our current deficit spending is [unsustainable](http://www.cbpp.org/1-16-04bud.htm "http://www.cbpp.org/1-16-04bud.htm").
date: '2004-02-09T12:02:25Z'
