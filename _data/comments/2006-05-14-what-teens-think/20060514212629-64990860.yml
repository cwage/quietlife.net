name: Steve L.
body: While, I agree with you that the Tennessean blows on so many levels, honestly,
  I didn't think the article was so bad. Yeah, its only 4 people, which doesn't constitute
  a true sample. nor are thier opinions truely representative of nsahville as a whole...but
  so what? would you rather they quote some redneck teen who spews the pretictable
  "Send them all back!" garbage? I mean those people get airtime all aver the place
  (Thanks Fox News!). what's so bad about sane, well thought-out opinions getting
  on the news sometimes. Now that's fair and balanced for ya.
date: '2006-05-14T21:26:29Z'
slug: 2006-05-14-what-teens-think
