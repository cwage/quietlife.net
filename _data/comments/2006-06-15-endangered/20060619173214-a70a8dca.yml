name: Les Jones
body: I saw that story over at Ace of Spades and had the same reaction. The armed
  citizen is a moron. You draw a gun in response to an imminent threat to life or
  limb, not because of an unarmed naked guy in the bushes. And you sure don't chase
  him and take potshots.
date: '2006-06-19T17:32:14Z'
slug: 2006-06-15-endangered
