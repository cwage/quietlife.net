name: Freeman
body: The same herd girls flashing gang signs today would have been dying their hair
  black and trying to act all Pat Benetar, if they grew up in the 80s.  Thug culture
  just happens to be this generation's version of cool.  If it's doing anything for
  culture relations, it's helping it—granted, in a twisted sort of way.  But black
  culture is no longer the "other" that the dominant culture defines itself against.
   It's now the cool thing to embrace and racism is becoming the un-enlightened "other"
  to be rejected.  Flaws?  Sure.  Progress?  Definitely.  I still remember a time
  when MTV wouldn't play any black artists.
date: '2012-04-27T14:41:39Z'
