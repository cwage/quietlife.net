name: ಠ_ಠ  Roger X
body: I respecfully disagree with you.  Dave Chappelle would often put on whiteface
  and mock white people on his show. I laughed my ass off. Am I now a racist for thinking
  he was funny?  Which "other" am I a part of?  I think it is the open cultural tweaking
  of ALL stereotypes that helps cultural (including racial) progress in this country.
  It's the context that matters. Music and humor are contexts meant to explore any
  and all ideas, and should be scrutinized, to be sure -- but the de facto position
  "these white hipsters singing hip hop are mocking black people" is short-sighted
  when it's cultural tweaking - EVERYBODY is an "Other" of some form or another.  Exploring
  otherness in a humorous, even as you say, mocking way, is not on its face racist--
  in fact I contend, again, it is necessary for ending "Other"ness.  It may be in
  poor taste, it may deserve to be discussed, called out.  But you can't say, in effect,
  that one group of people has no freedom to tweak any cultural stereotypes... without
  hurting the marketplace of ideas and setting back the grand, open discussion of
  society about 50 years.  We've moved beyond that simplistic point of view. It's
  more nuanced now. It's getting better. We need to keep sticking with that.
date: '2012-04-27T13:44:10Z'
