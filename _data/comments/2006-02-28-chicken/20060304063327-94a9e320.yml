name: Kevin Carson
body: Don't worry about it too much. When I start dreading my job too much, I eat
  some undercooked chicken. ("I'm not coming in today. I've been hopping to the toilet
  every five minutes--that chicken I ate must not have been quite done.") A couple
  days of squirting gray water is sometimes a lot more pleasant than going to work.
date: '2006-03-04T06:33:27Z'
slug: 2006-02-28-chicken
