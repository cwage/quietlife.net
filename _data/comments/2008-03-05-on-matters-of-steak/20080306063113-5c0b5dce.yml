name: Eddie Christy
body: I do the pan action quite a bit. Though, if I do the oven, I usually just go
  ahead and broil it the entire way. This way I can throw some onions or mushrooms
  on top and let them soak up the juices from the steak. I don't get the char-grilled
  taste... but the juicy mushrooms are a nice trade.
date: '2008-03-06T06:31:13Z'
slug: 2008-03-05-on-matters-of-steak
