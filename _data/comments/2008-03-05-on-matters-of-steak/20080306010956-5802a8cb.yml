name: Nashville Knucklehead
body: Dude, I was going to mention putting bourbon in the pan, but CLC beat me to
  it. Steak and Bourbon. Mmmmmm. I, too, have never done the skillet cook in reverse
  order. But I have a patio. And a grill. (And a smoker the size of a VW Bus.)
date: '2008-03-06T01:09:56Z'
slug: 2008-03-05-on-matters-of-steak
