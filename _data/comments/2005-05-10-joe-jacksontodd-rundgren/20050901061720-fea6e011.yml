name: ute
body: |-
  Hi Lisa-marie!

  Im rom gemany. Just short. Saw Rundgren in Liverpool with my friend I found over the Rundgrenpage.
  the rundgrenpage. It was in my bday in the same place on the same seat my daughter got her
  graduation out of the hands of MC-Chartney. Strange feeling.

  Saw Rundgren gettin better and better in Hamburg. I was fun and J.J. too. Rund sighn
  my LP from 1074, Todd, and I gave him some flowers before he played "Bang the drum all day!

  Read the review from San Sebastian??? Very good,intense.

  I been with my friend in San Sebastian too at the kurhaus. Rundgren and JJ stii advertised.

  See he still is intense and has something to give. But he needs the change aswell.

  Peace

  Ute
