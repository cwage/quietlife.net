name: Rachel Spawton
body: |-
  I saw the show in Leicester, England (June 3rd). Having never heard of Todd Rundgren before I was suprised that JJ was playing second fiddle to a bloke who sang so loud I still don't know what his stuff's like.

  JJ was awesome. The man is a genius! The highlight for me was his rendition of The Other Me with Ethel (also fantastic) - an alltime favourite. I just I was able to see more concerts!!!
date: '2005-06-07T13:40:16Z'
