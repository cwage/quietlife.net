name: lisa marie
body: i saw todd at the house of blues in las vegas last year....the show was ok for
  a vegas show...but it definately not the todd i grew up with. i was enjoying the
  show, knowing it was my favorite artist of all times. but when he played , "my guitar
  gently weeps". i had to walk out and contain myself. of all the acoustic songs he
  could of played, he played that. . i would of expected, "piss aaron" or "you left
  me sore".....he did it alright but i wanted more. I even tried to get a cd signed,
  but he only signed a guys licence plate, it said 'I@Todd", I "heart" Todd. but tonight
  i saw a rerun of conan and he played with joe jackson, i get it now. But still Todd
  has so much to give, i can feel it even when he talked to the crowd i could see
  it. He left me sore. I WANT MORE!!!!!
date: '2005-07-12T09:37:34Z'
slug: 2005-05-10-joe-jacksontodd-rundgren
