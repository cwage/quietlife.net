name: Marcus Whitney
body: I quit on Thursday, I slept 10 hours yesterday. I'm no totally off caffeine,
  but I'm off coffee. I've been drinking Green Tea, some of which has caffeine, but
  I can tell it's nowhere what I'm used to. Also, I'd like to say that my biggest
  benefit from quitting coffee is my digestive system. Coffee was tearing me up.
date: '2006-03-06T21:15:51Z'
slug: 2006-03-05-caffeine-update
