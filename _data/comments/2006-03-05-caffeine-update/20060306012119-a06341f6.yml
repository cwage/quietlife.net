name: Doug Orleans
body: |-
  I quit caffeine on Monday. I had just come down with a cold, and I
  figured I wouldn't even notice the headache compared to the sore
  throat and stuffed-up head (and I was pretty much right). I was
  also out of Diet Coke and too weak to go out to get more, but I had
  actually been sort of thinking about quitting anyway, so it was good
  timing. So far I haven't really been able to tell the difference,
  mainly because I'm still not quite over the cold so I'm just
  generally tired all the time anyway. But it's nice to have one less
  thing to think about.

  On the other hand, it's annoying that nowhere in the mall food court
  can you get soda that's both sugar free and caffeine free. Hmph.
date: '2006-03-06T01:21:19Z'
slug: 2006-03-05-caffeine-update
