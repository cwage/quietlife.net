name: Blake
body: |-
  Well...I used a radiator stop leak product in an MGB I used to have, and it seemed to do the trick. Yes...it's a quick rig, but if you don't want to spend the time or money, it might be the way to go.

  Although...I would discuss it with the guys down at AutoZone or wherever first before putting it in a Sentra.
