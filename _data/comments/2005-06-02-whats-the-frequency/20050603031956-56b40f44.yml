name: cwage
body: |-
  Indeed.. I think part of the reason my frequency has gone up is because I shifted my strategy a bit in posting.

  When I originally started blogging it wasn't much more than a "news" section on my "home page". I didn't know what I was going to do with it beyond that but once it took over being the central point of my net presence, I started to focus on longer well-written tomes -- mostly because I wanted to avoid being basically a LiveJournal type frivoloblog. Not that there's anything wrong with that, but it just wasn't what I wanted to do.

  So I took the polar opposite approach and only posted something after I had really thought about what I wanted to say, researched it well, and practically wrote little mini-essays.

  The problem with this approach appears to have been:

  a) it's time-consuming, and I no longer have that sort of free time
  b) The things I tend to find interesting and worthy of writing several-page essays on are evidently mind-numbingly boring to others
  c) the infrequency of the posts keeps people from coming back regularly.

  So lately I have shifted my approach to blogging in general and allowed myself to post things that are smaller mere observations and frivolity. A more casual approach, if you will.. which ironically has resulted in a net **increase** in posts in general. Go figure.
date: '2005-06-03T03:19:56Z'
slug: 2005-06-02-whats-the-frequency
