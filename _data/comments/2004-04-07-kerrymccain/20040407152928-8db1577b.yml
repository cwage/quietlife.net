name: Erik
body: Seriously, Chris, you need to get out more. All she was saying is that it'd
  be better to have a middle-of-the-road pair in the White House than the current
  administration. That's a statement you can disagree with (I know Ralph Nader does),
  but it's not eye-poppingly, steam-shootingly controversial.
date: '2004-04-07T15:29:28Z'
slug: 2004-04-07-kerrymccain
