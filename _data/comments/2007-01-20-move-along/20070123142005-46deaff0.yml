name: Kevin
body: Great photo - and true life story. I've seen this happen at other grates too.
  Just imagine how drunk you'd have to be, to require 3 or more blasts of a siren
  for to wake up. Drinking gives people a false sense of warmth, as the alcohol actually
  reduces one's ability to maintain body heat. I'd ask that people not give to panhandlers
  just so to prevent the homeless like these from freezing to death this winter.
date: '2007-01-23T14:20:05Z'
slug: 2007-01-20-move-along
