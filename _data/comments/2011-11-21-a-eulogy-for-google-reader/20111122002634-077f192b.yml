name: Christy Frink
body: |-
  Ironically, I went down to click "share" on Google Reader after reading this. And then I was like, "Oh, I can't share anymore so I'll leave a Reader comment. Oh, I can't leave a reader comment anymore so... ah, fuck it. I'll just do this the old-fashioned way."

  So anyway, +1.
