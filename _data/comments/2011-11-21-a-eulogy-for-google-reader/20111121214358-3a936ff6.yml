name: S.Patel
body: I am liking Feedly after about a week of using it.  Sadly, I feel this is just
  the beginning of a never ending quest where I go from one to the next aggregator.
   I tried Pulse and SkyGrid and they were just not for me.
date: '2011-11-21T21:43:58Z'
slug: 2011-11-21-a-eulogy-for-google-reader
