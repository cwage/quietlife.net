name: Chris Hatfield
body: It really might be worth it to have a professional piano tuner come take a look
  at it. Tuning is cheap and there are bound to still be plenty of people around Nashville
  who do that sort of thing. Then he or she can probably give you some insight into
  what else you'd need to do to get it up and running.
date: '2009-01-26T07:28:18Z'
slug: 2009-01-04-oh-hello-2
