name: bob mcbob boberton III
body: Keys can stick for a variety of reasons. The actions in these things are absurdly
  complex, and most likely it's just that one piece or another is slightly out of
  alignment, or has swelled a little, or something. Fiddling with it might free it
  up. There are ALSO little scraps of cloth and leather, which may have busted, in
  which case some replacement will be required. It's certainly not impossible to tune
  these things, and to repair/recondition/otherwise resurrect the action. My advice
  is to proceed with caution. Especially do not get tempted to squirt in lubricants
  or anything. I'm fairly sure that sort of thing is 100 percent guaranteed to make
  things worse.
