name: Mister Nashville
body: |-
  There isn't much that is healthy in downtown... unless you consider sushi healthy. Especially at night.

  You might want to try Charlie Fenton's MainsTreat Deli over in the Market Street Emporium. It's vegetarian and tasty. Although, they kinda have random business hours.

  I dig Amy's Restaurant on Church Street as well Pacifica which is just a block down. Those places are normally only open during the day, though. They have some decent healthy alternatives.
