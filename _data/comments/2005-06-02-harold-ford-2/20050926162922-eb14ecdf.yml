name: Tia Carter
body: |-
  We are suppose to be a conservative "christian" state.
  My bible tells me not to judge people. Are we not
  christian "enough" to vote for a qualified person be-
  cause his uncle is a nut? Although I must admit, I am
  tempted to vote for Mr. Ford based on looks alone, but
  that too is a form of judgement (the looks fairy was
  away from the desk with some of them). Seriously, Mr.
  Ford presents himself as an informed and intelligent
  person who cares about the issues confronting all
  tennesseans. Personally, I would vote for a blue fish
  if it could provide the sound leadership needed to
  guild us to a successful solution to the messy issues
  confronting our state. Healthcare;education for our
  children;jobs for our young people;livable wages for
  our workers...do you really think informed people
  care what someone's uncle did?
date: '2005-09-26T16:29:22Z'
