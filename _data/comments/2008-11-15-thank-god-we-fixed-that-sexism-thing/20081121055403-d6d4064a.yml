name: Dreidel
body: |-
  Hey Chris,
  Cathy Young has done a good job of PWNing you in her Nov 20th reply on her website [www.cathyyoung.blogspot.com](http://www.cathyyoung.blogspot.com "www.cathyyoung.blogspot.com") (which I can't link to directly in this "comments" section, but which you can certainly access through your server). If you're willing to address her specific remarks honestly -- as opposed to ad hominem cheap shots amd dishonest generalizations that mischaracterize her beliefs -- I'm eagerly awaiting your reply.
