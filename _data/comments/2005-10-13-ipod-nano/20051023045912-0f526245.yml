name: a-frame
body: |-
  Ok, ok, so I may be the computer-dumbest guy who reads about your quietlife, but I have to ask, why is this a good thing to do? And by 'this', I mean run your ipod nano with linux?
   This is not the indignant tone of the technologically hesitant, i.e., 'why would you do \*THAT\*?', but the actual foggy-minded question, 'um, why would you do that?"
   do you save space for more songs, or are you just avoiding windows crashes?
  or is it just cuz why not?
date: '2005-10-23T04:59:12Z'
slug: 2005-10-13-ipod-nano
