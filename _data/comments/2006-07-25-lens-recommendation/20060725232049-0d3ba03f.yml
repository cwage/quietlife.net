name: Glenn
body: Back when I had (well, used) an SLR, I tended to keep a zoom lens on most of
  the time. I think I typically used the 35-135, but I eventually got a 24-85 (or
  something like that) I used a lot. Not only are lenses heavy and awkward, changing
  lenses takes time one often doesn't have when trying to take a shot.
date: '2006-07-25T23:20:49Z'
slug: 2006-07-25-lens-recommendation
