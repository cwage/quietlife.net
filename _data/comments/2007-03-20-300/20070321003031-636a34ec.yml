name: Kevan
body: I don't think there was any racism in Tolkien's works. Orcs were not meant to
  represent a particular human "race", and, if you read it as allegory, which Tolkien
  denied it was, then Orcs are better explained as the darker, facist side of any
  human being. Just defendin' my main dude, Ol' J.R.R.
date: '2007-03-21T00:30:31Z'
