name: John Swift
body: What gets me is how the hatred from the left just spews out. No wonder David
  Duke is now a Democrat who endorsed Kerrry.Well gangs have taken over the city in
  certain parts and are hampering rescue, shooting up hospitals, police stations ect..
  efforts; so yes the National Guard needs to be able to fight back. You libs are
  on another planet if you think other wise. This is awfull situation but most of
  the help is coming from the private sector like churches and yes the evil Wallmart.
  I lived in New Orleans for 4 years. It was the murder capitol of the world at the
  time. The city is filled to the brim with drug addicts gangs and crooks not not
  only on the streets but in the government as well. Yeah Bush has turned out to be
  a joke of a conservative but if you put your faith into the federal government,
  you will be disappointed. I hate to think of what will happen if we get another
  attack
