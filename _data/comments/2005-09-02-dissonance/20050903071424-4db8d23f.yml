name: Glenn Peters
body: |-
  I haven't noticed nearly as much polarization (in terms of their only being two sides) as, say, over the Iraq war, or the Bush administration in general, but then I haven't been following the politics of Katrina that closely.

  Once thing I have noticed is that it makes everything highly charged. So pointing out that much more should have been done to protect the city and its inhabitants becomes heard as an attack on the victims, which is (usually) just plain not true. It's precisely because this is such a tragedy that more should have been done.

  Obviously [people knew this could happen](http://www.sciam.com/article.cfm?chanID=sa006&articleID=00060286-CB58-1315-8B5883414B7F0000&pageNumber=1&catID=2 "http://www.sciam.com/article.cfm?chanID=sa006&articleID=00060286-CB58-1315-8B5883414B7F0000&pageNumber=1&catID=2"). There were [so many screw-ups](http://leninology.blogspot.com/2005/09/politics-of-weather-3-shyness-of.html "http://leninology.blogspot.com/2005/09/politics-of-weather-3-shyness-of.html") involved I suppose we should count our blessings that a mandatory evacuation had been called at all.
