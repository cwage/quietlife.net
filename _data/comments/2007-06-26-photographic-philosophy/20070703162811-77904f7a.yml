name: Susan A
body: Chris, buying a bigger hole costs a lot more than a flash and it doesn't offer
  much in the way of control i.e. direction or light temperature, etc. I prefer available
  light (when it's good, always) but it has a life of its own. With the flash you
  at least have the option of recreating it (plus, with a little practice it can also
  used to break up a fight or signal airplanes ;-)
date: '2007-07-03T16:28:11Z'
slug: 2007-06-26-photographic-philosophy
