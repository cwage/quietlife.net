name: Emily
body: I always use available light. Nomatterwhat. It's not even a financial decision,
  really. It's just me. Sorry, I guess that did NOT answer your question. Am I missing
  something here, cuz it seems obvious that it's cheaper to use available light. Unless
  of course you need a new lens to make the hole as big as you need it. Or if it costs
  more on the back-end to fix the contrast and overall tone of a picture because the
  lighting was no good to begin with. But for me, if I can't get it with available
  light, then I don't really want it that badly.
date: '2007-06-26T18:37:08Z'
slug: 2007-06-26-photographic-philosophy
