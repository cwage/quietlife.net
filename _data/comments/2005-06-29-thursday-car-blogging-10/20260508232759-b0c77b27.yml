body: Продажа медицинской техники <a href=https://techmed.kz/>https://techmed.kz</a> и оборудования в Алматы от компании Adamant Group — это сертифицированные УЗИ-сканеры, физиотерапевтические, лабораторные и хирургические аппараты от надёжных производителей. Работаем с 2004 года, предлагаем сервис, установку и гарантию на всё оборудование. Медицинские аппараты с доставкой по Казахстану — оперативно отгружаем в любую точку страны, помогаем с подбором под задачи вашей клиники.
