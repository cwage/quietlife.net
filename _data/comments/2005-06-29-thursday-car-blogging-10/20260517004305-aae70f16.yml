body: 'Тем, кто хочет <a href=https://doramago.cc/>дорамы с русской озвучкой онлайн бесплатно</a> спокойно, без лишних переходов и путаницы, DoramaGo может стать приятной площадкой для вечернего просмотра. Здесь собраны корейские, китайские, японские, тайские и другие азиатские сериалы, где есть то самое настроение, за которое дорамы так ценят: красивые истории о любви, интриги, яркие герои и атмосфера Азии. Понятная навигация помогает быстро подобрать сериал по стране, жанру, году или настроению, а регулярные обновления позволяют быть в курсе новых эпизодов.'
