name: Jon
body: Good article. I would only add that until or unless we embrace "the third way",
  there is still one tremendous change which could be made to the old way, which is
  to rent the electromagnetic spectrum rather than sell it, with the royalites going
  to the people much as with the Alaskan oil fund. The spectrum is part of the commons
  which should never be privatized; if scarcity prevents open-access, then those who
  wish to use the commodity must reimburse those who leave it available.
date: '2006-02-03T15:16:22Z'
