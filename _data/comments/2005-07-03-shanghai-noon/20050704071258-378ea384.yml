name: the ghost of Erik
body: |-
  I can't believe you made me go hunt this down. It's not a script error, [it's a joke](http://www.nitpickers.com/movies/nitpick.cgi?np=17880 "http://www.nitpickers.com/movies/nitpick.cgi?np=17880"), or at least a callback to an earlier scene.

  P.S. In a movie about Owen Wilson and Jackie Chan in the Old West, *this* is what you find jarring?

  P.P.S. I miss being alive. :-(
