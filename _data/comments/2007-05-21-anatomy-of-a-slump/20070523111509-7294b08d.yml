body: |-
  Number 1: You are an incredible photographer
  Number 2: Many of us, in fact, are stupid
  Number 3: Back in the worst year of my life, an aborted law school year, I got dumped by the woman I thought I was going to be with for many years. It sucked. Then it sucked worst, and then unbelievably it got worse than that. After 6 months, it actually got better. Really.
