body: |-
  The subject of the discussion was Beethoven's race.

  The allegation was made that he was black.

  That is incorrect.

  The reasons are abundantly clear (e.g. [Click to see Beethoven's hair.](http://www.er.doe.gov/Science_News/featurs_articles_2000/beethoven/Beethoven.htm "http://www.er.doe.gov/Science_News/featurs_articles_2000/beethoven/Beethoven.htm"))

  Then the claim was made that the Moors were black. That is also incorrect ([click here](http://www.angelfire.com/md/8/moors.html  "http://www.angelfire.com/md/8/moors.html ")). (or, alternatively, talk to - and look at - someone from any North African or Middle Eastern country).

  The Afrocentrists are behind these claims.

  They are not historians or scientists.

  They are a political movement. This is the only reason they are taken seriously.

  If you look at the claims that they make on this board, you will see what they are really after.

  To understand political/mass movements, a good book to read is ["The True Beleiver", by Eric Hoffer (click).](http://www.amazon.com/exec/obidos/tg/detail/-/0060916125/102-3215862-8412100?v=glance "http://www.amazon.com/exec/obidos/tg/detail/-/0060916125/102-3215862-8412100?v=glance")
