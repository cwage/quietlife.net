name: moor
body: "dear belle,\n\ni think you might have something for me:) just kidding, just\
  \ a little poor humour. anyway, i'm an aries so having a chip on my shoulder is\
  \ natural. i try to control it though, but knowledge makes it very hard. i'm working\
  \ on that though. but anyway, i already provided you with facts about the influence\
  \ of the moorish influence of germany. but somehow you forgot already so i will\
  \ re-post the following from my previous entries:\n\n\"And to respond the idea that\
  \ because Beethoven cam from German and Flemish parents that he could not be African,\
  \ let me school you on the fact that Black Celts (Silures) & Black Vikings mixed\
  \ with the Scandinavia people. The black blood type is common even in Nordic Europe\
  \ where intermixing has been happening since antiquity. Even Hitler's family had\
  \ some Black blood, reports the New York Times 7/1/40. The Huns included Black Mongolians\
  \ who mixed heavily with the 'Aryan Germans.' Furthermore, in the early modern period\
  \ many Africans and ex-slaves from the Americas lived with aristocratic families\
  \ in the courts of German territories or with wealthy bourgeois families as highly\
  \ regarded and privileged domestic servants. Blacks also served in the military\
  \ of many German states, most as splendidly dressed musicians; many were recruited\
  \ by German troops in North America. Moravian missionaries from Saxony also brought\
  \ ex-slaves with them to Germany from the Caribbean. (See Peter Martin, Schwarze\
  \ Teufel, edle Mohren: Afrikaner in Bewußtsein und Geschichte der Deutschen). Blacks\
  \ were numerous, but also because they in many ways had an important cultural impact,\
  \ as their presence in German art, literature, public debate, and daily life. There\
  \ are hundreds of paintings from this era portraying black and white people together.\
  \ In Germany\x92s Hesse and Brunswick-Wolfenbüttel area, where a relatively large\
  \ number of Africans lived during this period, there had been a tradition of black\
  \ servants and military musicians in these regions since the seventeenth century,\
  \ and in the eighteenth century these two \x93dukedoms\x94 [areas] provided the\
  \ largest contingents of German soldiers fighting in the Revolutionary War in America.\
  \ After the war many former slaves accompanied the German troops back to Europe,\
  \ so that by the late 1780s the number of Africans in these two German states increased\
  \ considerably, and Beethoven born during this time. Hesse and Brunswick-Wolfenbüttel\
  \ provided ideal conditions for a microhistorical investigation of both the African\
  \ and German experience, and perceptions of each other over the course of two centuries.\
  \ However, in some ways the treatment of black musicians, soldiers, and servants\
  \ was similar to that of their white colleagues, but there were fundamental differences\
  \ in Germany. The lives of many Africans were described in terms of \"privileged\
  \ dependency.\" Unlike France and England, none of the German states had a legally\
  \ defined status for people who had been bought as slaves in other countries and\
  \ then brought into Germany. Blacks were subject to property relationships and were\
  \ considered valuable possessions, however they could move about freely within white\
  \ society; their de facto slave status was quite different than it was for African\
  \ slaves in other Western countries. Many Africans and the African Americans who\
  \ came with the Hessian soldiers married into local families of all social strata\
  \ and had children. Hello! German historian Vera Lind states, \x93In the stratified,\
  \ hierarchical society of early modern Germany, \"mixed\" marriages of social unequals\
  \ usually were undesired, yet such marriages between blacks and whites did not produce\
  \ hostile reactions. The numerous examples of intermarriage are an indicator of\
  \ social integration.\x94\"\n\ndo you require more FACTS?\n\nalso, i never denied\
  \ or tried to prove that there is no such thing as a white race. that would be absurd.\
  \ the white race came about after thousands of years of change from when the were\
  \ once of the black race in Africa -- FACT. however, depending the specific black\
  \ genes, and the amount of race mixing, etc, some features change very little, some\
  \ change allot, and in different ways. the other fact, is that despite white people\
  \ being the majority in europe, black people migrated to europe and impacted upon\
  \ the people of that continent, not as servants and colonials of europe but as the\
  \ fathers of its first inhabitants, the creators of its first art, its first tools,\
  \ and, in some places and historical periods, its masters and teachers, invaders\
  \ and traders, its most venerated madonnas, saints and popes -- FACT. now, why can't\
  \ you accept that? at least try to prove these facts incorrect. but you simply can't!\n\
  next. you said something about Ireland? something about: \"It is the land of the\
  \ tribal Celts. They have a very very long history.\" you seem to think you know\
  \ so much. well, i'll have you know that one of my co-workers is an Irish women\
  \ and she has verified what i'm about to teach you. but again, don't accept what\
  \ you are about to learn. instead, verify it for yourself.\n\nfirst, ireland was\
  \ once part of the moorish empire; that is, the celts were Moslems, & there were\
  \ black moors from N. africa also present in Ireland. But the moors were expelled\
  \ by militant Christianity. also, the early Celtic crosses inscribed with the bismillah\
  \ (\"In the Name of God\", opening words of the Koran) are in kufic Arabic, found\
  \ in Ireland? the celtic church, before its destruction by the roman hierarchy,\
  \ maintained a close connection with the desert hermit-monks of egypt. also, as\
  \ a side point, people sometimes forget that in the 18th century, in America, the\
  \ Irish were generally considered \"no better than Negroes\". in 1741 on St. Patrick's\
  \ Day in new york a riot broke out, involving a conspiracy which included Irish,\
  \ African, & Native American men & women. some Irish conspirators were overheard\
  \ to swear they'd kill as many \"white people\" as possible. the uprising failed\
  \ & the plotters were executed. as the bodies of two hanged in the open air decayed\
  \ in an Iron gibbet, \"observers noticed a gruesome, yet instructive, transformation.\
  \ the corpse of an Irishman turned black & his hair curly while the corpse of Caesar\
  \ the African, bleached white. It was accounted a 'wondrous phenomenon'\" (Linebaugh\
  \ & Rediker, \"The Many-Headed Hydra\"). but getting back to older times, in Malory's\
  \ Morte dArthur & Eschenbach's Parzifal many Saracen (i.e. Moslem/Moorish) knights\
  \ are depicted not as enemies but allies of the Celts -- & in the latter book the\
  \ entire story is attributed to Moorish sources. and fyi, an African king named\
  \ Gormund ruled Ireland during the Anglo-Saxon period in England, which was reports\
  \ by a medieval historian named Geoffrey, from Monmouth.\n\nfurthermore, i think\
  \ you should read a recent book written by an Irish journalist named Bob Quinn (\
  \ Atlantaean: Ireland's North African & Maritime Heritage, Quartet books, London/NY,\
  \ 1986 ). it will give you further proof of the rich african history in ireland.\
  \ i read it and it was amazing. i his book, Quinn states the egyptian influence\
  \ on the early Celtic Church -- or Hispano-Moorish-Irish maritime connections --\
  \ or the Barbary Pirates, and the fact that Irish pitates converted to Islam and\
  \ took part in the Sallee Republic, a Moroccan corsair utopia. oh, i almost forget,\
  \ here is probably some information the should interest you the most. it comes from\
  \ a a U2 webpage. you know, the band U2. anyway, the web page has a conversation\
  \ from Bono of U2 telling of the roots of their music and his account with Bob Quin.\
  \ you read it for yourself at: [http://www.atu2.com/news/co...](http://www.atu2.com/news/connections/quinn/\
  \ \"http://www.atu2.com/news/connections/quinn/\"). the following is asnipit from\
  \ the website:\n\nBill also told me how Bono paid a visit to Quinn one time after\
  \ hearing about his work, but that Quinn was less than impressed by him. ;) I did\
  \ find this in the Wire Archives later, from a Muse online interview with Bono and\
  \ The Edge:\n\nFrom dSIDES:\n\n[Bono]: We're not really North Europeans. The roots\
  \ of our music are Celtic, Middle-Eastern, Abyissian, that's where it all comes\
  \ from. We are not Europeans so we shouldn't try to be. Let's not be intimidated\
  \ it.'\n\nEdge smiles wryly at Bono's wired flow. 'I love Bono's theories about\
  \ the idea that it came from North Africa, Bob Quinn had similar theories about\
  \ where art and music came from to get to this country. it's a very compelling argument\
  \ but it's still a mystery.\"\n\nalso, it is importnat not that the Black Celts\
  \ (Silures) & Black Vikings vexed with the Scandinavia (norway and sweden) people\
  \ and a prominent Viking of the eleventh century was Thorhall, who was aboard the\
  \ ship that carried the early Vikings to the shores of North America. Thorhall was\
  \ \"the huntsman in summer and in winter the steward of Eric the Red. he was known\
  \ to be a large man and strong, black, and like a giant, silent, and foul-mouthed\
  \ in his speech, and always egged on Eric to the worst; he was a bad Christian.\"\
  \ another Viking, more notable than Thorhall, was Earl Thorfinn, \"the most distinguished\
  \ of all the earls in the Islands.\" Thorfinn ruled over nine earldoms in Scotland\
  \ and Ireland, and died at the age of seventy-five. his widow married the king of\
  \ scotland. Thorfinn was described as \"one of the largest men in point of stature,\
  \ and ugly, sharp featured, and tawny [brown], and the most martial looking man.\
  \ It has been related that he was the foremost of all his men.\" plus, a man known\
  \ as Halfdan the Black, who was Africoid, was the first king to unite Norway.\n\n\
  okay, this officially marks my final dose of medicine into the many false beliefs\
  \ posted on the web page. i promised myself that my previous entry would be my last,\
  \ but the irish comment made me laugh so hard i had to respond. but again, future\
  \ readers will read this discussion and see that i holistically overturned the false\
  \ statements against Beethoven's blackness and other numerous attacks again African\
  \ history with FACT, LOGIC, PROOF, and TRUTH, and was not proven otherwise with\
  \ the same vices. now, you can resume your comedy ..."
