name: maat
body: The central problem is that Europeans do not want to equate genius with African.
  The Roman Empire had African Caesars who busts were later marred to disguse racial
  features(and are now depicted as "white men with sylized hair"). Why be surprised
  about the need to suppress that Beethoven may have been African and possibly homosexual?
  The answer is FEAR. Is a final answer of who he racially was as important as his
  contributions to the music field? I think not. While I agree that there has been
  a lot of miseducation to hide African achievements, I conclude that we may never
  know the truth. The fear of many still blind the masses and it is sad.
date: '2005-06-16T22:57:52Z'
