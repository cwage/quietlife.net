name: moor
body: "Belle said:\n\x93For your information, Herr von Beethoven's hair was not frizzy,\
  \ and was not black. It was dark brown, with grey. And I might add that it was totally\
  \ straight. I have seen the lock of hair. And you?\x94\n\nWell, belle, NO I have\
  \ not seen his actual hair in person, but that does not refute that he is black.\
  \ You\x92re crazy. this must be a joke. this is more parody because it actually\
  \ serves further proof that he was black. dude, many negroids have dark-brown hair\
  \ -- FACT. my own mother, for example, and a few of my uncles have dark-brown hair.\
  \ and it\x92s clear what grey hair is. hey, fyi, EVEN black people have grey hair.\
  \ you really need to travel the world, belle. Have you been to Ireland? I have,\
  \ and the black people of Ireland \x96 yes Ireland \x96 go see for yourself \x96\
  \ have dark-brown hair \x96 an alarmingly amount actually. I have pen-pal from Ireland\
  \ who is black and I still keep communication with. fyi, ireland was also part of\
  \ the Moorish empire. Furthermore, my wife \x96 who is a black woman of brown skin,\
  \ has a cousin who was born with sand-brown hair. plus, ask any black person and\
  \ they will tell you that they know black people who have dark-brown, lighter hair,\
  \ straight hair, and even grey and blue eyes. But let\x92s take a scientific approach.\
  \ It is a known fact that many parts of Europe, from as early as the 18th century\
  \ and still even today, have several mineral deficiencies in the earth\x92s soil\
  \ and vitamin deficiencies like selenium in the diets of many Europeans. these deficiencies\
  \ affect hair colour. But even so, black people with our such deficiencies can still\
  \ have dark-brown hair etc. also, it is known fact that when the hair of Beethoven\
  \ was analyzed, large amounts of lead was found in his body, and any body who know\
  \ science knows that lead can cause an anaemic disorder in the blood which cause\
  \ lightening (pale) of the skin. so, what do you say to these FACTS, belle?"
