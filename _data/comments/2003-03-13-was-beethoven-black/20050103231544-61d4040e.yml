name: Johan
body: |-
  Once again, this has nothing to do with Beethoven, but the Afrocentrists keep bringing up unrelated nonsense (which isn't surprising).

  Here are some images of Moors, **as they portrayed themselves**:

  Images from the Tale of Ayad and Bayad, Islamic Spain early 13th century:

  [Bayad and Ayad - 2](http://www.angelfire.com/md/8/bayadriyad/bayad-y-riyad-2.jpg "http://www.angelfire.com/md/8/bayadriyad/bayad-y-riyad-2.jpg")
  [Bayad and Ayad - 3](http://www.angelfire.com/md/8/bayadriyad/bayad-y-riyad-3.jpg "http://www.angelfire.com/md/8/bayadriyad/bayad-y-riyad-3.jpg")
  [Bayad and Ayad - 4](http://www.angelfire.com/md/8/bayadriyad/bayad-y-riyad-4.jpg "http://www.angelfire.com/md/8/bayadriyad/bayad-y-riyad-4.jpg")
  [Bayad and Ayad - 5](http://www.angelfire.com/md/8/bayadriyad/bayad-y-riyad-5.jpg "http://www.angelfire.com/md/8/bayadriyad/bayad-y-riyad-5.jpg")
  [Bayad and Ayad - 6](http://www.angelfire.com/md/8/bayadriyad/bayad-y-riyad-6.jpg "http://www.angelfire.com/md/8/bayadriyad/bayad-y-riyad-6.jpg")

  It's obvious, isn't it?

  Also, here are Illustrations from Cantigas de Santa Maria, 13th century, reign of Alfonso X

  [Click](http://www.angelfire.com/md/8/cantigas/cant099a.jpg "http://www.angelfire.com/md/8/cantigas/cant099a.jpg")
  [Muslim soldiers under Almanzor (al-Mansur)](http://www.angelfire.com/md/8/cantigas/cant063d.jpg "http://www.angelfire.com/md/8/cantigas/cant063d.jpg") attack San Esteban de Gormaz, in 989 CE.
  [Muslim ("Moor") troops from North Africa kidnap a German nobleman from the Portuguese coast and force him onto a ship.](http://www.angelfire.com/md/8/cantigas/cant095e.jpg "http://www.angelfire.com/md/8/cantigas/cant095e.jpg") The crew is mostly light-skinned as a whole -- the Black African soldiers that are present among the crew members are obviously a minority. Even so, it was the exotic-looking "black" contingent of these armies that stirred the hearts and imaginations of medieval Europe, and sometimes appear prominently as symbols in medieval art, literature, and heraldry. However, that kind of "blackamoor" symbolism (such as black African heads on coat-of-arms) does not constitute evidence that most Muslim occupiers of southern Europe looked like sub-Saharan Africans, or that black Africans were the driving force behind Islamic civilization in Europe. In fact, the evidence in these images suggests that wasn't the case at all.
  [The naval force of mouros turn their attention to Arrendaffe, their admiral.](http://www.angelfire.com/md/8/cantigas/cant095j.jpg "http://www.angelfire.com/md/8/cantigas/cant095j.jpg") Although a black African rower is visible, the rest of the crew including the admiral is obviously of a paler shade.
  [An army of Muslims approaches a Christian city.](http://www.angelfire.com/md/8/cantigas/cant099a.jpg "http://www.angelfire.com/md/8/cantigas/cant099a.jpg") Again, the troops are described as mouros in the Old Galician writing at the top of the clicked-on picture (Como os mouros veneron cercar huna cidade).
  [This shows an army of Muslims, mostly pale but with a dark-skinned minority, especially among the foot soldiers and servants in the rear.](http://www.angelfire.com/md/8/cantigas/cant099f.jpg "http://www.angelfire.com/md/8/cantigas/cant099f.jpg")
  [Muslims ask their king to have a church removed from La Arrijaca.](http://www.angelfire.com/md/8/cantigas/cant169e.jpg "http://www.angelfire.com/md/8/cantigas/cant169e.jpg")
  [Moroccan soldiers in a tent](http://www.angelfire.com/md/8/cantigas/cant181a.jpg "http://www.angelfire.com/md/8/cantigas/cant181a.jpg")
  [King Umar al-Murtada, the Almohad ruler of Morocco, is persuaded to ally with Christians](http://www.angelfire.com/md/8/cantigas/cant181b.jpg "http://www.angelfire.com/md/8/cantigas/cant181b.jpg")
  [Moroccan soldiers and Christian allies, readying for battle in the city of Marrakech](http://www.angelfire.com/md/8/cantigas/cant181d.jpg "http://www.angelfire.com/md/8/cantigas/cant181d.jpg")
  [Five mouros in Portugal, throwing a statue of the Virgin Mary into the sea.](http://www.angelfire.com/md/8/cantigas/cant183b.jpg "http://www.angelfire.com/md/8/cantigas/cant183b.jpg") This miniature, together with the rest, depicts the Muslim population of Spain as predominantly light-skinned. (Like before, the medieval writing atop the full image explicitly refers to them as Moors: Como os mouros deytaron a omagen de Sancta Maria no mar por desonrala.)
  [Muslim troops from Granada, on their way to attack a Spanish castle.](http://www.angelfire.com/md/8/cantigas/cant185d.jpg "http://www.angelfire.com/md/8/cantigas/cant185d.jpg")
  [The King Of Granada Holds Court](http://www.angelfire.com/md/8/cantigas/cant185c.jpg "http://www.angelfire.com/md/8/cantigas/cant185c.jpg")
  [a Spanish woman manipulating her black servant](http://www.angelfire.com/md/8/cantigas/cant186a.jpg "http://www.angelfire.com/md/8/cantigas/cant186a.jpg") as a pawn in a plot against her daughter-in-law. At least one site I saw displays this picture as if it supports the "Moors = black" theory. It doesn't.

  **[Alphonso X's Book of Games, 13th century](http://games.rengeekcentral.com/ "http://games.rengeekcentral.com/")**:
  [This](http://www.angelfire.com/md/8/juegos/025.jpg "http://www.angelfire.com/md/8/juegos/025.jpg") picture of particularly dark-skinned Muslims is shown on various "Afrocentric" web pages attempting to prove that Black Africans dominated Spanish society during the Muslim occupation. But further examination of more pictures from the same Book of Games reveals...

  [Three Arab Scholars consulting a manuscript](http://www.angelfire.com/md/8/juegos/013.jpg "http://www.angelfire.com/md/8/juegos/013.jpg")

  [Three Arab ladies, one playing the lute](http://www.angelfire.com/md/8/juegos/019.jpg "http://www.angelfire.com/md/8/juegos/019.jpg")

  [More pictures of Moors](http://www.angelfire.com/md/8/juegos/055.jpg "http://www.angelfire.com/md/8/juegos/055.jpg")

  [Some more pictures of Moors](http://www.angelfire.com/md/8/juegos/069.jpg "http://www.angelfire.com/md/8/juegos/069.jpg")

  [An Arab and a Spanish girl](http://www.angelfire.com/md/8/juegos/086.jpg "http://www.angelfire.com/md/8/juegos/086.jpg")

  [A Jew And An Arab, from the Book of Games](http://www.angelfire.com/md/8/juegos/102.jpg "http://www.angelfire.com/md/8/juegos/102.jpg")

  [A Spaniard and an Arab playing in a tent](http://www.angelfire.com/md/8/juegos/103.jpg "http://www.angelfire.com/md/8/juegos/103.jpg")

  > Dr. Chancellor Williams stated that "The original Moors, like the original Egyptians, were Black Africans."

  You will find anyone who will write or say anything.
