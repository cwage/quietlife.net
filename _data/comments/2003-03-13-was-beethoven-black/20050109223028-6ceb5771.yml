name: Johan
body: "> I have read the messages in this board and I must say that \x93Moor\x94 has,\
  \ by far, brought out the most striking and convincing argument with numerous information\
  \ that even I have known myself....etc..etc...\n\n(click on highlighted words)\n\
  \n**1**) The Afrocentrists use [altered images](http://www.geocities.com/dabjazz/page7.html\
  \ \"http://www.geocities.com/dabjazz/page7.html\") of Beethoven.\n\nHere is the\
  \ [original](http://www.lvbeethoven.com/Portraits/ImagesGalerie/Portrait_LouisLetronne_1814_Original.jpg\
  \ \"http://www.lvbeethoven.com/Portraits/ImagesGalerie/Portrait_LouisLetronne_1814_Original.jpg\"\
  ) image, and its [engraving.](http://www.lvbeethoven.com/Portraits/ImagesGalerie/Portrait_LouisLetronne_1814.jpg\
  \ \"http://www.lvbeethoven.com/Portraits/ImagesGalerie/Portrait_LouisLetronne_1814.jpg\"\
  )\n\n**2**) They ignore the best evidence of what Beethoven looked like: the [life\
  \ mask](http://www.lvbeethoven.com/Portraits/ImagesGalerie/Masque_Klein_Original.jpg\
  \ \"http://www.lvbeethoven.com/Portraits/ImagesGalerie/Masque_Klein_Original.jpg\"\
  ), the [death mask](http://www.lvbeethoven.com/Portraits/ImagesGalerie/MasqueDanhauser_1827.jpg\
  \ \"http://www.lvbeethoven.com/Portraits/ImagesGalerie/MasqueDanhauser_1827.jpg\"\
  ), and the many [paintings](http://www.lvbeethoven.com/Portraits/GalleryPortraits.html\
  \ \"http://www.lvbeethoven.com/Portraits/GalleryPortraits.html\") and [drawings](http://www.lvbeethoven.com/Portraits/GalleryDrawings.html\
  \ \"http://www.lvbeethoven.com/Portraits/GalleryDrawings.html\") of the live Beethoven,\
  \ as well as his locks [of hair.](http://geographyfieldwork.com/BeethovenHair.jpg\
  \ \"http://geographyfieldwork.com/BeethovenHair.jpg\")\n\n**3**) They (unsurprisingly)\
  \ try to prove that Beethoven was black \"by any means necessary\".\n\n- When the\
  \ claim that Beethoven was of [Moorish](http://www.angelfire.com/md/8/moors.html\
  \ \"http://www.angelfire.com/md/8/moors.html\") background) seems shaky, they bring\
  \ up some isolated cases of black servants in Royal households, and try to make\
  \ a connection to Beethoven.\n\nThis is called \"grasping at straws\".\n\n- Initially,\
  \ they **actually were trying to use Beethoven's hair** (a hearsay description of\
  \ his hair as \"nappy\", see the Elmer Wells paper) as evidence. When it turns out\
  \ to be straight, they say that this is not significant.\n\nHow convenient.\n\n\
  **4**) They keep bringing up Afrocentrist claims (e.g. the blacks invented the refrigerator,\
  \ the Vikings were black, etc.) that have nothing to do with Beethoven.\n\ni.e.\
  \ They can't just forget their own belief system, and concentrate on the subject.\n\
  \nBeethoven is not their interest.\n\nIs that \"**convincing**\"?"
