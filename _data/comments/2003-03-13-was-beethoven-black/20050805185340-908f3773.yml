name: '616'
body: For what its worth I read about 92% of the thread and its like, so many facts
  so many lies, its sad. Let me start off by saying yes im black. Let me also ocntinue
  to say I am not convinced one way or the other as to Beethoven's ethnicity. I was
  taught a long time ago that he was and i was surprised by how many results i got
  by googling was beethoven black. Alot of what was posted I m familiar with so dont
  expect me to go and post every source and cite or recount thinngs verbatim, this
  is a thread not a class or a disatation. I think the bottom line to this all (and
  someone alluded to it) is that being black, is more than just having dark skin,
  and somewhere in our collective psyche somewhere where fight or flight resides,
  there is some rift between the races because nothing elicits such fervor than talks
  of race. Why do we care if Beethoven was black, because if he was it only confirms
  our deep fears our deep paranoia that White people are surpressing and ignoring
  everything we do and acheive. Thats what this is all about. White people (and im
  assuming now) that arent racist or racist per se (two distinctions) probably feel
  something akin to frustration of being on the defensive for something they feel
  they cant all to well control (who can change the past). Its sad cuz its like the
  saying goes (this wont be word for word) a wise man knows he knows nothing at all
  (oh that might have been) its like the more i learn the more i see its so much more
  to unlearn and learn. Im not really tooting my horn or saying im so sagely, but
  I have learned about Blacks in the origins of many a place from Ireland to Asia.
  Im not gonna try to bowl you over like Moor did (it was pretty sad and lame when
  he started using other aliases cuz I thought he started off initially with some
  good information and points) but i will say his thoughts arent as off as it later
  seemed. The whole Belle and louisa threads seem to be geniune, Reggie's comments
  seem to be thought out too, but I still disagree i think i lean a little more towards
  beethoven being black than not being black. ITs like this me and my friends were
  talking about the news the other day and we were talking about how fake everything
  is, how prepared everything is and I told my friends the same thing imma tell you.
  Most of you have information in your head like the food in your tummies, a bunch
  of fake garbage you think is really filling you up in a beneficial way. And for
  the few of you who are eating real food, I KNOW none of you were eating real food
  all your life, and so think about the time before you ate the way you do with the
  way you eat now. I always look back and think about what I used to eat and how matter
  of factly i ate the things i did. Its almost scary and the same thing is true of
  knowledge, there are so many things that are not true not face value that I use
  to swear and hold dear to be. its like when everyone learned when you were probably
  about 11 or 12 that your blood is blue, remember when you first learned that. remember
  how you just felt so enlightned, well before that you just knew your blood was red,
  (although your blood is actually red even before the air hits it) the point is if
  you take Johans arguements you could end the conversation at some of his pics he
  linked. But by the same token if it wasnt for Mel Gibson a lot of you woulda thought
  William Wallace was a raving arsonistic lunatic. Its like until you see the total
  history from all sides you never know. Science is like the bible (ironic huh) it
  can be used to pretty much advance any ideal if you twist it enough and most "facts"
  arent facts but theories and most "tests" are true tests their "interpretations"
  Finally you hafta remember, alot of things arent documented and are passed down
  through oral tradition. Plenty of black inventors never got credit for things cuz
  of the overt racism of the times does that mean it never happens. I just finished
  watching that movie with Mos Def (a rapper) where he plays the surgeon who was as
  responsible for the open heart surgery, but of course he wasnt documented for all
  his work, luckily HIS STORY came to light after much time passed unfortunately most
  stories of the loser or oppressed does not come to light. I do believe that If Beethoven
  was black then it is no stretch to think that through the decades this fact could
  have been white washed out. I mean look at Jesus, no matter what you think of Jesus
  I dont an intellectual alive who would agree that the most common image of Jesus
  is accurate. Whether you think he his black,semite, or whatever, no one i know would
  believe the common blue eyed picture. so the question comes how did the picture
  goes as long as it did, were their no intellectuals before all of us. Of course,
  but thats how history is, if you let it slip away, if you let others present it
  and retell it, it gets that twisted. Hell just ask someone about the 2000 election
  and that was just five years ago.
date: '2005-08-05T18:53:40Z'
slug: 2003-03-13-was-beethoven-black
