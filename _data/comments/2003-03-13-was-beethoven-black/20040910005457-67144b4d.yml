name: Johan
body: |-
  Chris:

  I may have exagerated a bit -The nasal sill, for example, is not visible unless the skull is exposed - it would be better to observe the notches on the nasal bridge. But one exagerates to make a point, just as you now did with your "100%".

  (why didn't you catch my exageration?)

  What do Forensic Pathology and Forensic Anthropology have to do with each other and identifying an individual's race?

  A few links may supply some information:

  Forensic Pathology:

  "Clinical examination also tends to confirm hunches about age, [race](http://faculty.ncwc.edu/toconnor/425/425lect12.htm "http://faculty.ncwc.edu/toconnor/425/425lect12.htm"), sex, height, weight, and general health condition in cases of unidentified remains."

  [http://faculty.ncwc.edu/toc...](http://faculty.ncwc.edu/toconnor/425/425lect12.htm "http://faculty.ncwc.edu/toconnor/425/425lect12.htm")

  ["In the examination of skeleton or severely decomposed remains, the
  forensic pathologist needs a working knowledge of multiple methods of
  identification including forensic anthropology in order to establish
  identity. If sufficient skeletal parts remain, the pathologist may be
  able to determine the age, race and sex of the individual and sometimes
  estimate the length of time since death. Occasionally, specific
  markings on the bones may enable the pathologist to come to a
  conclusion as to the cause of death."](http://www.thename.org/medical_detective.htm#how%20does%20path%20use%20history%20etc "http://www.thename.org/medical_detective.htm#how%20does%20path%20use%20history%20etc")

  [http://www.thename.org/medi...](http://www.thename.org/medical_detective.htm#how%20does%20path%20use%20history%20etc "http://www.thename.org/medical_detective.htm#how%20does%20path%20use%20history%20etc")
   ["How to ID Jane/John Doe \*Fingerprint (whorl, accidental, arch, loop) \*Forensic odontology -Teeth are highly resistant to degradation -Bite mark ID -Compare ante- and post-mortem x-rays \*Forensic anthropology -ID skeletal remains ~Age, race, sex and stature ~Signs of trauma ~ID victims in mass disaster"](http://darla.neoucom.edu/Students/ProfDev/ PeerMentorResources/M2/Term2/GI/PathologyForensic.pdf "http://darla.neoucom.edu/Students/ProfDev/ PeerMentorResources/M2/Term2/GI/PathologyForensic.pdf")

  [http://darla.neoucom.edu/St...](http://darla.neoucom.edu/Students/ProfDev/ "http://darla.neoucom.edu/Students/ProfDev/") PeerMentorResources/M2/Term2/GI/PathologyForensic.pdf

  ["Forensic Analysis of the Skull: Craniofacial Analysis, Reconstruction, and Identification by Mehmet Yasar Iscan, Richard P. Helmer (Editor) (January 15, 1993)
  This engrossing book offers detailed coverage of forensic implications and methods of craniofacial identification. Race, sex and age morphology are explored along with video superimposition and computer imaging techniques. Several case studies are also included."](http://www.crime-scene-investigator.net/pathology-books.html "http://www.crime-scene-investigator.net/pathology-books.html")

  [http://www.crime-scene-inve...](http://www.crime-scene-investigator.net/pathology-books.html "http://www.crime-scene-investigator.net/pathology-books.html")

  Here are some  [sites](http://www.fortunecity.com/campus/electrical/314/career.html "http://www.fortunecity.com/campus/electrical/314/career.html") you may not have checked out.

  [http://www.fortunecity.com/...](http://www.fortunecity.com/campus/electrical/314/career.html "http://www.fortunecity.com/campus/electrical/314/career.html")

  Here, Forensic Pathology and Physical Anthropology departments share the same [quarters](http://forensic.shef.ac.uk/forensic.html "http://forensic.shef.ac.uk/forensic.html") (rather suspicious behavior for fields that supposedly have nothing to do with each other)

  [http://forensic.shef.ac.uk/...](http://forensic.shef.ac.uk/forensic.html "http://forensic.shef.ac.uk/forensic.html")

  Forensic/Physical Anthropologist argues that [race is a reality](http://www.pbs.org/wgbh/nova/first/gill.html "http://www.pbs.org/wgbh/nova/first/gill.html"):
  [http://www.pbs.org/wgbh/nov...](http://www.pbs.org/wgbh/nova/first/gill.html "http://www.pbs.org/wgbh/nova/first/gill.html")

  PBS had a special on [this:](http://www.pbs.org/wgbh/nova/transcripts/2705first.html "http://www.pbs.org/wgbh/nova/transcripts/2705first.html")
  [http://www.pbs.org/wgbh/nov...](http://www.pbs.org/wgbh/nova/transcripts/2705first.html "http://www.pbs.org/wgbh/nova/transcripts/2705first.html")

  Here is an article which is interesting:
  [DETERMINE RACE PROPORTIONS FROM CRIME SCENE DNA](http://www.bioforensics.com/conference04/Racial_Identification/ "http://www.bioforensics.com/conference04/Racial_Identification/")
  [http://www.bioforensics.com...](http://www.bioforensics.com/conference04/ "http://www.bioforensics.com/conference04/")

  [Racial\_Identification](http://www.canadapagan.com/CanInfo/articles/forensic.htm "http://www.canadapagan.com/CanInfo/articles/forensic.htm")

  [http://www.canadapagan.com/...](http://www.canadapagan.com/CanInfo/articles/forensic.htm "http://www.canadapagan.com/CanInfo/articles/forensic.htm")

  Also of interest:

  [Forensic Dentistry
  by Paul G. Stimson (Editor), Curtis A. Mertz (Editor)
  Hardcover
  Published by CRC Pr
  Publication date: May 1997](http://www.corpus-delicti.com/pathology.html "http://www.corpus-delicti.com/pathology.html")

  "Book Description: Identification of unknown individuals and the determination of their age, race, and sex is one of the most important functions of forensic dentistry..."

  [Also..](http://www.corpus-delicti.com/pathology.html "http://www.corpus-delicti.com/pathology.html")

  [http://www.corpus-delicti.c...](http://www.corpus-delicti.com/pathology.html "http://www.corpus-delicti.com/pathology.html")

  These links were looked up on the spur of a moment. The Books on these subjects are a better source.

  Whoever wrote the entry in Wikepedia may not have looked at these. People can continue to write such things.
