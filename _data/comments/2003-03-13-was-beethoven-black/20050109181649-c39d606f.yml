name: green_tea
body: "I have read the messages in this board and I must say that \x93Moor\x94 has,\
  \ by far, brought out the most striking and convincing argument with numerous information\
  \ that even I have known myself, and I am a well educated white, European, man,\
  \ who has lived in Italy for 6 years and France for 4 years. But this is simply\
  \ my humble opinion.\n\nI found it shocking how Belle totally missed Moor\x92s argument\
  \ about Beethoven\x92s hair and your claim of it being straight. From what I read,\
  \ Moor did not switch from his original statements. He did not say that Beethoven\x92\
  s hair was straight. Instead, I think he tried to show you that White people are\
  \ not the only race of people who have straight hair, and he did so by pointing\
  \ out that Black people have straight here as well, which I know to be a fact as\
  \ well. His information was an effort to challenge your current perception of the\
  \ kinds of people who have straight hair.\n\nI also know it to be a fact that there\
  \ were African Vikings and was educated on that bit of information while attending\
  \ university in Paris. We also learned about how many Viking excursions left mixed-race\
  \ descendants. In fact, I studied about a well known Scandinavian Viking called\
  \ Egil Skallagrimson, and for a while scientists tried to explain his abnormal height\
  \ and size which was not characteristic of the majority of the people in that part\
  \ of the world. A professor by the name of Prof. Seligman made some interesting\
  \ findings which were then published and written by a man named MICHAEL PERKINS\
  \ in Nature magazine. The is what Seligman discovered as written in the article:\n\
  \n\x93On the other hand, the Egil family, with its, black hair, great height, thick\
  \ skull, prognathism, precocity, and fits of rage, is curiously parallel to the\
  \ tall negroid in everything except indolence, which was certainly displayed on\
  \ the Grettir side, and pigmentation of the skin. Hamrammr may even be compared\
  \ with the 'Leopard Society\x92 prowling of West Africa. This parallel is interesting,\
  \ because rock-tracings at Tanum in South Sweden introduce us to sea raiders and\
  \ settlers who were familiar with the leopard, the camel, the ostrich, and the turtle,\
  \ as pointed out by Du Chaillu (\x93Viking Age\x94 ii. p.124). Some are represented\
  \ of immense size, many are prognathous with a suggestion, of the acromegalic chin\
  \ some have unusually long legs and short bodies like Steinar, several are remarkably\
  \ fat; often pictured fighting with vigour, they might well represent ancestors\
  \ of Egil. Also the Fomorians, supernatural giants, who exactly parallel the Scandinavian\
  \ Trolls in Irish tradition and played the part of vikings in their earliest history,\
  \ were explained as \"sea-raiders from Africa\" by the medieval scholarship in Keating's\
  \ well-known \x93History of Ireland\x94. As a hypothesis, the tall and fair Scandinavian,\
  \ or even taller red Caledonian, raiding up and down the Atlantic coasts in very\
  \ early days, might conceivably contact with the tall negroids of Jaloff, and thus\
  \ acquire with captured women the seeds of a black-haired stock unbalanced in many\
  \ ways and marked by excessive height, such, as that producing Egil Skallagrimson.\x94\
  \n\nIn fact, I\x92ve learned that there were varieties of Viking Africans living\
  \ in Scandinavia during the middle ages and was even frequently mentioned in Viking\
  \ sagas. There were even Black Huns. The dictionary describes the Huns as \"a fierce\
  \ barbaric race of Asiatic nomads who, led by Attila, ravaged Europe in the 4th\
  \ and 5th centuries A.D.\" Gothic writer Jordannes described Attila as having \"\
  a flat nose and swarthy complexion.\" He describes the types of Huns he had seen\
  \ as \"of dark complexion, almost black ... broad shoulders, flat noses and small\
  \ eyras.\"\n\nI think what\x92s important in all this is that the global community\
  \ is slowly accepting the fact that most of our world cultures come from African\
  \ culture and much of it is based upon evidence, science, and recorded statements\
  \ to support that things did in fact occur. However, it will take time. That is\
  \ all I have to say. Cheers."
