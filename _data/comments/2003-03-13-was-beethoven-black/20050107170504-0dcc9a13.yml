name: moor
body: "Ah, the infamous \x93belle\x94 and \x93john\x94 team. We must all have huge\
  \ egos to still be going at it. Something to think about. Anyway, I eventually found\
  \ the link that did work and provided it baseless, irrelevant, and inaccurate, in\
  \ regards to who moors were during their time of power in my previous e-mail and\
  \ as usual, NOBODY HAS BEEN ABLE TO REFUTE THE FACTS. Why? Because they make sense\
  \ are based upon facts. But don\x92t take my words for it, research for yourself.\
  \ I a few days, I will gather as many photos of moors as they were during the early\
  \ and middle portions of their rule in Spain to show you further FACTS -- es wird\
  \ für viele von Ihnen erleuchten. In the meantime consider further quotes from people\
  \ who were alive during the time of Beethoven, did biographies, or studied him:\n\
  \nCarpani, who originally reported/related what was said about Hayden by Andre de\
  \ Hevesy, said that \"Haydn's complexion gave room for the sarcasm.\" And that Haydn\
  \ had the title of \"second professor of music but his new comrades called him The\
  \ Moor.\" (G. Carpani: Le Haydn, etc. Letter 5. Milan, 1812). Then, referring to\
  \ the above incident, Alexander W. Thayer, perhaps the foremost authority on Beethoven,\
  \ said, \"Beethoven had even more of the Moor in his features than his master, 'Haydn.'\"\
  \ (Beethoven, Vol. I, p. 146). By \"Moor\" was meant \"Negro.\" Until recent times\
  \ the German for \"Negro\" was \"Mohr.\"\n\nPaul Bekker, another very noted authority\
  \ on Beethoven, says that \"the most faithful picture of Beethoven's head\" shows\
  \ him with \"wide, thick lipped mouth, short, thick nose, and proudly arched forehead.\"\
  \ (Beethoven, p. 41, 1925. trans. Bozman). Thayer adds that Beethoven was an ugly\
  \ little man, and no one would be more astonished than the great composer should\
  \ he return and see how he has been idealized by sculptors and painters.\n\nBeethoven's\
  \ family originated in Belgium \x96 a FACT, which had been ruled for centuries by\
  \ the Spaniards \x96 a FACT, who had large numbers of Negro soldiers in their army\
  \ there \x96 a FACT.\n\nTheophile Gautier speaks of a Belgian type characterized\
  \ by brown skin and dark hair \"a second race which the soldiers of the Spanish\
  \ Duke of Alva have sown between Brussels and Cambrai.\"\n\nIn short, the general\
  \ description of Beethoven, even to his frizzly hair, fits that of many an Afro-American,\
  \ Afro-Canadian, and Caribbean mulatto. In the Southern United States Beethoven\
  \ would have been forced to ride in the Jim Crow car.\n\nSee also: Rogers, J.A.,\
  \ \"Sex and Race,\" Vol. I, pp. 288, 289,302 (1941) for other data on Beethoven's\
  \ Negro strain, one of which is from the new York Times. Also p. 8 for portrait\
  \ of Beethoven drawn from life by Hofel, which clearly shows the Negro strain. For\
  \ more extended proof as well as a picture of Beethoven's life-mask see Sex and\
  \ Race, Vol. 3, pp. 306-309.\n\nFurthermore, when you explore the accepted definition\
  \ of \"race\" as it relates to black people, the World definition is (and continues\
  \ to be) that \"If you have a a portion of 'Black' blood in your lineage, you're\
  \ Black. Now, I\x92m currently in the process of researching why that is, but a\
  \ friend of mine who practices medicine, says it ahs something to do with dominant\
  \ genes. Anyway, I\x92m still learning about that and the facts behind it.\n\nThat\
  \ said, I contend that with all of the above evidence, one must conclude that Beethoven\
  \ was AT LEAST of African descent. If he WASN'T black, then many people of African\
  \ descent in the world would have to be excluded from being black as well, especially\
  \ given Mr. Roger's accounts of Beethoven's descriptions.\n\nNow, john thinks I\
  \ know it all, well, when you no facts and truth, it gives off that impression,\
  \ but I try to not come across that way. Honestly, I\x92m a cool guy just searching\
  \ for truth. for whatever reason, I was born they way I was, and like most of us,\
  \ I have a natural tendency to look into things that concern me, and I found many\
  \ untruths along the way. that\x92s all. You don\x92t have to agree with me, just\
  \ prove me wrong with fact and logic. Simple. ultimately, we are of the human race\
  \ and Beethoven was a great man. It\x92s discussions like these that allow truth\
  \ to come out \x96 whatever they may be, but I find that the trick is to reveal\
  \ facts in a way that does not offend. We\x92re not perfect so it doesn\x92t come\
  \ out that way. Anyway, I do believe that many of you have not taken a long enough\
  \ look into the possibilities \x96 and there so many of them that has become fact\
  \ by a growing many, of Beethoven being Negroid."
