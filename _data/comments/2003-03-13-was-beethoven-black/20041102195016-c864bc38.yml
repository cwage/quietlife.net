name: S.R. Prozak
body: |-
  Beethoven was indeed black. We can derive this through the simple formula:

  1. Only oppressed people make great music.
  2. Beethoven had no other means of being oppressed.
  3. Beethoven made great music.
  .: Beethoven was black

