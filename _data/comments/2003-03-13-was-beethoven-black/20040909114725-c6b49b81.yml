name: cwage
body: |-
  Johan:

  > If a physical anthropologist looked at you, or your remains, he would be able to tell with over 90% certainty, what your ancestory was, based on your skeleton alone.
  >
  > A test of your DNA would make it a 100% certainty. Such is the hair splitting ability of science.

  This is 100% wrong. See [this link](http://www.hhmi.org/cgi-bin/askascientist/highlight.pl?kw=&file=answers%2Fgenetics%2Fans_011.html "http://www.hhmi.org/cgi-bin/askascientist/highlight.pl?kw=&file=answers%2Fgenetics%2Fans_011.html") for more, and perhaps Wikipedia's [entry on race](http://en.wikipedia.org/wiki/Race "http://en.wikipedia.org/wiki/Race"). Your ignorance of the very science you're attempting to use as a cudgel is appalling.

  > If you don't beleive me, go to your nearest medical school library, and look up Forensic Pathology and Physical Anthropology.

  What, pray tell, does forensic pathology have to do with this?
