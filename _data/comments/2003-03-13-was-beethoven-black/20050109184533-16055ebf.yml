name: Johan
body: "Reply to green\\_tea:\n\n> I have read the messages in this board and I must\
  \ say that \x93Moor\x94 has, by far, brought out the most striking and convincing\
  \ argument with numerous information that even I have known myself, and I am a well\
  \ educated white, European, man, who has lived in Italy for 6 years and France for\
  \ 4 years. But this is simply my humble opinion.\n\nYou can make any claim you like.\
  \ One of the people who has posted here even calls himself \"Moor\".\n\n\"Moor\"\
  \ is an Afrocentrist. He is not a disinterested neutral observer seeking the truth.\n\
  \nWhat he wrote about the Ireland being part of the Moorish Empire, should tell\
  \ you something about his qualifications\n\n> I found it shocking how Belle totally\
  \ missed Moor\x92s argument about Beethoven\x92s hair and your claim of it being\
  \ straight. From what I read, Moor did not switch from his original statements.\
  \ He did not say that Beethoven\x92s hair was straight. Instead, I think he tried\
  \ to show you that White people are not the only race of people who have straight\
  \ hair, and he did so by pointing out that Black people have straight here as well,\
  \ which I know to be a fact as well. His information was an effort to challenge\
  \ your current perception of the kinds of people who have straight hair.\n\nI think\
  \ that ignoring the many [paintings and sketches](http://www.lvbeethoven.com/Portraits/GalleryPortraits.html\
  \ \"http://www.lvbeethoven.com/Portraits/GalleryPortraits.html\") of Beethoven,\
  \ and the image of his [hair](http://geographyfieldwork.com/BeethovenHair.jpg \"\
  http://geographyfieldwork.com/BeethovenHair.jpg\"), is a better example of \"shocking\"\
  .\n\nThere are three questions that are worth asking, when someone makes claims:\n\
  \n1) What familiarity do you have with the subject?\n2) How do you know that what\
  \ you say is true?\n3) Why should anyone believe you?\n\nSo, are you prepared to\
  \ answer these?"
