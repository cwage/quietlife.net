name: Johan
body: |-
  Let's look at some more evidence.

  The last website we looked at, the [Beethoven-Haus museum's website](http://www.beethoven-haus-bonn.de "http://www.beethoven-haus-bonn.de"), had [photographs](http://www.beethoven-haus-bonn.de/sixcms/detail.php?id=5163&template=dokseite_digitales_archiv_en&_eid=5056&_ug=Masks&_mid=Pictures%20and%20objects&_eid=5056&_dokid=i1617&_eid=5056&_seite=1 "http://www.beethoven-haus-bonn.de/sixcms/detail.php?id=5163&template=dokseite_digitales_archiv_en&_eid=5056&_ug=Masks&_mid=Pictures%20and%20objects&_eid=5056&_dokid=i1617&_eid=5056&_seite=1") and [drawings](http://www.beethoven-haus-bonn.de/sixcms/detail.php?id=5224&template=dokseite_digitales_archiv_en&_eid=5056&_ug=Other%20depictions&_mid=Pictures%20and%20objects&_eid=5056&_dokid=i1615&_eid=5056&_seite=1 "http://www.beethoven-haus-bonn.de/sixcms/detail.php?id=5224&template=dokseite_digitales_archiv_en&_eid=5056&_ug=Other%20depictions&_mid=Pictures%20and%20objects&_eid=5056&_dokid=i1615&_eid=5056&_seite=1") of Beethoven's skull.

  To test the accuracy of the drawings, we could see if they matched the contours of the Beethoven's death mask.

  They did [(click)](http://img.photobucket.com/albums/v320/Johan77/Ludwigfinal_2.jpg "http://img.photobucket.com/albums/v320/Johan77/Ludwigfinal_2.jpg").

  Next, let's see it the [death mask (click)](http://img.photobucket.com/albums/v320/Johan77/1Beethovenfront.jpg "http://img.photobucket.com/albums/v320/Johan77/1Beethovenfront.jpg") matches the the [skull (click)](http://img.photobucket.com/albums/v320/Johan77/3Beethovenfront.jpg "http://img.photobucket.com/albums/v320/Johan77/3Beethovenfront.jpg").

  [It does (click).](http://img.photobucket.com/albums/v320/Johan77/2Beethovenfront.jpg "http://img.photobucket.com/albums/v320/Johan77/2Beethovenfront.jpg")

  Anybody can do this with Photoshop.

  (note: right sphenoid and temporal appear to be detached).
