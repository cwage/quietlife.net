name: Schubert Decendant
body: I am a Schubert decendant, and I feel that it does nto matter about Beethoven's
  race. His symphonies were some of the best written. I think all of you should grow
  up and give this mastermind composer some peace. His race is of no importance, only
  his music. As my generation has grown, more and more blacks, asians, and spanish
  have become part of our Schubert family, and he too was an extroadinary composer.
  Let by-guards be by-guards and lets listen to Beethoven's music together in peace.
date: '2004-07-09T22:56:00Z'
slug: 2003-03-13-was-beethoven-black
