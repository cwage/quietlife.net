name: moor
body: "Okay, I couldn\x92t hold this information back. Unlike most unfortunate people,\
  \ facts about African history are limited. Yet fortunately, that is slowly changing.\
  \ Hence, here are further factual statements said about Herr von Beethoven by people\
  \ who were alive during his time and/or wrote biographies about him. Oh, please\
  \ overstand that not all so-called black people have name like Tyron or Antwon.\
  \ Our names span all of civilization and culture, so don\x92t for once assume that\
  \ a name like Herr von Beethoven is not that of an African man. Honestly, I can\
  \ understand why there is such disbelief on the part of our White brethren that\
  \ Beethoven -- considered Europe\x92s greatest classical music composer, is in fact\
  \ Moor. Well, all I can say is get over it because this is just the beginning of\
  \ facts about African people that are soon to surface. Okay, without further delay\
  \ \N Let's start with what some of Beethoven's contemporaries and biographers say\
  \ about his appearance. Frau Fisher, a close friend of Beethoven, described him\
  \ with \x93blackish-brown complexion.\x94 Frederick Hertz, German anthropologist,\
  \ used these terms to describe him: \x93Negroid traits, dark skin, flat, thick nose.\x94\
  \nEmil Ludwig, in his book \x93Beethoven,\x94 says: \x93His face reveals no trace\
  \ of the German. He was so dark that people dubbed him Spagnol [dark-skinned].\x94\
  \ Fanny Giannatasio del Rio, in her book \x93An Unrequited Love: An Episode in the\
  \ Life of Beethoven,\x94 wrote \x93His somewhat flat broad nose and rather wide\
  \ mouth, his small piercing eyes and swarthy [dark] complexion, pockmarked into\
  \ the bargain, gave him a strong resemblance to a mulatto [a person who has one\
  \ Negro parent and one White parent].\x94 C. Czerny stated, \x93His beard -- he\
  \ had not shaved for several days -- made the lower part of his already brown face\
  \ still darker.\x94 University of Southern Colorado Professor Elmer Wells in a paper\
  \ titled ``Beethoven -- His Negroid Characteristics'' wrote, \x93The physical traits\
  \ of Ludwig van Beethoven leave little doubt as to his racial identity. He was a\
  \ black man, with nappy hair, flat nose and thick lips.\x94\nFurthermore, the following\
  \ are one word descriptions of Beethoven from various writers: Grillparzer, \x93\
  dark\x94; Bettina von Armin, \x93brown\x94; Schindler, \x93red and brown\x94; Rellstab,\
  \ \x93brownish\x94; Gelinek, \x93short, dark.\x94\nNewsweek, in its Sept. 23, 1991\
  \ issue stated, \x93Afrocentrism ranges over the whole panorama of human history,\
  \ coloring in the faces: from Australopithecus to the inventors of mathematics to\
  \ the great Negro composer Beethoven.\x94\nAnd to respond the idea that because\
  \ Beethoven cam from German and Flemish parents that he could not be African, let\
  \ me school you on the fact that Black Celts (Silures) & Black Vikings mixed with\
  \ the Scandinavia people. The black blood type is common even in Nordic Europe where\
  \ intermixing has been happening since antiquity. Even Hitler's family had some\
  \ Black blood, reports the New York Times 7/1/40. The Huns included Black Mongolians\
  \ who mixed heavily with the 'Aryan Germans.' Furthermore, in the early modern period\
  \ many Africans and ex-slaves from the Americas lived with aristocratic families\
  \ in the courts of German territories or with wealthy bourgeois families as highly\
  \ regarded and privileged domestic servants. Blacks also served in the military\
  \ of many German states, most as splendidly dressed musicians; many were recruited\
  \ by German troops in North America. Moravian missionaries from Saxony also brought\
  \ ex-slaves with them to Germany from the Caribbean. (See Peter Martin, Schwarze\
  \ Teufel, edle Mohren: Afrikaner in Bewußtsein und Geschichte der Deutschen). Blacks\
  \ were numerous, but also because they in many ways had an important cultural impact,\
  \ as their presence in German art, literature, public debate, and daily life. There\
  \ are hundreds of paintings from this era portraying black and white people together.\
  \ In Germany\x92s Hesse and Brunswick-Wolfenbüttel area, where a relatively large\
  \ number of Africans lived during this period, there had been a tradition of black\
  \ servants and military musicians in these regions since the seventeenth century,\
  \ and in the eighteenth century these two \x93dukedoms\x94 [areas] provided the\
  \ largest contingents of German soldiers fighting in the Revolutionary War in America.\
  \ After the war many former slaves accompanied the German troops back to Europe,\
  \ so that by the late 1780s the number of Africans in these two German states increased\
  \ considerably, and Beethoven born during this time. Hesse and Brunswick-Wolfenbüttel\
  \ provided ideal conditions for a microhistorical investigation of both the African\
  \ and German experience, and perceptions of each other over the course of two centuries.\
  \ However, in some ways the treatment of black musicians, soldiers, and servants\
  \ was similar to that of their white colleagues, but there were fundamental differences\
  \ in Germany. The lives of many Africans were described in terms of \"privileged\
  \ dependency.\" Unlike France and England, none of the German states had a legally\
  \ defined status for people who had been bought as slaves in other countries and\
  \ then brought into Germany. Blacks were subject to property relationships and were\
  \ considered valuable possessions, however they could move about freely within white\
  \ society; their de facto slave status was quite different than it was for African\
  \ slaves in other Western countries. Many Africans and the African Americans who\
  \ came with the Hessian soldiers married into local families of all social strata\
  \ and had children. Hello! German historian Vera Lind states, \x93In the stratified,\
  \ hierarchical society of early modern Germany, \"mixed\" marriages of social unequals\
  \ usually were undesired, yet such marriages between blacks and whites did not produce\
  \ hostile reactions. The numerous examples of intermarriage are an indicator of\
  \ social integration.\x94\nAlso of importance to note, is that throughout the early\
  \ modern period, German states welcomed Africans and maintained a generally positive\
  \ image of them. Besides acceptance and integration into daily life, their presumed\
  \ beauty and the darkness of their skin also elevated them to the status of privileged,\
  \ highly valued, exotic attractions. Furthermore, none of the German states were\
  \ even involved in slavery and the slave trade; these topics nonetheless were constantly\
  \ debated among the so-called \x93Enlightenment thinkers\x94 which included men\
  \ like Immanuel Kant (1724-1804), Johann Friedrich Blumenbach (1752-1840), Georg\
  \ Forster (1754-1794), and Johann Gottfried Herder (1744-1803). These German intellectuals\
  \ almost uniformly condemned slavery because they viewed it as incompatible with\
  \ the principles of humanity and Christianity.\nFurthermore, the dissolution of\
  \ the Christian worldview that had put purely theological definitions of human beings\
  \ no longer seemed satisfactory, and learned people everywhere sought new scientific\
  \ explanations. The presence of black people in the German territories influenced\
  \ this debate, in which many prominent German Enlightenment thinkers were involved\
  \ as I mentioned some above. However, some, such as Samuel Thomas Soemmerring (1755-1830),\
  \ a professor of anatomy in Hesse-Kassel, conducted their own anthropological research.\
  \ Soemmerring dissected the corpses of four black soldiers who after the war had\
  \ accompanied the returning Hessians and died shortly thereafter (Soemmerring published\
  \ his research findings in 1784 in a book called Über die körperliche Verschiedenheit\
  \ des Mohren vom Europäer). The results of this anthropological debate were contradictory\
  \ and did not provide any definitive answers. Those involved employed diverse methods\
  \ in various fields and debated whether the differences they found were based on\
  \ \"race\" - a concept based on skin color - natural-environmental factors, or culture.\
  \ The German position in the debate on difference was a developing consensus that\
  \ there were differences in groups of humans but that these differences did not\
  \ imply any moral or intellectual inequalities between them. In other words, they\
  \ strongly agreed on difference without hierarchical ranking. There were those who\
  \ deviated from this position, like Soemmerring, who concluded in his book that\
  \ Africans belonged to a lower order of humans, closer to apes than to the higher\
  \ order of humans, or the historian Christoph Meiners (1747-1810), who saw Africans\
  \ as rightly enslaved because of their low standing in the human hierarchy since\
  \ Creation. But these exceptions were heavily criticized or, in the case of Meiners,\
  \ not even taken seriously by their colleagues.\nBasically, having no economic,\
  \ political, or social dependency on slavery meant less racist views and a greater\
  \ focus on the positive, exotic appeal of Africans. This is part of the reason why\
  \ Beethoven and many other Africans could live respectful lives in Germany. I will\
  \ stop right here, but honestly, I could go on forever with these facts. Hopefully\
  \ this information will cause you to research for yourself, travel the world, teach\
  \ others, and discover how great African people were, are, and will continue to\
  \ be despite the circumstances. Peace, unity, and RESPECT."
