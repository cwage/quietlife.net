body: |-
  [Here is Beethovens life mask.](http://www.lvbeethoven.com/Portraits/ImagesGalerie/Masque_Klein_Original.jpg "http://www.lvbeethoven.com/Portraits/ImagesGalerie/Masque_Klein_Original.jpg")

  ... and here [is his Death mask](http://www.lvbeethoven.com/Portraits/ImagesGalerie/MasqueDanhauser_1827.jpg "http://www.lvbeethoven.com/Portraits/ImagesGalerie/MasqueDanhauser_1827.jpg").

  And [here](http://geographyfieldwork.com/BeethovenHair.jpg "http://geographyfieldwork.com/BeethovenHair.jpg") is his hair.

  Not to mention the [various paintings](http://www.lvbeethoven.com/Portraits/GalleryPortraits.html "http://www.lvbeethoven.com/Portraits/GalleryPortraits.html") and  [drawings](http://www.lvbeethoven.com/Portraits/GalleryDrawings.html "http://www.lvbeethoven.com/Portraits/GalleryDrawings.html") of him by his contemporaries.
