name: moor
body: "I happened upon this page researching african history and facts and found this\
  \ discussion very exciting. the purpose of this discussion concerns if Beethoven\
  \ is \x93black\x94 or not, so if you are taking part in this discussion that is\
  \ what your discussion should deal with. Now, since these ignorant statements are\
  \ abundant I will only rebuke them with swift precision:\n\n1st ignorant comment:\n\
  SInce the indigenous populations of Europe are white, and black populations didn't\
  \ exist there, there is little likelihood that an individual in Europe was black.\
  \ \x96 jay\n\ncrazy! The first civilization of Europe was established on the island\
  \ of Crete. It is called the Minoan Culture, after King Minos, an early legendary\
  \ ruler of the island. The ancestors of the Cretans were natives of Africa, a branch\
  \ of Western Ethiopians. Furthermore, British archaeologist Arthur Evans (1851-1941),\
  \ who conducted excavations on the island, was convinced of African migrations to\
  \ ancient Crete and noted \"the multiplicity of these connections with the old indigenous\
  \ race of the opposite African coast.\" The late African-American cultural historian\
  \ John G. Jackson (1907-1993) advocated the view the Minoan civilization was rooted\
  \ in Africa, and believed that the ancestors of the Minoans \"dwelt in the grasslands\
  \ of North Africa before that area dried up and became a great desert. As the Saharan\
  \ sands encroached on their homeland, they took to the sea, and in Crete and neighbouring\
  \ islands set up a maritime culture.\"\n\nAlso, another example of how Africans\
  \ have been in europe for centuries is a woman called Philippa. Philippa was the\
  \ daughter of William of Hainault, a lord in part of what is now Belgium. When she\
  \ was nine the King of England, Edward II, decided that he would marry his son,\
  \ the future Edward III, to her, and sent one of his bishops, a Bishop Stapeldon,\
  \ to look at her. He described her as: \"The lady whom we saw has not uncommonly\
  \ hair, betwixt blue-black and brown. Her head is cleaned shaped; her forehead high\
  \ and broad, and standing somewhat forward. Her face narrows between the eyes, and\
  \ the lower part of her face is still more narrow and slender than the forehead.\
  \ Her eyes are blackish brown and deep. Her nose is fairly smooth and even, save\
  \ that is somewhat broad at the tip and flattened, yet it is no snub nose. Her nostrils\
  \ are also broad, her mouth fairly wide. Her lips somewhat full and especially the\
  \ lower lip\Nall her limbs are well\nset and unmaimed, and nought is amiss so far\
  \ as a man may see. Moreover, she is brown of skin all over, and much like her father,\
  \ and in all things she is pleasant enough, as it seems to us.\"\n\nFour years later\
  \ Prince Edward went to visit his bride-to-be and her family, and fell in live with\
  \ her. She was betrothed to him and in 1327, when she was only 14, she arrived in\
  \ England. The next year, when she was 15, they married and were crowned King and\
  \ Queen in 1330 when she was heavily pregnant with her first child and only 17.\n\
  \nThis first child was called Edward, like his father, but is better known as the\
  \ Black Prince. Many say that he was called this because of the colour of his armour,\
  \ but there are records that show that he was called 'black' when he was very small.\
  \ The French called him 'Le Noir'.\n\nAlso, the history and legends of Scotland\
  \ confirm the existence of \"purely Black people.\" We see one of them in the person\
  \ of Kenneth the Niger. During the tenth century (long before 1770 when B was born)\
  \ Kenneth the Niger ruled over three provinces in the Scottish Highlands. The historical\
  \ and literary traditions of Wales reflect similar beliefs. According to Gwyn Jones\
  \ (perhaps the world's leading authority on the subject), to the Welsh chroniclers,\
  \ \"The Danes coming in by way of England and the Norwegians by way of Ireland were\
  \ pretty well all black: Black Gentiles, Black Norsemen, Black Host.\"\n\nOkay,\
  \ one more. The fabled story of the ancient and stupendous African general and warrior-king\
  \ Memnon and his display of courage and prowess at the Greek siege of Troy was one\
  \ of the most widely circulated and celebrated epics in the annals of Greek and\
  \ Roman mythology. Memnon, described as \"black as ebony, and the handsomest man\
  \ alive,\" is mentioned repeatedly in the works of such early writers as Hesiod,\
  \ Ovid, Pindar, Diodorus Siculus, Strabo and Virgil. Arctinus of Miletus composed\
  \ an epic poem entitled Ethiopia in which Memnon was the leading figure. Quintus\
  \ of Smyrna credits Memnon with \"bringing the countless tribes of his people who\
  \ live in Ethiopia, land of the black man,\" to Troy in support of its war against\
  \ the hostile coalition of Greek city-states. It was written that: \"Memnon came\
  \ to help them. Memnon was lord over the dark Ethiopians, and the host he brought\
  \ seemed infinite. The Trojans were delighted to see him in their city.\"\n\n2nd\
  \ ignorant comment:\nMor\" for Europeans means olive complexion. And olive complexion\
  \ is common among Europeans. \x96 belle\n\nwhich europeans are you writing of. Europeans\
  \ have always associated moor with black skin. olive skin, for some, came after\
  \ centuries of race mixing. belle, these same Moors helped reintroduce Europe to\
  \ civilization. As early as the Middle Ages, and as early as the seventeenth century,\
  \ \"The Moors were,\" according to the Oxford English Dictionary, \"commonly supposed\
  \ to be mostly black or very swarthy, and hence the word is often used for negro.\"\
  \ Dr. Chancellor Williams stated that \"The original Moors, like the original Egyptians,\
  \ were Black Africans.\" At the beginning of the eighth century Moorish soldiers\
  \ crossed over from Africa into Spain, Portugal, and France, where their swift victories\
  \ became the substance of legends. To the Christians of early Europe there was no\
  \ question regarding the ethnicity of the Moors, and numerous sources support the\
  \ view that the Moors were a black-skinned people. Morien, for example, is the adventure\
  \ of a heroic Moorish knight supposed to have lived during the days of King Arthur.\
  \ Morien is described as \"all black: his head, his body, and his hands were all\
  \ black.\" In the French epic known as the Song of Roland the Moors are described\
  \ as \"blacker than ink.\" William Shakespeare used the word Moor as a synonym for\
  \ African. Christopher Marlowe used African and Moor interchangeably. Arab writers\
  \ further buttress the Black identity of the Moors. The powerful Moorish emperor\
  \ Yusuf ben-Tachfin is described by an Arab chronicler as \"a brown man with wooly\
  \ hair.\" Black soldiers, specifically identified as Moors, were actively recruited\
  \ by Rome, and served in Britain, France, Switzerland, Austria, Hungary, Poland,\
  \ and Romania. St. Maurice, patron saint of medieval Europe, was only one of many\
  \ Black soldiers and officers under the employ of the Roman Empire.\n\n3rd ignorant\
  \ comment:\nObviously, you know nothing whatsoever about Europeans. As stated time\
  \ and time again, \"Mor\" for Europeans means olive complexion. And olive complexion\
  \ is common among Europeans. Herr von Beethoven was NOT black, or of any black ancestry.\
  \ It's ridiculous of anyone to assume that he was black, and it is very ignorant.\
  \ Have you been to Wien? Have you studied Herr von Beethoven and his masterpieces?\
  \ You probably know absolutely nothing about Ludwig von Beethoven.\n\nEverybody\
  \ knows about Europeans. The issue is that few know about or are ready to recognize\
  \ Africans. I\x92ve already addressed how Europeans commonly identified moor or\
  \ mor. Also, why do you continue to ask if people have studied Beethoven. B is well\
  \ known. Why do you doubt people\x92s knowledge of B when you continue to show numerous\
  \ signs of ignorance yourself? Let\x92s go this route, since none of us where there,\
  \ let\x92s look at what people who were there in the time of B said about him. For\
  \ this, look no further than the quote at the start of this discussion from Andre\
  \ de Hevesy telling of what Prince Esterhazy said about Beethoven: 'What!'exclaimed\
  \ the prince, 'the music is by this blackamoor? 'Well, my fine blackamoor, henceforward,\
  \ thou art in my service.'\" What\x92s even more interesting is that blackamoor\
  \ is a European word used by Europeans to describe the darkest of the moors. So,\
  \ tell me: how can you continue to doubt these factual statements. Are you suggesting\
  \ that they are false or where not spoken? If so, well that\x92s another matter.\
  \ But none the less, it is the initial argument and cannot be denied as being said.\
  \ You see, Africans have such a long history on this planet you can\x92t match facts\
  \ for facts against it, there is simply too much African fact. And you\x92ll notice\
  \ how proud the views on African pride are in this discussion. Well, get use to\
  \ it because as more and more of these discussions continue and as recent events\
  \ are showing us, the truth about Africans roots in all civilizations will only\
  \ grow and racial harmony and peace will gain grown. Why? Because it is undeniable\
  \ fact. The whole dna argument was shot down by \x93One\x94, which even I thought\
  \ at first might be a good argument, but we were sown the truth once again. No,\
  \ I fully expect an ignorant response to come against my text, but that\x92s EXPECTED.\
  \ You see, Africans are wonderful people, we have nothing to hide or be ashamed\
  \ of. We have always fought for freedom for all of man kind. White people always\
  \ is mistake our pride for reverse racism, but again, that is EXPECTED. Why? Because\
  \ like I said, we already know your history. But it\x92s not about who is better,\
  \ it\x92s about showing respect where respect is due. Do you think Africans will\
  \ just disappear and shut if. If you know anything about is is that we are a strong\
  \ people, that is why were are still here. No other race has and continues to face\
  \ as much scientific racism as we do. But the truth and time will set us and all\
  \ of man kind free, just as the moors set jews free from persecutions from the visigoths\
  \ in early spain and racial harmony was abound. Herr von Beethoven WAS black."
