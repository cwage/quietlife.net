  Yes, my name is Jacquese Stitts and I go to Foss high school. We were doing this project and we got this paper were we read about the negro beethoven, and after we were done our teacher told us that if we were interested in the truth to do some reasarch so we can get our own version of the [truth.so](http://truth.so "truth.so") I was lookin through the sites and I came across this one and I see that you left out some important information . then i see this.Beethovens mom was a moor (a muslim african)also his negroid traits(dark skin,flat, thicknose)well tahnk you for listening to my suggestions.

  Jacquese Stitts
