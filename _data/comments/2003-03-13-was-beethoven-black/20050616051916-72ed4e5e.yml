name: Johan
body: |-
  Hello Louisa,

  Let the children pretend to be great and powerful.

  (Back to the subject)

  [This site](http://www.sayyesquickly.net/syq-ftesting.html "http://www.sayyesquickly.net/syq-ftesting.html") seems to claim that even prelliminary DNA testing on [Beethoven's hair](http://geographyfieldwork.com/BeethovenHair.jpg "http://geographyfieldwork.com/BeethovenHair.jpg") and surviving fragments of [his skull](http://www.beethoven-haus-bonn.de/sixcms/detail.php?id=5163&template=dokseite_digitales_archiv_en&_eid=5056&_ug=Masks&_mid=Pictures%20and%20objects&_eid=5056&_dokid=i1617&_eid=5056&_seite=1 "http://www.beethoven-haus-bonn.de/sixcms/detail.php?id=5163&template=dokseite_digitales_archiv_en&_eid=5056&_ug=Masks&_mid=Pictures%20and%20objects&_eid=5056&_dokid=i1617&_eid=5056&_seite=1"), show that the hair and the skull belong to the same individual.

  Here are some more things to look at:

  A [profile of Beethoven's skull (click)](http://img.photobucket.com/albums/v320/Johan77/profile2.jpg "http://img.photobucket.com/albums/v320/Johan77/profile2.jpg") (artists' drawing, [image obtained from Beethoven-Haus museum -click](http://www.beethoven-haus-bonn.de/sixcms/detail.php?id=5224&template=dokseite_digitales_archiv_en&_eid=5056&_ug=Other%20depictions&_mid=Pictures%20and%20objects&_eid=5056&_dokid=i1615&_eid=5056&_seite=1 "http://www.beethoven-haus-bonn.de/sixcms/detail.php?id=5224&template=dokseite_digitales_archiv_en&_eid=5056&_ug=Other%20depictions&_mid=Pictures%20and%20objects&_eid=5056&_dokid=i1615&_eid=5056&_seite=1")).

  Compare this with profiles of skulls from [these three racial types from a Forensic Anthropology manual.](http://img.photobucket.com/albums/v320/Johan77/lab7-forensics6.jpg "http://img.photobucket.com/albums/v320/Johan77/lab7-forensics6.jpg")

  Notice that the distance of item 2 from line no. 3 is the least in "White" (aka European) skull - in fact, in this case, line 3 almost touches the nasal spine (item 2).

  This manual in PDF can be downloaded from [this site.(click)](http://www.uwyo.edu/bioanth/1100/Docs/lab7-forensics.pdf "http://www.uwyo.edu/bioanth/1100/Docs/lab7-forensics.pdf")
