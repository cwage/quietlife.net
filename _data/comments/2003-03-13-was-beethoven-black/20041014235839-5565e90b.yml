name: Jay
body: As a musician, I understand that Ludwig Van Beethoven is to this day a pioneer
  of all forms of music. This point is in the forefront of my mind. Since the discussion
  is about his lineage and not his contribution to music, I find it interesting how
  some can say his lineage doesnt matter. I also find it contradicting that the same
  who say his lineage doesnt matter, never debate pictures of Jesus with blonde hair
  and blue eyes. I've never heard anyone of European descent say it doesnt matter.
  It's always just accepted by those of European descent. My point is that I don't
  understand why a black or any other race of people, get questioned when asking why
  such things as a great composer with possible Moor lineage might possibly actually
  have some African blood. Some sound as if it is more acceptable if the lineage proved
  that Beethoven had North Saharan blood verses ANY blood of the darker skinned Africans.
  Whats going on here seems obvious, and the ones making the obvious statements dont
  even realize it. I'd just like to know if ANYONE can prove Beethovens mother wasn't
  a moor, and then we could have an answer to this lineage of Beethoven question.
date: '2004-10-14T23:58:39Z'
slug: 2003-03-13-was-beethoven-black
