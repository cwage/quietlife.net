name: moor
body: "rassistisches huh? rassistisches huh? das ist interessant. How quickly you\
  \ resort to the word racist when your false beliefs and statements are challenged\
  \ by fact. For those of you who claim the know something a bout moors clear know\
  \ very little. Keep reading, learning and experiencing and perhaps I will respond.\
  \ Perhaps you will learn about moors. All your links to pictures of moors are unavailable\
  \ \x96 fool! Also, question yourself about who drew those pictures that nobody can\
  \ view. And no you know that moors date back way before the 13th century. 13th century.\
  \ That\x92s comical. Do you know how far moors go back? Clue: before the 20th century.\
  \ Using photos during the time of alfonzo after the reign of the moors is very interesting\
  \ as well. It is known fact that it was the black African moors that conquered spain\
  \ from the murderous visigoths who tortured the jews \x96 if you know jewish roots\
  \ you will know why \x96 i\x92ll touch on later. It is also true that the moors\
  \ were both dark skin and light skin arabs and both play large roles in the moulding\
  \ of spain\x92s glory. In fact, I look very much like many of the lighter skin (caramel\
  \ completion) moors of today, but I am black with obvious black features and hair.\
  \ my mother is very fair, almost white but she is black with black features and\
  \ hair. Before the moors entered spain, there was plenty of mixing between dark\
  \ black Africans and lighter black Africans (berbers), and arabs, but they were\
  \ all muslim. Have you looked and pictures of moors while they were actually in\
  \ power? Also, do you not value the words of people who lived during those times\
  \ and described black African moors? You use pictures of moors but obviously have\
  \ no clue about the time of those happenings and how it relates to when the moors\
  \ were in power and what lands they controlled at given times. You used illustrations\
  \ from Cantigas de Santa Maria from 13th century, reign of Alfonso X, when the reign\
  \ of the moors was from 711 and 1492, and the latter years they were losing control.\
  \ Also, it is important note that when the moor arrived in spain, they did not bring\
  \ their African women with them to war. So, they intermarried the white women in\
  \ spain at the time, and after over 700 years, their skin colours were more diverse.\
  \ again, fact that refutes your claims to moors not being black. all your \x93sketches\x94\
  \ are supposedly from the 13th century. also, did you know that after the invasion\
  \ of 711 came other waves of Moors even darker? it was this occupation of portugal\
  \ which accounts for the fact that even noble families had absorbed the blood of\
  \ moors. from that time onwards, racial mixing in portugal, as in spain, and elsewhere\
  \ in europe which came under the influence of moors, took place on a large scale.\
  \ that is why historians claim that \"Portugal is in reality a Negroid land,\" and\
  \ that when Napoleon explained that \"Africa begins at the Pyrenees,\" he meant\
  \ every word that he uttered. even the world-famed shrine in Portugal, Fatima, where\
  \ Catholic pilgrims from all over the world go in search of miracle cures for their\
  \ afflictions, owes its origin to the moors. the story goes that a Portuguese nobleman\
  \ was so saddened by the death of his wife, a young Moorish beauty whom he had married\
  \ after her conversion to the christian faith, that he gave up his title and fortune\
  \ and entered a monastery. his wife was buried on a plateau called Sierra de Aire.\
  \ It is from there that the name of Fatima is derived. where are your facts? Again,\
  \ black people across Africa have different skin tones and features -- simple. you\
  \ challenge the people who I quote, well what makes your references correct and\
  \ not mine? Unlike you, my knowledge encompasses a broad scope. My sources come\
  \ from all over the world and from all races \x96 historians, professors, scientists,\
  \ etc. What is your response to that? To the dude, who used German to write to me\
  \ knowing not everyone knows what hell he said. Well, let me school you on Hitler\
  \ -- a well know german white supremacist. It is known fact that his mother was\
  \ a Jew. well, do you know where Judaism \x96 what many Jews followed, came from?\
  \ Ethiopia (Africa). learn truth! Please be aware that my words are not for fools\
  \ but for people such as myself who search for truth without bias or racist thoughts.\
  \ Also, if you don\x92t understand the basic principles of proving a point by using\
  \ facts and other arguments to support your point, then you won\x92t understand\
  \ why I is used several issues to prove of Beethoven was black, and you probably\
  \ failed communication courses. Not once, did anyone provide any facts to counter\
  \ my facts. Why? They truth can\x92t be refuted. I\x92ve made no assumptions, only\
  \ truth statements. Take it live in ignorance. Regardless, you will come to witness,\
  \ it this life or the next, the rise of history\x92s real facts. Old habits die\
  \ hard so brace yourself. I have no sympathy for the fools who call me racist when\
  \ I am not. My people birthed all of mankind so how could I hate mankind. I simply\
  \ thirst for verified truth. You will come to see that the growing number of scholars\
  \ from all walks of life reveal facts opposite from what many of you have shared\
  \ today. Also, I did not intend to disrespect the person who thought by calling\
  \ Europeans white. What I should have said were white-europeans. however, the fact\
  \ remains that mr. beethoven ist SCHWARZ."
