body: |-
  If you weren't busy dismissing evidence, you might have noticed that the site includes photographs of the skull.

  ...and now, back to subject.

  Notice that when an [image of the death mask is superimposed on the drawing of the skull, it fits (click).](http://img.photobucket.com/albums/v320/Johan77/Ludwigfinal_2.jpg "http://img.photobucket.com/albums/v320/Johan77/Ludwigfinal_2.jpg")

  Based on this, I would say that the artist did a fairly accurate job.
