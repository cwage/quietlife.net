name: Johan
body: |-
  > I have not accepted or dismissed YOUR evidence (a drawing..?). Frankly, I don’t care about his race. etc. etc. etc......etc.

  You protest too much.

  You are the one being disrespectful, and exploiting racial politics.

  And now (with Mr. Reggie's permission), back to the subject:

  The drawing of Beethoven's skull [fits the death mask (click)](http://img.photobucket.com/albums/v320/Johan77/Ludwigfinal_2.jpg "http://img.photobucket.com/albums/v320/Johan77/Ludwigfinal_2.jpg"). So do we say it is "just a drawing", or do we notice something?

  Here is a [photograph of Beethoven's skull.](http://www.beethoven-haus-bonn.de/sixcms/detail.php?id=5163&template=dokseite_digitales_archiv_en&_eid=5056&_ug=Masks&_mid=Pictures%20and%20objects&_eid=5056&_dokid=i1617&_eid=5056&_seite=1 "http://www.beethoven-haus-bonn.de/sixcms/detail.php?id=5163&template=dokseite_digitales_archiv_en&_eid=5056&_ug=Masks&_mid=Pictures%20and%20objects&_eid=5056&_dokid=i1617&_eid=5056&_seite=1") - which is provided by the same site.

  Stick around, because there are more things to look at.
