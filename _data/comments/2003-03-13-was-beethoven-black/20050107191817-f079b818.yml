  \ civilizatiosn in Africa, Europe, etc.:\n\n\x93historical perspectives\x94\n-not\
  \ historical evidence\n\n\x93illustrative photographs\x94\n\x96not true photographs\n\
  \n\x93which has divided the Mediterranean into distinct northern and southern clusters\
  \ since at least the Neolithic period. The authors conclude that \"gene flow was\
  \ more the exception than the rule,\" attributing this result to \"a joint product\
  \ of initial geographic isolation and successive cultural divergence, leading to\
  \ the origin of cultural barriers to population admixture.\"\n\x96if this is meant\
  \ to refute the moors entry into spain and elsewhere, well, sorry but they entered\
  \ by force and thus broke the \x93Barrieres\x94 when the African and arab moors\
  \ for example crossed into spain.\n\n\x93\"So far, our analyses have allowed a clear\
  \ dissection of almost all NW African...paternal lineages into several components\
  \ with distinct historical origins.\x94\n-what\x92s historical period? The New millenium?\n\
  \n\x93the NW African Y-chromosome pool may be summarized as follows: 75% NW African\
  \ Upper Paleolithic (H35, H36, and H38), 13% Neolithic (H58 and H71), 4% historic\
  \ European gene flow (group IX, H50, H52), and 8% recent sub-Saharan African (H22\
  \ and H28).\"\n-ah look, this website is so ridiculous it incriminates itself by\
  \ stating that 75% of NW African gene Y-chrome pool is made up of NW African. Thanks\
  \ for that.\n\n\x93Like Egyptians, the Phoenician seafarers and Islamic Moors are\
  \ also frequently claimed by Afrocentrists, because both groups established colonies\
  \ in North Africa and presumably intermarried with the indigenous populations. However,\
  \ they were originally of Semitic origin, coming from the Middle East, and their\
  \ forays into Africa seem not to have altered their racial character.\x94\n-many\
  \ to seek to further discredit african legacy, some historians try to displace egypt\
  \ from africa by classifying it as part of asia, but the ancient people of west\
  \ aAsia were also black. evidence of the presence of African people in ancient Southwest\
  \ Asia is documented by Homer, who describes the Blacks, or \"Ethiopians,\" as \"\
  dwelling at the ends of the earth, towards the setting and rising sun.\" The Greek\
  \ historian Ephorus wrote that \"the Ethiopians were considered as occupying all\
  \ the south coasts of both Asia and Africa, divided by the Red Sea into Eastern\
  \ and Western Asiatic and African.\" Sumerian civilization was an extension of Nile\
  \ Valley civilization \"of which Egypt was the noblest-born but not the only child.\"\
  \ The ancient Sumerians referred to themselves as the Blackheaded people. There\
  \ is also no doubt that the oldest and most exalted deity of the Sumerians was Anu,\
  \ a name that loudly recalls the thriving and widely-spread Black civilizers found\
  \ at history's dawn in Africa, Asia and even Europe. Eye-witness accounts, skeletal\
  \ evidence, Biblical references, architectural patterns and oral traditions all\
  \ point to an early African origin for the Sumerians of ancient southwest Asia.\
  \ Furthermore, the ancient Sumerians were akin to the modern Black Dravidians of\
  \ India. The Sumerians also had an affinity with a people known as the Elamites,\
  \ the first Semitic group mentioned in the Bible (Gen. 10:22). the elamites were\
  \ a black-skinned and woolly-haired people as the colorful glazed artwork on the\
  \ royal palace walls of the ancient Persian city of Susa clearly show. Thus Abraham,\
  \ the native of Sumerian and the founding father of the Israelite nation, was a\
  \ black man. The black racial origins of the Patriarchs is not based on mere conjecture,\
  \ it is in complete agreement with the picture one gets from examining the identity\
  \ of the earliest inhabitants of southern Mesopotamia. The earliest civilization\
  \ of Mesopotamia was that of the Sumerians, and they are designated in the Assyrio-Babylonian\
  \ inscriptions as the black-heads or black-faced people, and they are shown on the\
  \ monuments as beardless and with shaven heads. According to Samuel Kramer (From\
  \ the Tablets of Sumer, Falcon's Wing Press, 1956, p.60), they refer to themselves\
  \ as \"the blackheaded people.\" Actually the Sumerian original reads \"head-of-black\
  \ people.\" This easily distinguishes them from the Semitic Babylonians, who are\
  \ shown with beards and long hair. From the myths and traditions of the Babylonians\
  \ we learn that their culture came originally from the south. Sir Henry Rawlinson\
  \ concluded from this and other evidence that the first civilized inhabitants of\
  \ Sumer and Akkad were immigrants from the African Ethiopia. According to author,\
  \ Drusilla D. Houston, Arabia was originally settled by two distinct races, an earlier\
  \ Cushite Ethiopian race and a later Semitic race. In an article on Arabian states,\
  \ written in Encyclopedia Britannica, the institutions of Yemen, Hadrabut, Oman,\
  \ and adjoining districts point to an African origin. Arabia, Egypt, Sumer, and\
  \ India were all colonies of the Cushite Empire. Lately, the Sumerian Empire downfall\
  \ was due to northern invasions. the Indo-European and Semites invaded and destroyed\
  \ the Sumerian civilization.\n\n\x93photographs\x94\n-this si so funny. I don\x92\
  t remember learning about the moors in spain and Portugal during the days of early\
  \ civilization wearing bow ties, Armani suites, and turtutle nexts. Honestly, the\
  \ website is so clueless it\x92s set\x92s new records in studpidity and ignorance.\n\
  \nAnd I can go on and on but I think I\x92ve made a point."
