  \ the time the moors were in spain. Hello, nobody si disputing they were a minority\
  \ in tehse parts of the world \x96 FACT. The point is that dispite being minorities,\
  \ the played major roles in moulding the very same natiosn they were minorities\
  \ in. but over hundreds of years, facial features shifted due to race mixing. These\
  \ are words taken from this comical web site to prove that their \x93finds\x94 are\
