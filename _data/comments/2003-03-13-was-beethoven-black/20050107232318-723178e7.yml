name: Johan
body: |-
  Here are some more images of Beethoven for people who are interested.

  A different [view](http://dienstleistungen.freepage.de/language/FaceMask1812.jpg "http://dienstleistungen.freepage.de/language/FaceMask1812.jpg") of [the life mask.](http://dienstleistungen.freepage.de/language/lifemask.jpg "http://dienstleistungen.freepage.de/language/lifemask.jpg") taken of Beethoven by Franz Klein (notice the straight hair).

  Another view of the life mask.

  Here is [another view](http://www.lvbeethoven.com/Portraits/ImagesGalerie/Portrait_LouisLetronne_1814_Original.jpg "http://www.lvbeethoven.com/Portraits/ImagesGalerie/Portrait_LouisLetronne_1814_Original.jpg") of the Letronne portrait. Here is an engraving that was made from this, by [Blasius Höfel](http://www.lvbeethoven.com/Portraits/ImagesGalerie/Portrait_LouisLetronne_1814.jpg "http://www.lvbeethoven.com/Portraits/ImagesGalerie/Portrait_LouisLetronne_1814.jpg").

  Afrocentrists try to use [distorted versions](http://www.geocities.com/dabjazz/page7.html "http://www.geocities.com/dabjazz/page7.html") of this portrait.

  [Beethoven in 1808](http://www.lvbeethoven.com/Portraits/ImagesGalerie/DessinBeethoven_FerdinandSchnorrVonCaroldfeld_1808.jpg "http://www.lvbeethoven.com/Portraits/ImagesGalerie/DessinBeethoven_FerdinandSchnorrVonCaroldfeld_1808.jpg"), from the real, by Ferdinand Schnorr von Garolsfeld.

  [Two drawings](http://www.lvbeethoven.com/Portraits/ImagesGalerie/Dessin_JosephEduardTeltscher_01_1827.jpg "http://www.lvbeethoven.com/Portraits/ImagesGalerie/Dessin_JosephEduardTeltscher_01_1827.jpg") of Beethoven on his deathbed by
  [Joseph Eduard Teltscher](http://www.lvbeethoven.com/Portraits/ImagesGalerie/Dessin_JosephEduardTeltscher_02_1827.jpg "http://www.lvbeethoven.com/Portraits/ImagesGalerie/Dessin_JosephEduardTeltscher_02_1827.jpg")

  Joseph Dannhauser's [death-bed sketch of Beethoven.](http://www.lvbeethoven.com/Portraits/ImagesGalerie/Dessin_JosephDanhauser_1827.jpg "http://www.lvbeethoven.com/Portraits/ImagesGalerie/Dessin_JosephDanhauser_1827.jpg") (Dannhauser also made the death mask)

  Here is one of the surviving locks of [hair.](http://geographyfieldwork.com/BeethovenHair.jpg "http://geographyfieldwork.com/BeethovenHair.jpg")

  Notice that the hair and masks reflect what we see in the drawings and paintings.
