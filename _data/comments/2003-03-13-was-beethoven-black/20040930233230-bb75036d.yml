name: Johan
body: |-
  Just a brief look-up on Beethovens hair produced these hits:

  [close up of Beethoven's hair! (scroll to bottom of the page)](http://geographyfieldwork.com/Synchrotron3.htm "http://geographyfieldwork.com/Synchrotron3.htm")

  [More about this lock of hair](http://www2.sjsu.edu/depts/beethoven/hair/hairexhibit.html "http://www2.sjsu.edu/depts/beethoven/hair/hairexhibit.html"). Also, note the interesting information about his death mask.

  [Another image of Beethoven's hair](http://www2.sjsu.edu/depts/beethoven/hair/hairimage/hairdis.JPG "http://www2.sjsu.edu/depts/beethoven/hair/hairimage/hairdis.JPG")

  It is pretty obvious, isn't it?

  Anylsis of the hair (this is not necessarily the most current information):

  [His hair didn't show any of the wrinkles or bends typical of people of African descent](http://www.edwardwillett.com/Columns/beethoven.htm "http://www.edwardwillett.com/Columns/beethoven.htm")

  The article mentions that the "Jury is out" on the question of whether Beethoven was black - this is typical scientific caution.

  [4. Where does the shape come from? The shape of the cross-section of each individual hair (round, oval or oblate) determines the shape of the head of hair (stiff/straight, soft/wavy or frizzy) and the type of hair (Oriental, Caucasian or African). Visitors can look through the microscope to see the differences between a straight, curly and wavy hair at 4,000 times their actual size.](www.nhm.ac.uk/hair/downloads/exhibition_description.pdf "www.nhm.ac.uk/hair/downloads/exhibition_description.pdf")

  [Scientific analysis of Beethoven's hair](http://www2.sjsu.edu/depts/beethoven/hair/hairtestpc.html "http://www2.sjsu.edu/depts/beethoven/hair/hairtestpc.html")

  [more about Beethoven's hair](http://www.sayyesquickly.net/syq-excerpt.html "http://www.sayyesquickly.net/syq-excerpt.html")
