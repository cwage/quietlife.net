name: Johan
body: |-
  > The minute anyone mentions that someone that achieved something great in this world could possible by of Black descent everyone gets all defensive as if it can't be.

  You can stop that, because it won't work.

  Also, you'll probably find better examples of people getting "all defensive as if it can't be" in the responses to my comments.

  > And as for the dark complexion really being olive skinned, let's get real, he was called "Mor" and if you know your history straight and simple that's black, not olive, tan, peachy cream or whatever.

  That is also incorrect. There are [other definitions](http://www.ancestry.com/search/SurnamePage.aspx?html=b&ln=Mohr&sourcecode=13304 "http://www.ancestry.com/search/SurnamePage.aspx?html=b&ln=Mohr&sourcecode=13304") for this word, and what is meant by the word probably depends on the context.

  > Maybe a dark skin color, that wild unruly hair, his strong features. let's use our heads and stop trying to undermine people by getting all "scientific". And Johan why don't u check into that nearest medical school library of yours and get a Physical anthropology book on human classification through OBSERVATION.

  We can look at [Beethoven's skin color as artists saw it](http://www.lvbeethoven.com/Portraits/ImagesGalerie/JosephKarlStieler_1820Presentation.jpg "http://www.lvbeethoven.com/Portraits/ImagesGalerie/JosephKarlStieler_1820Presentation.jpg"),[Beethoven's hair](http://geographyfieldwork.com/BeethovenHair.jpg "http://geographyfieldwork.com/BeethovenHair.jpg") or the features [of the living](http://www.lvbeethoven.com/Portraits/ImagesGalerie/Masque_Klein_Original.jpg "http://www.lvbeethoven.com/Portraits/ImagesGalerie/Masque_Klein_Original.jpg") and [the dead Beethoven](http://www.lvbeethoven.com/Portraits/ImagesGalerie/MasqueDanhauser_1827.jpg "http://www.lvbeethoven.com/Portraits/ImagesGalerie/MasqueDanhauser_1827.jpg").

  Or we can ignore these, and try to interpret someone else's words, and pretend that we know what was meant by them.
date: '2004-11-13T22:52:07Z'
slug: 2003-03-13-was-beethoven-black
