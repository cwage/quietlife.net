body: |-
  Yeah, actually his name was "LudNigg van Beathooden", right?!
  A crypto-blackey...

  OMG, so many hilarious bullshit certain people post here such like comments of pseudo-intellectual primates who write things like "whites have invented nothing and created nothing in the world" and "Europe is a nation" (it is a CONTINENT!)...
  Those people should obtain some real knowledge and repeat geography classes first!

  So German inventors like WW2 rocket engineer Wernher von Braun,

  Hugo Schmeisser (created the world's first assault rifle, the StG 44 - precursor of the more famous Russian AK-47),

  Rudolf Diesel (inventor of the Diesel engine),

  Nikolaus August Otto (inventor of the modern petrol engine in your car),

  Werner von Siemens (invented a kind of telegraph amongst other things),

  Wilhelm Conrad Röntgen (discovered the X-ray and paved the way for radiography),

  Manfred von Ardenne (WW2 physicist, holding more than 600 patents in radio and television technology, electron microscopy, nuclear, plasma and medical technology - e.g. first night vision device in 1944 to be mounted on a StG44 rifle, "Zielgerät 1229")

  - just to mention a few of them - were black people? :D

  And beyond this, more than thousand white German geniuses that the Allies took to the USA after WW2 within the so-called "Operation Paperclip/Overcast".

  Many mathematics and scientists came from Europe and were white, not to mention that most Nobel Prize winners are white.
  Oh, I forgot.. maybe Merkel is black too and is just using makeup and underwent facial surgery.

  Let's see if you pass an intelligence test!

  Your imbecile envy is simply ridiculous! :D
