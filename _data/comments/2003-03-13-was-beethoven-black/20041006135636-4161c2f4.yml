name: Lynnise
body: First of all, not all blacks have charcteristic traits of wrinkles or bends"typical
  of their hair". If you take a look at the physical characteristics of many African
  Americans, we do not all have the same texture, of course you would not know that
  because you aren't black. Someone who's father is white and mother is fair skinned
  usually comes out with hair that is straight, very similar to europeans' grade of
  hair. A light skinned black is usually comprised of white descent and so their texture
  is a lot less curly, so when they marry someone that is white I wonder which one
  overlaps? As far as Arabs and etc... we had to adapt to different climates, therfore,
  our skin, and overtime facial features shifted. I guarantee you if you trace your
  lineage you will most certainly find out who you are, but of course, you probably
  won't do that because you don't even want to consider he possibilty of someone else
  who has been labeled white, but in actuality his mother is a moor, let alone yourself.
  I bet you don't even know who invented the street light, tires, stove, refrigerator,
  iron , ironing board etc... they were all black. We have made this country the profitable
  market it is, yet you all continue to reap from our inventions, yet we do not. Before
  there was Europe, Africa had civilzations, forms of political institutions, kings,
  queens , chiefs, schools ,colleges, we had all of that.
