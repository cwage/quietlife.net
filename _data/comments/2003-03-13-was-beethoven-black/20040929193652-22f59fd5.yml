name: Dave Blocker
body: You know, in Time-Life Encyclo. the face of Beethoven was rubbed out. The portraits
  they replace with were all Europian. You know, it's been documented throughout Europe,
  that he was known as, "the Mor", "Black Spaniard", "ruddied complection", "Dark",
  "ugly" and so many other names that used to described one who was black. Back in
  his day. People in his time had no knowlege of what we would be able to do in the
  twentieth century. For instance, they turned his head to face left while leaving
  his hair facing right. The didn't know someone would come along and check it out
  and reverse it showing the real thing right before our eyes. If you take a strand
  of hair from an African, you will find all of the types of hair on this Earth in
  it. Yep, you have two different death masks, actually ther are more but the truth
  is here y'all. The man suffered enough in his time because, race is so deep, especially
  when it's in the time of slavery, and there is money to be made even today, in modern
  slavery. The slaver could be any color, black too if he is in power. Who was in
  power in Beethovens day, how many brown babies were sold ?
