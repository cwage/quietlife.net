  correlates with the fact that when you choose to manipulate masses of people, you
  will never be honest at the root!  Ask yourself this, how come ALL of your "white
  scholars" study in the quote unquote poorest reigon in the world?  Africans have
  created nearly EVERY facet of society, in which YOUR people stole their creations
  and patented it as their own!  Verifyible fact!  We are the MOTHERS AND FATHERS
  of civilization, and all you and your people can do is spew ignorant LIES that can
  not be proven because you do not and will not accept the truth!  The very people
  who controls information, the EUROPEANS stole from every ethnic group throughout
  the world, only to claim it as their own, WHAT A SHAME!  Why do u think that whites
  spend soo much time trying to kill, a race that, in your ignorance, feels has no
  real relevance in society?  Memo to you sir, stop allowing YOUR intelligence to
  be shrouded due to the COMPLETE AND UTTER IGNORANCE of your forefathers, it is so
  unbecoming!  Salam!
