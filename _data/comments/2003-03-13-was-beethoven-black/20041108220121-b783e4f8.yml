name: Johan
body: |-
  I see.

  We cannot trust [paintings](http://www.lvbeethoven.com/Portraits/ImagesGalerie/JosephWillibrordMahler_1815.jpg "http://www.lvbeethoven.com/Portraits/ImagesGalerie/JosephWillibrordMahler_1815.jpg") made directly from the live [Beethoven](http://www.lvbeethoven.com/Portraits/ImagesGalerie/JosephKarlStieler_1820Presentation.jpg "http://www.lvbeethoven.com/Portraits/ImagesGalerie/JosephKarlStieler_1820Presentation.jpg") , but we can trust a painting of Beethoven by a man who has never seen Beethoven.

  Makes sense.
date: '2004-11-08T22:01:21Z'
slug: 2003-03-13-was-beethoven-black
