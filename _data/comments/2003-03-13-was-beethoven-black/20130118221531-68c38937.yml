name: Dolwood
body: The very first time I ever heard of Beethoven's lineage possibly being linked
  to Africa was from a  Harvard Law student/friend stating that when one of her professors
  made mention of this, a fellow student said "Well, I'll never listen to Beethoven
  ever again".  So, yes, we can let "bygones be bygones" ; however, should we really?
   Somewhere, right now, there's a child, one of color who is inspired by this.  Years
  ago a professor at a university was asked if  the Negro ever contributed anything
  to the World and told his students "NO"..... thus, the contributions of the great
  Arthur Schomburg, who throughout the years later went on a quest to defy that response.
     Well worth studying.  A portion of that students life can be see here. [http://en.wikipedia.org/wik...](http://en.wikipedia.org/wiki/Arturo_Alfonso_Schomburg
  "http://en.wikipedia.org/wiki/Arturo_Alfonso_Schomburg")
