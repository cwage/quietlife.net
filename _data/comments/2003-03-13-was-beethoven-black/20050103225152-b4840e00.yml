name: Johan
body: "Reply to make-beleive Moor:\n\n> the purpose of this discussion concerns if\
  \ Beethoven is \x93black\x94 or not, so if you are taking part in this discussion\
  \ that is what your discussion should deal with.\n\nYou seem to have trouble following\
  \ your own advice. Most of the stuff that you wrote has nothing to do with Beethoven.\n\
  \n> For this, look no further than the quote at the start of this discussion from\
  \ Andre de Hevesy telling of what Prince Esterhazy said about Beethoven: 'What!'exclaimed\
  \ the prince, 'the music is by this blackamoor? 'Well, my fine blackamoor, henceforward,\
  \ thou art in my service.'\"\n\nLook at the statement again. It is about *Haydn*,\
  \ not Beethoven, isn't it?\n\nThe rest of what you wrote is nonsense."
date: '2005-01-03T22:51:52Z'
slug: 2003-03-13-was-beethoven-black
