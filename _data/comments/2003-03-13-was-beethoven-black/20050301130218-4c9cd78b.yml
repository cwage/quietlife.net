name: William
body: Human races have to be split, thats what makes us..."unique" there are many
  differant species of fly, dogs, horses, etc, etc. How can splitting humans into
  differant groups make someone racist? Humans are not all equal, we are not all the
  same. How can we be the same when you can tell the differance between two peoples
  race by looking at them? Would a dog be equal if it could speak human? I think not,
  the equality and race cards have been overplayed, its time for a new hand. This
  discussion started over Beethoven being supposedly black, mixed, of african descent,
  whatever, Now Michelangelo is coming into it? Egyptians? The first pharohs of Egypt
  were white, Just because the Egyptian empire rose in Africa, does not mean it was
  Blacks who created it. If your going to pull up history for argument, look at what
  Whites have given the World. I once read an argument on the internet, And the only
  credit that was given to the black race in this argument by a black "Historian"
  who was black also was, A super soaker, and traffic lights, which later on was proven
  that traffic lights was invented by a white person. I read someone speaking of Europeans
  roaming the hills of Europe, Africa had great civilsations, like Egypt. Ive already
  said my piece on Egypt, Now look at Europe now. Africa is the worst place on Earth.
  Its a void of nothing but pain, death and poverty. If Africa is such a great place,
  Why do so many immigrints from there swarm to Europe and North America, which are
  white continents. If the black race is of brilliance, why is Africa nothing today?
  The continent lives of other countries, Its just one giant parasite. If you love
  your fantastic nation so much and its of such great importance to the world, simply,
  go back there. And stay there.
