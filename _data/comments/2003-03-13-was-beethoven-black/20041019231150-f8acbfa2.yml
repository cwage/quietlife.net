name: Johan
body: |-
  Also, where did anyone get the idea that blacks invented the street light, tires, stove, or refrigerator?

  A brief look-up of these items on the internet doesn't confirm it:

  [The History of Stoves - Ovens](http://inventors.about.com/library/inventors/blstoves.htm "http://inventors.about.com/library/inventors/blstoves.htm")

  [Light bulb](http://inventors.about.com/library/inventors/bledison.htm "http://inventors.about.com/library/inventors/bledison.htm")

  [Tungsten Filament and incandescent lamps](http://inventors.about.com/library/inventors/bllangmuir.htm "http://inventors.about.com/library/inventors/bllangmuir.htm")

  [Inventors: Lightbulbs, Lighting and Lamps](http://inventors.about.com/library/inventors/bllight.htm "http://inventors.about.com/library/inventors/bllight.htm")

  [Invention Facts and Myths: Invention of the Refrigerator](http://www.ideafinder.com/history/inventions/story057.htm "http://www.ideafinder.com/history/inventions/story057.htm")

  [The History of the Refrigerator - and Freezer (this one mentions two "African American" patent holders on designs (no doubt out of a constellation of other patented designs): these men did not invent the refrigerator)](http://inventors.about.com/library/inventors/blrefrigerator.htm "http://inventors.about.com/library/inventors/blrefrigerator.htm")

  [History of Tires](http://inventors.about.com/library/inventors/bltires.htm "http://inventors.about.com/library/inventors/bltires.htm")

  I think what we see here are a lot of distortions, and a wish to see the past in a certain way.
