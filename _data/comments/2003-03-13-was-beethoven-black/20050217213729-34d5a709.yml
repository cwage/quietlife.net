name: Johan
body: |-
  > Sieg Heil!!

  That won't do you any good, so stop it.

  > The guy who stated that "Black people don't have straight hair!?!?"

  That is correct. Black people don't have straight hair.

  > Look, showing me a reconstruction of Rameses wouldn't describe his skin colour , now would it Jo?

  Why don't you ask the [scientists](http://dsc.discovery.com/convergence/rameses/faces/faces.html "http://dsc.discovery.com/convergence/rameses/faces/faces.html") who made the re-construction?

  [(click here)](http://www.geocities.com/TheTropics/2815/ramses.html "http://www.geocities.com/TheTropics/2815/ramses.html").

  ... unless learning is not your goal.

  > Muslims don't depict images of themselves. It is "Haram"(prohibited) draw or paint images of the human body.
  >
  >
  > Hmmm... I wonder who drew those pics??

  That is incorrect.

  There are plenty of examples of [old Islamic miniatures](http://www.ee.bilkent.edu.tr/~history/uzbek.html "http://www.ee.bilkent.edu.tr/~history/uzbek.html").

  [Click here](http://www.shunya.net/Text/Islam/PrideHaroon.htm "http://www.shunya.net/Text/Islam/PrideHaroon.htm")
  [...here](http://www.historyforkids.org/learn/islam/clothing/ "http://www.historyforkids.org/learn/islam/clothing/")

  [...here...](http://www.sfusd.k12.ca.us/schwww/sch618/Music/courtmusic1.gif "http://www.sfusd.k12.ca.us/schwww/sch618/Music/courtmusic1.gif")

  [Or here](http://www.sfusd.k12.ca.us/schwww/sch618/Music/courtmusic2.gif "http://www.sfusd.k12.ca.us/schwww/sch618/Music/courtmusic2.gif")

  ["Pandj Gandj", Amir Khosroe Dehlavi, Tabriz School, 16th Century](http://www.art-arena.com/Image/tbrz.jpg "http://www.art-arena.com/Image/tbrz.jpg")

  > Salaam ar barakhat

  Phony Arabic won't do you any good, either.
