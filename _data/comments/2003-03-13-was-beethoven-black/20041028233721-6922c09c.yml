name: dab
body: Yeah, RIGHT!!! As was reported, Goethe, a great writer who is said to be of
  Negro ancestry says, "the scetch from life by Letronne and engraved by Hofel, done
  in charcoal showed Beethoven dark" Can his biographers be wrong causing a lot of
  controversy here? They describe him as "Blackish-brown or Blackamoor"
date: '2004-10-28T23:37:21Z'
slug: 2003-03-13-was-beethoven-black
