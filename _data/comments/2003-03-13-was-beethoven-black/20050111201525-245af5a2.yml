name: nabb
body: "Well done Moor! Although I think everyone made good points, the statements\
  \ made by Moor and the quotations he provided are solid. I\x92ve also studied world\
  \ history and I can vouch for many of the quotations Moor provided in his statements\
  \ because I\x92ve read them in text books and publications. I thought the thoughts\
  \ of Bono from U2 were amazing. Some of the statements made by others people in\
  \ this discussion don\x92t give any relevant contributions. I agree that the pictures\
  \ provided by others don\x92t come from the time periods discussed. I would also\
  \ like to say that none of the photographs, from anyone, looks like he is Black\
  \ or White. It could go in any direction in my view. We should look to what people\
  \ said about Beethoven when they described him. I also want to say that I think\
  \ you guys need to let new people tell their views instead of ganging on people.\
  \ That\x92s childish. And many of you are taking things personally. If you don\x92\
  t agree that\x92s fine. Everyone has the rights to their own views. It\x92s like\
  \ the Bible. Don\x92t go on and on about how you don\x92t like this and don\x92\
  t like that. Don\x92t you guys have anything better to do? But before I go, I want\
  \ say that from the Philippines and I don\x92t think that just because a statement\
  \ is made that supports Black history, that it should look at as wrong. Afrocentric\
  \ thought is beautiful and is not an ugly word as one of you try to make it seem.\
  \ I thigh Johan is a racist! It is because of Afrocentricity that many of the civil\
  \ rights we enjoy today exist. Most of history has always been presented with a\
  \ White spin. And people are sick an tired of how white people don\x92t show the\
  \ true history of things. We always see a white person even though white people\
  \ have a very short history. How can this make sense. Most of the world is non-white\
  \ so I hope the white brainwashing will end some day. All we want is the truth.\
  \ To truth."
date: '2005-01-11T20:15:25Z'
