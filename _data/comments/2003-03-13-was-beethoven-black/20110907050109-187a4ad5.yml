name: Ameel
body: There is considerable DNA study of Herr Beethoven and his heritage is decidedly
  Dutch. His lineage is well known. Why is it imperative to say no White or non Black
  person could be talented without having Black heritage? As far as those inventions
  claimed above, you might want to fact check those.  You probably think George Washington
  Carver invented peanut butter as well.  ( He didn't)
