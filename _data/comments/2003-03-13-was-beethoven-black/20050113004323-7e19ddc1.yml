name: Johan
body: "> Well done Moor! Although I think everyone made good points, the statements\
  \ made by Moor and the quotations he provided are solid.\n\nThat's why he needs\
  \ to generate his own applause, eh?\n\n> I\x92ve also studied world history and\
  \ I can vouch for many of the quotations Moor provided in his statements because\
  \ I\x92ve read them in text books and publications.\n\nI've also read about UFO's\
  \ and the Bermuda triangle in publications. There are people who vouch for them,\
  \ too.\n\n> I thought the thoughts of Bono from U2 were amazing. Some of the statements\
  \ made by others people in this discussion don\x92t give any relevant contributions.\n\
  \nI agree about people in this discussion not making relevant contributions (for\
  \ example, yourself - Once again, you can't stick to the subject of Beethoven).\n\
  \n> I agree that the pictures provided by others don\x92t come from the time periods\
  \ discussed. I would also like to say that none of the photographs, from anyone,\
  \ looks like he is Black or White.\n\nWhich pictures? How did you draw your conclusions?\
  \ Not clear.\n\n> It could go in any direction in my view. We should look to what\
  \ people said about Beethoven when they described him. I also want to say that I\
  \ think you guys need to let new people tell their views instead of ganging on people.\n\
  >\n>  That\x92s childish. And many of you are taking things personally. If you don\x92\
  t agree that\x92s fine. Everyone has the rights to their own views.\n\nAfrocentrism\
  \ is a mass movement. The people disagreeing with it are individuals.\n\n> It\x92\
  s like the Bible. Don\x92t go on and on about how you don\x92t like this and don\x92\
  t like that.\n\nYes, Afrocentrism is like a religion. Hence its intolerance for\
  \ non-believers.\n\n> Don\x92t you guys have anything better to do? But before I\
  \ go, I want say that from the Philippines and I don\x92t think that just because\
  \ a statement is made that supports Black history, that it should look at as wrong.\
  \ Afrocentric thought is beautiful and is not an ugly word as one of you try to\
  \ make it seem.\n\nDon't you have anything better to do than defending rubbish?\n\
  The idea that Beethoven was black is not beautiful; it is ridiculous.\n\n> I thigh\
  \ Johan is a racist!\n\nYou can stop that; it won't work.\n\n> It is because of\
  \ Afrocentricity that many of the civil rights we enjoy today exist. Most of history\
  \ has always been presented with a White spin.\n\nNobody owes anything to lies and\
  \ false beliefs.\n\nIf anything they have always been enemies of progress.\n\nIt\
  \ is because of Western civilization that we enjoy the benefits of science and the\
  \ scientific method.\n\nFor my part, I acknowledge these benefits, and the effectiveness\
  \ of the scientific method for discovering the truth.\n\n> And people are sick an\
  \ tired of how white people don\x92t show the true history of things. We always\
  \ see a white person even though white people have a very short history. How can\
  \ this make sense. Most of the world is non-white so I hope the white brainwashing\
  \ will end some day. All we want is the truth. To truth.\n\nHey, no one is here\
  \ to entertain you.\n\nHistory, Archeology and Science professionals shouldn't have\
  \ to answer to insults and accusations from ignorant rabble. It is up to you to\
  \ learn to learn to respect the accumulated knowledge that is supposed to be passed\
  \ on to your generation."
