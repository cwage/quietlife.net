body: |-
  By the way, [here](http://www.csudh.edu/oliver/beetport/fig2.jpg "http://www.csudh.edu/oliver/beetport/fig2.jpg") is what the relevant portrait of Beethoven looked like *before* those little alterations...

  ...and here is the [altered version](http://www.geocities.com/dabjazz/page7.html "http://www.geocities.com/dabjazz/page7.html"), with a most interesting comment:"Beethoven's portrait has been systematically changing, making him to appear European in features. "

  (cough).
