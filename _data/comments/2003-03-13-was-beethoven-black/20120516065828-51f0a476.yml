name: Moonlight
body: Does it really matter if Beethoven was white, black, moor??? Most people nowadays
  are a mixture of something other than whatever race they identify with. i am white
  but i have a native american grandmother and a creole great grandmother. my birth
  certificate says white... does having a creole greatgrandmother make me black? Would
  it change who i am if she had been white? Would it effect my abilities? I am the
  way God intended for me to be, so are you and so was Beethoven. The color of someone's
  skin should never be used to define them or their abilities. Beethoven was an absolute
  genious. His creativity, his music and his legacy will not change regardless of
  his bloodline.  Beethoven's music is much more likely to have been the product of
  his passionate soul and tormented life than of his DNA. His music is a gift to the
  world. Race just isnt a factor. Whatever the color of your skin, you are a member
  of the human race. The world will never be a better place until everyone gets that.
date: '2012-05-16T06:58:28Z'
slug: 2003-03-13-was-beethoven-black
