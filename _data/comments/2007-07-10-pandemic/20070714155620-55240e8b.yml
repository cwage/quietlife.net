body: There's a lot of handwringing about Memphis' downtown PANdemic, too. Which,
  I guess, is an improvement over all the problems downtown had just a few years ago.
  There are a couple of good posts about downtowners growing thicker skin [here](http://fearlessvk.blogspot.com/search?q=panhandling
  "http://fearlessvk.blogspot.com/search?q=panhandling"), if you're interested.
