name: Cyndie Todd
body: Dip and dredge is just what buttermilk is made for, we say.  In this post above,
  we didn't mention the pickle juice for brining because we didn't have enough for
  a whole chicken.  We have another post in the can about making chicken tenders and
  that is when we brine with pickle juice for sure.  Then we dip and dredge using
  buttermilk.  Mr. Bibb says the buttermilk helps the coating to adhere to the chicken.
   Also using a little cornstarch in the flour helps, too.
