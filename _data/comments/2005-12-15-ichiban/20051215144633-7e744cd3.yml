name: John Hutcheson
body: |-
  Have you tried Samurai Sushi? The atmosphere at Ichiban is definitely much nicer and I do enjoy their sushi, but I am still addicted to the sushi masterwords of Mr. Choo at Samurai. I have to say that the hole-in-the-wall atmosphere of Samurai lacks the warmth of Ichiban.

  I hope Mark Rose comments on your site, just so he has to type 'chrisrules'.
date: '2005-12-15T14:46:33Z'
