name: Jon
body: I haven't read the book but did see the Kubrick film, and I think it's probably
  more what you're looking for. James Mason did an excellent job of making the character
  sometimes-sympathetic-but-usually-just-off-putting (to the point where one almost
  has to consciously resist turning one's distaste for Humbert into a distaste for
  Mason).
date: '2010-02-15T19:28:07Z'
slug: 2010-02-15-morricone-and-lolita
