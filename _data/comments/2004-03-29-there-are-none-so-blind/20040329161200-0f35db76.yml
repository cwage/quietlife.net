name: cwage
body: |-
  > *Of note is that the primary point of my post was that the homeless advocacy consistently overestimates the number of homeless. And, looking closely at your numbers, my contention appears to be supported.*

  And you'll note that my rebuttal is that the methodology used to estimate homeless population yielding these numbers is questionable at best.

  > *Lastly, just because someone disagrees with you doesn't necessarily make a person "despicable and pathetic."*

  Nor is it what I said. I said "accusing people that try to do something about it of acting on an "urge to rule" is despicable and pathetic.", which I believe is true.
date: '2004-03-29T16:12:00Z'
slug: 2004-03-29-there-are-none-so-blind
