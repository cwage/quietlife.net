name: Interested-Participant
body: |-
  Thanks for the link. Regarding your post, you're obviously very passionate about the subject.

  Of note is that the primary point of my post was that the homeless advocacy consistently overestimates the number of homeless. And, looking closely at your numbers, my contention appears to be supported.

  Lastly, just because someone disagrees with you doesn't necessarily make a person "despicable and pathetic."
