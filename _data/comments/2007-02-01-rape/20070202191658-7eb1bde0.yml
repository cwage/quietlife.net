name: Rachel
body: Chris, I appreciate your response, and I also don't know enough about the case.
  However, if an adult did the same to another adult, but for purposes of control
  and domination rather frustrated sexual desire, wouldn't we still call it rape?
  I think we would, and do. You're right, though, that harm to another area of the
  body (such as the abdomen) would be called assault, not rape. So why do we even
  have the word rape? Somehow I think there's something different about assault vs
  rape, although I can't articulate it properly.
