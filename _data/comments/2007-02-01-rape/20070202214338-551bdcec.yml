name: Aunt B.
body: Well, I think because as much as we all talk like rape is not about sex or desire,
  that it's about violence, clearly, that's not true. I mean, I get the rhetorical
  strategy in claiming that rape is a violent act, not a sexual act, but there's a
  reason the rapist chooses to focus on those body parts--it's both an act of violence
  and a sex act; a fucked-up sex act, but a sex act nevertheless.
date: '2007-02-02T21:43:38Z'
slug: 2007-02-01-rape
