name: jscheel
body: Agreed. Now that we know the whole story, this man was not acting responsibly
  in any shape, form, or fashion. Discharging a weapon at a fleeing attacker is bad
  enough, but doing it so recklessly, jeez. Way to give us all a black eye.
date: '2009-04-21T22:19:43Z'
slug: 2009-04-21-reckless-endangerment
