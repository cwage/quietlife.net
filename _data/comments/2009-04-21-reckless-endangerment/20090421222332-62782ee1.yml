name: Christy
body: Absolutely. I was thinking about it yesterday and how it wasn't a situation
  where he was carrying illegally, so stricter permit laws probably wouldn't have
  helped. The process he went through to obtain the permit was probably completely
  legit. But the second he fired it into a busy street, there should've been repercussions--the
  very least of which should be losing the permit.
date: '2009-04-21T22:23:32Z'
slug: 2009-04-21-reckless-endangerment
