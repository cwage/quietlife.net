name: Lesley
body: I'm so with you on this. I'd heard about this initially right after I signed
  up in December. The first two weeks were blazing fast, but then I got tagged and
  it takes 4-5 days for them to "receive" my movies now. But I'll stay with them because
  of the selection, which is why I signed up originally. And I don't remember reading
  any disclaimers in my agreement...I really need to do a better job with the fine
  print; it's been biting me in the ass lately.
date: '2006-02-14T15:53:47Z'
slug: 2006-02-13-netflix-throttling
