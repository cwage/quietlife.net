name: cwage
body: 'Well, the last time I looked at Blockbuster''s selection I wasn''t impressed.
  It seemed like they mostly had new releases and less obscure stuff.. We have used
  Netflix mostly for two things: TV shows we want to see (Lost, Battlestar Galactica,
  etc..) and older random movies that you tend not to find on blockbuster (or anywhere
  else). For the latter, Greencine might suffice just as well, but I''ve got a queue
  200+ movies long on netflix as it is..'
date: '2006-02-14T04:59:25Z'
slug: 2006-02-13-netflix-throttling
