name: Greg Rundels
body: I just cancled my netflix account. I was being throttled and didn't know it
  until I read an article in a magazine. For the last two months the new releases
  I received were 0. Everything says long wait, very long wait. What really did it
  though was Ryans Daughter, an old movie just being released on DVD last week. At
  first it said available now, but by the time we sent back in one of the "old movies"
  we had rented, it was LONG WAIT! I hope Netflix goes belly up for their deceptive
  practices.
date: '2006-03-12T20:12:07Z'
slug: 2006-02-13-netflix-throttling
