name: Kate O'Neill
body: For what it's worth, they've been doing this since at least 2000, which is when
  I used to work there. I was a customer before I worked there, and still am, but
  I never really objected to the practice. I did, however, object to the terms used
  on the inside for heavy renters ("pigs") and light renters ("birds"). Never really
  thought of myself as a pig, but, well, oink.
date: '2006-04-04T23:46:52Z'
slug: 2006-02-13-netflix-throttling
