name: Glenn
body: Wow. I was talking to someone a month or two ago that swore that Netflix was
  doing that to her on purpose. Not seeing the same thing (I'm their ideal customer,
  sadly), I wasn't experiencing the same troubles, and basically didn't believe her.
  I'd forward this to her if I had her e-mail address.
date: '2006-02-14T01:51:38Z'
slug: 2006-02-13-netflix-throttling
