name: Jon
body: 'Good post. I''m of the opinion that the intellectual property fight may turn
  out to be the biggest, ugliest, and most important war of ideas in our lifetime,
  precisely because of issues like this (or the really big one, human DNA); DRM and
  the entertainment industry issues are just the trial skirmishes. Here''s a site
  I''ve come across recently that so far seems to be a good resource: [http://www.publicknowledge.org/](http://www.publicknowledge.org/
  "http://www.publicknowledge.org/"), right now they seem to be focused on the entertainment
  tech issues but I suspect they will find their scope widening.'
date: '2006-01-08T13:50:00Z'
slug: 2006-01-08-gmo-and-gurt
