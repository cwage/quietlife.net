name: smantix
body: |-
  You people just don't think very much. If you think that having promotions of protests outside of Planned Parenthood is a great idea. I want you to think for a minute - if that's not too much of a stretch.

  Protesters outside of a KFC. Does that make you want to eat there? Protesters outside of a Doctor's office. Does that make you want to seek treatment there? Protests outside of an abortion clinic. Does that...well, I already know the answer to that one.

  In about three weeks, a judge who is against Roe v. Wade is going to get put on the court that can overturn it. The time for raising money is over. You lost.
date: '2005-09-18T02:49:53Z'
slug: 2005-09-16-picket-planned-parenthood
