name: GKMN
body: Yes GKMN charges $5 or $4 if you have a canned good donation for Second Harvest
  Food Bank and $1 if you are under 12. Putting on this event without a high profile
  sponsor like The Scene is very expensive and the ticket price is how we provide
  a fun and easy going event in a neighborhood that was sorely lacking in movies.
  Please join us and PizzaBuds food truck Wild Cow veg restaurant and Jackalope Brewing
  Company this Sunday for Butch Cassidy and the Sundance Kid, as well as Officer Reily
  a short film by local filmmaker and student Henry Reed.
date: '2012-06-01T16:21:53Z'
slug: 2012-05-30-movies-in-the-park-move-a-translation
