name: Roger Abramson
body: Understand where you're going but want to make it clear that I really don't
  "object" (in the plain sense anyway) to people talking about it. I'm just pointing
  out that talking about it makes it more and more likely that more Amercians will
  hear the president say something along the lines of something many of them agree
  with. In other words, people keep talkign about it like it's a political loser,
  but it's actually not.
date: '2006-07-18T13:05:33Z'
slug: 2006-07-17-shit
