name: Glenn
body: |-
  I've been wondering about this lately. He's been doing quite a few things in the public eye lately. I heard a speech he gave on something a few weeks ago that was so impassioned and against the stereotype, I was almost surprised to find out it was him.

  I wonder what they'll try for VP. Edwards? Hillary? Should be interesting to see.
