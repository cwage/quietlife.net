name: Glenn
body: |-
  *Why is everybody hatin' on Al Gor?*

  Because we were told to by Karl Rove. And we know he's trustworthy. I remember back in the 2000 election, I was asking people this same question, and they couldn't come up with a good answer.

  Here's a few issues:
  *Gore is wooden and uninteresting.* Have you heard him speak lately? I've heard some pretty damn impassioned words from him.

  *He claims he invented the Internet. He's a liar.* Unless someone can find a clip of him saying this, I don't believe it. From what I understand his actual comment was more like I helped the Internet get funding, which was heavily spun so that now it's generally believe that he actually claimed this.

  *He's stuck up, an ivory tower intellectual* Speaking for myself, if intellect is an issue, I'd vote for the smarter candidate. I'd rather have a president that looks down on me because I don't fully understand global warming than a president who looks down on my because I still believe in evolution.

  Of course, the problem there is that I am speaking for myself, and most Americans may not get the chance to have their Gore myths debunked; as a consequence, Gore might not get the chance he deserves.
