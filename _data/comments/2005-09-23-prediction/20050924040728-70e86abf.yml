body: |-
  Gore/Edwards.

  Roll it over in your head.

  Kerry is out for obvious reasons -- the man is a sore spot regardless of what you think of him. Hillary is out.

  Gore has reinvigorated himself and his base. He's this giant symbol of the chance to roll back and pretend the last fucking 8 years didn't happen.
