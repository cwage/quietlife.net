name: Kathy T.
body: Ooooooooh. Not to be seen as lecturing or anything, but I agree that it wouldn't
  hurt to pick up a credit card and pay it off every month (without incurring interest).
  However, if you ever decide to buy a house, some lenders will accept alternate credit
  - like cell phone bills, rent, electric payments, etc. But seriously, just one card
  is not a bad idea.
