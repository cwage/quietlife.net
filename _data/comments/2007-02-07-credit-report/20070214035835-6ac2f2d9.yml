name: Ariah Fine
body: |-
  stay off the grid! Really that's my two cents. I've used credit cards, done fine with them, and then decided they weren't worth it. Then months later someone steals my identity, pain in the butt.
  If your thinking about buying a house or car some day, do it with cash, then you never need "the grid"
