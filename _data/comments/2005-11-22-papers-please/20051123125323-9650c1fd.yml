name: Bob K
body: |-
  uuuummm . . . Your account leaves out one minor detail. This "complex" she mentions, happens to be a federal facility--a very large 90 building federal complex, actually.

  That the guards and procedures are incompetent, as evidenced by the lack of a "no ride" list, doesn't change the fact that the government has the legal ability to check identification before entry to a federal facility.

  What would be really interesting is what the guards do with illegal immigrants who lack identification. If the ACLU really wants to get a popular case going, they'll hightlight the government's incompetence by pointing out that illegals are being admitted, even as they haul Davis off in handcuffs.
