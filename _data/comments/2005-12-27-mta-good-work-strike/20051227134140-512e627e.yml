name: Xibo
body: It might work for the bus drivers, but the subway entrances are all gated...
  everything is so automatic down there that people don't need the workers in the
  booth anymore. Thus, the MTA would like to reduce the number of people working in
  booths, which is a sore point for the union. Of course, for every employee in the
  TWU, there's ten more who would love to have that job with its great pay and benefits...
  but the TWU is not satisfied and wants more. Ah, the power of unions! If the MTA
  had a choice, they'd hire someone else, but that just isn't allowed.
date: '2005-12-27T13:41:40Z'
slug: 2005-12-27-mta-good-work-strike
