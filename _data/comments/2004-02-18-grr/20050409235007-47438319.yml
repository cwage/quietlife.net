name: Johan
body: |-
  Marc:

  The discussion was about [Beethoven's race](http://chris.quietlife.net/2003/03/13/was-beethoven-black "http://chris.quietlife.net/2003/03/13/was-beethoven-black").

  **It was not about the KKK or Hitler**.

  But the Afrocentrists kept trying to control the discussion with their racist views.

  They didn't seem to care that there was a European historian present, who could have answered questions about Beethoven.

  When they didn't succeed in manipulating the discussion, they tried intimidation and accusation.

  That didn't work either (it backfired. Apparently, they are used to people in America just giving in to them, over such behavior).

  So they apparently emailed Chris... who got out of trouble with their Excellencies by closing the discussion, and then comparing Inga and myself to "Neo-Nazis" (which perhaps doesn't deserve comment).

  It is interesting, how politics won't work, without fear.

  Science, of course, has no use for it.

  *"Nothing is to be feared, only to be understood".*

  --Marie Currie

  *"All fear is bad"*

  --Bertrand Russel
