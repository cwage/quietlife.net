name: Johan
body: |-
  What Chris did was fine.

  There were Europeans present in the discussion. One of them was a historian.

  Notice the conduct of the Americans - especially the Afrocentrists - in the discussion. They aren't even prepared to ask a single question, but were lecturing Europeans about European history.

  ...and freely accusing people of being Nazis, etc. - as if that is normal.

  Not to mention the lies about black people having naturally straight hair, etc.

  Chris maligned people for mentioning the existance of race - after starting a discussion about Beethoven's race.

  ...and looked the other way, when the Afrocentrists did the same.

  The Afrocentrists were accountable to no one (with Chris' blessings) - but everyone was supposed to be accountable to them.

  Europeans who saw the discussion, learned something.

  I think that was fine.
