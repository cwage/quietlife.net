name: Erik
body: Chris, why did you close the debate?? I'll agree that there were some extreme
  views, but I would have liked to answer some of the questions that f.ex. Inga asked
  me. A debate without any controversy makes no sense, political correcness suffocates
  free speech. Anyone interested in contact may write to erikgj@sol.dk
