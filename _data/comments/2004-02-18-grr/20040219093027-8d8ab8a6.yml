name: cwage
body: |-
  > *My guess is that the Kerry campaign probably has nothing to do with this and its just someone doing it on their own.*

  While I have no doubt that John Kerry himself and his campaign organizers didn't get together to spam me, it's obvious that **someone** involved with the site did.

  I understand that it's very likely some retard intern on the campaign that thought it was a good idea, but [johnkerry.com](http://johnkerry.com "johnkerry.com") should still be held responsible so that they find him, and make him stop.

  It's not like it's some spammer maliciously spamming me with their site. Spammers are a dirty bunch, but even they are not so big on advertising other people's sites, in my experience.
