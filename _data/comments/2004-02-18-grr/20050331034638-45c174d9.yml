name: Johan
body: |-
  > I’d recommend that Johan go and read the wikipedia entry on Race again, since he clearly has no idea what it is (hint: a social construct).

  Chris:

  Wikipedia acknowledges that there is disagreement about the definition of race, and does not pretend to have the whole truth.

  It is also editable.

  ...which means it cannot be used as some sort of canonical reference.

  Of course, there is no such thing as holy canon in science - else people wouldn't need updated textbooks, reflecting new studies such as [this (click here)](http://www.world-science.net/exclusives/050128_racefrm.htm "http://www.world-science.net/exclusives/050128_racefrm.htm").
