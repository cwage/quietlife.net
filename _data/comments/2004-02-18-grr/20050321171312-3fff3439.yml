name: Inga
body: |-
  Well Chris you have not answered. Very very rude and ignorant indeed. I guess you think you are the chief, closing the door on free speech. I guess this was an American experience. Once again, the European view of America is correct.

  I have been staying in Canada for a few months, and I must say that it is the most wonderful country in the world. Now I must return to Germany, and continue my good life. I want to add that there is far more freedom of speech in Germany than America.

  Have a good life! Maybe what you called me should apply to yourself, what do you think?

  From a Jew (thanks for calling me a Neo-Nazi Shithead - obiviously you don't know the meaning of Nazi
