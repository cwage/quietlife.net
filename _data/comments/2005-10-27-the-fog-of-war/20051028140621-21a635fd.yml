name: Sarcastro
body: I can watch this documentary over and over again. Watching McNamara talk about
  his role in all these deaths is the most fascinating thing imaginable. The power
  of the film comes from his contradictory stance of being aware of his role, but
  at the same time denying full responsibility. Great stuff. I bought the DVD.
date: '2005-10-28T14:06:21Z'
slug: 2005-10-27-the-fog-of-war
