name: Erik
body: I totally agree with you that CNN is being glib with phrases like "10,000 people
  opted to remain", but your imagination has failed you here. There always are people
  who could evacuate, but choose not to. (Some are quoted in this [AP article](http://www.msnbc.msn.com/id/9107488/
  "http://www.msnbc.msn.com/id/9107488/"), along with some who are trapped, and a
  complete obliviousness to the likely overwhelming size of the latter group.)
date: '2005-08-29T07:54:00Z'
slug: 2005-08-28-options
