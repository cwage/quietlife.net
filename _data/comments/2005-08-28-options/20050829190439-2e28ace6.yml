name: Glenn
body: They interviewed a couple of the people who actually decided to stay on NPR
  this morning. One guy said he was staying so he could watch over his house, and
  another proudly declared that he had the tools to break through the roof if necessary.
  I'm guessing if you need tools to break through your roof, it's already too late
  for you.
date: '2005-08-29T19:04:39Z'
