body: |-
  I'm sure you've seen this, but:

  > Homeland Security Secretary Michael Chertoff, under questioning, attributed the problems to "real physical constraints . . . impassable roads. . . . It's not a question of not having enough assistance.
  >
  > "The critical thing was to get people out of there before the disaster," he said on NBC's "Today" program. "Some people chose not to obey that order. [That was a mistake on their part.](http://www.washingtonpost.com/wp-dyn/content/article/2005/09/01/AR2005090100533_3.html "http://www.washingtonpost.com/wp-dyn/content/article/2005/09/01/AR2005090100533_3.html")"
