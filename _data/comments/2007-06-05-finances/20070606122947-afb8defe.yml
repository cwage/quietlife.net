name: Lesley
body: You forgot a year? Interesting, considering a lot of women get stuck on 27 and
  not even intentionally. Few people ask me how old I am any more (because it's really
  starting to show, I think), but when they did, I often forgot and really had to
  think about it. That started happening around birthday 28.
