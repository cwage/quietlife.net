name: Ariel
body: And that there is why in addition to my public-facing blog, I have a private,
  friends-only Live Journal. I used to mock LJ and its emo teens and their custom
  reader filters. Then I realized how nice it was to be able to write about all the
  good stuff that can't go on the blog -- sex, drugs, work, bitchery, etc.
date: '2007-07-24T02:22:45Z'
slug: 2007-07-23-audience
