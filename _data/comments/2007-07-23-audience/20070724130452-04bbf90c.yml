name: Lesley
body: I've been "blogging" over at LiveJournal for nearly four years now. My audience
  and my posts have changed dramatically during that time. I used to be very open
  about everything except my last name but realized a little too late that it was
  still easy to find me. So now I put "the interesting stuff" behind locked posts.
  Which means that the LJ is probably terribly boring to my blogstalkers. Like you,
  I have people who read it and have ostensibly no interest in my well-being or emotions
  but still want to see what I'm up to. I think it's pretty creepy.
date: '2007-07-24T13:04:52Z'
slug: 2007-07-23-audience
