name: Lindsey
body: Yep, I've been dealing with this kind of situation for two years now, during
  the Longest Breakup Ever. Not only does The Ex read (sometimes while sitting in
  my living room, so, talk about potential awkwardness), but now several people I
  work with do too. So I just feel a little muzzled and, like you said, kind of like
  a spectacle. It drove me to get a private blog, but I'm thinking of going the LJ
  route so I can lock specific posts.
