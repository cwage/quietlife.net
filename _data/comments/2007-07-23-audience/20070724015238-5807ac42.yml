name: Ginger
body: Yeah. My blog topics have ranged from my deepest, darkest funks to my views
  on the death penalty. As I started getting somewhat "interesting" (ha!) and had
  more readers coming around, I became somewhat self-conscious of my "navel gazing"
  posts. Realizing my family, co-workers, and ex was reading my blog...well, it has
  caused me to start a private blog elsewhere. Yet sometimes, I say "screw it" and
  throw a navel gazer for the hell of it (i.e., today)...hee
date: '2007-07-24T01:52:38Z'
