name: Beth Schaad
body: If a plaintiff is successful in an injury case, they get medical expenses, loss
  of income AND pain and suffering i.e. what the jury believes the pain and suffering
  of third degree burns amounts to. The purpose of punitive damages as defined are
  to punish a defendant and deter others from committing similar acts in the future.
date: '2004-07-28T09:21:48Z'
slug: 2004-05-17-punitive-damages
