name: bob
body: Photojournalism is all about codes. That's part of why a photograph can communicate
  so much so fast. Many good photo essays are really just a set of glyphs set into
  context, that tell the story both quickly and with a lot of accessible detail. A
  great photojournalist, having a moment of genius, invents a new glyph which is instantly
  copied by everyone. Most photojournalists are not great, and the great ones are
  not usually having a flash of genius, however.
date: '2009-07-01T23:57:25Z'
slug: 2009-06-27-photojournalism-hoax
