name: Mark Mays
body: |-
  ha
  I'm under constant pressure to eat this substance everytime Psychick cooks a mexican dish, she resorts to all means including trickery. I have since given in under the constant barrage, esp. since we don't have a dog to slip it to under the table. It hasn't killed me, yet it hasn't made me stronger.
date: '2007-05-21T18:27:23Z'
slug: 2007-05-20-no-regrets
