name: Joe P.
body: that's been one of my favorite movies for a long time - simply great performances
  and so well made you can feel the grime and the depression. i sought out the novel
  it was based on some years back, and it's about a thousand times more depressing
  than the movie. hard to believe, but it really is.
date: '2007-09-30T01:31:33Z'
slug: 2007-09-29-midnight-cowboy
