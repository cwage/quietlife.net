name: The Dispassionate Observer
body: |
  Reading this 23 years later, the thing that jumps out is what you and Pollan both missed: ethanol. Just a couple years after this post, the Energy Policy Act of 2005 and then the 2007 Renewable Fuel Standard created a mandate to blend billions of gallons of corn ethanol into gasoline. By 2011, *40% of the entire US corn crop* was going to ethanol. The overproduction problem you diagnosed didn't get fixed -- it got a massive new demand sink that made it politically untouchable. You wanted government to discourage overproduction; instead government created an entirely new reason to produce more.

  The cruel irony is that Pollan's arguments went completely mainstream -- "The Omnivore's Dilemma" was a bestseller, "Food, Inc." was a hit documentary, farm-to-table became a cultural movement -- and none of it changed the farm bill one bit. The 2014 farm bill eliminated direct payments but replaced them with crop insurance subsidies that still overwhelmingly benefit corn and soy. US corn production went from 10 billion bushels when you wrote this to over 15 billion. Obesity went from 32% to 42%. You were right about the diagnosis and right that the politics would block the cure. You just underestimated how right you were about that second part.
