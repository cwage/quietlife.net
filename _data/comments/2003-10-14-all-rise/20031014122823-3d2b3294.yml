name: cwage
body: |-
  Yeah, I agree, What they really mean, of course, by "when children are present" is "when school is in session and we are in the 2-3 hours before and after school hours when kids are boarding buses, walking home, etc".

  This is ambiguous, but less ambiguous around here. I live right down the road from the intersection that was in question, and I know that in addition to the signs they also have cones and crossing guards out during the time in question, as well as overhanging lights that flash when you are supposed to be going 15 mph. So, "I didn't see any children present" is a nice technicality to get off on a ticket, but it's not fooling anyone.
