name: Amber Adams
body: Since you asked for books, I asked my friend Jill the Vegan Nomadic Environmental
  Warrior-Photographer for some recommendations. She highly recommends Kateo's suggestions
  (particularly The Food Revolution, also by John Robbins, and Animal Liberation by
  Singer), as well as Introduction to Animal Rights by Gary Francione and Becoming
  Vegan by Vesanto Melina and Brenda Davis.
date: '2009-09-03T12:47:47Z'
slug: 2009-09-02-dietary-choices-for-my-vegetarian-friends
