name: Christian
body: The wealthiest 5% have conned the majority into despising taxes because they
  can afford to dress up in blue collar clothes and pretend like they represent an
  over taxes middle class. The only place I'm over-taxed in TN is everytime I make
  a purchase. The sales tax needs to be decreased 3% points. The only arguement against
  that will come from the wealthiest 5% of Tennesseans who will have to make up the
  difference with a state income tax. The average Tennessee family pays far more a
  year in sales taxes than they would under a state income tax.
