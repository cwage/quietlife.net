name: Christian
body: If I were a person trying to enter the United States illegally, I'd choose a
  state a little more welcoming than Tennessee. But chances are people who enter other
  countries illegally don't read the internet. Hopefully the message will spread word
  of mouth that people in Nashville illegally will go to prison that way they will
  go to states where they can live long and prosper for their families.
