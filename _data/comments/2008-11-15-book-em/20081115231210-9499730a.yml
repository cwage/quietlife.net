name: Laura Creekmore
body: Here's what I love. The same group who wants to imprison those illegal immigrants
  will shout to the high heavens about the cost of....education. Health care. All
  of the state administration. Will they EVER be upset about how much it costs to
  keep someone incarcerated? Well, I'm waiting for it. This, too, is an expense we
  can reduce. Very simple. Stop putting non-violent people in jail. Oh, sorry. I'm
  about to get started. :)
