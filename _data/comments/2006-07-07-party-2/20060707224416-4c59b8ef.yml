name: Amanda
body: |-
  *Whose hair did that dude gleek into? Grody.*

  I believe he was referring to his mother.

  Several fun things from last night:
  1. Scott told me I look ugly in pictures.

  2. I was so jealous that Aunt B goosed Brittney that I shook my butt in her face until she got me too, but she missed and grabbed like, the small of my back. Apparently B's beer goggles make people taller.

  3. I don't think I talked to Chris all night.

  4. Jamie was cool as always and her belligerent friend cracked me up. He would be my new favorite person if it wasn't for...

  5. Kate O' was probably the most instantly likeable person I've ever met. I am going to try to be more like Kate O' (which I guess means I should probably go back and delete that mother comment).
