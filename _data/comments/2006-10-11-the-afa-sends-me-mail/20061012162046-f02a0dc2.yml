name: t. rev
body: |-
  - *Amnesty for 12,000,000 illegal immigrants.*

  A good idea. Never going to happen; immigrant-hating is easy and fun for all political wings.

  - *A push to make homosexual marriage and polygamy legal in all 50 states.*

  Gay marriage, somewhat (and a good idea, again). Polygamy? Grow up. There's no constituency for it.

  - *Only liberal judges will be appointed. They will create laws to implement the social agenda liberals cannot get passed through the legislative process.*

  Oh for crying out loud. *Judges do not make law*. Aside from that, liberals tend to appoint somewhat liberal judges if they can, subject to the approval process, the pool of candidates, and sudden political swings on the part of the judges themselves. Conservatives do the same thing. You end up with maybe a 5-10% swing, at most, before the other party gets back into power. And that's how it's *supposed* to work.

  - *Liberals will make the killing of the unborn more difficult to stop.*

  I certainly hope so.

  - *Liberals will continue to try to rid our society of Christian influence, including any reference to God in our Pledge and on our currency.*

  Should, and won't. The Christian influences you cite are *blatantly unconstitutional,* not to mention profoundly immoral, and liberals won't touch them with a ten-foot pole.

  - *An increase in taxes to push new social programs.*

  More significantly to prop up old ones, but yes, and this is the only thing on the list that is a real problem.

  - *Passing a new “hate crimes” law making it illegal to refer to homosexuality in a negative manner.*

  There's no law against being a despicable jerk, and there isn't going to be one.
