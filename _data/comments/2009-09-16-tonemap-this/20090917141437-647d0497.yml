name: bob
body: People get carried away with effects. When you're applying it, all you're looking
  for is the output of the effect -- wow, that's awesome! I should do it more! Look,
  MORE AWESOME! -- and they lose sight of the total image. Then they sometimes even
  get positive feedback -- wow! The colors are SO BRIGHT! -- when someone reacts not
  to the image at all, but to the result of the effect. A really good image has enough
  good in it that the viewer can't easily say why it's good. A bad image has 'great
  clouds!' or 'awesome tonemapping!' Well, a good image might as well, I suppose.
date: '2009-09-17T14:14:37Z'
slug: 2009-09-16-tonemap-this
