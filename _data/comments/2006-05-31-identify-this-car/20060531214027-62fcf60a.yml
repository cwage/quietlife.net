name: Lesley
body: |-
  YES, YES, YES!! I think I've got it. I believe it's an Excalibur with a modified hood ornament (though it's very close to their sword ornament). They were produced in the 60s and 70s based on 30s-era Mercedes-Benz SSKs (which would explain the similarities, except the split windshield). It also explains the turn signals, which are just like the ones on my old '73 bug. Did you get a shot of the back of the car?

  Anyhoo, here's a pic of some (European) Excaliburs: [http://www.excaliburautomob...](http://www.excaliburautomobile.com/Images/Programm_Herbst_2003/web04.jpg "http://www.excaliburautomobile.com/Images/Programm_Herbst_2003/web04.jpg")

  The issues being the spare tires (though not all of them have them on both sides) and the different bumper (perhaps this was an Excalibur kit car instead of an original).
