name: Alfred
body: This is a heritage kitcar. I have rebuilt one ( the car war totally destroyed)
  on a chassis Dodge DAKOTA 1988 with a 6 Cyl engine. I live in Germany about 100
  km away from my home I could compare all details with a original 540 K Special roadster
  in the Mercedes Museum. So my car is from outside about 95 % like the original.
