name: Craig
body: Hi, This is easy. Back in the late 1980s and early 1990s there was a car company
  down in Florida called THROUGHBRED MOTORS. They produced this car and if I am correct
  offered a Camaro drive train along with a rear mounted spare tire. Bobs Classic
  Cars can verify this, They sell them all the time.
