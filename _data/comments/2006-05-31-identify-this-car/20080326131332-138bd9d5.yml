name: Gareth Williams-Wynn
body: |-
  Hi Mike

  Just came across your comment. Roger katula is correct in his identification of the Heritage. The company went through a few buy outs and I happened to purchase 2 kits from them in 1992 just before they went into recievership. They were then based in Miami Florida and called The Heritage car corporation. As usual the parts I ordered were not complete and put on back order (so never arrived) and eventually lost about $2000 on the deal. I did however finish both cars and still have mine today and enjoy it very much. You can read a write up from someone else here [http://www.nckcc.com/april2...](http://www.nckcc.com/april2006news.pdf "http://www.nckcc.com/april2006news.pdf"). Your only chance will to find a kit that someone else has given up on. They are not that difficult to build and I did both in under 800hrs.
  Good luck
