name: Chip
body: One of my favorite movies ever. John Candy was born to play Del Griffith--like
  in life, there are so many funny, happy, and sad moments that are often intertwined. 
  John Hughes wrote a very moving piece about the human condition especially around
  the busy holiday season--and to be a true friend is one of the highest virtues in
  life.  To quote a line from "It's a Wonderful Life"---"Dear George, remember no
  man is a failure who has friends."  RIP John Candy & John Hughes--this movie has
  stood the test of time.
date: '2011-11-24T04:47:37Z'
