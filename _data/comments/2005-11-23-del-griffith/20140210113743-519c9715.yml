name: Andre Harb
body: I have seen this movie numereous times and It is by far my favorite choice.
  I actually know someone in real life whose character resembles that of Del Griffith's.
  No one could've played that role better than John Candy. Thank you a million times
  John Candy and Hughes for this. You will always be remembered.
date: '2014-02-10T11:37:43Z'
slug: 2005-11-23-del-griffith
