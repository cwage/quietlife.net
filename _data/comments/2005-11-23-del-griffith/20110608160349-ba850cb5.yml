name: Alextoast
body: i totally agree with everything you wrote :) my fav film and my fav character
  from anything! i think he pretty much sums up everything i like about the human
  race - hes friendly, warm, kind, funny, eccentric, caring, selfless but most of
  all just the principle that he has NOTHING but his love for his wife and an all-round passion
  for life and making friends. Even though he makes so many mistakes and messes everything
  up, neil needed him to realize what he had (the family, money, kids to come home
  to) and also what he didnt have (the warm, optimistic and comedic outlook on life
  that del has)...i think the main message of the story is in dels smile at the end
  - be thankful for what you have and just be happy for others who have more than
  you). I think the film has sentimental value attached with me as it seems only i
  and my family have seen it!! - a seriously underrated and beautiful film :)
