name: S
body: |-
  My husband has high eosinophils (1035). He is due for his 6 month checkup with a hemotologist/oncologist so I've spent the last 4 days searching the interned to try and learn something about it. Eosinophils are 1 of 5 types of white blood cells which are produced by the body to fight off allergies and parasitic infections. There are other diseases, however, that show a highter than normal eosinophilic counts. The ones I came across are hay fever, eczema, laukemia, autoimune diseases, asthma, acute hypereosinophilic syndrome, eosinophilic enteropathy and hodkins disease. Most of these diseases will exibit other symptoms as well. Most of my research has been done on websites posted by pharmaceutical companies and research facilities, i.e. [merck.com](http://merck.com "merck.com").

  Kim, as for your mom taking Gleevac, I remember reading a report that indicated that the eosinophilic cells became immune to the Gleevac medication. I'm sorry I don't have much more information. My husband has not been put on any medication as of yet so I didn't pay much attention to the info. Something else to research, I suppose.
