name: Carole Thomas
body: My 91 yr. old mother has just had bloodwork done and her Eosinophils are 3050
  out of a scale of 15-500. This is quite high and worrisome. She's been complaining
  of extreme exhaustion and sleeps quite a bit. Also, confused of late. Any connection?
  What causes the Epsinophils to elevate? Thanks.
