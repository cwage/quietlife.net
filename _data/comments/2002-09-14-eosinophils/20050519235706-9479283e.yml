name: Elizabeth Sabbatini
body: My eosinophil count has been up to very high and down to normal over the past
  eight months but mostly very high (20 to 23, obviously a different scale to that
  others are using). I was pretty ill with a pleural effusion when it first came to
  light and now have allergic symptoms - coughing, breathlessness and lack of energy.
  I have been tested for just about everything that causes a high count; the next
  step is an allergist for evaluation. Any suggestions?
date: '2005-05-19T23:57:06Z'
