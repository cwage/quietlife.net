name: Mjreynosa
body: My grandson is 11 years old. He has eosinophilic esphaghitis. His eosinophils
  are at 15000 plus level. What, if anything has anyone done to reduce the eosinophils?
  On the web sites they are fairly vague as to help. Except see a doctor. Which we
  have done and they leave much to question, and have little time. The little guy
  doesn't complain, we think it's because he thinks he will have to take some other
  medication.
date: '2011-04-19T14:20:37Z'
