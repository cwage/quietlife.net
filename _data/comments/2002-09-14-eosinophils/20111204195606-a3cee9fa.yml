name: Cmstrader
body: My eosinophils just came back at 555 and the probable reason is I was just confirmed
  as having had Africian Tick Fever a month ago. If anyone travels to South Africia
  be warned that Tick Fever is one of the most common problems besides Malaria that
  folks bring back. Be aware of any unusual itch and seek help quickly.
