name: missy
body: My absolute eosinophils have risen steadily in the last three months. 3 weeks
  ago the level was at 896. I have had joint pain for months now which a neurologist,
  rheumatologist and primary care physician have no explanation for. Every day it
  gets worse and my eosinophils in the meantime are rising. Can't any doctor correlate
  these syptoms and results. I have been told it is not rheumatoid in nature.
date: '2005-03-26T23:43:06Z'
slug: 2002-09-14-eosinophils
