name: Matthew Freeman
body: |-
  I don't think you have to guess how much I like this post.

  But Chris, be careful, you’re starting to sound like a hero in an Ayn Rand novel, beginning to glimpse some deeper truth that exposes unchallenged fallacies.

  This is what happens when you don’t shop at Urban Outfitters. Every progressive, enlightened person knows that the aimless stare of a third-world hut dweller or a slackjawed homeless man holds a mystical virtue that we should behold and serve.

  Of course, that’s something materialistic, greedy Westerners could never understand—wasting their lives in the empty pursuits of developing the airlines, vaccines, cameras, and computers that make those sacred pictures possible. ;)
