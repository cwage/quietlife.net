name: tgirsch
body: I didn't know you had family in Milwaukee. I grew up there, and was even at
  the last game ever there in 2000. Oddly, I don't remember the troughs, though. I
  think those may have been later replaced with real urinals. They still have 'em
  like that at Wriggley, though.
