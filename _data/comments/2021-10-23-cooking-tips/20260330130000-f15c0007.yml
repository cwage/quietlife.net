name: The Dispassionate Observer
body: |
  "Don't put tomatoes in chili. It's called chili for god's sake." And then three bullets later: "Put beans in chili. I am not taking questions at this time." The Texas purist position you're channeling rejects both. CASI competition rules, ICS rules, the 1977 Texas legislature -- no beans, no tomatoes. You're invoking the tradition to ban tomatoes and breaking it for beans in the same breath, and the "not taking questions" bit tells me you know it.

  Also, the butter searing thing -- you *do* know the science, you just talked yourself out of it. You wrote "maybe there's just enough lactose in butter that it helps? Lactose is a sugar, maillard reaction requires sugar. I dunno." That's literally the answer. Butter's milk solids contain lactose and casein, both of which are Maillard reactants. You're adding sugar and protein directly to the meat surface. You figured it out and then called yourself stupid. More confidence warranted.
