name: Lindsey
body: I don't know if you've got anything living around your place (plantwise, not
  necessarily petwise), but if not, I'd get something growing quick. I went over to
  a dude's house and saw that the only green thing anywhere (including in the yard)
  was a plastic ficus tree in the living room, and it instantly creeped me out a little.
date: '2007-06-25T22:23:53Z'
slug: 2007-06-24-bachelordom
