name: Steve L.
body: |-
  I had the same problem with by neighboor in DC. He was a middle aged recluse who would blast Cher and Rod Stewart at all hours of the night. (and I mean all hours, especially the small early ones) One night, after the gazillionith playing of "I believe in life after love" I stomped over there and in a civil (I thought) manner asked him to turn it down. and from then on it never happend again. not a peep. it was great! so with your bass loving neighboor my advice is give it a try. trust me, they will feel like the ass in that situation not you.

  though i'm not sure which is worse bass heavy mexican rap or Cher?
