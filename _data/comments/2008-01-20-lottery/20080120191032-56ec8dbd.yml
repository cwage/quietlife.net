name: R. Francis Smith
body: |-
  Agreed. I'm still slapping my forehead over the big push that finally got a lottery passed (by the public, so nice job, fellow voters, geez) came from the Democrat governor. Of course, our Democrats aren't known for their bleeding hearts, I suppose, but c'mon.

  One great thing about the issue is that my (far) more conservative Christian brethren are with me on this one, albeit not for entirely the same reasons.
