name: Tom
body: It's worth the effort to slog through it for the same reason it's worth knowing
  the Bible, Koran etc. There are powerful people who play at living according to
  her precepts. It's a bit like Dianetics to those who see it as a life-changing read.
  If you're going to make the effort, also read The Fountainhead, a companion piece
  of sorts and actually a better (not to say good) novel.
date: '2012-05-31T02:47:22Z'
slug: 2012-05-31-cwage-shrugged
