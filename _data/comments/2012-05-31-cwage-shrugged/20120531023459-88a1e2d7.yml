name: RachelW
body: Ugh. This is a book that's almost impossible to enjoy if you're not a teenager,
  or at least still stuck in the teenage attitude of, "It's not fair! Everything would
  be so awesome if I could just do what I want at all times! Other people suck! Poor
  me!"
date: '2012-05-31T02:34:59Z'
slug: 2012-05-31-cwage-shrugged
