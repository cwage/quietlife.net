name: Andrew Duthie
body: You're not just making up that quote, are you? Because it actually sounds so
  bad as to be made up. I'm reminded there's a site that makes fun of the terrible
  writing (and copyediting) of the Twilight series. Perhaps some bored Internet person
  has already made a similar site for Rand?
