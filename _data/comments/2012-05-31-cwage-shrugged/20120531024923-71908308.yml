name: cwage
body: That's actually why I agreed to read it. I've always thought it's important
  to read certain seminal works to understand how certain people think -- Marx and
  Socialists, the bible and Christians, etc. But when I read Marx and the bible, I
  find lots of worthwhile stuff that has otherwise been twisted, misinterpreted, or
  repurposed.. I enjoyed it and got a lot out of it. This, though.. eesh.
