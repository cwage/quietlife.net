name: Mack
body: Chris, this is maddening. Tommorow night my little girl is giving her speech
  at the county 4H speech contest. It's on immigration, and I need to be there, so
  much so, that I am also going to miss the crucial 3rd meeting on the English only
  bill. Please keep me posted on what happens, I can still offer tools and a truck,
  and of course, time. Thanks.
date: '2006-12-04T22:34:30Z'
slug: 2006-12-04-mad-housers-reminder
