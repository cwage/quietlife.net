name: Les Jones
body: |-
  I've bought a few growlers from area breweries, though they didn't call them that.

  Before that, I bought gallons of beer from Queer Joe at the Matador in Maryville. Cost a decade ago was like $4.00 a gallon. If you brought your own milk jug it was 50 cents cheaper. Just the thing when you were heading to the mountains for the day.
date: '2005-12-24T00:56:56Z'
slug: 2005-12-21-growler
