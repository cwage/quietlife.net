name: Aaron
body: with nothing exciting to add, I concur that the place is fabulous. Went there
  right before I left the country, having never been to an Ethiopian restaurant before,
  and it was fantastic. Just go slow with the injera (sp?), it fills you up. and the
  spicy things are soooo good.
date: '2005-10-08T02:08:03Z'
slug: 2005-10-01-horn-of-africa
