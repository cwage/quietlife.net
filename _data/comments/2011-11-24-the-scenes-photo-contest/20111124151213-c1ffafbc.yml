name: Andri Alexandrou
body: Thanks a lot, Chris! I too have mixed feelings about that photo, actually. It's
  challenging to submit photos in response to a "Nashville" prompt and to guess what
  a magazine committee is going to choose from your submissions. Can't say I'm disappointed
  though :)
