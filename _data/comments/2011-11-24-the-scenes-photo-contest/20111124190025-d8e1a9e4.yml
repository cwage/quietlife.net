name: Andrew Molitor
body: The "West Nashville" photo is essentially an abstract, and as such it's pretty
  hard to get right. It wouldn't work without the powerlines for instance, or if the
  texture in the foreground were much more or less visible than it is now. These are
  a lot easier to paint than shoot, I think. Not really my cup of tea, but it's a
  good and successful example of the form.
date: '2011-11-24T19:00:25Z'
