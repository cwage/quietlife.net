name: Mr. Roboto
body: |-
  Please know that any large scale meetup must be approved and sponsored by the experts of such things, Thursday Night Fever.

  In all seriousness, if you guys want to do a larger thing (i.e. 20-30+ people), I'd be willing to organize it. Chris, it's your idea, so you make the call: little lunch or big to do. Maybe we could talk about this at the small lunch.
