name: cwage
body: |-
  Word. I've got e-mail addresses for everyone, I think, so I'll wait over the weekend to see if anyone else wants in and I'll send out an e-mail so we can coordinate.

  I vote that we just go somewhere quick easy and casual for lunch.. I'll leave the happy-hour shindig coordination to Roboto.. (I second the motion for flying saucer for this -- as long as there's no bullshit writer's night)

  Kevin, I'm definitely thinking more on the quizno's side of the scale.. Screw the Palm, what I really wish is that there was a \*las palmas\* downtown, i.e. cheap but still awesome.. Los Reyes is okay but it's not the same..

  Brittney, you can come as long as you promise to give us dirt on WKRN.. like uhm.. ahh.. okay, I could care less about local news. But, you can come anyway!
date: '2005-06-11T18:22:19Z'
