name: Mr. Roboto
body: I'm game for a newschannel2-less meetup. I work on 2nd, so lunch would be easy
  any day (and NashvilleFiles Blake is downtown all the time for lunch. I also think
  people are ready for an "informal" afterwork meetup, but they don't trust me to
  leave the news cameras at home. The Flying Saucer's patio has been very available
  lately.
date: '2005-06-11T14:53:42Z'
slug: 2005-06-10-nashville-blogger-meetup
