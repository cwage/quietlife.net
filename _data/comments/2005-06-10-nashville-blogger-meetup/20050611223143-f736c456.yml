name: cwage
body: |-
  I vote for small to start with. Big is complicated -- I'll leave that stuff to you..

  I just wanted to grab a salad with a few people and shoot the shit.. I'm no event-planner

  Naturally I want to meet everyone, but when it turns into a 30-person gathering, you don't really talk to anyone for any extended period of time..

  I think talking about that at a smaller lunch is a good idea.. Let's do that first before we bring in the entire blogosphere.. I'll send out an e-mail to this effect..
date: '2005-06-11T22:31:43Z'
slug: 2005-06-10-nashville-blogger-meetup
