name: cwage
body: |-
  Nah, no toe-stepping.. feel free -- my only concern would be it going from a casual lunch into a Big Thing with lots of people, which makes it hard to coordinate and figure out where that many people can go..

  On the other hand, I don't know that we'd even have that many Nashville bloggers that would show up..

  But I say go ahead and mention it.. after all the no-shows and people that don't care it will probably be a manageable bunch anyway.
