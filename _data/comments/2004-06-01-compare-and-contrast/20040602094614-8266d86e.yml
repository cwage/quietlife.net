name: Doug Orleans
body: I think one can separate the arguments "should there be a minimum wage" and
  "should the minimum wage be raised". I'm still not sure if a minimum wage is a good
  idea, but given that we have one, I think it ought to be raised to keep up with
  inflation and the poverty level. Failing to raise it (as a "compromise" between
  raising it and abolishing it) would seem to defeat the purpose and cloud the evidence
  for whether it works or not.
date: '2004-06-02T09:46:14Z'
slug: 2004-06-01-compare-and-contrast
