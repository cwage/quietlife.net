name: cwage
body: My first job when I was 15-16 was working as a busboy at the stockyard .. my
  dad was playing in the band in the bullpen downstairs at the time, so I had the
  in. That job was incredible -- I was banking $5.50/hr and taking home between $50
  and $100 in tipout at the end of the night.
