name: Dave Wage
body: I would like to add a little science to the "Southern Snow" discussion. In the
  spring and fall we (Wisconsinites) regularly get the kind of snow that you are talking
  about . Up here we call it “Greasy Snow” as in “Wow she’s really greasy out der
  ay?” It occurs at warmer temperatures that create a snow slush mix. From a scientific
  standpoint the colder snow gets the stickier it gets and thus easier to drive on.
  My advice to you is don’t panic, just be thankful that you will only have to deal
  with it for a few days while we will have to deal with it “greasy” or “sticky” for
  months.
date: '2010-12-17T15:38:50Z'
slug: 2010-12-12-on-snow-and-driving
