name: U.S. Food Policy
body: Cool discussion. On reflection, I think Doug is right that "great portion of
  calories than any other food" could be misused. In this case, it means that the
  soda-plus-sweet-drinks category provides more calories than any other category,
  but falls far short of 50 percent. By combining categories differently, you might
  get a different leading category. For example, if you treated all meats and fish
  as one category and broke soda and sweet drinks into separate categories, would
  you find that meats and fish are the leading category? The reason for concern about
  soda and sweet drinks is not just that they are the leading category. As Amanda
  mentioned, there is a feeling that the liquid calories may not be regulated properly
  by the body and may present a special concern for obesity risk.
date: '2005-06-23T15:57:26Z'
