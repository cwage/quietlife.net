name: Erik
body: I'm with Doug. No doubt there's some actually scary statistic in the survey,
  but "greater proportion than any other food" is reminiscent of the ["moral values"
  hoax](http://www.cbsnews.com/stories/2004/11/05/opinion/meyer/main653931.shtml "http://www.cbsnews.com/stories/2004/11/05/opinion/meyer/main653931.shtml").
