name: Doug Orleans
body: That statistic ("greater proportion of daily calories than any other food")
  seems misleading. Does it mean that people get more calories from drinking than
  eating? Or just that there is no single food that people get more calories from
  than soda? People generally eat different things in each meal in a day (or even
  in a week), but have much less variety in what they drink (maybe 2 or 3 different
  drinks a day, and the same every day).
