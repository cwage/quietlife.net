name: Trejkaz
body: |-
  Yeah, GAIM's not a bad client. The only reason I don't use it as my personal client is I have a distaste for the default look of Gtk+. I presume it's more customisable than it lets on, just that the default look of Qt I get with Psi is above and beyond the default look of Gtk+ I get with GAIM.

  Then again I'm not after it for its AIM support, since AIM and MSN appear to be fairly stable via transports anyway. At least that's what my bot says. :-)
