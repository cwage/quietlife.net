name: newscoma
body: |-
  I'm liberal and am Anti-Bush as well, Southern Beale. But I really despise the words Rethuglican or Dimmocrat.
  It just doesn't seem to me that it moves anyone forward. With that said, I had a come to a Jesus/Buddha moment about eight months ago realizing that a dialogue does not start with an insult and that I was part of the problem.
  Just sharing. But I do agree with Mack that Egalia does cater to her readers and believes this is what they want.
  I just don't dig it.
date: '2007-08-04T14:36:10Z'
slug: 2007-08-03-in-which-i-turn-on-my-own
