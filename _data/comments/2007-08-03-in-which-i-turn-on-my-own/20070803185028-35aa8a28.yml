name: Southern Beale
body: |-
  "Her audience is vehemently anti-Bush, and there is no shortage of those people. She is merely catering to her market."

  Bullshit. I'm her market and I don't agree with her.

  I'm as vehemently anti-Bush as Egalia, as is what one might laughingly call my "audience" (if four readers qualifies). I happen to think blaming Bush for a bridge collapse is as stupid as the right-wing extremists who blame it on liberals, gays, blacks, Asians, etc. And I posted that on my blog today.

  It's time to get over this idea that there's some kind of liberal group-think. There's not.
date: '2007-08-03T18:50:28Z'
slug: 2007-08-03-in-which-i-turn-on-my-own
