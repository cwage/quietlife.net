name: Kara Gee
body: If you've followed briley in council over the years, you'll know you can count
  on him to be the one person reading the fine print of contracts and legislation,
  getting to know the players in the deal, and questioning the realities of the impact
  on taxpayer pockets not just this year but on down the road. I've found him to be
  the most conscientious of all the candidates in that regard - he didn't oppose the
  Sounds deal because he doesn't like baseball, he just didn't think the Sounds had
  been a good business partner with Metro. Just because you are budget-conscious doesn't
  mean you stop dead in your tracks and don't make the investments you need for the
  future. If you did that with your house, you'd be in sorry shape in ten years. David
  will be that kind of mayor - that is the reason he has my vote - and frankly, if
  you're concerned about your taxes being shepherded wisely, he should have yours
  as well.
date: '2007-07-13T15:27:46Z'
slug: 2007-07-10-the-mayor
