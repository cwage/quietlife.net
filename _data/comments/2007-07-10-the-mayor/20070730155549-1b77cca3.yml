name: Kristine
body: The new Davidson County Democratic Party's website has a Voters' Guide to the
  upcoming Metro Elections. The Guide contains biographies and responses to our Issues
  Survey. The candidates' responses are unedited except for formatting for consistency.
  All of the mayoral candidates submitted responses to our requests and many of the
  Metro Council candidates as well. The page is found at [http://www.davidsondemocrat...](http://www.davidsondemocrats.com/elections.html
  "http://www.davidsondemocrats.com/elections.html")
