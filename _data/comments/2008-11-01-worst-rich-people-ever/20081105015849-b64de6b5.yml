name: Andrew Duthie
body: |-
  Devil's Advocate: Maybe they got suckered into buying an apartment at the top of the market, as an investment, and they can't sell it for a profit yet and don't want to deal with renting it out.

  Or, maybe they just wanted somewhere to be close to the games. Does it come with parking? :-)
