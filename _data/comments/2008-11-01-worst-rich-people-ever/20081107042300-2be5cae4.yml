name: Kieran
body: |-
  nah.. despite the current downturn, real estate is still an investment. Now if they bought one of those conversion vans tricked out with all the Titans logos and schwag just for the game weekends.. that would be a different story.
  5-10 years from now-- so long as they don't get strapped for cash and have to try to sell the thing this year-- or if they leave it behind as part of their estate, that apartment will likely turn out to have been a reasonably good investment.
