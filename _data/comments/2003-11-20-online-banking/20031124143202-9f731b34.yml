name: cwage
body: |-
  I actually was with WIngspan (which was Bank One's online venture like netbank) for several years.

  I liked it, but eventually the advantages melted away as their trial period disappeared and they merged back into Bank One. Oh well.

  I'd be willing to give it a shot in a few years, maybe, when the banking system in general has caught up with technology. Until then, it's nice to have a brick & mortar place to go to when necessary.
