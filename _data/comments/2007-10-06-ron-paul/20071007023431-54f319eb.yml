name: Jake
body: 'Paul has said he would consider truly open borders but only once the welfare
  state has been dismantled. There is some internal consistency here, more than it
  may appear. Libertarianism promotes the free flow of ideas, goods, and people but
  only in a context where states don''t exist. When is libertarian immigration policies
  and also states it creates something akin to an arbitrage opportunity in trading...
  a chance to gain profit without any risk. This, of course, is why so many people
  come to the US: not merely for our freedom but for our free health care, education,
  and welfare. Whether you find that a good thing or not, Paul maintains that the
  two issues of welfare and immigration are simply incompatible policies. I suspect
  he would have much less concern about immigration if there was no welfare state
  for immigrants.'
date: '2007-10-07T02:34:31Z'
