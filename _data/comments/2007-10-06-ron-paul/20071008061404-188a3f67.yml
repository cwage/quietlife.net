name: t. rev
body: 'A more nuanced version of the argument: suppose that immigration came at zero
  cost (aside from the costs of physically moving to the US) and citizenship was instantaneously
  granted on request. Suppose at the same time there was a robust welfare/guaranteed
  minimum wage/citizen''s dividend-type system in place. In a situation like that,
  or something close to it, one might well expect massive immigration and expect that
  immigration to be largely detrimental to the country.'
