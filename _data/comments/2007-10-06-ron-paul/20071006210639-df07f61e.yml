name: Chris
body: There are "open" borders and there are open borders. I'm glad that he doesn't
  take the completely anarchist point of view on the matter. I think he used to, but
  perhaps since he was able to watch firsthand how those floodgates harmed the economy
  in some ways he changed his stance on the matter a bit over the years. I don't think
  he'd go so far as to erect a fence. I don't think he'd need to. His policies would
  remove a lot of the incentive to come unlawfully in the first place. One thing I've
  avoided telling other RP fans is that those NAU highways are getting built whether
  RP gets elected or not. What may be more important is just what groups are making
  the policy when it all goes down. That's where RP comes in because he's corralled
  the opposition to those roads and he'll be able to convey to them why it is best
  to let happen. A lot of RP fans like him for his abolition of the FR stance and
  his views on hard money. Look at where the dollar is at. Do you really think it
  is going to make a comeback? I don't. RP fans may be cheering on the Amero and not
  even know it. Which, hey, if the Amero is backed right and used right, maybe it'd
  be better anyway.
