name: BobP
body: It's not about winning an election. Ron Paul has already ran for the Presidency.
  He "only" mustered 2% of the votes but he would have received a whole lot more if
  he didn't have to contend with the two major socialist parties which each effectively
  promising to be the "lesser of two evils." RP can muster up votes; he essentially
  has no problems getting reelected to the House but that's not the point. He has
  exposed the Fed for the evil menaces they've become and continues to grill the Fed
  chairmen for their deceitful tactics of manipulating the economic data to suit their
  agenda. Or rather the agenda of the politicians who have the power to unseat the
  chairman. RP will probably not win the primaries but I'll bet some of his positions
  will be brought up at the Republican National Convention. If that's successful,
  so will be Ron Paul. Go get em, RP.
date: '2007-10-07T17:28:06Z'
slug: 2007-10-06-ron-paul
