name: Kelly
body: |-
  That's a great story about the lady and the planner. I have to agree with you on the just being a human about it part. I have met more non-homeless people who are offensive and threatening than I have homeless people. People are just people.

  The other day, I was walking downtown Nashville and a guy came up to me and asked if I could give him three hundred bucks. It cracked me up that he thought that I looked like someone who would be able to even come up with three hundred bucks.
