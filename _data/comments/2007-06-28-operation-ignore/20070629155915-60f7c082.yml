body: |-
  i know it's not the most comfortable thing to do, but i think that acknowledging and treating the person as a human being and creation of God, whether i have a couple of bucks to give them or not, keeps me from getting accosted.

  well, that, and my "going out" tshirt that says, "i'll eat your children."
