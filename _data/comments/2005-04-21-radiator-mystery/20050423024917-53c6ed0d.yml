body: |-
  Nope.. In fact, an interesting aside to the most [recent update](http://chris.quietlife.net/2005/04/22/radiator-mystery-solved/ "http://chris.quietlife.net/2005/04/22/radiator-mystery-solved/") I've made is that after all that hullabaloo, I don't think the sensor in question was ever hooked up. When I put the new radiator with the same sensor (removed from the old radiator and screwed into the new), there was nothing to hook it up to.

  I think it is actually a sensor for the non-existent automatic transmission fluid. I think (hope).
