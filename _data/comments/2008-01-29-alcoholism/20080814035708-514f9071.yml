body: |-
  Alcoholism is a chronic, often progressive disease in which a person continues to crave alcohol and drink despite repeated alcohol-related problems.Approximately 18 million people in the United States abuse alcohol. Teen drinking is on the rise with over 4 million adolescents between the ages of 14 and 17 having trouble at school, at home, or even with the law because of alcohol use. This disease contributes to more than 50 percent of car and industrial fatalities, drownings, and child or domestic abuse.
  ------------------------------
  Sujith

