name: Derek
body: I really agree with your view on alcoholism. I have been dealing with it with
  a close family member for about the last seven years. It is psychological and addicts
  can not "just quit." I get so frustrated when people do not understrand this disease
  and what it makes people do, but I was ignorant on this subject myself until I started
  dealing with it with this family member. I am glad to see it when someone does understand.
  Great blog and website! Thanks Derek in Ripley, TN derekbrandon1977@yahoo.com
date: '2008-06-09T14:18:24Z'
slug: 2008-01-29-alcoholism
