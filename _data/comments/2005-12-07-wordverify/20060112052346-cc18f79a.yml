name: cwage
body: Okay, this problem should be resolved. The new version of WordVerify (1.3) checks
  for versions of Wordpress older than 2.0 and uses a different method to delete the
  comment.. I can't say for sure if this will work with versions older than 1.5.x
  because I am not sure how things were done back then, but it should at least work
  for 1.5.x as well as 2.x
date: '2006-01-12T05:23:46Z'
slug: 2005-12-07-wordverify
