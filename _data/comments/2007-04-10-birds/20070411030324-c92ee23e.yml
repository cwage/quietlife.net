name: Kate O'
body: From what I've read, doves often have really low or poorly-constructed nests,
  and those nests are often destroyed by various forces and elements. It's a wonder
  they survive, but they clearly do. So you weren't so much being an asshole as very
  realistic -- this family just beat the odds, apparently! Cool shots, by the way.
date: '2007-04-11T03:03:24Z'
