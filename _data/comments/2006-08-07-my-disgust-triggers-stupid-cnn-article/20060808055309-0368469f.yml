name: R. Francis Smith
body: Yeah, that's perfect. The vastly more obvious supposition -- and it too would
  still be only that -- would be that teens who're having sex are as a consequence
  likely to put some "sexy music" on their iPods (at least, more than those who are
  not.) But because it is stunningly reasonable to suppose that, it ain't news.
date: '2006-08-08T05:53:09Z'
slug: 2006-08-07-my-disgust-triggers-stupid-cnn-article
