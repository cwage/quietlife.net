name: Mr. Roboto
body: The life cycle of a “hot, trendy, cool” club is always the same. It starts out
  as a secret among the true trend-setters, and it slowly filters down to the wannabes,
  to the frat dudes, and, ultimately, to the rednecky thug-types. It’s inevitable
  as the seasons’ changing.
date: '2005-08-23T21:52:19Z'
