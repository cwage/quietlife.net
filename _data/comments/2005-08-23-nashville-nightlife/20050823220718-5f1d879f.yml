name: Sarcastro
body: Keeping a cool bar a secret is no easy task. Every bar I've ever worked at or
  hung out in has gone through the lifecycle you describe. The key is to go elsewhere
  until the dipshit ratio is negligible. Usually this happens after the next "cool"
  place opens and all the locusts flock there.
date: '2005-08-23T22:07:18Z'
slug: 2005-08-23-nashville-nightlife
