name: dkw
body: |-
  I'd recommend [The Unvarnished New Testament](http://www.phanes.com/unvnew.html "http://www.phanes.com/unvnew.html"), translated by Andy Gaus, fascinating because he tries to preserve the simple and common tone of the original Greek. Take a look at the comparison [here (under "Clarity")](http://kevin.davnet.org/articles/kjvbible.html "http://kevin.davnet.org/articles/kjvbible.html") between the King James version and Gaus.
  I know of no Old Testament translation in a similar spirit, but if one exists I'd sure like to hear about it.
