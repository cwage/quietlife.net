name: Tobin
body: Having read bits and pieces of the King James, it actually is not that bad.
  I dunno if I could read all in one go. But it is a nice and well written example
  of the writing style at the time it was made. Fun bit of fiction for bedtime reading.
date: '2006-06-12T17:25:08Z'
slug: 2006-06-11-the-bible
