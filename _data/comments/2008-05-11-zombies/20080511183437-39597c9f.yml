name: Sara
body: Dang! Chris, [MM](http://artrogue.com/ "http://artrogue.com/") and I were at
  Riverfront waiting for the zombies to show up and only saw a half dozen or so. We
  took it as a bust and MM went home. However, on the way back to the car (at 5th
  & Union) I ran into the full walk! We couldn't/didn't get any good pictures though.
  I am jealous!
