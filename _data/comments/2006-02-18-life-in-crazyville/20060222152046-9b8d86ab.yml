name: Les Jones
body: 'I think Steyn''s very much onto something. It isn''t just abortion: it''s the
  postmodern notion that continuing our lineages is *passe*: reproduce, don''t reproduce
  - what''s the diff? A culture that believes that is heading the way of the Shakers.'
date: '2006-02-22T15:20:46Z'
slug: 2006-02-18-life-in-crazyville
