name: t. rev
body: Note that I am not bothering to respond to any of your arguments, such as they
  may be. This is not because I can't refute them thoroughly, it's because you have
  surrendered all claims to be part of the human race; you are a mad beast. One does
  not refute mad beasts, one kills them.
date: '2006-01-17T03:27:27Z'
slug: 2006-01-07-munich
