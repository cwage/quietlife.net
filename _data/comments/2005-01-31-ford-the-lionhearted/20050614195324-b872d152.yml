name: zelda brown
body: |-
  I applaud you for praising Harold at the same rate and with the same
  vigor that you impugned him. I'm also pleased with the fact that you have givven him credit for exhibiting growth. I've felt all along that growth is the main ingredient that he wqas lacking. I also predict that you as well as others will continue to see growth and production from Harold as he progresses in his political career! Please remember this age old adage: 'Young man for his strength, old man for his wisdom'
date: '2005-06-14T19:53:24Z'
slug: 2005-01-31-ford-the-lionhearted
