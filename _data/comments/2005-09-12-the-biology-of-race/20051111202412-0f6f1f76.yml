name: oddmodd
body: Interesting article, the content of which I have in similiar periodicals. I
  agree that some of these findings make credible sense in that one can see the natural
  drifts in ones own family tree. This drift is primarily due to genetic alternation
  which natural occurs in nature whereby within any lineage genetic traits will randomly
  be passed from decendant to decendant essentially creating genetic individuality.
  These difference are obviously transposed to the surface in the form of varying
  physical features amongst people of the geneological origins. Now, according to
  evolutionist, these difference can also occur through enviromental adaptation of
  a long period of time. I, however, don't believe those difference will be significant
  outside of environmental adaptation. Therefore the drifts are not significant enough
  to create what one would deem different ethnicities. One can't compare the studies
  of birds or any other animal to what one thinks would occur amongst humans. Many
  animals have been shown to adapt to there environment in very drastic fashions.
  Humans, have superiour intellect to adapt to there environment without such drastic
  physical mutation.
date: '2005-11-11T20:24:12Z'
