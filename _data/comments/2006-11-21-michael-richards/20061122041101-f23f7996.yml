name: Doug Orleans
body: In his interview on Letterman, people in the audience started sniggering when
  he said "Afro-American". And then Jerry Seinfeld said "don't laugh, this isn't funny".
  I really really wish Larry David had been there to say "actually, yeah, it kinda
  is, a little bit." Instead it was just awful to see Jerry Seinfeld—*Jerry Seinfeld!*—actually
  not want people to laugh.
date: '2006-11-22T04:11:01Z'
