name: Michelle
body: Well in my opinion, I definitely was not moved or convinced by his apology on
  David Letterman. And to be honest, it actually made it worse. I especially knew
  he was not serious when he said the word Afro-American. the bottom line is that
  he knows he screwed up. And he is just doing this in an attempt to get people off
  of his back. Obviously, he must have been in a room filled with majority white people.
  Because I can guarantee anyone that if it were a room full of blacks and he got
  so called heckled like he claimed he did, then those words would have never uttered
  from his lips. He's a washed up actor and comedian who never had much of a career
  until Seinfeld, probably looking for as much publicity as he can get. He's miserable
  and misery loves company. When you are a miserable person, your demeanor, behavior,
  mentality and actions are always going to be negative and unpleasant. I used to
  be a big Seinfeld fan and Kramer was my favorite character. Now everytime I look
  at that show and see him, that situation will always standout in my mind. It really
  was not that serious he could have just let it go. Apology, yeah, right.
date: '2006-12-17T18:53:19Z'
