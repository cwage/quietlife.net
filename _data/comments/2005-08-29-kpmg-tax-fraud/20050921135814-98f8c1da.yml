name: Isn't it IRonic
body: 8 individuals indicted yet, no names.... Billions stolen....and still no names.
  Someone robs a convenient store and their name, sex, age, where they live, how much
  they've stolen,(usually 100 - 300 dollars), how much time they'll serve, and jail
  time revealed. And...Let's not forget......the latter gets far more jail time.
