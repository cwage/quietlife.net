name: cwage
body: |-
  There's surely a price point above a certain extent which could cause unemployment, but experience so far has shown that at least within the range of the floor currently being set, there's some whiggle room due to imperfect competition, and that's where the study of monopsonic (worst word ever) forces may be relevant in explaining why.

  As far as Card/Krueger's data, there was some contention in subsequent attempts to verify their data (obtained by phone survey) with the actual payroll data in the areas they surveyed..

  EPI had a briefing paper on it a while back, I'll try to dig it up..
