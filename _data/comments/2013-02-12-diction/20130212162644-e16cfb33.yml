name: Jason Orendorff
body: |-
  The change from "patriarchs" in the actual press release to "patriarchy" in the critique isn't totally fair. It would be logical if the two words had all the same connotations, but they really don't. Typical uses of "patriarchy" are like, "[...]her mutilation was just one manifestation of the many brutal ways in which patriarchy tries to control women." Typical uses of "patriarch" are like, "Ellis Marsalis: Jazz patriarch and pianist is a New Orleans institution." (I'm not making this up; those are real-world uses from the Corpus of Contemporary American English. [http://corpus.byu.edu/coca/](http://corpus.byu.edu/coca/ "http://corpus.byu.edu/coca/") )

  But there's no getting around the plain fact that "patriarchs" isn't gender-neutral either, by any stretch. That word choice reflects poorly on Southern/Alpha and, unfortunately, on Nashville. It is understandable for anyone who cares about equality to take offense. If I were in their shoes—I'd like to think I wouldn't make that particular mistake, but if I did—I'd change it and make an apology.

  DISCLAIMER REPEATS: I am a feminist. S/A fucked up. I am not defending them or their stupid press release.

  And thanks, Chris, for taking this discussion off Twitter. That wasn't going anywhere good. This is much better.
