name: Xibo
body: The best part? A year after you buy it, it will break, and you'll have to buy
  another one. So don't bother spending much on it. Man, 30-50 years ago, you bought
  a vacuum cleaner, it would stay usable for decades. Parents would hand them down
  to their children. Today? It's a consumable product.
date: '2006-02-27T13:43:56Z'
