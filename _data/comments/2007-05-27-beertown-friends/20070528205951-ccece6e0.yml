name: Lynnster
body: Chris, those are all just fantastic shots. I was going to comment on them on
  Flickr but I'd just be saying "That's fantastic!" on every one. I especially love
  the two you took of John and the one of Kate, and the one of Ginger singing, but
  they are all just fabulous.
