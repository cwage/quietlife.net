name: Doug Orleans
body: |-
  *He loves the idea of the "treasure hunt" - occasional, temporary specials on exotic cheeses, Coach bags, plasma screen televisions, Waterford crystal, French wine and $5,000 necklaces - scattered among staples like toilet paper by the case and institutional-size jars of mayonnaise.*

  That's awesome.
