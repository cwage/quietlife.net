name: Amanda
body: Miyazaki movies.... they're just so fucking fantastically beautiful. There were
  a few scenes in Howl's Moving Castle (at the lake, at the flowered pasture) where
  I was nearly woozy from the spectacle of it all. So even if there were a few minor
  plot issues, the visuals more than made up for it and made this a far above average
  film. I have heard before that Miyazaki never really outlines/storyboards his films
  (or even really writes a script) and just creates the story spontaneously as he
  animates. (for example, you will notice that "grave of the fireflies" which has
  a very straight forward story and was animated concurrently with "totoro" was NOT
  directed by Miyazaki) As such, I was really interested to see if this film ended
  up with a more sensical linear plot...and, well, not really. I guess I will read
  the book to see how much he deviated, but it seems like he just took the general
  idea and then went all 'Miyazaki' with it. Fine by me.
date: '2005-06-21T21:11:59Z'
