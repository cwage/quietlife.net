name: Wernher Von Bombed
body: Thanks for the picture of the Municipal Auditorium - since I heard at ECE that
  Nashville was moving there, I'd been wanting to see how it looked. I used to live
  there and watched hockey at the Auditorium, and always said it was designed for
  roller derby - glad to see I'm being proven right! :)
