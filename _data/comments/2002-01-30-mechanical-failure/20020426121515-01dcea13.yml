name: John
body: 'Interesting. My auxilary coolant pump needs replaced too. Along with my spark
  plug wires in which one is arcing because it seperated from the #5 spark plug. So
  the connector is damamged. And to think this could''ve been going on for a year.
  Because I had the spark plug wires replaced when I bought the car from Carmax. Anyway,
  I plan to install the spark plug wires myself also. It''s a crime to charge somone
  $90 just to replace some wires. Sheesh. (''95 VR6 PAssat)'
