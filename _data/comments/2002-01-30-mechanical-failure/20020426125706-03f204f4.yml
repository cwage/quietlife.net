name: Chris Wage
body: |-
  Well, the only caveat I should mention is that my mileage is still not great.

  It was improved obviously by the coilpack and new wires, but it's still not as high as it was last summer. It improves with warm weather.

  I am suspecting it's the O2 sensor, but I haven't gotten around to replacing it yet..

  --Chris
date: '2002-04-26T12:57:06Z'
slug: 2002-01-30-mechanical-failure
