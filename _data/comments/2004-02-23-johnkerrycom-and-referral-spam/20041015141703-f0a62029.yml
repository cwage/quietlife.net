name: Brent Whitlock
body: I am a Vietnam Veteran. I understand that the Bush Adm. is blocking prescriptions
  from Canada. Well I would like to know why the Veterans Administration is outsourcing
  one of my medicines from Canada, when the Bush Adm, Says that prescriptions aren't
  safe for the American people. But it is okay to give Unsafe Canadian Prescriptions
  to Veterans?
date: '2004-10-15T14:17:03Z'
slug: 2004-02-23-johnkerrycom-and-referral-spam
