name: Fran Campion
body: |-
  Dear Senator Kerry, My Husband & I have supported you since the beginning of Your campaign. We were glued to CNN every minute we were home all through the campaign, and never missed a debate. We are proud that we supported you, and most of all proud of you and the campaign you ran. Please don't give up. We need more caring people like you in this world. You gave us and many people hope and vision for the future. This country is truly Blessed to have you in the senate to fight for us. We will never forget you and what you tried to do for our country. God Bless you and your family. Sincerely,

  Fran & Vince Campion & Family
date: '2004-11-03T15:10:08Z'
