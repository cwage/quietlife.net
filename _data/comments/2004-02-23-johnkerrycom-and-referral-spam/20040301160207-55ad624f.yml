body: |-
  Dear John Kerry,

  I have a question which no one has raised during your campaign. The question is when you will become a President will you be able to help the people who are deported for being illigel imigarant whose conduct and behaviour has been excellent inthis country with no bad record.

  Secondly I have a very dearest friend who is a citizen of United and had been married to a Pakistani who is now deported, she has been trying her best to get her husband back through the lawyer and writing lettersto the immgration office. but nothing has been done from the end of the immgration and from the lawyer and therefore her life is like a single person she married about three years back would you be able to change the laws and help my friend to get her husband back in usa.
