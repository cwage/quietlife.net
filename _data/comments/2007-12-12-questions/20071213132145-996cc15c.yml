name: Aunt B.
body: I do! I do! At the city cemetery, you park in the parking lot (using the term
  very loosely). You find the lot by turning in the entrance there on the corner and
  heading into the heart of the cemetery. In the middle, there's a very tiny (three
  or four spaces) parking lot where you can park and get plastic bags to pick up your
  dog's poop, if you had a dog. I guess you could use them to pick up your own poop,
  too, but I wouldn't recommend using the cemetery for those purposes.
