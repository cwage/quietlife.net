name: oddmodd
body: To Johan, when I speak of a black gene I am speaking of the ability to trace
  the mitochondria whichi only the female possesses to a black origin. This is a substance
  found in the eukaryotic cells which contain the genetic material of that person
  and for the male it's the Y chromosome which only men possess. Both carries genetic
  matierial significant to the lineage of that person by mapping those genetic traits
  to regions around the world. So when I black gene, you idiot) I am speaking of this
  scientific premise. Of course there is no black gene literally but I guess not possessing
  a knowledge base in biological science you would not be familiar with the usage
  of terminology without taking it literally.
