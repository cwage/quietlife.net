name: Matthew Rogers ☠
body: Close enough in deed. I don't know if he felt the same way for me as I did for
  him, but that man changed me. You really captured (for me) what it was like knowing
  and appreciating Karsten (Soul Reaper). Great post... really great, thank you.
date: '2012-06-29T16:32:28Z'
slug: 2012-06-27-a-portrait-of-an-absurd-friend
