name: Kelly
body: What an excellent post. I think you captured his spirit beautifully.  I did
  not know Karsten as well or as long as you, but I felt every conversation with him
  was special and I fondly remember chatting with him in a similar way.
date: '2012-06-27T13:59:42Z'
slug: 2012-06-27-a-portrait-of-an-absurd-friend
