name: Terri O'Neill-Borders
body: Wow.  Well Done, you captured him beautifully.  I am sorry for your loss.  I
  am sorry for all of us because we all lost an amazing spirit that opened up our
  eyes and mind to experience life in a way we never could have without having been
  blessed with him in our lives.  Wishing you peace.
date: '2012-06-27T13:30:12Z'
slug: 2012-06-27-a-portrait-of-an-absurd-friend
