name: Marcus Whitney
body: I think I just started to scratch the surface of getting to know Karsten. Your
  comments about his skill in the art of conversation is what I seem to remember most
  now. That and he was an amazing party participant. His very distinctive laugh was
  a signal that mischievous things were being discussed :)
date: '2012-06-28T04:02:17Z'
slug: 2012-06-27-a-portrait-of-an-absurd-friend
