name: hutchmo
body: Chris - spot on.  I was not nearly as 'close' a friend, but your description
  of his asking questions and actually listening and absorbing your answer is one
  of the things I admired the most about Karsten.  Every conversation I had with him
  was highlighted with engaging questions and a man who listened well.
date: '2012-06-27T18:00:34Z'
slug: 2012-06-27-a-portrait-of-an-absurd-friend
