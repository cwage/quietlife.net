name: Brian D.
body: |-
  This is a very lucid diatribe, and for the most part I agree with you (the current system is broken, the true costs are hidden, etc).
  As a hobby economist, I have to wonder about the bit on denying pre-existing conditions. Insurance companies are in the business of risk. Higher risk ultimately means higher cost, so it makes sense that they would want to reduce risk to make their business viable. Would you give me $50 if I gave you $5? Probably not. The math doesn't add up. What makes healthcare different is the emotional appeal.

  Another thing I wanted to point out is that the cost of the new bill is much less than most conservatives have attempted to paint it. Ezra Klein has a good post on that here:
  [http://voices.washingtonpos...](http://voices.washingtonpost.com/ezra-klein/2010/03/how_big_is_the_bill_really.html?hpid=topnews "http://voices.washingtonpost.com/ezra-klein/2010/03/how_big_is_the_bill_really.html?hpid=topnews")
date: '2010-03-23T14:03:12Z'
slug: 2010-03-22-obamacare-and-socialism-and-the-end-of-the-world-and-stuff
