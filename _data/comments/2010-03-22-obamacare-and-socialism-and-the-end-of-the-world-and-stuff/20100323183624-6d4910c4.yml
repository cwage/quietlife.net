name: wrog
body: |-
  > Insurance markets work great for this sort of thing: car insurance, flood insurance, etc

  Insurance markets only work if the ground rules/regulation is in place so that risk pools can be large and sustainable. In the case of healthcare, insurance companies lobbied to have these rules relaxed/removed so that they could arbitrarily subdivide and cherry-pick, focusing nearly all of their attention on selling cheap insurance to people who don't actually need it. Also, you do realize that health insurance companies are granted an anti-trust exemption; being allowed to collude and fix prices. So even as an insurance market, the insurance market never really functioned as a free market anyway.

  > it removes any incentive for the consumer (the insured) from doing any price-shopping

  when you're bleeding to death on an emergency room floor, you are **not** in a position to do any price shopping. when the prices that are actually listed at hospitals/clinics/etc are completely different (and insane) as compared with the negotiated rates that are actually paid depending on which health plan you're on, there's no way for Joe Random Consumer to be able to evaluate the deal he's getting from a particular hospital. Similarly one is in very little position to evaluate competing health plans because, again, you don't know all of the various arrangements the health-plan people have made with all of the various service providers. Never mind that your health plan administrator is going to be making lots of decisions concerning what will and will not be covered on a case by case basis and you can't possibly know in advance how those are going to work out. It's just one big incestuous mess. And this isn't a function of it being insurance vs. non-insurance. It's a function of
  individual needs being drastically different; if I'm diabetic or missing a kidney or suffering from multiple sclerosis, there is no private free-market scheme that won't involve me paying more for healthcare than the completely healthy person
  hospitals/etc having to treat people regardless of ability to pay, our societal norms not really allowing any alternative; in order to survive as private entities, they have to find ways to charge the shit out of those who **can** pay, except that it has to be those not already protected by the various insurance/health-provider regimes.In short there simply isn't any way out of this box that doesn't involve government regulation
