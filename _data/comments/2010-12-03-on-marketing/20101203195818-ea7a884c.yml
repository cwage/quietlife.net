name: Delaney
body: |-
  I'd like to put a "Like" by items numbers 2 and 3. And I agree with you on the St. Ives rebranding debacle, but it's funny you even bring it up, because I was just reading the tube of my "Revitalizing" St. Ives apricot scrub in the shower this week, and it's got this whole mission statement on it. It said this really nice thing (I can't remember the exact words) that basically adds up to "We know this is just a superficial beauty product, but we believe that lots of little nice moments like having a soft face add up to a generally positive quality of life."

  Also, I am working on a blog in my head right now about marketing, and our responsibilities as consumers. I feel like it's up to me to "Like" all the shit I really like so they know I'm out here and I'm willing to pay for quality. Does that make sense?
date: '2010-12-03T19:58:18Z'
slug: 2010-12-03-on-marketing
