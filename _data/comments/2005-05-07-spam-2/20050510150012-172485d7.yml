name: David Goldenberg
body: Hey Chris -- As a relatively new online mag, Gelf needs someone to get the word
  out about interesting articles we write. In many cases, that falls to me -- but
  I do not (or try not to, at least) send out spam. I try to find a few specific blogs
  or sites that I think might be interested, and I try to send out an informative
  blurb that includes why the particular article might be of interest to the site.
  Most times, this involves sites I have read before (including yours), though I also
  look for sites I am not that familiar with that are covering the particular topic
  we reported on. In this case, I knew you covered cars, and I just wanted to make
  sure you knew where we were coming from. And Jackson, I guess it qualifies as a
  (an unautomated) press release, but I hope you'll think it differs from spam. What
  do you guys think? Is this a legit way of trying to get the word out?
date: '2005-05-10T15:00:12Z'
