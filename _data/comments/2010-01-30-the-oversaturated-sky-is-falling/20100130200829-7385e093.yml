name: bob
body: |-
  Mister Berger seems to be a lousy job of marketing. He DOES do something that is different than mugshots with a PnS, and it probably has value to someone. He's just not finding those people. I bet that his trouble has to do with his rolodex going stale -- or something like that -- than with technological advances, mass market cameras, or the public's deteriorating taste.

  That said, yeah, the kinds of businesses you can wrap around a camera and some sort of skills that you have with it are changing.
date: '2010-01-30T20:08:29Z'
slug: 2010-01-30-the-oversaturated-sky-is-falling
