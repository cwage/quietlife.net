name: Jackson
body: |-
  I bet there are alot of cars that are not 100% original, so are not quite worth as much. Those would do fine for the weekend drive through the countryside.

  I have a 1969 Volvo P1800S. It needs a little work but is in pretty good shape. I used to drive it everyday. It is a lot of fun to drive. Part of the fun of driving a classic car is all the attention it gets.
