body: |-
  Heh. Well, I guess I had an advantage in speed since .. I didn't ask for permission :O

  So if you'll excuse me, I am going to go get sued now.

  I was gong to write something further on this post introspectively analyzing why I have been searching for pictures of Nashville flooded, but I got too depressed and went to bed.

  There's something cathartic to it -- looking at these pictures re-assures me that rebuilding is possible despite the rampant devastation..
