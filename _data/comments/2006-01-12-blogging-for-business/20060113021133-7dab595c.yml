body: Tuesday evening I happened to be listening to a segment of [The Works](http://www.kuow.org/program_theworks.asp?Archive=01-10
  "http://www.kuow.org/program_theworks.asp?Archive=01-10") on KUOW (Seattle NPR station),
  and heard Matthew Baldwin ([defectiveyeti.com](http://www.defectiveyeti.com/ "http://www.defectiveyeti.com/"))
  give nashvilleistalking and Brittney some favorable mention. The context was "can
