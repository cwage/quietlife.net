name: Joe P.
body: |-
  The movie was released in France this year. The clips I've seen are jaw-dropping, no doubt.
  I've also noticed there are Parkour clubs all over TN and most every other state - the B-13 page can link you to all kinds of boards where they're planning events.
  I look forward to seeing the movie!
