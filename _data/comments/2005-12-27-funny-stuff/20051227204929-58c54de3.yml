name: SayUncle
body: |-
  It's almost painful to watch. Bill is criticizing a blog for being a, uhm, blog? So far, his only valid criticism seems to be the copy/paste/link issue. And that is disappointing as I find Brittney smart, engaging, and witty. However, her copy/paste/link tendency exposes me to the stupidity of Egalia more often than I would like and Egalia is neither smart, nor engaging, nor witty.

  And I know that the purpose of NIT seems to be to get bloggers talking and it does do that.
date: '2005-12-27T20:49:29Z'
slug: 2005-12-27-funny-stuff
