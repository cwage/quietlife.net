name: Dewayne
body: Wow, who'd a thought that copy/paste/link was such a biggy. Perhaps there is
  a copyright issue, I for one do not care how my blog is cut and pasted. After all,
  if the blog isn't quoted correctly, a person can just go directly to the source
  and read it in its original context. Anyhow, opinions are like fingerprints, everyone
  has one and they are all different.
date: '2005-12-27T23:20:41Z'
slug: 2005-12-27-funny-stuff
