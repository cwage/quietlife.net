name: Joltin' Django
body: |-
  Taki tells you everything you need to know 'bout Rushdie here: [http://www.amconmag.com/200...](http://www.amconmag.com/2002/2002_11_18/taki4.html "http://www.amconmag.com/2002/2002_11_18/taki4.html").

  A sample: "Rushdie bathed in glory, divorced his wife — who openly called him a coward — and turned himself into a social catch for radical chic overnight. Such are the joys of being a left-wing charlatan who writes unreadable books attacking western culture."
