name: Les Jones
body: |-
  I thought it was pretty good. Very imaginative sets, and I liked the way the Oompa Loompas were all played by one actor. The kids were pretty interesting, too.

  It definitely relied too much on spectacle, and was too self-aware. Living in the Irony Age, it's hard to get straight-up entertainment that isn't making fun of itself.
date: '2005-08-09T14:32:01Z'
slug: 2005-08-05-charlie-and-the-chocolate-factory
