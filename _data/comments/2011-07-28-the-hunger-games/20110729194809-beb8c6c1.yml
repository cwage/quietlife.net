name: Delaney Gray
body: Don't go slagging on Harry Potter. That's literature. And I'm not even joking.
  If you haven't read it, you should. Hunger Games is popcorn reading. So is Twilight
  (and that's even specifically GIRLIE popcorn reading). Harry Potter is neither.
date: '2011-07-29T19:48:09Z'
slug: 2011-07-28-the-hunger-games
