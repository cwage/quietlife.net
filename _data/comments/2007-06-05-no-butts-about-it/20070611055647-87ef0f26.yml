name: Chris Hatfield
body: I smoke. I enjoy it quite a bit. It's a filthy disgusting habit, yes, but so
  is driving an automobile, and arguably not as bad for those around me. But how about
  the college campuses and business that band doing it OUTSIDE? The Nazism has to
  end at some point - one would think that outdoors is a good enough place.
date: '2007-06-11T05:56:47Z'
slug: 2007-06-05-no-butts-about-it
