name: Amanda
body: 'Well, Buchanan is saying something pretty sneaky here, that being: "belief
  in the absolute truth". Belief in absolute truth is essentially non-empirical. Empiricism
  rejects absolute truth. Empiricism is concerned with the "little t" truths; those
  which are temporal and contextual. So basically Buchanan is attributing something
  to adherents of evolution that is just flat out false. Any statement of "belief"
  (here comes that semantic sticky wicket you pointed out earlier) or perhaps less
  confusingly "adherence" within the framework of science always implies "until a
  better explanation comes along". Not accepting ID as an acceptable explanation has
  nothing to do with some sort of faithful belief in evolution, but in the fact it
  isn''t a very good explanation and certainly not better than the system it is trying
  replace.'
date: '2005-12-20T02:14:32Z'
slug: 2005-12-19-science-is-not-religion
