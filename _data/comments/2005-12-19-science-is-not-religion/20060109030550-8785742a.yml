name: Aiya-Oba
body: Hi Newton, as the author of "Adam Was An Ape", I am delighted at your remarks.You
  see, between Religion and Science is the Equator of science and religion hidden
  away at the very origin and common stem of both.It is readily understandable why
  many would find religion and science irreconcilable.Thanks for seeing beyond the
  visible.God is the Equator of All in all.
date: '2006-01-09T03:05:50Z'
slug: 2005-12-19-science-is-not-religion
