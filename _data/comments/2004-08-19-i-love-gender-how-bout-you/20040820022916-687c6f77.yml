name: Erik
body: |-
  The opposite of "agile and easy to park" isn't "slow and hard to park", it's "big and powerful." It's not a question, for the most part, of what qualities are positive; we'd all like a car that is all good things. The question is how we make the trade-offs when the qualities we value are in tension with one another. And there probably are gender tendencies there.

  On the other hand that article is still pretty dumb.
date: '2004-08-20T02:29:16Z'
slug: 2004-08-19-i-love-gender-how-bout-you
