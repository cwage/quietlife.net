name: Chris Wage
body: |-
  Well, I think they were using that as an example of why his logic was flawed, not as validation of it.

  This reminds me that for no real reason I was reading about [Zeno's paradoxes](http://www.mathpages.com/rr/s3-07/3-07.htm "http://www.mathpages.com/rr/s3-07/3-07.htm") today. And it got me thinking that I should really get around to reading Aristotle, and Plato, and all that sort of crap again -- as well as reading up on fallacies and logic in general. Learning is hard.

  Also, I don't recommend reading about paradoxes while hungover. It doesn't work.
date: '2003-08-01T19:52:46Z'
slug: 2003-08-01-sociologists-get-no-love
