name: Erik Ostrom
body: I'm with you on most of this post, but wary of "leave the sociology to the sociologists".
  Scientists can be blinded by their assumptions just like anyone else. It behooves
  us all to try to understand other people's fields instead of simply accepting the
  opinions of experts.
date: '2003-08-01T19:57:03Z'
slug: 2003-08-01-sociologists-get-no-love
