name: TheNuszAbides
body: |-
  "...it's not imaginary."
  or rather, it's just as imaginary as any other artifice of inanimate "worth" ever has been.
  the regurgitated chestnut that the lure of gold is so "timeless" makes me suspicious as all hell. it's like it was programmed into us by the alien overlords because of course they already knew how useful untarnishable ductility [etc.] can be. how else could the first murder over gold have any motivation other than "ooh, shiny!"? (or the subsequent million or so such murders?)
date: '2014-05-18T16:22:37Z'
slug: 2013-04-10-a-few-things-about-the-bitcoin-turbulence
