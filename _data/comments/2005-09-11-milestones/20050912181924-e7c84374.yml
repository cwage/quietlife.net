name: Glenn
body: |-
  Just a few minutes ago, I was thinking about acquiring Erik's books.

  Building the living room wall bookshelves has been a longstanding dream of mine.

  The bedroom, office, and hallways shelves completed, this would be my crowning achievement -- until I fill those up, too.
