name: Ginger
body: |-
  I'm in agreement with you 100% on both the point of how ridiculous it is to be linking drunk driving with illegal immigration issues, as well as your views on 287(g).

  I am curious, though, for a clearer definition of "abuse of immigration status" and "racist/xenophobic practices" (in your opinion), and the type of prosecution you would want to see recommended for both.
