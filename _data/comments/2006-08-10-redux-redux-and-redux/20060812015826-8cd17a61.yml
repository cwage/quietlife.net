name: Joe P.
body: |-
  Is the whole jungle/crazy thing a vestige of European colonial era racism?
  yes, and Imperialism too. i think the book captures the rape and pillaging of land, people, resources, etc by "western civilization" and the moral decay it brings to those who particpate in it.
  and also add a hearty must see to Burden of Dreams. Herzog was in that jungle for 5 or 6 years and the documentary shows his breakdown without flinching.
