name: Joe P.
body: |-
  Watching "Apocalypse Now" and "Fitzcarraldo" in a theatre were incredible experiences, though i did think the longer Redux was not as focused as the original.
  And yeah, Conrad nailed a real truth in the white men going gaga in the jungles and on the people there.
  Your search of other jungle movies is a good one - of course there is the original Lord of the Flies, which is white children going gaga in the jungle, or The Emerald Forest by director John Boorman, based on a true story of a white man's kid kidnapped by South American natives, and an old 1932 movie with Walter Huston as a cruel dictator in Kongo.
date: '2006-08-11T02:42:59Z'
slug: 2006-08-10-redux-redux-and-redux
