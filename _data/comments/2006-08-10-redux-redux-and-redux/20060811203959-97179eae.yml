name: Aram
body: There's a meta-example, the documentary "Mein liebster Feind - Klaus Kinski"
  which you can rent from Netflix as "My Best Fiend, Klaus Kinski. It's a Werner Herzog
  documentary about making films with Kinski, including Aguirre and Fitzcaraldo which
  fall into your genre. Kinski's off-camera insanity makes the on-screen stuff look
  tame by comparision and Herzog's narrative is hillarious. I very highly recommend
  it.
