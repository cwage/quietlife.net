name: cwage
body: |-
  "couple-2-3" .. well, there's no specific number associated with it -- just, you know, a sufficient representation of enough alcohol consumed that you weren't really keeping track. I think maybe it's a midwestern thing. I was abusing the expression, though. Proper usage:

  "We went to da packers game and had a couple 2-3 beers and when I woke up I says oh geez I'm late for work, eh"

  Translation: "I drank a 24 pack of Schlitz and woke up in jail. This is a cry for help."
date: '2005-10-28T16:34:02Z'
