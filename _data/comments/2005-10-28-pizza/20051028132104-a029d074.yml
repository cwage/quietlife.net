name: jag
body: I missed it last night, unfortunately. But if it makes you feel any better,
  I wouldn't know anyone from the Scene if they bit me in the ass. On the other hand,
  if Scotts Walker or Hartnett walked through the door, that'd be a different story.
  I would BEG them to bite me there. We all have our hometown heros.
date: '2005-10-28T13:21:04Z'
slug: 2005-10-28-pizza
