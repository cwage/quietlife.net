name: Liz
body: I too, had a problem with a malfunctioning card slot. It seemed like one of
  the pins that connects to the CF card was bent so the CF card couldn't be pushed
  in all the way. Unfortunately it was about 6 months after my warranty ended, it
  cost about $200 to fix.
date: '2008-08-30T03:32:33Z'
slug: 2008-08-25-dslr-lifetime
