name: mrb
body: This whole Predator thing has become outrageous. What about schools,public safety,neighborhoods?
  THe Mayor and our leadership need to be using their time, which is our tax dollars,
  on items that are for the good of the whole and there is no way that the Predator
  games are going to generate tremendous amounts of private spending for food, entertainment
  and lodging. We don't even have a climate cold enough to freeze local ponds so that
  kids, without resources, can learn to skate in the winter. Send the sport back to
  the colder cities and move on with improving Nashville.
date: '2007-11-15T19:21:38Z'
slug: 2007-11-14-money
