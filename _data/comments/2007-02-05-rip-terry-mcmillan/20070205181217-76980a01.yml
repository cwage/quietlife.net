name: Ginger
body: Yeah, this news threw me into a tailspin yesterday. When he lived here (w/ his
  first wife), I used to watch his kids. We were all really close, but then kind of
  drifted apart. Still, it didn't ease the pain of hearing about this. What an amazing
  talent and personality he was.
date: '2007-02-05T18:12:17Z'
slug: 2007-02-05-rip-terry-mcmillan
