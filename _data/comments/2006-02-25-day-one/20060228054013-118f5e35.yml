name: Marcus Whitney
body: Yeah, caffeine sucks. I've been getting chiropractic adjustments lately (cause
  my spine is such a mess) and I've had so much more energy. But caffeine has me in
  her grips and now I'm drinking 2 - 3 cups of coffee a day for NO good reason. My
  throat always feels acidic and unhealthy when I drink it now. It just sucks.
date: '2006-02-28T05:40:13Z'
