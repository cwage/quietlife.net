name: Jon
body: |-
  Funny. Brittney's departure from NIT (in my mind) signified the death of Nashville's original blogging community. Roboto, on the other hand, signified the death of millions of brain cells. If there is to be a reunion, Roboto is the only option. As I recall, the night I met you, Mr. Wage, I also spent two hours at the bar, talking "shop" with a woman who authored a blog about knitting. At some point I realized she was not going home with me...which was a good thing, 'cause my mom didn't allow overnight female visitors.

  Fortunately, after going home alone that night and puking in the kitchen trashcan, I decided to move out of the basement and do something with the 20 years I had before retirement. I'm happy to say, I now have over $2,000 in my 401K, and am well on my way to financial peace. And I owe it all to Roboto...

  Glad to see you're still at it.
date: '2010-02-18T09:09:32Z'
slug: 2010-02-15-i-was-talking-on-nashvilleistalking
