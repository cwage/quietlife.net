name: sean
body: |-
  I love Roman Holiday. I think I first watched it in its entirety on a lonely solitary Valentine's day and that's what got me hooked. There are these movies I love where the city is as much a character as any person -- The Third Man, Blow Up, Slacker, Wonder Boys -- and Roman Holiday is near the top of that list.

  Alas, I guess Swingers is also on a similar list -- movies which focus on the disgusting culture of one city. It's an ode to vain, self-centered, stupid L. A. and it turned me off to even visiting SoCal. I so completely detest the characters in this movie, that the repellant use of catch phrases barely even registers. Ok, so it more than registers, as one of my best friends loved the movie and couldn't stop saying "You're so money" for THREE FREAKIN' YEARS. I hate this movie. I hate it. HATE HATE HATE HATE. I hate it.

  Chris, I hate it.

  The Haunting is awesome, though!

  --sean
