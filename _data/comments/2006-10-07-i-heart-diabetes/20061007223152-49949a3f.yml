name: R. Francis Smith
body: Nah, it usually takes longer than that to develop type II diabetes; type I is
  caused by an autoimmune disorder, not grotesque injuries inflicted on your insulin
  receptors. So they'll die of diabetes-related complications later in life, after
  getting obese and insulin resistant and all tha good stuff! Good news!
