name: Steven
body: |-
  Add at least 1x if not 2x the amount of fresh spices at the very end (mainly basil and lots of italian parsley) with maybe 5 minutes left. That way it will impart a whole layer of fresh spices that goes well with the marinara. Also, a pinch of light brown sugar or turbinado helps smooth out the acidity of the tomatoes.

  Lastly, probably because I am a dork, I like making a Coulis over straight marinara since its texture makes it a little more versatile. That way you can cook the tomatoes with a rough chop and then you can use an immersion hand blender to smooth it out near the end.
