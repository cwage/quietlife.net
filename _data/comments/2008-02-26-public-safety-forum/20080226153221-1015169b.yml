name: democommie
body: |-
  I don't know your politics, mine are centerfarleft socially.

  When people talk about the homeless it seems that many of them view homelessness as a moral failing on the part of the homeless. In some cases they might be right. But the majority of homeless individuals are either mentally or emotionally impaired. The elephant in the room is that a lot of homeless people ARE crazy--for lack of a more accurate diagnosis. Also, a fairly large percentage of the homeless are military veterans.

  BTW, I'm not centerleft socially because I'm a kind and wonderful humanitarian (with other people's money). My social politics have to do with pragmatism. The notion that government should be administering social programs of the sort that they do in the US and other countries, these days, is of relatively recent vintage (around 1933, in the U.S.). Prior to that most social programs (welfare, etc.,.) were administered by private entities, primarily religious or fraternal groups I think the fact that we don't have workhouses and poorhouses is adequate to illustrate the difference between the two models. That's just my take.
