name: kevin
body: Yeah, I noticed how the members of the URA were so quiet about the matter -
  still, they were taking lots of notes. They are calculating something, they are
  developing some kind of plan, of that I have no doubt. what's so disturbing is that
  they are really making a mountain out of a mole hill. Nashville's homeless population
  is really fairly tame compared to other cities. I do so that the contention is going
  to increase, there are members of both side who would like to see this become more
  of a war. and a lot of people are going to suffer for the indiscretion of a few.
date: '2008-02-26T13:18:10Z'
