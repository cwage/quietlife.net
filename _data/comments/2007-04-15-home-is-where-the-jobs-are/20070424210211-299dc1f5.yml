name: Brad S
body: |-
  Chris, the idea of a "permanent, productive community" is a baby-boomer, 1950's-1960's-era conceit. There was nothing so "permanent" in US history as the Homestead Act, which gave you and me 160 acres of Great Plains, gratis, as long as you made 5 years worth of improvements on it. People started leaving that 160 acres right after they encountered their first harsh Dakota winter, and haven't stopped leaving since.

  I can give you quite a few more historical examples that do not fit the baby boomer template upon request:)
date: '2007-04-24T21:02:11Z'
slug: 2007-04-15-home-is-where-the-jobs-are
