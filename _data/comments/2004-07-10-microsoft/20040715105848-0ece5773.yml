name: Tobin
body: |-
  Hell we still run win98 on the boxes we have at home. Mostly because that is more than enough operating system for the web surfing/basic word/spreadsheet stuff we do.
  I can see no reason to upgrade either box to the latest bells and whistles if I DON'T NEED THEM. Plus they hardware would not deal well with it.
  Debian will be installed when we want to ditch the internal DSL modem for an external one as there are only win9x drivers for the modem.
date: '2004-07-15T10:58:48Z'
slug: 2004-07-10-microsoft
