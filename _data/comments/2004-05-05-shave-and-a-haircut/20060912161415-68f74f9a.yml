name: Kurt Schroeder
body: Found your blog by accident. My wife and I do SFG with variable success. I have
  thought of building a 2x4 garden and putting it on wheels so I can roll it into
  the sunshine and away from pests at night. Perhaps you could do something similiar.
  In his latest SFG errorts, Mel Bartholemew advotes not using your own soil anyway.
  But good luck finding vermiculite. Hard to get even in the midwest.
date: '2006-09-12T16:14:15Z'
slug: 2004-05-05-shave-and-a-haircut
