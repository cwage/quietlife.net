name: JS
body: It's funny—I ran into Bruce Barry at Brown's Diner last night and told him I'd
  written a seriously wonky blog post, even by his standards. I'm flattered you'd
  confuse us dorks. Now if only I could figure out how to work a legal citation into
  my next post...
