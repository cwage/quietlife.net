name: Glenn
body: The was a NPR good piece on the FEMA housing in Punta Gorda, FL from last year's
  hurricane season -- basically there's a vast field of FEMA trailer parks (which
  I got to see in December) and people are still stuck in them because they couldn't
  afford anything else. FEMA is planning on cutting funding for them in about six
  months, letting the local government decide whether to fund them or not.
date: '2005-09-12T18:25:09Z'
slug: 2005-09-11-choices
