name: Erik Ostrom
body: |-
  Ha ha, I'm only 3% Bush. Probably because we both oppose immediate withdrawal of US troops from Iraq. Although for different reasons.

  I also agree with Edwards even less than you do (60%), Kucinich the same, and everybody else more. Which I suspect really means that I agree with Kucinich less, and the rest of them are graded on a curve. Which would mean I agree with Edwards even less. Maybe.

  What was the deal with that last page where it asked how important "Crime/Education" is to you? I think crime is important (in that I think the death penalty is barbaric), but I think education is the most important political issue our country has, and I don't feel that way about crime. Oh well.
