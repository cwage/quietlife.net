name: Les Jones
body: |-
  They captured Yassin, then had to let him go in a prisoner exchange. That was the old way that led to never-ending war. The new way is to cut off the head of the serpent and get it over with once and for all.

  "Extra-judicial?" This isn't a law enforcement matter. Hamas and similar organizations are at war with Israel and are trying to bring about its destruction. It's foolish for Israel to pretend otherwise and go through the niceties of the courts.
date: '2004-04-19T08:12:24Z'
slug: 2004-04-18-preach-it
