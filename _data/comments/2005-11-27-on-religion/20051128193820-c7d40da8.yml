name: dolphin
body: I don't remmeber where I heard this and cannot give any assurance to its accuracy,
  but I recall hearing somewhere that Jesus Christ as an oath came largely into heavy
  use a result of television censorship. If a script writer wanted to use a "bad word"
  they couldn't so instead they would use "Jesus Christ" which couldn't easily be
  censored without having some kind of effect on televised chruch services and the
  like.
date: '2005-11-28T19:38:20Z'
