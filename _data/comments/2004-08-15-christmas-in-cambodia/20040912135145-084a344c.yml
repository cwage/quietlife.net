name: Les Jones
body: |-
  Kerry still hasn't provided one lick of proof he was ever in Cambodia. He has no documents and no witnesses among his band of brothers. Three of his crewmates - Gardner, Wasser, and Medeires - say [they never went to Cambodia](http://www.boston.com/news/politics/president/articles/2004/08/18/kerry_disputes_allegations_on_cambodia?mode=PF "http://www.boston.com/news/politics/president/articles/2004/08/18/kerry_disputes_allegations_on_cambodia?mode=PF"). Gardner is in the SBVT, but Wasser and Medeires support Kerry, and in fact Medeires was on stage with Kerry at the Democractic National Convention. It's bad news when those guys won't back Kerry on the Cambodia story. Again, not one person has stepped forward to say they went to Cambodia with Kerry.

  Kerry last repeated his CIA "lucky hat" Cambodia story last year, not 18 years ago. It was in the Washington Post story by Laura Blumenthal last year. Don't take my word for it. Kerry [reproduced the story](http://www.johnkerry.com/pressroom/news/news_2003_0601.html "http://www.johnkerry.com/pressroom/news/news_2003_0601.html") on his official campaign Web site (it's at the very end of the story).

  ----

  A close associate hints: There's a secret compartment in Kerry's briefcase. He carries the black attaché everywhere. Asked about it on several occasions, Kerry brushed it aside. Finally, trapped in an interview, he exhaled and clicked open his case.

  "Who told you?" he demanded as he reached inside. "My friends don't know about this."

  The hat was a little mildewy. The green camouflage was fading, the seams fraying.

  "My good luck hat," Kerry said, happy to see it. "Given to me by a CIA guy as we went in for a special mission in Cambodia."

  Kerry put on the hat, pulling the brim over his forehead. His blue button-down shirt and tie clashed with the camouflage. He pointed his finger and raised his thumb, creating an imaginary gun. He looked silly, yet suddenly his campaign message was clear: Citizen-soldier. Linking patriotism to public service. It wasn't complex after all; it was Kerry.

  He smiled and aimed his finger: "Pow."

