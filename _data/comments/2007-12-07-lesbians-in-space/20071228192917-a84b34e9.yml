name: Chester
body: |-
  I would agree that the Cain/Gina lesbian relationship wasn't playing to prurient interest and added a lot of emotional sort of backdrop to the story. But I do think it was yet another example of how the sexuality of female characters is so often inextricably entwined with the nature of their character -- that it was "a defining characteristic" for Cain and Gina.

  To me, having Cain be lesbian just reinforces the whole "ball-busting dyke" stereotype. What would have been kind of novel would have been having an autocratic female character in a position of high authority who not only is not lesbian, but who also does not fall apart "behind the scenes," revealing herself to be a vulnerable woman when not playing brave.

  Also, while I agree that I think *Razor* insinuates that Gina was not necessarily self-aware until after "getting with" Cain, I do think there is an overarching insinuation that the Six model uses sexuality as a tactical tool. That Gina felt genuinely toward Cain, but that the Six model is going to naturally gravitate toward using sex/romance as leverage to "use" humans in power. There's a reason why an Amazonian blond was chosen to play the Sixes.

  Also, I think *Razor* pushes the idea that the "inhuman" treatment of Gina was a result of Cain's heartbreak and sense of betrayal. Contrast that with the reactions of the "betrayed" males who had been with female Cylons -- they all uniformly are forgiving and end up basically looking deeper within themselves and their relationships. I feel as if Cain's vindictiveness is part and partial to the tearing down of an artificially "strengthened" female character. That is: Cais is built up as an alpha-female who completely upends the military hierarchy...but, it's okay, because she's actually fairly weak, and loses her grip in the end.

  Sorry for the rambling. I guess this struck a chord.

  [P.S. Came to this site searching for Wordverify stuff...]
