name: Laura Creekmore
body: |-
  I have been sharing my number in limited ways for a similar reason. For almost all personal and business calls, I use 615.500.4131 and I have for YEARS. So everyone knows it. My family, however, will often try me at home and then my cell phone or vice versa. And often, I am AT HOME and just can't get to the phone. And all those phones ringing when I am too busy to answer just sends me over the edge.

  However, there's a downside to their using Google Voice for me too. When they call and I'm NOT at home, someone else gets the call. I also need to figure out if we can disable call waiting on our home phone -- the other day Ashby was on an important call, and my mom was trying to reach me via Google Voice.

  Not perfect, but sometimes helpful is my final verdict.
date: '2009-08-09T12:18:39Z'
slug: 2009-08-05-google-voice-iphone-forwarding
