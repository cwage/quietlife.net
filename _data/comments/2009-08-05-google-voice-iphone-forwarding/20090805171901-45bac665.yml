name: Daniel
body: |-
  also found this to be helpful to prevent callers from having to wait through 4 rings on your phone and then 4 rings on GV...

  Dial \*\*61\*+1xxxyyyzzzz\*11\*30# and hit Send. +1xxxyyyzzzz is your GV number. 30 is the delay in seconds. The delay can be set in 5 second increments, 30 is maximum.
date: '2009-08-05T17:19:01Z'
slug: 2009-08-05-google-voice-iphone-forwarding
