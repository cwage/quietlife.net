name: fishwreck
body: |-
  You can access GV voice messages by dialing your GV number from your iPhone (or any other number to which you have GV forwarding) and entering your PIN.

  I use my GV number primarily to give out to businesses that need my number -- utilities, mechanic, dentist, etc. -- and new people I meet that I don't know well but ask for contact info. Everyone else still calls me direct and I'm fine with that.
date: '2009-08-05T15:46:45Z'
slug: 2009-08-05-google-voice-iphone-forwarding
