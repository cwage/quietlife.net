name: emma
body: Well, the \*epicenter\* was in a sparsely populated area, but because of geological
  differences, I think the effects were more widely distributed. I heard a commentator
  in Haiti say that if you went as little as 40 miles outside of Port-au-Prince, there
  were cities with virtually no damage. If that is indeed true, the radius of fairly
  severe property damage was larger in the Loma Prieta quake. Speaking as a Bay Area
  native, I think types of buildings and safety codes are a huge factor. A number
  of brick edifices in downtown Santa Cruz pretty much fell over, foundations of homes
  in the mountains (closer to the epicenter) were severely messed up -- but because
  of earthquake safety codes, the buildings themselves didn't completely collapse
  like what we're seeing in Haiti. A lot of the buildings in Port-au-Prince that were
  so completely destroyed were multi-story buildings of unreinforced concrete, which
  just can't withstand much.
