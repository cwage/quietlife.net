name: Kathryn
body: Building codes make a huge difference in property damage, mortality, and morbidity
  in the face of natural disasters. Of course, building codes are also a prime example
  of government regulation, which as we all know acts solely as a jackboot on the
  necks of decent hardworking people. So, uh, yeah, John; I don't think "free market"
  means what you think it means.
date: '2010-01-15T20:13:59Z'
slug: 2010-01-15-this-post-uses-naughty-words
