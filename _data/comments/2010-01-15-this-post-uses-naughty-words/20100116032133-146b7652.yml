name: t. rev
body: 'On the building code issue: Haiti doesn''t have the history of earthquakes
  that the SF bay area does; in a world where Haiti were as prosperous as California,
  the local building codes would still not be as stringent in that respect. (On the
  other hand, you''d expect them to be a lot more hurricane-tolerant.)'
date: '2010-01-16T03:21:33Z'
slug: 2010-01-15-this-post-uses-naughty-words
