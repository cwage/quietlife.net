name: wrog
body: 'actually Haiti sits on [a plate boundary](http://en.wikipedia.org/wiki/Caribbean_Plate
  "http://en.wikipedia.org/wiki/Caribbean_Plate") that is every bit as active as the
  San Andreas (hint: there''s a reason Hispaniola, Puerto Rico and the Lesser Antilles
  [with its **15 active volcanos**) are lined up the way they are) if not more so.
  Haiti had an 8.1 in 1946, which is both more recent and bigger than the big predecessor
  to Loma Prieta (the 7.8 San Francisco quake in 1906), so,... um,... no.'
