name: Southern Beale
body: 'Wow, add Stossel''s asshattery to the nonsense we''ve heard from Pat Robertson,
  Rush Limbaugh and the rest. Dear conservatives: next global natural disaster, please
  refrain from using it to support your crackpot ideology. Consider keeping your yaps
  shut, you''re just embarrassing yourselves.'
