name: bob
body: It's simplistic to blame Haiti's problems on the USA, or the first world nations,
  or the colonial powers, or whatever. Sure, those things contributed, but Haiti grew
  a lot of its own troubles at home. To a large degree, for instance, their revolution
  replaced one race-based heirarchy of socio-economic power with a different one that
  was no more enlightened by the first. There have been, over the centuries, many
  contributing factors to Haiti's troubles.
date: '2010-01-15T13:17:22Z'
