name: Erik
body: |-
  I really like Edwards. I keep meaning to write a post about it, and my guilty failure to do so has now led to my leaving hit-and-run comments on other people's blogs whenever I can find some tangential connection.

  Good to hear Tucker's getting out of the beltway. Actually I think I'd just be really weirded out by seeing him in real life.
