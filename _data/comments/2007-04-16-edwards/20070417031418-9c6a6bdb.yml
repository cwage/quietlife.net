  Chris!
  I couldn't find your email, so I am leaving a comment here. I just got off the phone with Kerry Woo, and he suggested you could help me with a camera/computer problem.
  The good news is I have all this footage from the Ryman event. The bad news is I grabbed my Sony Hi8 instead of my mini DV camera, and I can't capture the video on my computer. I went to Comp USA and they had some cords that worked with a program, but, my computer didn't have enough whatever (It needs to be 2.0 instead of 1.5) for this program to work, sooooooooooooo, is there anything you can do to help????
  Thanks!!!!!!!!!!!!!!
  (Email me if you think of something)
