name: Tim W.
body: |-
  The title of the movie is actually [Der Untergang](http://www.imdb.com/title/tt0363163/?fr=c2l0ZT1kZnx0dD0xfGZiPXV8cG49MHxxPWRlciB1bnRlcmdhbmd8bXg9MjB8bG09NTAwfGh0bWw9MQ__;fc=1;ft=20;fm=1 "http://www.imdb.com/title/tt0363163/?fr=c2l0ZT1kZnx0dD0xfGZiPXV8cG49MHxxPWRlciB1bnRlcmdhbmd8bXg9MjB8bG09NTAwfGh0bWw9MQ__;fc=1;ft=20;fm=1"). In a nutshell, here is why I thought the movie was terrific:

  \* The historical accuracy of the film was, in my opinion, excellent. In particular, the producers of the film reproduced details of the Führerbunker from scale-models; you would have thought you were there yourself!

  \* Bruno Ganz as Hitler was simultaneously frightening and fascinating. What a genius performance. It wasn't the German language, although that helped. It was the vocal intonations, the body language (including the palsied hand)--everything. Ganz obviously studied the old reels of Hitler and mastered every aspect of Hitler's persona. Amazing performance.

  \* The film does not attempt to whitewash, preach, moralize, or send any overarching theme. It simply serves, again in my unschooled opinion, to tell the "historical record" in a way that is accessible to the general public. And the English subtitles are very well-done.

  Hope that helps.

  T
