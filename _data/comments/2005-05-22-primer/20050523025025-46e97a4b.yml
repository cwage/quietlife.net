name: Amanda
body: Plus they made it for $7,000. When "low budget" now means "less than 1 million
  dollars" that is pretty damn impressive. And although I have issues with the plot,
  it also showed that a good story (or at least an intriguing story)can be more entertaining
  than $100 millon of special effects.
date: '2005-05-23T02:50:25Z'
slug: 2005-05-22-primer
