name: Megan
body: I think/hope that Wonderfalls will stay on air longer than that Forever Eden
  show, its a different kind of show, one that I really enjoy. The crazyness goes
  more with teenagers, but also with moms. My mother and I really enjoyed the first
  episode, and cant wait till next Friday.
