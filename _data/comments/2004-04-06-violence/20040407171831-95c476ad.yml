name: JadeGold
body: |-
  It's doubtful the insurgents will try and hold territory. What they will do is hit and run.

  The idea is to provoke a disproportionate response from the US military. It's classic guerrilla warfare.

  I will guarantee the on-site US commanders know this is playing into the enemy's hands.
date: '2004-04-07T17:18:31Z'
slug: 2004-04-06-violence
