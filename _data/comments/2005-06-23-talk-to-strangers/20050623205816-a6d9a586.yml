name: Mr. Roboto
body: The article link is to your blog, but was Schneider talking about the missing
  Cub Scout? If he wasn't, it sounds like he should have. The kid saw people out on
  horseback, but was too scared to talk to them. Kids are so dumb.
date: '2005-06-23T20:58:16Z'
slug: 2005-06-23-talk-to-strangers
