name: Adelita
body: Look, the parents told the cub scout that he was never ever to talk to strangers,
  let alone go with them. Why would you think he would do otherwise? Parents have
  to be careful about what they teach. Avoiding all strangers just isn't possible
  or realistic. How do you make friends otherwise? Friends are just strangers you
  have gotten to know. There has to be a better way of explaining it and teaching
  the kids, it isn't the child's fault.
date: '2005-07-07T21:12:05Z'
slug: 2005-06-23-talk-to-strangers
