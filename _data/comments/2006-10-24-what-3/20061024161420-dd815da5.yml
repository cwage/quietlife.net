name: R. Francis "Random" Smith
body: Not only did he immediately provide counterexamples, but he then added that
  his generalization doesn't hold over the generalized group, and (somewhat peevishly,
  I'd say) demanded he not be called out for generalizing in the first place. "Black
  people don't tip, except white people also don't tip, and some black people do tip,
  and hey don't go around saying I said black people don't tip!" Whatever.
date: '2006-10-24T16:14:20Z'
