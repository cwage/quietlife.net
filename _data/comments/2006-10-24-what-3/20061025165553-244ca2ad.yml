name: Les Jones
body: Chris, he said that black people and "white church people" don't tip. I've had
  friends who work in restaurants tell me the same thing. The Sunday after church
  crown tends to tip poorly, and so do black people. And women in general tend to
  tip less than men. It's the conventional widsom in the waitron universe.
date: '2006-10-25T16:55:53Z'
slug: 2006-10-24-what-3
