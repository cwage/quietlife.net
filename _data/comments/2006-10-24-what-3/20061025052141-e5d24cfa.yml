name: Ned Williams
body: I've always heard that smokers are better tippers than non-smokers, too. But
  whether you agree or are persuaded by Glen Dean's assertion, it is not *per se*
  fallacious . . . "white church people" are a distinct sub-group of "white people"
  and "black people" are distinct sub-group of "people."
