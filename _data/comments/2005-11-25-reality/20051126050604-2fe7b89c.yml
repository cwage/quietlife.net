name: Doug Orleans
body: I don't think McCain can be beat on the issues or on any weakness of his. I
  mean, I agree that he's only the lesser of Republican evils, which is still pretty
  evil, but barring some sort of huge gaffe on his part I don't think a negative campaign
  against him will work with swing-staters. The Dems really need a strong straight-talking
  personality of their own, and I just don't think they have anyone. Dean is the closest,
  but he's too much of a punchline now. Even Matt Santos wouldn't beat McCain right
  now.
date: '2005-11-26T05:06:04Z'
slug: 2005-11-25-reality
