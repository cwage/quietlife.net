name: Charles Windham
body: I have just started the Atkins eating lifestyle and am glad to hear the truth
  about his heart attack. I just knew there had to be something else that caused his
  heart attack than a controlled carbohydrate diet. Thank you for putting this out
  on the web. I hope others read it. I will certainly tell people about the truth.
date: '2002-10-23T17:41:27Z'
slug: 2002-07-16-top-responses-to-low-carb-ignorance-and-myths
