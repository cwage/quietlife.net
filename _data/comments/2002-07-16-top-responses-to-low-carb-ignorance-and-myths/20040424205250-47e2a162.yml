name: cyndi
body: Are high carb diets really that bad?? I'm a runner, and my entire diet revolves
  around pasta, rice, cereals, bread, carb loaded energy bars and drinks. I've thought
  about going on the diet a few times, but to change my less than 10 grams of fat
  a day diet, to a one full of meat will be very hard for me. Plus, i don't want it
  to make me run bad! So if anyone has any advice, please let me know!
date: '2004-04-24T20:52:50Z'
slug: 2002-07-16-top-responses-to-low-carb-ignorance-and-myths
