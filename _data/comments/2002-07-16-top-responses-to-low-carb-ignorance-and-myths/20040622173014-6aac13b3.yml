name: Lee Caschera
body: I remeber growing up where my grandmother would make fresh pasta, meatballs,
  lasagna and all that wonderful stuff. No one in my family was over weight. Until
  we got older and started eating processed foods. Growing up in my home we never
  ate fast food, take out, frozen meals, canned foods. Everything was fresh except
  for canned tuna and the odd time we were allowed to have cereal. Wow times have
  changed. Let's go back to the basics.
date: '2004-06-22T17:30:14Z'
slug: 2002-07-16-top-responses-to-low-carb-ignorance-and-myths
