name: nicole
body: |-
  Fat=9 calories per gram
  Carb= 4 calories per gram.

  Low carb foods are high in fat(generally)

  Excess calories=weight gain.

  low carb binge=lots of calories.
  Does anyone else see a problem here? Low carb diets are for people who don't want to eat less food, and think they can overeat on low carb cakes, cookies, and chips and not gain wieght. Ten years ago it was fat free cakes, cookies, and chips...until everyone got fat.
