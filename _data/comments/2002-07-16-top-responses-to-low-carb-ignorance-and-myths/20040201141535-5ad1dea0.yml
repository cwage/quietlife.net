name: Drew
body: |-
  Hi! I just happened to come across your responses to the low-carb haters. I believe that in order for our society to truely lose weight they must first have the proper knowledge to do so. The rebuttals that you receive are just one example of how misinformed and ignorant people really are towards diet.
   However, I for one am a firm believer in picking a diet that suits the individual and the low-carb craze these days is driving me insane. People are jumping into these diets without even knowing anything about them. Anywhere you look it's low carb this and low carb that. Isn't all this attention misinforming the public that carbs are completely bad? I could go on but I guess all i'm saying is that any diet out there is just as good as a low-carb diet. The only thing about a low-carb diet is that it's based on the running assumption that eating too many carbs causes an overproduction of insulin which leads to overeating, obesity, and insulin resistance, which is not even scientifically proven yet.I don't think people realize that if they eat too much of anything (i.e. fats, proteins, carbs) they will gain weight. I think you said it best that a lifestyle change is necessary in order to lose weight. In any kind of diet.
   Anyway, I commend you in your effort to inform people and also your approach to a healthy diet and exercise regimen in your personal life. Best wishes.

  sincerely,
  low-carb hype hater.

  p.s.
  now i'm gonna go work out and then grab me a few michelob ultras to replenish. ;)
