name: Connie Reynolds
body: |-
  May 23, 2004

  I enjoy your website, Rich!
  As a Nurse Practitioner hope-to-soon-be, and more importantly, a lifetime dieting "expert," I have been unhappy with most diets I have tried, and I have tried almost all of them.
  There is a new one out that seems to be the most common sense diet of all. However, just avoiding extra-large portions and second & third.. helpings, and sitting on my buff is probably 75% of the battle!!!!!
  The Hamptons diet:
  It is a high protein diet which allows some carbs with an emphasis on the LEAN meats. It encourages fruits and vegetables, for fiber and nutritional value, not including anything "altered" such as juice.
  The carbohydrates are strictly whole grains, ie. brown rice, whole wheat, barley, rye, whole grain cereals, etc.
  This sounds to me like the best combination of both worlds.
  I'll let you know the results. I have 45 lbs. to shed.
  (Time to get on that Tony Little Glider Jerry wasn't too hep on buying............)
