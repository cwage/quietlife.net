name: Jasmina
body: 'I am incredibly fed up with the low-carb craze. We have existed in the human
  form for thousands of years, and only now have carbs been labelled as "bad". Here
  is the simple truth: you need a bit of everything. We need fat, proteins and carbs.
  These are essentials elements for a properly functioning body. And guess what???
  All you have to do is eat all those in moderation. Oh, and maybe keep as active
  as possible. I know that I will not be stuffing my face with bacon and steak every
  day so that I can lose pounds. Just think of the long-term effects of this diet
  and it should be very clear.'
date: '2004-06-23T00:25:13Z'
slug: 2002-07-16-top-responses-to-low-carb-ignorance-and-myths
