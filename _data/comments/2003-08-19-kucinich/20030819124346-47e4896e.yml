name: cwage
body: |-
  You gotta take the good with the bad.

  In any event this has been grossly exaggerated. He was just listing things to be defined as "weapons".

  I'd rather have a president trying to ban nonexistent weapons in space than one trying to [develop even more dangerous ones](http://www.washingtonpost.com/ac2/wp-dyn/A32530-2003Feb19?language=printer "http://www.washingtonpost.com/ac2/wp-dyn/A32530-2003Feb19?language=printer") here on earth.
