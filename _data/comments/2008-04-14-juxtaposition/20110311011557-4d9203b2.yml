name: Katie
body: You never know, maybe she is mourning over the death of her son killed by americans.
  But that is beside the point. I think the photos are meant show show that despite
  all the so called "differences" we have, that the war is being fought over, we are
  all human.
date: '2011-03-11T01:15:57Z'
slug: 2008-04-14-juxtaposition
