name: stigmergy
body: |-
  the tweets in the "outright fabrication" link are being disingenuous in claiming Colin Liddell was being ""satirical" or "protesting" genocide. the following quote doesn't in ANY way walk back or mitigate his call for genocide, it literally is just him defending his call for black genocide by (falsely) claiming that white genocide is already widely discussed.

  This is most clearly demonstrated by this quote:

  "The basic habits, ideas, and practices that help civilization to survive
   and prosper in other parts of the world seem largely absent among large
   elements of South Africa’s Black population, and it seems that it is
  only a matter of time before the country sinks to the level of poverty
  and savagery endemic in most of the rest of Africa and places like Haiti
   and Detroit. If this is the case, then, rather than the question of
  White Genocide, shouldn’t the debate really be focused on whether Black
  Genocide is something worth considering?"

  so again, Colin Liddell was, in fact, calling for black genocide. he wasn't making a ~satirical point~. he was just trying to defend his bloodlust by falsely claiming that people are widely discussing white genocide.

  shame on you for uncritically repeating the alt-right's lies.
