name: Misty
body: So maybe referee was the wrong word to use. Sorry. My point was the U.S. seems
  to have to stick its nose into so many places that it isn't required to be. The
  middle east has been fighting since the beginning of time and the U.S. thinking
  we are just going to go in there and fix everything, which isn't going to happen
  unless the countries want us there fixing it. I agree with you nothing good will
  come of this if we jump in, on whatever side we jump in.
