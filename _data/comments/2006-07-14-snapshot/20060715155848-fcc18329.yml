name: cwage
body: |-
  Finally -- I thought my inflammatory one-sentence post would go ignored and I'd have to ask myself..

  Israel has been targetting infrastructure: the airport, bridges out of cities, etc. They have also been er, not targetting: that is, bombing with a wanton disregard for civilians.

  The [Fourth Geneva Convention](http://en.wikipedia.org/wiki/Fourth_Geneva_Convention "http://en.wikipedia.org/wiki/Fourth_Geneva_Convention") outlaws "collective penalties" on a civilian population, as does [Protocol II](http://www.ohchr.org/english/law/protocol2.htm "http://www.ohchr.org/english/law/protocol2.htm") from 1977, though Israel didn't sign that one (Only 4 countries have.)
