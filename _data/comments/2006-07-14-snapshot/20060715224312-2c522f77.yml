name: Sarcastro
body: |-
  There is no such thing as a "civilian bridge". It is just a bridge. It can be used by civilians as well as by hostiles. Bridges are legit military targets. Whether Israel is "punishing" the Lebanese or not is immaterial, as you have yet to demonstrate how blowing that bridge up relates to your argument.
  You revised your argument from "blowing up this bridge=war crime" to "I don’t understand how you can justify — morally, if not in international law — the deaths of 78 and counting civilians in retribution for the capture (er, sorry, “kidnapping”) of IDF soldiers."

  Let's say, for example, we are at war with Israel. They blow up BNA and all the bridges connecting East Nashville to downtown as part of this war. Is that too a war crime? Or do only Lebanese bridges qualify?
