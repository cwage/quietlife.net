name: Sarcastro
body: |-
  That's all very nice. My point is the photo. What bridge is it? What leads you to believe it to not be of any military signifigance?
  What you are presenting is a very circumstantial case full of fallacious reasoning.
  1)Civilians use bridges.
  2)The IDF is blowing up bridges.
  3) Israel is committing a war crime in this picture.

  Do you not see where you are missing a "2.5"?
