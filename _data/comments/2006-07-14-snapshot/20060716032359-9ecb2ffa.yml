name: cwage
body: I do, yes. Assuming you are admitting that there is targetting of Lebanese civilian
  infrastructure as is being reported, well, everywhere; that such action does indeed
  constitute a war crime; and further that the sum of your objection now has basically
  been reduced to "well, maybe that **particular** bridge in the picture isn't one
  of the many bridges being destroyed along with water and power grids -- like maybe
  it was some special Hezbollah bridge that only Israel knew about, therefore that
  SPECIFIC picture isn't an example of Israel committing the war crimes", well, uh,
  then.. point taken. Touche?
date: '2006-07-16T03:23:59Z'
slug: 2006-07-14-snapshot
