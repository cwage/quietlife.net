name: Hilltopper
body: The significance of the trampoline is the suspension between heaven and earth
  that is manifested by the characters. A lot of the scenes are negligiable too the
  plot focus, but in the cut scene when Gretchen is jumping with Donnie, she is jumping
  around him while he is in the center. This, in effect, makes him the center of this
  suspended universe they have created. He is the center of this small celestial world
  and this like the sun, is the provider for all who orbit him. This is intense foreshadowing
  of what is to come at the end of the movie when Donnie does infact die for Gretchen.
  Hope this helps you out Stafford.
