name: VIC
body: ALL I HAVE TO SAY IS THAT DONNIE DARKO IS A WONDERFUL, MULTI-PROCESSED MOVIE.
  FOR ALL YOU FUCKS OUT THERE THAT ARE BITCHING ABOUT HOW THE ENDING SUCKED AND THINGS
  WEREN'T CLEAR HERE NOR THERE... USE YOUR IMAGINATION!!! IT'S ABOUT TIME THAT WE
  HAVE TO ACTUALLY USE OUR BRAINS AND THINK ABOUT A MOVIE RATHER THAN HAVE THE MOVIE
  ROT OUR MINDS!
