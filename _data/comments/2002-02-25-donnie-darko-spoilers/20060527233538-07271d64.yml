name: no dice
body: In R. Kelly's commentary in one of the deleted/extended scenes he mentions that
  he took out many scenes to leave the movie open for interpretation. There are literally
  hundreds of interpretations of how to make sense of the movie, it is not to be taken
  too seriously, which is your mistake. There is not ONE SPECIFIC MESSAGE of the movie
  so don't criticize like you know the only answer. and get a life
