name: Kevin
body: |-
  I appreciate the contributors to this discussion that provided us with some personal insight and original thought. To those who simply regurgitated the thoughts of others, cut and pasted their words from other discussion groups, or chose this site as a place to see how many swear words they could fit in one sentence, Fuck you.

  The interactive websight was a great supplement to the movie. Whoever came up with that idea truly has vision - the breeding of different forms of media to prolong public interest could be the future of entertainment. But I think I'll wait for Donnie Darko the playstation game to come out before I draw any concrete conclusions about this movie.
  The supplemental media does not provide you with a key to unlock the the plot like the black and white/color trick in Memento. In fact, the plot was probably not intended to come together at all. Rather, the airplane engine is like the blue box in Mulholland Drive-a device used to loosely pull the movie together while still allowing room for the viewers to fill in the blanks themselves.
   Maybe Donnie really did die on October second. Everything that happened between Frank waking Donnie and the scene where we see the engine fall again was Donnie's personal afterlife. When we die, "All we're left with is our memories." Our conciousness is free from the limitations of the physical universe that control our destiny - we are free to make up our own ending and deal with any spiritual baggage we have picked up while living. In Donnie's afterlife, he resolves his issues with intimacy, love, and fear by constructing an acceptable story from his memories. He makes the new girl into his girlfriend, the mysterious old woman into a prophet, and Frank into a spiritual guide.
  In essence, immediately after death we experience a lucid dream in which we can choose to accept our own death and move on to a higher plane of existence.

  Take care of your friends and families.
