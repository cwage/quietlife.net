name: Sinabite
body: I love this move!!! i have watched it 3 or 4 dozen times and everytime i hear..."well
  i think your the fucking AntiChrist" it brings tears to my eyes. What human being
  has not wanted to stand up and say that to someone who is made out to be something
  they are not!
