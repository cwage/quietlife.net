name: Amanda
body: |-
  Ahem. So, the very first review was 'retarded' because the author did not spend many ADDITIONAL hours reading through some website to explain a movie that only took 112 minutes to watch in the first place ? Really, at the end of the day, with all the talk about complexity and depth and different meanings blah blah blah...is it really so fucking much to ask that a movie make sense within the limits (in this case time limit) it sets for its self? Was the director really so pompous as to think someone would be so fascinated by this film that they wouldn't mind it not making sense without additional research? Please.
  I signed on to watch a movie, not conduct a research project.
  I am not impressed with these arguements people!
  Love,
  Amanda

  P.S. The cracker is the midnight rancher. (this sentence will make sense if you visit [midnightrancher.com](http://midnightrancher.com "midnightrancher.com") and solve the various puzzles and also if you buy the 1275 page companion book to the [midnightrancher.com](http://midnightrancher.com "midnightrancher.com"). It is totally worth it, because it will make you seem \*very\* intellectual)
date: '2003-01-23T04:54:18Z'
