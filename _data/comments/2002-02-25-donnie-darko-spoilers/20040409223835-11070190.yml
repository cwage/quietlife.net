name: Stephanie
body: |-
  Donnie Darko is a masterpiece.
  It's different and intriguing.
  Just because the end didn't summon up all of your questions doesn't make it a bad movie whatsoever. It's beautiful because it lets you use your own imagination to try and comprehend it's idea and meaning. This is what makes a good movie a movie. It really makes you think. 98% of the people who've seen this movie, shouldn't of. It's not for the average intelligence who enjoys being entertained by the idiot box. I suggest you give it the credit it deserves or move on and find another movie to criticize.

  Your insulting your intelligence...
