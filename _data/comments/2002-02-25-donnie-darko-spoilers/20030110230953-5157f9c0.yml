name: John... today
body: Does anyone know why Frank is allowed to transcend the two universes, occupy
  Donnie's thoughts, know what will happen if the alternate universe collapses, as
  well as exist in the physical world as a person? I Sure as hell can't do that. I'm
  not saying that there wasn't a way that Kelly intended this to make sense, i just
  can't make sense out of it. please fricking help me.
date: '2003-01-10T23:09:53Z'
