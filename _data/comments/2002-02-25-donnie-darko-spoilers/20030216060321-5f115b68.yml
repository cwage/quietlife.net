name: geoff
body: |-
  Granted this is an entire year after the maiden critique of this movie, but I still feel the need to throw in a couple cents that no one cares about... How could you harbor such disdain for this movie.. you obviously watched it with the intent to hate and decompile rather then let your self get sucked in by its eerie charm.
   I'll admit, im not much of a reviewer, i tend to enjoy lots of media put in front of me, but i have a job/girlfriend - so im not privy to the exorbitant amount of man-hours convienient to the ordinary hostile viewer. Let me say why I liked this film... Besides its ulterior plot developments, and comic-book david lynch grasp.. Its 80's corralation is what hooked me hard on this film. It conjured the sentimental nostalgia of a good hackneyed 80's film (ie: pretty in pink - say anything) and galvanized it with a dark, thriller story. These in conjunction worked a powerful, subversive charm on me, and while unsettled partly because of its dark imagery, mostly for the John Hughes-like heartkbroken romanticism that was catalyzed by the movie's style and story...
  Then again I dont know much... but I know what I like...
  And come on its better then fucking spy kids..
