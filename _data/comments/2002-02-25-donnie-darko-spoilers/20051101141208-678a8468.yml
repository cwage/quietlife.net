body: THe idea of frank coming back to haunt Donnie is false. It was in fact Frank
  who caused Donnie and Gretchen to go out. HE told Donnie to fllod the school who
  then walked home and saw Gretchen getting teased, who asked if he would walk her
  home. THen he asked her out, which caused the both of them being together. Frank
  also told Donnie to burn down JIm's house where they found the kiide porn. So it
  was Frank that caused alot of good things to happen. Also Frank would not have the
  ability to go back in time if Donnie had shot him. And Frank could not be a ghost
  if you were leading to that, the text talks about tim travel and not zombies or
  ghost.
