name: Kristopher
body: There is still one thing that I keeps nagging at me. The boy at the end, while
  another here previously said he was just stupid, I can't help but think he somehow
  knew what was going on. Especially with his strange wave of understanding, the same
  shared with Donnie's mother and Gretchen. What really is interesting is that while
  everyone else has a connection with Donnie and/or were somehow manipulated, that
  boy was the only one which, as far as I can tell, was not shown to have existed
  in the tangent universe.
date: '2005-04-11T09:14:14Z'
slug: 2002-02-25-donnie-darko-spoilers
