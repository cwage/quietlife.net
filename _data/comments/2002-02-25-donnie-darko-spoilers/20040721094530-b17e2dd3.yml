name: John
body: |-
  Whoever posted this review is an idiot- they made up their own interpretation, and then got mad at the movie because their own interpretation makes no sense.
  Donnie Darko isn't living as if he'd never died. When the jet engine slips through the wormhole, the universe becomes tangent to "God's Path" and becomes very unstable. The only way to save it is by sending the jet engine(the artifact) back to where it came. To do this, God gives the power of telekinesis to Donnie. However, Gods can't tell Donnie what to do because "once you know your destiny, you are free to change it." Rather, God sends donnie tons of hints, and kills his girlfriend to persuade him to reset the universe.
  This isn't my interpretation, it's the director's.
