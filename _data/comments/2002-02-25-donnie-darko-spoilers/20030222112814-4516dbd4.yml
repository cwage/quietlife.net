name: Kevin
body: somethings are left to the imagination. take your own view on the movie. maybe
  you thought it wasn't well made, but all the points you made about not tieing things
  up, I enjoyed. And there is a connection with Grandma Death, if you think about
  it. Shes waiting for a letter. Donnie writes her a letter. put the 2 together, its
  not rocket science.
