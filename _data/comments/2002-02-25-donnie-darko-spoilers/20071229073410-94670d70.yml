name: barry manilow
body: i think that most people who view this movie are disappointed because they dont
  grasp many key conclusions and believe the ending to have let too many loose ends.
  i think that the movie ties up most things, but you don't realise this until you
  have viewed the movie a few times. grandma death is one thing that frustrates people
  the most because they dont see any connection. if you rewatch the film she has an
  extremely vital role in making up donnie's mind as to whether he shoul sacrifice
  himself or his family. you see grandma death was once herself a living receiver
  but she made the wrong choice and chose to save herself. this is why she tells donnie
  that 'every living creature dies alone.' she made the wrong choice and it ruined
  her life and made her insane. it is not just coincidence that there is a book written
  by her about what donnie is going through, grandma death went through it herself,
  and every person close to her died (hence the name grandma death).
