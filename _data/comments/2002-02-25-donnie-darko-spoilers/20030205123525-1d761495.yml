name: R.S
body: |-
  I just saw the movie, and Im glad I chose not to listen to my friend and rent, I got to see it download style, after reading a couple of comments here I got really annoyed,
  people here dont know what they are talking about, but so goes for the rest of this world that we live in, -people are fucking stupid, they dont mind paying for garbage movies, I can see in this page alot of comments posted by these same people that im talking about, people that lack intelligence...seek enlightment motherfuckers, cause this movie SUCKS, so what if you sit down for about an hour and a half with expectations, what with this lame end?, imagine you had a birthday and someone gave you a present, something nice, but wrapped it up with a freaking handtowel filled with jiz, would you open up that present? would you appreaciatte it? stupid fucking gay-sapians!, the present will be nice, but the fucking wrap would haunt you for-fucking-ever, and the wrap on this mother fucking movie, is fucked up!
