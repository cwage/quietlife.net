name: Anonymous
body: |-
  That bunny is whacked!

  Don't you just love movies!

  two types of movies:

  (1) Omega Man (Chuck Heston)--40 oz. and a blunt and no
  apologies to anyone! Just Fun-Fun!
  (2) Last Man on Earth (Vincent Price)-- No B-40, and I've
  lost touch with rational behaviour when I hear "Morgan! I'm
  going to get you Morgan!"

  Entertainment=Escape; Rational or Emotional and/or a mix.

  DD is a top-notch exercise in losing oneself--not unlike
  copulation... :)

  Thanks R. Kelly.

  P.S. Check out the weirdos at Rapture-Ready! Wow!
