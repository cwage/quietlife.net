name: Ashton
body: |-
  Well I have enjoyed reading many of your responses, some better than others. Obviously everyone has their own opinions about the movie, but it bothers me that you all argue about the plot and theme of the movie. Here's my perspective on the matter and it doesn't mean it's right or wrong but it is how I see it.
   I just watched the directors cut last night and paid very close attention to the details of the movie. I'm going to watch it again in the next few days because there are still details that I am unclear on. I have seen it four times and still find interesting details that tie up the story nicely.
   I have found profound depth to it, but that does not mean that the writer meant for there to be this depth. I see a movie as an art form and each individual will see it in a different way. You cannot say that a person is wrong in there thoughts about the movie. All you can say is that you didn't see it that way.
   Finally I want to comment about the ending. I personally liked it because it was somewhere in the middle of giving sound resolution to the story and leaving it open ended. It shows you the final decision Donnie makes but leaves enough open so you can dream up your thoughts about what’s happened.
   Over all I think that with what ever intent the writer had, he produced a compelling story with interesting characters and an open enough theme to allow for a surface and a deep value to be derived. I think it was a masterfully created movie and recommend that you watch it a few times carefully reading the excerpts from Sparrow’s book and paying attention to the little details that add the to the plot. And if you have the time I suggest reading Stephen Hawking’s “A Brief History of Time” and maybe “Watership Down”. It will help you understand some of the movie better, and it’s just good reading anyways.
