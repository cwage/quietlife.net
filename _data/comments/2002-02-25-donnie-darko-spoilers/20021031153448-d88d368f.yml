name: Sparky
body: |-
  I wish I could go back in time and cut the old lady out of this movie. And the CellarDoor thing. That was retarded. (By the way, did anyone else notice that at the end the old lady had a piece of mail in her hand.) And one more thing. Donnie may have saved his mom and his girlfiend by choosing to die but the poor girl will still become an orphan around halloween time because of her crazy stepdad. If I were donnie I would have chose to live again but this time I would stop my mom and sister from getting on the plane and stop the stepdad from doing any more harm. It's like the science teacher said, if you know your path you can choose to betray it. (Did someone say Matrix? How about Minority repot?) Great potential, to bad they didn't clean it up a bit more.
  Sparky
date: '2002-10-31T15:34:48Z'
