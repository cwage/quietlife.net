name: Kate
body: |-
  Chris: do you seriously believe that the director would make this film: every detail of which has symbolic/metaphoric significance, not to mention within confounding contexts-and then proceed to have the meaning of his film flashed up in one shot of the sign ubove the movie theatre?!!! Do you realise how absurd your assertion is?!

  Here's a few more things I got from the movie in the way of 'hidden treasures', everyone pls disagree and/or qualify:

  THE TWO 'BAD BOYS': Archetypal American bullies of films based in the 50's a la 'Stand By Me'
  and 'The Outsiders'

  DONNIE'S TWO FRIENDS: Rosencrantz and Guildenstern who don't know how to 'delve'

  DONNIE'S HOODED JACKET: Showing the meaning of objects through context: in some scenes it gives him a threatening unabomber(?)/thug nuance, then soon after it makes you think of is the boys in 'E.T.' flying on their bikes.

  DONNIE CARRYING GRETCHEN'S CORPSE: Derivative scenes: Yeah, it's from 'The English Patient', but it was from 'King Lear' before that.

  FRANK/CHIQUITA(?): Cultural/Racial Displacement/disenfranchisement: here we have a nondescriptly 'asian' girl with some sort of Spanish name ('Go back to China!'), not to mention being female and overweight. Her performance as an Christian angel in white is tragically comic: she is despised for being the 'other' (on all levels!), yet her attempts to assimilate give her oppressors more reason to torment her. She cannot move forward, she cannot go back.
  Then, an Indigenous American called Frank(!) drives recklessly causing Gretchen's death. This, statistically, is a common occurence among young Indigenous American males ("On Aggression", Lorenz), an outlet for the aggression and frustration resulting from marginalisation ergo emmasculation. Parallels? Australia, New Zealand (the film "Once Were Warriors" illustrates this perfectly) and South Africa. In the closing scenes, Frank designs his 'mask' (Wildean connotations abound) over and over.

  Oh Yeah, Mindblowingly entertaining film as well!
