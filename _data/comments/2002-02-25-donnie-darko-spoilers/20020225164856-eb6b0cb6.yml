name: Amanda
body: |-
  I think that 'a dark and creepy atmosphere' doesn't justify a 90 minute movie. I mean, thats film school shit my bruthas. I totally agree with Chris. I find it interesting how none of you detractors had any arguement with his opinion of 'AI' because the ending really SUCKED, and if you follow the dictates of logic, the ending of 'Donnie Darko' SUCKED for the very same reasons. I guess I'm too mainstream and non-pretentious to sarcarfice 1 1/2 of my life to watch 'eerie lighting' and 'spooky atmosphere'....Call me crazy....I like the story to make some god damn fucking sense.
  Love,
  Amanda
  P.S. I liked 80% of the movie and it creeped me out
date: '2002-02-25T16:48:56Z'
