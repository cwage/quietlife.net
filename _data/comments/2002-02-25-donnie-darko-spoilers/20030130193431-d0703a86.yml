name: Martin
body: |-
  Found it! This short piece of music, to me, sets the mood for the movie.
  The Portal (For whom the bell tolls)
  Steve Baker, Carmen Daye, Michael Andrews

  NOT IN THE CD
  This track is not available in the CD for the Donnie Darko soundtrack.
  It's the score that plays when Frank shows Donnie the portal in the movie theatre. (+ end credits)

  Thanks to - Juliator(Kazaa)
