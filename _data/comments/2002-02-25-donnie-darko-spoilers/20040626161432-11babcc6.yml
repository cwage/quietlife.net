name: Mike
body: |-
  Personally, I think that those who did not enjoy the movie because "it didn't make any sense" or because "it had a bad ending" are complete idiots. You are the kind of people who are in a larger sense destroying the minds of the world. This movie is quite obviously meant to stimulate your mind some. It is also obviously not meant for those who can only see a movie as it is. The creators of Donnie Darko I think are pure genius. Not only did they create an incredible movie, but it's a movie that people can't stop debating about. It's a perfect way to advertise. Nothing spreads faster than by word of mouth. Unfortunately, there are some who will bash the movie, because they can't think past what they see. Not everything is what it seems, and Donnie Darko is a movie you HAVE to watch more than once to even begin to understand what's happening. I find the movie is beautifully put together. It goes so in depth, and has such incredible detail. But the only way to appreciate these qualities of the movie is to actually think. The first time I saw this movie, I was blown away, I couldn't stop thinking about it. I had tons of questions and theories, and I was dying to find out what other people's theories were.
  Those of you who bash this movie because you say it lacks plot are complete idiots. Use your mind, look deeper into than what is just shown to you. And stop trying to sound like you're some amazing genius by using intelligent sounding dialect. A genius isn't one who is able to regurgitate things that are taught to him, a genius is someone who can take what he is taught, and expand upon it intelligently. Big words mean nothing if there is no substance behind them.

  With that being said, after a lot of thought, I personally think that the theme of irony is played out a lot throughout the movie. It's mentioned breifly at the beginning of the movie, and it comes back several times throughout the film. For instance: The self help guru, who turns out to be a kiddie porn operator, or the overall fact that Donnie discovers that he had to die after all in order to save everyone from the end of the world. I could be wrong, because the more I think about the movie and read other peoples ideas, the more my ideas change. Just thought I should get my thoughts out on the table, for those who appreciate the great quality of this movie, and to shun those who are ignorant enough to say this movie "insulted thier intelligence".
