name: Sab
body: |-
  If I can do a comment without risking abuse... seen "Twelve monkeys", anyone? I only saw DD once, but one strong influence I felt was that mind-boggling T. Gilliam film (+ the Chris Marker film 'La jetee' which inspired it). I read in an interview that Richard Kelly quoted that film so this is not absolutely far-fetched. Time travel? Time loop is my feeling, where every run through the same 28 days brings new, if sub-conscious, knowledge (hence deja vu and surprising reactions or visions). Or why does Donnie wake up smiling on that road? Can't be just because of the perfect 'Killing Moon'...
  Does anyone know where to find a list of tracks from the original S.T. (before I order it to a ridiculous price as an import?) or at least, where is that great version of Tears for Fears' "Mad World" to be found on CD?
  Sab
date: '2003-02-06T11:14:23Z'
