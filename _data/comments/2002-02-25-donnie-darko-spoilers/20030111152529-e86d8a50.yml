name: RB
body: Some of the bad reviews here I just can't understand. Lacking in substance????
  My only response to that, is ask your doctor about mild retardation. If your a twilight
  zone fan, this is a movie for you. Gets better every time you watch it. Next time
  you see a strange person walking around talking to himself or what not, yo might
  think twice after seeing this flik. 10 out of 10. 5 out of 5 stars, whatever you
  want to say, just give this movie a try!
