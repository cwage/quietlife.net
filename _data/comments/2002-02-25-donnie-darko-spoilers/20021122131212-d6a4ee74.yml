name: Kate
body: 'Knives: I think you you''re off the mark by setting up a philosopher/scientist
  dichotomy. Forward thinking and Scientific discovery have a common goal(symbolised
  by Drew and Noah in bed together), which is truth and knowledge. This being the
  natural enemy of organised religion (Swayze and the ''clergy'' that controls the
  school), the two teachers are ''silenced'': Drew is fired, Noah must keep silent
  to keep his position.'
