name: Anna
body: I thought this film was incredible, not least because it avoided a conventional,
  wrapping-up-all-the-storylines ending and went in a totally different direction
  than i expected it to. It seems to get more complex, funnier and more moving every
  time I see it. Its an amazingly intricate web of storylines and messages. The whole
  internet experience surrounding it makes it even more challenging too. I'm going
  to see it again this weekend! And yes, Frank is suprisingly scary for a rabbit...
date: '2003-01-09T17:31:52Z'
