name: Sardtok
body: |-
  To Coma: I don't think there are two engines, there is one engine and the plane.
  The plane however, is intact and the engine that fell from the sky seems to be the exact same engine (or a superb replica of the engine one the plane).
  The plane in the primary universe was never destroyed, but Donnie destroyed the plane in the tangent universe to send it back to the primary universe so that the universe could continue to exist.
  To Jam: Thanks, I mostly understood the movie after reading the book at [donniedarko.com](http://donniedarko.com "donniedarko.com"), but you truly clarified when Donnie used his 4th Dimension powers, especially the conjuring of fire and water.

  The music in the end was great, loved the way it wrapped up how I felt about the movie, it's both hilarious and sad, which all the truly best movies are if you ask me.
  This movie was wonderful before I understood it, hopefully it will still be as wonderful after learning how it all is bound together.

  I might see it again tomorrow, I've only seen it once a couple of days ago.

  To Amanda: When I started this quest for an explanation of the movie, I wanted to know how the writer explained it, because I wanted to see the movie more like the writer saw it, not so much to truly understand the meaning of the movie.
  The meaning is mostly clear already, but to understand why the writer makes certain things in the movie happen.
  Also I guess I started on this quest because the movie truly got to me, and has been stuck on my mind since I saw it.

  To the guy/girl who wrote about the eye: Hehe, never thought about that when he stabs the eye of Frank (THE EYE OF FRANK - hmm, sounds cool) or rather stabs the portal or what ever I am supposed to call it which seperates Donnie and Frank from each other (Frank not really being there, this wall to me seemed like water (which is supposed to be the matter the portal of the 4th dimension is supposed to be constructed of), which Donnie can see through). Anyway I guess there is supposed to be some meaning, maybe something in Donnie's subconscience and that's why he is poking Frank's eye. And also the eye starts to glow, so to me there seems to be some kind of link, just can't explain it ;)

  Sorry about all the really annoying long sentences, I know I make sentences about four times longer than they should be and this sentence will be another such sentence, but I am actually able to say these sentences without having to pause to breathe ;)

  This is the end of my long long long long, probably stupid (things are not worth saying unless they are stupid) and kind of annoying rave and other kind of things like explanations and stuff...

  I am the writer of long sentences.
  I am the worst nightmare of bunny rabbits.
  I am Sardtok Jestnak the Evil Necromancer.
  For that is the name I have taken.
  And this was my stupid kind of sig at the end of a long stupid text.
