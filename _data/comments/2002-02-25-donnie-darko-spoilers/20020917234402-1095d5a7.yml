name: Richard
body: Dude, go to [www.donniedarko.com](http://www.donniedarko.com "www.donniedarko.com")
  and read the philosophy of time travel and it explains it all, i thought what you
  were thinking but it is different. A tangent universe is made and donnie lives in
  that one until it collapses, and the reason frank talks to him is because he was
  killed in the tangent universe. thats why have these powers and why frank says,
  "you can do anything you want" but then since this alternate universe collapses
  the jet engine links its way back to the real universe to keep it going. Thus donnie
  kills himself because he has to take the engine back to the normal universe and
  by doing that killing himself.
