name: Reese
body: Did anyone thing about this. Donnie represents Jesus Christ and Frank represents
  God. EH? Frank tells him he has to die in order to save everyone, same as God and
  Jesus. They have a similar relationship in the sense that Jesus didn't necesarily
  start off wanting to die. Also Frank and Donnie both expose hypocrytes such as Jim
  Cunningham. Also they wreck places of false teachings such as the school. The oriental
  girl was like a follower of Donnie. Also DOnnie shooting Frank is like when Jesus
  turns his back on God right as hes suffering and yells the famous quote, "my God,
  why have you forsaken me?". There are so many parallels to this. It works.
date: '2005-02-22T03:45:40Z'
