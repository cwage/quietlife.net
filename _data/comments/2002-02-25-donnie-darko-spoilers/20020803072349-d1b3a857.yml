name: Wylie Garfield
body: |-
  DONNIE DARKO DONNIE DARKO DONNIE DARKO
  I guess some of you weren't compelled for answers while others have gone to the [www.donniedarko.com](http://www.donniedarko.com "www.donniedarko.com") websit they were freaked an needed somw sort of rationationel immediately. The Official website will give you a lot of clues but you won't far if you haven't seen the movie. If you are still not getting "IT" (the thrill) find "Cellar Door" a website that takes a little searching for, but it points out many facts. After "Cellar Door" I advise you to go to the msn donnie darko group called:28:6:42:12. There is very good link there for a complete understanding of the movie (or basically I agree with the version.)"Untitled Document" is the name of the document and the web address is the only wasy to find it. In addition you will find some revealing interviews with director Richard Kelly and he gives two versions of how he sees Donnie Darko's death. It is an interview with someone from NYU.
  Want more? Well this can be the clincher!

  While being attacked at knife point Donnie says "Deus ex Machina" and later "our saviour"

  I suggest not just translating "Deus ex Machina," but finding all the definitions possible and then relate it to Donnieand his death.
  WARNING
  WARNING: I have been through all the Donnie Darko groups on Yahoo where Lane Kelly, senoir brother to director/writer Richard Kelly. I warn you for one reason only......Lane Kelly openly announces his brother/director status/connection, makes vague posts about the movie and answers childhood questions about Rich Kelly. He has and is suffering from "the six degrees of separation" syndrome, although there is only one degree seperation here. This has caused him to have a "celebrity" type status within the groups. The group members, "singing their praises to God," that "a" or "any" Kelly family member for being on the site, boosting this guy's ego out of the ground. The fans on the site are kneeling before this "PR-type" brother and waiting for any detail, significant to the movie (or somwtimes not,) to dribble out of his mouth. Therefore I do not suggest any of the Yahoo DonnieDarko groups. The msn group is small contains all the necessary info for coming to conclusions with Donnie Darko. The msn group(28:6:42:12) site is relatively new, but has not been spoiled by Lane Kelly yet! (Knock on wood) The members of 28:6:42:12 are not looking to get Rich Kelly's, shirt, email address or unwear. The members there are open to discussion and interpretations of different actions and symbols in the movie.

  I do suggest going to the official DD website (passing all three levels), watching the movie again and then resorting to "Cellar Door" before you hear someone else's version of the story and how it comes full circle.

  DONNIE DARKO may seem like some silly, sci-fi, teen flick that is boring and has no end. WELL THAT'S THE POINT! He wants to spark your mind curiousity and intellectE. He wants you to go out and find the answers. Not one shot or camera angle, not one scene, none of the dialog and none of "artifacts", props, characters or costume is irrelevent. It is all shown to us but until we discover and decipher. Those who don't want to dig deeper because you didn't like or understand Donnie Darko, to those I say challenge your mind and you will love the movie.

  Even if you didn't like the movie and took it for face value or whre disappointed in the ending. I WOULD SUGGEST: taking on the Donnie Darko Journey on the web or DVD and experience the shocking and chilling script/movie that Kelly has written and directed. For a moment in time your mind works deductively until the clues, visuals and dialogues make bonechilling sense. Yes you can get the clues from message boards etc, but discovering something on one's own is far more powerful than having the intricate design of the movie laid out flat for you

  For more info you may contact me at the above address. Foreward this email to your friends.....watch Donnie Darko again and see how a "disguised teen movie" is one of most mind bending movies around.
  PS
  It has been 3 weeks since I have seen the movie and I still can't shake it. I don't have nightmares, but I do think about Donnie a lot

  Wylie

  DONNIE DARKO DONNIE DARKO DONNIE DARKO
