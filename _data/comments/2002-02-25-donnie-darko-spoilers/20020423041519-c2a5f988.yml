name: Shiner
body: I liked the movie. Frank creeped me out and I really felt the love that Donnie
  and Gretchen had, actually made me miss my ex-girlfriend. Yes, the ending was hard
  to understand but not everything in life was meant to be easy. It left me feeling
  hollow, yet hopeful. Frank Lloyd Orson Young Demented Tortured Rightous Evil Youth
date: '2002-04-23T04:15:19Z'
slug: 2002-02-25-donnie-darko-spoilers
