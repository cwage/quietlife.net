name: Bella
body: I thought this movie was great. Yes it is very difficult to comprehend it bt
  thats the point. Kelly wants their to be different interpretations. And guys the
  whole idea is that Frank was pulling a divine intervention thing on him so he got
  the chance to chose what he wanted to do. And all the people at the end waking up
  from their sleep when Donnie dies are people manipulated by the events so they all
  have the weird creepy feeling of knowing somethign weird happened but not being
  able to pinpoint it. I suggest everyone checks out the website ([www.donniedarko.com](http://www.donniedarko.com
  "www.donniedarko.com")) it helps alot!
