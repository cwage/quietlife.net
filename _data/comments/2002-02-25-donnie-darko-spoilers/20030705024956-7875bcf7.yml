name: JD
body: The same thing happened to me on Level 3. I guess that is the end. Well, my
  theory is that Donnie went back in time to save those he loved, and so that he would
  not hurt any1 anymore. Sure, it is more likely wrong than correct, but do i care...NO.
  This is a great film, and I reccomend it to every1. For those that hate the film
  you must not be able to have the capacity for abstarct thought.
