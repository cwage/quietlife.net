name: Ralph
body: Well my explaination to myself when i saw it yesterday was, "He travelled through
  time in his dreams somehow and that was that" And i didnt understand a word but
  the fact i didnt made it the most amazing film ever. But then i had an explaination
  for how he could defy sience and travell through time. Sort of. If you are travelling
  in time, you cannot go forward or backward but you can travel so fast that to any
  other human the world has stopped spinning and everything has paused. If you are
  travelling so fast everything has stopped you can do something or get somewhere
  and then go at normal pace and the world would be altered by what u have just done.
  Therefore time travell is not possible, and neather is moving so fast that the world
  stops. it is mearly something for you to think about and read and re-read until
  you understand what the sience of that was. Ralph
