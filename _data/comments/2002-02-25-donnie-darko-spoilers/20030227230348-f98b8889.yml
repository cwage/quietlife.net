name: Mike
body: For the person who asked about the classical/choral piece with solo voice, it
  is "Ave Maria" written by Giulio Caccini. The credits mistakenly list it as Guilio
  Caccino. I thought the movie was very good, but every time I see the extra stuff
  on the DVDs I realize how much the editors butcher the films to "get it under 2
  hours." Unfortunately, the films suffer without certain scenes.
date: '2003-02-27T23:03:48Z'
