name: Sman
body: |-
  I really liked the movie. It made me think about it for a while after I had seen it. I kind of wondered why some of the characters were left hanging. I see why flooding the school created the oppurtunity for Donnie and Gretchen to meet, but what was the reason for burning down Jim Cunninghams house? In the alternate reality it was a good thing because Cunnigham was exposed for who he really was. In the real world Jim Cunningham is still a dangerous pedophile. Was his waking up crying supposed to mean that he was cured of his mental illness having been discovered in the alternate reality?
  Was the sole purpose of the two bullies to be an amalgam of bullies from movies past? What was the point with the Asian girl? Did the jet only crash in the alternate reality? If not then isn't his younger sister going to be on it when they fly off to Star Search? What was the point of the letter to the old woman? Some of the answers to these questions might be super obvious to some but not to me and I would appreciate some clarification. Great movie!
