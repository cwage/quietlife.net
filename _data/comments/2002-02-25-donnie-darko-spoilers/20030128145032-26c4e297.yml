name: Hilltopper
body: One more quick comment to John a while back. Frank is a figment of Donnie's
  imagination. He is all of Donnie's fears manifested in a form who he feels comfortable
  following. I refer you to "Fight Club". Tyler Durden is the manifested guide needed
  by Edward Norton's character to accomplish what he feels neccessary for his life.
  This, like Donnie's situation, is done unconscouisly.
date: '2003-01-28T14:50:32Z'
slug: 2002-02-25-donnie-darko-spoilers
