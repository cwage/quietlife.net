name: Aletha Mchalick
body: I thought the point was that the film enacted all the usual cliches about stultifying
  suburban upbringings etc (a la all those teen flicks from the 80s) and that Donnie
  was an exceptionally smart kid whose intelligence manifested itself in terms of
  a sort of mix of psychic, time-travelling, coincidence-mongering ability and schizophrenia.
  He was doomed (either to die or to get locked up) because he was too clever for
  his surrounds.
date: '2002-10-27T19:16:41Z'
slug: 2002-02-25-donnie-darko-spoilers
