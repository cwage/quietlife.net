name: Lynnster
body: |-
  Heh. I love your explanation of Twitter to people! That's awesome.

  Even tho it's become such the social environment rather than anything else, it's got a few really nice additional qualities. My mom absolutely loved being able to check my Twitter page when I was in Chicago last year and meeting up with people I'd known for years online but never really met before.
