name: winston
body: While that post that you link to of your past experience is rather disconcerting,
  'Big' Kenny has been a very active force in attempting to bring relief and awareness
  to the situation in Darfur. I know he's been over there quite a few times and spends
  a great deal of time and his own money attempting to help. But I don't really know
  much more than that, and a brief google search doesn't bring out any proof, so,
  there you go.
date: '2010-03-03T20:17:09Z'
slug: 2010-03-03-big-kenny
