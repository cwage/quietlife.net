name: cwage
body: You're confusing socialism with social democracy. But that's okay, it's an easy
  mistake to make. Saying he "leans towards socialist ideals" is like saying that
  republicans "lean towards anarchist ideals" because they want small or no government,
  and thus Mccain is an anarchist. (Not that Mccain actually wanted this in any regard)
  If you're okay with that, then I guess good luck with that, but you've arrived at
  a point where your rhetorical venacular has lost any useful meaning whatsoever.
