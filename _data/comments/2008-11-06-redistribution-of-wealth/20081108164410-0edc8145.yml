name: Jared
body: I don't need the "republican scare machine" to tell me that Obama's tax plan
  is socialist. Heck, I don't even listen to the "republican scare machine", because
  I can think for myself, that is, unless you consider sources like NPR to be part
  of the scare machine. I don't agree with the bailout package either, we shouldn't
  be nationalizing the financial institutions. But Obama's tax plan IS socialism,
  wrapped up in economic progress and moralism. The concept that the rich should be
  taxed heavier because they can afford to take care of everyone else... what do you
  call it? To borrow a line from Obama, you can put lipstick on a pig, it's still
  a pig. You can be an apologist for Obama, that's fine, but just admit that his policy
  is socialist.
date: '2008-11-08T16:44:10Z'
slug: 2008-11-06-redistribution-of-wealth
