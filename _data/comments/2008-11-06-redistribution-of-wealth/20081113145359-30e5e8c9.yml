name: jscheel
body: 'In the shower this morning I came to a conclusion: Obama''s plan is not socialism.
  You are right, he is merely modifying the terms of America''s progressive taxation.
  I think that my qualm is not with Obama, but with the idea of progressive taxation
  in general. My misunderstanding, I believe, was exacerbated by Obama''s push towards
  more progressive taxation (something I disagree with), combined with statements
  made by some Obama supporters that I spend a lot of time with (not naming names).
  Statements like, "it''s not fair for them to have that much money," and "they should
  have to give their wealth to the rest of us," etc. are indicative of the envy-based
  structure Marx calls "crude-communism". I don''t believe that this is what Obama
  wants. I think I have been projecting these views on Obama''s policy without really
  thinking about what I was doing. Thank you guys for helping me work this out in
  my own mind. Next stop, fair-tax debate. Peace.'
date: '2008-11-13T14:53:59Z'
slug: 2008-11-06-redistribution-of-wealth
