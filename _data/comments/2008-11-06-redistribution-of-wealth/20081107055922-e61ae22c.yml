name: Jared
body: Obama may not wear the name "socialist", but that doesn't change the fact that
  he definitely leans towards socialist ideals. America already has enough quasi-socialism
  as it is. Well, chances are he won't be able to do half the things he promised anyways.
  Darn politicians and their "promises".
