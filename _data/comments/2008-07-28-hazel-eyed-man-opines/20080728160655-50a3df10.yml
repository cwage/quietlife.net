name: Paul Nicholson
body: I hear ya man. I'm just saying i think WSMV is doing this half out of habit
  trying to very loosely and sloppily follow AP style. I have no doubt that they also
  thought they were following style guidelines and avoiding redundancy by using "homeless"
  to imply "crazy". I was just trying to give them a little credit. No doubt that
  there is bias and full support of stereotypes. Not just for the homeless but for
  people that live in the projects or are found anywhere near La Fayette, Antioch,
  or even East Nashville for that matter.
date: '2008-07-28T16:06:55Z'
slug: 2008-07-28-hazel-eyed-man-opines
