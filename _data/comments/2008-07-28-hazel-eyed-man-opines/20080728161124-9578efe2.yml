name: cwage
body: Oh, I agree.. I don't think it's like some conspiracy because there's a homeless-hatah
  on WSMV's staff or something.. But the media has a ton of power and thus they have
  a responsibility not to propogate bias like that, whether it's intentional, or a
  subconscious/institutionalized thing, and I have a responsibility to call them on
  it when I see it..
