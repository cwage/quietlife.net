name: cwage
body: |-
  Yeah, I agree.. I was just talking to amanda about this.. I think in the end there's a confluence of factors for each of these emblems that makes each one less controversial in the end than, say, Hitler or a swastika on a t-shirt would be. Che Guevara, simply because most people are ignorant about who or what he was and represented. CCCP perhaps because the USSR endured a lot longer than the Nazis, and represented things other than Stalin's tyranny -- namely, in this context, 1980s reminiscence and kitsch.

  But in general I do find it interesting that Hitler has endured as a living symbol of pure evil, whereas Stalin has sortof been relegated as a historical leader of the USSR. I remember distinctly being relatively surprised when I first read of the atrocities committed at his hands -- surprised because I don't really recall this ever being brought up with any clarity in my high school history classes -- certainly not with the focus that Hitler and the Nazis got. Why is that?
