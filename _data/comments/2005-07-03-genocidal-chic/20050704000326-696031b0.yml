name: Doug Orleans
body: I think a CCCP shirt (I haven't seen these, are they really hip now?) is different
  from, say, a shirt with a picture of Stalin, whereas you can't really separate Nazi
  imagery from Hitler. But maybe that's too fine a distinction.
