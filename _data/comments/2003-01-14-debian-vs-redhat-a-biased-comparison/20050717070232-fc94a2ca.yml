name: Upali Joseph Weerasinghe
body: |-
  I was use Debian I think its 1994 then move to Slackware-3.x, then move to Redhat-5.1 then Redhat - 9, yes redhat was easy to use untill last week, I have to setup small PBX for little company, yes I use Redhat-9, cause they can't afford Redhat-ES, now test with Pentium-II 512-MB memory voice quilty was so bad, when its come to hevey load things are really crapy.
  so most ppl says ya install Fedora 4, I knew I can't do that with my little server, but I did it any way, but I couldn't even installed that monster.

  Ohh man what do I do, look all over the net. found good words form guys like you.

  Reformat Hard drives and Intall Debian, install Asterisk from CVS Head ya compile my self install zaptel module start asterisk, create extension for music-on-hold

  now I want to know how debian going to do. Ok on 1 terminal I start to compile Kernel and from another workstation SIP call music-on-hold - oh yes Debian is something else, its working no voice breake up
  so made few call from post line (land) amazing grace. its working

  I am no unix pro, but I am a Technician (Hardware) all I can tell you is, if you wanna server then Debian, and its easier than Redhat

  Thank you so much for making such High Quality Softwre

  Joe
