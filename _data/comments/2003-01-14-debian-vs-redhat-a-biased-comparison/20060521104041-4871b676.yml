name: Shachar Levy
body: You say that Debian is more stable than Redhat? Is that a joke? I have a RH
  9 box that has been up for over a month now, and had at one point been running for
  over a year without a single reboot. I don't know what kind of servers you run,
  but for a production environment, you had better have RHEL or at the very least
  CentOS.
date: '2006-05-21T10:40:41Z'
slug: 2003-01-14-debian-vs-redhat-a-biased-comparison
