name: IllegalImmigrationIntroduction
body: |-
  Of course, what you forget is that just as soon as the current illegal aliens were given an amnesty, millions more illegal aliens would come here to take their places and to take advantage of the current amnesty (via, of course, fake documents) or future amnesties.

  If you somehow think that if the massive amnesty passes then we'll start enforcing the laws, you need to think about this some more. The same - dare I say it - crooks that are pushing amnesty will still be around, and they'll have even more power than they had before.
