name: Erik
body: |-
  The context [here](http://news.monstersandcritics.com/northamerica/article_1045018.php/La._governor_wants_Superdome_evacuated "http://news.monstersandcritics.com/northamerica/article_1045018.php/La._governor_wants_Superdome_evacuated") is mounting violence in the Superdome.

  I thought you'd like to know that CNN has finally abandoned the rough riders framework: "Blanco said that conditions were deteriorating rapidly at the Louisiana Superdome -- the refuge of last resort for thousands of people who [could not evacuate](http://www.cnn.com/2005/WEATHER/08/31/katrina.impact/ "http://www.cnn.com/2005/WEATHER/08/31/katrina.impact/") the city."
