name: wrog
body: |-
  the Slate guy is just a douchebag.

  He keeps skipping over the fact that in typesetting there **is** a bit of extra space added after periods. It's there for clarity; people **do** want more space to delineate sentences.

  It's just that in typesetting, automatic kerning takes care of it so that you don't have to. But if you're using a **monospace** font, then you **have** to type the extra space yourself. Which is why the typewriter classes taught that and the same reasoning continues to apply.

  Never mind that some of us **still** live in a monospace world. (cf. everyone who writes software...)
date: '2011-01-24T11:06:49Z'
slug: 2011-01-16-on-spaces
