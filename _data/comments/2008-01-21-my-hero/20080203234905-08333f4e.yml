name: Rachel
body: |-
  America is just messed up. As a fellow American, it sickens me to observe how obsessed people are with celebrities. We watch their every move on television to the point where their own personal problems are consuming our lives. If they aren't talking about Paris, they are talking about Britney or Lindsay. It is sad, it almost seems like Americans *want* celebrities to fail. It seems that the more tragic and disturbed the celebrity is, the more attention they get. In my personal opinion, the entire reason celebrities act out like they do is for the attention. On the other hand, I think a lot of people, such as Britney Spears, wouldn't be where they are today, if the media would just leave them alone. I mean think about it, who WOULDN'T have a mental breakdown? She turns on the tv every day to see herself being made fun of and ridiculed for her decisions in life. I think if the media backed off, she a) wouldn't have the drive to act out and b) wouldn't be so consumed with other peoples opinions, thus making it easier for her to make wiser decisions, rather than being put under the spotlight and constantly pressured.

  But it probably won't stop, we will just keep sitting back and watching the famous people become corrupted. And we just keep tuning in. Before Heath Ledger passed away, was anyone buzzing about him? Was anyone talking about him and his new role in Batman? No, but now that he is gone, everyone talks about him like they deeply cared. They are even interviewing the people he bought coffee from. And as sad as it is to say, I can almost guarantee the popularity of the release of Batman will double, due to the fact that he passed away.

  The same applies with Anna Nicole Smith. Before she passed, everyone either ignored her or embraced her, simply to mock her and judge her. Granted, she wasn't the brightest crayon in the box, but she was still a human being. Everyone had their say on her behavior, but after she passed away, she was seen differently than she was when she was alive.

  The world is turning into a very sad place. When I was young, I wanted to be famous so bad. But to see the way the media plays out every celebrities move, I would rather just be a normal person. That way, I can make the decision of tuning in or tuning out, and in most cases, I would rather tune out.
