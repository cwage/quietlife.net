name: news dude
body: |-
  It all depends...Is she a reporter or an actress? She seems to think she is a news reporter, you two seem to think she is an actress.

  What if it was a man refusing to read that crap? What if it was Dan Rather or Mike Wallace? Would you still feel the same way? And if they did read that crap, would anyone consider them a journalist anymore? I wouldn't. The only "cunt" that should be fired is the editor that picks that as a lead story.
