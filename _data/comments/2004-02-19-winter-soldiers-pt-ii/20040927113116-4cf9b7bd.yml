name: Jefferson Opal
body: |-
  Chris,
   I'm delighted to find your web postings about the Winter Soldier Investigation, complaining about the widespread but apparently false claim that much of the testimony has been shown to be fraudulent.
   I recently found yet another such unsubtantiated accusation in the book Unfit for Command, by John O'Neill. On page 113 O'Neill tells readers that Burkett [in his book A Stolen Valor] "...reports, for example, that the National Archives can find no service records under the names of eleven on the individuals claiming to be veterans who testified at the Winter Soldier Investigation". Yet, when I searched the cited book I found absolutely nothing about this. Moreover, I found nothing about any testifier supposedly found to be fraudulent. Burkett merely said on one page that many of them were "phonies", but gave no evidence, nor cited any source.
  BTW O'Neill's book is full of such false claims about what his cited sources say. Please see my web page describing all the lies I've found in Unfit for Command: [http://www.geocities.com/je...](http://www.geocities.com/jefferson108/oneill "http://www.geocities.com/jefferson108/oneill")
