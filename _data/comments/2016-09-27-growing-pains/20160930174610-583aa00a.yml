name: Southern_Beale
body: 'Here''s a thought: why don''t you try living next door to one of these party
  houses and then check back with us "NIMBYs." Enjoy washing the vomit off your front
  sidewalk on Sunday morning when you go out to get your paper; relish in the serenade
  of fireworks going off at 2 am from the bachelor party next door. And yes, by all
  means, have fun playing our neighborhood''s fun new game: tourist or tramp? Is that
  sketchy-looking person you''ve never seen before in the neighborhood to scope out
  his next hit, or is he just a tourist in town for a few days? Then laugh hilariously
  as you recall the last neighborhood crime meeting when Metro''s neighborhood liaison
  cluelessly told everyone to "know your neighbors. Know who is supposed to be walking
  around your neighborhood and who isn''t" In this brave new world where residential
  neighborhoods are turned into tourist housing, good luck! Then, finally, remember
  the duplexes that used to be "affordable housing" rented long-term to college students
  and people earning under $40G a year, torn down by Aerial Development and Infill
  Nashville so they could be turned into STRPs, because Nashville''s real estate industry
  isn''t making enough money. You think Nashville asked for this? I assure you, we
  did not.'
date: '2016-09-30T17:46:10Z'
slug: 2016-09-27-growing-pains
