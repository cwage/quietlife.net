name: Doug Orleans
body: |-
  Kucinich [et.al](http://et.al "et.al"). will disappear from the headlines right after the Democratic National Convention, which is exactly when most voters start paying attention. Nader isn't in the Democratic party because he disagrees with huge portions of the party platform. (I suppose that doesn't explain why Zell Miller is still in the party, hm.)

  Nader will get far fewer votes than he did in 2000. He may not even get on many state ballots, since he's running as an indepedent instead of a Green. I have no idea why everybody's making a big stink about him as opposed to any other third party candidate with no chance of affecting the outcome (is John Hagelin running again?)
date: '2004-02-25T14:50:09Z'
