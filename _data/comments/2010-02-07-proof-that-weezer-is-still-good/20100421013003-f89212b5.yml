name: Christina
body: |-
  Hello, you don't know me and this comment is WAY off topic but I just had to say thank you so much for writing your blerp about the VW handle fix. It sounds totally stupid but this really saved me from you don't even know how much catastrophe. I just had the worst day ever and my broken door was a cherry on top. Thank you thank you thank you!
  Sorry to bomb your blog site... I just had to write a note.
  Oh and I totally love Weezer- but I think Pinkerton was way under rated... that was my college anthem album... my ex roomie understood ;)
  -Christina
date: '2010-04-21T01:30:03Z'
slug: 2010-02-07-proof-that-weezer-is-still-good
