name: Jackson Miller
body: Mike, if you go through with your sick little fantasy, chances are you will
  go to jail. While in jail it is likely that someone pin you down, cover your mouth,
  and rape you until you cry. This is especially true since the infamous "blue ball
  defense" never hold up in court since it is BULLSHIT.
