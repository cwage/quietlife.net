name: rorschach
body: 'Scavenger: You''re missing a key word there. "...fertilizer is (currently)
  based on fossil fuels." It needn''t be. The world isn''t short of energy. The world
  is \_made\_ of energy. What it is short of is people willing to look at non-fossil
  based methods of energy production.'
date: '2009-03-09T14:12:57Z'
