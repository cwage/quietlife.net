name: Mack
body: Sugar cane is no magic bullet either. The uncomfortable truth is we need to
  re-think the way we do cities, and we MUST have re-tool for public mass transit,
  and local sustainable living. There is NO other choice. There is nothing more important
  for us to focus on, right now. Great post, Chris.
