name: Scavenger
body: |-
  There's an even larger related issue. You point out that fertilizer is based on fossil fuels. Indeed, the ["green revolution"](http://en.wikipedia.org/wiki/Green_Revolution "http://en.wikipedia.org/wiki/Green_Revolution") of the 50s and 60s that makes it possible to feed the world's current-and-still-growing population is completely dependent on fossil-fuel-based fertilizer. We dodged the [Malthusian catastrophe](http://en.wikipedia.org/wiki/Malthusian_catastrophe "http://en.wikipedia.org/wiki/Malthusian_catastrophe") then, only to tie our food to fossil fuel production.

  That's right, if the Peak Oil folks are right, not only will we be short on energy, we'll be short on food at exactly the same time.
date: '2007-06-18T15:50:45Z'
