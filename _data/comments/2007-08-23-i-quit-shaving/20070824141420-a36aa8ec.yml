name: Emily
body: 'There are 2 types of girls in the world: those who dig it and those who don''t.
  Just hang with the ones that do and you''ll be gold. Plus the fact that you are
  still, technically ''grooming'' scores the points you need to maintain in the hygiene
  department.'
