name: Jackson
body: |-
  I have been doing this for a couple of years. It is pretty rare that I actually shave with a razor. Sometimes I just shave my neck and trim the ret (with no guard or on the lowest setting). It is like a micro beard.

  Ok, why the hell am I divulging my lazy vanity on the internet?
