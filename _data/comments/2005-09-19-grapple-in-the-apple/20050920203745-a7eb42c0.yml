name: Steve L.
body: Yeah he could lose, but then again, he has a much more sober, even-handed approach
  to political issues than most who engage in such debates. So that's an advantage.
  But it would be interesting how he would fare without the cushion of the writing
  staff of the Daily Show at which, in my opinion, is where the real genuis of the
  show exists (instead of the interview segment) For example has did anyone see "Evolution
  / Schmevolution" report when they visted Dayton, TN? Maybe one of the funniest /
  most disturbing things i've seen in a while.
date: '2005-09-20T20:37:45Z'
