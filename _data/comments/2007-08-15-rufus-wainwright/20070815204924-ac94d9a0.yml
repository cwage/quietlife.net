name: steph
body: I was there, and yeah, it was amazing. I especially loved the musical theatre
  number for the encore, and particularly delighted in how awkward but game the band
  was. It was probably the gayest thing to ever happen at the Ryman, and it was awesome.
  [Though from where I sat--with the exception of the acapella song--it sounded terrible.
  Which baffles me.]
date: '2007-08-15T20:49:24Z'
slug: 2007-08-15-rufus-wainwright
