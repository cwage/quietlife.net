name: cwage
body: People rant and rave about the acoustics at the Ryman -- and don't get me wrong,
  it's a pretty awesome theatre.. But there are some pretty wicked dead spots, in
  my experience.. The second time I saw Elvis Costello I was stuck behind a pole where
  I couldn't hear anything but bass..
date: '2007-08-15T21:00:02Z'
slug: 2007-08-15-rufus-wainwright
