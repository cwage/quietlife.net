name: aldon
body: |-
  A few comments, caveats and random thoughts.

  This is based on donations through the end of June. It will be interesting to see what happens when the third quarter numbers are released and analysed.

  I also found the average donation size quite interesting. Bush had the largest average donation. Kucinich had the lowest average donation. Dean was next to the lowest. I think that says something interesting about who is a fat cat and who isn't.

  A number hidden in there, but not listed directly is which is also interesting, is a breakdown of the number of donors that had not given $2000. Bush actually did fairly well in this calculation with 7,521 donors in this category, so, while Bush gets the most from fat cats, he does get a lot from not as fat cats. That said, Howard Dean got more donations below the $2000 threshhold, 7,841 than any of the other candidates, including Bush.

  As Deep Throat advised us, 'follow the money'. I think there is a lot of interesting information yet to be gleaned.
date: '2003-10-10T13:02:15Z'
slug: 2003-10-10-fat-cats
