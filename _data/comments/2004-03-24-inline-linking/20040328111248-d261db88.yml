name: Billy The Blogging Poet
body: The biggest problem appears to be the sites that are hosted by services such
  as blogrollong and blogggster-- they are often down and load the entire site at
  a very slow pace. I do have a blogroll on my site but in most instances the rest
  of the site (the content part) will fully load and be readable before the blogroll
  loads.
date: '2004-03-28T11:12:48Z'
slug: 2004-03-24-inline-linking
