name: cwage
body: 'I don''t think there''s anything that is off-limits for making fun out of.
  You keep using the phrase "making fun of" as if to imply that the joke was intended
  to condone objectification or sexism. So I''ll ask again: do you think that the
  Onion believes this 9 year old girl is inferior and intended to make her feel bad
  about it?'
