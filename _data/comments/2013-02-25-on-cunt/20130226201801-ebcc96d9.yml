name: 1nm
body: Except that Abigail Breslin and Dakota Fanning and Anna Pacquin when they were
  up-for-acting-awards-while-young didn't have remarks like that made about them,
  did they? Yes, there's a racial element in the outrage, but I think it plays out
  in the recognition that Quvenzhané Wallis is more vulnerable to being attacked as
  a female because of her race, and not because of some nonexistent lack of concern
  for a hypothetical Ms. Wasp. I mean, plenty of the same people who are pissed off
  at *The Onion* now were equally pissed off, and equally vocal, when David Letterman
  made his stupid "joke" about Sarah Palin's daughter.
