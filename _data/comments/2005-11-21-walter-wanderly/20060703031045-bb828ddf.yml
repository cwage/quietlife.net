name: Louise DeLucchi
body: Hi Well, I have to agreed with you about walter I had the pleasure of singing
  with him for a year in 1972 in san francisco and some other cities. There was no
  one like him with his jazz style on the b3 he truly was unique. I'm happy to know
  that people are still listening to him and appreciate his music.
date: '2006-07-03T03:10:45Z'
slug: 2005-11-21-walter-wanderly
