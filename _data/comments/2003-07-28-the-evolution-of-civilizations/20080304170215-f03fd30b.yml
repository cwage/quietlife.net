name: judith lawson
body: |-
  I was Quigley's student in Dev Civ and Intellectual History of Western Civ in the mid-sixties. During the past two decades
  I've recalled much that he taught that has clearly influenced
  us and our times. So kudos to our great prof, and a Big Question -- how do we assemble a bright new civilization from the detritus of greedy crumbling empire?
date: '2008-03-04T17:02:15Z'
