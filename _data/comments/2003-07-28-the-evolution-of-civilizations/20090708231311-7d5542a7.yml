body: |-
  I am about to read evolution of civs, and will eventually read tragedy and anglo-american...
  i have to ask, what is your take on the fact that his evolution of civs book is so short, and has hardly anything for sources and notes? my friend went to Georgetown had his class and holds today that the guy is a fraud. I am already impressed by what I read of the man, and can see already that he seems to have been one of the authors of the many books ive read in search of understanding the power and position behind histories players.
