name: scott
body: I've known several missionary kids personally, and though I believe you're mostly
  right, I think the word "rich" should be removed from your statement. The whole
  point of it is that it's a free trip which the church (or church community) is paying
  for because they're doing the work of God while away. Rich kids don't need such
  a guise; they just ask their parents for the money.
date: '2006-01-11T13:13:33Z'
slug: 2006-01-10-an-offensive-notion
