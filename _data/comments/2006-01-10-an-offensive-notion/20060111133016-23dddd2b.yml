name: tenzil
body: I dunno. My father-in-law is a minister; he and kids from their youth group
  went and did a few mission trips while his kids were in their teens. They did real
  and good things, not proselytizing at all (if anything they learned more about local
  religious custom than they promulgated). Yes, certainly the kids got something out
  of it, but it was hardly a vacation. The stuff they got out of it was wacky ideas
  like "we are very lucky to have what we have" and "people are generally good."
date: '2006-01-11T13:30:16Z'
slug: 2006-01-10-an-offensive-notion
