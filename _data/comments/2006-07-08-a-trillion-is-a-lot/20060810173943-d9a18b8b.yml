name: JEFF ANDERSON
body: You are full of it. You can make statistics say anything you want. The truth
  is that americans have more money in their pockets and businesses have more money
  for expansion because they are paying less in taxes, and that my friend causes economic
  growth. Yes, we have a large national debt, but when you compare it to our GNP it's
  actually not that large. You must be one of these people that just love to pay more
  and more taxes, but if you'll add up all the taxes and I mean all of them (federal,state
  and local)you will find that you are paying well over 50% of your income in taxes.
  That my friend is socialism not democracy.
date: '2006-08-10T17:39:43Z'
slug: 2006-07-08-a-trillion-is-a-lot
