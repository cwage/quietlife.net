name: Erik
body: |-
  [More details](http://www.manchesteronline.co.uk/men/news/health/s/158/158781_antismoking_jab_closer.html "http://www.manchesteronline.co.uk/men/news/health/s/158/158781_antismoking_jab_closer.html"), after the announcement.

  > All those given the vaccine created anti-nicotine antibodies and the levels in their bloodstream were divided into three groups - high, medium and low.

  About 30% of those with medium levels of antibodies stopped smoking--same as a placebo. With high levels of antibodies, the rate rises to 60%.
