name: Wendi Johnson
body: I went to the ASAP clinic. They tested me for allergies and said I didn't have
  any. I have been dealing with severe sinus problems for as long as I can remember.
  There was no CT scan ordered for me at the ASAP clinic, even after I informed them
  that I had had a previous accident in college in tumbling class where the accident
  left me with a punctured sinus cavity and that I had already had one sinus surgery
  after the matter and the surgery didn't work. I continued to tell them that nose
  sprays had actually worstened my condition, and the ones that had not worsened it
  didn't do any good. The preceeded to tell me that they didn't work because I used
  my nose spray the wrong way and jsut prescribed me more!!!! Right!!! Okay I have
  had doctors throwing nose sprays at me and telling me how to use them for about
  20 years. I asked them if there was any other way for any kind of relief. They said
  that because I didn't have allergies there was nothing that can be done. And he
  paid how much to go to medical school? Did he fake the resume??? The beggest problem
  is that they just decided that they weren't going to listen to me and felt since
  they were the ones with the doctorate that they didn't need to listen. What idiots.
date: '2007-08-07T22:15:31Z'
slug: 2002-01-02-well-i-have-some-good
