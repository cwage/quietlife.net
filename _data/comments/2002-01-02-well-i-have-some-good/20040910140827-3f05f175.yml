name: cori
body: Hi Chris, I wish you'd tell what doctor you went to. I'm having a devil of a
  time trying to decide what doctor to see about a chronic sinus/throat/ear problem.
  I don't just want some duffus giving me antibiotics. I want to get to the root of
  the problem. Anyway, if you could post this info, it'd be a great help to others.
  Until then, I'm keeping shopping. I sure don't have the money to spend on lots of
  doctors. Thanks, Cori
date: '2004-09-10T14:08:27Z'
slug: 2002-01-02-well-i-have-some-good
