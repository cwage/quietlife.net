name: Kelly
body: I went to ASAP for a couple years. I tended to get sicker and sicker the more
  I went there. Sure they'd shoot me up with some (unnecessary) antibiotics and a
  steroid shot, which would make me feel better for a little while, but eventually
  I'd go back to status quo, so they gave me more and more meds. It was like a chiropractor,
  they just kept me coming back over and over, without real results. Treating the
  symptoms, not curing them.  However, the one thing that they did do was give me
  a "nasal douche" which is like a neti pot. (and not like the squirt bottle like
  Delaney mentions above)  I still use that just like a neti pot to clear out my sinuses
  and it's great. So that's weird they tell you not to use one now. But ultimately
  what "cured" my allergies and sinuses was acupuncture, and regular use of my neti
  pot/nasal douche thing.
date: '2011-12-20T14:13:27Z'
slug: 2011-12-19-neti-pot-hysteria
