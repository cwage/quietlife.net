name: Brewbetter
body: I live in South Texas, and have been using a Neti Pot for about 3 years.  It
  didn't take long to ditch the little packets of salt you pay ten cents for that
  has about .001 cents worth of salt.  I mix my own, non-iodized salt and baking soda.
   I got the email like most from a friend about the brain eating bacteria, and I
  did have a hard time with it.  I know, it's not likely to happen to me, living in
  a small town with a modern water department.  Still, I came up with a solution that
  cost $20, and I can sleep at night.  I bought a Sunbeam electric water heater and
  plugged it in the bathroom.  It boils 1.5L of water in 4 minutes.  I filled up a
  cleaned 1L soda bottle with boiled/cooled water.  So now, I have a electric kettle
  full of boiled cool water.  Turn it on when I get up, and in about 1-2 minutes,
  the water is about 110 degrees.  I turn it off and use it.  If it is too hot, I
  cool it down with the cooled boiled water in the soda bottle.  The kettle turns
  itself off when the water gets to a boil after a few minutes.  Now, after all that,
  I agree with cwage that this should be a non issue.  And it is not clear if those
  two people who died were using tap water or water from a natural hot spring.  I
  retire in a few years, I'm not giving up my neti pot and I am going to spend most
  of my 401K on me.
