name: charliemac
body: I had nasal surgery earlier this year at Vandy and as part of the recovery I
  was prescribed to flush regularly with the NeilMed bottle  —which I have now come
  to love. The directions said to use distilled water and microwave after every use.
   After following that pretty religiously, on my checkup I told the doctors about
  it and they looked a little surprised and basically said I didn't need to do any
  of that. I still microwave the a little before each use but not the 90 seconds it
  asks for.  I've also found that 1/2 tsp of **non-iodized** sea salt works just as
  good as the packets.
