name: Delaney Gray
body: |-
  Wow, I really want to talk about this! Firstly, Vandy ASAP gave me this squirt bottle instead of the neti pot. They said that if people get the wrong angle to the neti, it can leave water up in there and cause ear infections. The squirt bottle doesn't depend on a specific angle, and I've had great results with it. [http://www.neilmed.com/usa/...](http://www.neilmed.com/usa/sinusrinse.php "http://www.neilmed.com/usa/sinusrinse.php")

  Also, I'm having sinus surgery on Thursday, and I'd love to ask you some questions about your experience. I'm nervous and mostly wondering a. how much of Christmas it's going to ruin and b. the likelihood of needing to get the surgery again in the future. Can you IM me on FB?
date: '2011-12-19T21:22:53Z'
