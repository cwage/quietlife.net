body: |-
  I just bought an RX-8 and would really like to have more power but I don't know where to start I don't have all the money that some might. asking you cause 950 HP sounds like a grate thing, something that I'd like but for now what would be the cheapest way to get 50 HP out of my stock 1.3L rotary engine I'm thinking a turbo my girlfriend thinks I'm crazy and that it's fast enough but I need more can you help me with some ideas. I love the car it corners grate but is just not fast. And I hate to say that about my car. All I want is to beat my roommates G35 and have him wondering what happened if you could help me with this. We haven't raced yet but he's cocky, he Say's he knows he'll win and I'm sure he would but maybe with your help he won't.

  Ryan Sproule
