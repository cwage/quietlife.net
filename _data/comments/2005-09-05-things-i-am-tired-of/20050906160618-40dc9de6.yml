name: Wes
body: Bill is a republican's Republican, what else do you expect him to say? The bus
  story is simply great 20/20 hindsight...this, afterall, is the first hurricane to
  ever hit an area since school buses were invented and they are designed to carry
  school children, not evacuees. Bill must believe that the bus drivers were excluded
  from the evacuation order...the liberal drivers should be shot for not staying with
  their sinking busses, the conservative drivers were waiting on GW for better intelligence...you
  want to go there?
date: '2005-09-06T16:06:18Z'
slug: 2005-09-05-things-i-am-tired-of
