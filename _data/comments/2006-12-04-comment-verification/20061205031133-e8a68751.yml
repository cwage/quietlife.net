name: Cubes
body: Why not just have a large selection of instructional phrases which require an
  understanding of the English language (I'm thinking of the old PC games where the
  license key was something like "enter the fifth word on page 37 of the manual").
  Switch randomly from "Enter 'foo' wthout the quotes" to "Type in the third letter
  of the last word of this sentence" to "Count the number of words in this sentence"
  and so on. I guess the spammers could watch and figure it out, but if everyone came
  up with their own set of Q&As, they'd have a much harder time of it because it wouldn't
  just be screen scraping and OCR, they'd have to have humans back in the mix, a lot.
