name: V E Dayman
body: It was interesting to read your comment about the 'SOY' in coffee delight creamer.
  I used to add an 'own brand' but my daughter bought me Coffee Mate by Nestle. Since
  having this my urticaria has been a real problem, so I will see if changing back
  to the 'own' brand improves it. Thanks Clint, for your comments.
