name: Anonymous
body: I too have urticaria-and I also am addicted to caffine...I thought that it was
  somehow related but I couldn't seen to stop drinking it. I drink at least 1 and
  a half pots of strong coffee a day.........you're the first person I 've read about
  that has assosiated caffine with this horrable thing(urticaria)..There may be something
  to that theory--As for the sinus ifections, I know for a fact that in my case Sinusitus
  came first...nose wouldn't stop running for over a month.....the I was given Flonase...nose
  stopped running...itching started.Now I take Reactine daily and I think it's causing
  the sinus infections. Catch 22........
