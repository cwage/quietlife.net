name: James Kiley
body: The key to remember is that the Alliance is Mal's enemy. As they point out in
  the movie, Mal volunteered to join the Confeder^H^H^H^H^H^H^H^HRebel^H^H^H^H^Hbrowncoats
  when the war started. He genuinely believes that the Alliance is wrong, has done
  wrong, will continue to do wrong. The guy he shot was an Alliance guy that had just
  participated in the slaughter of an unarmed camp.
