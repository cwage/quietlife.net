name: Kevan
body: Pol Pot came to power mostly because the U.S. "secretly" bombed Cambodia, destabilizing
  the government and giving him the leverage he needed to take control. Afterwards,
  it was the Vietnamese invasion in 1979 that ended the killing fields, an invasion
  they wouldn't have undertaken had the U.S. still been in country.
date: '2007-05-01T20:52:32Z'
slug: 2007-05-01-krumm-on-withdrawal
