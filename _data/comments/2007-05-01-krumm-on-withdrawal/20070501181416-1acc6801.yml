name: Bob K
body: |-
  I read that earlier, and although there is a chance the writer is correct, the greater chance is that he is wrong. The history paints a clear picture that American withdrawal results quickly in American apathy: 1973 Southeast Asia, 1982 Lebanon, 1992 Philippines. To the best of my recollection, American retreat has never resulted in increased American leverage after withdrawal. Instead, we move on. And the result has usually not been for the better.

  (You could argue that the withdrawal from Southeast Asia hasn't yet resulted negatively in an area of American vital interest--and you would be right, unless you consider "human interest" an American interest. On that note a million Cambodians might disagree.)
