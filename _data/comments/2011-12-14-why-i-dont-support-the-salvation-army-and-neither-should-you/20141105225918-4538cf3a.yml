name: Joseph
body: The Salvation Army is a Christian Church whose ministries are numerous, including
  the many social services everybody is well aware of. The issue in New York was one
  that would have The Salvation Army go against a fundamental belief that Marriage
  is supposed to be between a Man and a Woman. If they would have accepted the proposed
  ordinance they would be agreeing that marriage is not what God had intended. I only
  pray as a member of the Salvation Army that our leaders will continue to make the
  right choices when it comes to our (Christians) fundamental beliefs.
date: '2014-11-05T22:59:18Z'
slug: 2011-12-14-why-i-dont-support-the-salvation-army-and-neither-should-you
