name: Poupic
body: I always give my discards to The Salvation Army despite my being a Jewish Atheist.
  I survived the Shoa because Capitaine Riom hid me in a orphanage in Besançon France.
  Two of my cousins fell in the hands of the Catholic church that saw the Shoa as
  an opportunity to steal Jewish children. Both were baptized. I owe my life to Capitaine
  Riom of the Salvation Army. You bet, I will continue giving them what I do not need.
  They need it to help others just like they helped me.
