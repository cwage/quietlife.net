name: Anonymous
body: To be fair, The Salvation Army does not have a political agenda. As a 501(c)3
  religious organization, they are not bound to any political party and actually have
  the right to have their own hiring processes, as they see fit. While I do not know
  the details of what happened in New York, I can say with confidence that the donations
  that are made to The Salvation Army, whether through the National Red Kettle Campain
  or through individual donations throughout the year, go towards helping billions
  and billions of people across the 123 countries that The Salvation Army is located
  in. And, on another note entirely, The Salvation Army is one of the leaders as far
  as benefits for all of it's employees and their families, inlcuding the thousands
  of homosexual employees employed worldwide. So please, the next time you decide
  to rant about an organization as a whole, make sure you actually know what you are
  talking about instead of using one isolated incident to fuel your fire.
date: '2011-12-14T20:52:07Z'
slug: 2011-12-14-why-i-dont-support-the-salvation-army-and-neither-should-you
