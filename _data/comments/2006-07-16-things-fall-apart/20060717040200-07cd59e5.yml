name: medvegonok
body: |-
  Israel itself initiated the violence - bullshit. Israel was systematically attacked Hamas's and Hezbollah's rockets for a long period. And they attacked Israeli cities further and further away of their own borders. The latest escalation was just step up by both of them that just crossed the red line. Up to Ashkelon + up to Haifa means that about half of Israel is under rocket attacks.
  Hamas and Hezbollah are trying to reproduce the same guerilla tactics that is used against US troops in Iraq at Israeli borders.
