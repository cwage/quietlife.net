body: |-
  We were at the north end of Wears Valley, basically right between Pigeon Forge and Sevierville on 321.. The place was called Dogwood Farms..

  I actually thought about putting out the last-minute APB for east-TN bloggers, but we needed some serious secluded decompression time.. But we'll be back out there for sure -- it's gorgeous..
