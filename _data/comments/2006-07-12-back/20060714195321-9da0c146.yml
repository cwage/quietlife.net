name: Les Jones
body: I know just about where you were, probably near the road that goes over to Greenbriar
  school/Metcalf Bottoms. If you ever go again, there's a nearby trailhead that takes
  you on a great, short hike (about a mile each way and very flat) to the Walker Sisters
  cabin, which is a very cool place.
date: '2006-07-14T19:53:21Z'
