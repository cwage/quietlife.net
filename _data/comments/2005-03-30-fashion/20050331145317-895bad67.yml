name: Muffy Wong
body: |-
  There's a shoe store in East Nashville that is (as a conservative co-worker described) very flamboyant. It's owned by an older gent, and is called Abe's Shoes Store. I think.

  I'm going to check it out one of these days - apparently the clientelle is primarily pimpin' black men who want really snazzy, yellow or brightly colored dress shoes. Price range $50 and up.

  Sounds interesting.

  I like shoes.
