  I have actually had pretty good luck with the insides. They are comfortable, I'll give them that. But i have one pair that already has a massive hole and a current pair well on their way.

  There's evidently an authorized rockport re-soler that you can ship them off to but it was like $30-40 a pop to get them re-soled, plus shipping. Screw that!
