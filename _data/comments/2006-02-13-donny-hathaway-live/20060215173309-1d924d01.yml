name: Muffy
body: |-
  I must be missing something, what does Buckethead have to do with Les Claypool?

  Y'know, it's really tough to try to say who's a better bassist or musician when they're all, clearly, so damn good. Les Claypool is amazing but he's in a realm of his own and to me, different in style compared to wooten/hathaway et al. That might just be me though.
date: '2006-02-15T17:33:09Z'
slug: 2006-02-13-donny-hathaway-live
