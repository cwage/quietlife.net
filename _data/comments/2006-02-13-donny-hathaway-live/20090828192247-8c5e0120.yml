name: Leah
body: I like Weeks, and Pino Palldino shouldn't be dismissed lightly either. I'm surprised
  anyone in this era would think anyone is more accomplished than Victor Wooten. However,
  I find Oteil Burbridge of the Allman Brothers to be really good, too. My all-time
  favorite though, is Jaco Pastorius.
date: '2009-08-28T19:22:47Z'
