name: ETnGuy
body: It takes pennies to make dollars. Racism and bigotry these days is not accepted
  in general discussion around the dinner table or the board table (unless you are
  gay) but the facts are it is still there and just as abundant. To not see it or
  believe it quickly identifies one as extremely naive and wearing the largest blinders
  available. It is spoken of or referred to in code speak or nodding agreements.
date: '2005-09-01T18:17:28Z'
slug: 2005-09-01-racist
