name: winston
body: Because I'm feeling contentious this morning; why on earth would you say the
  opposite of science is faith? Science involves a great deal of faith, whether it
  be faith that the laws of physic really are the laws of physics or faith that our
  reason and experimentation can arrive at concrete understanding of the world, or,
  if you really want to go back, faith that something came from nothing, which is
  the origin of the universe from a big-bang point of view based on my understanding.
