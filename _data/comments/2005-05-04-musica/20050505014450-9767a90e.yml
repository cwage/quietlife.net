name: Erik
body: I have just the opposite problem. These days it's not uncommon for me to buy
  an album and \*never\* play it. New stuff just goes into the iPod, and as it comes
  up on shuffle play maybe it'll get enough of my attention for me to listen to the
  whole thing through at some point.
date: '2005-05-05T01:44:50Z'
slug: 2005-05-04-musica
