name: Eclipse
body: I have a coworker who djs and loves this kind of music. I've listened to a lot
  of it but most of it so far hasn't moved me, with the exception of The Arcade Fire,
  which truthfully don't really neatly fit this category of new-wave throwback nostalgia
  bands. But if you want any suggestions, let me know - I have my coworker's playlist
  via iTunes sharing at the office and can probably give you some names to check out.
  :)
date: '2005-05-05T08:15:16Z'
