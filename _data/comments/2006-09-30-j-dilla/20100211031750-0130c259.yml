name: Matt
body: Man, I couldn't agree more with you about dilla.. it is truly impossible for
  me to pick a single best album, as there are unarguably so many gems throughout
  the years of dilla's work.. But it is like, wow... doughnuts just touches closer
  to my heart, my soul, and my very being more so than any other album I have heard
  as far as hip hop beats or instrumentals go. Rest in peace and serenity dilla. This
  dudes music brings vibrant color into your life.
date: '2010-02-11T03:17:50Z'
slug: 2006-09-30-j-dilla
