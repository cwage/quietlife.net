name: john h
body: Other than the rodeo and the Pentecostal revival bit, I missed any scathing
  commentary on the USA..on the other hand, I laughed my ass off pretty much throughout
  the movie. I was scared this was going to be one of those movies my wife hated,
  a la Jackass, but she laughed as much as I did. I'll call it successful..as a comedy.
