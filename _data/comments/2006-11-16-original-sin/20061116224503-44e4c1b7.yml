name: Glenn
body: To get back to the root of what bugged you -- are you saying that human beings,
  as we are, are *not* innately flawed? And maybe flawed isn't the right term, since
  all that was implied in the episode was that humans (and otters) are bound to find
  things to fight about. And I think we are, innately. I'm more curious about whether
  humanity is fundamentally prone towards conflict -- if we manage to write xenophobia
  out of out genetic and cultural makeup, how human will we be?
date: '2006-11-16T22:45:03Z'
