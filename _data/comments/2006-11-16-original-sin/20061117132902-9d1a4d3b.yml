name: Jon
body: You're describing some pretty esoteric interpretations of Christian doctrine
  which require turning Original Sin and even Jesus himself into mere metaphors. I
  agree that if you make such interpretations, then Christianity does indeed become
  "another path to the top of the mountain". But while such interpretations do exist,
  but they seem to me the exception, not the rule. It's not what Joe Christian is
  taught in Sunday School.
date: '2006-11-17T13:29:02Z'
slug: 2006-11-16-original-sin
