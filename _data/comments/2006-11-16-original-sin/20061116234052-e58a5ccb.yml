name: Mack
body: I can't say I know the first thing about Buddism. But I have "felt" for the
  longest time, that we are minute parts of one sort of live giving entity, that is,
  all of us are God, in the making. I'm sure someone will tell me what particular
  religious philosophy embraces this idea. I think the idea is too experience non
  "perfection", so that when we reach a perfect state, we will have something to compare
  it to...sort of the hot/cold analogy.
