name: Jon
body: The Buddhist conception is the polar opposite of the Christian conception. The
  Christian conception is that we are inherently evil and can only be 'saved' by the
  exterior force. The Buddhist conception is that we are born perfect and our perfect
  Buddha nature is always part of us, we just lose sight of it as we lose ourselves
  in samsara. We need no external force or savior to return to our perfect nature,
  only our own willingness to follow the path back to our true nature.
date: '2006-11-16T22:55:40Z'
