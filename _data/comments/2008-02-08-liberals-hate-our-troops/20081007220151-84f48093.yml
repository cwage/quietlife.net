name: mike
body: YES Berkeley, some of us in America actually honor the Marines and the military.
  Now I know that most of you in Berkeley are spoiled rich kids who have Daddy's credit
  card to spend as you wish, and who have no need to worry about College tuition,
  even while you mock your peers in the military, many of whom joined just so they
  could get into college as well, and call them "BABY KILLERS" and "WAR JUNKIES" but
  God forbid you had to live in a country that didn't have a military to protect you,
  you would not survive one day!
date: '2008-10-07T22:01:51Z'
slug: 2008-02-08-liberals-hate-our-troops
