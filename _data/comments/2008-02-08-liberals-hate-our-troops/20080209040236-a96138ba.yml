name: Andrew
body: Applause for Berkley, they are exercising true democracy by protesting the war
  in Iraq and the federal government who made it possible. Instead of criticizing
  Berkley, people should learn from them and practice their rights. What Berkley is
  doing is 100% pro-American and in no way critiques the troops in Iraq, only the
  government who sent them there. Individuals should be shocked and furious that the
  federal government is actually going to punish a city for exercising their rights...what
  a scary world when a group of peaceful protesters are punished by the federal government
  and people actually agree with it, good thing we are not in N. Korea because that
  would never happen in America...
date: '2008-02-09T04:02:36Z'
slug: 2008-02-08-liberals-hate-our-troops
