name: Amanda
body: Yeah I much prefer it when candidates lay down. That's much more inspiring.
  I also like it when candidates let reporters put words in their mouth and then are
  too stupid to realize the fallaciousness of the tactic. Kudos to Clark for realizing
  the reporter was taking something he said and twisting it to make him look bad.
  I think if anything it demonstrates a command of critical thinking which is generally
  something I find useful in the leader of the free world.
date: '2003-11-24T14:29:03Z'
slug: 2003-11-19-clark-on-fox-news
