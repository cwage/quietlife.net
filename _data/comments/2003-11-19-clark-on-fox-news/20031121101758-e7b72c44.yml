name: Finlay
body: |-
  I watched it and, if anyone comes of looking like a jerk its Clark. What an uppity little brat. Seems to me the good general thinks he is still issuing orders from on high and that his subordinates have no right to question him. The FOX reporter asked a legit question, and Clark flipped out on him.
   No wonder the left has no shot, they think performances like Clark's are a victory. Poor misguided fools.
date: '2003-11-21T10:17:58Z'
