name: cwage
body: |-
  > *"Ideological" in a political context is used not to mean "relating to ideology" but "driven by an ideology,"*

  You're right, but although I think that's kinda my point.

  The term carries the implication that anyone with the ideology will be driven (and blinded) by it. Yet it's applied to anyone liberally if they meet the less strict and less political definition of "relating to ideology". i.e.: Kucinich believes in healthcare for every person, therefore he is ideological, therefore he will invariably be blinded by it somehow, some way.

  It's like a mix between an ad hominem and slippery slope.
