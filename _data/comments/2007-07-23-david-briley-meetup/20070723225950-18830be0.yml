name: Krissa Barclay
body: Thanks Chris. And if anyone wants to help the Briley campaign after meeting
  him Tuesday night, please invite them to come write postcards to their friends and
  neighbors in Davidson Co. on Wed. and Thurs. night at Eastwood Christian Church,
  1601 Eastland Ave. Castrillo's pizza and childcare provided.
