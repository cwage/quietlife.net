name: Aunt B.
body: My favorite thing about all this nonsense is all the people insisting that Christy
  was somehow hiding her connection to refugee resettlement and Brian was doing the
  work of the Truth in revealing it, when she says right on her blog what her job
  is. Somehow, because folks can't be bothered to read, Brian has made some grand
  discovery. Well, Chris, in that spirit, I'd just like to say that I'm on to you.
  Though you don't disclose it here, I know you walk around Nashville taking pictures.
  Now, people can decide for themselves if you have a pro-Nashville bias that you've
  kept hidden.
date: '2008-08-05T15:30:29Z'
slug: 2008-08-03-a-conspiracy-of-charities
