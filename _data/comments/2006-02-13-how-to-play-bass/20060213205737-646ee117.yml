name: Kuncklehead
body: |-
  When I first got to Nashville many years ago, someone gave me Jonell Mosser's phone number. I called and she said, "sorry, we just hired Victor Wooten." This was before Bela Fleck and all that. I remember thinking, "Well, I don't know who this Victor Wooten is, but you don't know what you're missing by not hiring me." Then I saw him play. Extra large slice of humble pie, please.

  I ended up playing a bunch of gigs with his brother, Reggie. I didn't even try to pretend that I was any good.
date: '2006-02-13T20:57:37Z'
slug: 2006-02-13-how-to-play-bass
