name: sirslud
body: |-
  Couldn't agree more re: Stakes is High. As a huge De La fan, I think it was the most successful fusion of their equal abilities to rock stripped down NY block beats (Big Brother, for instance) and the jazz inspired tracks.

  Plus, hey, one of the early Mos Def contributions. One of my favorite albums of all time. The sound clip with the 'cowboy' is priceless alone.
date: '2004-07-14T17:48:01Z'
slug: 2001-12-20-de-la-soul-aoi-bionix
