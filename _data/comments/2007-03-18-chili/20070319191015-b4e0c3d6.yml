name: Mack
body: Poor, misguided Chris. I agree about beans, it's chili, for crissakes. However,
  what kind of chili do you use? There are many varieties, many flavors. From the
  pic, it looks like you are using jalapenos, and they do not belong in a serious
  pot of chili.
