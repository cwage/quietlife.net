name: bone
body: It isn't about the race of the U.A.R. It is about what country it is. I guess
  I should accept that everything is fine since it meets Bush's "ally in the war on
  terror" standard. Packistan ia also a "key ally " in that war , but only an IGNORAMUS
  doesn't know who A. Q. Kahn is. So, is everyone who raises concern at what looks
  like a grossly negligent case of pre-911 mentality an ignoramus now?
