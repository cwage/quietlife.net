name: Erik
body: |-
  I don't know much about port security; my hunch is to agree with Nick on the substance. But his post isn't well-written or insightful. I guess if I were in the choir I'd sing along.

  P.S. Does it matter that Dubai Ports World is not just owned by foreigners but owned by a foreign government? Does it matter that Dubai is a [logistical hub](http://www.usatoday.com/news/world/2004-09-02-terror-dubai_x.htm "http://www.usatoday.com/news/world/2004-09-02-terror-dubai_x.htm") for al-Qaeda? I don't know, but I don't think it's racist to ask.
