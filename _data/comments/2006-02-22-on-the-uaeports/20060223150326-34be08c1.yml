name: cwage
body: Ad hominem, yes. The entire point of the post was critical of "the person".
  So, it's not a fallacy, but hey, good observation. I'm not calling "those I disagree
  with" ignorant racists. I am calling people that are demonstrating either ignorance
  or racism ignorant racists.
