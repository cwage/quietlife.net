name: doug
body: I have so little understanding of the port system of the US that for all I know
  we may be better off letting Saddam guard them. What disturbs me about this episode
  is that you can't tell me that someone somewhere in the government didn't think
  to say "Hey, maybe this isn't going to look so good?"
date: '2006-02-22T21:12:36Z'
slug: 2006-02-22-on-the-uaeports
