name: Erik
body: |-
  Ah, ad hominem. Critics of the port deal didn't know much about Dubai last week, therefore they are wrong this week.

  Again, on the whole I suspect you're right that the DPW deal is no big deal (but see [Digby](http://digbysblog.blogspot.com/2006_02_19_digbysblog_archive.html#114062718127636312 "http://digbysblog.blogspot.com/2006_02_19_digbysblog_archive.html#114062718127636312"), who I suspect is just starting to analyze it in terms of both foreign relations and domestic politics). I'm just questioning the rhetorical strategy of calling those you disagree with ignorant racists.
date: '2006-02-23T05:17:03Z'
