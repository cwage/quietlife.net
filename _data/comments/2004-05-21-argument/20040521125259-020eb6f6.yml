name: Erik
body: |-
  Dahlia Lithwick [filleted](http://slate.msn.com/id/2100824/ "http://slate.msn.com/id/2100824/") this particular slippery slope argument this week in Slate.

  Whenever I use the "You know who else \_\_\_\_? Hitler." line people think I'm making a Godwin's Law joke, but actually I'm just making a reference to some movie, possibly Flirting with Disaster. I thought you'd like to know.
