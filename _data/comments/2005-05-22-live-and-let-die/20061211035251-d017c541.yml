name: Graham
body: Depending on which edition of the book you read, Live and Let Die seems more
  or less racist. Chapter five has always been titled "Nigger Heaven" in U.K. editions,
  however the new penguin edition is the first edition to have the chapter's original
  title restored. In all previous U.S. editions the title of Chapter 5 has been "Seventh
  Avenue", and it is half as long, with all of the most offensive passages excised.
  I don't know why this is. I'm not trying to nit pick either. This is just an interesting
  little fact that most people are not aware of. The U.S. and U.K. editions of ALL
  of the James Bond novels have many differences.
date: '2006-12-11T03:52:51Z'
slug: 2005-05-22-live-and-let-die
