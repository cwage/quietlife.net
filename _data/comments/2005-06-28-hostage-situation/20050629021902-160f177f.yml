name: cwage
body: |-
  Nothin. I am guessing either that sort of thing doesn't crack the news as much as you'd think, or the people I talked to were full of it.

  But, they definitely had the SWAT team out there, and more cops than I've seen in one place in a while. I haven't been back down there since, so I don't know if it's over or not.

  I suppose if I was an enterprising take-down-the-MSM type blogger, I'd go down there armed with a laptop and a camera, but instead, here I am in my underwear.
date: '2005-06-29T02:19:02Z'
