name: Brandy
body: Amen, brother. It doesn't make you an asshole; it means you have some sense.
  It amazes me that people would move downtown and then complain about these things.
  Did they \*visit\* the place first before moving?? On another note, I moved out
  to Hendersonville this summer, and I miss the noise of downtown!!!!
date: '2008-10-29T16:45:29Z'
slug: 2008-10-29-entitlement
