name: Aunt B.
body: I'm having a nearly identical fight with S-Town Mike about this very thing.
  I'm afraid on on the verge of having to have a duel with him, because, in suggesting
  that people who move downtown and complain about the noise are entitled jerks, I
  have offended his honor, even though he doesn't live downtown. So, if you're an
  ass, we're asses together.
date: '2008-10-29T16:31:39Z'
slug: 2008-10-29-entitlement
