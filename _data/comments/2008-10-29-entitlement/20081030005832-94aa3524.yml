name: Turner
body: I had a neighbor like this in the suburbs, who put a nasty note under my windshield
  for daring to park across the street. What the hell, chum, you NEVER park where
  I'd parked that car, and haven't in the 25 years I've lived across the street from
  you.
date: '2008-10-30T00:58:32Z'
slug: 2008-10-29-entitlement
