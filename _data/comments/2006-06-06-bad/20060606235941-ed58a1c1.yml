name: missy bunch
body: Jennifer, this is Missy Bunch from MLK. I am so sorry to hear about Will. What
  a great guy. I still have some cartoons that he, Daniel, and Aaron drew for me and
  two cassette tapes they recorded for me during their band rehearsals. They are hillarious.
  I miss you guys and think of you often. You were a great class. I will be at Will's
  service tomorrow. I hope to see some of you. Please share my email and cell with
  anyone from your class. I would love to hear from some of you. missybunch@hotmail.com,424-4674
