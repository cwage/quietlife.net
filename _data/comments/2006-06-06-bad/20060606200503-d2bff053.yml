name: Jennifer Belew
body: Thank you so much for posting these pictures. Even though it's hard as hell
  to look at them, I absolutely love them. They make me smile and cry at the same
  time. I sent the link along to Kristin Orr and Jennifer Knight earlier today. I've
  just been searching the Internet and reading about Will and his art and finding
  your blog and Lauren's blog and Aaron's blog, etc. I don't even know what else to
  say. But thanks for the pictures. I truly appreciate them and really needed to see
  them.
date: '2006-06-06T20:05:03Z'
slug: 2006-06-06-bad
