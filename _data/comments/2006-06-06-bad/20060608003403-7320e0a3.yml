name: Jennifer
body: I just wanted to thank you for uploading the photos. I only knew Will a little
  through Watkins. He always knew when I needed encouraging. He always had a smile
  for me when ever we saw each other. He knew just what to say to cheer me up. I was
  told about the accident on Monday. My hands are still shaking while I type this.
  I spent Monday night sick and stunned. Then I found your photos and I saw that Will
  lived a wonderful life. He saw beauty in the things around him, he experienced romance,
  friendship, and so much love. It makes my heart ache to think that he is gone. But
  these reminders of his life have helped me to focus on how beautiful he was and
  those memories of him will always be alive for me. Thank you again. Jennifer
date: '2006-06-08T00:34:03Z'
slug: 2006-06-06-bad
