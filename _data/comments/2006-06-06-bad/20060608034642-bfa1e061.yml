name: Ashley
body: Chris, I am so sorry that you have to go through this. After losing my friend
  Shannon in high school, I hoped that no one would ever have to feel that pain of
  losing a friend, especially someone I love. I only remember Will as the funny guy
  that thought of me as his friend's annoying little sister, but I know that he was
  a good friend and a good person. I looked at the pictures you posted of Will, and
  that is how I remember him....Silly and fun to be around, someone who was a good
  friend to you. When someone passes away we are so sad because we miss them, and
  we think of the life that they had ahead if them. But Will lived the life that was
  planned for him, and one day we will understand how it all works. Of course, it
  doesn't make losing someone you love any easier. So cry and mourn and always miss
  him, but remember that you were a good friend to him, and that will never die, and
  neither will your memories. I love you, Ashley
date: '2006-06-08T03:46:42Z'
slug: 2006-06-06-bad
