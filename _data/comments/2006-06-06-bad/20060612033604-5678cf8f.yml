name: Linda C
body: Mr. Wilson - thank you so much for sharing your story with me on Tuesday night.
  It was one of MANY "Will stories" that helped me feel connected to the whole great
  person he had become and was still becoming. There's such a whole in my heart and
  I don't think it'll be filled, but to talk about Will and appreciate him helps.
  Thanks! Linda
date: '2006-06-12T03:36:04Z'
