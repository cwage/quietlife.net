name: 82camaro
body: IMO since diet pop started using acesulfame potassium as a sweetener the flavor
  is much better. I can't stand diet coke or diet pepsi. I like diet wild cherry pepsi
  (has ace-k) and now I really like coke zero (also ace-k) Now I need 0 to be caffine
  free :)
