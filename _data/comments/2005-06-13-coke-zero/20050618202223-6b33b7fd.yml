name: Todd
body: C2 is half a can filled with Coke, the other half with water. Brilliant for
  Coke and a terrible joke played on the consumer. Diet Coke belongs to the cream
  soda family while Coke Zero is more of a Cola. According to Malcom Gladwell (IT
  Conversations), people prefer the sweeter soft drink if they take one sip, but prefer
  something less sweet if they chug a whole can. Coke is being smart. I like the after-taste
  of Coke Zero better. Seems to be sweeter in the mid-range, rather than so peircing
  in the high range--the effect I get with Diet Coke. - finleyt@mail.ecu.edu
date: '2005-06-18T20:22:23Z'
