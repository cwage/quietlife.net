name: Pat
body: I am thrilled with Coke Zero. As as a regular Coke junkie who is diabetic..I
  am thrilled to find something that really tastes like regular Coke. Kudos to the
  Coke Company for creating something so tasty for us Coke junkies. Good health is
  on the horizon.
date: '2005-07-05T09:44:15Z'
slug: 2005-06-13-coke-zero
