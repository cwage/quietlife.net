name: angie
body: i got home tonight and saw a bottle of coke zero in my fridge and thought i
  would try it, expecting it to taste just like diet coke under a new name. to my
  surprise, it tasted like real coke. i don't drink soda with sugar in it, and havent
  for 3 years now-- so i had to check the label to make sure it didn't have any sugar
  or calories twice. i am addicted to diet cherry coke, and found that this coke zero
  tastes like the diet cherry coke without the cherry flavor, and more of a cinnamon
  bite. it was good, and i probably couldn't tell the difference if paired up with
  real coke.
date: '2005-07-04T08:02:29Z'
slug: 2005-06-13-coke-zero
