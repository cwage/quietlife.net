name: Chris O.
body: As a juvenile diabetic I've been looking for a diet soda that tastes like a
  'real' soda and finally there is one!! Thanks to coke for making a diet soda that
  doesn't taste like crap!!!! I liked Diet Coke but it has now been replaced in my
  frige by Coke Zero.
