name: Suzanne
body: I really like Coke Zero! I always liked Diet Coke, but I like this more. To
  me it tastes like that Clear Pepsi stuff that was circulating around in the early
  90's. I was very disappointed when it disappeared. Seems to me it's back, under
  the name Coke Zero; yay.
date: '2005-06-19T01:19:38Z'
slug: 2005-06-13-coke-zero
