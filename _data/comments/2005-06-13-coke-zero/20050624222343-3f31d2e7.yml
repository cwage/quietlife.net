name: Jason
body: I'm not a diet coke drinker, I drink regular sodas.. but I want something that
  doesn't have the after taste of a diet cola. I've tried the diet coke with splenda,
  it still tasted diet. I think Zero tastes a lot like regular coke. As close as a
  low calorie soda has come anyway. I like it. And whoever said it tasted like TAB??
  Not even close.. I hate TAB, Zero tasts absolutely nothing like TAB.
date: '2005-06-24T22:23:43Z'
slug: 2005-06-13-coke-zero
