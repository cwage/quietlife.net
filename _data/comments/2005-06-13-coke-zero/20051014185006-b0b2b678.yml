name: Zap
body: Really Like Coke One. It's what "Diet Coke" should have been to begin with.
  It tastes like Coca Cola Classic but uses artificial sweetner instead. There should
  have never been "Diet Coke." Or, better yet, what's now Coke One should replace
  Diet Coke. After all Sprite and Diet Sprite, Dr. Pepper and Diet Dr. Pepper and
  any other type of regular/vs diet soda taste the same except for the sweeter used.
  The Coca Cola Company should have been consistent with Coke and Diet Coke from the
  beginning.
date: '2005-10-14T18:50:06Z'
slug: 2005-06-13-coke-zero
