name: Randy Flatulence
body: |-
  Coke Zero tastes almost identical to the origional Coke (aka, Coke Classic). I agree with those who are excited about this product. It tastes better than Diet Coke made with Splenda. Wikipedia has an interesting bit on Coke Zero's history, and why Diet Coke tastes so bad.

