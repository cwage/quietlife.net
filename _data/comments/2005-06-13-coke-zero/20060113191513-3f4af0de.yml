name: Greavis
body: Just had my 3rd bottle. I like the taste compared to DC. It does resemble "the
  real thing" more than any other diet drink I've tried. The aftertaste is still there,
  but not nearly as severe as with DC. I do think Coke is onto something. I hope it
  replaces Diet Coke as the standard.
date: '2006-01-13T19:15:13Z'
slug: 2005-06-13-coke-zero
