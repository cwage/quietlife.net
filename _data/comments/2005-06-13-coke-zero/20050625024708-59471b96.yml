name: Alex
body: I like Coke Zero, it tastes pretty good. I drink all the other diet coke products
  like the lime, lemone, cherry, and regular flavors. I like to fluctuate through
  all of them and I'm glad I have another one to add to the list. I didn't really
  like the splenda diet coke though.
