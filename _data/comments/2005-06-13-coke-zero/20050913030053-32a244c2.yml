name: Kevvie G
body: I was a major Coke drinker until Diabetes struck. I drank Diet Coke, but preferred
  Diet Pepsi (even though I HATE regular Pepsi). Then I visited the states and tried
  DC with Splenda and Coke Zero. I use Splenda in everything, so I think it's more
  sugar-like in flavour. I bought two 12-packs. Coke Zero was even better. The people
  who don't like Splenda are just so used to not consuming sugar that they prefer
  aspartame, but splenda is as close as it gets to sugar. I do like Coke Zero, though.
  It tastes more like Coke Classic than any other soda. Now we have to convince them
  to make it available here in Canada.
date: '2005-09-13T03:00:53Z'
