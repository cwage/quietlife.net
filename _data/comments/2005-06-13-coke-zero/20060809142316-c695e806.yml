name: Jim
body: I'm a big Coca-Cola Classic drinker. Diet Coke gives me uncontrollable flatus
  that makes me reverse gravity. Finally with Coke Zero I have found what I have been
  looking for... the taste of Coke classic without having to levitate over the can!
  :-p
