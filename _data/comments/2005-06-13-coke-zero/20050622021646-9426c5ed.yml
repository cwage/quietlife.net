name: Brent
body: I LOVE Coke Zero. As a former Coke Classic drinker, I've been struggling to
  learn to like diet coke. I've never gotten there. I was excited to hear about Coke
  with Splenda. That didn't do much for me although it was somewhat better than regular
  diet. Now that I've found Coke Zero I can finally say I've found a diet replacement
  for Coke Classic. Tastes sweet with little or no acidity and aftertast. Great idea
  Coca-Cola Company!
date: '2005-06-22T02:16:46Z'
slug: 2005-06-13-coke-zero
