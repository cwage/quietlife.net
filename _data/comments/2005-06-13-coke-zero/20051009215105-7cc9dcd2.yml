name: Tammy
body: Love the Coke Zero a lot. Hate the Diet and the Diet w/splenda. Read that Coke
  Zero was based on the original Coke classic formula while Diet Coke never was based
  on it it was a totally new formula that eventually they made into Coke2. I just
  feel it tastes more like a "real" cola ;less after taste and makes me not feel so
  "deprived" having to drink diet.I hope every one tries it and loves it and they
  keep making it easily available and accessable for good!
date: '2005-10-09T21:51:05Z'
slug: 2005-06-13-coke-zero
