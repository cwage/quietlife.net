name: Ms Burnett
body: I actually love Coke zero and i went everywhere to find the new diet coke made
  with Splenda and i could not find it anywhere. Can anyone send me and e-mail or
  put a comment letting me know where they found it. I live in Toronto, Canada i would
  really like to know what grocery store i can find it in. Thanks.
