name: Sarah L.
body: I don't understand Coca-Cola at all. Why do they need so many different varieties
  of Coke?? What ever happened to just regular Coke, and Diet Coke? What is all this
  new crap!? Most people end up going back to either regular Coke or Diet Coke anways.
  I think its stupid!
date: '2005-06-17T19:31:07Z'
slug: 2005-06-13-coke-zero
