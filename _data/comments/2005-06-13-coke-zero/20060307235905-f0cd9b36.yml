name: dom
body: |-
  i have read a lot of the comments that some of you have submitted. i would like to know why soem of you have such a devotion to any "diet" product. surely it is better to drink the real stuff when you really want it and then water if you feel you have overdone a bit in the diet stakes. i think you have all missed the essential truth that, no matter what rubbish coke,or pepsi or most other soft drinks producers manufacture they will have a client base that will keep buying it. Break the cycle and drink an espresso with no sugar if you fancy a hit. Remember we all managed not to die of thirst long before coke opened up shop. Dont let these people who had to be told to remove cocaine from their products determine what you drink. Go natural, learn how these drinks are made. When you see how big the pile of chemicals is to make this stuff then i know you will think again. Sugar is a wimp compared to the damge these puppies can do. i dare anyone to tell me what aspartame actually is? if you knew you would not really want to drink it. "Aspartame, used in most diet drinks, is sold as NutraSweet and Equal. It's not as sweet as saccharin and is more expensive. Through the years, it has been blamed for a host of conditions, including brain tumors, seizures, birth defects, multiple sclerosis and lupus, though there's no evidence to back up these claims. Some people also report side effects such as headaches, dizziness and indigestion, but NO ONE knows how widespread they are. The only proven risk is to the small number of people with conditions, such as advanced liver disease, that cause problems metabolizing phenylalanine, an amino acid in aspartame." People with the disorder phenylketonuria (PKU) are unable to metabolize phenylalanine, so they must avoid aspartame. As for Acesulfame potassium, it is actually 200 times sweeter than sugar and is used solely to disguise the fact the other additives and sweeteners taste so artificial. luckily for you the body does not change Acesulfame potassium so it passes through without breaking down. 200 times more fattening than a normal can of coke though, would be fun to see.
  Acesulfame potassium is sold as Sunett and Sweet One and as the tabletop product Sweet One. In some products it's combined with other sweeteners. Unlike aspartame, it doesn't break down when heated, so it can be used for baking. It has been tesed less thoroughly than aspartame, so researchers tend to know LESS about it. How reassuring. i do not drink these products. you dont need to either...
