name: Graham
body: |-
  The reason sugar-free ice cream tastes good is that it's still got plenty fat in it.

  However I recently moved from the UK to the US and didn't notice any difference in diet coke - i'm still convinced that regular coke is different in the UK from anywhere else in the world though. My working hypothesis is that new coke must have succeeded in britain and we kept it :)
