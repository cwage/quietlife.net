name: jimmyc
body: I agree with Mike - its like TAB - The Acesulfame potassium gives it the bite/sweet
  zing of saccharine but also that aftertaste though less prominant. You gotta figure
  when Coke made Tab it used much of the Coke formula and Diet Coke was different.
  I also think it has less carbination. It is more like coke with a nice start and
  zing but the aftertase is still with me for a while when its gone...
