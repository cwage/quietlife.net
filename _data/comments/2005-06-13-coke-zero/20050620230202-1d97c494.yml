name: jo-jo the circus freak
body: You know, I was in Denmark drinking their "Coke Light" and I knew something
  was different because I couldnt stop guzzling the stuff. I have always thought the
  after taste.. (hell, the DURING taste too) of regular DC was repulsive. Gouldnt
  get that freakin nasty-ass after taste out of my mouth. Once back in the states,
  it only took one sip of Coke Zero to realize that is the same stuff I had overseas.
  Yum. I love it so much, I even soak my genitals in it.
date: '2005-06-20T23:02:02Z'
slug: 2005-06-13-coke-zero
