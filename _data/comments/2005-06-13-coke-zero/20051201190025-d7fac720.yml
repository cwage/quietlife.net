name: Tammy
body: I have always said, "Never Diet." I would give up Coke all together rather than
  drink a Diet Coke, or Diet anything. This morning I bought an 8-pack of Coke Zero
  in plastic (hate cans). While I do sense a small after taste, I can't say it's bad.
  Well chilled and eating, I would totally forget it was Zero. I was wondering when
  I would have to give up Coke, now maybe I don't ever have to. Thanks Coke, with
  the name Zero, I still don't have say Diet!
date: '2005-12-01T19:00:25Z'
slug: 2005-06-13-coke-zero
