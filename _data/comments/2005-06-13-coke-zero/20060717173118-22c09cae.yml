name: Ron Cooney
body: |-
  Coke Zero is the best diet soft drink since diet Dr. Pepper and
  for the same reason: it tastes very close to its sugary brother.
  My wife and I are long-time diet Pepsi drinkers, and although we
  still drink that, our soda of choice is now Coke Zero. I love classic coke, but I was never fond of Diet Coke because it has no cola taste. Coke Zero has a lot of flavor and no after-taste that I can detect.
  Over ice, it's especially smashing. Thanks Coke, CZ is winner of a beverage.
