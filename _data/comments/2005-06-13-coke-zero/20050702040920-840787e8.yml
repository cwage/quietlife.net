name: BillyG
body: |-
  I really think the cola companies are afraid of making a diet cola that really tastes like regular cola because a large majority will switch over. So they make diet colas with a nasty aftertaste, watered down and nothing that tastes like the "real thing" - Thier way to punish diet drinkers for not drinking thier cheaper to make (with corn syrup) sugared colas.

  That said Coke Zero is a big improvement over diet coke, which hasnt changed much since the early 80s when Coke started using Nutrasweet (Aspertame). Pepsi has kept improving the taste of thier Diet Pepsi over the years, but Coke did nothing until this year when they got into financial trouble.

  Now I wish they would change the formulas of thier "Diet Coke With Vanilla/Cherry/Lemon" to use Coke Zero as the base. A "Cherry Coke Zero" would be very tasty.
