name: Gayle
body: I have tried both Coke Zero and Diet Coke with Splenda and don't like either
  one. The Splenda version tastes a lot like a lemon/lime soda. As far as the Coke
  Zero...I've been drinking diet soda for probably 35 years. I switched from Diet
  Pepsi to Diet Coke when Pepsi changed their formula. I love Diet Coke, but the Zero
  version leaves an aftertaste that I don't get with ANY diet soda except Tab. Neither
  one is a hit with me and I just want my regular Diet Coke back. Frankly, these changes
  may turn me back into a Diet Pepsi drinker.
date: '2005-08-24T15:22:14Z'
