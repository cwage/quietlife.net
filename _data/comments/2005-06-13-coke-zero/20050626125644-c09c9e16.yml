name: Diane Nichelson
body: I have been drinking coke since I was a little girl in the 50's. Reciently I
  had to switch to sugar free soda. I tried coke zero it has a good taste but lacks
  the strong carbonation of regular coke. Add more fizz to coke zero and I will keep
  drinking it.
