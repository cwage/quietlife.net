name: Matt
body: Most people do not realize that coke, and other coke products, are formulated
  for each location in which they are sold. For instance; a coke in Germany will taste
  different than one from Great Brittian. I'm not positive, but I think there are
  even some subtle differences around the U.S. The point is, they do taste tests in
  different parts of the world so that each area has a custom-made coke.
date: '2005-06-26T19:33:07Z'
