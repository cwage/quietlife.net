name: Erik297400
body: |-
  My thoughts:
  Coke is nasty, I've been drinking diet coke since pharmacy school 15+ years. 1 hour drive in the morning with 2 cans. Diet Coke with Splenda: nasty aftertaste (limey?) DC Lemon: tastes like Pledge, same for Lime. Vanilla DC? like a glade air freshener. Traveled Europe, hated the Coke Lite. I will keep an open mind if/when I try Coke Zero this weekend.
