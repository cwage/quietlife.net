name: tankgirl
body: I lived in Germany for three years, and Bogota Colombia for 3 months. Coke light
  is just what they CALL diet Coke, it's not some big chemical conspiracy. I just
  tried the Coke ZERO, and I love it, absolutely NOTHING like any Coke light I've
  had anywhere else (all over Europe and South America). Splenda is complete and total
  crap in any form, I wouldn't even try Coke with Splenda because I absolutely detest
  that stuff.
date: '2005-06-28T01:09:06Z'
slug: 2005-06-13-coke-zero
