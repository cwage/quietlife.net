name: Sherry Harvill
body: |-
  I ABSOLUTELY will drink anything "diet" but "diet coke",(or root beer, but that's another topic). However,I really LOVE the new Coke with Splenda, Coke Zero is pretty good, too.
  I was raised on real Pepsi and I love it dearly, but I almost always choose Coke with Splenda over Diet Pepsi.
