name: Lars
body: I'm looking forward to giving Coke Zero a shot. I applaud Coke for trying new
  ways to make a better zero calorie product. But like others, I too can't understand
  how they can't seem to figure out a way to get rid of that disgusting after taste.
  They should maybe talk to the Murray cookie company. Their sugar-free products are
  indistinguishable from the regular kinds. God bless C2 by the way. It's awesome.
date: '2005-06-20T05:09:17Z'
slug: 2005-06-13-coke-zero
