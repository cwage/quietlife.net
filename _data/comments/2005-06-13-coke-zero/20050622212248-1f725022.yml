name: Kim
body: |-
  Yay! Finally I can stop feeling guilty for disliking the Diet Coke which is supposed to be better for me! Cold Coke Zero tastes so much like regular Coke - even has that same little "burn."
  But a word of caution - DON'T drink it warm! Doesn't have the same taste at ALL then!
date: '2005-06-22T21:22:48Z'
slug: 2005-06-13-coke-zero
