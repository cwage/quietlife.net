name: Mark
body: Zero is great. I'm a dyed-in-the-wool Coke fan. Hated New Coke and even went
  so far as to switch to RC or Pepsi when all I could get was New Coke. Could never
  stand Diet Coke. I tried and tried. C2 was a great first step, and Zero is just
  wonderful. Both are based on the original Coke formula (the Classic Coke formula),
  whereas Diet Coke is based on the New Coke formula. Still drink C2 (although I hear
  rumours it'll be phased out), but mostly I drink Zero. Guilt free, carb free, great
  tasting cola. Works for me.
date: '2005-09-28T23:29:41Z'
slug: 2005-06-13-coke-zero
