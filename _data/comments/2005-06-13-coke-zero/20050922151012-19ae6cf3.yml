name: Lops
body: I love Coke Classic -- chilled and without ice (no dilution). None of these
  diet stuff can hold a candle to the Classic. Zero is OK, but has a sickly sweet
  after taste, that pisses me off. Diet Coke...don't even talk about it. Classic is
  still the king...my search for that perfect cola is still on...
date: '2005-09-22T15:10:12Z'
slug: 2005-06-13-coke-zero
