name: Katie
body: I love Coke Zero. It has that same Coke Classic aftertaste that Diet Coke doesn't
  have. I like it much better than Diet Coke and Diet Coke with Splenda. A regualar
  Coke always settles my stomach but Diet Coke can't. Coke Zero is able to do that
  though. I hope that it stays on the market, if it is pulled I will be greatly dissapointed.
date: '2005-07-01T17:21:25Z'
slug: 2005-06-13-coke-zero
