name: james
body: |-
  Diet Coke is "New" Coke with artificial sweetener. Diet Pepsi is Pepsi with artificial sweetener. Coke was smart to dump New Coke, and with their marketing (Sprite outsells 7-up, purely on marketing), Diet Coke is the top-selling diet soda, even though it DOES taste like cream soda.

  Coke Zero and DC with Splenda are more like real Coke Classic. I haven't determined if it's as close to regular as Diet Pepsi is to Pepsi, but at least it's better than bland Diet Coke.
date: '2005-06-22T16:47:35Z'
