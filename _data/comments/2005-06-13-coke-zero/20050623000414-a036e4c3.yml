name: Uncle Wynn
body: |-
  First of all, Coke Zero does NOT taste like cream soda, that's what A&W is for. As a devote of all things Diet Coke, Zero is the BEST diet out there. I have finally found a diet coke that tastes like it comes out of a fountain at McDonalds. All the other Diet Coke variations from bottle or can have a high sodium taste to it. Zero is as close as I'm going to get to having a six button soda dispenser in my house.

  Hey marketing gurus at Coke, Atlanta....Don't screw this up! Blow some of the other varients off the shelves and leave Zero alone! You finally got something here.
date: '2005-06-23T00:04:14Z'
slug: 2005-06-13-coke-zero
