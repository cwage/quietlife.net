name: Glen
body: I just tried the Coke Zero. It does not taste like regular coke to me. But it
  also doesn't have the nasty taste of all diet sodas. Does have a little bit of an
  after taste though. I don't understand how they can make sugar free icecream taste
  so good but yet they can not do the same with soda.
date: '2005-06-19T19:01:44Z'
slug: 2005-06-13-coke-zero
