name: Janel D.
body: 'My husband and I are Coca-Cola Classic ADDICTS - and this new Coke Zero is
  a lifesaver! The taste is too good to pass up for having no calories. I have a tip
  for those who want to try to cut calories, but still aren''t too keen on the taste:
  Start by mixing 1/2 Coke Classic with 1/2 Coke Zero. Add lots of ice!. It''ll cut
  the calories in half, help you use up your old Classic 12-packs, and hopefully it
  can grow on you. (Not literally of course!)'
date: '2005-07-02T02:27:53Z'
slug: 2005-06-13-coke-zero
