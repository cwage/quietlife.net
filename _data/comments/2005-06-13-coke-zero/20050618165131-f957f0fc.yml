name: Sam Tucker
body: |-
  I'm with Robin, after you add the booze (Crown Royal, Jack Daniels), you can't tell a lot of difference between regular
  Diet Coke and Coke Zero. The Diet Coke with Splenda - sucks, can't stand it. The Diet Coke with lemon/lime is good
  with rum. Drink up!
date: '2005-06-18T16:51:31Z'
slug: 2005-06-13-coke-zero
