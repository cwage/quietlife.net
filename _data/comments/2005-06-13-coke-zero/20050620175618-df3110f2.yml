name: Melissa
body: Four people in my office, all diet soda drinkers, did a blind taste test with
  Coke, Diet Coke, DC w/Splenda, C2 and Zero (clearly a slow day at work). We all
  picked Zero as our favorite diet version. I have to admit, though, that I very surprised--drinking
  it blind I could clearly distinguish DC and DC w/ Splenda, but the other three were
  very, very similar--I was the only one who figured out which was which...
date: '2005-06-20T17:56:18Z'
slug: 2005-06-13-coke-zero
