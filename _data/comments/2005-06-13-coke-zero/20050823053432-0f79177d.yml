name: pedro
body: |-
  I just read a blurb in Fast Company magazine about all the Coke products cluttering the shelves. The article said that Coke Zero actually tasted like Coca-Cola Classic. I doubted that this was true, but gave it a try anyway. To my surprise it DOES taste exactly like regular Coca-Cola. It's wonderful!
  I, too, have kicked myself for not being able to stick with Diet Coke. I've tried to force myself to drink it, but I always go back to regular Coca-Cola Classic. NOT THIS TIME! COKE ZERO is my new cola!
date: '2005-08-23T05:34:32Z'
