name: John Federman
body: Dotomi is where consumers rule! We would like to have Coke as a customer. Also,
  good job everyone. Only I can say 'savvy marketers' without having to pay a $.05
  royalty. Sorry for being silly, it's just that today marks the longest I have held
  a single job since 1998 when I was desparate to leave pc week magazine after sexual
  harrassment allegations finally caught up with me. Carol O'Brien, if you're out
  there, you still are heat and I am sure I still dig your hair and all your perfume!
