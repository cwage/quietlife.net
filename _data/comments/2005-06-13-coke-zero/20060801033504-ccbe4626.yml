name: Kevin
body: |-
  This entry is way up there (fourth or fifth) when you type "Coke Zero" into Google. As I read the above posts this evening I was struck by a couple of thoughts. I thought I'd put them out there as food for thought.
  I thought it was interesting that the author of this blog didn't want to post regarding "Coke Zero" because of the excess replies, etc. Now look at it. Funny.
  I also noticed that as far back as a year and a couple months, people were complaining about the "flat" taste. Reviews at the beginning are very mixed. Then, abruptly, almost all comments became positive. I'd bet money that Coke was reviewing the internet posts and revised their formula due to focus groups, etc. Maybe even because of the posts in this blog.
  And for the record, I am a huge fan. Love it. If you look at the posts from the "fear mongers" about the tumors, etc., it is obvious that they have a preexisting bias against anything with chemicals in it. (I suppose they are referring to chemicals NOT found freely in nature since almost everything is a chemical; even water (H2O)) The studies that people refer to when stating that newly created chemicals cause tumors, cancer, (and probably acid rain and the decline of western society) are studies when scientists stuffed animals with 1000s of times the amounts that a human could ever consume, all inside of a few weeks. These type of studies have since been strongly discredited. For instance, when the same scientists do tests on things like water, they find- you guessed it, water causes cancer. As does almost anything else! For more info, read John Stossel's new book (I can't remember the exact title but it is something like: Lies, Myths and Outright Deceptions).
  My conclusion? Coke Zero tastes great! I think it's close enough to Coca Cola that I really don't taste a difference (although I haven't done the blind taste test). Keep up the good work Coca Cola! Now how about a caffeine free version? I'd drink more Zero if I could drink it up until bed.
