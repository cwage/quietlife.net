name: Ruth
body: |-
  Coke Zero is great! I grew up drinking Coco Cola and am a loyal fan of the classsic, but.........the Diet Coke varieties leave such an awful aftertaste it's just not worth having one.

  I hate any type of soda in plastic so am hoping to find Coke Zero in cans.

  Coke Classic and Coke Zero = Wonderful!
