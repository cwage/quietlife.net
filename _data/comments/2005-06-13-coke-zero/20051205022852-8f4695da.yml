name: Bri
body: I am addicted to coke zero. I live in Atlanta where it was introduced first,
  and I have never looked back. I used to drink 5 or more cans of regular coke a day.
  Now, since zero tastes just like regular, I can drink that much without feeling
  guilty. I do think that the colder Zero is, the more it tastes like regular.
date: '2005-12-05T02:28:52Z'
slug: 2005-06-13-coke-zero
