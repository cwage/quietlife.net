name: Angie
body: First of all, sugar free ice cream is B.A.D. This tastes funny to me, but as
  a die hard diet coke fan, I think I'll stick with the original! DC with Splenda
  tastes like regular coke to me...too sweet after making the switch to regular. This
  also tastes a bit sweeter, and flatter as a previous person said.
