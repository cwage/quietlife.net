name: Joseph
body: WOW! I had always said the same thing and no one believed me but it's true!
  Coke Zero IS Coke Lite. I even wrote to Coke once and suggested they sell it here
  and they sent back a form letter telling me that Americans preferred the nasty after
  taste of Diet Coke. (????)
