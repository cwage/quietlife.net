name: kari
body: |-
  i thought it tasted just like coke does from a soda fountain...really great, so much better than diet coke and way better than anything with splenda. it might be less carbonated than regular diet coke, but i prefer it that way.

  and matt is right, coke in Atlanta does taste different than coke in California.
