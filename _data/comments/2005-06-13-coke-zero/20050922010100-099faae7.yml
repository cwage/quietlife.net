name: Eric
body: |-
  Sorry about my spelling, Im not an author.. i sell coke for a living.

  In the USA
  Diet coke cans/bottles - new coke sweetened with aspartame
  diet coke fountain - new coke sweetened with aspartame/sacharinne (check fast food websites for ingredients if you dont belive me, they do it for longer shelf life)
  coke zero - coke classic sweetnened with aspartame/ace-k with a "crisper" taste
  diet coke w/ spenda - new coke with splenda / ace-k. Like all splenda soda's it taste like diet RC

  Outside the US

  Diet Coke / Coke Light - varies by country. Different sweeteners. Some times tastes like classic, sometimes new coke.

  One note.. I work for a coke bottler and we recently discovered that coke zero has a expiration date that goes much longer than it should. It begins to take like crap about a month before its expiration date.
date: '2005-09-22T01:01:00Z'
