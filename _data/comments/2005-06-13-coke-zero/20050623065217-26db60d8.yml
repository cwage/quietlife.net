name: JJ
body: Let me first say Coke is number one in my book. I drink diet soda because of
  the calorie count. I tried Diet Coke with Splenda and found it taseted way better
  than regular diet coke but all I kept thinking about was that I could not wait for
  Coke Zero. What a great concept, a diet soda that tastes like the real thing. Words
  can not describe how disappointed I was with Coke Zero. I purchased 3 bottles and
  could not finish the first one and threw the other 2 bottles out after I decided
  that I would not drink it. The aftertaste was horrific. Coke needs to reformulate
  the new product because "It Stinks"!!!!!!
date: '2005-06-23T06:52:17Z'
slug: 2005-06-13-coke-zero
