name: Dan
body: One thing nobody has mentioned is that a lot of the Cola Wars (and this is NOT
  limited to soft drinks; breakfast cereal is another example) are about competing
  for shelf space. If Coke says "Here's a new product" the retailer may fear retaliation
  if refusing to carry the new item... and unless Coke simultaneously dropped another
  item the retailer had been stocking, the retailer has to dump someone else's product
  off the shelf to make room. Anyone notice that some of the big soda companies are
  all of a sudden selling familiar products in "energy drink" (think "Red Bull") size
  cans, or stubby cans that look like a regular can chopped in half? Just another
  means of bumping another company with less "clout" off the shelf. So when you see
  new formulas showing up on the shelves, it isn't necessarily about trying to find
  a new taste that consumers will love.
