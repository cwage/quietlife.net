name: suzanne Hessler
body: Been drinking Zero for about two months now. Have to say tastes good but with
  the good taste came extreme bloat and gas. Not to mention that I have gained 10
  lbs. Whats up with that? Thought it was suppose to be diet. I have now stopped drinking
  it and already feel better, but the weight I believe is going to be hard to shed.
  Damn it!
