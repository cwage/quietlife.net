name: Chuck
body: |-
  I have to agree with Chris. I am a Diet Coke drinker and actually like Tab when I can find it. .

  I didn't like Diet Coke with Spenda at all but I thought Coke Zero was pretty good.

  I'll probably fall back to regular Diet Coke as I always do, but Coke Zero is a nice short term change now and then.
date: '2005-06-17T14:39:41Z'
