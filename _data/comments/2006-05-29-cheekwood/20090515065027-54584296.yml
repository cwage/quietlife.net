name: Kaebora
body: Sophie Ryder has no active participation or acknowledgment in the furry fandom
  actually. Furries are just enthusiasts for modern cartoonist anthro-culture (movies,
  comics, etc) which is fairly limited. There are hundreds of thousands of artists
  through history with a fascination with anthropomorphic art. The fact that the piece
  is anatomically correct is nothing new or unusual in classical sculpture. I really
  wish I could walk around this piece to get a better understanding of what she is
  trying to convey. If it's like most of Sophie's work, it should hold an emotional
  meaning, tied to the surrounding environment. I have a strong feeling that the choice
  of using a rabbit may have to do with fertility or a predator's prey, which are
  common themes associated with rabbits.
