name: Martin
body: no the first cowboys worked in the flat prarie lands of spain...when they conquered
  mexico they brought horses and cattle which which also brought  the charro culture
  to states like jalisco... and a charro is a traditional cowboy which has roots  coming
  particularly from spain and from there they taught indians and meztizos which are
  half spainiard and half native mexican indian into work on ranches which developed
  into the vaquero (cowboy) culture in northern mexico and is the culture that started
  the modern western cowboy culture and you are right about florida but they had no
  ties or wer nothing simular 2 modern western cowboy culture cuz vaqueros from southwest
  united states and northern mexico and they started all western styles of riding......cowboy
  clothing.... and ranching tecniques...besides i went 2 florida a couple of times
  and they have NO COWBOYS so y do u think the border states with mexico and also
  mexican states like chihuahua, durango, coahuila, and jalisco still have huge cattle
  ranches and REAL COWBOYS ????
