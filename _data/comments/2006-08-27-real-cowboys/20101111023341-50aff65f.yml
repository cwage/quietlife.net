name: Martin
body: Those aren't real cowboys. I'm from the Lubbock area and I know some guys that
  work on ranches. A real cowboy will be dressed in Cinch, not wrangler. And they
  will hav dirty square toe boots with dirty spurs. And they do hav cowboy hats. But
  not straw, but a felt hat with about 3 layers of dirt on it LOL
date: '2010-11-11T02:33:41Z'
slug: 2006-08-27-real-cowboys
