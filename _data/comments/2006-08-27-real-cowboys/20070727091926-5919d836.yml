name: Curt
body: Contrary to what some people think, there are some "real" cowboys in Tennessee.
  I work on a horse ranch south of Nashville. While there are a lot of posers here,
  there are also a lot of "real" cowboys that occasionally go to the downtown Nashville
  honky-tonks for good music and drink. Don't judge people until you talk to them
  and find out what it is they do. (P.S...my boots have gone through all kinds of
  horse and cattle shit..ha!)
date: '2007-07-27T09:19:26Z'
slug: 2006-08-27-real-cowboys
