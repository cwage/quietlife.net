name: mooni
body: What areas are we talking about in Tennessee and Oklahoma? Ive been all over
  and never the tourist sites. I always try and go to local places to see the "real"
  sites. Ive never seen a real cowboy, cowboy bar, etc... I'm all about the jeans,
  boots and farm life and would love to see those sites as they are intended to see.
date: '2010-02-08T14:19:23Z'
