name: SayUncle
body: Your comment's there. Still, I don't buy that from 2003 to 2005 that inflation
  had that much of an effect. Also, they still came in at 1/2 point (several billion)
  over budget, which would be adjusted for inflation. And receipts as a % of GDP is
  a largely useless statistic. After all, if you tax less, people have more to spend
  which affects GDP. Also, showing it as a % of GDP is not necessarily an inflation
  measure.
date: '2005-12-13T14:09:03Z'
slug: 2005-12-12-the-night-my-comment-got-eaten
