name: cait
body: making jokes about rape is promoting rape culture. if people can laugh at it,
  it becomes just a little less heinous and that's a dangerous path to go down. when
  people make racist jokes most decent people don't laugh and just excuse it away
  as art or a silly joke, because, you know, no one reeeeeeally thinks that way. except
  they do. so most decent people think its a shitty, racist joke. i'm not sure why
  rape should be treated differently.
