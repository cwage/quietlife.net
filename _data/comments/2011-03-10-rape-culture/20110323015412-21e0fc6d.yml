name: Amber
body: |-
  >>The simple fact of the matter is that the vast, vast, vast majority of people are utterly disgusted by rape or sexual violence (whether emotional or physical) towards women (or men), and by initiating the discussion by labelling our society a "rape culture" instantly toggles a switch in the minds of many to consider the speaker to be some nutjob who thinks the average man (or woman, but most commonly man) is a well oiled rape machine indoctrinated by media, just waiting for the moment to strike, instead of the relatively rational, respectful individuals that most people are.<<

  I haven't found this to be true in own my personal experience, that is, that the vast majority of men are completely disgusted by sexual violence, or that they are even rational, respectful individuals for the most part, but let's set that aside for a moment since it is just my own experience. People who truly possessed these qualities wouldn't need any convincing. They would reject examples of rape culture at first blush, because they would immediately recognize them as uncomfortable if not completely inappropriate.

  But yes, you're right that diplomacy and tact and meeting on common ground are all necessary for changing minds. As someone who came out of religion into skepticism, I've lectured my missionary atheist friends about this method many times. Frankly, I'm not much of a missionary these days. I've reached the point in my life where I'm ready to let the ignorant be ignorant unless they threaten to get their ignorance on me. At that point I don't really care if I change their minds, I'm just protecting my personal space. If I hurt their feelings or they think I'm a nutter in the process then so be it. They're not someone I plan on associating with. The only people I actually engage in legitimate debate with are the ones I respect, and who I believe can think well enough to either teach me something or learn from my perspective. Anyone who doesn't have a basic understanding of feminism generally doesn't fall into that group.

  >>I would argue that it does, in any useful definition of the word "wrong." Because otherwise you're making the argument that punching someone in the shoulder is as bad as gashing out their throat with a machete.<<

  Depends on your philosophy. Right and wrong are binary states as much as they are a sliding scale. Some things are more wrong than others, but just because x is less wrong than y doesn't make x any less wrong. Practically speaking, most people decide moral actions on a risk/reward continuum, but traditionally if something is even just a little wrong we still shouldn't do it, even if the risks or rewards aren't that great. Morality is one of the few areas where I think Aquinas got it right.

  >>I must admit I've never heard someone just go balls out and say anything -that- blatant to someone they just met<<

  Hahahaha! And that's one of my tamer stories. You'd really be scandalized if I related some of the stuff the ROTC boys tossed around me in college. :)

  >>Yes, but a tsunami can kill you. Rape cannot. It's really disgusting and horrific and bad, but it's not a lethal assault, which is why rape is not prosecuted as murder.<<

  Actually, rape \*can\* kill you. If you doubt that, look up what's happening in the Democratic Republic of the Congo. Brutal rape (typically gang rapes in those cases) causes trauma and bleeding that often results in death. There was also the case I worked on while I was with the District Attorney's Office, where a father cut open the vagina of his three month old daughter so he could penetrate her. She died from the trauma of that, too. He was charged with both aggravated rape and murder, but rape was the violence that killed her. Not all rape is a "he said/she said" kind of situation where maybe there's some bruising or tearing but she emerged relatively physically unscathed. Some of it is still is really, really violent. It's not prosecuted differently than murder because rape doesn't result in death, it's defined differently because most rapes don't result in death and those crimes should be prosecuted, too.
