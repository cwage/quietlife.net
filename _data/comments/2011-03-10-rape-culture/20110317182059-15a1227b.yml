name: turkey
body: i disagree about using the dickwolves as a bad example. Anything no matter how
  subtle or imaginary, is something that would not have shown up even 5 years ago,
  something that makes it okay to make rape jokes, making it okay to think about or
  desensitize something that is so incredibly horrible. the reason most rapists are
  not your hollywood random street attackers, is because a lot of common people think
  rape isn't what it is, if it's a friend if it's someone who trusts you, if it's
  a girl or boy you just met, and you believe them to be shy, things and comments
  and jokes like these make it seem less bad to assume someone's consent without actually
  verbally or physically getting it
