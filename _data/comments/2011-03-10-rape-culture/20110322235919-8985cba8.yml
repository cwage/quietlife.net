name: Amber
body: |-
  <stuff about="" dickwolves="">

  Yeah, sure. Frankly I don't give a damn about dickwolves. I haven't even seen the cartoon, and by your description if I did it's not the sort of thing I'd get worked up over. There's an intensely misogynistic culture in WoW that's often hostile to female gamers, and I'd like to see that simmer down, but that cartoon barely even tracks on the larger screen of what's wrong there and it's certainly not going to change much of anything. It's also not much more than an annoyance in comparison to hearing men "joke" that way around women in real life, so like I said, I don't care that much.

  >>Also, I'd like to say that I think the phrase "rape culture" is ill-thought-out.  Just hearing it makes too many people roll their eyes and walk away from the subject, because it comes across as an extremist view, whether people like to admit it or not.  And in some cases it can be, which hinders a rational discussion on a real problem.<<

  Bullshit. It's not my problem when other people don't take the problem seriously, and I'm not going to sanitize words because "rape culture" makes those same people cry. If you're so desensitized or ignorant about rape that you roll your eyes when women talk about it, then you obviously need to hear more on the subject, and I will definitely make a point to keep talking about it around you.

  >>First, rape culture exists.  Yes.  It does.  It's true.  However, "rape culture" is not some kind of binary, true or false entity.  It's not like it either exists or it does not.  Rape culture is a matter of degrees of severity.  You cannot logically argue that all incidents are of equally moral concern.  Moreover, at its most severe, some of the extreme crusaders against what they see as "rape culture" includes such things as "at no time should a man ever approach a woman at a club and ask if she'd like to dance, the male must be passive, otherwise they are part of a rape culture." You may not like that fact, but there are a vocal minority who actually believe things like that.<<

  I've actually studied quite a lot of radical feminism and I'm completely familiar with this attitude. You're setting up straw men that can be easily knocked down. For every radical feminist I've met who believe men should be passive for fear of intimidating women, I've met three dozen men who engage in rape apologetics. For some reason, the radical feminist gets criticized more about her opinions than the men do about theirs. That is wrong, and that is rape culture, and that needs to be corrected.

  >>As it pertains to rape culture, you cannot hold a dickwolf joke on the same level as a talk show host making some remark about how he (or she) thinks rape is acceptable if the victim somehow "invited" it (via dress, behavior, race, religion, sexual orientation, profession, whatever.)  Those are in two COMPLEEEEEEEEEEEEEEETELY different dimensions.  <<

  Yes, obviously. It doesn't make either one less wrong, it just lessens the possible harm that could come from them. My morality is not purely utilitarian, though.

  >>Look.  We all have to pick and choose what offends us, and moreover what we believe to be worth denouncing as genuinely harmful.  What I'm saying is that people need to take a step back and examine intent, origin, meaning, and most importantly of all... whether what you're being offended by is actually all that dangerous to a safe society in the first place on any realistic level.  <<

  Appreciating nuance is a good thing, yes. When you're reading cartoons on the Internet there's really no cause for alarm. The drawings aren't going to reach out from the screen and hurt you. You might be causing harm as the cartoonist by reinforcing predator tendencies that already exist in your audience, but I don't believe we should hold artists accountable for the actions of their audience unless the speech was truly intentional. Even then, the artist should share in culpability, but it's not proper grounds for censorship. Furthermore, the best humor is born out of pain. We make fun of the things that scare us, that hurt us, and that make us angry, and our laughter often diminishes their power over us. If we couldn't make jokes about rape it would actually make healing from rape a little more difficult. That's not to say that every rape survivor can laugh at it or should be expected to ever laugh at it, but it's not something that should be placed on a list of unmentionables, either. If an artist makes a rape joke and it truly is a good rape joke (I have heard a few, but a very very few), then I will be the first to stand and applaud them. If an artist makes a rape joke and it's a bad rape joke (or even if it's a good rape joke and it still offend someone), well, they can't really be surprised when the audience goes after them. That's the risk you take when you play on the fringe.

  Here's the real problem: I'm at a mixer. I'm chatting with a guy I just met. We're drinking beer. Everything seems swell until he leans in and says, "Have you ever been tied up? I think you would enjoy it. I can tell that about a woman." It makes me feel uncomfortable, but I'm not sure if that's because he's testing me or because I wasn't expecting an offer of bondage so soon. Now I've got to make a choice, and a very fast one - do I giggle and "flirt" back, or do I take this as a red flag? If I challenge him on it he'll claim he was just joking and I'm a humorless bitch whether any of that's true or not, so there's really only one way to respond if I don't want things to get immediately confrontational. However, if I give him the benefit of the doubt, I also give him the idea I'm okay with this, which experience has taught me can lead to other bad things. I would suggest that, assuming his intentions weren't dishonorable (at least not really really dishonorable), there are better ways for men to talk to women that would be funny and/or flirty without also making them mental check the location of their pepper spray. Woman are not the sole bearers of responsibility when it comes to interpreting nuance, the speaker bears a certain burden here as well. Judging by the number of men I've met who joke around like this, they either don't seem to get the way they're coming across, or they simply don't care if the women in the room feel less safe around them. It's bad enough that some men intentionally hurt women. I wish that more of the men who would supposedly never intentionally do that would do just a little bit more to protect them from it, especially when it costs them absolutely nothing beyond a little extra consideration. But I'm old-fashioned.

  >> If I was at the Friday night improv and made a joke about getting shot, and someone in the audience was a gunshot survivor and it triggered traumatic memories about nearly dying...Well, it's unfortunate, but I don't owe them an apology.<<

  You might not owe them an apology, but you should probably give them one, just because it might make them feel better to know you sympathize and doing it doesn't cost you anything. Good manners aren't really about debts and obligations, but helping people feel accepted, respected, and at ease. I'm not saying you have to stop your comedy routine to do it, but if you have the opportunity after the show, why not? If you don't want to help people feel those things in your company simply out of the goodness of your heart, consider that you'll probably be more popular when you do (if you're into popularity, which most people are, especially performers).

  >>However, as a final note, I'm curious at what point rape victims began being called "rape survivors."  I'm not saying rape isn't a horrific, violent, traumatic thing to go through.  I just... I dunno.  It sounds... odd.  We don't call victims of other, heinous, but non-lethal (in and of itself, anyway) horrors "survivors."<<

  The word victim, in the strictest Latin sense, means "sacrificial animal." The more modern connotation is someone who suffers from some sort of destruction or injury, particularly when it results in death. Survivors, on the other hand, did not die from the destruction or the injury. For example, the people who died from the tsunami in Japan are tsunami victims. Those who experienced destruction or injury due to the tsunami but are still alive are tsunami survivors. Thus we have murder victims (because they are dead), and victims of theft, victims of assault, etc., although we're really stretching the strict meaning of the word victim to apply it to anyone who is still alive. In this sense "rape survivor" is more technically correct. Using the word survivor also has some psychological benefit according to some victims of rape, since it puts the power back in their hands to deal with the tragedy instead of forever relegating them to the role of a passive victim (which is often particularly important when dealing with rape).
