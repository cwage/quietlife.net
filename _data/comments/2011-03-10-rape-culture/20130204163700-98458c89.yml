name: toryhaze
body: I completely agree with your point of view. These jokes and stories are not
  what is promoting rape culture but the fact that the New York Times participated
  in victim blaming is what completely amazes me. Victim blaming is a major cause
  of rape culture and the idea that these rapists even had the guts to say that an
  11 year old girl was asking for it by dressing older then she was is absurd. Even
  if she was a 20 year old woman dressing her own age it does not mean you can rape
  her. Im also baffled by the fact that so many participated and not one out of 18
  men could realize that what they were doing was sick and wrong.
