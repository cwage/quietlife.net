name: Graceless
body: |-
  See, I'm in a libertarian dilemna with this issue. (Which is why I guess I'm not a 100% staunch libertarian).
  \*I prepare to get lambasted by some of those really really vocal & defensive bloggers out there\* --Insert big courageous "Here I Go" sigh--
  Although I all about the "let me live and I'll let you live" philosophy, I think that there are lines. When someone smokes, they are doing something that is believed by most scientists to be harmful to them and *those around them*. That is where my issue is. If you want to smoke in your own house, go for it. But don't inflict your harmful addictions on those who chose to share the same *public* space.
  Often, people try to compare smoking and drinking alcohol as being the same, but I don't believe that is true. Drinking doesn't directly harm another person, unless the person doing the drinking goes out and mows someone down with their car. That's illegal. Dare I say it, but I think smoking in public places is kin to drunk driving.

  okay, now I'm going to get bombarded. I'm ready for ya...
date: '2007-06-05T20:22:17Z'
slug: 2007-06-04-smoking-is-gross
