name: Erik
body: 'Nice post, good excerpts. I missed the debate, so I''m still hung up on that
  other one, the one that started with "Who thinks Dean can beat Bush?" I think Bill
  O''Reilly, of all people, had the best take I heard on that: That one of the candidates
  should have siezed the opportunity and said "Look, lots of us could beat Bush, because
  . But we have to ask ourselves not just who will be the best candidate, but who
  will be the best President of the United States. And <it''s me>."'
date: '2004-01-05T10:45:26Z'
slug: 2004-01-04-iowa-debate
