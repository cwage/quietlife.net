name: John
body: I didn't notice if this was mentioned yet, but the bigotry is also apparent
  in the use of the Islamic name for God, *Allah*, in the phrase on the T-shirt, *Bring
  'Em On, Allah*. This would seem to support the idea that Cox and Forkum would prefer
  Uncle Sam kill all the followers of Islam who are opposed to the United States and
  its policies, militant or otherwise.
date: '2003-10-30T15:55:56Z'
slug: 2003-10-06-got-hate
