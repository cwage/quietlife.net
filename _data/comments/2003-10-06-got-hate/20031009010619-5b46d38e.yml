name: Forkum
body: "You are simply misinformed on the definition of \"Islamist.\" Our use is not\
  \ \"new and co-opted.\" Hopefully the following will be sufficient explanation,\
  \ but I recommend looking into it further for yourself (beyond your dictionary).\n\
  \nTo demonstrate the commonality of my use of the word \"Islamist,\" I went to CNN\
  \ and searched the site for the word \"Islamist.\" The first article to appear was\
  \ this: [Islamists tighten grip in Kuwait](http://www.cnn.com/2003/WORLD/meast/07/06/kuwait.elections.results/index.html\
  \ \"http://www.cnn.com/2003/WORLD/meast/07/06/kuwait.elections.results/index.html\"\
  ). Here are some excerpts that indicate the nature of Islamists (in contrast to\
  \ moderate muslims):\n\n> Islamists strengthened their grip in the oil rich Gulf\
  \ state, taking about a third of the all-male 50 seats in the national assembly,\
  \ state television said. [...]\n>\n> [T]he emir has the final say, with the ability\
  \ to dissolve the legislature. ... It also controls the media, security forces and\
  \ wealth of the country, with the parliament having only 30 percent of power. [...]\n\
  >\n> Islamists oppose Western influences and seek Islamic governance. ... Women\
  \ and recently naturalized Kuwaitis are excluded from casting a ballot.\n\nThat\
  \ was just one random sample from a common news site. As I said before, Islamists\
  \ seek to establish Islamic states by force, that is, by law (theocracy) and/or\
  \ by direct violence (terrorism). The article above demonstrates the theocratic\
  \ aspect of Islamism.\n\nFor expert information on Islamism, [Daniel Pipes](http://www.danielpipes.org/\
  \ \"http://www.danielpipes.org/\") is an excellent source. In his article [Fighting\
  \ Militant Islam, Without Bias](http://www.danielpipes.org/article/79 \"http://www.danielpipes.org/article/79\"\
  ), Pipes explained:\n\n> The problem at hand is not the religion of Islam but the\
  \ totalitarian ideology of Islamism. As a faith, Islam has meant very different\
  \ things over 14 centuries and several continents. What we can call \"traditional\
  \ Islam,\" forged in the medieval period, has inspired Muslims to be bellicose and\
  \ quiescent, noble and not: one can't generalize over such a large canvas. But one\
  \ can note two common points: Islam is, more than any other major religion, deeply\
  \ political, in the sense that it pushes its adherents to hold power; and once Muslims\
  \ do gain power, they feel a strong impetus to apply the laws of Islam, the shari`a.\
  \ So Islam does, in fact, contain elements that can justify conquest, theocracy,\
  \ and intolerance.\n>\n> In the course of the twentieth century, a new form of Islam\
  \ arose, one that now has great appeal and power. Militant Islam (or Islamism\x97\
  same thing) goes back to Egypt in the 1920s, when an organization called the Muslim\
  \ Brethren first emerged, though there are other strains as well, including an Iranian\
  \ one, largely formulated by Ayatollah Khomeini, and a Saudi one, to which the ruling\
  \ Taliban in Afghanistan and Usama bin Ladin both belong. Islamism differs in many\
  \ ways from traditional Islam. It is faith turned into ideology, and radical ideology\
  \ at that. When asked, \"Do you consider yourself a revolutionary?\" Sudanese Islamist\
  \ politician Hasan al-Turabi replied, \"Completely.\" Whereas traditional Islam\
  \ places the responsibility on each believer to live according to God's will, Islamism\
  \ makes this duty something for which the state is responsible. Islam is a personal\
  \ belief system that focuses on the individual; Islamism is a state ideology that\
  \ looks to the society. Islamists constitute a small but significant minority of\
  \ Muslims in the U.S. and worldwide, perhaps 10 to 15 percent.\n>\n> Apologists\
  \ would tell us that Islamism is a distortion of Islam, or even that it has nothing\
  \ to do with Islam, but that is not true; it emerges out of the religion, while\
  \ taking features of it to a conclusion so extreme, so radical, and so megalomaniacal\
  \ as to constitute something new. It adapts an age-old faith to the political requirements\
  \ of our day, sharing some key premises of the earlier totalitarianisms, fascism\
  \ and Marxism-Leninism. It is an Islamic-flavored version of radical utopianism.\
  \ Individual Islamists may appear law-abiding and reasonable, but they are part\
  \ of a totalitarian movement, and as such, all must be considered potential killers.\n\
  \nAs for our \"visual cues\" about the violent nature of Islamists, you're right,\
  \ we did choose a scimitar on purpose. But not to connote a new Christian Crusade\
  \ as you sarcastically implied (I'm an atheist), but to connote the Dark Age mentality\
  \ of Islamists. Everyone knows that Islamic terrorists primarily use guns and bombs,\
  \ but apparently you are unaware that [a long, curved sword](http://www.hrw.org/backgrounder/mena/saudi/\
  \ \"http://www.hrw.org/backgrounder/mena/saudi/\") is used by Islamists *today*\
  \ when certain sharia laws in Saudi Arabia are violated. From an April 2000 AP report:\n\
  \n> \"Barefoot, with feet shackled and hands cuffed behind his back, the prisoners\
  \ is led by a police officer to the center of the sheet and made to kneel. An Interior\
  \ Ministry official reads out the prisoner's name and crime before a crowd of witnesses.\n\
  >\n> \"A soldier hands a long, curved sword to the executioner. He approaches the\
  \ prisoner from behind and jabs him with the tip of the sword in the back so that\
  \ the prisoner instinctively raises his head.\n>\n> \"It usually takes just one\
  \ swing of the sword to sever the head, often sending it flying about three feet.\"\
  \n\nUsing a scimitar in our cartoon (instead of a bomb) captures both the threat\
  \ of violence *and* the theocratic mentality.\n\nAs for America's coming to understand\
  \ the meaning of \"Nazi,\" the phrase \"National Socialist\" did not indicate the\
  \ genocide to come. America needed to be educated on the racist aims of Hitler,\
  \ which is what Szyk set out to do. Unfortunately it wasn't until the concentration\
  \ camps were liberated that most Americans understood fully.\n\nThe same could be\
  \ said of many Americans today regarding the aims of Islamists. Except that, after\
  \ witnessing the slaughter of 3,000 innocent people on 9/11, Americans today have\
  \ no excuse for their ignorance."
