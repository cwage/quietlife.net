name: cwage
body: I was referring to my own pedantry. I have a bit of a pet peeve forming about
  ad hominem accusations. "ad hominem" from a logical perspective refers to subverting
  the discussion **away** from an argument at hand by attacking the person, irrelevantly.
  If the topic is criticism of you, then, uh, a criticism of you is quite relevant.
  Because you take offense at something doesn't make it an ad hominem fallacy.
date: '2003-10-07T22:51:19Z'
slug: 2003-10-06-got-hate
