name: Amanda
body: 'I think we already have this term: "Fundamentalist Islamic Terrorist". It works
  pretty well. It''s very specific and descriptive. It doesn''t leave a whole lot
  of room for misinterpretation. Granted, it probably doesn''t look so snappy on a
  t-shirt. But let''s say for a second that people really want a single 3-syllable
  word that means that same thing as Fundamentalist Islamic Terrorist, which is really
  messy and long at 11 syllables. So you and your partner at you little political
  cartoon decide you are going to introduce a new word into the lexicon. (or co-opt
  a word only being used by say, conservative bloggers, but not the general population)
  Good for you. I say, give the people what they want \*cough\*. But, when the word
  ALREADY MEANS SOMETHING ELSE you have to be pretty specific when you are introducing
  it the population at large. Because when I see it, or every single person I''ve
  shown the cartoon to goes "Wow, this is horribly bigoted", you either need to admit
  that yes you can see how it is very offensive, rectify the error, make it very specific,
  have it say "Fundamentalist Terrorist" or whatever, OR you need to deal with the
  apt, justified criticism. You went out on a limb, a really dangerous and precarious
  limb, and assumed that people know this vague term "Islamist" (which I cannot stress
  enough has another \*primary\* meaning) means. I think I''ve shown that alot of
  people don''t know, and among these people politically aware, politically active
  men and women with doctorates. If you want to stick by your work you have to suffer
  the slings and arrows. The population at large is not here to read your mind or
  your intent, but interpret your message based on experience. You can''t follow everyone
  who wears your shirt around explaining to people who encounter it what you REALLY
  meant. Right? Change it or deal with the fact that it''s offensive.'
date: '2003-10-10T14:17:01Z'
slug: 2003-10-06-got-hate
