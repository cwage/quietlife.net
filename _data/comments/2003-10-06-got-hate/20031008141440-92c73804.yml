name: Amanda
body: |-
  For the record, I find the t-shirt offensive and bigoted. I immediately interpreted the term "Islamist" to mean someone of the Islamic faith.
  Either: A. this is what you intended or B. there is a big skew between your intended meaning and the shirt's actual symbolic meaning.
  This is not to suggest that you should be in the business of making everyone happy and not offending anyone. But when you do things like this (making a t-shirt that is VERY very offensive) , you can't act surprised and dismayed when people think you are in the business of being a small-minded, ignorant, violence-prone, gun-fetishizing, flag-wrapping bigot.
date: '2003-10-08T14:14:40Z'
slug: 2003-10-06-got-hate
