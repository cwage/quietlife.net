name: Amanda
body: 'FYI: a quick survey of some of the political science and sociology professors
  at my university shows that these highly educated professionals interpret the word
  Islamist simply to mean ''follower of Islam''. Go figure. Maybe your t-shirt does
  appear bigoted and hateful to a significant number of people, making this its interpreted
  or symbolic meaning.'
date: '2003-10-09T14:06:52Z'
