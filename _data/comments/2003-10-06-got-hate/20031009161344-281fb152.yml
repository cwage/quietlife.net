name: Forkum
body: Amanda, what your quick survey reveals is not surprising. Even the definition
  of Islamist that I am arguing for includes "a follower of Islam." But there is already
  another word for that; it's "muslim." Whether your professors know it or not, "Islamist"
  has evolved to describe a specific type of muslim, the type who advocates forcing
  Islam on others, whether through terrorism or law. Did you read the Daniel Pipes
  article that I linked to above? Would you agree that it is a good idea to distinguish
  between peaceful, moderate muslims and those who want to kill and oppress us?
