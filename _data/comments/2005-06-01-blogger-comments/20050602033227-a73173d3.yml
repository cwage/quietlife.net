name: Lhys
body: |-
  If I'm not mistaken, when Blogger first started with the comments there were two options: Blogger user (login) or annonymous. Then, some months later, people could post signing their name and website too, even without login at Blogger -- and it's still up.

  I think it depends on the writer's choice then.
date: '2005-06-02T03:32:27Z'
slug: 2005-06-01-blogger-comments
