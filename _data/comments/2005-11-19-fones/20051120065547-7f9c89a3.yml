name: cwage
body: |-
  > Things are as they are. It’s not enough to say that crimes were committed unless you have a plan of action to rectify the situation that isn’t going to make things even worse

  NO!!

  > We just want to keep similar things from happening in the future.

  Yes!!!

  That is, no, things are NOT as they are. Accepting hopeless corporate/government collusion as an acceptable status quo just because "hey that's the way things go" is not acceptable.

  But YES, I hope to prevent similar things from happening in the future. I.e. I hope that future efforts to foist socialist treatments to societal ills avoid the tendency to be co-opted by private interests.
date: '2005-11-20T06:55:47Z'
