name: steve L.
body: It is because of quotes like that one that I have very little respect for Hitchens.
  Yeah, sure his arguments are bit more "intellectually" based compared to the rest
  of the pro-war clan. But in the end he's still making illogical hubris-bursting
  arguments.
date: '2006-03-20T02:37:36Z'
slug: 2006-03-19-more-dissing-hitchens
