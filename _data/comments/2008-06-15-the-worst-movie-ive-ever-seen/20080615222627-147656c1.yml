name: Kate O'
body: When it came out, there seemed to be this hushed reverence about it and no one
  would say a disparaging word. When I saw it, I realized it was just that no one
  understood it and that means most people who saw it thought it was *just that good*.
  No, people. It was asinine.
date: '2008-06-15T22:26:27Z'
slug: 2008-06-15-the-worst-movie-ive-ever-seen
