name: Lindsey
body: About the time that someone made the argument that perhaps the natives couldn't
  see the ships coming because they had no concept for ships, I realized it was best
  to just imagine the movie was a parody of something much more meaningful. Sheesus,
  what a painful flick.
date: '2008-06-16T06:30:05Z'
slug: 2008-06-15-the-worst-movie-ive-ever-seen
