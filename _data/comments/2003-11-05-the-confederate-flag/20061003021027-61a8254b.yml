name: my rebel flag flys high
body: I am from the south and I fly my rebel flag... I am sorry if it offends you
  but if it does you need a history lesson... for one... the war that the rebel flag
  was in was not about slavery.. it was about taxes... so if your ganna sit there
  and say that it is a racist symbol...I am sorry but I beg to differ... maybe it
  is just a southern thing and all yall Yankees will never understand but if you have
  a problem with it you need to get the facts straight and then make an argument over
  it.... get it... got it?...GOOD!!
date: '2006-10-03T02:10:27Z'
slug: 2003-11-05-the-confederate-flag
