name: Jarrett Kitchens
body: The Confederate flag stand for courage, honor and the willingness to fight against
  overwhelming odds. My ancestors did not own slaves yet they fought and died for
  their way of life, the states of Georgia and Alabama, and not slavery. Every slave
  ever brought into the United States was done so by northerners and northern shipping
  companies. On top of that slaves that were sold to US slave traders were already
  enslaved by other Africans but their flag is not considered racist. Unfortunatly
  hate groups like the KKK and neo nazis have perverted the flag and its meaning as
  a negative symbol of hatred. I despise these groups for the shame they have brought
  to the flag and my heritage. To me,the flag will always represent my heritage and
  not racism. Keep It Flying!
date: '2004-09-17T20:23:00Z'
slug: 2003-11-05-the-confederate-flag
