name: Kendall
body: The Confederate battle flag is in no way "racist" at all,unless you intended
  it to be. The Confederate battle flag is a symbol of heritage. It should in no way
  be offensive to anyone. If you think about it... who first brought slaves to the
  country? Was it a Southerner? NO! And think on this one... I have many German friends,
  so should I hate them for what they did? No, because it all happened so long ago.
  So next time you hear someone complaining about the Confederate flag, make them
  think about it.
date: '2004-06-01T21:41:45Z'
slug: 2003-11-05-the-confederate-flag
