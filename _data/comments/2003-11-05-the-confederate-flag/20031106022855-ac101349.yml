name: Doug Orleans
body: |-
  > *It does, however, display willful disregard for the people that find it offensive, frightening, and threatening.*

  Yes, it does. But it doesn't necessarily mean it's "wrong" (as Dean said in [his explanation](http://www.nytimes.com/2003/11/05/politics/campaigns/05DEBA.html "http://www.nytimes.com/2003/11/05/politics/campaigns/05DEBA.html")). Calling some speech (and yes, I'm going to say that displaying a flag decal is speech) wrong because it offends someone-- *regardless of what the speaker meant*-- is knee-jerk political correctness, and I'm just tired of that. Context always matters.

  It just struck me that maybe my tolerance for the Confederate flag is solely due to having been a huge "Dukes of Hazzard" fan when I was 9. (The car was called the *General Lee*, even!) Maybe that's not a good thing, but maybe it demonstrates that new generations grow up with completely different associations for symbols than their original ones.
date: '2003-11-06T02:28:55Z'
