name: k johns
body: Just remember that the southern states had a way of life which included slavery.
  The rebel flag does not just represent slavery. It was a way of life and the southern
  planters fought to keep thier way of life. So displaying the rebel flag to me is
  just the same as displaying the oringal 13 colonies flag. Or course some people
  use it as a sign of racism,but that is not what the flag was inttended for. I have
  ancestors that fought in the Civil War on the rebel side and i display the flag
  as a sign of heritage. In fact i personaly know many people who display for the
  same reason. Some if some one in New York sees the rebel flag and wants to jump
  to conclusions that the person displaying the flag is racist then let that idiot
  think what they want they want to think.
