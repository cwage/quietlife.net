name: liza
body: |-
  "This raises a question: who changed the meaning? Who co-opted the flag to represent racism? The answer: racist, white supremacist organizations using it as a symbol."
  I think you bring up a terribly valid point within this paragraph that is often overlooked. However, why would the representation of the confederate battle flag be "ludicrous" when applied to the civil war. What is so ludicrous about that? IT WAS THE BATTLE FLAG..Not the official state flag. It did not necissarily condone slavery just because it was made during the time of slavery. Let me reiterate the fact that it was not the STATE FLAG..I think refering this to racism is a stretch...but opposing opinions shall forever clash. I can't help but wonder how you feel about the people that put confederate flags on the graves of their loved ones who fought and lost their lives..shall we snatch that right away as well? I'm going to quote you in my term paper because you do have the intellect to support your opinion, which most people with the "racist" view of the flag don't have the curtiousy to do.
