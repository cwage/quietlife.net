name: Erik Ostrom
body: You crazy kids and your purposeful irreverence! Enough, I say! But also, Slate
  has [a good piece](http://slate.msn.com/id/2090775/ "http://slate.msn.com/id/2090775/")
  on this by William Saletan (followed by a ho-hum "debate awards" segment), and [another
  one](http://slate.msn.com/id/2090748/ "http://slate.msn.com/id/2090748/") by Chris
  Suellentrop.
