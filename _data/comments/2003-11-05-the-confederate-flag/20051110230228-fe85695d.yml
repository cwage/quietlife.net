name: Jason Thompson
body: I believe that yall oughta know the whole truth bout the slavery deal with this
  here flag contraversy. First, learn some history and you'll find that the underlying
  cause for the war was slavery. But that only went bout as far as. The yankee congress
  actually quit allowing southern congressmen from speaking bout anything in congress.
  If one of them did speak, they wouldn't hear them out. So some of the states left
  the Union in order to actually have freedom which was being denied to them. Also,
  less than 10% of white southerners owned slaves, and if it had been a war for keepin
  slaves, then not even half of the men that fought for the Confederate Army would've
  actually fought. So, the battle flag that some people hate today, actually was this
  nation's second war for independence. Both the American flag and the Confederate
  flag was made for a new country that wanted to break away from their original oppressing
  country that they was part of. So if you think that our Confederate Flag in a symbol
  of racism, or it should be took away because its a symbol of rebellion against the
  country, then think again. Both flags stood for a rebellion for freedom, and to
  show your true colors, blue bars 'n white stars, is just a symbol of pride. There
  ain't nothin different from what the Confederate flag and the Itilian or any other
  flag means that gets showed off.
