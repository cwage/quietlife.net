name: Aunt B.
body: |-
  Has the world gone mad? Racist? Only crudely addresses issues? Are we watching the same show?

  "I get the impression that I’m supposed to be deriving some sort of vicious, brutal truth about how deplorable (and self-inflicted) the state of African-American culture is."

  But they live in the suburbs. And the cartoon is beautifully rendered. How does that suggest something deplorable? Or vicious and brutal?
