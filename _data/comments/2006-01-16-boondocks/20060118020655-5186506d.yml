name: Aram
body: The pace of the show is glacial. The voices are awful. The violence is just
  irritating. The comic is a lot of fun. The TV show is just totally joyless. They
  lost me with the episode where the grandfather kills the other old guy in a street
  fight.
date: '2006-01-18T02:06:55Z'
slug: 2006-01-16-boondocks
