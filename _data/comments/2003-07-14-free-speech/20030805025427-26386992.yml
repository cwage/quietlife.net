name: Amanda
body: I would also like to add that usually when we pass signs for Pulaski, I go 'Pulaski!
  that's a good Polish name! Yay Slavic people!' Little did I know it was the birthplace
  of the Klan, and hence my little 'yay Slavic people!' tradition has been ruined.
  \*frown\*
date: '2003-08-05T02:54:27Z'
slug: 2003-07-14-free-speech
