name: Brian Lewis
body: While the Hamburglar comment is funny, others should study history before leaving
  messages. Nathan Bedford Forrest left the KKK when reconstruction ended. The KKK
  had very little history then of anything but helping victims of carpetbaggers. The
  KKK of today was started in the 20th century in I believe, Indiana. Mr. Forrest
  own head slave fought side by side with him during the war and after the war choose
  to stay "close friends" with Mr. Forrest. Those were the words of his great grandson.
  I encourage you to study history with books and records from the time period, and
  not relay on a fifteen minute high school class.
date: '2005-06-17T01:33:11Z'
slug: 2003-07-14-free-speech
