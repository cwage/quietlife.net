name: CW Nashville Guy
body: P.S. If you’ll look at CW history of the South you’ll find that Conf. Pres.
  Jefferson Davis appointed Benjamin P. Judah to be the first Attorney General of
  the Confederacy on February 25, 1861, remarking later that he chose him because
  he “had a very high reputation as a lawyer, and Davis’ acquaintance with him in
  the Senate had impressed him with the lucidity of his intellect, his systematic
  habits, and capacity for labor.” Benjamin has been often referred to as “the Brains
  of the Confederacy. Benjamin P. Judah was the son of Phillip Benjamin, an English
  Jew, and his wife, Rebecca Mendes, a Portuguese Jew. Now ain’t that a kick in the
  pants for the KKK ! ! ! !
