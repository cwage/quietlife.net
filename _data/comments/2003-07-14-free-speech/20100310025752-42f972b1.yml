name: CW Nashville Guy
body: While I find this statue tasteless and down right ugly. It is located on private
  property. The individal who owns the property where the statueis and the sign is
  a member of "The Sons Of Confederate Soldiers". That organization revoked his membership
  when he ereceted this monstrosity. The guy is a little whacked in the head if you
  know whatI mean. It's not even a good likeness of Gen. Forrest.
