name: Stormare Mackee
body: |-
  *Why does it need to be limited? I have never gotten a straight answer to this question.*

  Perhaps you should [ask](http://www.abqtrib.com/albq/nw_world/article/0,2564,ALBQ_19864_4603675,00.html "http://www.abqtrib.com/albq/nw_world/article/0,2564,ALBQ_19864_4603675,00.html") the [French](http://www.cantonrep.com/index.php?ID=279155&Category=23 "http://www.cantonrep.com/index.php?ID=279155&Category=23"). Didn't work out too good. I'm all for controlled, legal immigration; it increases diversity, among other things -- but we should learn from painful experiences in many European countries that now are facing the severe social and economical problems of decades of "open doors" immigration. Until now, the U.S. has "absorbed" immigrants, whose diverse cultures have integrated with the American mainstream. But now, Latino culture is starting in many areas compete with, or even overtake, the mainstream Anglo culture. I think we are concentrating on the economic effects and underestimating the social and cultural significance of this change. Another problem with Mexican immigration is that it's basically the Mexican government [shifting their social and political problems to the U.S](http://www.frontpagemag.com/Articles/ReadArticle.asp?ID=22037 "http://www.frontpagemag.com/Articles/ReadArticle.asp?ID=22037"). Unless conditions (in certain areas) south of the border change, we'll be facing wave after wave of illegal immigrants, no matter how many times we grant the amnesty. We should first force -- and help -- the Mexican government to ensure that nobody *needs to leave* Mexico in order to make a living, and then do our best to accept those *who really want* to work in "jobs that Americans do not want". How's that?
