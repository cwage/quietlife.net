name: John Hutcheson
body: Not unlike some people who wouldn't be where they are without a certain last
  name, The American Cafe would be gathering cobwebs were it not for their location..I
  guess that people think that if it made the Green Hills Mall it must be good, but
  those people would be wrong.
date: '2005-11-20T15:51:47Z'
slug: 2005-11-13-american-cafe-a-brief-review
