name: Sky1watch00
body: So glad to find this site! JUST TODAY bought a used 2003 VW Passat that I LOVE
  and got home to find the heater core is bad and had been bypassed. Anybody know
  if there is a chance that VW would do anything for me if the dealership will not
  when I call their hand on it since they said the heat worked fine? Love the car,
  hate the liars that sold it to me.
