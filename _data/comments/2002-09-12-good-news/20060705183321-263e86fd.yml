name: matthew
body: the heater core in my 96 gti blew out and damaged the coil pack,the carpets
  as well as hot coolant all over my feet. vw told me they would not repair or compensate
  for the work needed. the milage is under 100k and im pissed. can we force them to
  do a recall with a lawsuit?
