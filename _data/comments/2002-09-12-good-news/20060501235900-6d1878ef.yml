name: Diana
body: My 2002 Passat had the the fumes so bad inside that the I could not see out
  of the windows. Took it to the dealer and got quoted $2,800. to fix the leaking
  heater core and fan clutch!!!! I almost fainted. I wrote and called VW America and
  they said "sorry your car has too many miles on it"(65K)! this is outrageous, I
  am going to pursue consumer complaint divisions and possibly legal remedies. Please
  respond back if you are interested in reporting your heater core problems -
date: '2006-05-01T23:59:00Z'
slug: 2002-09-12-good-news
