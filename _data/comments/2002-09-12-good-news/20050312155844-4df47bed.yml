name: Joe
body: The heater core on my 2001 VW Passat with 47K miles,which only had a two year
  warranty, blew about 4 days before the end of my lease. I took it to the best repair
  shop I know and it is being fixed; I did not know about the heater core problems
  of Passat until I called the dealer after taking it to the local shop. Dealer told
  me that VW may not cover it because I did not bring it to dealer. I certainly don't
  think that is right. Plan to call VW customer care 1st thin Monday. Will see if
  they are responsive.
date: '2005-03-12T15:58:44Z'
slug: 2002-09-12-good-news
