name: jba
body: Does anyone know of any legal action taking place against VW America? I have
  a 2003 passat wagon and the engine blew at 23,000 miles, since then I have had nothing
  but problems. My engine died again at 44,000, hoses had blown and needed a rental
  car. VW told me where to send the reciepts for reimbursement and then recieved a
  letter telling me that would not cover the cost because this repair was not covered
  under warranty but as a "GIFT" to me they covered it and I should be happy that
  it was covered. I have contacted VW many times regarding all these problems and
  have had nothing but "Sorry for your problems but there is nothing we can do". I
  leased this car and I am turning it in early because I can not trust it to drive
  anywhere with the kids in it. They told me that they would settle my lease after
  the car goes to auction. I can't believe that VW would resell this car to another
  individual. Volkswagon is the worst company I have every dealt with and would never
  give them business again. I hope this helps someonelse avoid buying a piece of crap
  like I unknowingly did. Don't buy VW!
date: '2006-08-23T13:14:51Z'
slug: 2002-09-12-good-news
