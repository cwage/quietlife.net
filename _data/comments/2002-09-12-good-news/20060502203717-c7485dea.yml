name: Julie
body: I have a 2000 VW Passat 4 Cyl, the heater core is cracked. I contacted VW of
  America and they said I needed to get a diagnosis by the VW dealer, so I did last
  week, paid $99.00 for the 1 hr diagnostic fee, even though the service consultant
  told me they already knew the diagnosis and it took his tech 10 min to diagnosis
  it professionally. I awaited a call back from VW of America, they said 48 hours.
  They just told me yesterday that they can't assist with any of the repairs ($1193.00)
  because of the age of the car and the mileage 89K Can you believe this? I have read
  here that 10 yr + cars are getting repaired by VW of America. Is there any recourse
  here?
date: '2006-05-02T20:37:17Z'
slug: 2002-09-12-good-news
