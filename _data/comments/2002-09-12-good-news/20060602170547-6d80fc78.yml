name: derric
body: So my heater core in my 97 passat goes out the other week, I get sick, miss
  a couple days of work. I keep driving, get sick again and then my coolant light
  goes on. so i call vw and the dudes a douche, so i call vw of america and that guy
  tells me that i do not qualify for any compensation of the repair. he even told
  me vw knows about the problem but there is not enough of a danger to the owner on
  the passat to issue a bulletin or recall. this is bullshit. I am the 2nd owner on
  this car, and vw can damn well expect to hear from me a lot more. I will call them
  everyday until i get either compensated, a bulletin written, a recall issued, or
  a lawsuit. I say we go class action on their ass.
date: '2006-06-02T17:05:47Z'
slug: 2002-09-12-good-news
