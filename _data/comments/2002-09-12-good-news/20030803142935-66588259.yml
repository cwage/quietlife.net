name: nyc road tec
body: |-
  On my 88 jetta
  & now 90 passat
  Coolant berak down lowers boiling temp to 212f-230f and there is no pressure relif vave.A north american hot watter heater it is a manditory saftey equip.But I guess not on a jetta or passat.
   The heater core is the weakest link and it popps like a tea biscut.
   Unlike a one pipe heat exchanger ;this one has a plastic end cap pressed on its side to make connections.
   A oil or transmisson cooler might be a hi pressure answer.
   But first lets see If the dealer will do the right thing....
   I will clean out my car real pretty.Take all my tools out and come in with coolant on my legs and try to pump the dealer to fix it.
