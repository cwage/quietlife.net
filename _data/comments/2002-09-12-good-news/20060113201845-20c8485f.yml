name: Chris
body: Well I called VW support and spoke with a Shaun McFarland who took my information,
  then put his regional manger on the line, who wanted to know if there were any injuries
  as a result(and I imagine pending lawsuit), I said no, then was fed canned answers,
  that all began with "well Mr. \*\*\* we can't help you...". This is my second passat
  and will definately be the last considering this is a well known issue with them.
  Their customer service line is nothing more than a "sorry we can't help you unless
  there has been a recall or injury" line. Considering the cost of aquisition and
  parts and repairs VW does not seem to be a company worth doing business with. I
  will post my results to all the VW forums I can find and also point them to this
  post. Well a lesson learned and remember BUY American!!! What really amazes me is
  the obvious canned responses from the manager, I think they have to memorize them
  ALL before they can become manager. Sheeesh...
date: '2006-01-13T20:18:45Z'
slug: 2002-09-12-good-news
