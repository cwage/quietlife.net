name: Trent
body: |-
  I have the same problem with a 2002 Passat GLS 1.8t. Bad heater core. None of the other symptoms except my heat doesn't work. $1200 quote to repair it. I called VWofA and talked to the customer care person AND their supervisor. Both of them told me to pound sand. I do have 125k miles on the car, but c'mon. I have had the car serviced EVERY recommended time at a VW dealer since I got it. I have paid to have the entire computer replaced because it fried in a rainstorm, ($5k) and in the first 3 days that I bought the car, the drain system in the sunroof area overflowed and filled my whole car about 6 inches of water. (I parked on a slight incline and had the VW brand sunroof air guard, which caused the water to pool and drain down inside.) THe window motor died - $500 to fix it. Nothing but problems with this car.
  Anyone know a good non-VW shop to bring this to fix the heater core in the PHiladelphia area? I can't see paying $1200 if I could only sell the car for about $4500.
date: '2009-02-23T19:16:00Z'
slug: 2002-09-12-good-news
