name: eb
body: I have a 2001 1/2 Passat V6. My heater core is bad. I am bringing the car to
  the dealer next week. I have a call into the Customer Care number. I will find out
  if they will pay for the heater car. My car has 80,000 miles. My car has many of
  the other problems listed on this site, CV joints & boots replaced, and evap coil
  sensor needs replacement, as check engine light comes on sometimes. I also had both
  heat light assemblies replaced as the wiring was bad and I was getting blown bulbs
  constantly.
date: '2006-11-11T01:41:06Z'
slug: 2002-09-12-good-news
