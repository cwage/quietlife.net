name: Rob
body: I'm glad I ran across this site. The heater core on my 2001 passat blew at 39,000
  miles. It was a $1,200 job at the dealer. I called VW of America and they agreed
  to pay the whole bill. I wouldn't have even considered contacting VW if I didn't
  see this site. Thanks.
date: '2005-03-22T06:16:49Z'
slug: 2002-09-12-good-news
