name: Marc
body: |-
  Thanks

  I have a '95 Passat VR6. The heater core went a few weeks ago. Found this site.
  Called VW of America and complained.

  They covered everythign except the rebuild of the heater box (b/c the antifreeze ate up all the foam)
  I may still try to have them pay for that portion of the bill.
date: '2005-10-24T15:10:25Z'
slug: 2002-09-12-good-news
