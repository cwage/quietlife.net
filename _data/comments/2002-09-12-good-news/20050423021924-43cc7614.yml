name: sasha
body: |-
  i got 96 gti vr6 my heater core alsp blew out. i went to wv and told them about all the complaints and recalls but they said that was back in 88 or something! they wouldnt even look if i wasnt willing to pay them like $150 for the core and about $700 for labour so i decided to fix it myself! myself you might wonder,but i do have some mechanical experience!
  i started but taking everything appart even taking the whole dash out and it still wouldnt come out>
  there are 3 bolts right under the fire wall and another two under windshiled wipers screen that hold it in place and by taking all these off all i had to get rid of air conditioning lines which meant releseing the gas?
  SO MY QUESTION is does anybody know if its possible to take the heater core out without releasing gas? thanks!
date: '2005-04-23T02:19:24Z'
