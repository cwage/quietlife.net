name: todd l.
body: We have the older 2001 Passat GLX model. The vehicle has approximately 55k miles.
  Sometime in early 2005, a thick white fog began to roll through the interior compartment.
  I topped off the fluids, and hoped that the 'problem' would correct itself. More
  than a week after the smoke began, it stopped. No more smoke. I thought, "Great!
  I guess it's not the heater core afterall." Well, it's now October 2006 and the
  smoke has returned - more billowy than ever. I just spent $1,135 to replace the
  CV joints / Boots and Tie Rods - after a mere 55k miles. Now I can only assume this
  is going to cost another arm and a leg. I hate this car. It has been nothing but
  a black hole for which my money is siphoned away. I will never, EVER, buy another
  VW so long as I live. Our car may be rated highly for safety, but it has been nothing
  but a lemon with regards to reliability, dependability and durability. Volkswagen
  should realize that quality is more than just a pretty package, what is on the inside
  is more important.
date: '2006-10-03T06:50:54Z'
slug: 2002-09-12-good-news
