name: 96 GLX HEATER CORE
body: I have driven VW's my entire adult life!! My heater core on my 96 GLX VR6 went
  bad at 85,000 miles - all of the antifreeze ($25.00 per bottle G11 - blue) leaked
  outside the car. Had to have it towed. Called VW of America - same story - nothing
  we can do because the car is too old...they sounded like the "stepford wives"! Apparently
  these heater cores have the same part number as the ones used in the 1990 heater
  core recall - they are defective and VW knows it and doesn't give a damn - perhaps
  that's why VW dealerships are closing left and right. Right now mine is by-passed
  (cost $60). Winter is coming and I don't know what to do. This is a dangerous problem
  and they don't care. They asked me if I'd shown "dealer loyalty"!! Who can afford
  dealer loyalty these days? Does anyone know if those portable heaters that plug
  into your lighter work?
date: '2009-11-10T01:58:22Z'
