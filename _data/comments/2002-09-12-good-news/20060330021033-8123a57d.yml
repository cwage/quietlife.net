name: Laura
body: 'IMPORTANT: The same thing happened to my 2002 1.8L Turbo Passat. It had 64,000
  miles (out of warranty) but the dealer fought for me and VW America took care of
  it. Now here is the important part: At 94,000 miles my engine has just blown up.
  I did everything right (synthetic oil changes, serviced at Volkswagen mostly). This
  should not happen. I am going to have to fight hard to have them take care of this
  one. It will cost $8,030 (in Bay Area of CA) to fix. PLEASE consider selling your
  car now if you own this model!'
date: '2006-03-30T02:10:33Z'
slug: 2002-09-12-good-news
