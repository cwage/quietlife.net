name: Jim Norton
body: I just bought a 2001 Passat and the defrost blows but does not defrost. I suspect
  a heater core leak. How did you discover that your heater core leaked? Did you get
  results from VW of America? Is this a recall? Will they fix it after warrantee is
  expired?
date: '2006-04-05T10:08:50Z'
slug: 2002-09-12-good-news
