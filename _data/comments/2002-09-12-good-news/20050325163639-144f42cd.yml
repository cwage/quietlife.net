name: Joe
body: Per my previous post of March 12, VW has agreed to pay parts, labor, and tax
  on parts only, not on the labor. So, I am out of pocket about 40.00. I plan to follow
  up on the labor tax issue. Total cost at a very proficient independent shop was
  562.00, including parts, labor and tax. Quite a difference form the dealer charge
  of 1200.00 but no difference to consumer as long as VW reimburses.
date: '2005-03-25T16:36:39Z'
slug: 2002-09-12-good-news
