name: Chris
body: |-
  I have a '95 Passat and the same thing happened, it blew out while driving and I couldn't even wipe it off the windshield, it just kept smearing. I will give VW a call. This is unreal, all these cars with the same problem. How has the success rate been lately with getting them to cover it?
  Thanks Chris
