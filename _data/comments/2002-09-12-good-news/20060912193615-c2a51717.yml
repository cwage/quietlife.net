name: David O
body: Have '93 Passat VR6, blown heater core @ 210k. VWA(Canada) @ 1-800-822-8987
  is a call center and you can't get through to anyone who can do anything. On a vehicle
  of this age you can't go running up a minimum $1200 bill to have the dealer fix
  it, so you have to do it yourself. It is a nightmare first having to remove the
  dash and disconnect all the wiring harness, but worse without a factory schematic
  of how the heater box and evaporator housing can be pulled apart without disconnecting
  the A/C lines, you are in a jam. All I want is VW to provide this schematic and
  then I will get on with the job. The local dealer, who didn't sell the vehicle originally,
  won't assist with this, and the call center say that they can't access it. What
  a way to sour cutomer relationships? Bring on the class action suit. There will
  be hundreds of us just itching to get a few licks in. In the meantime, if anyone
  has a schematic or pictures and can help out, it will be much appreciated.
date: '2006-09-12T19:36:15Z'
slug: 2002-09-12-good-news
