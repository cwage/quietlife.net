name: steve L.
body: Fair enough. But his argument of "All Iran wants is free trade" is a based on
  some shaky assumptions. If we invaded their country, why would the Iranians automatically
  want to trade with us. Maybe they want nothing to do with us. I think they'd be
  a little pissed, don't you? Maybe they are creating a nuclear weapons program so
  they can defend themselves (hey, just like we have nukes!) And it is interesting
  that Hitchens faults Carter for "letting" Iraq invade Iran, but then says nothing
  about the following 8 years we armed Iraq under Reagan.
date: '2006-05-21T07:54:30Z'
