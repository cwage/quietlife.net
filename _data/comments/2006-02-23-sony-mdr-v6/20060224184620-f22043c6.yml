name: Smarasderagd
body: I wound up getting those to replace my broken home pair, with some reluctance,
  but Fry's didn't have any Koss headphones. Nice to know they have a good reputation.
  We'll see how durable they turn out to be under my merciless regime of leaving them
  on the floor and sometimes stepping on them. I've actually taken to leaving them
  on top of one of the speakers when I'm not using them, which may help that.
date: '2006-02-24T18:46:20Z'
slug: 2006-02-23-sony-mdr-v6
