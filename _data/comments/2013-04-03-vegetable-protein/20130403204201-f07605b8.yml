name: Kate O'Neill
body: Well, some of the other ones aren't quite as egregiously wrong as you're depicting,
  though, at least by this measure. Using this approach, cucumbers with peel come
  in about 17.3%. Without peel, about 19.7%. I don't know how they arrived at 24%,
  but by this measure their protein content is not 0%.
