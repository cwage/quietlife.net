body: Values can all be looked up at [http://ndb.nal.usda.gov/ndb...](http://ndb.nal.usda.gov/ndb/search/list
  "http://ndb.nal.usda.gov/ndb/search/list") - easiest way to understand as a percent
  is to look at the value in grams per 100g column, which yields 12.58g/100g (or 12.58%)
  for a boiled egg, 28.5 for beef tenderloin, 2.82 for broccoli, and .65 for cucumber
  (w peel).
