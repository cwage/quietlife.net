name: Cubes
body: |-
  According to that article, he was caught selling on three occasions, twice armed with a pistol.

  Also, evidence was presented that he was "a known gang member who had long used and sold illicit drugs," and that he "possessed and used a number of firearms, some stolen, to facilitate his drug-dealing activities."

  Not exactly some naive frat boy run afoul of the law being unfairly punished -- in fact, it sounds like exactly the sort of person who should be off the streets for a Very Long Time.
