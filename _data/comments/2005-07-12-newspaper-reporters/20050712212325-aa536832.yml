name: Scavenger
body: |-
  It seems clear to me now that despite a brilliant set-up, Rove will emerge unscathed (or, indeed, more powerful than we can imagine) from the Plame controversy. He is focused on victory, and shows every sign of achieving it. And by 'victory' I am speaking, of course, of the one thing that matters to Rove, and the one thing that should matter to the Democratic party. Political victory.

  As anyone who has been involved with a legal case in this country (and by 'involved' I mean 'has watched one or more episodes of Night Court') could tell you, the way he 'leaked' this info will clearly be enough to keep him from getting into trouble.

  Meanwhile the Democrats are doing their best to live up to their reputation for shrill, pointless whining. And worst of all, seem to be working (vaguely) towards some kind of 'official' or worse yet, legal resolution to the problem.

  Has the Democratic party not learned anything from Iran-Contra? It doesn't MATTER if your opponent is indicted, or arrested, or put on trial, or even convicted. It. doesn't. matter.

  The Democrats need to get their message together. What are they shooting for here? Impeaching Rove? Hello, McFly! Hello!
date: '2005-07-12T21:23:25Z'
