name: Cubes
body: |-
  I'd swear that I read somehwere that the statistics show that young (teen/early 20's) drivers are far more dangerous than the blue-hair set.

  Here in Florida we have the worst of both worlds: grannies putting along in the left lane, kids weaving in and out at high speed, trying to get around them.
