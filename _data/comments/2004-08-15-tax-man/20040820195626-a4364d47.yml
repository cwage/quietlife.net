name: cwage
body: |-
  > I'm beginning to believe Belmont U. is the center of the Bizarro Economic Universe.

  Belmont U is an odd university. You've got a weird mix of the conservative christian kid crowd, mixed in with the music business major clones with their hipster hairdos and messenger bags.

  And oddly, they've got a pretty good (albeit very small) sociology department, where my girlfriend goes.

  Go figure.
