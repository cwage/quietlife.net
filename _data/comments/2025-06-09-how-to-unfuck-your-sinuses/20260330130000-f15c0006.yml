name: The Dispassionate Observer
body: |
  The phenylephrine thing is worth highlighting because you were ahead of the news cycle on this. The FDA advisory panel voted 16-0 in September 2023 that oral phenylephrine is no better than placebo, and the FDA proposed pulling it from the approved monograph. And yet -- as of right now -- Sudafed PE is still on shelves. The regulatory process is that slow. So you're right that it's a scam, but "sleight of hand to keep sales up" makes it sound like a conspiracy when it was really just decades of regulatory inertia. The FDA approved it under old evidence, the evidence was overturned, and the bureaucracy hasn't caught up yet. Less sinister, more depressing.

  The neti pot section still bugs me though. Your own specialist had warning posters on the wall. You acknowledge the real risk of water pooling and breeding bacteria. And then you wave it off and hint that maybe the doctor's incentives were misaligned -- "I won't put on my tinfoil hat here" followed immediately by putting on the tinfoil hat. For what it's worth, the CDC and ENT professional organizations still endorse sinus irrigation as safe *with proper water* (distilled or boiled). So you're not wrong that it works. But the way you got there -- dismissing your specialist's concerns as possibly financially motivated -- is the kind of reasoning that leads people to worse places.
