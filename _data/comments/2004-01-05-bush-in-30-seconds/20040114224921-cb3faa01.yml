name: GrannyRant
body: |-
  Thirty Seconds it too long to endure the BushBoy.

  Could I have pancakes instead?

  Must be time to start assembling the missile defense system on the Moon and in near space. This has been part of the NeoCons objectives as stated on the PNAC website: Control of Space, Cyberspace, and the U. S. Space Command.

  Tried to send the link to "Rebuilding America's Defenses" on the PNAC Website, but for some reason the links will not work tonight.

  I can call them up on the computer, but when I copy them and include on a post or comment, they go to a warning message then "not found"

  Gotta sleep

  Gran

  They appear to be right on schedule.

  Gran
