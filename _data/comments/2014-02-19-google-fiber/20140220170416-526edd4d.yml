name: David Beronja
body: |-
  It's either Google Fiber or the city builds a public utility fiber network. Since we have crazy people who think anything government does is bad the second option will happen probably never in Nashville. The existing providers have shown no interest in upgrading their networks or anything close to decent customer support or even care beyond profits.

  I hope that if this happens Google Fiber comes in honey squares.
date: '2014-02-20T17:04:16Z'
slug: 2014-02-19-google-fiber
