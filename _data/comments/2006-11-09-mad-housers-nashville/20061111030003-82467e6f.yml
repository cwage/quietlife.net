name: M.
body: Dang, Chris, I have commitments on Tuesday and Thursday nights. Would you consider
  coming to Smyrna, TN on November 18th to discuss this on our podcast? We have the
  Middle Tennessee Blogger and Podcaster's group at 2:00 PM at Espresso Joe's in Smyrna,
  TN. Ciao, baby... Tell that lovely wife of yours hello.
