name: Chris Wage
body: |-
  Mike Tyson's life story reads like some sort of twisted comic book character's rise to evil.

  A poor kid from the streets, driven to fisticuffs only by someone killing his pet pigeons.

  Don't you see that he's just a misunderstood genius? Except for the whole part about biting people and raping women and being crazy.
date: '2002-01-22T20:59:46Z'
slug: 2002-01-22-mike-tyson-is-nuts
