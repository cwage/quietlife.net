name: ban-tyson
body: |-
  Aggghhhh God some of you people are complete fuckin morons, it gives me a barfy feeling in my throat. Tyson's a living, breathing piece of SHIT, and not only do I fucking hate him, but also all of you fucking moron retard dipshit fans that keep him going. I HATE YOU and you make the world a shittier place. Would you idiots still like him if he wasn't famous? He's a scumbag--fame or not.

  To the stupid retard ^ up there who said "why would he wanna rape when he has women fall as his feet for his money"....well, part of the reason men rape women is because of the issue of power. And with a temper like that asshole, it's pretty likely that's the case.

  Now, or anytime really, would be a great time for him to get the fucking shit beat out of him 'til he's dead.
