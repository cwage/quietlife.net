name: jag
body: |-
  I can't STAND Katharine McPhee. I want to smack the smarmy look off her wannabe-bedroom eyes smarmy face. She sucked so much ass singing Somewhere Over The Rainbow. Both times.

  Elliot and Taylor should call it a tie and share the title. Best part about them is that they totally would and be cool with it. Katharine would never share her crown with someone else.

  Ooh, I just wanna smack her.
