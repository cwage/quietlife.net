name: steph
body: I voted this morning as well; I think the 'cue the tumbleweeds' feeling at the
  polling station was a combo early morning and that people don't seem to get that
  yes, in fact it does matter who your local government is. Too many people my age
  I talk to are all, 'What? There's an election? It's not time for a new president
  yet.'
date: '2007-08-02T17:58:33Z'
slug: 2007-08-02-vote
