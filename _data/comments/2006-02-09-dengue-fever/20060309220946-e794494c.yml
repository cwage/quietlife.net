name: Jana
body: Thanks for putting up the 'Tip My Canoe' clip... I heard this on the way home
  from work just now. I had to run to the computer to check out WMNF's playlist to
  find out what the hell THAT was! I loved its far Eastern sounds and hadn't a clue
  to what I was listening to. After reading your blog notation, I guess I'm going
  to have to hunt up the album now. Thanks again. -Jana
date: '2006-03-09T22:09:46Z'
slug: 2006-02-09-dengue-fever
