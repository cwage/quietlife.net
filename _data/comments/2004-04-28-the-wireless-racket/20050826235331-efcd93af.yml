name: Billie J Ramsey
body: |-
  I bought a Simply Wireless prepaid cell
  phone from T-Mobile to go, through HSN
   In March this year. I was supposed to get a $40.00 rebate. In May, I got a letter stating I hadn't sent the correct UPC barcode, I had put all of it in my computer, so I sent all they asked for again. Here it is August 26th, never got my rebate. Stuck with cell phone that is
  set for certain time to pay for more minutes (23 cents per min) And a $97.00 cell phone with limited time allotments. Talk about rip-offs,and no recourse, for fairness
date: '2005-08-26T23:53:31Z'
slug: 2004-04-28-the-wireless-racket
