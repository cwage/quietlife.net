name: Kamil
body: |-
  Listen to the Shins' Chutes Too Narrow. I think it's much better than their latest stuff.

  Early Strokes stuff is also better than their latest, which is garbage. Room On Fire is probably their best effort.

  Take or leave the White Stripes? Seriously!? They're great! How much of their stuff have you heard? Icky Thump which just came out and it's pretty sweet. I'm going to see them in a couple weeks actually. Pretty pumped for that.

  Good to hear that you're finally checking these bands out.
date: '2007-06-26T17:16:57Z'
slug: 2007-06-26-hipster-doofuses
