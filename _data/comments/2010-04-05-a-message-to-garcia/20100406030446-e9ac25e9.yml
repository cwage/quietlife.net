name: Andrew Duthie
body: |-
  It's interesting seeing different takes on this little tract from different viewpoints.

  From the busy entrepreneur came the idea that this tract is for him, and people like him, to get them to work harder. The same person agreed that requiring employees to read "A Message to Garcia" was not a good idea at all.

  From another, who is in charge of wrestling fairly stereotypical 22-year-old attitudes into useful mechanics, requires it. If nothing else, it's something he can refer back to when their questions suggest their instructor with 20 years' experience doesn't know how to remove a camshaft properly (for example).

  But overall, yeah, I don't like it either.

  For those who do love it, though, I recommend the somewhat longer tract, *The Go-Getter*, written by Peter Kyne in 1921. Naturally [it, too, is available on Google Books](http://books.google.com/books?id=hiBFAAAAIAAJ&pg=PA5#v=onepage&q=&f=false "http://books.google.com/books?id=hiBFAAAAIAAJ&pg=PA5#v=onepage&q=&f=false"). Essentially, it is the story of how a different message got to a different Garcia. And a guy who thought it amusing to offer impossible challenges to prospective hires.
date: '2010-04-06T03:04:46Z'
