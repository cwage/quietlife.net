name: Jmusmc85
body: LOL. Yes. I had to write a small essay on this and I was like " WTF is this
  shit" My professor is a former Army captain so it all makes sense now. But this
  type of leadership doesn't flow very well with most. Most students were all for
  this, but we all know that they truthfully would not like a leader like Hubbard.
  Very funny post.
