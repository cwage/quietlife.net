name: Paul Van Hoesen
body: |-
  Who knew that the transmission of ones and zeros can evoke such passion? I'll sell tickets next time...

  The last round with the state education contract shows what happens when the gov't and a carrier push the envelope on having it their way - 87% of the school districts check out of the state network, at their own expense, leaving AT&T with nearly zilch.
  When it comes to the 'net, the Wisdom of the Crowd has an amazing way of flowing around all the B.S. and moving on to what really works.
  The places I'm visiting and the people I'm meeting lately are 3 steps down on Maslow's Theory of Digital Needs and really don't give a damn about self-actualizing, esoteric debates about "broadband" - they just know the train has left and their kids are not on it.
