name: John Hutcheson
body: |-
  amen, amen. I certainly don't want Brittney do lose her job or job-share, because I think she is doing a fine job, but I do think it would be interesting to have another more conservative 'host' working with Brittney. I say that as someone who agrees with Brittney (and you) a lot of the time.

  Hobbs comments remind me of those people who complain about the bias of the so-called main-stream-media and then proclaim proudly that they watch the Fox News Channel.
date: '2005-12-26T04:28:40Z'
slug: 2005-12-25-passive-aggressive-whining
