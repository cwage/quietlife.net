body: |-
  I closed comments because it was affecting me emotionally. I am human, and my skin IS thin. I was unable to find the calm to finish my job that day. I regret closing them, though, as it does make me look incredibly juvenile.

  Not as childish as Bill, however. So I take comfort in that.
