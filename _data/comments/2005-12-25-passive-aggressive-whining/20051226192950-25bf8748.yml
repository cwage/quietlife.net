name: EgregiousCharles
body: |-
  I'm responding to this post, not the Nashville is Talking thing, which I know nothing about.

  "Claims of bias or a lack of objectivity are codewords." No, they aren't, they're usually pointing out bias or a lack of objectivity, which is in some cases objectively quantifiable.
  [http://geekwitha45.blogspot...](http://geekwitha45.blogspot.com/2005_12_18_geekwitha45_archive.html#113494479123125518 "http://geekwitha45.blogspot.com/2005_12_18_geekwitha45_archive.html#113494479123125518")
  This is a danger primarily in news outlets which pretend to objectivity, not blogs which don't. It's caused by newsrooms that are remarkable enclaves of like-mindedness (rather than any sort of conspiracy or even collusion), which defeats honest attempts at objectivity by journalists.
  [http://www.csmonitor.com/20...](http://www.csmonitor.com/2004/0603/p02s01-usgn.html "http://www.csmonitor.com/2004/0603/p02s01-usgn.html")
  The problem is that bias is in the news itself (especially in news selection), rather than just in editorials. It's primarily harmful to readers who believe in the objectivity. If, for example, the Times in New York Times, LA Times, and Washington Times were replaced with Democrat, Democrat, and Republican respectively, it would be much more honest and less harmful.

  There have been some instances of deliberate dishonesty, e.g. talking about semiautomatics while showing video of a full-automatic firing, or fake memos, but those are not what shape the news. It's mainly just that when you and all your coworkers share the same slant, it's hard to get objective feedback. When you're all pretending to objectivity, it makes it even worse, because the slant itself seems objective.
