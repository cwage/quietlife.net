name: Les Jones
body: |-
  The RSS feeds on blogs help, too. Google loves RSS feeds. If you sign up for Google Webmastertools you can see what pages Google visits most frequently, and the RSS is feed is usually first or second.

  Non-blogs (like corporate Web sites and e-commerce sites) can really benefit from an RSS feed for this very reason.
