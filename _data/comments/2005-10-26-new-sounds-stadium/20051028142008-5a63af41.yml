name: jag
body: If closing 2nd for a century is going to open it up so I can drive straight
  from the Gateway bridge and get to 8th/Vandy/Belmont without having to deal with
  Broadway, I will be happy to deal with it. It wouldn't be so bad if the Demonbreun
  bridge by Cummins Station was open.
