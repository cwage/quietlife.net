name: t. rev
body: |-
  I went out of my way to try to buy things yesterday, but I couldn't find anything I wanted. It was frustrating!

  I went to my friends' game store; I wanted to buy Weapons of the Gods but it hadn't arrived yet. I wanted to buy a card box but they didn't have any new ones in the size I wanted, so they gave me a used one for free.

  Then I went to Borders and couldn't find any books I wanted.
date: '2005-11-26T21:12:16Z'
slug: 2005-11-26-buy-nothing-day
