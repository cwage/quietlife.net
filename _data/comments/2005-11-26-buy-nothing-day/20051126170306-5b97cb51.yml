name: Doug Orleans
body: |-
  I bought a state auto inspection, a bag of pretzels, 12 cans of diet coke, a box of blueberry pop-tarts, three frozen pizzas, and a burrito from Anna's (with chips & salsa).

  That's pretty close to nothing. But tasty.
date: '2005-11-26T17:03:06Z'
slug: 2005-11-26-buy-nothing-day
