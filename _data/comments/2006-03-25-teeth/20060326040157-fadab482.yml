name: Doug Orleans
body: '[Mark Jason Dominus](http://www.plover.com/blog/tech/20-tools.html "http://www.plover.com/blog/tech/20-tools.html")
  has a lengthy essay about the Forbes list too. I agree with his complaints about
  leaving out the hammer, the bag, and rope, but I thought of another one he missed
  too: the key. How could you have a text adventure without keys?'
