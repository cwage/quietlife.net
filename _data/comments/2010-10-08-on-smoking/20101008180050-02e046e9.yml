name: Brandon Valentine
body: As someone who has only successfully been a non-smoker for just over a year,
  and still struggles with the temptation often, I'll offer that chemical addiction
  is only one consideration. We don't call smoking a habit for nothing, because many
  things about it are habitual and regimented. The goal of a smoker smoking a cigarette
  is not merely to obtain nicotine, but to obtain a feeling of satisfaction, and part
  of that satisfaction comes by non-chemical means. The deliberate nature of the breaths
  required to smoke, the taste, these all work on different areas of the brain and
  contribute to a type of euphoria that nicotine alone does not provide. It ain't
  economics, it's addiction.
date: '2010-10-08T18:00:50Z'
slug: 2010-10-08-on-smoking
