name: Nicki Wood
body: My neighbor is 10 years smoke-free and uses a nicotine patch every day because
  her doctor told her it's the tobacco, not the nicotine, that's bad for her health.
  Worked for her. She says at first it was more expensive to use the patch, but now
  it's cheaper than smoking.
date: '2010-10-08T20:15:11Z'
slug: 2010-10-08-on-smoking
