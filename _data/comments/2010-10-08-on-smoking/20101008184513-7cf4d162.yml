name: t. rev
body: Aside from the outright poisonous components, tobacco contains substantial amounts
  of natural MAO inhibitors, which are antidepressants and seem to act synergistically
  with nicotine; pure nicotine doesn't seem to be very habituating, but it's much
  more so when administered with MAO inhibitors, at least in rat studies.
date: '2010-10-08T18:45:13Z'
slug: 2010-10-08-on-smoking
