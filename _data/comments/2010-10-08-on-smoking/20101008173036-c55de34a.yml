name: Aram
body: It's not the same. I used them to quit smoking, but it wasn't a 1:1 replacement
  for smoking. You get a steady stream of nicotine in them which can blunt some of
  the cravings, or at least keep you from going insane with rage 24/7 for weeks. But
  it didn't get rid of all the cravings, or replace anything else about the habit.
  It made quitting somewhat tolerable, but that's about it.
date: '2010-10-08T17:30:36Z'
slug: 2010-10-08-on-smoking
