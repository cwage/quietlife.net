name: Adrianne
body: |-
  This is the information that will be released as the obituary tomorrow, May 12.

  Freweini Asmelash Gebremicael. Born 1/1/1972, Died 5/7/2006. Became a U.S. citizen in 2001. Survived by father, Asmelash Gebremicael; daughter, Rutta Amanuel Simon; son, Yonas Amanuel Simon; brothers and sisters. Memorial services are scheduled for 1:00 p.m. Saturday, May 13th, 2006 at the chapel of Holy Trinity Church, 4905 Franklin Road, Nashville, TN 37220, with Pastor Mark Arey-Proistamenos officiating. The family will receive visitors after the service at the home of Mehret Gebremicael at 5800 Maudina Ave, Apt F-3, Nashville, TN 37209. In lieu of flowers, donations may be made at any Suntrust Bank to the Freweini A. Ghebremicael Funeral Fund. WEST HARPETH FUNERAL HOME & CREMATORY, 6962 Charlotte Pike, 615-352-9400. [www.harpethhills.com](http://www.harpethhills.com "www.harpethhills.com")

  The information regarding the bank:
  To mail deposits:

  Freweini A Ghebremicael Funeral Fund
   c/o Suntrust Bank - Belle Meade (Inside Kroger)
   4560 Harding Road
   Nashville, TN 37205

  To wire deposits: Routing #061000104, Account number 1000049504896

  After the funeral bills are paid, all remaining funds will go into a savings account to provide for the education of Freweini's two children.
