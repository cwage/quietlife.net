name: Scavenger
body: I'm not sure I get your conspiracy theory. A city wants to attract tech businesses.
  These businesses pay well, are low in pollution, and tend to employ people who are
  nice to have in a community, well-educated, and not criminals. Tech businesses need
  cheap broadband Internet access. How can the city make sure that the infrastructure
  is in place to attract these businesses?
date: '2006-07-24T22:08:33Z'
slug: 2006-07-23-worst-idea
