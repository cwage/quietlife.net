name: jscheel
body: 'Hehe, you hit it on the spot. The Steeplechase is a great people-watching event.
  You gotta love seeing guys in seersucker shorts walking around with women whose
  hats are large that Australia all acting like they''re at a college frat party.
  Actually, come to think of it, it pretty much is a giant frat party, maybe mixed
  with a formal. (Small bragging right: I actually got the first interview with the
  winner a few years ago when I was filming the race. Almost got run over by the other
  horses, but still...)'
date: '2008-05-13T13:36:25Z'
slug: 2008-05-11-chasing-the-steeple
