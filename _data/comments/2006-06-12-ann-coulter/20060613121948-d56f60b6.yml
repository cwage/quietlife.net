name: Lesley
body: 'Agreed. Similarly, I always laughed at this old co-worker who was (years ago)
  such a huge Rush Limbaugh fan. He believed and supported every word and I just felt
  kind of sorry for the guy because I knew Rush was mostly just an entertainer trying
  to make a buck by exploiting the feelings of dumb white guys (note: not all white
  guys are dumb; just the ones who were on the Rush train. TYVM.).'
date: '2006-06-13T12:19:48Z'
