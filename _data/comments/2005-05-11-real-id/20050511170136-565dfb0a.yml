name: Jackson
body: |-
  Owed more than a sarcastic quip? Uh, I gotta go rethink my blog and the meaning of life.

  In an effort to try and help with this content reform I will pass along a question that my father sent me this morning in response to my even shorter sarcastic quip.

  "And yeah, the realID is gonna be weird, but some first step toward a more positive ID is inevitable - don't you think? We know that the first step will be stupid, but that is what we are - a nation of editors."
date: '2005-05-11T17:01:36Z'
slug: 2005-05-11-real-id
