name: Kat Coble
body: |-
  Woot! (I have GOT to stop saying that. I sound stupid.)

  Although, not to be all speculatively nosy or anything, but might your decision to [stop paying the insurance](http://chris.quietlife.net/2007/06/05/finances/ "http://chris.quietlife.net/2007/06/05/finances/") have led to her sudden realisation? Just pondering...

  Anyway, glad you'll be there tonight. (One of the reasons I planned it there was because, to my knowledge, you would still be carless and this way you could walk. See, I was actually thinking of you. Truly.)
