name: Lesley Feracho
body: 'I recently got the album and I agree with you Chris: I really like the way
  she shows a diversity of styles without having a badly disjointed album. I wasn''t
  AT ALL l bored by the album and sorry, but see NO comparison with Mary J Blige style-
  wise or vocal range- wise (apples and oranges but hey, that''s why everyone has
  different tastes). I like Mary J but this album is far more interesting and risk
  taking, which is why sadly, I wonder how much exposure she''ll have. This industry
  more and more doesn''t reward risk takers. I''ll stay optimistic though.'
date: '2006-05-22T19:39:22Z'
slug: 2006-05-20-best-album-of-2006
