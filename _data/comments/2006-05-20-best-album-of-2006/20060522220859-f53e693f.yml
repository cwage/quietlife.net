name: Kevan
body: I wouldn't call it risk-taking. It's just a cabaret-type album like the Divine
  Miss M might have done back in her day. Smith is obviously talented, and she's made
  a good album. But to call it the best of 2006? Nope.
date: '2006-05-22T22:08:59Z'
slug: 2006-05-20-best-album-of-2006
