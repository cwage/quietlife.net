name: Blake
body: |-
  I'm trying to get the company I work for to start a blog now. They seem open to it so far...even looking at sending one of the marketing people to BlogNashville. I'm not sure that attending BN will help in this endeavour (the panel discussions seem to be for those who already know about blogging), but we'll see.

  I may use your company's blog as an example when pitching it to my company.
