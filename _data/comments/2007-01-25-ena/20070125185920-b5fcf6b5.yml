name: Tim W.
body: This *is* a bummer. My last place of employment uses ENA, and my experiences
  with them were great. Their folks struck me as being amazingly on-the-ball. When
  we had an outage with our Internet connection, ENA was on top of it **instantly**.
date: '2007-01-25T18:59:20Z'
slug: 2007-01-25-ena
