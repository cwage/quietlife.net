name: R. Neal
body: That's funny. I was driving around in Belle Meade with a Kerry sticker, when
  some big-haired, way-too-much-makeup "lady" driving an SUV sporting "W" stickers
  and yellow "Support The Troops" ribbon magnets rolled down her window and yelled
  "Yeah, go ahead and vote for the Taliban."
date: '2006-02-25T17:13:30Z'
slug: 2006-02-24-racism-is-not-cute
