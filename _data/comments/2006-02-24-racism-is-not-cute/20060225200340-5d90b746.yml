name: cwage
body: Exactly, which is my point. The OED definition of *Arab* is not something that
  means anything in the context of identifying someone visually in a Mercedes. Unless,
  you know, they had a "I [heart] (and am from) Saudi Arabia" bumper sticker or something.
date: '2006-02-25T20:03:40Z'
slug: 2006-02-24-racism-is-not-cute
