name: A. C. Kleinheider
body: |-
  *I mean that in the sense that there’s really no such thing as “nature”*

  That's right. No human nature and all that, I forgot. I guess I come down more with Vidal then. I do believe monogamy, and therefore (traditional) marriage, is "unnatural" in that it is not programmed into our biology. However, it is functional, enlightened, and good for society to engage in it.
