  *The nuclear family is not unnatural, it’s just unnecessary, and perhaps sometimes harmful.*

  I may have got turned around a bit in this post as to what Vidal is saying as opposed to Wage. The Wage Position is that the nuclear family IS natural but unnecessary and even harmful. Yes?
