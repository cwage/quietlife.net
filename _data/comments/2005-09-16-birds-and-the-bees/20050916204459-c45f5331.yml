name: cwage
body: No. When I say "The nuclear family is not unnatural", I mean that in the sense
  that there's really no such thing as "nature". The nuclear family is a functional
  arrangement -- functional to some ends that I think are detrimental to society,
  as does Vidal. So this is where we agree. Where we disagree is that Vidal attributes
  the detriment of the "nuclear family" to inherently "natural" characteristics of
  men and women, which is silly.
