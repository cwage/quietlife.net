name: Kevan
body: '"The Electric Kool-Aid Acid Test" is a good documentary on the Merry Pranksters.
  I heard The Right Stuff is good, too. Wolfe supposedly helped invent the "new" journalism
  back in the day. I gravitated more towards Thompson.'
