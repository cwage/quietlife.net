name: Brad
body: It looks like a DOD person and/or contractor screwed up. All DOD hard drives
  are supposed to be wiped 3 to 5 times, then incinerated. As for "used" hardware,
  the manufacturers call it "factory refurbished" and its quite common to receive
  them as replacement parts. Your drive may have been diagnosed as defective by a
  DOD tech, and instead of following the process the DOD returned it to Dell for a
  replacement. Dell replaced whatever faulty component there was, ran some basic diagnostics,
  then put it in their replacement parts inventory which is how you received it.
date: '2007-01-26T17:56:48Z'
slug: 2007-01-26-dod-hard-drive
