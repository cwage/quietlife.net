name: Corey
body: |-
  I too can not believe that the DOD would send back any kind of computer storage devices, wiped or un-wiped. Someone is probably going to be in trouble for treason! LOL I’ve been involved with [networking](http://www.computergiants.com "http://www.computergiants.com") for quite some time so I’ve seen my fair share of hard drives and tape drive come and go and when we do lose a piece of storage medium or decide to change it out for whatever reason we wipe it first and then destroy it completely.

  The company I work with considers its data very sensitive and private and believe me, they’re no Department of Defense! I actually heard of one other story similar to this however the guy who told me the story said that someone bought a used [laptop](http://en.wikipedia.org/wiki/Laptop "http://en.wikipedia.org/wiki/Laptop") that came from the government as well. I don’t know whether that’s true or not but after reading your blog I believe it just might be. In this day and age why would the government allow anything used to remain in existence?
date: '2007-10-08T04:49:49Z'
