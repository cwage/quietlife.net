name: Tobin
body: That was a major screw up. I know that my employer for the hard drives in the
  printers that are all in defense related area will be eating the cost of those drives
  as security will not let them leave. They have to be taken away and destroyed/shredded/minced.
  I bet they have to do pretty much the same with laptop and desktop drives that go
  bad.
date: '2007-01-26T14:47:19Z'
slug: 2007-01-26-dod-hard-drive
