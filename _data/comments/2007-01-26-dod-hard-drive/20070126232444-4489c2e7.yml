name: Prepare yourself now
body: You have to make a choice when you go to bed tonight, (if you make it that long),
  how are you going to respond when your front door is kicked in between 2 am and
  6 am? A window will also likely be broken and very loud explosions could be going
  off. If you have a dog it will be shot on sight, no matter how cute, (cats are only
  worth a stomping). So, what\'s your response? Lie motionless and beg for mercy?
  Or defend your castle? Your choice, no one can make it for you? Personally, I might
  just leave them a cocktail and spend the night some place off the grid.
