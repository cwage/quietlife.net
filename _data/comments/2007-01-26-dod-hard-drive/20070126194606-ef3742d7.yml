name: Bob K
body: |-
  Chris,
  While there was probably some violation of standing operating procedures in the wiping of the hard drive, the good news is that your login screen popped up with a blue window. Had it been red in the title bar, you would have been the recipient of a classified hard drive. Luckily, yours is just a run of the mill unclass system, so there's no danger of there being something secret on it. Still it is bizarre behavior both of Dell and DOD.
date: '2007-01-26T19:46:06Z'
slug: 2007-01-26-dod-hard-drive
