name: CeeElCee
body: |-
  When the poodles started going nuts and running around the bed at 10:30, we figured the Sounds had hit a home run. Then when it kept going, we thought they'd won the game. Then when it went on and on, I guessed they must have won the freakin' minor league world series, much to the dogs' chagrin. And we live 3 miles away. I can only imagine what it was like from your vantage.

  Now you tell me it was some biz-pig party? I hope Metro charged them an assload of money...
