name: Julia
body: I'm actually a bit relieved that there are Americans who've heard this too.
  My husband and I were starting to wonder if we were the ones guilty of ignorance
  for not knowing that the guy was known as "Moose" - we're British and don't get
  to follow the season too closely. But I don't remember hearing the "sss" sound that
  would have followed on from the booing sound if they were saying "Moose".
date: '2007-02-05T00:16:27Z'
slug: 2007-02-04-superbowl-booing
