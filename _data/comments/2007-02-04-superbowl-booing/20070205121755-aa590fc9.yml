name: jenny g
body: 'PHEW! i was *disgusted *when his named was called during the intros and everyone
  booed. my mom and i instantly had a feeling that it was because of his last name,
  but prayed we were wrong. another event that day had already begun my pessimism
  concerning the intolerance of americans, for me. directly afterward, i got onto
  google to see if there were any live forums where anyone had said anything - no
  luck. so this morning, i typed in: muhammed booed super bowl, and found this. THANKS
  :D**'
