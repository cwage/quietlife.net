name: Rex Hammock
body: 'It''s like at a Titans game when Dreeeewwww is yelled when Drew Bennett catches
  a pass. There''s even a commercial in which Peyton Manning watches a moving crew
  lose control of a piano -- "They''re not yelling, boo, says Manning. They''re saying
  "moooovers." Another thing about football fans: They are extremely tolerant of diversity
  when it involves someone who can catch passes like Mushin Muhammed.'
date: '2007-02-05T02:00:12Z'
slug: 2007-02-04-superbowl-booing
