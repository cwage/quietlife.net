name: Amanda
body: |-
  It's funny. I think if I had to pick out one thing about this album I like say more than City of Daughters (\*my\* favorite Destroyer album) it is those little piano florishes. I agree that gorgeous is the right word.

  Another thing I think worth mentioning is it seems he has his voice a little more under control, although I'm not sure that is a good thing. One of my favorite things about Dan has always been his phrasing which I think maybe sometimes came out of his wild voice. You aren't going to get any of those weird moments like at the begining of "comments on the world as will" which I think are very charming.
date: '2006-02-24T14:54:43Z'
