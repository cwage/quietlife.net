name: JadeGold
body: |-
  Richard Perle is certainly going to Hell.

  Isn't it a horrifying thought that someone as venal and amoral as Perle was able to rise to a position of highest influence in this country? Frankly, Perle should be biting the heads off chickens in the sideshow of some third-rate carnival.
date: '2004-04-20T17:30:04Z'
slug: 2004-04-20-paying-the-price
