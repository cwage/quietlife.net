name: Doug Orleans
body: |-
  I don't think Perle (or most people) realized that there are plenty of people in Iraq who were not Saddam loyalists yet still hate us. It's never just a two-sided battle-- we can't beat one side and expect the other side to be content.

  That's not an argument against deposing Saddam, of course. Iraq is better off now, it's just a question of how much better off, and how much did it cost us.
date: '2004-04-20T22:49:40Z'
slug: 2004-04-20-paying-the-price
