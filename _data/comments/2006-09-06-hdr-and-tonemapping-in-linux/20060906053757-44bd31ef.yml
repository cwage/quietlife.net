name: Lindsey
body: |-
  Hi Chris, have you seen [this site](http://www.stuckincustoms.com/index.php "http://www.stuckincustoms.com/index.php")? I'm sort of a new reader here so you might have linked the site before, but it looks to me like the same technique to the one you're learning.

  Anyway, it's a fascinating way of taking and altering photographs. And if I was more patient, I'd try it myself. But I'm content just to look at others' creations. So soldier on!
