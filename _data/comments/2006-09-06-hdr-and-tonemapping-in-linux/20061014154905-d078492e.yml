body: You can certainly pull it off, but the more user-friendly software mostly does
  exist for windows.. However -- what I perhaps didn't convey well in my post is that
  almost all of the "windows only" software I mentioned actually runs fine in Linux
  under [WINE](http://www.winehq.com/ "http://www.winehq.com/")
