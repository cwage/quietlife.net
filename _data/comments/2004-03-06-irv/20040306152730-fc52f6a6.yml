name: Doug Orleans
body: Excellent! I've been saying this for the last four years, though I never got
  around to figuring out how to actually help make it happen. Glad to see some of
  the "media elite" are taking it seriously. (Unfortunately I don't think anyone takes
  vanden Heuvel seriously, but every voice helps.)
