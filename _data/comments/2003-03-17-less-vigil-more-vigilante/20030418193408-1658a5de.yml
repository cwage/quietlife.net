name: Glenn Peters
body: |-
  While avoiding the bigger semantic debate in the interests of peace, I nonetheless feel compelled to point out that "machismo" is a noun.

  I think the main problem with these protests is not that no one notices or cares, just that the right people don't. It does provide the psychological good of letting those of us who oppose the war, and more generally the insane policies and strategies of our government that we are no alone after all.
date: '2003-04-18T19:34:08Z'
