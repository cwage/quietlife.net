name: Cubes
body: |-
  Try comparing their overall domestic violence / murder numbers (instead of just the "honor illings") to the US... I think you'll find they have a far worse problem than we do when it comes to violence against women.

  Also, your quote suggests that domestic violence is a crime whose victms are all women... In 2002, a quarter of the "Intimate Partner Violence" homicide victims were men, and a study found that 29% of women and 22% of men had experienced some sort of domestic abuse, and it's believed that men underreport this stuff even more than women. The [current numbers](http://www.cdc.gov/ncipc/factsheets/ipvfacts.htm "http://www.cdc.gov/ncipc/factsheets/ipvfacts.htm") don't seem to agree with what NOW has to say.

  Sadly, we don't seem to have a problem with violence against women nearly as much as a problem with violence in general.
