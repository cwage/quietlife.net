name: Anonymous
body: There's a "Portable Beat Reader" compilation that has a pretty wide survey of
  most of the writers of the movement, including many nodbody's ever heard of (and
  are arguably better poets than Ginsberg or Ferlinghetti). A good intro. Also, while
  not a beat - though possibly an inspiration to them - Orwell's Down and Out in Paris
  in London is fantastic, and carries many of the same themes you'd find in Bukowski
  or Kerouac (girls, booze, filth, shitty jobs etc).
date: '2008-08-17T22:08:47Z'
