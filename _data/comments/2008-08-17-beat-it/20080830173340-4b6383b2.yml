name: Chris H.
body: Good luck reading the Bible. I tried reading it once and when I got to the begats
  I just went "aaaaaauuuuuuugggghhhhhh" and put it away forever. That shit is wack,
  yo! Although the part about God striking down the Philistines with hemorrhoids for
  stealing the ark of the covenant is pretty sweet.
