name: Tim W.
body: |-
  Chris,

  Your "Steeplechase People" series, while beautifully composed, gives off a "The Beautiful People" vibe that is mildly disturbing to me.

  My overarching question is: Does anybody besides what appears to be White Anglo-Saxon Protestants attend this Steeplechase event? In a word: yuk.

  Thanks,
  Tim
