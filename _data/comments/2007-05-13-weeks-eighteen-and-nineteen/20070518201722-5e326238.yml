name: cwage
body: |-
  > My overarching question is: Does anybody besides what appears to be White Anglo-Saxon Protestants attend this Steeplechase event?

  Yes, but they are minorities in more ways than one (ha ha). Steeplechase is a spectacular exercise in class demographics. It's people-watcher paradise. From the bleachers to the infield to the general admission, each is a little tiny slice of sociology. It's a lot of fun.
