name: cwage
body: |-
  It's the pilsner from Big River, the micro-brew down the street on 2nd and Broadway.

  The odd thing is that pilsner is supposed to be clear and theirs is cloudy -- I guess because they don't filter it. I've heard people say that means it shouldn't be called a pilsner. But whatever, it tastes good, and that's what matters. One of my favorite beers in town..
