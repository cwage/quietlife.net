name: Emily
body: |-
  "I need something a little more uplifting, now, though, sheesh."

  I have the perfect follow-up read for you - "Man's Search for Meaning" by Viktor Frankl. Austrian psychiatrist recounting his experience in the Nazi concentration camps. He lost many friends and, I believe, his entire family, and theorizes about a very fundemental concept that he believed kept him alive. Also a very quick read.
  I read it in college and recommend it to everyone.
date: '2007-09-11T14:43:24Z'
