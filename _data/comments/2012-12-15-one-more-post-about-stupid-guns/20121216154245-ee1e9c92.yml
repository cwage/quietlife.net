name: Pj
body: Clearly the point of the alcohol comparison is not to compare the damage the
  two hings do, but rather to speak to the efficacy of banning \*anything\*.  We can't
  keep zipguns out of prisons and people somehow think it will be possible to keep
  them off the streets?  ditto drugs.
date: '2012-12-16T15:42:45Z'
slug: 2012-12-15-one-more-post-about-stupid-guns
