name: Doug Orleans
body: |-
  I agree with you that the War on Drugs is a failure, but isn't that the same false equivalency you told people to lay off?  (I think the War on Terror / Security Theater is a better equivalency, maybe.)

  The thing that enraged me the most was when Tom Fucking Brokaw [tweeted](https://twitter.com/tombrokaw/status/279787553572413440 "https://twitter.com/tombrokaw/status/279787553572413440") that it was popular culture's fault.  So I'm guessing now we're going to get another pointless round of congressional inquiries into violent videogames and movies.
date: '2012-12-15T23:29:49Z'
slug: 2012-12-15-one-more-post-about-stupid-guns
