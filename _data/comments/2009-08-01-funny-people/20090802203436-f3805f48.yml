name: Amber Adams
body: You make some excellent points! But then, I read things like [this.](http://www.nydailynews.com/lifestyle/2009/07/21/2009-07-21_longlost_letter_reunites_lovers_after_over_a_decade_apart.html)
  I think if these movies were better made, they might be making the point that "most
  of the time love takes work, but it's really worth fighting for." Instead, the stories
  come off as stubborn refusals to accept the failure of a relationship and a selfish
  desire to destroy the other person's happiness in favor of one's own. I kind of
  wonder what 500 Days of Summer is going to do with this theme. Gordon-Levitt has
  definite stalker potential in the trailer, but it keeps insisting it's not a love
  story.
date: '2009-08-02T20:34:36Z'
