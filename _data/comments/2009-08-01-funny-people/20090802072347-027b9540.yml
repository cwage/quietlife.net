name: Random
body: Yeah, I agree with what you're saying about the stalker message. I bailed on
  Studio 60 on the Sunset Strip (I mean, before the network bailed on it, too) at
  exactly the moment that the producer chick told Brad Whitford's character "You need
  to stop pursuing me" and he said, well, "No, I won't." That did not make him romantic;
  it made him unpleasant and potentially dangerous. The instant I realized that's
  not what they were going for, outta there. Sigh.
date: '2009-08-02T07:23:47Z'
