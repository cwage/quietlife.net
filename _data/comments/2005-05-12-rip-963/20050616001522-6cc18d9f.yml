name: Andy
body: |-
  c,mon!!!96.3 played the same mabey 60 songs over and over and over..how many times do you need to hear that diana ross song..for goodness sake.. explore music a little more people..get a grip.. the station moved half a notch up the dial
  if your that easily entertained by humdrum repetetiveness !

  variety is the spice of life .. and the Jack is playing songs I haven't heard in for ever and that is refreshing!!!

  this town needed a musical booster shot for the longest time..in a bad way .. and the Jack is a good start.

  do you have to like every single song they play..give it a chance
  no one likes every single song a station plays ,, but something different is better than the same old "oldies" over and over
