name: snickerdoodle
body: |-
  Oh, Lordy!! I thought I was going to have to listen to the sound of my engine running for the rest of my life when Oldies 96 changed to some lowly station only a Bonnaroo drop-out would listen to. My darling daughter told me the dial had changed to 97.1 and I got my life back. Although the sound isn't quite as clear and the music comes and goes at times since I live many miles away from Nashville I still hang in there to hear the music I grew up on....
  Thanks for returning the my radio
date: '2005-06-29T19:46:13Z'
