name: Linda
body: The lack of loyalty by the owners at 96.3 permeates every level--from their
  loyal listeners to their loyal employees. To change without warning is inexcusable.
  Talking about a pie in the face! I hope everyone is boycotting 96.3 like I am now!
  Thank goodness I discovered that 97.1 had picked up the oldies station.
date: '2005-07-01T01:16:41Z'
slug: 2005-05-12-rip-963
