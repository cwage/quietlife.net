name: Amanda
body: |-
  Okay I listened to it for awhile in the shower and they played:
  1. some new waveish song I couldn't identify (!!)
  2. some awful guitar rock 70s song
  3. Roll to me by Del Amitri
  4. Relax by Frankie Goes to Hollywood
  5. Rock and Roll Girl by John Fogerty
  6. some Dido song
  7. Life in a Northern Town by Dream Academy

  And then my head exploded. Talk about too much variety. Oy vey.
  I was shaving my legs, that's why I was in there so damn long.
