name: Shazara
body: |-
  He probably has panic attacks, which plague a lot of people in public life and are humiliating. No fault of his own - Kim Basinger has them and has done a film called "Panic" to try to explain. She was shut up in her house for 4 months after her first one - crying. I think that talk show hosts, and people in administration should be more aware of it, and there should be more moves to help. Sly probably started drugs because of it, but a panic attack is uncontrollable, unless you get treatment. Could have begun as his fame started to spread, would definitely explain his lack of showing up at concerts. There's an account on the web of how he repeatedly tried NOT to go onto Dick Cavett, but they loaded him on a helicopter, and he did coke on the way. On the interview - YouTube, it was agonizing for me to watch, because I have panic attacks myself, and that was someone going through a panic attack. Once the attack subsides somewhat, then he can talk - or stop shaking - but he's still stoned.
  What a shame there aren't more compassionat, insightful, perceptive people in the entertainment world. Dick Cavett has quite the supercilious look on his face - instead of helping him out if he'd been more aware.
  Sly - a genius, a brilliant musician, and a perfectionist, trying to do it all without getting help.

  The press has been downright vicious towards him over the years - I hope they all rot. And they will.
date: '2007-03-17T21:35:48Z'
slug: 2006-02-09-sly-stone
