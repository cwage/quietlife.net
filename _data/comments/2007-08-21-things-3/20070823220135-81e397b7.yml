name: jscheel
body: My first reaction, when looking at your photo, was to say, "man, that's horrible.
  The government should be concerned about taking care of it's homeless citizens."
  But then I thought about it for a minute. The government shouldn't of had any of
  that money in the first place. They are not going to distribute it properly, so
  it should stay with the taxpayer, who in turn has the choice, if not moral obligation,
  to help out his or her fellow humans beings who are struggling through life. I'm
  positive that private citizens and private organizations can do a much better job
  helping the homeless than a bloated government can. What do you think?
