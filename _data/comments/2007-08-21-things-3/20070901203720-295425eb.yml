name: cwage
body: |-
  The reality is that they (the government) do have the money, and they'll continue to have it for a while.. Pragmatically speaking, I'd rather see the money spent on things that will help people first.

  As far as private citizens and organizations -- I agree that they can do a much better job, and they ought to. But there's nothing stopping them from doing that now. The private/public charity debate is a false dilemma.. There's no shortage of money -- it's just not a priority.
