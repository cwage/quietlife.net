name: emma
body: |-
  Well, at least there's some protein in the bagel-n-cheese, as opposed to the all-out fat-n-sugar rush of the doughnut. But yeah, this place near where I used to work served up bagels that were probably equivalent to about six slices of bread. I think most average bagels are about four. Misguidedness of the food pyramid aside, its suggested "6-11 servings of grains" would be totally covered with two bagels a day.

  Also, I am somewhat reminded of a line from a cookbook I read last night: When customers come in to the bakery and ask for low-fat scones, he hands them a regular scone and says "eat half the scone, it's half the calories."
