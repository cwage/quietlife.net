name: Steve
body: 'Great post. Scenarios I had never thought of before or knew about (4/8 success?!).
  But one idea that always hangs in my head when I read about the North Korean situation
  is this: would they really fire a missile at us? I mean, if Iraq was attacked, invaded,
  and occupied on the SUSPICION of a weapons program, what would we do if a country
  actually used ICBMs against us? mutual assured destruction comes to mind... but
  maybe without the mutual part.'
date: '2006-07-03T04:01:03Z'
slug: 2006-07-02-the-korean-missile-crisis
