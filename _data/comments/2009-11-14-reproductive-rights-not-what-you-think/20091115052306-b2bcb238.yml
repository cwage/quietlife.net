name: Mark Rogers
body: |-
  Chris,

  The problem with your position seems to be that the 'right' to have children gets caught in a fundamental conflict with the 'right' of society to restrict activities that, while seemingly personal, are regarded as having such an impact on the lives and 'rights' of others.

  For example, kindly old Mrs. Hatten wants to rent her downstairs to someone whom she feels safe with, In her eyes, this means only renting to a Christian heterosexual. Now if she advertises this, she can be hammered by the legal system for discrimination. The logic of the argument being that even a limited form of discrimination like this is more harmful to society than the harm of giving the state the power to tell her that she cannot discriminate in her own home as if she were an apartment complex.

  On that principle of the importance of not allowing one person's freedom to harm others, the question quickly follows: "Which action poses the greatest harm to society, Mrs. Hatten's desire to rent to someone who meets her ideals or a man with four children and unpaid child support of $50,000 who is still capable of fathering more children? Similarly, how do you compare the impact on others of Mrs. Hatten's action and a meth-addicted woman with two abused children who doesn't care whether she gets pregnant or not?

  Given that 'rights' often conflict with other rights, your argument runs into the simple roadblock that has arisen because we have allowed 'rights' to be defined as public policy goals rather than trying to design public policy within the parameters of our 'Rights.'
date: '2009-11-15T05:23:06Z'
slug: 2009-11-14-reproductive-rights-not-what-you-think
