name: Gmiller12
body: |-
  Cmon Sentimental Sally.  Live a little.  Food Trucks are the new way of life.  No one likes to wait in line for food, especially when it's hot.  But it's different.  It's new.  And it's good and cheap.  That what people want.  ideas that are far away from the everyday norm.  So stop going to the same deli, the same diner, ect, and try a food truck.  Who knows, maybe the food will be worth the wait.
  Also, anyone who is owns or is interest in food trucks, check out our website: [http://www.foodtruckcaterin...](http://www.foodtruckcatering.com/ "http://www.foodtruckcatering.com/")
