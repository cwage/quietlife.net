name: Stephen Y.
body: My rule is that I already have to be wherever the food truck is located -- I'm
  not driving to find an elusive food truck. We survived thousands of years as a culture
  to use forks instead of sticks and a few more to stop having to hunt around for
  food. That's what Taco Bell is for.
date: '2011-06-10T19:06:16Z'
slug: 2011-06-10-food-trucks
