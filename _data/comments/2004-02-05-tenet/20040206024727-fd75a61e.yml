name: Matthew Maly
body: |-
  Defense Enterprise Fund (DEF) is a program to convert former Russian producers of weapons of mass destruction. DEF was financed with $67M of US public funds. It is a venture capital fund that was supposed to bring profit to the US Treasury.

  Well, according to the Department of Defense Audit of DEF, DEF spent half of its grant on itself, which is twenty five times the industry average. As far as DEF’s investment portfolio of $30M, $20M disappeared from it under very suspicious circumstances.

  Defense Threat Reduction Agency (“DTRA”) maintains a DEF-related webpage. This page used to state that the number of former Soviet WMD scientists converted by DEF to peaceful pursuits was 3370. I questioned this figure in my letters to DTRA, and DTRA reduced this figure to 1250, which is a 66% reduction. But the real figure is no more than 200 Russian scientists.

  Theft of millions of dollars of WMD conversion funds and intentional blatantly false reporting – this is how the Bush Administration “cares” about the WMD threat.

  Relevant documents are here: [http://nunn-lugar.com/def](http://nunn-lugar.com/def "http://nunn-lugar.com/def")
