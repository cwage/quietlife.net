name: alwayshungryab
body: |-
  Having worked in publishing for a few years, I encountered this question myself. I never saw this in a law book, but the general rule that we followed was that if the photo was of a person in any public place (on the street, at church, at the roller derby, etc) it was OK to print as long as the photographer's copyright was acknowledged and as long as the photographer was compensated as per the publisher/photographer agreement.

  I'm not saying that it's right, but this is why we see celebrity photos ("Ashley Olsen drinks a latte," "Matthew Broderick buys groceries") snapped out in public and plastered all over People magazine. There's no grounds for a lawsuit there. A person's image is only protected in private homes and businesses.

  But I agree that The Tennessean was incredibly lazy with their "probably" this and "probably" that and "look it up on Wikipedia" bullshit.
