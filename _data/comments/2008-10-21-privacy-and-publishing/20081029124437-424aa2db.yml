name: Laura Creekmore
body: |-
  I am continually astounded at the legal ignorance -- often willful -- of those who should know better. We deal with copyright and photo rights issues every day in our work, and several times a month, we work with someone who wants to ignore their legal obligations here. Rarely is it a party who doesn't have a reason to know.

  I would hope there's a Tennessean lawyer somewhere spitting out their coffee over this. It's just stupid to tempt lawsuits, even if you are likely to win them. Waste of time and money for all involved.
date: '2008-10-29T12:44:37Z'
slug: 2008-10-21-privacy-and-publishing
