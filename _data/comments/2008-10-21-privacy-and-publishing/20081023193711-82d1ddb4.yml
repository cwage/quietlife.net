name: Ryan Kaldari
body: It's important to note that personality rights vary significantly from one jurisdiction
  to the next. I'm surprised the Tennessean would be so cavalier about it since Tennessee
  has pretty stringent laws on the subject (thanks entirely to Elvis). I guess they
  just assume that their army of well-paid lawyers can take care of any problems that
  might arise. BTW, any plans to submit more of your awesome photos to Wikipedia?
  The photos in the Nashville article are pretty lackluster :(
date: '2008-10-23T19:37:11Z'
slug: 2008-10-21-privacy-and-publishing
