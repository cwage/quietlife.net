name: Kathleen
body: Amanda- If you were referring to my comment, I only asked because I am writing
  a term paper dealing with what the main point Michael Moore is trying to make in
  the movie "BFC" which is discussed in this message board, and I wanted to know if
  fearmongering would be a proper term for me to use as part of my thesis. It was
  not the least bit "snarky"- get a life.
