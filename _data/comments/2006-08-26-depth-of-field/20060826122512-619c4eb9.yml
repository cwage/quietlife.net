name: R. Neal
body: |-
  You've probably seen this, but here's a helpful DOF calculator:

  [http://www.dofmaster.com/do...](http://www.dofmaster.com/dofjs.html "http://www.dofmaster.com/dofjs.html")

  According to this calculator, a 50mm @ 1.8 has a .84 inch depth of field from 3 feet.

  A 28mm @ 1.8 has 2.88 in. DOF at three feet (if you can find one).

  An 85mm @ 1.8 has only .24 in. DOF at three feet, or at five feet it's about the same as a 50mm. (Which is one reason I don't understand why this is such a popular portrait lens.)

  Maybe one solution is to back up to get more DOF and then crop your photo.
