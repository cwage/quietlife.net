name: Kev Mo
body: You know, skip the helmet. Biking isn't that dangerous. Really. A helmet is
  a fashion accessory. I've been hit by cars while riding my bike with no helmet on
  more than one occasion. Never even came close to having a head injury. If they made
  some lower back padding ....
date: '2006-04-30T06:58:30Z'
slug: 2006-04-28-bike-update
