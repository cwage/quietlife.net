name: Johan
body: |-
  > Johan, while you support and defend those who are undermining the war against our enemies who want to kill us, I support America.
  > 13 years Army, Mech Infantry, when I was a young lad. Did my time, buster brown, how ’bout you?
  >
  > ps: Army recruiting has been meeting goals lately. Guess you haven’t heard. Thank God there are young people out there who are willing to serve their country, unlike the Leftist parasites.

  I did my time in a foreign military.

  What do you even know about the conflict that your country is engaged in?
