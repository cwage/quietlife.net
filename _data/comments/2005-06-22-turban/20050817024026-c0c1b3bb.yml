name: Johan
body: |-
  Dear Rastus,

  Judging from the short-fall that the US military is experiencing, there are a lot of people who aren't signing up.

  But there is no shortage of people on blogs.

  It appears that it is easier to to fight "terrorists" from behind your keyboard, then to go to Iraq.

  Right?
