name: aaron
body: it's not that i didn't love you before, but i loves you more now. i actually
  have all that stuff with me in NZ on a CD, but still fun to see it up on the dubdubdub.
  and of course the narcissistic thrill of seeing my very own name in print-oh joy!
  love the band. miss the band. want the band. did you sell your bass amp? (if so,
  i say under my breath, 'fool')
date: '2006-02-09T21:54:55Z'
slug: 2006-02-03-agent-eight
