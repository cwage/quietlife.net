name: Jon
body: |-
  LMAO! Finally someone has found a way to link Marx and libertariansim. I love it, tremendous kudos!

  I've always thought that while Marx, umm, wasn't so strong on the solution, he had some keen insights into the problems. In particular I liked an essay of his which I believe was called "Alienated Labour", you might enjoy it if you haven't already read it.
