name: bytesplit
body: It seems that you have mistaken "advancements in technology" for "freedom to
  steal". Why not just go buy the cd's as most people do, and as you should do, rather
  than bitch that someone isn't giving you free wireless technology, BMW's and cd's.
  Jeez
