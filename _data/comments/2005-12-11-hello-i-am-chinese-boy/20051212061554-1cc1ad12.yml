name: Nils
body: |-
  Well you are lucky then. As you noted, I have the same "problem" - but I only get contacted by the most retarded people (no offense to actual retarded people). Guys from Egypt who start off with "male for clean chat" and list "women" as one of their hobbies. Guys from Turkey who are too dumb to form simple sentences. People I wouldn't ever want to get contacted by.

  Guess I have horrible Karma ;-)

  (You did get more messages than me, "only" something like a half-dozen to a dozen over the weekend.)
