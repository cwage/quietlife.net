name: Amanda
body: Last week's episode, when they reveal the 'community' to the Japanese investors
  and then Tobias starts stepping on the houses dressed in a mole costume and George
  Michael flies in with his rocket pack.....I can't remember when I laughed so hard.
  Man this BLOWS. Actually I think sarcastro is onto something. I think HBO would
  be a good fit, even though we don't have cable. That's what netflix is for!
