name: Johnny
body: |-
  Many a cab driver has been shot form a dispatcher not getting the correct address and telephone number, however with todays technology she should have used caller ID and had the professionalism to 1) know that location  2) to explain the policy and ask for the address 3) refer you to another company 4) The dispatchers and call takers should plain know better.   Hope you will give Music City Taxi the opportunity the next time you need a taxi, by the way we offer two Karaoke Cabs as well.
  Johnny
date: '2012-03-06T23:12:58Z'
slug: 2011-11-15-my-favorite-nashville-taxi-story
