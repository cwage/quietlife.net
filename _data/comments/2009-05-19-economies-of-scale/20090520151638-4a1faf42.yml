name: Ashley
body: |-
  Have you heard of the book about the $64 tomato? Apparently that's what one guy figured it cost him to grow each tomato in his backyard garden. You're welcome for helping you prove your point. [http://www.64dollartomato.com/](http://www.64dollartomato.com/ "http://www.64dollartomato.com/")

  Alternatively, I've been reading this book about the other end of the spectrum. ([http://www.fatalharvest.org/)](http://www.fatalharvest.org/) "http://www.fatalharvest.org/)") It's pretty activist in its tone and makes some claims that I would like to investigate further but is still interesting.

  As usual, I'm left wondering where the appropriate middle ground lies.
