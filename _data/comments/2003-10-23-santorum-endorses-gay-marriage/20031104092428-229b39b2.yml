name: Francisco
body: The highlighted phrase isn't really contradictory, he could mean any number
  of things. For example, he could be saying "if a homosexual wants to get married"
  meaning a straight marriage... not that that makes any sense, but it's often the
  way conservatives think, in my observation. They feel the lifestyle is something
  you can just shut off if you really want to. More likely he was referring to straight
  relationships for straight people and gay relationships for gay people, but that
  still doesn't mean he was in conflict, because he said "want"... he doesn't have
  any problem with gay people wanting to get married, he has a problem with society
  allowing them to. This is hypocritical to be sure, but any appeal to logic is superceded
  by their inherent prejudice against the gay lifestyle. It would be like the man
  who wanted to marry his dog... the response would be a "no we don't do that here"
  kind of thing. It doesn't matter how compelling the guy's arguments are that he
  should be able to marry his dog, it is simply dismissed out of hand because of the
  prejudice.
date: '2003-11-04T09:24:28Z'
slug: 2003-10-23-santorum-endorses-gay-marriage
