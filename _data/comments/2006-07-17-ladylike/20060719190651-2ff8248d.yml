name: t. rev
body: |-
  Nice dodge about feminist "spokespeople". You guys have elections, or is that an appointed position? All I know is what I read on teh intarwebnets:

  > "[Ariel Levy](http://www.ariellevy.net/ "http://www.ariellevy.net/") has given us an important, lively, shocking investigative report about how and why - in an age of HIV/AIDS and religious fundamentalism - US commercialism has mainstreamed pornography, popularized raunch images (and practices), and revived female "bimbo" roles. This is a call to arms for women and girls who are being sold pseudo empowerment, phony liberation, and fake rebellion - instead of the real thing: freedom. A must-read for young women - and everyone else."
  > -Robin Morgan, author and activist

  Then again, if you find Twisty "ridiculously funny" there isn't much point in talking to you. Good day.
date: '2006-07-19T19:06:51Z'
