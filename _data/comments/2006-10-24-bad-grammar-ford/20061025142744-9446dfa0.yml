name: tari
body: |-
  You know, I think this might just be that someone tried using ellipses to represent a pause--in this case, the kind of pause that you make when you change the structure of your sentence part of the way through. He started to say something like, "I don't have any apologies for that" or "I don't have to apologize for that" and then changed his mind and said, "No apologies for that" (with the "I have" elided, which is a common enough construction in not-totally-formal speech).
  I really doubt he said, "I don't have no" etc. I think one source tried to transcribe what he said exactly, and the other just picked the construction he seemed to be aiming at by the end of his utterance.

  We need to invent a punctuation mark for "speaker aborts previous sentence construction and takes up a new one." I really think it's the ellipses, which--not to be too prescriptive--are customarily used to indicate omission, that are the culprit here.
