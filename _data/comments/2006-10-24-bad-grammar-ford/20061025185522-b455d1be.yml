name: Ned Williams
body: I think the ellipsis is legitimate, though an em dash would probably have been
  more appropriate; no harm done by The Tennessean in my view. That being said, I
  believe that WMCTV has no business editing Ford's statement for him. I don't see
  media outlets editing Dubya's statements "to make meaning clearer."
date: '2006-10-25T18:55:22Z'
slug: 2006-10-24-bad-grammar-ford
