name: Kat Coble
body: |-
  So I'm commenting because I'm embarrassed. You linked to this on FB and I was all "I don't want to read this because I don't have the energy to argue with Wage right now."

  And then I come read it and I don't disagree. It scares me to be in a world where I don't disagree with you....;-p
