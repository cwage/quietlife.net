name: PeskyFly
body: 'A point worth considering: if the hospitality industry exerted equal political
  influence to the gun lobby this would have never happened. A law enabling a few
  to the discomfort of many, most notably bar & restaurant owners may not be a bad
  booga booga law. But that doesn''t make it good enlightened legislation by default.
  The style of politics and priorities it represents are worse than what it is. I
  understand that mine is an abstract point, but at the end of the day this, not the
  reality of gun-owners in bars is the rub. So the legislation has "little impact"
  in bars. I''m not sure it''s sphere of impact limited to the four walls that give
  George Jones the blues.'
date: '2009-07-17T02:05:49Z'
