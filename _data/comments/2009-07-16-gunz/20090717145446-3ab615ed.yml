name: Pol Mordreth
body: |-
  Since you asked...

  The law states that no one may carry a firearm inside an establishment that serves alcohol. Period. Then they list a whole raft of exceptions, including police and military in actual performance of their duties, the owner, and whomever the owner decides to allow, (including bar staff, bouncers, managers, and anyone else that they want to). The 2 new laws that came out add exceptions for permit holders and off duty police officers. TN code 39-17-1305 if you want to look it up.

  Firearms owners in tennessee in general want to be able to go to places like ruby tuesdays or chili's and have a meal with their families without having to leave their weapon in the vehicle. Unfortunately in Tennessee law there are no bars. period. You have to do a majority of your business in food to serve alcohol. (there are specific exceptions to this. like private clubs, sports complexes and theaters and museums) There is no legal requirement to card for entry in tennessee unless you allow smoking, not for drinking. There is no real way to split those places like applebees, chilis, etc from places like the corner pub using the existing legal definitions.

  Peskyfly, I'm not sure what you mean about 'the style of politics and priorities it represents'. This law increases liberty for all tennesseans. As a carry permit holder it increases my ability to choose where to eat. For restaurant owners it increases their liberty on whether to allow armed patrons or not. This is not new legislation. It has been passed by overwhelming margins in the TN state senate for 5 years. Speaker Naifeh used his position to kill it in the house for 4 of those years. Since he was no longer speaker this year, it actually made it to a floor vote and was overwhelmingly passed.

  I am a permit holder. I have carried legally for the last 15 years in various states. I don't drink while armed, as alcohol and guns do not mix.

  Respectfully,
  Pol
