name: Scavenger
body: I'm pretty sure I read an experiment where some guy was awakened every time
  he started to dream (REM sleep) and he went insane in a couple of weeks, complete
  with hallucinations. Yes this is other than 'The Machinist.' Let us know how it
  goes!
