name: A Proud Beef Eater
body: Even though there has been another case of mad cow disease this time in Alabama
  does not mean that you shouldn’t eat 'cheap' pieces of meat or even hamburgers.
  As long as it is properly cooked there is nothing to worry about. If you really
  want to be hypersensitive about it then don't eat any beef nor any poultry (due
  to the bird flu) either.
date: '2006-03-15T19:17:36Z'
