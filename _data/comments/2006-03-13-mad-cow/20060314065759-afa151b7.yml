name: Vol Abroad
body: Indeed. Good beef cheap. Hurray! There are things you can do to minimize your
  risk. Eating steak that doesn't have a bone in the cut is one of them (the prions
  often rest in the connective tissues)- I guess that includes ribeye and t-bone.
  Filets and strips are better. Avoid burgers and cheap cuts.
