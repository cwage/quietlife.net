name: Jackson
body: |-
  Have you ever been sailing? You would love it. There is always something to mess with. Owning the boat makes exponentially more tuning time.

  It takes a certain type of person to be hanging out on the lake (going much slower than the motor boats and jet skis). Then you start thinking, "you know, I think I should tighten the boom vang and loosen the luff on the main".
