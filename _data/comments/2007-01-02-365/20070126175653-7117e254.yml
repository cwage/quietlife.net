name: CeeElCee
body: |-
  Chris,

  Was it you that was asking what sites around town were worthy of photographing taht weren't just the typical Bat Building shots?

  I was thinking as I ate lunch yesterday among the dozens of freaky obelisks in Mt. Olivet Cemetary (yeah, I know I'm weird, but it's the closest thing to a park near where I work) that it was a site worthy of Wage photography. You could spend a week in there.

  Let me know if you shoot any,
  CLC
