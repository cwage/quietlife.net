name: RachelW
body: I don't fully understand the workings, but I've heard claims that defunding
  would cause smalltown/rural stations to shut down, and those typically have much
  larger percents of their budget from federal funding than a big city with a larger
  member base would have. I can't vouch for the accuracy of these statements. :)
