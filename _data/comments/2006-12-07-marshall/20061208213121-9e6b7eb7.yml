name: newton
body: |-
  dammit. i've been looking for the secret to songwriting success all these years and you just go blurting it out like that.

  (for the record, the bus hit me at a whopping 5 miles an hour. i still think that i hurt my back, my neck, all my joints and that it probably caused the anxiety attacks i've been having for a few weeks prior to the accident. at least that's what i'm gonna claim...)
date: '2006-12-08T21:31:21Z'
slug: 2006-12-07-marshall
