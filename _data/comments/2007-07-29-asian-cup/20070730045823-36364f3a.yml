name: Paul Nicholson
body: |-
  I agree with [the Forechecker](http://forechecker.blogspot.com/2007/07/miracle-on-pitch.html "http://forechecker.blogspot.com/2007/07/miracle-on-pitch.html"). I think this victory could be huge, and could well mean to the Iraqi's what the Miracle on Ice did for the US back in 1980, only possibly bigger since soccer is more popular there now than hockey was in the US then.

  This team was made of Sunis, Shiites, and Kurds, and beat the Saudi team that were huge favorites and had won several cups in a row. Nice win!
