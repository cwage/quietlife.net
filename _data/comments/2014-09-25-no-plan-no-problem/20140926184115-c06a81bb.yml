name: Sarah Bellos
body: i disagree with your conclusion -- doing nothing will mean that people who have
  the privilege to leave once ill planned growth comes will move to other cooler places.
  If it is not planned for growth, neighborhoods start sucking faster, and lose character,
  and lose value for those that stay behind. Then, a lowering tide lowers all boats,
  except that of those that pack up for the next austin --> portlandia --> cincy to
  find funding for their next startup and sell a bubble. also, since you asked a negative
  consequence of growth => cancer.
date: '2014-09-26T18:41:15Z'
slug: 2014-09-25-no-plan-no-problem
