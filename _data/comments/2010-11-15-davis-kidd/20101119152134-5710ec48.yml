name: Robert K. Wolf
body: Davis-Kidd will forever have a special place in my heart. I played there as
  a singer/songwriter during their writers' nights. A young lady whom I had met 6
  months prior but hadn't gotten to know was perusing the frame aisle near the upper
  level restaurant. We recognized each other, started chatting, and soon let love
  blossom between us. We've been married six and a half years now. They've been the
  best of my life. Thank you, Davis-Kidd.
date: '2010-11-19T15:21:34Z'
