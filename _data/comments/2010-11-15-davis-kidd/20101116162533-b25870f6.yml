name: YouWannaSeeVapid?
body: I don't get all of the negativity towards Davis-Kidd. Yes, let's celebrate the
  closing of a place to take our kids, browse magazines, attend a book signing...and
  buy books. Let's just all stare into our smartphones and pretend we are 'connected',
  it's going to be great. You think the mall is vapid now? Just wait. In 1 week it
  won't even have a bookstore.
date: '2010-11-16T16:25:33Z'
slug: 2010-11-15-davis-kidd
