name: Carneggy
body: And if you'd actually read the whole article, you'd find out that these 'lawmakers'
  actually passed a 'law' about this in 1979 - except that law was ruled 'unconstitutional',
  so they're trying to end-run it by 'amending the constitution', thus voiding that
  counter-argument at the source to prevent the 'judges' from 'ruling' against the
  legislation again. :P
