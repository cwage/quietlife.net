name: Dave
body: |-
  WAAAAAHHHH you sound like the little kid whose just found out that their friend has a newer version of some game they wont let you play with. So in defense you tout about how much his game stinks even though its newer and better.
  I think the word I'm looking for is Capitalism. It helps move the world to develop new products and services. Just because Jabber's usability has faltered, so what. Are you a developer working on the Jab project? NO. Your just a whiner pouting in the corner because no one wants to play your game. Try being a solution instead of some lobbyist. Be a developer instead of the one who says I want that button here.

  Hopefully one day you will learn that after identifying a problem the next course is to find a solution, then the fix, rather than just complaining.
date: '2002-10-21T03:20:19Z'
slug: 2002-03-09-why-trillian-sucks
