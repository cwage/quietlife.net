name: Hallo_Keety
body: I have had zero problems with Trillian. Of course, none of my friends use AIM,
  so maybe I am missing out on your problems. In fact I love the program. Gone are
  the days of opening up ICQ, MSN, and Yahoo to see which of my friends are online.
date: '2003-01-17T15:29:46Z'
slug: 2002-03-09-why-trillian-sucks
