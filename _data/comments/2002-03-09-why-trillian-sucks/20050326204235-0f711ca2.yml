name: Squiggles
body: |-
  I think this article has some valid points. I myself use trillian, mainly because the actual MSN program won't let me sign in for some reason. I havent's been able to sign in since May of last year so I have been using trillian since then. I have to say the new version of trillian isnt too bad. Since it's updated I've only had one problem with ICQ and that was it. I think that if you just want to talk to people, and you don't have some incessant need to show off "cool" little things you've managed to be able to do on your IM then trillian is fine.
  Since reading this article I have become more interested in Jabber and it seems like a good idea without the needed resources.
  Yeah, so that's just my little opinion :D
date: '2005-03-26T20:42:35Z'
slug: 2002-03-09-why-trillian-sucks
