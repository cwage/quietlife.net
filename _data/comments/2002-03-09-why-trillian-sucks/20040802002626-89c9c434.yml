name: rubberband man
body: Trillian sucks monkey balls and thats all there is to it...LOL. First off the
  interface is gay and yahoo kicks you off most of the time...the real messengers
  offer more security and work a lot better...yeah trillian might offer some of the
  features but they don't work half the time. It also logs all your messages in plain
  english. Another thing is it screws up your buddy lists by combining them on the
  servers sometimes if you use multiple accounts on one messenger. Also Trillian was
  developed by foreigners and no telling what type of spyware they have in there.
  You cannot disable certain features on the messengers like you can on the real ones.
  Webcams freeze on it and basically it is a scam to get 29 of YOUR HARD-EARNED bucks!
