name: Jed D'Lagged
body: "I'll leave the irony aside that I happen to stumble upon this page literally\
  \ minutes after purchasing Trillian Pro for myself, after using Trillian for about\
  \ a year now.\n\nThis is nice and all, wanting people to drop Trillian for an all\
  \ 'round Utopian client.... but its not going to happen. IMing systems are for people\
  \ to communicate - whats the point if theres no one on them?\n\nSure, sure. My situation\
  \ is probably not like the one you described, from within a workplace. Its more\
  \ individual, communicating to my other friends who use many different IMing systems.\
  \ Which is probably the same situation 95% of Trillian users are in. Its not easy\
  \ to get people to switch to another IM service when they're not technically proficiant.\
  \ Hell, even technically proficiant people don't want to move if they're happy with\
  \ what they've got. But back to the average Joe who bearly knows how to use AIM\
  \ and MSN, getting them to switch to another, more complicated client \"For the\
  \ good of man kind\" is just something they're not going to do. And they're not\
  \ going to do it, ever. With the introduction with these new Tablet PCs (The ones\
  \ you write on with Digital Ink\x99!), its quite clear that people arn't moving\
  \ to the technology, the technology is moving to the people. Unless Jabber gets\
  \ more user friendly, its not going to ever have the user base Trillian has. Which\
  \ means its not going to have alot of support. Which means its probably going to\
  \ stay as stagnant as it is now.\n\nOne other thing I'd like to say.... it was constantly\
  \ mentioned that Trillian is going to be useless in the future when they find some\
  \ way to deny other IM clients access to their servers. Isn't Jabber going to suffer\
  \ the same problem? Oh, its not going to matter, because then you'll have your own\
  \ protocol to fall back on? Well, seeing that its only AIM, out of the five IMing\
  \ systems, that seem to be trying to deny Trillian its service (and that was a while\
  \ back, and yes, I know ICQ is owned by Warner too, but I don't think they're as\
  \ anal as AIM are about their protocol), I don't think Trillian will need to worry\
  \ about that either. Hell, at one stage, MSN even WARNED Cercrulean Studios about\
  \ an upcoming change to the MSN servers that could \"negativly affect Trillian\"\
  .\n\nI don't think Trillian will die as magnificently described in the article above,\
  \ when Times Warner and Yahoo decide to try and reduce us back to the stone ages.\
  \ Given that now Trillian is profiting from its own popularity (somewhat), the makers\
  \ will have more time to spend on making Trillian compatable with the other servers\
  \ again. Given the \"Stagantion\" of Jabber... when they get denied, it will be\
  \ up to the users, IMHO, to correct the situation. But given Jabbers current popularity,\
  \ I'm not sure if that would happen faster than Trillian.\n\nI guess we'll have\
  \ to wait and see. But I, for one, won't be packing spam in the bomb shelter =P"
date: '2002-12-23T04:32:00Z'
slug: 2002-03-09-why-trillian-sucks
