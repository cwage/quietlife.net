name: Some Guy
body: Trillian does suklc, and so does Jabber. All IM programs suck, it is just the
  low technology of the Human race that disallows a good IM system, no matter IF people
  did TRY get Jabber wroking, it would take until a Technological upgrade to actaully
  get it to full capacity. This is the most true and best statment made on this entire
  page, however I do use Trillian... because I am FORCED to. This VERY OLD Computer
  can't even HANDLE the Actual Programs anymore so that TO use them I HAVE to use
  Trillian, for it is so far the best substitute IF AIM, YIM, or MSN Don't work on
  your Computer. My computer is a year 1999 built Pentium 2 Prossesor and it has a
  Windows 98 Operating Sytem, it is too old and deadvanced to use the actual Messengers.
  This is another example of with bad technology things such as Jabber will never
  work. Think about LOGIC here, it is not like we're flying aroung in UFO's beaming
  down Soda into our mouths and creating water and landscapes and planets to live
  on, nor are we creating our own lifeforms to actually advance and create more advanced
  technologies for us. That may be a Science Fiction example, but fact is the Human
  Technology level is not that advance, nor effective.
