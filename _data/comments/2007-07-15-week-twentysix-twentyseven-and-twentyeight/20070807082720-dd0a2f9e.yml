name: Louis
body: |-
  Hey Chris, a few questions:

  How are you metering the shot in your HDR photos?

  What are your thoughts on shutter speed vs. depth of field in this technique (I assume a high shutter speed helps mitigate some of the problems of blurred movement)?

  How much exposure are you bracketing in AEB? I read somewhere that 2 stops was the best for most purposes.

  Do you put the drive mode on continuous shooting?

  Do you use a remote to release the shutter?
