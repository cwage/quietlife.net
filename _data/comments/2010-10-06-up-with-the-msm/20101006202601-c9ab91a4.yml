name: Kate O'Neill
body: I dunno, I'm sure I'm partial, but the tofu process doesn't seem anywhere near
  as gross to me. \*shrug\* I mean, the pile of pink meat-goo was enough to turn my
  stomach. The tofu process is more like "huh." Again, I know I'm biased, but maybe
  not as much as you'd think, because not eating meat is primarily an ethical decision
  for me, not a visceral one. That said, of course I agree with you that mass agricultural
  models are leading to some really unfortunate (at best) consequences for both personal
  health and the environment.
date: '2010-10-06T20:26:01Z'
slug: 2010-10-06-up-with-the-msm
