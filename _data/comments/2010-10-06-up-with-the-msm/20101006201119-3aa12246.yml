name: Sara
body: |-
  You know... making that paste from whole chicken the way he did... I bet it would taste really good with some salt and some cornmeal all fried up. Seriously. I grew up in a Chinese household. We ate every edible thing even if Western countries count skin, tendons and marrow as "not really food." When I saw him dump a handful of skin in there, I actually said out loud, "OH YEAH!"

  Where "gross" comes in for me at the industrial scale is with hygiene. Massive Scale + Too Many Hands (usually =) Mistakes.

  Besides... if I drop a bit of food on my kitchen floor, I can dust it off and it is A-OK. Drop food on a kill room floor. HELL NO.
