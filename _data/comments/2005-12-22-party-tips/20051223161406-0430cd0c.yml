body: |-
  as expected, everything has been turned upside down and I don't think I'll be able to make it tonight. My bro-in-law and his life partner are coming in from Chicago tonight, not tomorrow, and we're having Christmas dinner tomorrow, not Sunday so everything's been moved up a day! Wicked fun! :-P

  Have fun tonight...I'll be thinking of you...(or maybe I'll just sneak away...)
