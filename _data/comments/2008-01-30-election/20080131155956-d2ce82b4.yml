name: cwage
body: |-
  Who, Paul? I am going to vote for him in the republican primary, probably yes.. Not in the general -- not that there's any realistic chance of that happening anyway.

  Frankly, in the nexus of "things I care most about" and "things that the president can effect change in", whether he believes in evolution or not is fairly inconsequential.
