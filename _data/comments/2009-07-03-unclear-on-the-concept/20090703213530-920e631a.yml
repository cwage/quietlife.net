name: Major Wood
body: |-
  I find the concept very funny. If the conservatives think they have enough clout to really affect the marketplace by not working or buying anything for a day, they would surely realize that they would only be making the problem they are trying to fix worse. They want to stop Obama from destroying the economy, so they do what they can to destroy the economy for a day.

  Besides, I remember there have been similar protests that leftists have done in the past where conservatives have pointed out that it isn't possible to have a large enough effect in one day to really show any change.
date: '2009-07-03T21:35:30Z'
slug: 2009-07-03-unclear-on-the-concept
