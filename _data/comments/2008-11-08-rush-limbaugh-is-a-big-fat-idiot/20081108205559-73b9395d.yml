name: Bill
body: Chris, you ARE missing something...at least one thing. Obama's "$250,000 or
  more" tax policy relates to personal income not business income. Only when those
  two categories overlap do you have the $250k or more policy relate to a business.
  This happens most often in "small" businesses, here defined as businesses where
  there is income pass through to the owner or ownership group. An S-Corporation acts
  this way, as does a Partnerhsip or, I believe, an LLC. So what Obama is saying is
  that if you receive more than $250k in adjusted growth income from all sources -
  including your pass through income from a small business, you will see a tax hike.
  It's not the sum total of all your employees income, and it's not the total revenue
  made by the business. It's the amount that you as an individual receive, either
  as salary or net profits or both. If you look at it this way, you'll see right away
  why this policy affects a much smaller percentage of small businesses than conservatives
  would like you to believe. Most businesses earning, say, $1MM, are paying that out
  to multiple employees and paying other expenses thereby dramatically reducing the
  money flowing directly to the owner or owners as taxable income. However, those
  that can afford to direct $250k towards themselves - which usually but not always
  requires a substantial stream of revenue into the business - will get hit with a
  tax boost.
