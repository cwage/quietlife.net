name: Jared
body: I can't stand listening to talk radio anymore, it encourages people to not think
  on their own. It's so easy to blow things out your rear when the microphone is all
  yours. Honestly though, even when I did listen to talk radio, I couldn't stand Rush
  Limbaugh. He's such a hack.
date: '2008-11-08T16:18:25Z'
slug: 2008-11-08-rush-limbaugh-is-a-big-fat-idiot
