name: Matt Parks
body: Being a pilot myself, I agree with this. There was no regulatory breakdown,
  just seems like poor decision making skills by the pilot which lead to an accident.
  Obtaining a license requires medical exams, criminal background checks, etc. There's
  no loophole, turn your radio and transponder off and nobody will see or hear you.
  But you only fly into class D/C/B and do that if you're dumb. [http://youtu.be/CybBuaZThjw...](http://youtu.be/CybBuaZThjw?t=2m44s
  "http://youtu.be/CybBuaZThjw?t=2m44s")
