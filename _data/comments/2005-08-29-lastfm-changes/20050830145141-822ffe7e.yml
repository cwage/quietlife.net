name: Doug Orleans
body: And apparently they broke/removed moderation, so you can't fix mistakes in their
  database (like two different names for the same track). I guess they're planning
  to integrate better with Musicbrainz, which would be great, but it seems like they've
  been planning that forever.
date: '2005-08-30T14:51:41Z'
slug: 2005-08-29-lastfm-changes
