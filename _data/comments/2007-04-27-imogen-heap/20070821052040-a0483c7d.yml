name: Pat
body: I have just in the past year come across the music of Imogen Heap and I find
  it very soothing and soul searching. I can completely understand your obsession.
  I am definately obsessed. It is so airy and creative. I LOVE IT!! She is amazing.
date: '2007-08-21T05:20:40Z'
