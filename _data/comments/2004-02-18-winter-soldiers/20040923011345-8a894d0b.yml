name: John Beitzel
body: |-
  I testified at the Winter Soldier investigation in 1971. I told the truth and to my knowledge not a single statement has ever proven to be false. I have heard a lot of false claims that the people at winter soldier were not veterans. If so many people were frauds at the Winter Soldier Investigation, why hasn't someone released the names of the vets who falsely testified? Wouldn't this be front page news? Maybe one or two frauds slipped through but I doubt it. The truth of the matter is no one was allowed to testify at the Winter Soldier Investigation unless they had DD214 military seperation papers.
  For years I tried to tell everyone who was willing to listen, about the official and defacto policies of our government that were against the Geneva Convention. They were in fact war crimes. I testified before Congress, before the U.N. Human rights Commission, at the Winter Soldier Investigation, at public hearings, at the Philadelphia Naval Base Criminal Investigation Department, and at the Pentagon. We spoke out against the POLICIES of our government, that were in violation of US law as well as International law. We never spoke out against our fellow soldiers. After all they were our friends, family members and neighbors. I went to the Naval Criminal Investigation Division and told them if they were interested in pursuing those responsible for the policies that resulted in war crimes, I would give them a sworn statement including pictures of war crimes that I personally took. They said they would get back to me but they never did. No one has ever challenged my statements, nor has anyone ever proven that I have made any untruthful statements. From my experiences as an infantry veteran, I was deeply concerned about my fellow soldiers in Vietnam being killed, or coming home severly injured. I wanted the war to come to an end, so that the destuction and madness in Vietnam would also come to an end. I lost many friends in Vietnam. Some were fellow soldiers and others were friends that I grew up with and knew from an early age. Earlier this year (2/2004), I returned to Vietnam and visited the old basecamps and battlefields from my year in Vietnam 35 years ago. It was reassuring and very healing, to experience the peace, that is the reality of today's Vietnam. Almost no one in Vietnam talks about the "American War." To them it is ancient history. It is certainly sad to see so many of the old wounds being reopened and the old debates argued once again. In 1971, the members of VVAW were looking for a way to help put an end to the war, and bring peace to this country, as well as Vietnam. The members of VVAW that I knew were good people, with good hearts, that were trying to do the right thing. I have no regrets about working for peace. I still know many VVAW members today. All of them are very proud of their efforts in working for peace. It's time to put the Vietnam debate behind us. It's time to debate the current issues of today. And, let the chips fall where they may.

  Hoa Binh
  John Beitzel, Vietnam Veteran
  4/21 Infantry, 11th Bde, Americal Division. 1/1969 - 1/1970
  Member - VVAW 9/1970 - 9/1971
  Winter Soldier - Jan/Feb-1971
