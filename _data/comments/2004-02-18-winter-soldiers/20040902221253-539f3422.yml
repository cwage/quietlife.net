name: Bob
body: |-
  If these horrendous acts were so widespread I believe there'd be some pictures floating around. The photojournalists were always looking for "the story". And no, they didn't stay in the rear. There were 135 photojournalists killed in Vietnam.
  I suspect some of this happened, though I never saw it in two years. It happened in World War II and there was no racial angle. I don't believe the Winter Soldier testimony because I've heard too many made up Vietnam stories.
  I will say this. I think it was shameful for John Kerry to launch a political career on hearsay and denigrate people he -- supposedly -- fought with.
date: '2004-09-02T22:12:53Z'
slug: 2004-02-18-winter-soldiers
