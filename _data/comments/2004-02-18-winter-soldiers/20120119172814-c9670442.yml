name: MarcusAurelius45
body: |-
  The opinion, by polling of Vietnam Veterans, including combat veterans with regard to"Winter Soldier" testimony rather than confirming the findings and conclusions of the same, adamantly contradicts the same asserting that, in fact, it was the NVA and VC who had a pattern and practice of terror and atrocity against the Vietnamese people while American soldiers had a reputation of protecting the Vietnamese from the same. These polls of Vietnam Veterans indicate that the assertion that there were wide spread and tolerated practices of War Crimes against the Vietnamese people and captured enemy soldiers was a blatant and blackguardly lie. Many enemy soldiers surrendered and, eventually, became "chu hoi's", former enemy soldiers who now worked with the allies. Where is the cruel treatment of enemy soldiers here? I remember one instance when my unit was proceeding to a forward post while on tracks (armoured vehicles). We were suddenly surrounded by a huge crowd of wailing and screaming Vietnamese women begging us with up raised arms to defend them against an attacking NVA unit which was approaching. Terror and war crimes were the "modus operandi" of the communist forces in Vietnam. These women were very aware of the same. They knew that Americans had a reputation of protecting them from war crimes and terror while the communists had a reputation of subjecting them to the same.
  The overwhelming testimony of Vietnam veterans contradicts that of the "Winter Soldier" testimony. Concomitant with the same is the probable fact that the "Winter Soldier" findings were funded and directed by communist operatives as a means to further the oppressive and authoritarian goals of Stalinist communism. It was nothing more than a well organized, well funded, and covert method of undermining the goals of the War in Vietnam, freedom, democracy, and liberty for the Vietnamese people and the peoples of South East Asia.
  I served with the U.S. Army;4th I.D.; 2/8th Inf.; RVN 1969-1970.
